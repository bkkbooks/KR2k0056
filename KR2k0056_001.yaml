body:
  text: 欽定四庫全書貴州通志卷一天文志星野祥異氣候易曰在天成象在地成形象懸而星辰之精著形奠而山澤之氣通天地合徳則精氣騰降交感理固然也黔越在荒服保章氏所未載前人以地近荆梁分翼軫參井之餘考核最為精當我朝列聖相承效天法地順隂陽以布化七政協而休徴集亦既慶雲瑞糓叠奏頻書淑氣祥風旁敷遠暢曩時所稱瘴鄉漏天今皆疹癘潛消雨暘時若考諸三五六經載籍之傳正所謂天地順而四時當民有徳而五糓昌者作天文志首記星野其氣候祥異悉附焉貴州通志卷一天文星野星經曰熒惑主霍山揚州荆州太白主華隂山凉州雍州益州又曰熒惑主輿鬼桞七星張翼軫鎮星主東井太白主奎婁胃昴畢觜參又曰玉衡第二星主益州常以五亥日候之乙亥為漢中丁亥為永昌己亥為巴郡蜀郡牂牁辛亥為廣漢癸亥為犍為凡七郡第四星主荆州常以五邜日候之乙邜為南陽己邜為零陵辛邜為桂陽癸邜為長沙丁邜為武陵凡五郡廣雅曰梁州之西屬北斗開陽一星又曰西番吐番吐谷渾及西南徼外夷人皆占狼星一綂志曰宣慰司參井分野普安州井鬼分野銅仁府星分野黎平府翼軫之餘謝東山志曰宣慰司今貴陽府貴州衛前衛今貴筑縣龍里新添今貴定縣平越清平興隆今黄平州威清今清鎮縣平壩今安平縣普定安莊今鎮寧州安南普安畢節烏撒今威寧州赤水等十六衛俱參井都匀府程番府今定番州永寧鎮寧安順普安四州俱參井之餘思州思南鎮逺石阡銅仁黎平六府俱翼軫之餘沈思充通志曰貴陽都匀石阡思南四府宣慰司定番安順鎮寧永寧普安五州貴前威清平壩普定安莊安南普安畢節烏撒赤水龍里新添平越清平興隆都匀一十七衛普市黄平二所俱井鬼分鎮逺銅仁思州黎平四府俱桞星之餘郭子章黔記曰黔地連楚蜀總之不出鶉首鶉火鶉尾之次又曰星經載熒惑主荆州主輿鬼桞張黔實近荆州屬鬼桞似近之衛旣齊志曰黔古無分野之說一綂志以宣慰司普安州為參井銅仁為星黎平為翼軫沈志則以貴陽等處為井鬼而以銅鎮思黎為桞分郭記又以屬鬼近似今按漢武所設之益州乃越巂犍為牂牁三郡越嶲屬滇犍為屬蜀牂牁所轄二十四邑貴陽以上皆其地也陳卓謂牂牁入參五度而班固謂東井輿鬼秦之分野西南牂牁越嶲二州皆宜屬焉則自平越以上皆為參井無疑矣獨是思銅四郡為桞分似難為據按唐志云翼軫鶉尾自房陵白帝而東盡漢之南郡江夏東達廬江南郡濵彭蠡之西長沙武陵桂陽零陵又逾南紀盡鬰林合浦之地自沅湘上流西達黔安之左皆全楚之分黔安即今之思南則銅鎮四郡自應與楚同占軫翼而不入桞分也或曰牂牁既屬益州近梁州今舎觜鬼而從參井何也曰此非臆說也牂牁占參而不占觜陳說已明至益州兼井而不兼鬼則李淳風所云自畢十二度至井十五度屬益州之言可騐也度之多者無如井少者無如觜是以井兼雍梁益三州亦猶斗牛兼呉越豫章也萬厯庚子狼星入於東井占者以為㓕播之象既而果應此非占在參井之一證耶或曰翼軫隔桞星張三位踰此及彼何名分野曰亦非臆說也僧一行曰懸象在天其本在地星之與土以精氣相屬而不係於方隅袁坤儀有言躔次相配者少相反者多青正東𤣥枵在北雍正西鶉首在南則四郡之踰桞星張而躔翼軫何以異此三人占則從二人之言寧從其衆者而已故輒以管見謂黔為參井翼軫分野貴陽安順都匀平越威寧參井之餘鎮逺石阡思南思州銅仁黎平翼軫之餘四宿占騐參宿十星一曰參伐一曰大辰一曰天市一曰鈇鉞主斬刈又為天獄主殺伐又主權衡所以平理也又主邉城為九譯參白獸之體其中三星横列三將也東北曰左肩主左將西北曰右肩主右將東南曰左足主後將軍西南曰右足主偏將軍故黄帝占參應七將中央三小星曰伐天之都尉也主胡鮮卑戎狄之國凢十度右足入畢十三度去極九十四度觜觹三星為三軍之候行軍之藏府主葆旅收歛萬物明則軍儲盈參旗九星在參西一曰天旗一曰天弓主司弓弩之張玉井四星在參左足下主水漿以給厨西南九星曰九斿天子之旗也玉井東南四星曰軍井行軍井也軍井未達將不言渴名取此也屏二星在玉井南為屏風天厠四星在屏東溷也天矢一星在厠南色黄則吉軍市十三星在參東南天軍貿易之市使有無通也野鷄一星主變怪在軍市中市西南二星曰丈人丈人東二星曰子子東二星曰孫東井八星天之南門黄道所經天之亭候主水衡事法令所取平也王者用法平則井星明而端列凢三十三度去極六十九度鉞一星附井之前月宿井有風雨狼一星在東井東南狼為野將主侵畧色有常不欲變動也弧九星在狼東南天弓也主備盗賊常向於狼老人一星在弧南一曰南極常以秋分之旦見於丙春分之夕没於丁見則化平主夀昌南河北河各三星夾東井一曰天髙天之闕門主關梁南河一曰南戍一曰南宫一曰陽門一曰越門一曰權星主火北河一曰北戍一曰北宫一曰隂門一曰胡門一曰衡星主水兩河戍間日月五星之常道也南河南二星曰闕丘主宫門外象魏也五諸侯五星在東井北主刺舉戒不虞又曰理隂陽察得失一曰主帝心一曰帝師二曰帝友三曰三公四曰博士五曰太史此五者常為帝定疑議星明大潤澤則天下大治五諸侯南三星曰天罇主盛饘粥以給酒食之正也東一星曰積水主候水災積薪一星在積水東供給庖厨之正也水位四星在東井東主水衡東井西南四星曰水府主水之官也東井南垣之東四星曰四瀆江淮河濟之精也翼宿二十二星天之樂府主俳倡戲樂又主夷狄遠客負海之賔星明大禮樂興四國賔凢十八度距中行西第二星去極百四度東甌五星在翼南蠻夷星也軫宿四星主冡宰輔臣主車騎主載任有軍出入皆占於軫又主風軫星明則車駕備凢十八度去極一百度轄二星傅軫上下兩傍主王侯左轄為王者同姓右轄為異姓長沙一星在軫宿中主夀命明則主夀長子孫昌青丘七星在軫東南蠻夷之國號也軍門二星在青丘西一曰土司空北天子六宫之門主營候豹尾威旗噐府三十二星在軫宿南樂噐之府也明則八音和君臣平土司空四星在青丘西主界域亦曰司徒均明則天下豐以上諸星占騐出隋天文志按周禮保章氏以星土辨九州尚已自班固取三統厯十二次配十二野嗣後史家言星野者愈悉魏太史陳卓更著郡國所入宿度唐李淳風譔晉史又著州郡躔次似踵以詳明而後人猶譏其謬亂蔽於天而不知地天官家聚訟乆矣陸績渾象測天東西徑三十五萬七千里直徑亦然張衡靈憲謂八極之維二億三萬二千三百里南北則短减千里東西則增廣千里考古今歴家亦俱云天包乎地地小於天而在天之宿度徃徃乆而差忒將焉凖之惟我朝時憲新法細密精詳利瑪竇曰七政本天所麗各有異動然其本天之中心不與地之中心同也故其行轉於地之靣一周自非可謂平行也則每日不能無差矣又曰天之黄道心與地球心一也則其行於地靣一周恒為平行矣故七政之天雖不平行轉於地體之靣然於其本天之中心平行轉也是葢可以積分而推也黔之疆域在天地三分之二内舊之志星野者縁昔分𨽻荆梁以屬荆者占翼軫屬梁者占參井未必非是但論四宿之度數既不得謂黔之已處其餘而稽各府之疆域又不可謂宿之渾列其内用是上推宿度下計方隅畫而著之於右氣候黔地窳而土瘠氣沴而候愆不可以中州之氣候例也嵐氣上蒸膚寸之雲即能致雨故有漏天之號焉山髙箐深虧蔽日月一日之間而寒暖乍異百里之内而凉燠攸分田功三月始犂四月播種五月挿禾九十月納稼東作稍遲則禾苖不茂夏初無雨則收斂必歉入秋遇有大風則秀不實謂之青空農民歲入除正供之外恒不敷食所頼山坡曠土雜種燕麥荍麥水稗旱稗之屬以佐饔飱故民鮮隔歲之蓄其亦氣候使然歟貴陽北近蜀南近粤冬不祁寒夏無盛暑四時多雨少晴雨則寒晴則暖夏則晝熱夜凉田功之興遲於中土至華之開菓之熟百蔬之成則比中土差早安順東接貴陽氣候畧同無嚴寒酷暑樹藝之期亦復相近平越四面皆距本省地界氣候無異其耕種收穫先後亦不大殊都匀東南近粤嵐瘴差甚夏秋間商旅疑畏不行霜降後乃無患今亦不甚忌其耕穫則比他郡較早鎮逺思州銅仁黎平俱近楚寒亦祁寒暑亦酷暑與中州同大定三面距蜀一面接滇山髙氣寒雺霧朦朧四時皆然五六月無酷暑箐林樹木經冬不凋土寒地瘠畢節以西種惟宜荍而稻榖則鮮登焉南籠南近於粤西近於滇氣候熱多而寒少每當春夏之交隂雨初霽嵐氣薰蒸人中其氣如得瘧疾有頭疼胸懣脾瀉諸症其樹藝則與安順同石阡思南遵義俱近蜀氣候平和寒燠不爽雨暘恒調水經注謂牂牁夜郎之間山無瘴毒即此等處也祥異漢靈帝熹平三年牂牁饑斗粟千錢宋太祖乾徳二年播州田禾一莖兩穗元成宗大徳八年夏六月烏撒等路饑疫並賑恤之武宗至大元年夏六月烏撒烏蒙三日内地大震者六仁宗延祐元年夏五月思州饑發廪減價糶賑之泰定帝泰定元年春鎮逺饑四年夏四月烏撒饑賑糧鈔有差文宗至順二年秋九月思州鎮逺饑賑之順帝至正二十二年播州田鼠食禾盡自赴水死明洪武元年普定水鬭十一年播州蝗二十四年鳳凰見於天柱山從鳥數萬移日乃去永樂十三年婺川山中連呼萬歳者三布政使司蔣廷瓚以聞正綂九年夏六月苖民饑𤼵粟賑之十四年夏清平衛饑景泰二年夏大饑成化三年播州大旱十年普定火二十三年廵按署瓜並蒂有司以聞𢎞治元年播州大旱六年清平大水七年清平疫都匀鳳凰山崩八年冬十一月地震九年夏五月大水十七年夏四月省城大雨雹都匀大疫正徳五年清平大有年六年秋九月都匀地震七年思州火九年都匀蝗十年都匀饑十二年清平饑十三年夏省城大水霽虹橋圮十六年夏思州天鼓鳴嘉靖元年清平大有年都匀火三年思南水徳司江滸巨石自轉四年有虎至思南府署吼而出不知所之六年都匀興隆饑七年播州大旱思南南平倉火延燒民居八年永寧播州大疫都匀大水淹城郭思南枯池出火十日後經雨乃滅冬疫十年冬十一月晦普定地震十二年春三月安南衛生兩頭男十三年興隆大水山崩十四年秋七月思南大雨雹九月思南九門灘枯杉仆地經年自起復生十五年春二月思南地震三月天柱火播州地震有聲秋七月思南地震聲如雷十六年秋八月省城龍見十八年夏五月思州大水西溪二龍鬭清平隕霜殺稼十九年石阡旱清平興隆饑二十年石阡旱二十一年天柱地震二十三年興隆地震二十五年清平興隆疫秋七月黎平野犬緣城夜吠二十六年播州大旱秋八月隕霜殺稼二十七年普定旱大饑斗米銀四錢二十八年春清平芝生秋旱蝗詔免秋糧三十年夏思州饑三十二年大有年三十六年普定衛署樹化爲石三十九年冬十月大霜凝結如花草四十年春旱三月不雨三月朔威清地震四十三年都匀地震四十四年秋七月都匀復地震播州大雹雪傷稼隆慶元年秋七月黄平大雹傷稼二年春二月普定火五日焚民居五千餘戸死者六十餘人四年春二月夕興隆星隕聲如雷六月蚩尤旗見於天柱五年興隆恒雨饑六年夏六月省城雨桂子秋八月天柱螟萬歴元年夏五月興隆大雨雹天柱螟二年秋八月思南火焚民居二百餘戸五年威清虎入城害三百餘人六年播州大疫七年婺川大水秋九月興隆黄平地震八年秋八月黄平慶雲見九年黎平有雀三足猫生子一身二頭十年夏五月普定大水六月銅仁有鳥鳴文廟聲如雷興隆大有年十二年夏五月都匀大水秋九月威清大雨雹傷稼十五年夏六月思南水溢漂沒民居甚夥次年水亦如之十七年春播州大疫秋有年十九年春三月黎平大雷雨蛟出府治儀門夏五月石阡龍見二十年春三月大風雹二十一年春二月朔省城大風雹永寧旱畢節虎入東關民家傷六七人乃就斃二十二年興隆大饑二十四年夏五月安順州大水二十六年興隆虎食百餘人二十七年平壩等衛晝晦如夜大雷電雨雹如斗天柱縣署産紫芝二十八年秋七月廵撫署東園芝生二十九年夏四月不雨五月大饑斗米四錢雨桂子於貴陽六月定番地震秋七月大疫八月撫按兩署東園芝並生冬十月指揮馮國恩妻一産三男三十年夏六月赤虹垂於貴陽城北民家畢節大水漂民舍三十二年大有年夏五月綏陽大水冬十月綏陽火城中民居幾盡三十三年夏四月省城雨桂子三十四年夏五月赤水永寧水漂民居三百餘戸思南沿河司麥一莖兩穗三十六年春三月思州民易繡虎妻一産三男四十年春正月遵義火延燒數日四十三年都匀地震四十五年春三月安莊衛白蜨羣飛蔽天自西南向東北積地數尺越三日火闔城俱燼天柱大旱四十六年貴陽大疫遵義地震有聲自西而南四十七年春三月蚩尤見於遵義西方經月乃滅泰昌元年都匀饑天啟元年秋八月白虹見長竟天畢節地震二年春三月省城龍井涸大雨雪五年遵義大旱七年夏五月天柱晝晦崇禎三年思南火燬民居三百餘死者二十餘人四年天柱大水秋七月地震五年天柱天鼓鳴地震有聲六年秋八月湄潭蝦蟆數萬匝城外一日夜忽散十年開州北極觀柱上木龍挾殿内鐘與井龍鬬山麓震撼十一年夏五月貴陽大水漂沒廬舍溺死八十餘人十二年夏四月豹入省城獲之隨大風㧞木屋瓦皆飛十三年思南地震遵義大旱十四年夏六月都匀燕數萬集府署十五年天柱地裂十六年畢節大雨雹鳥獸擊死者無算天柱大旱十七年夏四月餘慶嚴家屯栗樹仆數日夜忽自起枝葉復生城外崖石開紅花大如盆國朝順治三年甕安縣李樹結實俱成扁豆四年秋七月思南梅盛開成實五年思南大饑食木葉草根盡次年復大饑斗粟三兩遵義荒疫大饑斗粟四兩十四年畢節雙井出紅水龍潭出黑水十七年旱大饑廵撫卞三元請動楚運米三千石賑之十八年夏恒雨南籠旱思南雨雹大風偃木屋瓦亂飛康熈元年遵義大有年二年安籠黄平甕安餘慶大水餘慶村民家牛生犢四耳四目八足二尾三年畢節馬生駒五足天柱牛生犢二首八足二尾四年夏六月銅仁火公署城樓營房民居盡燬五年畢節大水湧入東門六年秋七月思南白氣自東北飛墮聲如雷八年重安江大風雨雹壊民居九年天柱地裂十一年春三月鎮逺火三日燬民居殆盡發金賑之夏五月安籠所民鄧鳳鳴妻一産三男畢節白蛾蔽天十二年餘慶石花開十四年春三月遵義火闔城盡燬惟存道府縣署旬餘復火城外民居俱燼十五年夏五月晝晦如夜十六年畢節女化為男十八年夏四月貴陽大雨雹損廬舍十九年春正月思南晝晦雨下如墨汁冬十一月蚩尤旗見自西北竟東南月餘乃滅二十年秋九月貴陽地震二十二年夏四月貴陽大風雹拔木傾舍二十三年夏五月遵義大水後復大旱饑二十五年遵義大有年二十六年畢節白蛾漫天有大鳥啄食之二十七年夏五月蛟起黄平舊州都山水衝溢偏橋鎮逺而下漂沒廬舍二十八年春三月甕安髙車村巨石自轉二十九年夏五月貴陽水溢衢市舟行秋七月七日婺川九條溪陸地生蓮花大於筐又生樹杪大亦如之思南長溪民家牛生犢兩首四尾八足三十二年秋七月七日安平隕霜霪雨連月殺稼三十三年春二月畢節西門龍見三十七年春二月遵義火城内民居半燬四十七年夏五月畢節大水湮沒民居五十年春二月都匀城北河岸巨石如屋逆水自移五十四年夏六月雷擊畢節東崗文峯塔五十六年十二月安化縣火雍正元年大有年四年平逺州麥秀兩岐五年夏五月思南大水七年秋思州府及古州之梅岑梅得諸處有五色慶雲自七月初八日至閏七月十一日凡七現大有年黔省各屬及新闢苗疆所産稻榖粟米之屬自一莖兩穗至十五六穗不等稻榖每穗四五百粒至七百粒粟米每穗長至尺有竒都匀府石産靈芝普安州稻榖生孫九年貴陽府民間瓜菓一蒂雙實十年歳大豐十一年貴筑縣民家牛生犢五足十二年大有年廣順州瓜茄一蒂雙實貴州通志卷一
