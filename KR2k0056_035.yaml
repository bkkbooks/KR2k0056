body:
  text: 貴州通志卷三十五藝文疏國朝廣教化疏趙廷臣為貴州苗多民少急請廣示教化仰祈睿鑒飭部議覆事竊惟貴州古稱鬼方自大路城市外四顧皆苖其貴陽以東苖為夥而銅苗九股為悍其次曰狫曰𦍕獚曰八番子曰土人曰洞人蠻人曰冉家蠻貴陽以西羅羅為夥而黒羅為悍其次曰仲家曰宋家曰蔡家曰龍家曰白羅雖種類不同要皆專事鬬殺不講孝弟忠信絶先王禮義之教尚強凌衆暴之習其來舊矣故馭苖者往往急則用威威激而叛緩則用恩恩濫而驕稽古舜用干羽漢武封夜郎武侯縱孟獲非故寛之也皆有深意存焉蓋以教化無不可施之地而風俗無不可移之鄉也苗性至詐而可以信孚苗性至貪而可以廉感其作梗衝路宜效保甲之規其讐殺抄刦宜立鵰剿之法又賞罰之條必信餽送之陋必革凡此皆臣所當悉心力行不敢贅陳惟是我皇上創闢大一統之業開億萬年文明之休乗此遐荒開闢之初首明教化以端本始其大者莫如作養世祿今後土官應襲年十三以上者令入學習禮由儒學起送承襲其族屬子弟願入學者聽補廪科貢與漢民一體仕進使明知禮義之為利則儒教日興而悍俗漸變矣又莫如預制土官夫土舍私相傳接支系不明争奪由起争奪不已釀成變亂今後每遇歲終令土官各上其世系履歴及有無嗣子開報布政司三年當入覲則預上其籍於部其起送襲替時有争襲騷擾者按籍立辨斯方䇿既明而釁端預杜矣此黔省馭苗根本之圖折衝樽爼之計倘䝉皇上誕敷文德廣示教化使土屬入學習禮得與幇補科貢土官按籍襲替不致争土奪職庶乎風俗丕變逺邇苗民共沾王化無疆矣借發倉米賑饑疏卞三元為窮荒無米可買饑民日報逃亡仰體皇仁借發倉米以救餘黎以保巖疆事該臣看得民為邦本食為民天國無民不可以成治民無食不可以資生今各處申報飢斃甚多望救甚廹若使畏罪因循視民就死臣於撫民之責謂何臣若敢於負民實負皇上付托一方之盛心也目今飢餓而死者既不能復生生者又奄奄就斃臣何敢惜撥運之楚糈而不救新服之窮赤也況救民急於救火若必待請命而後濟之則京路往返一萬七千餘里必越四五月之期方奉俞旨而僅存之餘黎豈能忍飢以久延乎臣聞漢臣汲黯奉使於外矯詔開倉賑活一方飢民願受專制之罪實體君心愛民之殷切耳臣以謭劣庸才何敢妄引古良臣之義而蹈市恩之愆伏念皇上之德意去歲大發帑金賑恤滇黔窮民全黔窮黎已沾實惠但窮民甚多米價甚貴分給之銀每名不過一兩有餘止可救旬日之生更有無米可買之處是以飢斃之報接踵而至臣今以慘苦難言之狀刻不容緩之時敢仰體皇仁借發鎮逺府楚運倉米三千石以救各處殘民生命即於拜疏之日開倉發賑分遣能幹官員星馳賑荒地方協同道府州縣官沿門查人口多寡酌量給散務期将斃之民保全餘生仰慰皇上仁愛荒服之至意臣即受專擅重譴亦不敢辭其給過米數或准作賑荒之例不復收償允其開銷或止准借給仍令秋收日照數追還伏乞勅下部議覆臣遵奉施行舖兵工食疏佟鳯彩為痛陳私派之源仰祈睿鑒等事一曰舖兵苦役日費不足查别省舖兵俱有額設工食黔省通雲南孔道崇山峻嶺羽檄交馳晝夜不息每舖兵一名止日給米一倉升夫一倉升之米供本役一日之食尚且不足又無閒隙可以别求營生其父母妻子誰為代養是以招募無人肯應勢必勒令百姓輪當一經輪當居近大路者尚可勉應其役若逺居一二百里之外者必致歛銀轉僱倘一歛銀其鄉保頭人借題多派百姓不寧為今之計或念黔中山高箐深舖兵苦役除日給米一升外再照他省日給工食銀二分庶公務不悞百姓亦免騷擾矣添設驛逓疏佟鳯彩為黔山萬叠驛路險逺異常馬匹萬難支持謹繪圖恭請睿鑒勅部亟為調劑添設以速軍機以蘇驛困事竊惟天下之苦累者莫過於驛站驛站之險逺最苦者莫甚於黔省夫黔省為滇南咽喉之地在在皆石山峻嶺上則登天下則履壁上而復下下而復上俗言地無三里平者委無虚謬也夫擡一站勢必足破肩穿馬走一站亦必蹄瘸脊爛甚至力不能勝中途逃斃者往往有之且以每驛額馬不過五十匹夫不過一百名每馬日支稻穀不過五倉升草一束每夫日支米不過一倉升銀一分五釐當此滇黔孔道往來差使如織司驛者徒被叅處究竟無補實用此黔省道路之艱險非臣敢臆説即當日領兵闢黔之諸大臣與夫近日往來之欽差皆身履其地而目擊其苦者也蓋前此之所以勉力支撑者當軍興旁午之時不暇計及於民夫馬雖有官應之名其實協幇於闔省之里甲以致天末民苖耕不能耕織不能織苦累難堪流離日甚但屢奉嚴綸不許私派百姓於康熙八年七月内臣與督臣再四籌酌将百姓協幇驛站者痛加革除止責令司驛各官極力應當今已年餘百姓雖稍有起色田土漸墾獨驛站去其幇貼實萬難支持兼之黔省今歲馬匹瘟疫更甚倒斃益多臣見在另疏具題今除各站坡嶺雖險而道路稍近者不敢妄請外如貴陽之東至湖廣則有興隆以至清平驛實有九十餘里除無名坡嶺不計外中有鬼門闗坡黄猴坡小觀音坡大觀音坡落蹬坡皆崇山峻嶺中隔一重安江應於重安江設一腰站清平以至平越驛實有八十餘里除無名坡嶺不計外中有蠟梅坡三十三坎坡楊老坡羊塲坡三郎坡葛橋坡皆艱險異常應於楊老坡設腰站平越以至新添驛實有一百餘里除無名坡嶺不計外中有五聖闗坡倒馬坡虎塲營坡酉陽坡黄絲坡猓玀坡打杵坡望城坡皆石如狼牙人足馬蹄無有不傷者應於黄絲設一腰站再如貴陽之西至雲南者如查城驛以至安南驛實有一百餘里除無名坡嶺不計外中有梅子坡黄土坡北極觀坡盤江河盤江坡保甸坡哈馬坡高則一望無際深則萬丈有餘應於盤江設一腰站安南以至新興站實有九十餘里除無名坡嶺不計外中有馬跑泉鳥鳴坡腊茄坡江西坡泥納坡陡如立壁行似穿雲應於江西坡設一腰站新興以至普安驛實有八十餘里除無名坡嶺不計外中有望城坡羅漢坡爛橋坡鸚哥嘴坡軟橋坡舊普安坡𤣥壇坡倒馬坡皆懸崖深澗盤旋崎嶇應於軟橋坡設一腰站以上六站路逺山高馬力愈竭而鞭策愈疾以至壯者傷疾者斃司驛者痛哭無術報倒者幾無虚日若不亟為調劑必致整頓無期故臣敢以冒昧請設腰站每站照例設馬五十匹馬夫二十五名其六站驛丞倘另議設官不無添官之費查興隆衞見有經歴一員可以移至重安腰站喂馬支應而督理銷算仍責成興隆衞守備平越衞見有經歴一員可以移至楊老坡腰站喂馬支應而督理銷算仍責成平越衞守備平越府見有經歴一員可以移至黄絲腰站喂馬支應而督理銷算仍責成平越府知府永寧州見有吏目一員可以移至盤江腰站喂馬支應而督理銷算仍責成永寧知州安南衞見有千總一員可以移至江西坡腰站喂馬支應而督理銷算仍責成安南衞守備普安州見有吏目一員可以移至軟橋腰站喂馬支應而督理銷算仍責成普安知州至於買馬銀兩查有康熙八年奏銷驛站節年存剰銀一萬五千餘兩應将此項銀兩動支買馬三百匹六站均分喂馬料穀馬夫食米應於貴州官庄租穀秋糧内通融支給統候年終奏銷惟是設站之後馬有倒斃例應添補及應用鞍屉脚趾藥餌棚厰䥷槽以及馬夫工食等銀每年約該一萬一千九十餘兩黔省實無别項可動勢必於他省餘剰驛站銀内照數撥黔恊濟庶遐荒民苖之殘苦得以稍蘇而𦂳急軍機均有攸賴矣臣非不知錢糧匱乏之際偏僻驛站尚在議減議裁猶敢添設糜費但臣身任地方之責目擊其艱不得不痛陳於我皇上之前也題禁協夫疏甘文焜為恭陳協夫為黔民之大害特請天語嚴飭永禁事竊臣於康熙八年五月二十八日抵黔任事沿途村落凋零民苗困憊目擊實所不忍初尚未解其故及履任博採輿情細察民隱始知病在兵燹之後協夫繼之也查開黔之初順治十六年設驛馬匹官養官當每驛設馬夫二十五名每名月支工食銀六錢米三斗因僱覔乏人前撫暫令隣近漢土百姓代應養馬彼時大兵雲集餉鞘繁多經畧臣洪承疇題請給價僱夫擡運緣民人稀少前任撫臣趙廷臣議於相聨僻壤州縣每站派幇夫數十名原期不悮餉鞘不過一時以軍機為重權宜之意既經題准自康熙元年為始每站設長夫一百名每名月支工食銀四錢五分米三斗應差所有派幇之夫自應免派不意各官僱募不力仍照前派幇濫用相沿年乆竟為成例以致民苗不得耕種躱逃廢業米價騰貴村落荒殘民窮不堪臣訪得實㑹同撫臣佟鳯彩已於康熙八年七月二十日痛革轉飭各驛站一遵定例募僱長夫遞運餉鞘其濫索等弊概行釐革從此民苖始得休息力事耕耘田地漸闢本年米價減至一錢二三分一斗較臣抵任時每斗二錢五六分已賤一倍各處荒村漸次構茅結屋已有起色明騐誠恐将來不肖官弁巧生機變漸萌釁端協夫復舉則黔民復受其害伏乞天語嚴飭方可永除沿習積弊民生幸甚庶無負皇上加惠元元之意也請預撥黔省協餉疏慕天顔為黔餉支給愆期請恩通融撥濟以恤邉兵事竊照營制兵馬餉乾銀兩按月給發以資飽騰此定例也士不宿飽而期其戮力用命惡可得哉是以壓欠兵餉定有處分嚴例況在邉方尤當加意恤養士卒庶幾緩急可恃臣一涖貴州即稽查各營兵餉往年從未有逐月給散者必俟季終方行彚發而春秋兩季又必俟夏冬始有應濟蓋因黔省司庫原無積儲必待别省協餉解到隨收隨放查協餉定例四月完半九月完半彼省遵限於四九月終起解則到黔之日雖隣近如楚省亦在六月十一月矣若程途稍逺則又逾限一兩月邊地窮兵嗷嗷待哺即不能望於月初預給月餉資養家口乃役過一月仍不得額無不典鬻衣裝多方揭借及至半年領餉到手償利贖當焉能敷用且有汛守荒瘠苖蠻之處典貸無門豈能免人枵馬痩報斃報逃乎臣展轉籌畫欲責之司餉之官奈黔省本地應徵條丁銀兩僅供歲額俸工驛站别無存剰餘帑可以設措臣叨任封疆不得不請乞我皇上天恩通計黔省歲需兵餉不過五十萬兩一季該銀十二萬有奇若將每年春季餉銀預撥於上年之秋冬協解於隣省限定歲終到黔則正二三月可以按月支放從此夏季之餉即可候四月完半之協餉接濟源源相繼自無庚癸之呼此預撥一季餉銀原屬經制額内應給之數不過早撥於數月前況止行先撥一次嗣後仍照歲額撥解更不必逐年瑣陳也恭祈我皇上俯鑒遐荒實無轉移之粟窮卒守候協餉苦累難堪特賜矜允准於康熙二十五年為始将二十六年春季餉乾一併撥解俟二十六年造報經制餉冊即以夏季為首連接次年春季請撥著為黔餉定例仍責成司餉官每至月終如數給足不得逾期並嚴查尅減之弊則營兵頂戴天恩効命於邊防必加鼓奮而散餉給領亦可按季達部通融於一歲額内之需而永免三軍脱巾之慮矣題覆鹽價疏慕天顔為酌定鹽法事該臣看得黔省普安等處先經行令改食滇鹽准雲南撫臣王繼文咨議每百觔定價四兩六錢臣經據疏請部覆價值太昂恐致累民行臣㑹同川撫查明川鹽時價具題再議遵行貴州布政司並咨四川撫臣先准雲南撫臣王繼文咨稱滇省黑井課重在井鹽滷每觔已辦納課銀一分六釐加以煎􅘮駝運工本腳費前定每百觔賣價四兩六錢委無浮冒今再減銀三錢止定四兩三錢以遵部駁等因准川撫臣姚締虞咨覆川省􅘮造之鹽本地市價每觔止值銀一分五釐若運販至黔需用挑負腳價應值若干當聽在黔酌議等因據貴州布政使柯鼎轉行普安安南各州縣衞查訪市價則稱近日川鹽每觔止賣三分及三分四釐以至四分不等消長不一原係因地隨時從不定價若滇鹽定價四兩三錢恐窮荒苗民不能舍賤食貴莫若仍食川鹽以從民便詳請前來臣查川鹽價值産土工本甚賤故運販至黔每觔止賣三四分不等商民均稱便益若滇鹽之價産土工本已貴前議每百觔四兩六錢乃将工本腳價逐項確核所定原無浮冒今即勉遵核減定以四兩三錢亦與川價較浮仍難强民舍賤食貴若欲将滇鹽倣照川值減價賤售則又虧損商本兩者均為未便察詢往例普安等處原食川鹽其改行滇鹽乃從滇商之請雖有便於滇課然将來川課有虧此盈彼縮仍無補於公家況普安一帶皆荒瘠苗蠻食鹽為民間日用必需豈堪重價抑勒誠如部覆價值太昻必致累民也臣再四思維莫若悉遵舊制仍食川鹽不必定價聽從商民隨便貿易於以軫恤荒殘利賴非淺矣改設州縣疏范承勲為查議冗員以培民力事該臣看得滇黔衞所併歸臣仰體皇上愛民至意悉心籌畫從議汰冗員甦息軍民起見到任後即檄行二省藩臬㑹同妥議通詳除滇省各衞所已經臣議裁具題在案據貴州布政使柯鼎㑹同按察使李之粹公詳復批令再加確議兹據詳稱查黔省衞所康熙十一年間已将清平等五衞改縣安莊衞改州現今尚存十五衞十所其間有專城者有與府州同城者有與州縣犬牙相錯者軍丁耕田納糧與民無異所當分析裁併改設如偏橋衞在鎮逺一府兩縣之間查施秉縣民糧稀少應将偏橋衞裁併施秉縣仍屬鎮逺府管轄裁去守備一員至施秉縣原未設學裁去衞教授一員改設縣訓導一員舊衞地方應設偏橋驛驛丞一員管理驛務興隆衞地錯黄平應将興隆衞裁併黄平州移州於衞治管理驛站仍屬平越府管轄裁去守備一員經歴一員其原設興偏營改為黄施營營制照舊至黄平州學原兼餘慶甕安二縣學今州治既移興隆裁去教授一員以州學正移駐衞治於甕安縣另設訓導一員兼攝餘慶縣學務新添衞附近貴定縣田賦無多應将新添衞裁併貴定縣移縣於衞治管理驛站仍屬貴陽府管轄裁去守備千總經歴各一員查貴定縣原與龍里縣合學今裁去衞教授一員改設縣訓導一員貴州貴前二衞同附㑹城應裁改為一縣恐兩縣地方差徭不均将附近新貴縣量行割附應名貴筑縣亦屬貴陽府管轄至兩衞原未設學應無庸議裁去守備千總各二員經歴一員改設知縣典史各一員此貴東各衞之當裁併改設者也如鎮西威清二衞壤地相接應共設一縣而以赫聲威武二所附之縣治駐於威清管理驛站應名為清鎮縣裁去守備千總經歴守禦所千總各二員改設知縣典史各一員查鎮西衞原附安順府學今二衞改設一縣裁去威清衞教授一員改設縣訓導一員平壩衞路當孔道管理驛站應改設一縣即名安平縣以附近之柔逺所附之裁去守備千總經歴守禦所千總各一員改設知縣典史各一員裁去教授一員改設訓導一員安南衞亦在大道管理驛站應改為一縣即名安南縣裁去守備千總各一員改設知縣典史各一員裁去教授一員改設訓導一員其附近普定縣之定南所裁併普定縣附近南籠㕔之安籠所裁併南籠㕔管轄裁去守禦所千總二員至普安州同城之普安衞應裁併歸州裁去守備千總經歴各一員仍俱屬安順府管轄但普安設有兩站州官僅可管理在城驛務吏目又有佐理巡捕之責其亦資孔一驛應設驛丞一員管理此貴西衞所之當裁併改設者也又㑹城西北之敷勇衞應改設一縣而以修文濯靈息烽於襄四所附之即名修文縣仍駐衞治亦屬貴陽府管轄裁去守備經歴各一員守禦所千總四員改設知縣典史各一員裁去衞教授一員改設訓導一員又永寧衞係川黔襟喉要地應改為一縣而以普市所附之即名永寧縣裁去守備經歴守禦所千總各一員改設知縣典史各一員裁去教授一員改設訓導一員畢節衞無州縣可歸亦應改為一縣而以赤水衞附之即名畢節縣裁去守備二員經歴二員千總一員改設知縣典史各一員裁去教授二員改設訓導一員二縣俱屬大定府管轄至威寧府同城之烏撒衞應裁衞歸府裁去守備千總各一員及衞教授一員併歸府教授此西北衞所之當裁併改設者也再查衞所既裁都司一官無所事事亦應裁去武闈事務即令藩司料理操捕都司一官亦應裁去製辦火藥應照他省例責令城守營管理其都司經歴并應裁去以上共應裁去都司一員操捕都司一員都司經歴一員衞守備一十五員衞千總一十員守禦所千總一十員衞經歴一十一員衞教授一十一員俱各咨部改補共應改設知縣七員典史七員訓導七員驛丞二員應請内部照缺銓補再查各府有稱軍民者今既概編為民則軍民字樣亦應裁去等因前來臣復加籌酌似宜裁併改設以昭畫一以垂經久通計議裁各官共六十員議設官共二十三員稍減經費以紓物力或亦省官省事之一助也至有各衞所田土人民跨入他境應查坐落附近州縣酌量歸併及新設之縣幅􅊷太廣應查近隣州縣糧額多寡酌量割附容臣行令該司逐一查明分晰另冊報部外臣謹㑹題請建學疏田雯為聖治普洽寰區敬請修舉學制以隆文教事竊惟全黔邊徼遐陬民苗雜居禮讓未興剽悍成習我皇上道隆德盛典學崇儒文明光被而芹藻之子均沾教化秀頑之民咸沐恩澤固已彬彬稱盛矣臣忝任撫黔以敦崇學校為先蓋學校之闗係乃風俗人心之根本禮明樂備者猶将踵事増華簡畧因循者曷可不乗時興舉按永寧獨山麻哈三州貴筑普定平越都匀鎮逺安化龍泉銅仁永從九縣尚俱未設學校據該士子紛紛呈禀荒寒之士勵志芸窗登進無自臣偕司道諸臣等議建學育才似不可緩凡一切庀材鳩工未敢仰需公帑而題額芹堂御書首重前奉頒賜尚餘八幅理合籲懇睿慈一視同仁勅部再頒四幅以便製匾恭懸至於額進童生查貴筑為省㑹附郭之縣謹擬照大學考取十五名餘則概照小學考取八名武生貢廩一循定例而行董率職官貴筑應請部選訓導一員餘俱暫以附近教職兼攝俟人文寖廣另議專官又按新添鎮西興隆烏撒赤水五學近因裁衞歸併貴定清鎮黄平威寧畢節五學矣夫合兩地之人才限一庠之定額為數較窄生童進取未免滯淹以故連名訴陳迄無止息臣思五衞舊學御匾輝先師之所式憑諸生之所景附何可輕言汰併自應照舊存留即以貴定等五學教官董率之此確有直隸延慶懷來之近例可援凡此者或留舊學於既裁或議新庠於初創臣非敢過凟宸聰實以黔省窮荒固陋必崇文治而後可以正人心變風俗非如他省化行俗美者比合應仰籲聖化之隆仁義漸摩馴致士風之厚彼蠢爾有苗當無俟七旬而咸格矣再照平溪清浪二衞學歴係黔屬思州府提調應試貴陽不過五百餘里前因用兵之際将驛站改隸楚南而學校隨之諸生應試東下武昌迢遞川塗不下二千五六百里資斧既艱而鼓枻洞庭駭浪驚濤士心恒多畏阻臣赴任時身過其地同聲呼籲云兩科以來從無一士能赴武昌應試者情殊可憫應請復還黔屬就近提調之制以示作養緣統係學制事情用敢類列陳情題貴州㑹試分卷事例疏王承祜為禮闈中卷久偏逺省向隅堪憫仰乞勅部酌議均平以鼓逺人以廣皇恩事竊惟國家取士三年大比於鄉既又合直省十五國人文㑹試於禮闈蓋以人才之生何地蔑有而捜羅所至必使無逺弗及是以人人鼓舞争自濯磨莫不思奮於堯天舜日之世也乃臣昨監試禮闈事竣公同拆卷及唱名填榜而廣西雲南貴州三省竟無一人獲售臣不勝駭異夫此三省之中豈盡乏才考諸往志間有名臣即我朝開科以來亦多與選則非無才可知而每一榜發中式寥寥所以不及他省者實因中卷之偏枯與道途遥逺之所致臣黔人也備悉艱苦謹一一為我皇上陳之查前明取士初以五方風氣不同人才長短各異而分南北又以數省僻處遐陬聲教不易遍暨而分中卷亦體恤逺人之意也苐可異者中卷既為逺省而設則四川廣西雲南貴州誠為逺矣何獨於江南之安廬鳯滁和徐等州郡而亦為逺乎蘇松常鎮等府州縣既皆入南卷矣何獨於安廬等州郡而又入中卷乎推前明初意不過為洪武發祥鳯陽思於士子加厚故俾入中卷易於入彀亦漢高優豐沛光武復南陽之遺意耳相傳日久遂沿為例是南卷之中兩倍於北而中卷之數又半讓於南此亦人情之不得其平者矣且滇黔粤蜀逺居天末近者數千里逺者将萬里每遇公車之年貧窮居多艱於資斧區畫借貸不遺餘力此在家起行之難也及其在途馳騁驛路跋渉間闗經歴三月辛苦備嘗此道路之難也及其抵京隻身孤影僕從無人一切薪水俱行自給此旅寓之難也更苦拮据奔赴喘息靡寧席不暇煖而塲期已及尚焉能温習揣摩如各近省士子優游暇逸止專一意讀書哉且舊例中卷取中十六名後因合南北中卷較卷幾卷而取一名是以此科止中八名八名之中又苦分經詩取三卷易書各二卷春秋禮記各一卷額數一足雖美弗收夫勞逸之情形既甚懸絶而多寡之數又甚不侔無怪乎他省之取青紫易如拾芥而此數省之望科名難若登天也臣思聲教四訖雖海澨山陬尚思望恩於選造而此數省竟不能奮歩於雲衢揆之一視同仁之宸𠂻諒有惻然不忍者也臣請勅部酌議大沛新恩将安廬滁和等州郡應入南卷者仍歸南卷其中卷或額定四川幾名粤西幾名雲南貴州幾名不與南北一同較卷數目不必分經就文取錄如此則額數不致偏枯士子不獨向隅逺人咸慶登進之有階而遐方共沐皇仁於無既矣官莊悉歸有司疏閻興邦為恭報官莊悉歸有司事該臣看得貴州提督衙門舉出官莊一案經原任撫臣衞既齊将田地人丁造冊題報嗣准部駁令再嚴行查明及将隱匿官員一並查叅等因遵即檄行嚴查臣於二月抵任催據布政使董安國呈詳前來復嚴批查明増報並取隱匿各官職名去後今據該司詳稱前項官莊田地人丁向因叛逆李本深占踞為莊收租牧馬相沿至今其間有與民均分籽粒者有給牛種而全收其租者亦有十分收其六七者悉屬苛歛之項並非按畝照則陞科維正之供故料穀有一千三百餘石小民剥膚以應苦累已久今既歸有司文明自應照各府州縣則例起科所以不符原額之數各屬業經兩次清查丈編實止成熟田一千五百二十畝零人丁三十四丁共該起徵米二百八十一石零銀四十六兩六錢零並無隱匿今遵嚴駁於無可如何之中勉議将所文成熟之田照提臣所報料穀折米另立科則起徵以符原數豁除隨糧起徵條馬歲用銀兩等因臣查故提臣陳奇舉出安順等處官莊田地所收料穀原非按畝照例徵輸今若不符原數無田可増勢必如該司所議另立科則起徵竊恐田少糧多民苗俯仰不給仍行苦累有負皇上懷柔德意仰懇皇仁垂憐邊末地瘠民貧允照前次丈編田丁按畝按則一例徵輸庶無輕重異同苗民俱免向隅之泣咸戴輕徭薄賦之恩於無涯矣併縣專治仍添通判疏閻興邦為省城壤地褊小詳請併縣專治仍添設府判一員以資委任事該臣看得各省㑹城多有兩縣並設者蓋因地方遼廓事務殷繁必得分治而後克濟非徒取其備官已也然臣承乏河南省㑹附郭止有祥符一縣即今隣省雲南亦止昆明一縣附郭維黔省蕞爾㑹城度其規模不敵腹省一大州縣乃獨設有附郭新貴貴筑兩縣雖徵收地丁承辦驛站似亦各有職掌並行而不相礙然此外如編甲捕盜通行案緝等件奉文轉發不得不兩縣互行往往朝奉新編夕承筑緝一事而受兩番之約束恒多未便於民若在地廣人稠之㑹控制難周利於左右分任如此彈丸山城寥寥烟户不但平居備員無益一遇地方公務每以勢逼權分此推彼委反滋貽誤臣愚以為存並設之虚名不若收專屬之實效也合無裁去新貴縣歸併貴筑縣治舉凢民苗之訟牒賦役之審編夫馬之派撥盜賊之詰捕統歸一縣管轄該縣既得專心志以循其官守小民亦得安任使而樂其均平政體人情俱為妥便其新貴縣學亦應改為貴筑縣學補廪出貢悉照縣定例行其文武童生仍照兩縣舊額併案考取則雖裁併縣分而於學校無異仍舊貫矣至於通省十一府止有同知通判三員其同知一員在省尚承審捕緝而無暇其安籠通判一員專轄十八寨之田賦苗猓不可少離止有威寧通判一員逺在威寧查同知通判之員居恒無事視若閒員遇有州縣員缺便為委署兼攝所必需況黔處萬山之中羊腸鳥道名為一站險實千盤各屬程途相隔計二三日四五日不等一遇缺官附近州縣設在衝衢者既難舍己而耘人其偏僻之區窮谷深箐苗蠻出沒刻難乏員又豈能長駕逺馭遥制鞭腹莫及之處合無於貴陽首府仍設通判一員遇有差使委任可以朝遣夕行無論衝僻州縣缺出皆堪委令署理該員原無專司之責一經委署則該地方糧驛等務自可悉心料理而無分身兼顧之虞實於吏治有裨夫裁縣而添設通判其縣之衙署通判可駐不煩改作其俸工等項亦有新貴縣令典史二員裁費相當無庸増設抑臣更有請者兩司首領佐貳等員停其署理州縣印務自應恪遵定例何敢異議但陞遷職官交代例有嚴限不便稽遲奈黔省逺在天末銓補之員類多相距數千里外領憑之後縱令遵限星馳保無江河阻滯疾病侵凌急切不能速到礙難懸待除異途出身者遵例停委外其各項首領佐貳等員内有旗員並正途出身者循分稱職原應陞授正印似於委署無礙若果才守頗優醇謹自愛可否破格委署以全公務敢因一得之愚合諸司道偕議請裁請設而併及之我皇上嘉惠遐方善政備舉臣於恪遵成憲之中謬抒所見臣謹㑹題請廣中額疏閻興邦為同文之教澤已久遐方之人才漸盛懇請題増鄉試中額以振文運以廣文治事該臣看得黔南邊地曩昔人文原自寥寥邇來我皇上右文之化普洽寰區微臣仰體聖德加意作人家弦户誦實與往昔不同但黔粤兩省俱稱邊服禮闈既同中右而鄉試中額多寡有差是以紳衿潘驤等有懇祈具題與廣西鄉試中試三十名之請但科舉増額事闗大典臣批布政司移㑹提學道查議今據布政使丹達禮提學道僉事林麟焻詳稱黔南雖屬遐荒迄今人文繁盛甲戌㑹試廣西止中一名貴州中至三名以此較之貴州人文盛於廣西可知似應照廣西之例増額取中詳請具題前來臣伏念全黔邊徼儒士彬彬詩書陶淑莫非聖化之隆増額掄才必收得人之效甲戌禮闈三名得第足徵菁莪化洽黔疆俊彦卓冠西粤似可仰邀聖恩一視同仁俯照廣西解額取中三十名将仕進之途既寛誦讀之士愈奮邊地文風日益振興矣請表精忠以隆祀典疏閻興邦為請表精忠以光禋祀以昭國典事該臣看得舍生取義臣節克勵乎艱危殺身成仁公論共彰乎激烈原任總督臣甘文焜者㵲溪江上父子北靣以全忠原任将軍臣王之鼎者永寧城下孤軍穴陷而完節慷慨一時流芳百世屢沐聖主加銜錫諡之恩至啟輿情建祠致祭之請茲據黔屬紳士人等請照閩省督臣范承謨等之事例於殉難之地聿新廟貌永垂爼豆昭示旂常等情籲懇前來臣批司道議覆衆論僉同如出一口所當援例題請建祠致祭以彰我皇上褒顯忠貞之盛典以慰幽魂於奕世者也預撥貴州兵餉疏王繼文為仰懇皇仁俯念荒疆窮兵再賜預撥并准季首掛餉俾得按時接濟事竊照黔省山高土瘠夷多漢少比他省為最苦各營兵丁晝夜防禦保固地方專盼月餉按時散給庶堪餬口因撥解餉銀到黔惟春季預撥銀十萬兩可以季首闗支夏季之餉他省於四月半完之後始解遲至六月終方到秋冬二季之餉他省於九月全完之後始解遲至十二月終方到迨布政司移令委員赴省領支未免又需時日各兵俱屬赤貧且衆兵名下尚有家口既無可耕之田又無可營之業望餉不到枵腹難支勢不得不重利揭債及至領餉盡還他人禁之則兵無所藉不禁則法實難貸欲遏其流必清其源此預撥夏季兵餉之請撫臣閻興邦所以兩疏入告而臣受事之後亦經題請部議均未覆准臣深悉情形不敢即為緘黙上負皇上愛恤士卒之至意也即如上年地丁錢糧叨䝉聖恩蠲免秋收尚未成災而黔地産米有限一時米價騰貴兵丁便稱艱食臣嚴禁遏糴查挐積囤并示有米之家乗時發糶兼飭兵丁不許邀商攔買米價方漸平復兵丁不致困苦總緣黔省在在深山舟車所不能到設餉銀愆期各兵若不重利求借則債主難覔較諸他省民間有無尚可相通者實屬懸殊在部議因他省協餉係本年地丁銀内解送而四川雲南亦止預撥一季故未議准耳苐撥給協餉原屬大省在彼省藩庫有銀可動而貴州省分尤小又與四川雲南不同臣節制兩省不将雲南夏季兵餉預期邀撥獨将貴州夏季兵餉再疏題請實有見於貴州兵丁更苦不敢不為籲陳也相應仰體皇恩恭疏題請得䝉将貴州餉銀添撥十萬兩預於頭年冬月解黔凑放春夏二季之餉俟他省四月完半餉銀解黔凑放秋冬二季之餉四季皆得照依秦省之例季首闗支則國帑原無少損軍糈實有裨益士卒頂頌無極邊方不無小補矣普安等處仍食川鹽疏王繼文為黔黎食貴難堪三省攤賠無著籲恩減免以甦積困事竊照黔省普安等處改食川鹽滇省作何酌議一案前准部咨隨行布政司驛鹽道㑹議詳報去後兹催據該司道詳稱黔省既以改食川鹽為定論在滇省何能强之仍食滇鹽且即将滇省課税嚴加核減以滇鹽較諸川鹽到黔所賣三兩殊屬懸殊喜賤惡貴係一定之民情應請准照黔省之議題達惟是滇省額徵課銀五千七百六十兩税銀二百二十五兩請於全書内豁除等因詳請具題前來相應據詳咨覆准此又據雲南布政使于三賢驛鹽道副使于嗣昌㑹詳亦同前由到臣該臣㑹看得黔省普安等處改食滇鹽課重税繁民苖困苦經前任督臣范承勲題請減免部議不准奉旨這事情著将舊欠銀一萬九千餘兩免令賠補其普安等處應作何行鹽四川雲南貴州總督巡撫㑹同議奏欽此仰見我皇上如天之仁如日之明不特為邊末窮黎計一時之生全直欲享萬年之樂利漢夷商竈莫不頂頌皇恩歡呼踴躍誠亘古所未有者也臣接准部咨當咨三省督撫并行雲貴司道從長妥議去後隨准雲南撫臣咨據司道㑹詳行據該商張貴等稱係普安等處崇山峻嶺夷民零星散處窮苦難買年壓一年作何底止且天下課税莫重於此計每鹽百觔滇課一兩六錢税銀六分二釐五毫曲靖府税銀一釐四毫薪銀九錢脚價銀一兩七錢八分即使賣銀四兩三錢尚屬不敷再加黔税銀三錢更無從出滇商苦於逺運黔民苦於價貴移請酌免又准貴州撫臣咨據司道㑹詳行據士民陸璡等稱係普安等處四面環苗每年耕作除納正供之外所餘穀米不足以活家口川鹽不拘觔數零星可買而滇鹽必須整塊川鹽不拘米布皆可易換而滇鹽必須紋銀川鹽價賤每觔不及三分而滇鹽價重溢於四分三釐之外難受派銷之苦今幸皇恩再生有機議令仍食川鹽川省照依舊例歲増水引七十二張増課銀二百四十五兩一錢黔省照部頒全書所開歲徵鹽税銀八十四兩二錢五分零遇閏加銀七兩二分零滇省既不行鹽則額徵課税照數請豁又准四川督撫咨據司道㑹詳事闗三省若欲軫念黔黎必致有虧滇課此豐彼嗇勢難兩全權其損益惟在雲貴督撫如仍食滇鹽是與川省無預如改食川鹽惟有恪遵川例庶於黔民有濟移請定議具題各等因移臣臣思改食川鹽課税實有所虧以量減滇額仍食滇鹽移行雲貴兩省再加確議覆准貴州撫臣咨稱普安等處蕞爾殘區䝉皇上薄賦軫恤合計額編地丁銀止有三千一百餘兩今行鹽售價即月減萬觔每歲尚須課税薪脚等項銀一萬餘兩是較正供竟浮兩倍有餘窮黎萬萬不能取盈此額況自改食滇鹽以來歲増滇課何曽完解在滇在川贏絀雖殊而在國家必不惜此無徵虗額坐貽邊黎永累仍應改食川鹽豁除滇課以順輿情又准雲南撫臣咨稱司道㑹詳即将滇省課税嚴加核減較諸川省所買甚屬懸殊應照黔省之議将滇省額徵課税銀兩請於全書豁除等因咨覆前來臣查滇鹽課税較諸川鹽課税相去二十餘倍黔省普安等處逺在萬山之中民苗野處日給艱難以黒井最貴之鹽行於該處最窮之地不特民苗告苦即商竈亦受賠累此等情形久在皇上睿照之中故令食川鹽即交相稱慶令食滇鹽即環庭泣訴一聞奉㫖㑹議咸稱千載一時是改食川鹽之議臣等衆論僉同矣但使民勢必虧課川省久有課額該省惟循成案且同食一鹽似難二視滇省既不行鹽課税無從徵收臣等反覆酌議若仍食滇鹽則於輿情有拂即或量減滇額而合計課税薪脚銀尚浮普安等處地丁正供數倍皇上蠲賦輕徭節年以來不下銀錢萬萬何敢不仰體愛民至意以甦邊黎積困相應凜遵恩旨議将普安等處改食川鹽川省照依課例歲増課銀二百四十五兩一錢零黔省照依部頒全書所載歲増税銀八十四兩零遇閏加増銀七兩二分零滇省無著鹽課税照數豁免倘䝉俯順民情出自皇上浩蕩洪仁非臣等所敢妄邀者也請添設學校以𢎞教化疏王燕為添設學校以𢎞教化以廣皇仁事該臣看得振興文教樂育人材乃致治之盛事我皇上親幸闕里鼎新聖殿重道崇儒諸鉅典度越百王光昭千古所以薄海内外一道同風無不沐浴咏歌於聲名文物之内黔雖僻處邊陲甄陶既久亦已斐然可觀又䝉増廣鄉試中式之額益加鼔舞惟因開闢初年人文寥落學校之制尚缺而未全各州縣衞有未設學宮者有有學無官而附試他庠者無學宮則不獲觀爼豆聲容之盛而陶淑無由附試他庠則不免跋渉險阻之勞而單寒致沮臣愚以為大化翔洽之時不可不具備其制也況今國家武功赫濯文教誕敷無逺弗届黔地民苖雜處加以鼓舞作興則士氣既奮而蠻夷亦得觀感於絃誦詩書以柔其獷悍之心誠漸被遐荒之要道也臣涖任後據舉貢生員周文侯等具呈請将未設學之州縣衞及有學無官而附試他庠者援例題請添設經臣行據署布政司貴東道叅議羅暹提學道僉事卜景超㑹詳覆請援滇省和曲祿勸等州縣建學設官之例添設等因前來臣覆加查核應将附學之清浪衞設教授一員又附學之開州廣順州并未設學之永寧獨山麻哈三州各設學正一員又附學之普安餘慶安化三縣并未設學之普定平越都匀鎮逺銅仁龍泉永從七縣各設訓導一員進取文武童生照小學例每學考取八名廪貢循例遵行庶附學之生童免裹糧䟦渉之苦無學之州縣有師儒肄業之地至原未有學宮之州縣則公同捐俸建設其官役俸工照全書額編支給彚冊報銷從此全黔士子愈感恩踴躍争自濯磨仰副聖主儲才之盛典行見人文昭宣風俗日興於仁讓矣勸民開墾荒田疏王燕為勸民開墾荒田力勤稼穡事該臣看得禮教為漸摩之要耕桑乃生聚之源蓋農工樂業自然保惜身家衣食充餘尤易服循仁義我皇上治隆三代道冠百王時頒教稼之文屢下蠲租之詔豐功偉德巍煥難名臣䝉格外天恩拔置撫黔重任朝夕凛惕凡地方政事務思實力舉行以仰副聖主恵民柔逺之盛意臣抵任後查閲糧冊闔省荒田尚有十分之四之多而目擊苗民艱於粒食者亦復不少緣思耕耘為謀食之本隨徧行各屬勸諭民苗開墾荒田以足賦足食兩載以來墾荒者舉報寥寥據貴陽府申稱府屬田畝多有抛荒墾至四五年後縱有收成不償工本而徵糧料則又輕重懸殊故墾荒者少臣即批行布政司㑹同糧驛道通行確查作何勸墾去後兹據布政使孟世泰㑹同糧驛貴東道高恒豫詳稱黔省重巒叠箐田畝均在萬山之中土性寒冷瘠薄不堪秋成籽粒難抵内地膏腴田産三分之一開墾山田人工牛種又倍於他省迨四五年後始有些少收穫不償人工牛種之費六年成熟起科除辦賦外僅足餬本年播種之口從前墾荒工本終無所取償是以賦重之田多懈於開墾除輕則荒田不議外其重則荒田若䝉題請將每畝徵銀一錢一分至銀一錢五分徵米一斗一升至米一斗五升或銀米並徵約算相同者請減徵銀一錢或米一斗徵銀一錢六分至二錢徵米一斗六升至二斗者請減三分之一徵銀二錢徵米二斗以上者請減一半則民苖踴躍開墾矣等因前來臣愚以為此等荒田與其久抛地利不若量減科則勸民開墾伏祈皇上宏恩嗣後貴州荒田開墾准照減則循例六年徵賦厚其羡餘使開荒工費咸足取償将見窮簷婦子聞聖主加惠至仁未有不鼓舞争先備辦牛種肆力開墾者此後不獨荒田漸可成熟而苗民衣食有賴則井里相守安身樂業被之禮教俗臻淳美尤易事耳一通變間而羣黎戴教養之恩邊徼享盈寧之福經國裕民之道實兩得也國家經費浩繁臣何敢輕言減賦但臣今日所請者乃現在荒田無徵之賦如減重就輕似可使無徵之額為有徵之賦且我皇上為貴州一省保衞民苗歲費兵餉撥内地錢糧協濟者幾四十萬兩仰維聖主愛養羣黎至深至厚臣謬膺委任豈容緘黙故敢上體聖心冒昧陳請苗蠻刦擄處分當因地制宜疏王燕為苗蠻刦擄處分當因地制宜仰籲酌定以勵職守以靖盗源事該臣看得文武各官之處分原有一定之章程似無容再為置議前據貴陽等各府㕔㑹詳黔省文武官弁近因兇苗刦擄之案部覆俱照野賊苗蠻擾害之例議處以致革職降調而去任者接踵全黔多係熟苗原與漢民無異嗣後遇有為盗者文武各官請照漢民為盗之常例議處限年緝賊庶盗息民安等情隨批司㑹議通詳去後兹據按察使何顯祖㑹同布政使司貴東貴西二道詳稱應如該府㕔所請議覆前來臣查全黔各府所屬漢少苗多且皆納糧當差與漢民之井里相連室廬錯處抑且日中為市彼此交易實與漢人無殊原非未歸聲教之野苖可比亦與無管之生苗潛入内地行刦者不同今若因其為盗刦掠将該管耑汛兼轄各官即革職降調離任本案賊犯接緝官員未免以非其任内之事不實力緝拏并有不肖官弁一遇苖人為盗慮干降革處分即互相隱諱縱賊不究是例從嚴而盗愈熾矣嗣後除無土官管轄之野苗為盗仍照例議處外其有土官管轄之熟苗為盗刦擄地方文武官請照漢民為盗之常例議處限年緝賊則該管文武知不即罹降革必不敢隱諱以自取重咎亦斷不肯以巳任内之盗犯不實力嚴拏以自干限滿降革将見例從寛而緝捕嚴盗風息而民生安矣請定兵糧本折規則疏于準為邊陲兵糧綦重請定本折規則以杜紛更兵民攸賴事該臣看得黔省徵收本色秋糧原供本省官兵月米惟因各屬徵收糧石有多寡不一而官兵汛防亦有衝僻不同如有州縣徵糧多者而官兵偏少有官兵防汛多者而州縣徵糧又少勢難就地支領不得不裒多益寡酌其附近之地撥給無奈貴州跬步皆山最近者亦相隔一二三站不等既無船隻又無車輛若令官兵赴領則此月米不敷往返盤費之需如令百姓運送則此項脚價又無所從出先經督撫諸臣議将應撥秋糧折徵價值解給官兵自行採買等因荷䝉俞旨欽遵在案然各處米價原有低昻不等如各州縣解給米價較之各鎮營汛地價值稍有不敷每致紛紛具呈請増不休臣不揣愚陋謬議管見請將各鎮營不敷米石竟行撥定州縣徵解永為定例每年於秋收之時行令應撥應領之鎮營州縣各将時值米價逐一訪確詳報檄令藩司糧道折衷畫一定價議詳臣等具疏題明飭令各州縣照依所定價值照數徵解以杜徵多解少之弊庶小民得以遵守輸将而邊方士卒亦永賴以飽騰矣請展徵收以舒民力疏于準為請展徵收以舒民力以廣皇仁事該臣看得貴州地方逺處邊末盡屬崇山峻嶺凡有田地非在高阜岩隙即係溪畔低窪不樹桑麻既無絮布之餘利不通舟楫又乏經營之出息一切正供惟藉耕種輸将較之腹裡地方大相懸殊我皇上軫念邊黎無微不燭俯准前撫臣楊雍建題明地丁銀米定於九月開徵以舒民力等因欽遵在案惟是各官考成仍同直省一例概以歲内全完始准紀叙臣查直省錢糧以二月開徵計至歲終則有十月之久而黔省錢糧以九月開徵計至歲終僅止四月為期甚促誠恐州縣各官考成心切徵比急迫小民勢必賤售新穀依期完納則餘蓄無多必致餬口艱難臣不揣愚昧仰請聖恩将貴州徵收錢糧考成俯准寛限三月自本年九月開徵起至次年三月為止如三月内銀米全完者一體准其紀叙如三月内不能全完者照例處分庶邊末微員咸叨皇恩之浩蕩即遐荒黎赤亦仰沐寛大之福於無窮矣苗民乆入版圖請開上進之途疏于準為苖民久入版圖苗族宜沾聖化請開上進之途以𢎞文教以變苖俗事竊惟貴州地方古號羅施遍處皆苖種類頗繁要皆好鬭嗜殺越先王禮義之教尚强凌衆暴之風粤稽往古沿置不一分隸各省不過覊縻而已迨至明季始設布按二司定為貴州省然亦郡縣少而衛所多武弁不能宣化惟在示威以故迄數百年習俗仍未變化自我聖朝平水西改衞所設立郡縣建置學校聖教覃敷遐荒天末莫不仰沾德化惟獨苖民未沐鈞陶伏念六合蒼生盡屬赤子何分苖漢豈有已入版圖之苗民而忍令棄之化外耶官斯土者視苗如草芥居斯地者擯苖為異類既不鼓舞又無教習即間有一二苗民志切上進又以土人無用流官之例不准考試科舉遂使若輩沉淪黒海罔見天日然教化無不可施之地風俗無不可移之鄉今貴州苗民輸糧貢賦與漢民連井而居彼此交易原非不通聲教之野苖可比臣愚以為應将土司族屬人等并選苗民之俊秀者使之入學肄業一體科舉一體廪貢以觀上國威儀俾其漸摩禮教薰陶性情變化其醜類彰我朝一統車書之盛則此進取之法必須酌定規制令各府州縣置立寛厰公所一處以為義學将土司承襲子弟送學肄業習曉禮義以俟襲替其餘族屬人等并苗民之俊秀子弟願入學者令入義學肄業其教習塾師不必另設即令各府州縣復設訓導躬親教諭俟有文理明通者照依湖廣學臣潘宗洛所題不論土司族屬苖民即由該訓導造冊呈送學臣考試漢民生童不許阻抑卷面不許分别苖漢取進之額亦不必加増惟以衡文為去取一體科舉一例廩貢将見漢民因有苗民之進取益加奮勵苗民以有一體科舉之優渥莫不鼓舞行之既久苗民漸可變而為漢苗俗漸可化而為淳邊末遐荒之地盡變為中原文物之邦矣倘果人文蔚起鄉試歲試再請増額以羅真才至於教職一官原以耑司訓迪今復設訓導既膺義學之任如能教道有方使苗民文理優通克副賓興之選者臣等查明實跡卓薦奨勵倘有怠惰廢弛漫無起發者即行斥革以示勸懲至查土人無用流官之例不知起自何年臣常考貴州通志漢唐元明以土人用為流官者頗不乏人而且循良著蹟忠貞足紀炳炳志乗嫓美中州由此觀之何地無才何才不可用而斤斤以方域限之甚非天地生才之意也況以土人而用為流官身入中原禮義之鄉目擊中原文物之盛觀感興起倡予和汝行見頑亷懦立鄙寛薄敦又豈僅變苖而民者哉臣謂土人不用流官之例似宜更正以昭我皇上立賢無方之大公以𢎞我皇上覆載無私之深仁者也再查貴州土官世系悉皆楚豫秦晉之人時因有功分封襲職世守其地並非本地之土苗也其子孫族屬原係漢人自應仍照漢人之例一體考試舉貢俾圖上進案查康熙三十六年間禮部議覆前撫臣閻興邦題為謹遵詔旨等事一案将黎平府學文武生員吳遇詔等七十一名以為既係土司族屬即係土司不許考試等因臣復何敢再為凟請惟是粤西土官土目弟男子姪撥學與試得領鄉薦土官如有遏禁與試者定有處分現在遵行是貴州與粤西同一土官土目同一弟男子姪在粤西得領鄉薦仕進在貴州獨行擯斥化外不許考試阻其仕進錮其終身實堪憫惻臣生逄盛世恭遇明君不揣冒昧仰請聖恩将貴州各府土官土目弟男子姪及吳遇詔等七十一名文武生員一併准照粤西之例與漢人一體考試科舉庶仕進有階而不致向隅之泣則天末邊氓感戴聖恩於生生世世矣鄉闈廣額疏劉䕃樞為請増闈額以廣聖化以鼓士氣事該臣看得泰階啓運變椎魯為衣冠至德馨香登殊方而禮樂西岐造士三十世之鴻圖肇自周文兩都作人四百年之偉績開於文景惟文運之日昌斯厯服之永固查貴州一省地處極邊數百年來雖立學宮設教職開科取士與中原一體然士風不振求其鴻才博學者實寥寥無幾我皇上御極以來加意作人大興文教至於邊逺省分尤為肫摯近者於廣西四川雲南貴州四省皆額中進士選拔詞林康熙四十五年御書文教遐宣匾額頒發貴州以示鼓勵一時任事諸臣仰承德意設立義學選苗民子弟之俊秀者收之學中令各學訓導專董其事臣任雲南藩司時總督臣貝和諾印造古文淵鑑五十部分送貴州學宮又學臣孫勷於康熙四十九年疏請御書千文榻本日講四書易經書經諸書頒發到黔令各學士子熟加誦讀拔其尤者至陽明書院日有課月有程臣常閲其文義黜浮崇雅逈異昔時聖人作而萬物覩皇極建而風俗同如風之鼓不令而行如雷之震不疾而速洵哉一時之盛事百代之休聲也惟是鄉試額數僅得三十名美不勝收難以勸興多士臣查廣西貴州會試同列中右昨取中四人貴州獨得三名是貴州人文不下於廣西可知今廣西額數較多貴州額數較少臣思今歲辛卯科鄉試正值康熙五十年我皇上誕膺天眷駢集百福視振古以為昭高百王而首出五百年之昌期導揚淑氣千萬􅑤之厯服用迓禎祥正其時也懇祈勅部将貴州鄉試額數與廣西一視同仁則登進之路既廣鼓舞之念愈切邊方人文将與中原争勝矣請開上游驛站疏鄂爾泰為請開路改站以速驛逓以便商民事黔省通滇大路陡窄紆盤舊稱羊腸一線如闗嶺盤江等處尤屬險峻以故車馬難行商賈裹足臣擬由安順府之安莊另開新路直出普安州之亦資孔寛平俾可行車以便來往前經臣奏明續因黔員議論不一臣轉恐巳見未確遂復暫停兹因公赴黔沿途復加查問咸稱新路平坦開修實便臣隨委員細勘詳覆今據布政司鄂彌達㑹同糧驛貴東道楊永斌詳稱查自鎮寧州屬黄菓樹起岔入新路至普安州屬蒿子卡舊路止計程二百四十里零八分内花局阿樂郎岱等處道路寛平修整可以行車雖斗郎箐坡計止里許頗覺陡峻然險窄之處亦屬易開其餘土地打鐵簡古等闗以及石龍那當列當趕塲猪塲等坡本不甚高一經開平可成大道沿途河溝因地制宜各建大小木橋不難濟渉有西林一渡寛有百丈水勢畧𦂳然製造船隻亦便可穩渡查舊路至闗嶺普安州原係八驛道路﨑嶇站頭甚逺内闗嶺盤江江西坡軟橋四驛係驛丞經管其餘四站係永寧普安二州普安安南二縣經管今所改新路自黄菓樹起至蒿子卡止只須安設六驛既平且近每站計不過四十餘里應将原設之永寧普安二州安南普安二縣闗嶺軟橋二驛經費撥入新驛裁去盤江江西坡二驛合計應裁夫馬草料每年可節省銀一千八百八兩二錢零米一百三十二石四斗八升穀一千二百九十六石至官役俸工應仍留撥新驛将闗嶺驛驛丞移駐坡貢盤江驛驛丞移駐那當江西坡驛驛丞移駐楊松軟橋驛驛丞移駐大山凹其普安縣舍基塲議以普安縣典史移駐兼理驛務仍司緝捕至安順府親轄郎岱一驛即以普定縣典史就近兼管仍理府屬郎岱一帶地方緝捕之事均應給以驛丞鈐記以省添設驛官其四驛驛丞亦加以巡檢職銜兼司緝捕均歸各該管地方官專轄再所留之軟橋驛原無站夫今移駐大山凹立為腰站所需站夫應於楊松亦資孔上下兩驛接換又營汛應設一營五汛塘撥二十三處除郎岱一汛仍令安籠原防弁兵安設不議外所有坡貢那當舍基塲楊松大山凹共五站酌議於適中之那當設立一營餘為四汛應需官兵查盤江營原為孔道要隘是以設營兵防守今既改新路盤江毋須官兵兼防應将盤江營官兵移駐新路該營額設守備一員千總一員把總二員兵丁二百八十名即令守備一員千總一員帶兵一百八十名駐劄那當把總一員帶兵五十名分防坡貢汛再令把總一員帶兵五十名分防舍基汛至楊松一汛附近安南營應令該營将原防普安縣之千總一員帶兵五十名移防於此其大山凹一汛附近普安營應令該營撥把總一員帶兵五十名防守以上營汛如此安設於新改驛路始有裨益至於舊路營汛盤江營制既經全移而永寧州汛原係該營撥防此路雖屬僻道州治不可無兵應将安籠原防闗嶺汛弁兵移駐州治即於該汛内量撥兵丁分防闗嶺盤江橋一路再安南營原防晋安縣汛千總一員兵丁八十名除撤防新路之弁兵外尚餘兵三十名令安南營撥外委一名帶領防範如此安設則舊路亦可資巡查又盤江營移駐那當應請改名永安營鑄給闗防總計所需修建道路橋梁船隻以及驛舍衙署營房等項共工料銀一萬一千五百八十七兩零應請於司庫動支正項銀兩即委承勘之原任安順府知府何經文現任清鎮縣知縣張世昌辦料興工俟工竣之日造冊題銷一轉移間繹逓商民均為㨗便除圖冊送部外相應具題請開下游改站疏鄂爾泰為請開路改站以速驛逓以便商民事該臣看得黔省驛站大路素稱﨑嶇難行而下游之黄絲驛至平越府四十里平越至楊老驛四十里此八十里内有武勝闗陡箐營葛鏡橋等處尤屬陡峻查由黄絲以下之虎塲營分路不經平越直達楊老僅五十里並無高坡實為㨗近又查上游題准新改驛路六站内毛口過河抵舍基塲一站較舊路雖平但道里尚逺經臣知會撫臣會檄司道委員確勘議詳去後兹據貴州糧驛道叅議王廷琬㑹詳委據鎮逺府知府劉㑹同平越府縣及駐防營員公同勘明自黄絲以下之虎塲營岔入新路至楊老驛舊路内如擦耳巖魏家洞張正堡湯鍋河清水塘新堡等處俱屬平坦修整可成大道其間雖有田坎濫路培砌即可坦行沿途河溝小澗各建大小石橋不難濟渉查舊路自黄絲驛起由平越至楊老驛共計三驛計程八十里道路﨑嶇今所改新路自黄絲至楊老計程不過五十里既平且近請裁去黄絲一驛将平越一驛夫馬移駐於適中之酉陽塘地方甚為㨗便至驛站既經改移應另設專員管理夫役又非驛丞微員可能呼應仍令平越縣經管驛務並稽查一應解餉解犯等事以專責成又新改驛路一應添設塘汛舖逓查自酉陽塘起至楊老應設一汛三塘除黄絲驛治既經改治酉陽塘應将黄絲一汛一併移駐酉陽塘外仍於黄絲安設一塘新路之楊土坪魏家洞各安一塘每塘各安兵五名各設舖司四名以專逓送公文除黄絲一舖原有舊設舖逓止應添設塘兵巡查外應於楊土坪魏家洞各設舖役四名其舖司銀米照通省舖司例支給所有一應建設驛治衙署營汛塘房等項共需工料銀三千九百三十五兩零應請於司庫正項銀内動支即委原勘估之鎮逺府知府劉會同平越府縣興工修理俟工竣造具細冊詳請題銷又查上游前經題准新改驛路六站以毛口河為適中由坡貢郎岱抵毛口三站每站俱三四十里不等獨過河抵舍基塲一站節經委員查勘較舊路雖平道路尚逺因之舍基塲抵楊松楊松抵大山凹站路亦不甚均向緣毛口一驛安設河坪係人馬住宿之所恐春夏水漲勢難改移請将下游所裁之黄絲腰驛馬匹官役即移駐於毛口河而以毛口河一大驛移駐於適中之列當地方庶道里得以均平人馬免致跋涉至列當既設一正站則去舍基塲僅止二十餘里亦屬太近應将舍基塲一驛改移於普安縣屬之罐子窰既為一站則去楊松又止三十餘里未便重設正站請即以原設大山凹之腰驛改移楊松以楊松大驛移駐於普安州屬之劉官屯地方一轉移間於驛逓商民均有便益相應㑹題撫剿生苖情形疏鄂爾泰為黔省邊境生苖剿撫就緒情形仰祈睿鑒事竊照黔屬兩游苖猓雜處半多兇頑出沒無常殺擄經慣其種類蔓延巢穴險僻非但輿圖所不載並亦省志所未詳為害邊氓從來已久仰賴我皇上仁威遐暨荒甸傾心如上游之貴陽安順南籠諸屬並直抵粤界之生苖㺜狆皆已陸續向化納賦輸誠惟下游之黎平鎮逺都匀凱里等處生苖盤踞於黔楚粤三省接壤之間阻隔道途難通聲教仍然夜郎自大肆意横行地方官從不敢過問若不乗長寨謬冲烏䝉泗城等處苖蠻震怖之後即行相機清理終為邊方之患難謀内地之安但各種生苗攙雜數郡之中延袤二千餘里其間亦有良頑各分强弱宜先擇其最頑梗强悍者首加以擒治就其素良懦柔弱者明示以撫恤則威既足懾其膽而恩可以服其心若必逐節為之亦恐難得其要領而坐失機宜也前經臣将各地情形節次摺奏荷䝉聖鑒指授周詳訓示諄切臣因於雍正六年正月内檄調前任貴州按察使新授巡撫臣張廣泗赴滇細詳商酌籌畫機務令其帶兵前往清理先由都匀之凱里各苖次及鎮逺之九股等夷然後至黎屬之八萬古州收局竣事並行附近各處協營撥發官兵悉聽調度該前司素優才識兼具膽畧據報招撫寨分户口並認納苗糧數目俟造具清册另行送部一應安營設鎮置官添兵諸事宜容與撫提二臣妥商定議另疏請㫖外所有邊境逺近生苖前後剿撫情形合先題報慶雲疏鄂爾泰為慶雲一月七呈黔省千秋一見事雍正七年閏七月初三日據貴州布政使鄂彌逹㑹同按察使趙𢎞本糧驛貴東道副使楊永斌分巡貴西道叅議王廷琬詳稱據思州府知府劉先後詳列本年七月初八日自申前至酉刻初見府城正北方有淡色紅霞舒徐散布少頃光彩射目有青雲數片左右環合隨有深淺紅雲四圍繚繞又見一朶紅雲宛如宮扇直上半天大數十圍鮮華燦爛旁有光如錦練長數丈縹緲旋繞側邊有黄色雲如淡金如雛鵝頃刻黄雲邊又現出紅雲形色儼若珊瑚鮮明艷麗繼而北方中間叠出青色雲約六七重其下皆藍碧色雲又於初九日午時初刻見西北方平鋪淡色黄雲矗起兩峯其一紅間以紫其一碧染以藍如奇石玲瓏莫可名狀至未末復轉成青色又於初十日未時見有黄雲一抹襯托紅雲袤延數里又有鵝黄紗藍石青碧綠四色雲層間叠出光明似鏡如覩天宮參差樓閣至酉刻如紫紗步障籠罩隱約至十七日午時雲從正北方起有米色雲鑲以碧有黄色雲襯以紅光映河水皆成金色既而半天轉為綠玉色上有青白雲數重雲根皆紗藍捧托中天紅紫相間霞彩騰空千態萬狀直至酉初又十八日未時正值北方初見銀色雲數朶漸由東方轉成金色黄雲光彩奪目側邊雲又起深紫色直𥪡儼如梅幹根柢青色雲霞擁繞南方至申末方收又二十二日交申時初又見東北方白雲數十層白雲上現出金紅色旁有水紅雲襯托須臾頂上金紅轉吐大紅色直接西北角東方白雲根邊生出牙色雲一朶藍霞幾道上擁金色淡墨雲數重東北中間又生出粉邊紅雲如蓮華如佛像頂上俱現黄色水影山光皆成金碧又有紅雲如寳幢如旗蓋上有紫氣宛轉迤邐半天轉成大紅西則青色雲夾紫霞南則淡紅雲夾碧霞直至酉末方散一月六現叠秀争奇綵纈繽紛殊形異彩不獨非丹青所能圖畵實有未能以言語形容者一時滿城官弁白叟黄童瞻仰之餘驚喜蹈舞莫不稽首歡呼咸稱從來所未有斯實上瑞奇祥皇上誠格之符騐也據思州府闔屬官員并土民呈報前來理合詳報等情到司竊惟祥開日麗德動天心欽承聖治化成上下和而天文畢現敬仰皇猷建極漢夷格而瑞靄時昭思州山名天應地號武陵參井之喜氣屢迎順成有慶邊陲之夷風丕變開闢方新復旦光華喜溢貴山富水昭囘雲漢歡騰綠野花村父老兒童頌揚者羣歌帝德保佑申錫瞻仰者共識天心從此厯永綿綿介景福於億世祥符奕奕光史冊於萬年矣合據文繕詳轉請題達等情又閏七月十一日據貴州黎平協副将趙文英呈報職奉檄清理古州八萬苗疆於七月二十五日至梅得寨後山單刀嶺上劄營從未至酉忽覩祥雲起於西南光華燦爛五彩繽紛映射旌旗照耀奪目凡在營官弁漢土兵民及歸順苗衆同時觀望無不額手歡騰稱為奇瑞軍前未有畵工未經繪圖等情各到臣伏查黔省兩游雨多晴少隂鬱潮蒸居民行旅俱以得見晴明為瑞今歲自春徂秋霽日甘雨時和年豐黔之臣無不交相慶幸頌聖天子之格被而思州一府與黎平鎮逺接壤地逼楚疆梅得一寨係古州門户忽見五彩慶雲色異形殊呈奇獻瑞一月之内七次嘉徵臣遍查貴州通志從未一經記載比照雲南尤屬僅見恭惟我皇上道協中和功參化育皇極日懋俾遐方盡沐光華帝澤洪施致邊境共昭雲漢有苗既格遍地陽春無歲不豐頻書大有人心悦而承天眷屢貺嘉祥聲教通而現瑞符恒逄吉兆黔省如大漏小漏隂霾散而月朗風清思州與鎮逺黎平烽烟熄而雲舒日耀一月之内數慶呈奇千古以來於今特見繽繽郁郁美矣盛矣咸欽至德之難名霱霱皇皇巍乎煥乎羣仰太平之有象上天重巽以申命是用誕告以彰聖治之光昌微臣賡歌以颺言惟願特書以補皇輿於美備臣等無任踴躍懽忭之至相應會題全定古州苗疆疏鄂爾泰為報明古州苗疆全定都江河道開通備叙情形仰祈睿鑒事竊照黔屬新闢之古州地方遼濶延袤幾三千餘里民苗稠密聚處一千三百餘寨諸葛營既控其中羣苖砦復環其外左有清江北既可達楚城右有都江南亦接連粤境向因頑苗盤踞各寨巢穴棄諸上游之界外據乎三邊之腹心故順則一水可通逆則多方中阻歴代相沿為患已久臣屢經奏請調遣官兵已將諸葛營清水江丹江八寨九股等次第清理業於雍正七年間題報在案但清水江一帶雖已黔楚通行商民稱便而都江一帶則皆阻於生苗寨外險阨如來牛定旦擺調方勝革昭革雄揺擺揺晒滚宗滚塘之類皆以一大寨各領數十百小寨甚為兇頑最稱難制欲使都江開道直達粤西非勒兵深入遍歴各寨亦剿亦撫則其勢必至阻撓清理終難就緒况清江餘孽自剿公鵝後其附近一帶如雞呼黨東庫白索白汗之屬未經懲創恐復跳梁即古州附近之車寨口寨月寨亦因從前軍威未加急圖招撫故仍反覆不常若不乗此大舉籌畫萬全則苖衆效尤将貽後日之患河道現阻更屬切近之憂是以臣調兩省之兵竭二年之力嚴勅将裨毋得茍安迄今夏秋始獲全定此皆聖明之訓誡亦屬官弁之勤勞也除安營添兵事宜另疏請㫖其寨分户口認納苖糧以及收繳器械數目俟分晰造冊送部所有古州苖疆剿撫全定都江河道開通情形相應備叙題報進嘉禾疏張廣泗為皇仁溥洽萬姓豐盈詳請題報大有之年以昭聖治以重民依事據貴州布政使司布政使鄂彌達署貴州按察司事布政使鄂彌達糧驛貴東道副使楊永斌貴西道叅議王廷琬會詳稱竊惟郅隆之世必有嘉祥盛德之朝每多徵應穀為至寳恒因天鑒以呈竒禾乃民天必擇樂郊而吐秀黔省處在遐邊漢夷雜處䝉我皇上軫恤殷懷無逺弗届是以今春雨水及時所有春荍夏麥俱十分豐稔至於蠶豆有粒大如栗豌豆有粒大如榛者尤從來所未有業將情形詳報奏聞在案迨自夏入秋風雨調匀田禾暢茂以及黍粟雜糧等項無不逈勝常年頃值萬寳告成之時本司道等正在徧行詢查間據貴陽安順威寧南籠平越都匀遵義思南石阡鎮逺銅仁思州黎平等十三府定番廣順等十四州貴筑龍里等三十四縣紛紛禀詳前來各以秋成十分豐熟嘉禾瑞穀不可枚舉各據所屬耆老士民人等咸稱黔地山多田少鮮有平疇每届播穀之後若雨水稍多則高阜者得濟而低漥之處未免浸損若晴霽稍久則低下者正賴有秋而高阜山田灌溉不足至於黍粟雜糧等項全藉山土種植而土多沙石最為淺薄惟今歲自春及秋望雨則雨望晴則晴無論高低原隰早稲晚稲皆十分暢茂並髙粱小米稗穀等類皆壯盛異常我等有年老人皆生長農家從來未見抑且未聞是誠聖主在上澤沛萬民我等均霑樂利懽忭無已特将嘉禾瑞穀捧持呈獻並請詳達九重以彰聖瑞等情又陸續准據上下游新闢苗疆駐劄之文武各官移報内稱苖地山高水冷氣候寒暄不時苖人雖耕鑿極勤而限於地力往年收成甚薄乃今歲豐稔異常苗人等莫不驚訝歡喜老㓜男婦相率持香匍赴行營口稱我們苗人刀耕火種極費工力從未有如此豐收亦從來未見有此等禾穀今日甫歸天朝即得享此盈寧之福特採送呈騐等情實為聖德廣被是以慶溢遐陬合就移報並據賫送各種嘉禾到司本司道等逐一檢查彚核之下仰見聖治光昌仁恩逺播大地已霑樂利巖區更際豐登無論漢土苖疆共稱大有合之稻禾黍稷實逾尋常是誠慶集一人歡騰萬姓謹将送到各種嘉禾之尤出格奇異者檢齊萬八千穗具文一併詳賫請祈察核題報大有恭進御覧以昭聖治等情到臣欽惟我皇上仁育萬方恩周八極維懷維保既澤被於羣生丕顯丕承尤業隆於邁古萬幾時凜措萬國於清寧庶績咸熙合庶物而順則於是太和之氣洋溢於兩間因之景福之祥叠著於遐省其誰不恬遊化日欣戴聖朝民事修而誌慶𢎞休萬物育而興歌柔兆是皆本於聖主重農力穡風動時雍之所致也臣等伏查黔省土少平疇田多瘠薄乃今歲五風十雨莫不應時東作西成遂登大有謹按稻穀粟米偶或三岐兩岐三穗兩穗者便稱上瑞今則芃芃翼翼稻穀一莖自兩穗三穗以至四五七穗粟米一莖自兩穗以至九穗他如黍穀稗穀之類皆自四穗以至十五六穗不等又稻穀顆粒往届豐熟之年每穗不過二百餘粒間有三百粒者便為瑞穀今則由四五百粒以上而至七百粒之多其粟米每穗不過長七八寸間有盈尺者便為瑞粟今則由一尺四五寸以上而至二尺有奇甚至稻穀有一本三十穗粟米有一本四十八穗更有一穗之上復生為五岐六岐九岐者不獨遐方所未覩亦屬内地所稀聞非特耳目所未經更為史冊所罕載是以白叟黄童山農石戸交相告語匝地歡呼以為君王本此懷保之殷致我四民獲此盈寧之樂接踵駢肩競美倉箱於遍野焚香叩首齊祝聖壽以無疆總由我皇上之至誠至敬感格天心來下來崇潛孚億兆似此地道呈祥歲逢大有實非尋常佳瑞可得比擬所當恭疏題報請旨宣刋史舘以𢎞昭聖治光垂萬世者也今據該司道等會詳前來所有送到嘉禾萬八千穗敬謹盛貯並繪具全圖委官布政司經歴章令譽領齎恭進外臣謹㑹題伏乞皇上睿鑒施行臣等無任踴躍忻忭之至謹題瑞穀靈芝疏張廣泗為聖德廣運極隆遐省嘉祥叠著萬姓歡呼千秋僅見事雍正七年十月二十三日據布政使司布政使鄂彌逹署按察司事布政使鄂彌達署糧驛貴東道事貴西道叅議王廷琬䕶理貴西道事南籠府知府黄世文㑹詳稱據署普安州事貴陽府同知朱東啓詳稱據州屬老農里長人等禀稱普安四面環山所有田土向來瘠薄今年叨賴皇恩秋成大有嘉禾瑞穀連穗多岐業将情形禀報在案乃不謂收穫之後有遺留在田之稻根於八月内忽又生芽長出青苖小民等猶以為雨水調匀滋發之故不甚留意亦未加人工豈意漸至茂盛揚花結實且非止一處盈阡滿陌再慶豐盈我等老㓜婦子生長農家從來未見未聞不勝驚喜為此捧持呈騐伏乞轉請上達天聽俾知我等邊方人民何幸得享帝澤𢎞敷至於此極等情轉報到司道仰見聖主功隆化育德並生成全黔已著嘉穀之祥普屬復見稻孫之盛非憑人力對白露以吐華惟任土膏際濃霜而結實值斯一陽初復二穀重登實皆地道呈祥總由天心協順之所致也理合㑹同詳請題達並将復長瑞穀賫送到臣又於十月二十五日恭逢萬壽臣率同各官在於萬壽宮齊集坐班適據都匀府知府王鍾珣差人投禀内稱奉委估修新開清水江河道卑府於本月二十三日在雞賈苗寨河口督看復又相度縴路之時見有靈芝生於磐石之上一時苖民工作人等争相觀看齊聲頌揚以為神異卑府隨即連石鑿取耑差呈送查閲等情前來臣當與司道文武大小各官並隨班之耆老紳士兵民人等望闕嵩呼敬謹捧閲送到靈芝係從石内䨇幹挺生長幾盈尺其芝蓋連理和合質地甚堅五色煥彩曷勝額慶欽惟我皇上德合乾坤化隆位育至治極雍熙之盛早已協應乎天心大公惟懷保之殷更又凝承於地道乃黔省遐邊一載以來既慶雲之一月七呈復大有之闔省普告固已羣遊浩蕩之天共戴生成之賜矣今普安州地方於收穫之後所遺稻根内復自發生由苖而秀由秀而實不費耕耘不假人力盈阡滿陌再見豐盈實為從來未有之瑞益兆生生不息之機至於清水江河道本屬天地自然之利向為生苖盤踞阻隔兹仰賴我皇上恩威遐播開通利濟而沿河之雞賈苗寨乃從未經官役人等往來之地頃值開修伊始遂有靈芝獻瑞煥彩非常尤遐省亘古之所罕聞者斯誠地氣黙運轉移化椎結為衣冠之象且齎報到日適遇萬壽聖節華祝嵩呼同時萃集黄童白叟相率興歌從此𢎞開萬年有道之長咸頌一人添籌之慶也臣等欣逢聖世目擊嘉祥惟有凜體天人響應之上諭益深寅畏務勉公忠不啻瞻覲天顔依迴楓陛所有送到稻孫並靈芝現在敬謹盛貯另為捧齎恭進御覧外臣謹㑹同雲貴廣西總督臣鄂爾泰合詞具題伏乞皇上睿鑒施行臣等無任踴躍懽忭之至為此具本謹具奏聞設立苖疆義學疏張廣泗為敬陳學政事宜仰祈睿鑒事該臣看得黔省雖屬遐邊叨蒙聖朝休養德澤於兹百年民物歸醇人文日盛所以内地熟苖觀感興起皆知從師受學出而應試仰荷聖恩特設苗籍取進之例現在每届歲科於各府州縣有苖童者取進生員一二名不等以示奨拔因之此外生苖率皆聞風嚮化稽首歸誠共附版圖咸叨樂利是誠我皇上仁威逺播治化攸隆黙喻潛移有不期然而然也今陞任學臣徐本條奏新附苖生既為良民其子弟亦思上進請照東川湖南之例於苗人就近鄉村設立義學課讀經書數年之後果能赴考附入内地苗籍一體酌量錄取等因臣查苖人亦屬血氣心知之倫兹幸霑沐聖慈概予招徠共為赤子總計上下兩游新附苖疆延袤二三千里人户不下數十萬并經題請安設營制以資防維酌立耑官以司教養於撫導綏戢之餘必當誘植彼之秀異者教以服習禮義庶幾循次陶淑而後可漸臻一道同風之效是所請設立義學課誨新附苗人子弟實為振勵苖疆之要務兹據布政使司布政使鄂彌達議詳前來臣等復查上下兩游新闢各處苗人種類不一如上游附近安順鎮寧等府州地方者則為狆苗其下游附近都匀鎮逺等府地方者則為黒苗附近黎平一邊之古州則為洞苗俱屬生性獷悍習俗野頑從來未經聲教所及至於永豐州向係廣西泗城土府之地所轄土民原非生苗可比因土府陋習恐土民向學有所知識即不便於彼之苛政不許讀書以致蠢頑竟與生苖無二是此等苖民既已頂戴皇仁一旦出諸水火而登之袵席則教養訓迪之方必不可少惟是苗民向化伊始其子弟就學者為數無多兼之苗寨凡有漢奸往來正當嚴禁若因課讀而遂使生儒等居停於此設或一時選擇不得其人該文武稽查有所不周即致生事以及永豐州地面尚有烟瘴之處人亦憚於前往是以臣等酌擬似應先就已安營汛之處分别苗户多寡各為設立義學使之課讀俟其逐漸觀感依向愈殷然後隨地分設庶資實效也查下游附近黎平府之古州已安重鎮週圍苖户繁多應設立義學二所附近清平縣之大小丹江附近都匀府之八寨附近鎮逺之清水江舊施秉又上游附近安順鎮寧等府州之擺頂威逺汛等處均有安駐将備等官各應設立義學一所責成新設之同知通判統為稽查董率其永豐州治係在珉球而冊亨羅斛乃州同州判分駐之地俱安營汛在此三處各設立義學一所責成該知州州同州判就近稽查又永豐州已設學正一員既尚無應試生童可以管束即将此三處所設義學交與該學正董率勸導至課讀之人應在各附近選擇老成生儒前去所需設立義學舘舍及每年修脯等費俱係臣等酌捐應用毋許藉端派累苖人除俟各處營制安駐已竣即為奉行外但訓課此等苖人非同内地俊秀要在開其知識使漸曉禮法應於每處義學俱先将聖諭廣訓逐條講解俾令熟讀然後課以經書如苖民子弟中能勉力趨學日就領悟則令各該管官不時稽查隨予嘉賞並将其父兄一體奨賚以示鼓勸俟數年之間有稍識文義者即送該管官申送學政衙門考試仍仰懇皇上天恩准令學臣不必入在向定苖籍之内祗就此新附苖人子弟中酌取一二名以風苗衆庶彼見有進歩之榮久而久之咸切觀感之念陶以文教消其悍頑於苗疆治理不無裨補皆出自聖主訓俗牖民之洪恩也臣謹㑹同少保雲貴廣西總督臣鄂爾泰貴州學政臣晏斯盛定議合詞具題改徵米石摺張廣泗為奏明事黔省每年額徵秋米十一萬五千餘石緣貴陽等府屬向例額徵秋米多於地丁其下游各府屬額徵秋米甚少止徵地丁並無秋米所以下游各協營不敷之兵糧皆於上游有餘米之府州縣撥給惟上游地方産米素多價值常賤下游地方産米無幾價值頗昻遂致折徵之州縣百姓約需兩石價銀始敷一石折色兵丁支領一石折色究竟難買一石實米兵民均為不便臣與司道等再三籌酌惟有将地丁改徵米石之一法今計平越等府州縣共三十二處之地丁銀内改徵銀三萬二千三百零每石價銀自六錢五分至九錢不等共改徵米四萬二千餘石以為撥供新疆兵丁凑支舊額兵丁月糧之用雖不能全支實米而每歲新兵約止折給兩箇月銀兩兵丁即易於為力将來可免下游採買之煩上游折徵之累且下游府州縣内於撥供兵糧之外尚有餘米即留作本處倉儲以備不時急需設遇應行糶賣之時亦可以資民食惟是民苗等納銀已久兹令改納米石恐於輿情未協曽密諭各府州縣詳加體詢俱稱允便嗣值署督臣高其倬赴任備悉商酌後督臣鄂爾泰過黔面請確核皆以為妥便可行除定議詳細數目現在㑹疏題請外謹繕摺先為奏明考試分棚疏張廣泗為公懇詳請分棚考試以培人才事該臣看得黔省屬在遐邊漢夷雜處凡僻小郡治不能俱設考棚所以定有前赴别府合棚就考之例原屬因地權宜也比年以來恭值聖治日隆百度具舉於郡邑之控馭不便者歸併管轄經理咸宜先據黎平府以黎平向祗轄永從一縣僅府縣兩學生童無幾皆赴鎮逺府合棚應試計程途五六百里不等今則添轄三縣合約生童不下二三千人又據南籠府以南籠向係廳學生童皆赴安順府合棚應試計程途十站有零今則改廳為府並隸二州二縣生童為數已多若仍赴别府就考實屬偏累不便各據士子等懇請各設考棚應試等情由詳報到臣隨批布政司查議暨咨學臣㑹核去後兹准學臣晏斯盛覆稱學政定例原應按府考校因黎平南籠二郡向未設有考棚是以赴别府與試今各屬士子既呈請建棚分考永免長途跋渉守候之苦誠一舉兩便之謀事屬可行等因并據署布政司事糧驛道叅議王廷琬詳據署黎平府事古州同知滕文炯南籠府知府黄世文各行查覆經前司議稱黎平添轄開泰錦屏天柱三縣南籠改廳為府並隸普安永豐安南普安四州縣逈非從前規模可比在黎平合屬生童較前既多若令仍赴鎮逺候考甚屬苦累即如普安一州安南普安二縣雖從安順割隸南籠然此三州縣相距安順已有三百里以至四五百里不等其永豐一州乃粤西泗城土府地方嗣改為州歸屬南籠自州至府計程已四五日而各州縣生童先赴府試之後復往安順候考尤為逺渉各自設棚之請誠屬允合並聲明設立考棚出自士子等踴躍共捐應聽其經營建造仍令各該府留心稽察倘有劣衿棍徒敢於從中指藉滋事嚴加究治俟建造完竣報部備案查考等情詳候題違前來臣查黎平向祗該府暨永從縣兩學南籠府原係廳學應試生童無幾今黎平已添轄開泰錦屏天柱三縣合計共有五學南籠改廳為府並隸普安永豐二州安南普安二縣合計亦有五學生童衆多若仍令赴别府就試誠屬未便既據該司等議覆各生童公懇設棚緣由所當仰邀聖恩准照所請在於黎平南籠二府各自設棚考試庶多士益知奮勉而學校章程亦可底於畫一矣臣謹㑹題苖疆積貯疏元展成為苖疆之積貯宜籌謹酌擬撥運仰祈睿鑒事該臣查得黔省新闢苗疆幅􅊷遼闊生齒繁衆加以古州清江安設重鎮四方商賈絡繹往來此地米糧寧可使有餘不可或有不足是積貯之道當預為籌畫以仰副我皇上軫念邊疆之至意也但黔省産米有限輓運甚艱今欲議積貯於苗疆而即撥糧於本省勢必不能是以臣於上年六月間具摺條奏以古州之都江河道直通廣西之柳慶潯賓等府州除柳慶二府現在将所貯每年糶三穀三萬石碾運古州無庸議撥外仰請皇上勅下廣西撫臣将潯州賓州沿河等倉撥穀五萬石分貯新疆每年於青黄不接之時照例減價糶三以濟兵民之食秋成買補還倉荷䝉皇上天恩将原摺發交大學士伯鄂爾泰議覆查廣西之潯州賓州既有餘穀可撥應令元展成先札商廣西撫臣金鉷一併妥議㑹題奉旨依議欽此欽遵臣隨將所奏情由札商去後嗣准廣西撫臣金鉷札覆潯賓二屬倉貯欵項除常平捐穀社息等項不便動撥外有各年兵米改徵之穀可以撥運擬於潯州所屬之桂平縣貴縣武宣縣平南縣等處共撥穀五萬石委員料理船隻陸續來運等因臣復檄行司道将委員運貯事宜妥議去後兹據布政使司布政使常安署理糧驛道事大定府知府陳悳榮詳稱粤西撥貯穀五萬石照連年採買粤米舊例僱船裝運以五萬石三年分運每石約水脚銀四錢至五錢不等每年運穀一萬六千六百餘石三年共約需銀二萬有餘酌動正項銀兩發給僱募輓運委運官如有浮冒尅減等弊一經查明即行揭叅俟年底将輓運穀數及用過水脚銀兩確數造冊申報確核彚冊詳請報銷所有倉厫古州貯穀三萬石該建倉六十間都江貯穀二萬石該建倉四十間並請動支正項銀兩分撥古州同知及都江通判一面建造以備收貯俟工竣日彚詳核銷其穀於每年青黄不接之時照存七糶三之例減價出糶秋成買補還項則倉儲不致稽延而兵民緩急有備實於苖疆大有裨益等情前來臣覆查無異相應㑹同雲貴廣西督臣尹繼善廣西撫臣金鉷合詞具題伏乞皇上睿鑒勅部議覆施行再查清江等處分貯米石已准部咨大學士伯鄂爾泰議覆粤東撫臣楊永斌條奏截留湖南漕米十五萬石三年分運收貯現在咨商湖南撫臣趙𢎞恩另行妥議㑹題合併陳明為此具本謹題貴州通志卷三十五
