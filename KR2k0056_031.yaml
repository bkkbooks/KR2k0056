body:
  text: 貴州通志卷三十一人物列女名宦鄉賢俱以府統州縣列女因各州縣俱分舊載新增難以合一照山川例大書州縣貴陽府元逹嚕噶齊桑阿克孫妻托克托沁早寡不忍獨生以死從夫延祐二年旌其節黔之旌揚節婦始此明越淳妻張氏宣慰司人適舉人越淳年二十三夫亡無子苦節二十餘年卒葬夫側有並蒂梅生冢上士林歌咏之徐資妻陳氏貴州衛人正統間都清苗叛資從征戰亡陳慟絶復蘇堅志守節教其子節登第歷官巡撫封恭人夀八十終合葬夫冢僉事周孟中題其岡曰忠節巡按王鑑之學士吳寬俱有記洛宣妻李氏郡人宣官都指揮征麓川戰沒李苦節不再適正統間旌陳通妻孔氏郡人夫通為小旗正統末以禦冦死孔守節不二𢎞治初旌龔璟妻袁氏郡人孀居七十五年事聞旌之朱宣妻劉氏貴州衛指揮劉芳女名慧未字時母病割股為羮以進母疾隨痊後適千户朱宣年方二十三宣喪撫孤守節誓無他志撫按旌之黃鎮妻任氏子黃閏妻郝氏郡人任年二十四夫亡子閏甫周歲撫之成立舉於鄉及閏卒其媳郝氏年二十一與姑相依撫其子桂亦成立嘉靖四十三年巡按巫繼咸題旌曰一門雙節李端妻越氏郡人年二十三夫故越足不踰閫預以名刻端墓碑期與合葬年八十巡按薛繼茂聞而賢之歲給米二石具題旌表薛廷珠妻蔡氏郡人幼有志操及筓適廷珠珠亦傑士以試不售憤投烏當河死蔡聞驚悼趨投舍旁井賴鄰婦救免日夜泣血待盡姑許氏提孤兒彥卿示之曰爾欲從吾兒地下無論我孀姑既耄如此三歲孩提何蔡感悟乃強饘粥以適姑意比兒長就外傅時以父事感之身紡績以佐讀及彥卿以明經舉於鄉猶傷悼哀思彥卿為溫江令贈父如其官封母孺人萬厯間御史薛繼茂題旌孫紹魯師魯庚子同榜中式人以為節婦之報云潘汝明妻楊氏郡紳楊文煥女適生員汝明甫兩載夫亡氏年十九無子以姪嗣守節至八十四歲題旌夏玘妻陳氏郡人玘為貴州衛千戶卒時陳年尚少以死誓葬畢閉門自縊有司旌之李秉玉妻湯氏郡人治中湯師頊女天啓間安逆變同兄避難聞賊至即投水死潘思聰側室程氏郡人天啓元年安賊叛圍城程恐受汚即仰藥死屢奉旌表周汝麟妻薛氏郡人天啓元年安逆圍城抱幼女赴水死巡按題旌胡驥妻陳氏驥舉人程鑑妻龍氏鑑長官司劉鏜妻張氏鏜守備陳易妻周氏易千户強如山妻周氏范序妻商氏劉增妻李氏林之桂妻朱氏湯車妻王氏韓𢎞庶妻李氏蔡嘉言妻顧氏羅紋妻陳氏以上八人俱係生員洛獻書妻趙氏龍寵妻方氏黔記作龍升翺楊繼臣妻李氏詹恩妻范氏劉冕妻謝氏張𢎞資妻李氏徐大綱妻陳氏李俵妻王氏王可愛妻朱氏潘鳳鳴妻胡氏徐天祥妻郭氏王納諫妻張氏納諫生員張紹康妻李氏劉尚和妻廖氏李東白妻楊氏馬季常妻李氏以上皆郡人守節終身俱崇禎以前題旌其事實原志未詳但列姓氏劉山松妻吳氏郡人吳子騏女幼諳書史適山松松出外久不歸依母家十餘年明末聞流寇將至懷利刃以待至則自刎吳中藝妻陳氏郡人年三十夫故流寇入黔抱其幼子沈於溪楊玉聰妻湯氏郡人銓部湯景明女流賊入黔聞夫被執投水死許世穆妻楊氏郡人太守楊起鼇女年十六歸許事翁姑盡婦道數載夫卒遺子光譜甫三歲楊矢志守節教子為醇儒應明經選諸孫並克紹家聲人以為苦節之報云國朝王若陵聘妻葛氏郡人葛應啓女許字王若陵聞若陵卒不食而死周國柱妻許氏郡人事姑汪氏孝謹姑病禱神願以身代及卒號慟氣絶而死程春化妻竇氏郡人事姑至孝聞春化盡節於官死而復蘇者再姑病割股以進遂痊緝縫自給以撫二子繼而長子亦亡遺孫在抱與長媳周氏誓共守節後次子桂蕃登賢書劉芳名妻尤氏芳名郡庠生巡撫秉仁孫尤年十八適芳名生子紹祥五歲夫故備極荼苦撫子為邑諸生子故又撫其孫歷年八十餘皓首完節康熙三十一年巡撫衛既齊旌之劉兆祥妻羅氏兆祥即芳名子庠生早故遺孤藩尚在襁褓羅與姑尤氏相繼苦守事姑撫子貧困自甘足不履外庭巡撫衛既齊旌之縣令匾其門曰一門雙節周大年妻蔡氏郡人年十六適大年生子家瑛僅二歲而大年卒蔡矢志守節撫孤為郡庠生巡撫衛既齊奬之以上俱載舊志許賢妻蔡氏郡人舉人越珃女適庠生許賢年二十夫亡守節撫孤事繼姑尤盡孝謹四十六年如一日康熙五十七年護撫白潢題旌黃震妻李氏郡人教授李超品女適庠生黃震年十九夫卒遺腹生子時夏李事孀姑以孝聞撫時夏為邑廪生苦節三十七年康熙五十六年護撫遲炘題旌程桂竒妻周氏桂竒為春化長子氏年十四歸桂竒踰年生子甫及周而桂竒卒截髮嚙指以死自誓茹荼以事病姑拮據以撫弱息親授經書訓子成名守節五十餘年子珣康熙壬午舉人宰諸暨有善政孫仁圻辛丑科進士選庶常歷官布政使雍正元年巡撫金世揚題旌黃登榜妻吳氏郡人農民吳現瑛女知禮節適廪生登榜年二十八而登榜卒遺子國麟甫七歲吳堅志守節撫孤國麟中康熙癸巳恩科舉人雍正元年巡撫金世揚題旌朱景運妻劉氏郡人年二十三而夫亡遺一子氏矢志撫孤雖茹荼集蓼猶拮據延師束修膏火之資悉出十指擘畫有欲奪其志者氏截髮毁容引錐刺其左目事乃寢子澐成諸生守節四十餘年雍正二年巡撫金世揚題旌李正妻章氏郡人貢生張爾誥女氏年十六適武生李正夫亡時章年十九憑十指奉養翁姑克盡孝敬教子夢驥嚴而有法為名諸生守節四十餘年雍正七年巡撫張廣泗題旌冉瓖妻越氏郡人武舉越于同女年十六適庠生冉瓖孝事翁姑克嫻婦道歸數月而瓖沒氏號痛幾絶志期殉節姑嫜曲為解慰終不能奪朝夕悲泣水漿不入口者數日待瓖屬纊後即與其從婢蘭英於靜夜投繯並死康熙四十三年公舉旌表貴築縣國朝袁國垣妻吳氏邑人年十六適國垣踰年而夫死撫遺腹子宗孟為邑諸生夭殁復撫其孫若宏若安艱苦六十餘年頻遭冦亂始終如一總督趙廷臣旌其門劉洲妻郭氏洲先世巴渝巨族隨祖任黔遂家焉郭年十四適洲洲卒子逺龍甫總角次逺鳳在襁褓其遺腹子逺譽閲五月而始生時舅姑及夫三喪未葬氏立志守節先後安厝三喪俱各成禮有勢豪欲奪其志因徙居深山即至親罕得見其面逺譽從師力學弱冠為邑諸生食廪餼郭守節三十五年卒康熙三十一年巡撫衛既齊旌之以上載舊志張宅方妻陶氏邑人年二十三夫亡守節孝事翁姑撫子女皆成立雍正二年巡撫毛文銓題旌劉朝輔妻余氏邑人年二十夫故事孀姑盡孝教子義方言不出閾雍正二年巡撫金世揚題旌張浩妻陶氏邑人適郡諸生張浩逾年而浩病卒遺孤孩稚堂上二親垂白氏仰事俯育備極艱辛守志三十餘載雍正二年巡撫金世揚題旌柴大成妻方氏邑人年十七適舉人柴大成二十三嵗而大成沒氏矢志守節事翁姑孝謹撫二歲子成立及子沒又撫孫孫繼夭亡撫堂姪孫中楩為嗣與弱媳相依紡績度日苦節二十八載年五十卒雍正十一年巡撫元展成題旌梁國輔妻高氏邑人年十九而夫亡氏哀毁欲以身殉賴諸婦救免乃盡捐奩飾以營喪事稱未亡人足迹不履外庭翁姑憫其少無子欲令改適已屬媒有成議氏聞悲號徹夜平旦更衣拜奠夫靈自經於房中康熙四十三年公舉題旌范璟妻劉氏邑人劉輔女適庠生范璟氏年二十一夫故撫二子在沅在湄俱遊庠相繼而歿復撫孤孫康熙四十三年護撫張建績旌之定番州明王爾昌妻陳氏州人夫死年艾守節不二事聞被旌顧民膏妻李氏毛琛妻李氏吳運泰妻喻氏黃偉妻鄭氏俱州人夫死守節以上俱載舊志顧人龍妻李氏州人人龍見忠烈流賊破城氏與人龍對縊中堂而死張承祖妻吳氏州人流賊破城吳氏大哭曰我等義不受辱遂赴蓮花池死時女伴相率投池死者數十人國朝杜蘅妻孫氏州人年十七適蘅二十七而蘅故氏孝事翁姑和處妯娌家貧紡績撫教二子友梤友榕俱為諸生榕食廪餼苦節三十三年清操無玷雍正十一年巡撫元展成題旌廣順州明金大章妻張氏州人夫亡撫子燦承襲土知州職燦亡復撫孫湯巡按馮晉卿旌其門曰矢志柏舟夀七十餘卒載舊志國朝金大廷妻經氏州人年二十五夫亡家極貧屢遭兵亂撫二子長珻膺思薦次玣及諸孫皆成諸生守節三十九年以子珻任教授封孺人吳自林妻金氏州人年二十三夫亡撫孤成立後見孫五曾孫一年七十餘四代一堂鄉黨欽羡以上二人俱康熙四十三年護巡撫布政司張建績題旌開州國朝謝二姑州民謝克明姪女幼孤克明撫為己女年十四未字事繼父母孝值二親皆病且篤一日之間再割其股以進親疾皆愈里人異之康熙二十年巡撫楊雍建旌之載舊志楊質素妻簡氏州人年二十夫亡善事舅姑撫孤成立守節四十餘年康熙四十三年護巡撫布政司張建績題旌龍里縣明陳世傑聘妻戴氏龍里衛戴陟女八歲許字世傑待年未歸而傑沒戴矢志不嫁奉父母克盡孝道御史薛繼茂題旌王淮妻談氏夏時妻黃氏俱邑人守節被旌國朝陳格言妻毛氏邑人年二十四夫故二子俱在襁褓屢經強暴逼娶矢志靡他巡撫衛既齊旌之葉天培妻曹氏邑人適邑庠生葉天培年二十六而天培故曹堅志守節撫孤子又繼亡益勵其操巡撫衛既齊旌之以上載舊志陳世龍妻李氏邑人年二十二夫亡守節家最貧上事舅姑下撫孤子備極艱辛壽六十二卒康熙五十二年巡撫劉蔭樞題旌徐應淮妻石氏邑人明千户石應祥之女適廩生應淮年二十八夫亡氏矢志守節疊遭歉嵗紡績以供饘粥親黨相賙堅却不受教子啓崑為貢生啓嶦為增生苦節三十八載雍正五年署巡撫祖秉圭題旌貴定縣明王達妻吳氏邑人達故吳年十九誓死守節敬事舅姑四十餘年堅貞如一日有司旌之陳椿妻王氏邑人椿故王守節六十餘年冰霜自矢巡按郜光先旌奬馮斯良母王氏邑人夫死斯良尚幼王嫠居矢節訓子成立終身貞潔巡按郜光先蔡廷臣旌奬姚允迪妻潘氏邑人允迪官知縣卒潘時年二十二青年守節白首無瑕題旌其門曰恩詔表貞孫耀祖妻王氏邑人耀祖武進士卒王守節四十餘年終身無玷孫天民妻胡氏邑人天民家貧氏紡績以供甘旨翁性嚴姑性潔事之兩得其歡及從夫宦遊遇美食輒泣不舉筋遂長齋以祈親夀至親卒乃已馬為麟妻徐氏邑人為麟舉人卒時氏年二十六家貧無子誓不再適六十四歲卒巡撫劉庠旌奬姚咨俊妻唐氏邑人咨俊由進士筮仕江西安福縣今卒於官唐扶櫬還里備極艱苦守節以終奉旌史讜妻何氏邑人讜仕知州卒時何年二十九子文鼐甫三歲守節教子後文鼎中崇禎壬午鄉試何年六十七歲終巡撫潘世奇題旌其門曰節凛冰霜丘禾嘉妻姚氏邑人禾嘉官遼東巡撫卒於京邸姚上疏扶櫬歸里流冦陷城懼為賊汚遂投井死姚聖言妻陳氏邑人聖言仕夾江令流冦陷邑城陳懼辱投井不溺所親憐而救之引避山中又聞賊至墜崖而死孫南光妻朱氏邑人適舉人南光少夭氏寡流冦破城罵賊投井死國朝凌國士妻白氏平伐司人事姑孝謹姑病痿痺手不任箸白舉匕以飯姑視寒暄以易牀褥夜則坐姑旁假寐衣不解帶延醫不效割股和藥以進遂瘳鄰媪或勞慰之婦曰婦事姑如子事父臣事君吾行吾志耳何勞苦為康熙十一年耆老聞於縣令旌之宋三省弟妾縣屬唐榜苗女也大平伐長官宋三省攻唐榜獲之以為弟妾弟死無嗣妻改適妾獨留晝夜紡績足不出戶有欲奪其志者妾哭且詈曰馬不二鞍女不二夫若再從人牛馬不如也守節至七十餘歲終庭拱宸妻蕭氏邑人年二十而寡敬事舅姑堅守婦節五十餘年以上俱載舊志王鳴鳳妻林氏邑人年二十四夫亡翁姑垂暮子在襁褓家又甚貧林艱苦備嘗仰事俯育教子萬年成歲貢生康熙三十六年巡撫閻興邦題旌庭子位妻向氏邑人子位平伐長官司卒氏年二十一撫子襲職守節五十餘年康熙四十七年巡撫陳詵題旌史書妻姚氏邑人書監生卒氏年二十六子幼姑耄勤苦紡績事姑育子二子紀言紀賓俱為諸生雍正二年巡撫金世揚題旌傅天爵妻馬氏邑人天爵舉人赴京會試卒於途時氏年二十二勤苦守節撫孤子成立三十九年如一日雍正六年署巡撫祖秉圭題旌張其劌聘妻李氏邑人幼讀書許字其劌未歸而其劌歿女聞訃悲慟欲絶隨衰服詣夫靈所手為文以祭焉未幾其母迎歸欲令改適女聞之剪髮嚙指自經者再母知其志不可奪議終寢守節十年卒預為塋於夫冢之右遂合窆焉修文縣國朝楊郁妻何氏邑人夫客死普安何誓不獨生伺家人防稍懈乃解其帶自縊康熙十年巡撫佟鳳彩旌其門曰水月同清載舊志黃應隆妻夏氏邑人應隆庠生卒氏年二十八守節至七十一歲卒康熙四十七年巡撫陳詵題旌刁玫妻歸氏邑人玫庠生卒氏守節撫孤四十二年事祖翁姑俱盡孝道雍正四年巡撫何世璂題旌楊之苓妻劉氏宛平劉永茂女之苓邑敷勇衛人中康熙辛酉鄉試赴公車不第寓京教授生徒娶氏年十九越三年之苓客殁遺孤才三月父母欲奪其志堅不從命鬻服以殮骨骸擕子歸黔行至河南乏資適之苓同年友劉子章令襄城助賻遣送歸葬教子玫為邑庠生苦節四十餘年安順府明汪大寬妻蕭氏郡人適庠生大寬氏年二十六大寬卒甘貧守節事姑盡孝孀居五十餘年志同金石有節婦坊詹淇妻康氏郡人適生員詹淇淇尋卒氏孀居績紡勞苦養姑勤儉教子姑卒竭力營葬屢奉旌奬馬龍妻程氏郡人年二十三夫死守節孝事其姑撫遺腹子四十餘年不履外庭奉旌張耀璧妻洪氏郡人適庠生張耀璧夭啓間安賊破府城洪與耀璧訣曰君當自為計毋以妾纍君焚其室赴火死耀璧因以得脫葉立妻蔣氏郡人年二十七夫死家貧氏辛苦自甘守節不二奉旌詹斗妻張氏郡人斗生員氏年二十四斗亡家貧紡績養姑六十餘年奉旌宋名臣妻丁氏郡人年二十四名臣亡甘貧自守奉旌薛鳳章妻張氏郡人鳳章登賢書尋卒張時年二十絶食七日其姑勸諭復食乃剪髮垢面以見志苦節終身奉旌牟嘉禾妻邵氏郡人年二十守節訓二子俱登仕籍夀八十四終崇禎壬午奉旨旌表霍鍾英妻鮑氏郡人年十八為安賊所執不辱觸石死奉旨旌表張應宸妻吳氏郡人年十八歲夫故不食死梅紀妻熊氏郡人年二十三夫故矢志教子夀九十三奉旨旌表夏國臣妻王氏夏國猷妻吳氏俱郡人夫亡妯娌俱守節建有冰清玉潔坊朱訓妻殷氏郡人年二十七夫故遺子官甫三歲守志不二教子成名夀至九十何寶妻雷氏郡人年十九夫故家貧事繼姑以孝聞撫二子成立龔居敬聘妻吳氏郡人年十四未嫁居敬故守志終身奉旨旌表孫振鷺祖母楊氏郡人守節至九十歲卒國朝梅運昌妻李氏郡人運昌以明經令江津遇冦難氏時年二十五之夫任中途聞變懷其襁褓孤匿山中淬利刃以防不測間關險阻備歷艱辛乃抵家又兵亂年凶卒能禦暴訓孤子建登辛酉鄉薦年六十餘卒康熙三十一年巡撫衛既齊旌之牟應綬繼室韓氏應綬郡人任廣東連平州知州娶韓為繼室年甫十八夫病篤憐韓年少無子遺命改字及夫殁扶櫬歸里其姑援遺言欲嫁之韓堅執不從時有以勢奪者氏毁容斷髮誓以死乃免撫其嗣子呈鼎鼎故又撫其孫國寶歷六十餘年屢經督撫旌表牟某妻李氏郡人適牟氏子遇難自刎從人急救奪其刃喉未絶以手斷之而斃士林多挽之以上俱載舊志劉始和妻徐氏郡人年二十四夫殁無子翁姑相繼亡經營喪葬成禮守節終身康熙五十二年巡撫劉廕樞題旌羅偉妻杜氏郡人杜如梅之女年二十八夫卒紡績苦節撫其子楚玉國竒皆成立康熙五十七年護巡撫白潢題旌羅廷勝妻馬氏寧谷司羊海寨狆民女名阿透適羅廷勝年二十六夫亡氏守志數載其父與翁因其無子屢勸改嫁不從父私許聘乾溝狆民羅姓氏聞之奔夫墓哭竟日歸家自縊雍正七年巡撫張廣泗題旌全洪圖聘妻袁氏郡人貢生袁英之女名淑秀七歲英沒母教以女紅兼工書史許字生員全洪圖未嫁而洪圖殁淑秀時年十六聞訃即掩戶書絶命辭一首自縊而死雍正十二年知府王玠詳請題旌普定縣明陳玘妻葉氏衛人適百戶陳玘葉年二十生二子長甫六歲玘隨師征討勞苦成疾歸而益劇語人曰吾死無憾但恐妻他適如吾兒何葉曰君勤王事致疾天必祐君設有不測妾必不獨生未幾玘卒葉哀毁盡禮自刎死吳文榮妻鄒氏崑山鄒思明女洪武初思明戍普定鄒氏甫五嵗隨母居鄉閭長適同里吳文榮乃同夫奉母歷萬里至衛省父未幾父調征當行文榮請代往遂沒於陳鄒時年二十一慟毁幾絶父母勉諭之誓死守節孀居四十七年未嘗忘哀倪鸞妻黃氏鸞普定衛指揮使卒時黃年二十六嵗矢志撫子承襲夀七十終屢奉旌表王二妻黃氏清苑人隨夫戍普定行至中途夫卒氏年二十四擕幼子間關至衛守節不移王召保妻裴氏隨夫戍普定夫殁裴年二十哀慟盡禮竭力以事舅姑撫養遺腹子始終如一馬彪妻景氏年二十二彪死子偉甫五日誓死以守不二其操時仁妻顧氏仁普定衛指揮顧于歸甫一年而夫卒守節六十餘年嘉靖間旌表以上俱載舊志國朝孫成祿妻程氏邑人年二十七夫亡守節三十七載康熙五十七年護巡撫白潢題旌崔國正妻潘氏邑人夫亡時二十八孀姑垂暮遺子襁褓矢志守節貧難度日紡績以供朝夕孀居三十六年雍正四年巡撫何世璂題旌鎮寧州明吳復妻楊氏州屬十二營司僰人楊太女祖仕元為普定府通判洪武間吳復以安陸侯留鎮聞楊聰慧有志操以禮聘之未幾侯薨楊哀毁幾絶翌日沐浴更衣於靈几後自縊死事聞贈貞烈淑人李晟妻沈氏衛人年十八守節撫遺腹子元後以功授指揮元故復撫孫成立奉旌張御妻易氏衛人年十九夫故有欲奪其志者氏手持刃以死自誓撫子經襲祖職有司以聞旌之倪學妻趙氏衛人年二十夫故家貧撫七嵗子斗斗故撫四嵗繼孫世德又故更撫三嵗曾孫崟成立撫三代之孤孀居七十年題旌以上俱載舊志永寧州明王驥母濮氏州人遺其夫名年二十一守節遺腹生驥夀九十二終有司旌之席珣妻淡氏州人年二十守節五十餘年有司旌之張英妻陳氏州人適庠生張英年十九英亡茹苦守節教子領鄉薦院道俱旌表其門以上俱載舊志清鎮縣明蔡俊妻蔣氏易鎧妻李氏鎧生員魏政妻張氏政征永寧死於寇林玉妻陳氏玉生員曾松妻沈氏松生員楊鵜妻李氏周蕙妻楊氏以上俱威清人崇禎以前節旌國朝潘奎妻吳氏新貴人年十六適鎮西庠生潘奎六年而奎卒遺子四嵗殤吳曰不早隨夫子於地下以有此遺孤耳今復何望其母聞而往視之默無一言閲三日紿其母寢漏三下悉取平日浣衣著之遂投繯而死以上載舊志任國佐妻張氏湖廣夷陵總兵張忠孝女適庠生國佐氏年十八夫亡遺孤在襁褓時值兵荒立志守節不茹葷飲酒并不食鹽其姑強之食曰五味亦足亂性吾忍吾性耳其父欲擕之歸氏曰吾既為任門婦夫亡歸父家於禮不合且姑誰為奉養耶辭不往撫子衡中己卯舉人除樂昌令遣人迎養氏曰姑存吾日侍其側姑沒吾日奉其主今舍姑主而就子養於心不安亦不往衡因乞歸終養有孫六人元淳戊子舉人元灝庚戍進士餘俱庠生人以為苦節之報康熙三十九年巡撫王燕題旌趙永昌妻徐氏邑人適庠生趙永昌年二十四永昌亡家無恆産矢志守節奉事翁姑極盡孝敬教二子長模為諸生次楷成進士雍正四年巡撫何世璂題旌劉國望妻羅氏邑人年十九夫亡二孤俱在襁褓家徒壁立親黨無依斷髮毁容備歷艱辛而冰操不改撫二子皆成立守節至三十餘年康熙四十三年護巡撫張建績旌之文昌運妻劉氏邑人年二十一夫故遺孤未周嵗誓欲從夫翁姑悲泣苦諭乃勤紡績孝養撫子成立守節至三十餘年康熙四十三年護巡撫張建績旌之安平縣明梁武妻陳氏武千戶劉綱妻朱氏俱平壩衛人崇禎以前旌表黃運升妻劉氏衛人年二十三夫卒子甫周嵗舅姑篤老家貧甚紡績修膳篝燈辟纑茹荼五十年教子成立直指蘇琰表聞尚書李騰芳覆奏稱劉氏青松賦質白玉為心舅姑無子而有子孤兒無父而有父節不徒節才乃真才奉旨旌曰天恩表節葉承寵妻何氏衛人夫死年二十五矢志守節直指朱奉題旌其門曰節聞丹陛夀七十四終孫枝嵩妻張氏枝嵩平壩軍餘丁早卒張年十九親族憐其貧勸改適誓死不從茹苦撫孤數十載如一日崇禎己卯直指鄧務忠題旌談先哲妻劉氏衛人先哲為戶部郎中氏封安人丁亥流冦入黔舉家殉節臨刃罵不絶口與夫枕籍月餘顔色不變見者莫不慘傷直指瞿鳴豐稱劉氏當寇氛蹂躪之餘不改名家堅貞之節罵賊延頸以就義偕夫把臂以成仁相應表揚以勵風化疏請題旌王之賢母劉氏衛人日暮天寒有客借宿以其子書舍假之次早客行氏拾得一囊有白金三十兩置龕上其客行至中途始覺欲赴水死同行者止之仍返宿處劉指龕上示之其人拜謝而去後乙卯鄉試其子之賢卷主司未録有鬼敲門投卷於案得中式歷官府同知人以為行義所感云以上俱載舊志國朝徐儼妻何氏儼庠生亡時何年二十四有遺腹家貧壁立舅姑垂暮何矢志守節代夫孝養閲六月而生子國正撫之成立喪葬翁姑無不盡禮雍正七年巡撫張廣泗題旌談銓妻郭氏邑人年十九適廪生談銓年二十五銓亡姑老子幼冰蘖自矢及姑沒拮據喪葬克全孝敬守節三十年巡撫元展成題旌談鈞妻章氏邑人年十七適談鈞年二十二鈞亡鈞廪生談銓弟也兄弟偕亡章與郭氏娣姒同年守節奉姑鞠子一門雙節巡撫元展成題旌平越府明錢國賓母樊氏郡人夫亡氏年二十五撫國賓守節終身貞潔無瑕旌曰矢志靡他劉應試妻戴氏應試郡庠生卒時戴年二十守志不再適撫孤成立奉旨旌奬奚傑妻馬氏郡人傑衛指揮卒時氏年二十七屢欲以身殉皆不獲死乃矢志撫孤守節五十餘年巡撫巫繼咸題旌以上載舊志平越縣明李庸妻徐氏衛人正統十四年庸與賊戰死徐年二十五子甫三歲都指揮趙信欲奪其志以配軍卒徐以死拒之遂止守節四十餘年周清妻廖氏衛人清卒廖年二十七無子姑老家貧堅志守節紡績終身奉旨旌表蹇玉妻丘氏衛人年二十二夫亡遺孩甫七月撫孤守節終身不改嘉靖間題旌徐科妻周氏衛人科監生卒時周年二十四子甫一歲矢志守節辛苦備嘗萬厯間題旌戎衣妻楊氏衛人衣卒子翠在襁褓家貧甚氏績絍自給撫孤成立萬厯間題旌劉士恆妻薑氏衛人士恆庠生卒時薑年二十二竭力奉姑甘貧撫子青年守志白首無瑕題奉旌奬王之相妻劉氏邑人相死氏年十八遺一子撫育成立守節終身題賜旌表王家柱妻劉氏邑人家柱郡廪生卒劉年二十七子祚蕃生甫數月矢志撫子備極艱辛疊遭兵燹節操愈勵祚蕃登賢書里中咸稱節婦賢母知府陳龍巖為之立傳徐氏女邑人徐綱之姊幼不願嫁值黑苗叛圍城散米養兵城賴以完奉旨旌奬號妙淨夫人建貞女坊年八十始卒以上俱載舊志樊奕珩妻鄒氏邑人普安州學正鄒以惇女年十六歸奕珩其翁祚興亦補學正病危割股進弗愈姑劉復病氏痛哭呼天復割股和藥而姑病痊奕珩戊子舉於鄉會試卒於京氏哀慟垂死復蘇兩幼兒先以痘殤氏因姑老遂竭力奉姑二十年姑夀終葬畢哀甚月餘卒郡人王士俊為之立傳黃平州宋宜娘州人有武略嘗領兵營於黃平今黃平城北三里有宜娘壘城南五里有宜娘山明吳瀜妻王氏州人適百戶吳瀜氏年二十二瀜亡無子姑憐其少勸之嫁氏指天自明曰孀姑在堂誓不再適守節四十餘年𢎞治六年題旌權繼武妻周氏興隆人適都指揮權繼武征香罏山陳亡氏年二十五誓不再醮撫子及孫相繼夭死氏孤苦伶仃終身守節隆慶二年巡按王時舉題旌郭繼賢妻林氏州人夫死時林年二十四誓死不嫁撫子成立萬厯二十五年題旌張國用妻孫氏州人夫死時年二十一撫三子誓不再適萬厯三十九年題旌張國揚妻劉氏州人夫死時年二十三矢志守節紡績撫子舅姑許適别姓劉知其期櫛沐更衣入室自刎死題旌節烈狄應龍妻李氏興隆衛人夫死守節萬厯間旌表萬一麟妻韓氏興隆衛人歸百户一麟麟卒時韓年二十四矢志守節小屋數椽一婢相依焚香誦佛四十年所居忽生異草嫩緑浮英遍於一室後窘絶鬻屋以供衣食又剪茅為舍異草復生一夕雷雨赤光照耀其室有頃方散年七十二卒萬厯間御史宋興祖疏稱韓氏貞原所性貧且益堅四十八年純節草木皆知七十二嵗完名電雷可燭題請旌表全洪烈妻毛氏興隆衛人洪烈為指揮陳亡毛年二十四撫子守節四十餘年崇禎間巡撫劉士正題旌朱玉妻張氏興隆衛人夫卒時張年二十一哭三日絶而復蘇曰婦人從一而終吾夫既殁吾何以生遂具衰絰自縊而死蘭誨妻郭氏興隆衛人蘭誨為千戶赴京承廕卒時氏年二十甘貧守節始終無玷年六十餘餓死鄉人憐之以上載舊志李清妻彭氏興隆衛人清右所千戶氏年二十五清沒無子遺腹六月外族逼嫁誓死不從朝夕祝天願生男以延宗祀後果生子俊撫之以襲夫職正德間題旌狄耀妻李氏興隆衛人耀邑庠生卒時氏年二十七子在襁褓食貧守節孝事孀姑所居有瑞竹疊生萬厯戊午大疫衛人多不免獨狄宅無恙九十歲卒崇禎六年巡按梁炳題旌丁紹妻解氏興隆衛人紹為千户殁時氏年二十五子幼家貧誓死不二年六十六卒崇禎六年巡按梁炳題旌以上三人查州志增入國朝盛萬任妻薛氏興隆衛人適庠生盛萬任年二十四夫亡父母姻親欲奪其志泣曰從一而終婦人之節吾敢易志乎撫一歲孤四十餘年無玷盛萬億妻吳氏興隆衛人年十六適萬億億卒時吳年二十三清白自勵誓死靡他奉翁姑教孤子備盡孝慈守節四十餘年以上二人俱雍正七年巡撫張廣泗題旌周企濓妻曹氏州人適紳士企濓年二十六夫殁撫子成立子沒復撫孫守節三十餘年州牧旌其門曰巾幗儀型詳請旌表石聲啓妻師氏州人年二十二而寡遺二子俱幼氏守志不渝時偽將陳侯府強委禽焉氏不從投繯州牧旌其門曰節烈無雙甕安縣明戎妻江氏邑人翝死時江年二十無子矢志守節年八十卒萬厯間旌其門黃渤妻宋氏邑人適生員黃渤氏性至孝父宋傑病危氏為女時割股啖之得不死後隨夫渤避兵黃連山為土賊所執宋知不可脫紿賊欲飲水賊以磁甌貯水授之宋擊其甌以磁片自刎死以上載舊志國朝吳世昌妻羅氏狆民羅朝彥女五嵗許字吳世昌十八嵗未嫁值世昌病篤翁姑迎氏至家七日而世昌卒氏必欲殉夫翁姑極言撫慰始強進食夫厝俊即曰我已為吳家婦矣遂堅守不二仔肩家務養葬翁姑靡不竭力夀至六十五嵗雍正元年巡撫金世揚題旌羅朝彥妻劉氏邑人名阿金適狆民羅朝彥年三十五而孀夫弟朝保欲踞為室且謀之強暴氏知不免乘間自經康熙三十七年巡撫王燕親鞠得實立斃強暴於杖下給扁曰明倫貞節鄉人為之立祠餘慶縣明歐陽坤妻鄒氏邑人坤死鄒年二十八矢志守節撫孤子銘讀書為諸生萬厯間奉旨旌表年八十終歐陽銘妻聶氏邑人鄒節婦媳也銘庠生卒時聶年二十七無子誓死不二孝養孀姑年五十餘始卒人稱歐氏雙節云桂高攀妻彭氏邑人攀庠生疾卒氏年少而孀無子撫兩幼女守節家貧無婢僕歷遭兵火貞白完全以女紅自給卒年六十有二國朝楊應第妻謝氏邑人應第庠生卒時氏年二十五矢志撫孤守節崇禎末賊掠鄉村氏負子逃避箐林賊又至倉卒急迫擕子卧死尸中以血塗面賊以刃破其面氏忍痛不動賊舍之而去得以保全教子永年為諸生苦節三十餘年督撫屢旌其門以上載舊志唐時雍妻李氏邑人時雍庠生卒氏年二十一哀毁幾絶矢志撫孤家素寒薄粗糲自甘子運新克遵母訓早歲成諸生李守節至七十二歲卒雍正三年巡撫何世璂題旌湄潭縣明談氏女邑人小字淑英邑吏談叔卿女年十四未字值賊亂隨父母避兵先以利刃藏衣中賊突至家人散走女自刎死錢世清妻徐氏邑人世清邑庠生卒時徐年二十依父母守節為賊所執脅之乘馬徐從馬上自投者再賊怒斷其喉而去唐顯璞妻簡氏邑人顯璞邑庠生卒時簡年二十五二子尚幼家貧紡績以供教子成立長子之官為庠生次子之牧登鄉薦守節五十年而卒謝傳堯妻曹氏邑人傳堯邑庠生卒時曹年二十九無子依女為養未幾壻庠生楊應第亦故女年方二十餘生子永年尚襁褓曹與女孤惸相依﨑嶇喪亂踰二十年永年乃成立曹年已六十餘矣有司議旌其門曹曰妻以節事夫母以貞誨女相勉於常又何旌焉不受敖相妻劉氏邑人邑紳劉鳳時女年十六適相未一年夫卒遺腹生子矢志守節家人欲奪其志不聽從舅姑避亂於十里溪訛言兵至氏恐見辱遂自縊死年二十有一馮祥妻羅氏邑人夫亡羅年二十六無子守節終身以上載舊志馮樟聘妻冉氏邑人冉啓宗女年十四許字馮樟未嫁而樟卒父母欲另為擇配女曰夫之不幸即女之不幸也何另字為遂自縊死李芝蘭妻丁氏邑人年十九夫故遺一子方在襁褓氏矢志守貞事翁姑孝謹姑憐其少寡勸令改適氏即截髮毁容誓無他志撫幼孤成立屢經離亂艱苦備嘗不改冰操年七十一而卒國朝李如玉妻唐氏邑人適貢生李如玉年二十六如玉亡守節教子俾之成立至六十歲卒巡撫元展成題旌都勻府明陳昱妻馬氏郡人昱為都勻衛指揮馬封恭人昱病將沒馬具命服詣祠堂曰夫婦之道生同室死同穴今夫將死妾生何為既而昱卒馬遂閉門自經時年二十一詔表其門曰貞烈劉進妻包氏進郡軍士溺水死包往求其尸得之負歸謂鄰婦曰吾年二十二無子豈能再事人乎遂自經副使吳立嘉其烈合葬之題旌郭秀妻趙氏秀郡軍人趙從之戍秀採薪渡江死趙亦奔水見者救之既歸悲號不己以死自誓親鄰知之防守益密不逾月防者少懈遂自經桂世卿妻劉氏郡人年二十七世卿卒守節撫子子死撫孫本枝官總兵玉枝森枝俱明經奉旨旌表楊七妻蒙氏郡人安賊亂蒙被掠罵賊不辱死奉旌朱國臣妻吳氏郡人國臣陳亡吳一慟幾絶既而曰徒死無益不如撫孤以存朱氏一脈耳甘貧守節教子振祚舉明經奉文嘉奬李茂春妻鮮氏郡人年十八夫故誓死撫孤奉文旌奬楊應乾妻司氏郡人夫溺水死守志不嫁事姑撫子奉旌楊廷烈妻吳氏郡人年十八生子一歲夫憤父讎赴敵死家財盡散無以為生苦節撫孤成立年六十四終吳正春妻陸氏郡人年十九夫卒立志守節事翁撫孤年六十七奉文旌奬龔應賓妻王氏郡人夫中苖藥箭死王自縊奉旌何珍妻王氏郡人年二十二夫死守節躬親紡績苦節四十餘年奉文旌奬張今盛妻江氏郡人今盛崇禎丙子解元早殁江年二十二撫一歲子衍緒成諸生年五十九終以上載舊志屠珏妻王氏珏生員王氏守節奉旌都勻縣明老功妻乜氏功都勻衛夷人萬厯三十三年氏于歸道遇賊逼行不從以刀脅之延領受害院道聞而褒奬葬之國朝吳道暹妻江氏邑人江之宗女年二十七夫卒撫孤子之璧成立子故又撫其孫甘貧茹苦夀至八十五卒康熙五十二年巡撫劉蔭樞題旌丘之秀妻劉氏邑人劉燦之女年二十六夫亡家貧苦節撫三子皆成立夀至八十一歲康熙五十三年巡撫劉蔭樞題旌凃述銑妻孛氏邑庠生孛允吉之女適庠生述銑氏年二十六夫亡立志撫孤茹荼苦節教長子伯中康熙己卯舉人康熙五十七年護巡撫白潢題旌周文盛妻姚氏都勻營卒姚昌龍女歸營卒文盛氏年二十六文盛亡立志守節以奉姑鞠子為己任歷三十二年如一日雍正五年巡撫何世璂題旌鄭良侯妻周氏邑人良侯邑庠生卒時氏年二十三遺二子俱在襁褓家無恆産矢志靡他竭菽水以事翁勤紡績以課子長雯次霈俱為邑諸生苦節四十七年夀至七十餘雍正七年巡撫張廣泗題旌清平縣明石宣妻李氏邑人宣為都指揮卒氏年二十四無子守節年七十三卒題旌石珍妻秦氏邑人夫亡守節受旌王氏清平人失其夫姓名守節奉旌王雄妻白氏邑人雄為千戶卒氏年二十遺子輔方周歲誓不再嫁撫子襲職年六十六卒奉旌王保妻郭氏邑人保為千戶卒氏年二十八無子母黨欲奪其志誓死不從紡績度日守節終身奉旌周德妻王氏邑人年二十九夫亡撫遺腹子鼎成立清操苦節人無間言姑莫氏性嚴急事之得其歡心鄉人稱其節孝學使徐秉正旌之趙仁妻楊氏邑人仁為庠生早沒氏年二十二遺子杲甫三歲守節撫孤成立領歲薦撫按屢加旌奬孫方妻王氏邑人方庠生王年二十九夫卒無子守節終身巡按毛在題旌嚴茂妻卓氏邑人茂係旗軍氏年二十一夫殁子甫半齡誓死撫孤巡撫毛在題旌孫應鵬繼妻楊氏邑人應鵬為大理府通判氏年二十九鵬卒誓死守節長齋供佛即至戚罕見其面晚年家計益落僅一婢自隨饘粥不繼人皆憐之夀至七十七卒副使沈思充旌奬以上載舊志漆大亨妻趙氏邑人年二十二夫亡無子自縊以殉撫按題旌鎮遠府明何熙妻楊氏郡人熙即本府土同知卒時楊年二十三矢志靡他守節六十餘年以夀終奉旌楊瑄妻劉氏郡人適土通判瑄為繼室瑄死王事氏年二十五誓死守節撫孤承襲鄉人稱之何承宗妻錢氏郡人承宗土同知死時氏年二十四有勸其再醮者曰吾有姑當事有子當撫此言不願聞守節奉旌解章妻蘇氏郡人夫死守節不嫁有司以聞旌其門曰天朝揚節田蘭妻鍾氏郡人蘭以歲薦授鄞縣丞妻卒繼室鍾氏生三子蘭卒鍾方二十五三子俱未成立鍾矢志撫訓長子時中登天啓甲子鄉薦歷官至太守張繼適妻胡氏適金溪人占籍鎮逺中崇禎丙子鄉試計偕卒於道胡年二十遺二子俱幼身事䌟績奉親撫子舅姑相繼喪竭力殯葬如禮雷葵陽妻成氏郡人葵陽庠生早卒生一女三嵗子長春甫七月舅姑垂老無依成藐然弱嫠奉舅姑撫子女備極艱辛未幾翁逝其兄慮長春幼無以怙欲取為已嗣庶可免成拮據成泣曰吾所以稱未亡人者為此一塊肉也嗣成謂雷祀何堅執不可歲餘姑又逝時冦據黔兵亂歲荒出所窖藏衣榖殯殮盡禮訓子成名嫁其女年五十九卒奉旌楊鐸妻鍾氏郡人未二十而適鐸生子再芳甫五嵗鐸卒矢志自守日事女紅以訓其子子死又撫孫成立年八十卒奉旌奬熊應周妻陳氏應周郡廪生早卒氏年二十五守節撫子兆符成立三十年如一日奉旌王向乾妻萬氏郡人向乾廩生卒遺二子長金印五歲次三歲萬茹荼飲冰以教育之苦節數十年奉旌表何大正妻劉氏郡人大正食餼郡學早卒遺三子氏年二十五艱辛撫育兵燹流離卒不渝節何瑛妻汪氏楊文昌妻何氏羅溶妻劉氏楊正松妻何氏正松卭水長官以上俱郡人艾年守節不渝奉旌奬國朝江某妻柯氏閩人寓鎮逺適江氏子生一女夫死於水柯聞訃劈踊哀號誓不欲生舅姑多方慰之柯曰婦人未嫁從父既嫁從夫夫死從子吾夫死無子殆天喪我也吾何從焉遂自經逺近咸挽之楊汝信妻周氏郡人年二十六夫故疊遭兵戎屢踐飢饉周堅志守節始終不移撫子其美為明經亡復撫孫于廷為郡庠生年九十八卒以上俱載舊志鎮逺縣明何承光妻趙氏邑人承光舉人守夔州流冦猝至趙謂其夫曰男忠女烈理也遂自刎知府宋應星詳旌施秉縣明楊再翔妻張氏邑人適翔生子正位甫七歲翔逺遊十餘年不歸張事祖姑及姑至謹孝養無缺後翔回不半載疾卒祖姑憐之欲奪其志張拒不可延師訓子家貧歲歉矢志靡他五十餘年如一日楊友梅妻李氏邑人友梅廪生早卒氏年二十遺孤文炳甫一歲守節撫育教訓補弟子員陳氏邑人失其夫姓名早死遺孤甫五歲晝耕夜織撫子成立年六十乃終錢法妻史氏偏橋衛人法殁史年十八甘貧勵節九十六嵗卒成化間建坊旌表歐時雍妻田氏衛人年二十夫故誓不再嫁冰霜自矢守節六十五年夀八十五歲崇禎間巡按梁炳旌曰瑶池冰冽以上載舊志宋繼宏女邑人小字關娘年十七未字流寇入黔虜掠婦女一日擁入繼宏室關娘登樓閉戶自縊死國朝李逢春妻王氏邑人王之廉女年二十六夫亡遺孤尚幼父憐其無依令同居不從避吳逆亂居鄉鋤蕨度日撫子成立廖定䇿妻劉氏邑人定策中武舉赴會試殁於旅邸姑亦相繼殁劉冰蘖自矢撫遺孤國璜為邑諸生苦節三十九載鄭天錫妻郭氏邑人年十六歸天錫時翁滇武定守備郭同夫赴翁任二載生一子而夫卒郭扶櫬歸葬翁升任廣信遣使迎不往曰兒識漸開習見富貴則驕侈素知艱難則勵志後值兵燹卒能撫子成名蔣仕魯妻汪氏邑人年二十七夫卒遺孤薦科尚幼汪截髮毁容奉養翁姑守節三十餘年先姑殁臨終呼兒媳囑曰吾病度不能起未送老姑終是吾遺恨汝輩須承我志善事之孫上元繼妻顧氏邑人待字二十九歲適舉人上元為繼室僅三月夫赴京會試越明年夏河水泛漲家業蕩析翁殁於水上元聞訃一痛而絶顧無子撫前妻之二子不啻已出四壁蕭然恃女紅贍口苦節二十二載卒年五十一陳琦妻廖氏邑人年二十適琦相敬如賓七載夫故遺子女各一廖慟絶復蘇立志守節家貧乏食採野蔬以療飢撫孤成立李之賓妻白氏邑人年二十夫故家貧姑老子幼日食豆粥衣僅蔽體姑沒只餘茅屋數間鬻以營葬有巨豪百計奪其志白毁容守節撫子成立以上七人雍正四年巡撫何世璂題旌天柱縣明陳越母楊氏邑人年少夫卒子越方九齡撫之成立以孝聞嘗值火災四鄰延燒獨氏所居茅屋無患人皆以為母子節孝所感蔣顧妻劉氏邑人年二十二夫亡矢志靡他撫孤成立萬厯間巡撫江東之旌其門曰賢孀撫孤胡玉妻湯氏邑人年十九夫亡撫幼孤成立治家嚴肅操凛冰霜年至七十卒蔣良達妻徐氏邑人年二十夫故孀居五十載撫子正藻成名縣令旌其門楊枝棟妻徐氏邑人守禦所千戶徐天衢女適貢生楊枝棟流冦入黔肆行劫掠氏擕幼女避木杉苗寨賊至度不能免將所佩剪刀先刺其女遂自殺思南府明邵洪俊妻李氏郡人年二十夫亡子經甫周歲李堅志守節五十五年有司立坊表之朱庸妻李氏蠻夷司人年十九夫亡生遺腹子福家貧紡績撫孤成立旌表徐錦妻蒙氏郡人適庠生徐錦嘉靖間山賊攻劫地方夫婦避山箐中為賊所獲賊殺錦執蒙欲犯之唾罵不絶引刀刺賊賊怒支解之面色如生安如崑聘妻楊氏郡人庠生楊洪祖女年十五許字安學吕之子如崑未娶而崑卒女聞之願奔喪守制父母不允女封帛送舅姑殮如崑不食數日卒事聞詔建坊以旌表之符賓妻羅氏郡人知縣羅萬鵬之女年十九夫卒矢志守節依父母居足不踰閫兩割股以療親疾御史梁炳胡平運均以節孝旌表其門夀至八十田倬妻陳氏郡人倬以庠生選貢尋卒陳年二十無子堅貞自矢苦節四十餘年雖親旌罕見其面事聞旌表王育聖妻敖氏郡人夫亡守節家貧紡績以事其姑四十餘年內外無間言知府鄭崇嶽上其事旌表鄒先魯妻敖氏妾楊氏李氏郡人先魯令祁陽卒三氏皆年少無子同志守節勤女紅以度日屢遭變亂不改貞白都御史錢邦芑有合傳徐可大妾陳氏郡人可大為宜章令以母年高留氏侍養曲盡孝敬姑病割股以進立愈郡守旌其門敖孫逺妻冉氏郡人孝亷冉學洙女年二十夫亡無子煢居守節艱苦萬狀四十餘年人無間言張一應妻李氏應郡庠生賊兵肆掠夫婦匿山洞洞破一應罵賊投崖死李為賊所執紿以往取金帛至山險處亦投崖而死田侃妻張氏郡人張奎光女年二十夫亡無子卜葬河東張扶櫬登舟半渡躍水死比得其尸上下衣皆密縫面色如生徐心針妾李氏郡人心針仕滇留李侍姑姑病割股療之立愈管玉音妻趙氏郡人年十七割股救父夫病篤復割股以救夫殁宿逋百餘金子幼稚趙躬磨麵績綿早夜操作悉償逋數課子成立為郡庠生年七十餘有司欲旌之辭曰此婦道之常不受旌奬李復善妻張氏郡人守節被旌國朝敖鳴雷長女次女子起宗妻張氏皆郡人吳逆兵肆掠鳴雷挈家避􅋭後洞中賊緣崖至知不免姑嫂結襟投崖裂肢死郡守薑登先上其事學使錢捷旌之曰節烈維風李承眷長女三女四女媳周氏表姪女田氏皆郡人賊兵追急恐受汚辱五女同墜崖死學使錢捷旌之曰竒烈超羣任尊德妻敖氏郡人事祖姑田氏姑敖氏盡孝年二十三夫殁子賢甫一歲教養成立襲朗溪司副長官吳逆兵亂避箐不食而死張祖華妻王氏沿河司人祖華本司長官蚤卒王守節撫孤屢奉旌奬田興趙妻李氏朗溪司人年二十夫亡守節四十餘年奉旌詹俸祿妻吳氏蠻夷司人吳逆兵潰避賊孫岩山中賊至墜崖死崖髙數十仭肢體不損顔色如生咸以為異田茂繹妻張氏朗溪司人年十七吳逆兵潰避匿洞中賊攻之氏跳崖死田養民妻楊氏邑梅司人年十二刲股療其母病適朗溪司正長官養民早卒撫孤子仁夀襲職避吳逆兵匿洞中賊攻洞墜崖死以上載舊志安于磐妻朱氏繼妻田氏于磐蠻夷司正長官前妻朱氏事姑孝姑病篤刲股救之得愈田年二十二歸于磐為繼室值夫病氏泣禱於天乞以身代刲股以進及于磐卒氏年二十七子修德甫一齡撫其前妻子與己子成立修德成進士官御史田守節三十餘年年五十九嵗雍正五年署巡撫祖秉圭題旌田禕妻冉氏郡人年十六歸縣民田禕五年而禕亡上有垂老舅姑子禾易才三歲氏拮據奉養舅姑喪葬盡禮教子成立食餼黌宫守節二十五年年五十六卒雍正十二年知府史瑗詳請題旌冉喬枚繼妻暨氏郡人年十七適生員喬枚枚殁氏年二十四前妻子烜方五歲己子炯方二歲氏撫之如一俱成立炯為郡諸生守節三十五年而卒雍正十二年知府史瑗詳請題旌安化縣明田惟勤妻徐氏邑人年十九夫亡無子刳目自誓依父母以居持齋茹素五十年有司上其事詔賜坊表揚敖孫謀妻張氏邑人廣文張昱女生子甫二歲夫亡值崇禎末兵亂氏避兵山洞被執賊欲犯之氏觸地破面遂抱子投崖而死覃吉甫妻隂氏邑人適吉甫事兩世姑盡禮值叛兵剽掠祖姑薑氏被拷死姑何氏拷幾斃氏匿林麓深處得免兵他往氏出尋兩姑薑氏已死何氣將絶急脫衣襦覆之度兵復來遂縊樹下死陳謨妻王氏邑人適庠生陳謨流賊肆掠被執欲犯之不從脅以刃罵賊死事聞旌表田報國妻楊氏邑人年二十四夫亡無子守節五十餘年田慶嘉妻楊氏水德司人慶嘉朗溪司長官早卒氏年二十五守節撫孤六十三歲卒院道旌奬張希旦妻冉氏邑人年二十六夫亡遺孤文煥文燦俱幼弱冉誓死不二慎出入寡言笑貞節不渝內外無間躬紡績教子俱為庠生知府李光祚旌之李蔚妻安氏邑人夫早死家故貧安苦節撫孤終身不二覃通妻張氏邑人比部張繼曾之女明末兵亂隨夫避洞中被劫投崖而死張國仕妻羅氏邑人年少夫亡守節五十餘年有司上其事建坊旌表張國華妻李氏邑人年二十夫亡事姑撫子守節終身國朝李際泰妻黎氏邑人貢生黎遇章女年二十夫亡願守節父喜曰能如此不辱吾門矣苦節四十年嚴謹自持人共稱之田之鯤妻符氏邑人年二十夫渡江溺死守節四十餘年羅鴻磐妻冉氏邑人年二十四而寡教子愫成諸生遭兵亂卒完名節夀七十餘卒羅達誠妻符氏達誠邑庠生早卒氏年二十四家貧紡績撫子成立年七十餘卒敖起圖妻張氏邑人起圖溺水死氏年二十矢節撫孤三十年而沒當事表其門曰守貞教子王廷賓妻彭氏邑人年二十而寡堅貞不渝撫子成名守節五十年而殁冉國輔妻張氏邑人吳逆亂逃洞中被賊執度必不免乃詐言取物賊信之投崖而死邵堯章妻陳氏邑人吳逆亂被兵掠去陳不受辱擕兩女投江死張釴妻黎氏邑人年十九夫亡無子有二女皆在襁褓家貧紡績自給寄居母家守節三十餘年楊昌裕妻劉氏邑人年十八為偽兵所執不辱死之田仁澤妻張氏邑人仁澤庠生早卒氏年十九歲誓節撫孤終身不二其操曾學貴妻高氏邑人事舅姑以孝聞會嵗飢學貴病髙亦病乃強起刲股食之夫病遂痊後高病篤長子應竒亦刲股救嗣又病次子應亨方客於外星夜至家復刲股如之高年踰八十卒陳相明妻鄧氏邑人年二十三夫死遭明末兵燹流離氏茹苦守志年七十餘卒以上俱載舊志陳宣妻張氏邑安南營人年少宣亡撫子大爵成立娶媳羅氏生二子大爵復亡張與媳羅氏共撫二孤張年七十二守節四十四年羅亦五十六歲守節三十二年里人共白其事請旌印江縣明李宣妻石氏邑人姑歐陽氏性嚴氏事之每可其意宣卒氏年二十七遺孤二家事窮迫艱窘萬狀紡績撫孤凡四十年卒時六十七歲巡按王杏旌之冢宰胡松為之傳王朝妻劉氏邑人嘉靖十八年鎮筸苗破縣城被掠不辱罵賊死任杭妻楊氏邑人杭庠生早卒楊年二十守節終身隆慶二年院道旌奬任效亷妻楊氏邑人效亷為知縣以採木之役卒於官楊七日不食觸棺死萬厯二十二年巡按薛繼茂題旌吕爵妻陳氏邑人夫亡年二十家貧甚或勸之嫁則曰與其失身以圖存不如甘死以守節至七十歲終國朝周祚豐妻李氏邑人年二十一而寡家貧守節撫其子成立夀至八十五歲終歐陽鉁妻吳氏邑人年三十四值明末兵亂破印城鉁死遺孤肇華甫五嵗氏茹荼飲冰調護撫育守節四十五年以上載舊志周成德妻牟氏邑人成德廪生卒氏年二十五撫二孤教養盡力長仁表中康熙癸巳鄉試次仁近列膠庠守節四十載夀終六十五嵗康熙五十五年邑人共白其事請旌婺川縣明舒英妻龔氏邑人英庠生早卒氏年十八姑憐其少令再醮不從自縊死嘉靖四十年題旌載舊志國朝唐運達妻張氏邑人年十九夫亡無子以姪淳逺為嗣守節課子成立為廪貢生夀至七十餘嵗周師奭妻李氏邑人年二十二夫亡撫襁褓子昌睿成立為諸生夀至八十七歲紀維綬妻王氏邑人維綬為婺汛兵沒時王年二十七矢志撫孤守節三十餘年以上三人俱雍正七年巡撫張廣泗題旌石阡府眀楊正綱聘妻王氏郡人名伽藍父瑛正統初任姚安府普淜驛丞藍隨任字同郡庠生楊正綱未娶後瑛解任隨回籍中途遇苗賊瑛老不能奔被害伽藍時年十九被執驅以行藍厲聲罵曰吾父為汝害恨不啖汝肉尚敢更為不道耶賊強逼之藍唾賊面罵不絶口亦被害知府余志為傳萬厯五年知府鄭一信祠祀九年御史陳效具題旌表鄧再興妻吳氏郡人嘉靖庚戍鎮筸苗叛陷石阡再興被殺吳聞赴難死題旌彭好古妻楊氏好古郡庠生早亡氏年十八悲號不食旬日亦死得合葬焉題旌張春妻毛氏郡人萬厯二十六年播賊殺春將執毛氏去氏抱夫尸厲聲罵賊賊怒斷其手及死面猶向夫御史應朝卿題旌祀烈婦祠胡仲賢妻楊氏郡人年十六適仲賢未幾賢卒楊守節不再醮撫幼子允恭成立中萬厯己未進士題旌曹恩妻黃氏郡人天啓四年苗賊劫執黃欲汚之黃罵賊不從賊碎其身而去題旌胡允朝妻楊氏郡人允朝郡庠生死楊立志守節鎮逺監生羅某倚勢逼娶楊不從溺水死題旌以上載舊志國朝趙燦妻馮氏郡人年十七適燦二年而燦亡遺孤元魁方三月氏紡績撫教成立為郡諸生守節四十七年謹言潔行戚里無間言夀六十五歲雍正十一年巡撫元展成題旌龍泉縣明安應袍妻簡氏邑人歸應袍甫一嵗應袍暴卒簡年二十哀毁踰常絶粒三日引刀自刎於棺側歐陽組妻黃氏邑人組死黃年二十茹荼守節之死靡他崇禎初年旌表冉繼勳繼妻張氏邑人父慎言萬厯癸丑進士張年十八為勳繼室勳卒張年二十八守節撫孤數十年如一日馬氏女邑司馬萬珠女年十七值播賊李保昌亂馬被執欲汚之罵賊不從賊怒裂其尸國朝歐陽榮東妻冉氏邑人榮東郡庠生年十七卒子璜甫數月誓死守節幾經兵燹節操愈勵教璜入庠食餼康熙八年巡撫佟鳳彩題旌以上俱載舊志思州府明徐萬謙妻范氏徐萬顯妻戴氏徐鵬妻余氏俱郡人范年二十九戴年二十七余年二十二三氏同居值銅苗攻城劫去相挽投河而死巡按宿應麟旌曰一門三節盧蕙妻寧氏蕙官經歷蔣輝妻徐氏張自秉妻何氏楊勝舉妻姚氏勝舉監生熊觀海妻范氏熊仁妻范氏周氏女土官周廷圭女以上七氏俱郡人值苗賊猖獗同時遇難義不受辱挺身迎刃而死萬厯十七年題旌張羽妻許氏黃道司人羽無子許為娶妾生子羽故妾亦隨沒許年二十七誓不再適撫孤成立夀七十提學吳國倫旌之張價妻高氏黃道司人價故高年二十二以姑老子幼遂守節事親撫子孀居五十七載奉旌高逵妻何氏妾吳氏郡人逵生三子長梁楷何出次梁楹及季吳出逵沒三子俱幼吳以身殉何守節撫三子無異視後楷登萬厯戊午鄉試官知府楹中萬厯丙午鄉試官副使請於朝旌表有烏懷集何熊妻田氏郡人守節四十年奉姑教子里有芳聲奉題旌王應朝妻高氏陳洋妻曾氏俱郡人年少家貧撫孤成立流離不改其操高良栻妻周氏郡人年二十二夫亡遺子士俊甫二嵗士哲甫四月守節撫孤垂四十餘年完貞以殁二子俱食餼於庠崇禎末題旌國朝周祚昌妻徐氏郡人祚昌選貢早卒徐孀居三十九年而沒人稱其完節徐耀妻任氏耀郡廪生文行素著避亂扶羅為袁韜兵所逼任氏以身殉焉以上載舊志吳通相妻劉氏郡人年二十四夫故子幼家貧苦節四十八年教子孫均入黌序康熙五十年巡撫劉蔭樞題旌鄒士昌妻冷氏郡人年二十三夫故孝事孀姑教子繼聖延聖近聖紹聖兄弟四人俱以文行顯裴定朝妻陳氏郡人年二十七夫亡事衰翁撫半齡子備極艱辛曲盡孝慈守節三十餘年楊昌祚妻陽氏郡人年二十一夫亡在外翁姑相繼沒拮據喪葬貧不能存諸親勸其再嫁誓死不二寄食於子姪之家苦節三十九年許登甲妻劉氏郡人年十三父母俱亡歸登甲二十二歲甲故遺一孤翁姑欲嫁之劉誓死不從守節四十九年以上四人雍正六年巡撫祖秉圭題旌蕭蘭妻姚氏郡人年十六適國學生蕭蘭甫八月而蘭故上無翁姑下鮮伯叔零丁孤苦之死靡他撫姪為嗣教育成立守節三十四年雍正八年巡撫張廣泗題旌張士良妻楊氏邑人年二十夫故守貧食力遇變不渝孀居三十八年完節無虧闔郡請旌尚朝覲妻龔氏郡人年十九適尚朝覲年二十六朝覲亡家甚貧窶姑老子幼氏躬執樵牧茹荼守節中野猝遇強暴毁形拒之年七十五卒巡撫元展成題旌凌琦妻蔡氏郡人年二十四適凌琦年二十九琦亡子萬象四嵗女一嵗氏飲冰茹蘖紡績代耕子女婚嫁以時以禮七十六嵗卒巡撫元展成題旌玉屏縣明洪鏜女平溪衛人年甫十三父病侍藥嘗糞衣不解帶正德時題旌奉旨建孝女坊旌表侯正一妻夏氏衛人夫早殁柏舟矢節課子位成進士官都御史夀百嵗時大學士霍韜奏請詔賜肉帛歲遣湖廣都司至家存問二次卒年百有二歲諭祭葬誥封夫人許可妻張氏衛人可為指揮氏年十九可亡守節撫孤承襲夀八十六歲隆慶三年奉旨旌表鄭東效妻劉氏衛人年十九夫亡撫遺腹子孝盛守節六十七年督撫表其門曰介石清操張其威妻洪氏衛人年十九夫亡撫遺腹子四維成立夀九十一撫按旌奬劉廷獻妻許氏衛人明末避亂西溪高寨賊袁宗第劉體純猝至圍寨氏懼為賊辱自縊死公舉旌奬茆大綬妻陳氏衛人年二十二夫亡守節二十六載潰兵入衛懼為所辱擕一子一女投江死袁良相妻許氏衛人年二十四夫亡守節二十五載潰兵陡至氏觸牆破面被兵所殺萬年春妻葉氏衛人年二十二夫亡守節五十八年夀八十卒國朝洪瑄妻劉氏瑄邑增生氏年二十四瑄沒無子撫姪其哲為嗣孝事舅姑得其歡心及卒葬祭盡哀盡禮苦節三十年教其哲有義方雍正七年巡撫張廣泗題旌清溪縣國朝朱當銑繼妻鄭氏邑舉人鄭逢元女當銑貢生氏年二十六夫亡時值兵亂矢志守節撫前妻子令聞及己子令望克盡義方令聞應歲貢旋卒撫三孫慈愛更篤後令望亦列明經三孫皆遊庠苦節五十餘載朱之琦妻黃氏邑人庠生黃士俊女年二十夫故家極貧窘矢志守節事翁教子以慈孝聞以上二人俱康熙五十四年湖南巡撫李發甲題旌銅仁府明劉仁女辰秀妾郭氏張氏辰秀郡人梧州通判劉仁次女年十六隨仁之任仁卒於官女扶櫬還至昭平莞藤灘值猺獞劫舟恐為所汚挽二妾郭氏張氏同赴水死巡撫御史蕭端蒙以其事聞旌其門曰清流三烈建祠祀之楊淳妻蕭氏烏羅司人年二十二夫喪撫遺腹子誓無他志節孝兼備當事重之旌曰孀居苦節黃偉妻明氏烏羅司人夫故氏年二十七誓不再適孀居四十餘年冰玉無瑕事母姑至敬至孝巡按御史郜光先旌曰節孝國朝盧龍雲妻徐氏盧龍鼎妻何氏俱郡人值兵亂逼城二氏恐汚俱自經死康熙九年奉旌以上載舊志何一鳳妻孫氏一鳳維揚人隨征把總因辦理軍裝卒於洞庭孫年二十六止生一女遺腹又生一女家極貧賴針黹糊口閨範極嚴動必以禮及長慎於擇配後二女皆封恭人守節五十七年至八十三嵗卒劉世泰妻沈氏郡人夫故時氏年二十一家極貧撫孤矢志靡他事孀姑生養死葬皆克盡禮守節三十餘年以上二人俱雍正六年巡撫祖秉圭題旌楊為光妻薛氏郡人年二十三夫亡孝事翁姑撫育幼子始終無二志苦節四十四年雍正八年巡撫張廣泗題旌銅仁縣國朝黃承恆妻吳氏邑人年十九適庠生黃承恆年二十一承恆亡時值兵燹氏拮據守節事翁姑鞠弱子備極勤劬六十四嵗卒學使郡守屢加旌表巡撫元展成題旌黎平府明卜夀妻高氏郡人夀戌新化所髙從之紡績以居夀卒高年二十九遺令善事他人高曰妾從君跋涉酸楚所以不忍死君在耳君沒妾何用生既葬夀遂自經時人義而哀之王言妻袁氏郡人百户袁傑女幼許配舍人王言嘉靖五年言方一十四嵗父指揮以侵軍餉出亡逮言監追年久産盡遺書袁氏父母令改嫁袁誓死不聽四十一年恤部鄒郎中憫言久禁憐袁矢志暫縱言歸完娶旌曰三楚遺烈甫二月言復入獄隆慶三年言死袁守節如初御史雷稽古題稱王言代父追贓係四十年無辜之禁袁氏未婚苦節守四十載有夫之寡旨下免贓旌表復其家張啓泰妻陸氏郡人善事翁姑殷勤定省久暫一致嘉靖三十八年督撫賜孝婦匾旌之詹華妻姚氏唐英妻李氏英百户曹紀妻汪氏俱郡人夫死守節旌奬以上俱載舊志國朝王象巍妻徐氏郡人象巍庠生早亡徐年二十四貧苦無依矢志守節教子國正為諸生居孀四十餘年潔白如一日雍正二年巡撫金世揚題旌何騰蛟妻王氏郡人騰蛟從明桂王子由榔在粵大師入黔欲執氏以招騰蛟遣總兵陳友龍達意氏泣曰氏可死不可降且夫為忠臣氏獨不能為節婦乎遂自刎閔氏女郡新化所人貢生閔於行長女年十八流賊將臨境女與嬸朱氏約曰我輩義不辱賊至則以死殉耳嬸曰如女言因各懷利刃賊至強執女手女厲色罵曰妖魔敢汚我手遂自刎賊衆咸義之開泰縣明胡某妻舒氏媳汪氏五開衛人失其夫名流冦郝永忠攻陷五開舒暨汪俱被執賊搒掠舒索餉汪以身翼之姑媳並罵賊而死鍾貴妻王氏衛人貴官指揮同知氏年二十八而貴亡撫尸悲慟屢絶復蘇水漿不入口者七日殮棺盡禮事姑以孝聞鞠子秀朂以義方長襲父職周經妻伍氏衛人年二十夫故氏哀毁欲絶紡績奉姑誓不他適孀居五十載以禮自防足不踰閾雖至親未嘗得見其面黃緯色妻胡氏衛舉人胡可成女適生員黃緯色時高李賊兵焚劫州衛氏扶姑避山谷中姑病不能行賊至氏不忍獨去並被執氏與姑訣曰二子在逃黃氏之鬼可無餒矣媳義不辱因以首觸石不死及渡河又躍身投河仍不死賊扶以登岸氏引頸觸賊佩刀賊義而釋之國朝盧鎮妻朱氏邑人年十七適盧鎮年二十鎮亡氏矢死守節翁姑養葬式禮莫愆撫遺腹子王正讀書入學巡撫元展成題旌錦屏縣明張能妻張氏銅鼓衛人能為中所百户氏年十八夫亡誓不獨生視夫殯殮自縊而死得合葬焉李泰妻王氏衛人泰本衛指揮舍人氏年二十夫亡誓死不嫁靖州知州詳請題旌王鯨妻胡氏衛人鯨廪生氏年二十五夫殁其兄強奪其志不從自縊而死通學公舉撫按並加奬勵唐武妻林氏蔣鸞妻王氏樊道妻劉氏徐士雄妻林氏張鈺妻錢氏以上俱衛人年少孀居族寒家苦誓死堅貞白頭完節許安國妻趙氏衛人安國中所應襲百戶趙年十八夫亡苦志守節歷四十三載而殁楊嗣亨妻白氏嗣亨千戶張鳴雷妻丘氏俱衛人二氏年少苦節辟纑自給教子成名樊登庸妻沈氏衛人登庸廪生卒氏青年茹苦晚節愈堅教子成家年登九十而卒曹之元妻王氏邑人年十八夫亡時當兵燹之會志死不變守節完貞撫二子成立年八十餘嵗而卒大定府明靄翠妻奢香靄翠水西宣慰翠死妻奢香代立總其衆時都督馬􅎡守貴州欲盡滅諸羅而郡縣之會香有罪裸撻之欲以激諸羅因為兵端諸羅果怒思反香止之曰毋諽吾為訴天子遂馳見太祖自陳守土功及馬􅎡罪狀太祖曰朕為汝除馬曄何以報我奢香曰貴州東北間道可入蜀願刋山開驛以供往來於是遂殺曄封香為順德夫人厚賚遣還命所過皆陳兵以耀之舊志國朝者架聘妻直額者架苗民聘直額為妻未娶父母惡架貧欲另為擇配額堅志不從強逼之遂自殺康熙二十九年巡撫田雯題旌陳尚魁妻程氏郡人尚魁庠生卒時陳年二十七紡績奉翁曲盡孝道教子繹成立為州庠生雍正元年巡撫金世揚題旌劉起沛妻孟氏郡人起沛大定協兵丁雍正十年冬出師台拱氏在家奉養病姑沛兄起澤窺氏少艾以言挑之氏變色峻拒至夜恐為所逼遂抱女就宿姑室澤醉歸奪門入欲姦之不從怒殺氏併及其少女雍正十一年巡撫元展成題旌置起澤於法楊天貴妻溫氏郡人年二十一適本郡兵丁楊天貴孝事姑嫜克修婦順雍正八年天貴從征古州病故訃聞氏哀號昏絶欲以身殉姑苦勸終不解會夫同伍人帶夫所遺汗衣與氏氏益悲慟即服夫遺衣閉門自經死平遠州國朝諶會恩妻胡氏州人年二十六夫亡止遺二女家貧苦節顛沛流離不改其操孀居三十餘載康熙四十七年巡撫陳詵題旌李孝貴聘妻周氏州人周士俊女名賽玉幼許字同里李孝貴未嫁而貴死即自縊時氏年十七雍正元年巡撫金世揚題旌李起元妻劉氏州人起元廪生卒時劉年二十八家貧守節上事舅姑下撫幼稚備極艱辛後長子蔭登賢書藝蒔遊庠雍正二年巡撫金世揚題旌俞鵬程妻張氏州人年二十二夫亡翁姑垂暮遺孤國佐未周嵗張紡績以供甘旨給束修國佐遊庠食餼張苦節三十八年張期賢妻熊氏州人年十五生子仲友歷兩載而夫殁立志守節撫孤遊庠未幾子媳繼殁孫松方襁褓又撫育教之成立苦節四十餘年康孟汲妻丁氏州人丁孟泰之女年二十四夫卒遺孤甫周歲家貧無依氏立志守節養葬鰥翁人稱盡禮教子仲禮為州庠生苦節三十餘載以上三人雍正四年巡撫何世璂題旌黔西州國朝朱元佐妻桂氏州人年二十夫沒遺孤長年甫一嵗翁姑憐其少欲令他適時以隱語諷之氏乃斷髮以自誓奉侍翁姑曲盡孝敬姑寢疾輒默禱於天求以身代後丁二喪殯葬如禮鞠弱子多方保護卒能成立守節三十餘年屏絶鉛華足不出戶康熙六十一年督學張謙表其門曰性秉松筠陳永祚妻張氏州人適陳永祚年二十三永祚亡子吉甫時在襁褓夫家母族兩無倚賴守節四十一年諸孫繞膝巡撫元展成題旌威寧州明陸廷富妻楊氏烏撒人廷富生員卒氏守節不二撫按旌奬秦郁妻顧氏衛人夫早逝翁姑逼之改嫁誓死不二建坊旌表陸文俊聘妻楊氏衛人許字文俊未婚而沒楊哭曰我陸家婦也復何往遂歸於陸善事文俊父母冰霜自持事聞賜坊表揚祖應昌妻王氏應昌衛指揮天啓二年烏酋入寇死之王貞潔自守撫子成立題奉旌表賜坊曰矢志柏舟李貞聘妻吳氏衛人吳惟允女許聘軍士李貞未婚貞調戍金齒父母將改嫁之女曰吾受李氏聘即李婦也引刀斷髮誓不他適守節五十九年題旌以上載舊志鄒承恩妻謝氏媳蔣氏女鄒氏承恩為烏撒衛普德站百戶病沒謝年三十守節長子道純妻蔣氏亦未三十而孀居天啓二年烏酋入寇攻圍可渡清水溝七閲月破之謝率長女及媳蔣氏擕手投崖而死張允德妻毛氏烏撒衛人年十八烏酋圍清水溝夫婦俱投崖死闞大興妻劉氏女闞氏烏撒衛人烏撒之亂氏隨夫投崖死女亦殉焉余近聖妻闞氏衛人烏酋之亂投崖死具題請旌表鐫石道旁國朝李天挺妻陳氏衛人陳茂麟女天挺庠生早卒氏年二十七時兵荒米貴鬻簪珥易米以奉孀姑自鋤田種荍以育子辛苦備嘗撫子灼如為諸生守節五十年浦之琰妻孫氏州人庠生孫世琮女秉性端莊適庠生之琰二十七而寡家甚貧乏竭力以事舅姑課三子聨雲聨瀛聨灝俱為諸生夀至八十餘歲以上二人雍正三年巡撫毛文銓題旌畢節縣明林晟母蔡氏晟官指揮正統末苗夷叛圍城官軍皆調征平越晟亦守備貴州城中無一可恃蔡散家資募精兵併僮僕登城拒守凡三月冦無所掠解去蔡率衆躡之冦大潰敗時稱女將軍云李麟妻閻氏邑人適生員麟卒氏年十九斷髮自誓守節四十年嘉靖二十七年題旌羅琛妻徐氏邑人琛生員氏年二十三夫亡子雲方十日守節四十餘年嘉靖二十七年題旌陳琢妻歐陽氏琢生員聶貴妻章氏俱赤水人少寡堅節終身嘉靖間題旌以上載舊志國朝顧應祥妻周氏邑人應祥卒周年二十九子萬民甫三嵗時遭兵燹轉徙流離矢志撫孤備嘗艱苦後萬民夭亡復撫孫成立守節五十餘年樊綬珍妻傅氏邑人夫亡時年二十一長子甫二歲次子遺腹父與伯翁俱勸改適氏堅志不從其後弟死父無依迎養於家喪葬成禮守節三十餘年以上二人康熙四十三年巡撫陳詵題旌李禹甸妻邰氏邑人年十六適儒童李禹甸甫年餘禹甸寢疾垂革氏有娠數月晝夜悲泣指腹謂其夫曰幸生男願撫孤以延宗祀若生女則相從夫子於地下耳夫沒越兩月舉女氏整衣拜夫靈盡哀遂扄戶自經雍正十一年大定知府陳德榮詳請題旌南籠府國朝桑蔚林妻葉氏郡人葉重華女蔚林庠生早卒氏年二十五家貧苦節事孀姑盡孝姑殁喪葬俱遵家禮教子月正及孫鳳鳴俱遊庠雍正二年巡撫金世揚題旌朱國永妻廖氏郡普平市民廖榮夀之女適候補經歷朱國永生一女康熙二年妖夷作逆劫掠普平市國永遇害虜廖氏欲汚之氏紿曰少寬當如命乃潛取刃先斃其女遂自刎於夫尸旁普安州明沈尚綸妻汪氏子沈珠妻陳氏州人米魯之亂汪陳姑媳同被賊掠雙節不汚偕死於難柳升妻范氏守備柳之文祖母石有才妻嶽氏王鐸妻蔣氏俱州人米魯之難同陷於賊皆不辱死蔣橋妻吳氏州人天啓壬戍水西賊安邦彥叛攻圍州城城陷合家被執擊橋垂死吳請以身代賊執刀脅之吳乃紿賊遙指火光中曰吾有所藏甚富當為君發引至其地躍入火中自焚死子克達被執入烏蒙四載逃歸登崇禎丙子鄉試庚辰進士官御史崇禎十三年巡按馮晉卿題賜旌表邵以嵩妻吳氏州人嵩中萬厯壬子鄉試第一官知縣吳與蔣嬌妻吳為姊妹皆被賊執不屈同赴火死時人稱為火裏雙蓮云以上俱載舊志安南縣明蕭律妻宋氏邑人適指揮蕭律律卒誓不再嫁撫孤叢承廕未幾叢卒復撫孫時中移居墓前備嘗諸艱夀八十有九隆慶四年御史蔡廷臣題旌李遵妻楊氏邑人年十六歸百戶李遵諫夫被逐依母氏一十二年夫悔悟復迎歸僅二載生子棟遵卒楊紡績度日撫棟承襲年踰七十萬厯初御史楊允中題旌何俊妻唐氏邑人夫亡時氏方少艾父母舅姑欲奪其志辭曰人之異於禽獸者以其知廉恥有操守耳吾寧死決不再事他人苦節終身事聞旌表梁冠妻王氏邑人冠指揮卒王年十七守節四十餘年奉旌王維垣妻宋氏邑人年二十夫亡宋矢志守節孝養舅姑撫遺子成立巡撫薛繼茂旌之陶汝龍妻蕭氏邑人年二十九夫故誓死靡他教子九苞成名歷官州牧巡按劉士正胡平運表其門復以米帛優奬之梁應嶽妻宋氏應嶽邑庠生卒宋年十九哭泣喪明甘貧守節終養舅姑歷年六十餘清操無玷巡按劉士正胡平運奬之以上俱載舊志國朝郭應洪妻吳氏邑人適庠生郭應洪洪卒於滇吳年十九盡鬻嫁奩泣請夫兄搬柩歸葬有豪家逼娶吳鑿齒以拒之事鰥翁盡孝撫未周子士信成立為明經吳讓妻武氏邑人適庠生吳讓氏年二十二夫亡遺二子觀覯尚幼又遺腹生子覿家貧茹荼或欲奪其志氏奔避外家連遭歉歲其守愈堅教三子皆遊庠以上二人康熙五十二年巡撫劉蔭樞題旌趙應魁妻王氏邑人年十八歸趙家極貧夫為營卒氏績絍以奉舅姑舅病噎王易酥粉以給膳養及夫故王年二十九守節撫三子事舅姑愈孝謹苦節三十餘年鄭廷試妻蔡氏邑人年二十二歸廷試二十八夫亡遺二子俱幼有勸之嫁者輒正色拒之日擕二子採荼充腹親戚或憐而周之固却不受苦節三十餘年以上二人雍正四年巡撫何世璂題旌吳君輔妻張氏邑人適庠生君輔氏年二十八輔亡矢志守節代夫孝養二親教二子讓謙俱為諸生未幾讓卒偕媳武氏撫孫成立至七十七歲夀終雍正七年巡撫張廣泗題旌遵義府元楊道妻陳氏郡人至元間夫卒守節致和元年楊漢英上其事詔旌表封淑德安人明楊護妻田氏郡人永樂間護卒於京田聞之哀慟絶食逮櫬歸即自經死被旌張九鵬女郡人小字妹哥事母孝母龎氏病篤割股以進遂愈人以為難守令旌其門韓登聨妻王氏郡人登聨病數月王割股救之事姑盡孝府縣旌曰孝婦之門後聨再病子續愈亦割股以療父疾母子孝義兩全鄉人咸稱之周鎮妻汪氏郡人幼通經史能詩鎮歷功升遵化參將偕汪之任崇禎末戰死汪聞變刺血作雉經歌八章偕姑及夫妹俱投繯死事聞封墓贈祭羅氏郡人失其夫名夫被賊殺羅罵賊而死奉旨旌表王治民妻都氏郡人治民庠生流寇陷遵治民率家口避居湄潭之菖蒲塘遭亂兵殺其子及僕虜氏欲汚之時氏年二十七罵賊而死劉漢鼎妻張氏郡人漢鼎為郡諸生遭亂為兵所殺氏年二十五營辨欲以威劫之氏聞語其弟曰夫死義不獨生况又有外侮乎遂閉户自經死國朝楊士傑妻石氏邑人年二十夫亡姑老子幼值吳逆之變負姑擕子潛匿深山三日乏食採蕨供養姑病目無力延醫跪舐得復明後姑病篤哀號欲絶至為嘗糞及卒喪葬盡禮教子成名雍正三年四川巡撫蔡珽題旌張問明妻胡氏邑人因強暴張崇義強汚不從被殺雍正八年巡撫張廣泗題旌置崇義於法吳琪妻許氏郡人年十六適琪事孀姑孝琪殁於外氏年十九聞訃慟號兩晝夜遂絶食投繯而死遵義縣明王巡妻何氏邑人流寇入遵氏避亂於豺狗坪賊突至強挾以行伏創而死楊春妻程氏邑人崇禎壬申春殉難於楚氏年甫十九遭亂兵橫逼完節無虧後屢經飢饉茹荼集蓼勵志益堅夀六十二而終國朝陳尚義妻石氏邑人吳逆之亂偕十四齡女避難為賊所逼相擕赴水死陳佩琚妻杜氏邑人蒙化府同知杜思賢長女氏許字從佩琚年十五忽得狂疾不愈翁姑欲辭婚氏聞痛哭誓不改適及歸佩琚甫一載佩琚亡氏年甫十六歲遂堅志守節事翁姑養葬盡禮有古孝婦風氏無出有婢生之子方襁褓婢亦故氏鞠育恩勤備至稍長使就傅讀書朂以修身立行子今得成立氏年五十二矣計氏守節三十六年乾隆三年總督張廣泗題旌正安州明袁端妻張氏州人夫卒時年二十七子志偉三歲父母逼其改嫁斷髮自誓守節七十餘嵗而終鄭紹勳妻羅氏州人紹勳州土官卒時命氏改嫁氏悲慟欲自縊家人嚴守之不得間守節至六十餘嵗平居雖親黨僮僕未嘗得見其面國朝曹仁聘妻王氏州人王咸宜女名正姑許字曹氏子仁未婚仁殁正姑守志不改適雍正三年四川巡撫蔡廷以竒節題旌桐梓縣明梁郁山妻冉氏邑人年二十二夫死姑欲奪其志氏知之乃佯言歸家至中途登虎跳崖上下相去千尋泣乳其子命婢負之以衣掩面墜崖而死其身不損李天根妻傅氏邑人天根廪生氏年二十夫亡無子有婢名保妹亦年二十佐氏守節以力耕紡績治生先是舅姑及夫皆淺窆傅卜吉地取二柩合葬遂廬而守之至七十七歲而卒越四日婢亦卒桐人至今憐之楊之瑶妻何氏邑人夫死何年二十二女方三歲子五月誓不再嫁有豪悍欲強娶之氏度翁姑孱弱必不能免遂仰藥死傅天鑑妻黃氏邑人年二十夫亡二子方離襁褓遭楊酋之叛播越艱辛克免於難勤苦教子元泰登歲薦元弼廪膳生卒年八十有六督撫旌奬之黃以素妻傅氏邑人以素貢生年未三十而亡遺兩孤傅慟絶復蘇曰吾從夫死無益不如教子以繼夫志自束甚嚴教子維謹次子隆中有聲庠序年登七十而卒熊文藝妻毛氏邑人年二十七夫死守節踰七年值兵亂聞孫可望有許兵奪孀婦幼女之令急奔往投崖家人救之得免教子如為庠生至七十三歲卒洪圖奠妻傅氏邑人圖奠庠生崇禎間赴國學值李自成陷京師遇害婦年二十無子依外家守節五十二年卒金玉繩妻張氏邑人玉繩廪生氏年二十八夫亡家貧子幼紡績苦節教二子皆遊庠令狐懷周妻蔡氏邑人夫病危藥不能起割股進之立愈縣令以苦行堅貞表其門國朝熊京妻黃氏邑人年二十四夫亡子之璉甫一歲紡績苦節事孀姑盡孝撫孤成立雍正六年巡撫沈廷正題旌趙蘭薰妻吳氏邑人蘭薰庠生氏年二十九夫亡子方半歲出妝奩以供紡績督臧獲以勤耕種撫子成立清操四十餘年王緒妻張氏邑夜郎里人年二十二夫病祈天願以身代及卒守節訓子為庠生孀居三十載以上二人雍正七年巡撫張廣泗題旌綏陽縣明何烈女邑人小字大妹許字未嫁壻出不歸父母渝盟改適紿以壻歸迎娶至中途女覺其異奪從人佩刀自刎天啓間賜坊旌表熊某聘妻劉氏邑人庠生劉漢儒妹許字都勻教授熊文豹季子隨父之任值綏地兵亂有強暴欲娶之自縊死黃氏女邑人庠生黃文艷女年十四賊姚黃袁韜冦綏陽文艷擕家避山箐中賊搜箐驅文艷出擊以刃女抱父號哭賊捆置馬上女罵不絶口賊殺之熊氏二女邑人長年十六次年十四貢生熊文豹女避亂居黃魚江賊至大肆劫掠家人俱逃避二女義不受辱登樓對縊死賊嘆息而去國朝夏嗣聖妻張氏邑人嗣聖庠生氏年二十二夫故守節不渝孝事翁姑課子之瓊為邑庠生苦節六十餘年郭憲汾妻陳氏邑人孝亷陳仔女年二十一夫亡守節孝事耄姑喪葬盡禮撫子禾成為邑諸生苦節六十年夀八十一卒丁大椿妻雷氏邑人年十九于歸逾年夫卒遺腹生子振先躬操井臼孝事翁姑教子成名守節四十餘年鄭紀妻馮氏邑人年二十五夫亡矢志靡他紡績奉姑教子成立苦節四十二年夀六十七歲以上四人雍正七年巡撫張廣泗題旌趙應宗妻陳氏邑人陳于福女年二十夫亡服闋翁姑憐其年少無依勸之他適氏以死自誓曰生為趙婦死為趙鬼不即死者為高堂饘粥計且痛夫無後不忍墓田荒草耳倘不我憐當即赴黃泉矣翁姑泣下聽其守節翁姑殁隨父母以居年七十三卒知縣李鎧為之立傳任先型聘妻韓氏邑人名夀姑庠生韓嗣昌女許字先型年及笄任氏子病瘵未婚一日夀姑晨起聞烏鳥哀啼不已駭然曰若人死矣訃至號慟不欲生遂裂壻家所送白布封髮父母欲改字誓死不從乃歸任宅哭拜壻墓事翁姑以孝聞撫姪為嗣年五十餘癯然一老處子也梅氏女邑朗星里人許字富室富人子薄氏家貧結土豪詣梅悔盟氏父朴怯懦允其退氏聞之大恚以首觸柱家人救之得不死至夜自經張睿妻王氏邑人幼聰頴通詩書年二十而嫁未期而夫卒題詩曰自尤妾命薄如箋初賦桃夭失所天未老姑嫜還有托綱常豈獨讓人先遂以身殉知縣陳詢表其墓曰張烈婦之墓仁懷縣明王銘妻鍾氏邑人銘死遺孤四歲家計寥落氏勤紡績孝事翁姑訓子成立孀居五十年李睿妻胡氏邑人睿好獵氏泣勸感悟氏年十七夫卒閲六月生遺腹子深值年旱襁負箐中採薇療飢夀至六十六歲人稱苦節王端妻方氏邑人于歸一年夫病篤囑曰爾孕方五月待娩畢不論男女皆改嫁氏泣曰天若不絶君嗣倘得男願相依為命及端卒生子廷珏撫之成立守節終身續編國朝貴陽府韓儀妻黃氏貴築縣人年十七適儀二十歲夫亡生子懷瑾矢志守節事翁姑生養死葬鄉里稱孝家貧淡泊自甘教子懷瑾得中武舉乾隆四年總督張廣泗題旌吳珮妻羅氏廣順州人庠生羅象極長女年十六適珮二十三歲夫亡生子三長世爵六嵗次世官四歲三世儒尚在襁褓姑老子幼矢志不嫁奉姑以孝晨昏定省不離左右及姑沒稱貸以葬教三子成立次子世官為州庠生乾隆四年總督張廣泗題旌向祖興妻李氏廣順州人年十八適祖興二十七歲夫亡子朝陽甫四齡二女俱幼家徒壁立紡績自供撫朝陽及二女俱成立婚嫁守節四十六年乾隆四年總督張廣泗題旌貞女何氏開州人何人鳳季女許字前明錦衣衛同知許延禧第三子仔未歸仔病痰迷症成廢疾貞女兄子澄即延禧壻延禧謂子澄曰仔病在不治爾妹當改字子澄告其母貞女以死誓欲往侍湯藥延禧絶之志不得遂涕泣纍日不飲食母諭之曰爾勿以死速我之死好依我膝下貞孝俱不失矣及母殁貞女已五十一歲兩家欲請旌奬不許雍正二年仔始死貞女聞知為服喪三年夀八十歲卒乾隆五年總督張廣泗題旌何子澄妾丘氏開州人年十七適子澄為妾子澄任昌化縣令以終養歸適值其母沒子澄旋卧病囑氏撫其二子氏泣以死自誓及夫亡氏年二十八歲甘守節不嫁教二子讀書延師訓之不少假以顔色長子旭州庠生次子昻乙卯科舉人乾隆五年總督張廣泗題旌何子洪妻吳氏開州人重慶府知府吳中蕃女年二十一適廪生子洪二十五歲夫亡孝事兵姑視夫在日更加時刻不離左右有疾親侍湯藥日夕禱於神以祈姑夀子曾二歲而孤姑憐之至十歲猶不令就外傅氏請至再三曾始得入孰旋亦成立乾隆五年總督張廣泗題旌何昱妻許氏開州人安平縣教諭許價女年十五適昱二十三歲夫亡氏不欲生為投繯計婢子驚覺不得死祖姑與姑諭之曰爾已有娠其如死而斬嗣何始勉進飲食後遺腹子殤氏翁自昌化縣歸里病沒翁妾有二子氏與翁妾同心守節乾隆五年總督張廣泗題旌李榮妻姚氏貴定縣人年十六適榮二十一歲夫亡逾三月生子逢春時翁姑衰老家事艱窘氏拮據供養及翁姑沒盡哀盡禮以終大事教子逢春補弟子員乾隆二年總督張廣泗旌題陳源泰妻徐氏修文縣人年二十適源泰二十二嵗夫亡誓不欲生死而復蘇泣血喪明奉事翁姑克盡孝敬及沒竭力喪葬氏無出撫姪大愑為嗣成立遊泮守節四十七年而卒乾隆四年總督張廣泗題旌安順府趙君彩妻召氏郡人年二十三適君彩二十五歲夫亡遺腹生子健守節鞠子奉養翁姑翁年九十四歲姑年八十四歲氏事之四十餘年竭力養葬以孝著稱教健成立為庠生夀七十八歲終乾隆四年總督張廣泗題旌張恪妻章氏清鎮縣人年十七適恪二十二歲夫亡子二長咸三歲次元甫生家貧苦守飲冰茹荼事翁姑菽水承歡拮據喪葬教二子慈而能嚴讀書膏火之費出於十指俱成立為縣庠生乾隆四年總督張廣泗題旌吕瓊妻孫氏清鎮縣人孫文信女適瓊五年瓊亡有子甫周歲又殤乾隆三年七月內文信念氏青年孀居無所依賴迎歸勸氏再醮周姓氏泣而不言文信疑氏心諾乃與氏夫兄吕玫許周姓擇吉來娶氏歸向夫靈痛哭刎頸死時年二十五歲鄉里白於官鞠得其實乾隆五年總督張廣泗題旌平越府樊祚顯妻商氏郡人定番州學正商璉女秉性幽貞夙嫻姆教年十九適廪生祚顯祚顯兄祚興為廣順州學正康熙四十一年祚顯省兄卒於兄署訃至氏一號幾絶鼻口血流櫬回就窆後五日不進水漿姑劉諭之曰我老惟依汝且汝二女皆幼何可遽從爾夫地下氏乃剪爪截髮封遺父母誓死靡他守節三十六年而卒乾隆二年總督張廣泗題旌羅登聨妻唐氏平越縣人年十九適庠生登聨二十五嵗夫亡生子二長其位五歲次其昌二嵗氏矢志不嫁晝夜紡績撫育二子或有諷令改節者氏唾其面截髮自誓二子長即令就傅讀書俱入泮雍正十一年旌奬李之顗妻郭氏黃平州人貢生郭嚴城女年十九適庠生之顗相夫子敬奉翁姑孝姑林氏遘疾醫藥罔效氏割股進後姑疾愈知氏割股事抱氏痛哭氏跪地勸止氏有五子煥唐早遊州庠雍正十三年苗叛之顗舉家避於老鼠關莊上莊苗潛引賊入翁姑與夫皆被害氏大呼罵賊撞石死其女二姑年十五亦隨母撞死有僮關保甫十二嵗負其周嵗兒元善逃免煥唐等以出外瞭賊免乾隆三年總督張廣泗題旌陳一德妻余氏黃平州人前明指揮余洪烈女年十三適明指揮陳一德至二十二歲一德為流寇孫可望所害二子天錫天寵俱幼氏痛夫慘死誓守冰孽時當兵燹之際姑老且病氏藥必親嘗衣不解帶者纍月及殁盡哀盡禮人稱孝婦子天錫本州庠生天寵任貴築縣學訓導乾隆二年總督張廣泗題旌吳攀雲妻馮氏子士元妻鄭氏黃平州人年二十適攀雲二十二嵗生子士元甫旬有二日夫亡內無期功之親艱苦守節有田三畝不敷饘粥氏紡績自給撫士元長成娶媳鄭氏數年士元又卒遺子顯光覲光俱幼鄭絶水漿不欲存活馮責之曰昔我遭家不造上無翁姑徒以弱息故不能從夫地下今我在且二幼孫呱呱而泣汝何敢然鄭乃進飲食姑媳雙節數十餘年如一日撫顯光覲光俱成立為州庠生乾隆四年總督張廣泗題旌戴綬妻黃氏黃平州人年二十適康熙甲子科舉人鎮寧州學正戴綬奉翁姑就養署中不逾年姑沒夫亦卒於官是時翁七十餘歲二子俱幼稚氏奉翁擕子扶兩櫬歸葬之死靡他竭力供甘旨教二子坐立必端言語必信出則就傅入則燃膏課讀俱列膠庠夫妾張氏生子一歲而張殁氏育之如已出年七十五歲守節四十九年乾隆四年總督張廣泗題旌胡學純妻田氏黃平州人年十七適學純家窶甚氏晝親井臼夜事紡績不以為怨二十三歲夫亡撫棺大慟矢志堅貞初氏姑改醮他姓未幾復寡衣食不給氏與夫迎回奉養晚年姑病痺手足不仁飲食動履皆氏扶持及殁喪葬盡禮夫故時子本裕甫五嵗稍長教之就學本裕或嬉戲氏即怒詈涕泗交橫慈教有成得遊州庠族姪尚裕失怙飄零氏憫之撫如已出成立婚娶尚裕物故養其孀媳撫其遺孩尤人所難乾隆四年總督張廣泗題旌孟雲龍妻張氏黃平州人年十六適雲龍相敬如賔雲龍病危氏割股救之得生者一年越明年病殁氏年甫二十有三子長侯安三嵗次侯富二嵗次侯尊一月氏絶粒纍日翁姑抱孫泣勸乃誓守節翁姑時七十餘嵗氏事之得其歡心俱逾大耋喪葬如禮居家屏絶鉛華雖至戚不相往來惟督僮僕耕鑿躬自紡績終身無笑容教子讀書飲食起居皆有禮法俱入州庠乾隆四年總督張廣泗題旌聶正龍妻廖氏黃平州人年十七適正龍二十二歲夫亡姑言我家貧乏且汝年少子方兩月不如再醮以育爾子氏正色曰無子之婦尚有能守節者矧我有子何出此言不數年姑殁喪葬之事靡不周慎甘貧教讀子成立為州庠生乾隆四年總督張廣泗題旌李維嵩妻文氏黃平州人年十五適維嵩二十三歲夫亡氏哀慟不欲生親黨以翁姑垂老子方孩提互相勸慰乃剪髮隨葬甘守冰蘖時家貧歲歉憑女工以供甘旨姑患痢久不瘳氏嘗其糞泣曰姑必不生翁姑繼殁竭力喪葬持身謹嚴親戚以喜慶相召者辭不赴長齋終身子玉五嵗而孤撫之成立乾隆四年總督張廣泗題旌周廷材妻崔氏黃平州人年十五適庠生廷材二十三嵗夫亡子學尊六嵗次學經三嵗時家貧嵗歉氏糴米奉姑已茹野菜值姑寢疾不瘳默禱於神素食三年以祈姑夀及姑殁竭力終喪事教二子讀書以繼夫志膏火之費取辦紡績學尊學經俱入庠食餼乾隆四年總督張廣泗旌題陳修聖妻趙氏黃平州人年十七適庠生修聖二十二歲修聖客死於楚訃至氏哀慟不欲生櫬歸窆訖矢志柏舟家貧姑老紡績以供饘粥姑殁衣衾棺槨事事周慎教子謹章慈而兼嚴不為姑息食餼於庠乾隆四年總督張廣泗題旌文佑昌妻張氏黃平州人年十七適佑昌二十三嵗夫亡氏引繩自縊親戚勸以姑老子幼乃不死家貧以女工奉甘旨及殁竭力喪葬翁姑忌晨哀感如初喪時持身嚴正言動不茍雖至戚亦不往來撫子祚芳成立為州庠生乾隆四年總督張廣泗題旌蔣天祚妻何氏黃平州人年十八適天祚二十一歲夫亡氏欲與之偕死以翁姑衰暮遺孤襁褓矢志守節奉翁姑孝謹飲食必立候翁卧病沈篤醫藥罔效氏焚香祝天乞救次日翁若夢醒霍然而愈翁姑殁變産營葬不足則乞貸親鄰不敢缺禮撫三歲孤兒成立為州庠生地方有司屢加旌奬乾隆四年總督張廣泗題旌王賜紱妻時氏黃平州人年十九適庠生賜紱家甚貧賜紱偶以衣物出貿易數月未知去向時夫兄賜綬往江西搬其父櫬未歸氏倩人覔夫蹤迹乃知宿於翁丙為苗賊謀害棄尸箐中氏聞誓報夫仇屢控於官苗賊五人俱伏罪並得夫骸歸葬是時氏甫二十一歲無出母欲奪其志氏乃剪髮用火燒損左面以示靡他乾隆五年總督張廣泗題旌高恆裕妻權氏黃平州人年十五適恆裕家素貧窶恆裕幾廢儒業氏勸之學願竭十指以資膏火由此食餼於庠後恆裕客死京師訃至幾不欲生翰林曹掄彬送其喪歸窆氏甘心守節姑年踰六十養葬盡孝秉躬清苦言動不茍親戚以氏年少欲奪其節即毁容自誓有子女各一子復早夭乾隆五年總督張廣泗題旌張昌妻牟氏餘慶縣人年二十六適庠生昌越三載生子擬芳尚在襁褓夫亡其祖姑及翁姑皆垂白氏事之孝敬兼至姑丘嘗患目疾氏朝夕洗舐率以為常又嘗卧病祝天割股姑病得愈後祖姑與翁姑殁拮據三喪皆能盡禮教子擬芳不以家貧廢學中乾隆丙辰恩科舉人總督張廣泗題旌毛鵬東妻李氏餘慶縣人年二十三適鵬東二十七歲生子鄴周嵗夫亡誓守節以事翁姑育幼子嗣翁姑殁先後喪葬皆能竭誠盡孝鄴八歲遣就外傅夜則課之機旁成誦乃止鄴學成遊泮雍正十三年苗叛城破鄴團練鄉勇逐賊復城經略以鄴奏聞論功得貢乾隆二年總督張廣泗題旌鎮遠府鄧鎧妻夏氏郡人年二十適庠生鎧二十四歲夫亡矢志守節奉養翁姑備極孝敬翁姑殁竭力喪葬居家嚴謹親黨稱之無間言夫亡之日子甫半嵗後得遊庠為之婚娶不料又夭與其媳煢煢孀居年七十七歲卒乾隆四年總督張廣泗題旌詹昻妻王氏郡人年二十適昻二十五嵗夫亡翁姑皆逾七十氏奉二老存殁俱克盡孝有子女各一不幸夭亡氏曰昔子不從夫地下以有此兩塊肉耳今天虐我太酷何以生為其母慰諭令婢子守視年餘苦節終身乾隆四年總督張廣泗題旌楊聖言妻李氏郡人年二十二適庠生聖言二十九歲夫亡哀慟過甚至於喪明奉翁姑孝敬本於天性其姑因翁殁時送葬折足十二載不能起牀氏左右就養相依為命有子二長林鵬次林鵑家雖貧苦不惜叉釧使就傅讀書俱為郡庠生年八十一嵗卒乾隆四年總督張廣泗題旌石崑山妻王氏鎮逺縣人年十八適崑山值吳逆之亂舉家避兵其姑失散不知死所氏哭泣不絶覔於深山獲其尸負歸封窆氏夫逺出貿易杳無音信氏憑十指度日後聞夫死異鄉痛哭幾絶於時二十六嵗無所出撫親姪為子卒年七十七歲乾隆四年總督張廣泗題旌羅春萬妻劉氏鎮遠縣人年十七適春萬二十五嵗春萬貿易客死於外聞訃之日絶而復蘇時翁姑垂白養葬多出女工所辦有子一夫故時僅六歲氏鞠之成立乾隆四年總督張廣泗題旌趙國瑾妻彰氏鎮逺縣人年二十一歲適國瑾三十歲夫亡奉事翁姑生養死葬不以貧窶稍缺居恆饔飱不繼志節愈堅有子二撫之俱得成立乾隆四年總督張廣泗題旌聶淑昌妻鄭氏鎮逺縣人庠生鄭基祚女年二十一適淑昌相敬如賓夫病三月侍湯藥寢食皆廢夫亡誓不獨生因諸孤幼弱忍死守節翁姑早殁有伯翁同居老而無子忽病癱瘓氏奉之唯謹久而不怠殁則治喪如禮性敏慧通詩書族里諸女多就學者三子教至成童始入孰親師長光暄嵗貢次光昐光曦皆成立乾隆四年總督張廣泗題旌思南府郭拱璇妻劉氏郡人貢生劉兆甲女年十八適拱璇拱璇家貧喜讀書不事生産氏亦知書勤紡績以奉舅姑十九歲夫亡勺水不入口者三日母鄭以舅姑在堂慰諭乃誓守節時吳逆兵燹舅姑以氏年少為憂氏曰新婦上憂翁姑遲暮下憂子女幼弱耳新婦有利創不足憂也及翁姑殁克終喪事居家勤儉織紝之暇翻閲書史雖卑幼不輕一見僅生一女以姪為嗣晚喜玄理手書道德經淡食終身乾隆四年總督張廣泗題旌田袚妻朱氏郡人年十九適袚二十四嵗夫亡子幼堅志守節翁姑老病氏出入扶持數年如一日及殁喪葬盡禮子禾豐康熙癸巳恩科經魁任遵義府教授孫霔乾隆戊午科解元年七十五嵗卒乾隆四年總督張廣泗題旌何特簡妻田氏郡人年十八適特簡二十八歲夫亡有子三人堅貞守志家貧無伯叔兄弟之助饔飱莫繼氏灌園種菜度日冰操彌堅教子讀書修脯出十指之餘三子皆成立長鴻正湄潭縣教諭次楚正三虞正俱列宫墻乾隆四年總督張廣泗題旌冉喬枚妻王氏郡人年十七適喬枚為繼室二十七歲夫亡悲傷之至聲淚俱絶姑勸乃止奉舅姑篤孝姑目失明左右就養不離頃刻生事盡禮喪事盡哀氏無出撫前妻三歲兒鍾愛如已出慈教有方為郡庠生乾隆四年總督張廣泗題旌史正序妻楊氏印江縣人年十六適正序二十三歲夫亡翁姑衰老二子幼稚茹荼守節姑先翁逝翁病痰火扶持調護歷年不倦先後喪葬不遺餘力人稱孝婦教子耕讀次子直書為縣庠生年七十一歲卒乾隆四年總督張廣泗題旌石阡府張炌星妻歐陽氏龍泉縣人年十八適炌星二十一歲夫亡臨窆之日觸石幾死墨面蒿簪誓死守節時翁尚在堂氏奉之甘旨不缺翁殁殯葬克盡誠孝子堅一歲即孤撫之慈嚴兼盡為邑庠生乾隆五年總督張廣泗題旌朱祖熹妻何氏龍泉縣人年十五適祖熹十九歲夫亡常欲引繩自盡家人勸以翁姑與弱息待命于氏奈何至此氏乃斷繩守節及翁姑殁前後喪葬各致其哀居恆敝衣糲食至奉先祭品必出自女工所得而後用之曰非從千針萬線得來不足以盡我心也子爾舟教以儒業恐其不專常啼泣訓誡之學成食餼於庠乾隆五年總督張廣泗題旌思州府夏之騜妻王氏玉屏縣人年十九夫亡守節養姑甘旨不缺姑殁喪葬盡禮教二子家升家書俱列黌序孀居三十七年持身嚴謹非至戚不越閾相見乾隆二年總督張廣泗題旌陳世傑妻張氏玊屛縣人年十三即喪父母又鮮兄弟十六適世傑孝事舅姑婉娩循禮及舅姑殁貧無立錐與世傑竭力喪葬二十嵗夫亡時長子錦甫二歲次子銘甫五月氏內外無依拮據女紅以育孤孩俱得成立乾隆二年總督張廣泗題旌黎平府左文明妻王氏郡人年十八適庠生文明二十一歲生子士毅三嵗次子士吉數月文明遘疾氏割股療之不起哀號幾絶誓死守節家素貧仰事俯育惟憑紡績姑有羸病日增劇氏乃置榻姑側晨夕不離姑悲則氏絶食姑喜則氏進餐孝意誠篤教二子就傅脫簪為贄夜則以松脂代膏火二子皆為庠生嗣翁姑繼沒喪葬盡禮乾隆二年總督張廣泗題旌胡其彥妻鍾氏郡人庠生鍾良儒女年十七適其彥十九歲生子四閲月夫亡呼天搶地幾致同死乃以姑老子幼矢志守節家素寒儉氏以紡績為生奉姑甘旨不缺姑沒喪葬以禮訓子成立入泮未幾而夭氏又撫六歲孤孫備嘗艱苦乾隆二年總督張廣泗題旌汪映星妻王氏開泰縣人年十六適映星十九歲夫亡遺腹三月得生子矢志守節家貧奉姑備極孝養姑沒內外無所倚賴拮據喪葬克終大事有吳姓生女甫三日氏抱養之即以為媳不料晚年喪子止遺一孫其媳亦體姑志不肯再醮姑媳相依為命以育孤孩艱苦備至人情所難乾隆二年總督張廣泗題旌大定府曹啓茂妻徐氏黔西州人年二十適啓茂二十九嵗夫亡子五嵗女二嵗矢志守節之死靡他家貧竈常不炊氏勤紡績以撫孤兒成立婚嫁守節四十餘年面無笑容乾隆二年總督張廣泗題旌盧朝相妻蕭氏黔西州人年十七歸朝相事孀姑孝姑病親侍湯藥衣不解帶及殁哀毁終喪二十五歲夫亡以子女皆幼矢志守節家貧無立錐紡績度日撫子永和成立又夭死媳亦繼喪氏又撫其孫年八十九嵗卒乾隆四年總督張廣泗題旌熊國美妻趙氏黔西州人修文縣嵗貢生趙洪女年十七適國美二十三嵗夫亡子飛渭甫三歲姑黃年逾六十倚氏為命氏晨昏菽水竭力奉養及殁喪葬如禮教子飛渭成立為國學生孫五人皆在庠次兆周品詣更粹舉孝亷方正恩賜頂戴皆氏之遺教也夀八十七嵗卒乾隆六年署總督張允隨題旌羅溍琳妻糜氏畢節縣人庠生糜士昌女年十四歸庠生溍琳奉翁姑克盡婦道殁則喪葬盡哀二十二歲夫亡茹荼守節以禮自間非至戚罕見其面教子就學歸則泣課誦讀乾隆四年總督張廣泗題旌遵義府谷中王妻葛氏遵義縣人年十七適中王二十歲夫亡當夫病篤時氏對夫截髮矢志守節奉姑誠孝畜雞豚以供甘旨身食粗糲教子有方深夜紡績伴子讀書乾隆四年總督張廣泗旌題羅立堂妻陳氏遵義縣人年十六適立堂逾年夫亡引刃幾危夫之祖父泣相謂曰我家三世單傳吾子死今孫又死無出新婦何忍再死以重我悲耶氏姑亦勸之乃曰新婦誠不可死敬聞命矣誓守苦節夫祖父哭子孫喪明氏就養無方祖每嘆曰使我有目其孫婦乎及殁喪葬周慎煢煢孑立與姑相依為命乃請於姑以其從堂姪釗為嗣甫周嵗撫之成立乾隆四年總督張廣泗題旌貴州通志卷三十一
