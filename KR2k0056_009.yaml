body:
  text: 貴州通志卷九營建學校貴陽府府學在郡城北門外明成化間建於舊程番府隆慶二年遷府入省學與宣慰司共之萬厯二十一年巡撫林喬相巡按薛繼茂布政司王來賢提學徐秉正知府劉之龍等捐資鼎建於今地規制畢舉天啓壬戍毁於賊崇禎四年重建丁亥又毁於賊國朝順治十八年總督趙廷臣巡撫卞三元重建中先師殿後啓聖祠明倫堂兩廡戟門櫺星門教授訓導廨諸制粗備康熙元年提學副使衛紹芳捐資增修二十四年頒御書萬世師表匾額懸大成殿各府州縣學同三十年貴西道參議張竒抱提學道僉事華章志捐建名宦鄉賢祠三十一年巡撫衛既齊布政司董安國按察司丹達禮糧驛道陸祚蕃提學道華章志貴陽府知府時騰蛟各捐資重修改建名宦祠於戟門左鄉賢祠於戟門右增尊洗所於殿左望瘞所於殿右闢宫左甬道築四圍墻垣造兩廡先賢先儒名宦鄉賢各神主置祭器雍正元年追封先師孔子五代為王爵改啓聖祠為崇聖祠各府州縣同五年頒御書生民未有匾額各府州縣同七年巡撫張廣泗重修改明倫堂為崇聖祠另建明倫堂於戟門左堂後建尊經閣增備禮器樂器改舊啓聖祠為庫貯之所又建各官致祭齋宿所於櫺星門兩旁制度稱完備焉貴築縣學在府城內東北明萬厯二十八年設新貴縣學建於宣慰司學右國朝康熙二十七年設貴築縣學附於新貴三十四年裁新貴歸併貴築三十八年巡撫王燕同司道府縣公捐建於今地雍正五年巡撫何世璂重修定番州學在州城中舊為程番府學明成化十一年知府鄧廷瓚建𢎞治初知府汪藻遷建城西南隅嘉靖十五年知府杜春澤改建於中峯書院故址後移府治入省遂改府學為州學明末毁於兵後國朝康熙九年知州李益陽學正黃文焯重修復毁三十一年知州薛載德守備招國璘署學正劉湯聘共捐資增建啓聖祠東西兩廡明倫堂雍正五年知州蘇松重修廣順州學在州城內東北隅舊附定番州學明時曽建有先師殿國朝康熙三十八年巡撫王燕始題請設學開州學在州署左舊附敷勇衛學學國朝康熙三十六年改衛為修文縣州仍附之三十八年巡撫王燕始馬題設州學雍正五年知州永重修龍里縣學在縣城中行臺故址舊為龍里衛學明宣德八年副使李睿建於衛署西嘉靖間巡撫董威副使趙之屛遷於署左萬厯間復遷於署南明末圮國朝康熙十年建於今地十三年裁衛設縣因為縣學三十九年知縣李成輅重修貴定縣學在城西北隅舊為新添衛學明宣德間副使李睿建於城西成化間指揮陳林訓導周鳯建今地後毁於兵密國朝順治十七年推官張俊重建復圮教授胡王祚蕃守備邊之鉁相繼增修二十六年改衛為縣因為縣學知縣王克昌李從綱署知縣曽朝聘先後重修修文縣學在縣城北舊為敷勇衛學明崇禎三年建後圯國朝康熙五年重建二十六年改衛為縣因為縣學後圮三十一年巡撫衛既齊捐資重修五十九年知縣朱齊年增修安順府府學在府城東明洪武初建天啓二年毁四年知府孫森重修復圮國朝康熙七年建先師殿兩廡戟門櫺星門明倫堂啓聖祠五十五年重加修葺規制始備普定縣學在府城東門內舊附安順府學設國朝康熙三十八年巡撫王燕題縣學四十一年始建鎮寧州學在城內州署東北舊為安莊衛學明正統八年建後圮國朝康熙六年知州卞廷槐重建雍正十一年知州劉世恩修建崇聖祠永寧州學在州城門外舊附安南縣學題國朝康熙三十八年巡撫王燕始設州學安平縣學在城東北舊為平壩衛學明洪武間建後數遷萬厯間改建今地毁於兵僅存殿三楹四國朝康熙二十六年改衛為縣因為縣學雍正年知縣顔儀鳯增建並釐正學田為修葺費督學王奕仁有碑記清鎮縣學在縣城西舊為清鎮衛學明洪武間建燬於冦僅存先師殿國朝康熙二十六年改衛為縣因為縣學雍正三年知縣何隆遇重修平越府府學在府城內西南隅舊為衛學明宣德癸丑參議李睿創建成化二年遷建察院左萬厯二十九年設府改衛學為府學三十一年改建於府之南四十五年遷於府之東崇禎十五年知府陳紹英遷於府之西去舊學基不逺明末兵燹學宫半圮國朝順治十七年守道徐𢎞業知府喻全昱復改遷今地鼎建先師殿東西廡戟門櫺星門騰蛟起鳯坊殿後啓聖祠祠左明倫堂右學署敬一亭康熙二十二年知府裴天錫重修平越縣學在城北隅舊附平越府學三國朝康熙三十年建聖殿於今地十八年巡撫王燕始題請設學黃平州學在城內東隅舊為興隆衛學宣德九年副使李睿指揮常智建𢎞治二年指揮狄俊經厯李文祥改建城南嘉靖七年巡按陳講遷城西二十六年巡按蕭端蒙復遷舊址萬厯六年巡按馬呈圖學道李學一移建衛署右後仍遷城東國朝康熙二十六年移州治於衛遂為州學總督蔡育榮學道畢忠吉增修四十六年州進士王橒捐資重修甕安縣學在縣署右舊附黃平州學十一年知縣沈日升始建國朝康熙聖殿三間二十六年總督范承勳先題設縣學三十三年訓導楊之倡捐金另建師殿並兩廡戟門明倫堂鄉賢名宦諸祠以舊聖殿為啓聖祠五十六年知府江國正五十八年攝縣知府張棠六十一年知縣韓英重修餘慶縣學在城內西隅舊附黃平州學後又附甕安縣學國朝康熙七年知縣陳世任先建始先師殿三間並兩廡戟門三十八年巡撫王燕題請建學五十三年知縣蔣深增修湄潭縣學在城內東隅舊附黃平州學明萬厯四十八年始建學於今地都勻府府學在城內東隅舊為衛學明宣德八年副使李睿都指揮陳原建成化六年副使吳立修𢎞治六年置府改為府學知府凌文獻增建先師殿兩廡啓聖祠明倫堂尊經閣敬一亭戟門櫺星門泮池萬世宗師坊繼往開來坊騰蛟起鳯坊規制完備十年副使隂子淑重修嘉靖間副使劉望之項廷吉知府林敦復相繼增修明末圯國朝康熙六年知府黎際皡教授陳俞增建名宦鄉賢二祠雍正七年知府王鍾珣改建崇聖祠於聖殿後明倫堂於聖殿左都勻縣學在城內東隅舊附府學熙三十八年巡撫王燕國朝康題建麻哈州學在州城北門外建國朝康熙三十八年巡撫王燕題設於城南五十八年知州吳秉正移建今地獨山州學在州城北門內王國朝康熙三十八年巡撫燕題建清平縣學在城內北門舊為衛學明正統八年指揮石宣建正德十三年參議蔡潮拓地增建萬厯七年提學凌琯修縣國朝康熙十一年改為縣學後燬二十六年知許國幹訓導歐陽琛重建雍正九年知縣胡珩然加修荔波縣學在縣南門內原屬廣西建國朝康熙二十一年知縣劉棻始捐文廟於今地雍正二年廣西巡撫李紱廣題請設學知縣蘇潮增建完備十年改縣自西來屬學仍舊鎮遠府府學在府治東明永樂元年知府顔澤建成化闕年鎮陽江溢漂沒知府沈熊遷於治西嘉靖二十三年知府任佐仍徙故址建正殿兩廡戟門櫺星門明倫堂泮池齋祠亭坊並教官署明季燬於苗國朝順治十六年知府宋應星建明倫堂教授朱之光建櫺星門並前後墻垣康熙三年知府張維堅重建先師殿兩廡及名宦鄉賢等祠二十七年水災漂沒三十一年巡撫衛既齊捐資重建鎮逺縣學在縣南舊縣治基燕國朝康熙三十八年巡撫王題建施秉縣學在縣署西北舊為偏橋衛學為國朝康熙二十六年省衛入縣因改縣學天柱縣學在縣城北原屬湖南靖州明萬厯時建於城東後移城南國朝康熙二十三年知縣王復宗捐資改建今地雍正五年割縣歸黔初𨽻黎平府十二年改𨽻鎮逺府學仍其舊思南府府學在府治東北宣慰田氏舊宅也明永樂十三年自河東宣慰學遷建成化間知府王南增建正德二年知府寧閲修嘉靖間知府李文敏張鏢洪價先後修葺隆慶六年知府田稔更葺之萬厯間知府蔡應申趙恆先後增修中先師殿左右兩廡前戟門櫺星門石甃育賢井引為泮池左右列騰蛟起鳯坊殿後為明倫堂啓聖祠兩旁饌房神厨右為射圃為敬一亭左為名宦鄉賢祠為文昌閣後敬一亭名宦鄉賢祠毁國朝康熙十年知府陳龍巖重建學內舊存明督學使吳克弼頒刻經書六册并銅雲雷尊犧象尊三銅鐘十六銅磬十六銅爵八十今僅存鐘一爵七二十八年知府劉謙吉周築墻垣添製雲雷犧象尊鼎爵等銅器雍正十二年知府史瑗捐資增修安化縣學在縣城內思仁道署舊址舊附府學請國朝康熙三十八年巡撫王燕題設學知縣姚夔建於今地雍正五年知縣蔣燧重修印江縣學在縣治南明萬厯間邑人御史蕭重望疏請設學明末圯國朝順治十七年知縣劉學瀚鼎建蔣先師殿啓聖祠兩廡櫺星戟門康熙十年知縣元捷建名宦鄉賢祠三十一年知府劉謙吉知縣郎象乾重修婺川縣學在縣治東舊在縣城南明嘉靖間郡人御史敖宗慶疏請設學萬厯五年知縣國洪朝璋遷於今地九年知縣侯卿臯重修朝康熙五十五年知縣潘樹柟重加修石阡府府學在府治南明永樂十二年建正統末燬於冦成化十六年知府余志重修久圯萬厯十八年知府陸郯捐修萬厯二十四年知府郭原賔建敬一亭於尊經閣後旁勒五針並建崇聖祠名宦鄉賢二祠後復燬國朝康熙三年知府劉啓復推官陳龍巖郡紳高遴選捐資重修籠泉縣學在城內西隅舊附府學建國朝康熙三十八年巡撫王燕題四十八年知縣張其文增修思州府府學在府治左東向明永樂十一年知府崔彥俊建成化間知府王常改遷南向嘉靖元年知府張柱重修萬厯十年知府蔡懋昭改建癸山丁向中先師殿旁列兩廡左為啓聖祠右為名宦鄉賢祠前為戟門泮池櫺星門右為明倫堂左右分志道據德二齋後為敬一亭右為學廨左為起文樓禮門儒學門明末燬於兵國朝康熙六年知府陳龍巖重建規制具備置銅尊銅罏十一年知府李敷治置籩豆簠簋錫爵盞各一百錫罏瓶全鐘一講鼓一並五經四書七書通鑑性理字彚各全部三十二年知府張聖佐四十一年教授劉璧重修玉屏縣學在城內舊為平溪衛學衛屬湖廣學𨽻貴州明正德間邑人兵部侍郎侯位題建重國朝順治十八年推官許虬紳士鄭逢元等修雍正五年改衛為縣𨽻黔遂為縣學青溪縣學在城內北山下舊為清浪衛學年國朝康熙三十八年題建雍正五改衛為縣𨽻黔遂為縣學銅仁府府學在府治東明永樂十三年知府周驥建宣德七年燬正統八年知府蕭和鼎洪鈞相繼修建十四年燬天順二年知府張隆重建萬厯四十三年知府陳以耀增修明末盡圮國朝康熙二年重建先師殿啓聖祠明倫堂東西兩廡戟門櫺星門教授羅之琬增修學廨銅仁縣學在縣城外東北舊附府學設國朝康熙三十八年巡撫王燕題知縣王原修建黎平府府學在府治東育賢街明永樂十一年改征蠻將軍周驥宅建久圯天順七年知府楊緯重建先師殿兩廡明倫堂齋房教授廨饌堂號舍𢎞治間知府張綱拓而新之建啓聖祠於廟左嘉靖十二年知府夏玉麟建敬一亭於堂東南勒御製敬一針及宋儒視聽言動針心針為碑六萬厯初敬一亭圮十八年知府袁表復捐建並建櫺星戟門崇禎十年知府于元葉建尊經閣明季燬於兵國朝順治十八年知府張思房推官王文紳教授李如鼎捐資重修康熙二十四年知府劉正教授萬鍾粟增修開泰縣學舊為五開衛學屬湖廣為國朝雍正五年改縣歸黔遂縣學永從縣學在城內北隅舊附府學建國朝康熙三十八年巡撫王燕題在縣署左五十七年知縣王寧長改建今地雍正七年燬重建錦屏縣學在城東北舊為銅鼓衛學屬湖南明天順元年建後圮嘉靖三十四年重建崇禎十六年改建遂國朝雍正五年改縣𨽻黔為