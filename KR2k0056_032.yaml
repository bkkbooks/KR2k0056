body:
  text: 貴州通志卷三十二人物流寓貴陽府明伍建上虞人洪武初進士慷慨有大志以言事謫貴陽工詩文所著有木菴詩集孔文聖裔洪武初以知府戍貴州卒子孫遂家焉按察使馮成能匾其門曰闕里分潢楊慎字用修新都人大學士文忠公廷和子正德辛未舉進士第一授翰林修撰嘉靖五年以議大禮謫戍永昌嘗往來黔中多所吟咏題曰流寓雜吟嘉靖三十二年貴州通志成屬慎為序陳邦敷字自寬乾州人嘉靖九年巡按後以言事謫新添驛丞憫驛遞之勞作養馬謠其詞悲苦楊僎雲南臨安人嘉靖丙戌進士為給事中曽請録靖難諸死節臣不報後因事謫貴州布政司理問歷官參議劉養直內江人進士嘉靖間給事中以言事謫貴州布政司照磨王學孔字魯卿安福人嘉靖癸未進士以給事中謫貴州都司經歷後歷官副使夏爋刑部郎中萬厯間因問中璫失火罪為璫所中謫貴陽府通判曽文緯萬厯間刑部主事與謝廷瓚疏請立儲謫貴州布政司照磨徐渭字文長山隂人隨父入黔占籍龍里後歸山隂詩文字畫妙絶當時公安袁宏道稱其詩為三百年中一人父鏓龍里鄉舉兄淮歲貢金鎮貴江南人以木商採辦木料至貴州㑹水西苗叛鎮貴盡輸商錢助軍需有功歷升至總兵致仕遂家於開州崇禎十六年狆苗圍城知州黃嘉雋遇害鎮貴手搏賊首被害錢邦芑字開少丹徒人由中翰歷都憲拒孫可望僞命隱居餘慶之蒲村闢栁湖與邑人士唱和從學者衆尋至龍場三潮水祝髮為僧改其居為大錯庵自號大錯和尚後歸衡山終老所著詩文甚富李瑞鶴字雪卿富順人因亂避居貴筑孫可望聞其名欲官之剃髮逃去逮逆氛既平巡撫楊茂勳以禮延為子師瑞鶴以方外服見嵗時贈遺一無所受其殁也楊遣人護喪歸著有燹餘詩集安順府明許堪洪武時舉賢良方正除河南道御史抗疏不阿謫戍普定馬場鋪後起用至鎮逺卒髙巍山西人事母蕭至孝蕭老而痼疾奉湯藥不懈母亡廬墓蔬食三年洪武十五年應貢入太學十七年以孝行旌授前軍都督府試左斷事十八年上疏墾河南山東北平荒田及抑末役慎選舉惜名器數事太祖深嘉納之後因斷事不稱㫖當罪以議賢謫關嶺仍許以姪代役後還朝建文出亡殉難死張伯裕諸城人洪武間舉賢良方正知潼關縣以鯁直不阿謫安順州吏目遂家焉陳迪華亭人洪武中戍普定曠達不羈尤長於詩王觀字孟賓嘉興人以戍家於普定開孰教授一時才俊多出其門馮侃字本謙嘉定人戍普定能文善書得顏栁諸公之妙士大夫多敬禮之李端字表正宜城人進士拜御史剛毅不撓屢忤權貴汪直憾之逮繫詔獄謫永寧經歷遷溫州守劉天麒桂林人正德初以主事建言謫安莊驛丞博學多才生徒從之者衆蕭顯山海關人成化間為給事中因言事忤㫖謫鎮寧州同顯至任政尚寬平暇則與縉紳遊覽吟咏尋遷衢州府丞終副使嚴俊别號冷水湖廣公安人寓居平壩學貫百家心通諸典以明德為本淹雅醇厚人士咸宗之又嘗寓偏橋後竟剃髮而遁汪恕字如心徽州黟縣學生初兄勝祖從征南方留戍普定歿檄恕補役時年甫十七惟一姊巳適人恕延至家拜曰弟當行戍母老在堂無他兄弟幸有先人田畝願姊盡力以終母餘年弟幸不死報德未晚也應役數年告歸養母抵家而母已歿哀痛頓絶久之乃蘇結茅為廬寢苫枕塊三年鹽酪不入口骨如柴立隆冬盛寒單衰徒跣終身哀慕每言及母輒泣如初喪時人呼為汪孝子平越府明金聲蘇州人成化間僑寓平越以文行稱於時與隱士盛仲芳張懋英遊號黎莪三隱李文祥字天瑞麻城人成化丁未進士官職方主事成化末獨進讜言直聲振於時與鄒智丁璣齊名中貴欲招致門下文祥拒之賦雨鳩詩見志有春來風雨尋常事莫把天恩作己恩之句中貴銜之以事中文祥謫興隆經歷立均差法招寨長申場禁及陳征南苗兵略巡撫鄧廷瓚竒其才特薦可任憲職尋以朝賀詣京師便道歸省母大雪中行數百里至商河溺死天下惜之所著有檢齊遺稿行於世陸燦蘇州人正德中以兵科給事中抗疏劾張璁桂萼之奸謫平越驛既而霍韜以疏薦燦燦曰天下事大壞於僉人之手尚欲以餘波及我耶卒不起陳溱湖廣蒲圻人天順間以户部主事謫居黃平以詩文開導後進司馬星號賓虞山隂人同弟昌流寓黃平設帳授經從者甚衆死葬東郭每嵗春秋門下士為展墓胡澥澧州人崇禎間河南提學以忤强藩謫戍興隆衛張同敞號别山江陵人宰相張居正曽孫以忤强藩謫戍興隆衛後起用至兵部侍郎死難都勻府明廖駒字致逺順昌人宣德中從戍都勻以詩名宣慰司宋斌延教諸子號强恕先生著有强恕齊集張翀字子儀栁州人嘉靖癸丑進士授刑部主事疏論嚴嵩專權廷杖謫戍都勻勻士構讀書堂從之遊號鶴樓先生又構龍山道院問月樓著有問月賦隆慶間召為吏部郎歷官刑部侍郎鄒元標字爾瞻號南皋吉水人萬厯丁丑進士觀政刑部疏論輔臣張居正廷杖謫戍都勻日惟講明王守仁良知之學尋鶴棲舊迹與勻士共相切劘居六年陶然自得絶無幾微怨懟所著有雲中存稿刪後詩龍山志奏疏補遺等書萬厯癸未召還授吏科給事中未嘗一日忘黔也其門人給諌陳尚象舉人徐顯鳯吳鋌等於其講業處創建書舍中丞江東之題曰南皋書院為之記劉宇烈四川人萬厯丁未進士以兵部右侍郎奉命防剿崇禎七年謫戍都勻鎮逺府明何孟春字燕衆栁州人𢎞治朝進士歷任雲南巡撫轉吏部侍郎髙祖何仁海明初戍偏橋祖義堅積軍功升偏橋衛指揮孟春因當時衛未設學乃歸應試及貴建坊於偏橋所著有餘冬序録王士昌禮科給事中萬厯間以建言立儲忤㫖降鎮逺縣典史黃龍光江西人官少卿以忤魏璫戍偏橋崇禎初召還鄧渼江西人官巡撫為魏忠賢所惡戍清浪思南府宋夏大均政和間番部長田祐恭被召入覲拜伏進退不類逺人徽宗異之問故對曰臣門客夏大均實教臣上悅厚賜之拜大均為保州文學明賴嘉謨江西萬安人父潔選府幕嘉謨隨之聰慧過人嘗從舉人李渭遊好學不倦日夜與同門交相切劘後數年歸成進士歷官四川左參政徐雲從字時際江西人少從羅念菴唐荆川遊聞郡人李同野興學黔中負笈逺從終身不忍歸每與朋友講學多所規益時吐危論同志嘗稱之曰坐無徐子諤諤罔聞其以直諒見重類如此郭如星新安人吏科給事中萬厯間與同官陳維春疏論楚璫郭奉謫印江縣典史胡平表號不陂雲南臨安人舉人歷官四川保寧府推官值奢寅叛親冒矢石大小數十戰力保危疆超升太僕寺少卿管布政司事後致仕歸㩦子遵寓安化國朝謝國楩天台人舉人任石阡推官至思南愛梵淨山留焉值冦氛徒居印江得黃庭羡門之學與人遊能數日不食詩文小楷皆可名家印江人士多就學焉年九十餘卒石阡府明劉清益都人成化間以刑科給事中謫石阡府經歷文章政事為時所稱思州府明余翺江南人進士官四川道御史嘉靖間以議大禮謫戍平溪熊明遇進賢人進士官侍郎天啓中忤魏忠賢戍平溪築鴻雪館著書自娛後召還官至兵部尚書銅仁府明許子偉瓊州人吏科給事中以論寺人張棟萬厯二十九年謫銅仁府經歷陳維春鄉里失考刑科給事中以同郭如星論楚璫陳奉謫銅仁縣典史黎平府唐王昌齡以江寧丞左遷龍標尉今龍里司龍標寨乃唐敘州潭陽郡龍標縣也宋程敦厚字子山髙宗朝侍講忤秦檜謫渠陽士人為築大觀亭居之亭在黎平湖耳司東二十里明全琮海鹽人洪武間進士官禮部祠祭員外以糾儀忤權貴謫銅鼓衛范清永嘉人永樂進士福建道御史以言事謫居銅鼓衛陸珠鄉里失考正德中官諌垣以詩觸劉瑾怒折其齒流於黎平日和藥濟病者卒葬東郊外人稱陸滄浪墓巡撫閻興邦弔以詩楊天民籍未詳禮科給事中萬厯間與同官王士昌建言立儲忤㫖謫永從縣典史大定府元喬堅籍未詳順慶路判官僑居畢節多所題咏明李仲宣淇懸人洪武間授御史不阿權要謫戍烏撒章綸浙江人正德辛未進士嘉靖五年為山西僉事治疑獄忤㫖謫戍烏撒孤介不羣十六年赦還陳玠合州人萬厯丁丑進士官都御史以邊事謫居赤水謙謹和易士論髙之其詩文流麗典雅卓冠一時國朝李剛玉陜西人明末由武舉任赤水衛守備致仕後貧不能歸遂僑居畢節老鴉箐自耕而食行年一百一十二嵗步履如飛無病而終南籠府明孫寧蘇州人洪武中遣戍普安性沖淡工文詞尤深明性理年七十一終楊彛餘姚人少卓犖文章書畫無不精妙尤長於詩洪武間為長泰主簿子顯被誣死刑部獄孫志編戍普安彛聞棄官詣闕自陳授吏部考功主事二十四年從駕幸華山獻覽勝賦稱㫖二十五年乞就養普安居東屯四面多松樹開軒其中匾曰萬松自號萬松老人著有鳯臺貴竹東屯南遊諸集古今律選卒年八十沈朂字廷規號懶樵高郵州人洪武中從父戍普安博通經史雅善詩文築樂矣園懷甓堂與楊主事彛倡和其中著有迂思遺稿普安州志汪溥字巨淵澧州人性穎悟而剛直博學能文從父戍普安開孰設教出其門者多成偉器丁璣字玉夫丹徒人進士授中書舍人成化時星變求直言璣應召陳十事並劾李孜省及僧繼曉疏入留中以他事謫璣普安州判後歷官至四川按察使司遵義府唐李白字太白蜀人因永王璘事流夜郎今桐梓縣有太白故宅元鄒公敢江津人博學知天文元末與趙天澤劉伯溫友善每觀天象三人共長歎及伯溫佐命公敢南歸後易名公瑾居真州號保全居士晚號知命翁有保全知命二集明馬德字叔明鳯翔人萬厯舉人任雲南河陽知縣有惠政尋解組無力還里遂家綏陽或勸之出乃題其門曰渭水再來羞志士五湖歸去笑英雄陳起相字放菴富順人貢士官河南道御史明末棄家為僧居於播之平水里著有平水集百餘卷諸達官欲致一見卒不可得仙釋貴陽府明南宗長沙沙門棲志禪宗洪武間遊貴陽募建大興寺推演內教感化者多示寂茶毗得舍利子徹空蜀僧正統間來往貴陽潮音寺機鋒警敏詩亦清俊後復之蜀及寂示偈唯以正宗風為要拜經和尚名興宗大理人成化間住持永祥寺誦法華經每字一拜一擊板嵗久木為之穿四十年未嘗他出太監鄭忠為建寺請額年七十預示寂滅期鳴鼓告衆而化箬笠僧不知何許人成化間戴一巨笠至大興寺遇郡人羅玉讀書寺中僧曰子何勤苦如是吾能助汝乃取銅鉛雜置爐中頃刻化為銀羅欲傳其術僧不肯曰此不足學祇敗爾業遂去法印字祖融渝州人七嵗出家於大興寺萬厯間遍參天童密雲蓮池憨山諸尊宿得其宗㫖後詣京請藏偶遇光祿卿趙健於長安門握手談不覺至大內為緹騎所執下詔獄慈聖太皇后聞而釋之賜紫衣金佛玉爐並大興慈聖禪林題額及全藏以歸一日聞汲水聲得悟年八十七乃化韓野雲不知何許人萬厯間止大道觀能知人隱善飲不醉既盡數斗運於周身骨節珊然旋復能飲人或㩦酒就之每於袖中出殽核以啖客無不遍者恆㩦一鐵笛飲則吹之響徹雲表郡人程文弼楊師時輩咸與遊後不知所往白雲大理人戒行精嚴杖錫幾遍天下萬厯八年至楊寶山探幽採勝直窮藪澤山故多虎主僧止之弗聽裹糧坐澤中凡八日時方大雪僧所止常有鹿卧其地雪亦弗及其虎亦絶主僧異焉誓復來必建叢林去十年果來建千佛閣備極精巧前後樓數十楹飛甍建瓴巍然巨觀為黔中名剎寺成去之至今遺像猶存推官陳衷葵匾其門曰白雲常在如登蜀人萬厯二十六年遊黔閲藏於大興寺既精三乘復諳六書著轉識論寂明白雲弟子戒行不減於師天啓間安賊叛圍新添城徒衆逃散寂明不去賊入寺諭以大義賊衆俯首不敢加害年七十無疾終孔海雲未詳其所自來崇禎十二年至貴陽形貌清古腹貼至背寡言語恆數日不食能知來每以隱語寓意其贈郡人章爾瑜時云萬古青青不了山水流東去癸年還世人盡向忙中過洞裏誰知日月間莫解其意後爾瑜於壬子年卒人始服其前知又縉紳吳子騏延至家出諸子相見指其仲子中蕃云乞此郎巾一幅他無所言後舉家遇難獨中蕃無恙東華道人睢州人隱姓名遊黔青巖諸處蓬頭跣足雖隆冬惟衣一襟晝夜危坐不寐不飲不食囊盛烏梅數枚時取嚙之謂之梅子金丹言雜詼諧人問修養術輒云無他奇不必學也懇之則曰爾輩尚未能舍家室何言仙道歲餘去之峩山夏孟昌廣順州人素有道行金筑司土官金振武赴京遇天師張真人問曰夏孟昌好否昔晤我於南天門外今有一笏為我致之碎塵雲遊僧卓錫貴陽青巖谷精寨觀音寺確守戒律不妄接人詩律古淡有世外風語松四川巴縣人少充縣役尋棄家為僧戒律精嚴至西望山開堂說法遂駐錫焉明季諸紳士咸與之遊後化於浙江天童山徒衆舁櫬歸葬西山之鳯凰池巡撫錢邦芑為作塔銘學士方於宣序具語録行世安順府明塔僧無名永樂間住安莊白水堡觀音寺言貌謹厚用磚壘塔於寺後坐其中與千户丁昱等約曰吾入塔即以磚灰固塔門明年今日聞塔內有聲始啓之丁如約啓塔門僧危坐自如異香馥郁容貌愈懌衆咸異之後不知所往塔尚存悅禪杭州人雲遊住普定圓通寺有戒行善化誨愚迷人多禮之年九十餘景泰元年五月終四年二月啓龕殯之顔色如生曽志堅楚人有道術天順間以罣誤繫京師值大暑上命祈雪以皇城為限夜半上覺寒開豹房視之飄飄遍地次日命中官出驗城外略無雪跡因免死改戍平壩衛木石妖幻符至即除呼霆禱雨刻期必應終歲閉門誦經一日召其徒曰謹守吾法端坐而逝一天字常勝曲靖人住普定圓通寺戒行峻潔人所崇重陳借句一名許人度崇禎六年至安平蓬頭垢面自言瀘州人晝入城遊士大夫家夜宿城外好事者踪其行止在文廟趺坐兩袖皆書人不得見有問者答云老坊刻每過人齊中題咏不輟有曽將赤手扶元化且著青袍混野人之句後不知何往平越府明張三丰洪武間寓平越髙貞觀自於觀後隙地結茅為亭晝則閉户靜坐夜則禮斗與指揮張信善嘗與奕後指城南月山寺右地曰葬此必封侯信因葬其母後果以功封隆平侯永樂間遣官徴聘竟莫知所之嘗有了道歌無根樹詞二十四首四季止一破衲草履科頭時人呼為邋遢仙今禮斗亭即其故址手書亭聨碑詞尚存詳三丰遺蹟廣能興隆僧正統間卓錫月潭寺戒行不玷禪誦勤苦嘗晝誦經有虎入寺衆僧驚走能獨不動虎登堂見能遂去苗賊冦興隆欲劫寺衆僧皆逃能獨不去賊至欲殺能能曰幸殺我於外毋汚此佛地賊義而釋之寺賴以全吳鉉卿黃平州人世傳先天教鉉卿道行純備家設雷壇凡妖祟幻惑之家求符咒者悉除禱雨甘澍立降逺近奉之年九十五無疾終葬時舉棺甚輕人謂尸解張懷陽四川綿竹人雲遊至黃平黃冠野服有道術未幾入山披剃淨修年餘移居寶珠寺有以病來告者即知生死可療者與以藥立愈其不可救者百計懇求終不與嘗自捐數百金修寶珠寺未嘗募化蓋精黃白之術人或叩之絶口不道門下從學弟子甚衆或授方脉或傳針灸或别傳技藝隨其才授之年八十三將卒前三日謂門弟子曰某日某時吾當逝矣至期談笑而終都勻府明石三泉三清觀道士踪跡詭異獨居無侣嘗有雙鶴來巢久而不去後不知所終國朝别南和尚郡人自幼出家年八十顏色如童一日謂其徒曰我將歸矣可預備柴炭於某月某日俟我上座從下舉火勿誤至期圓寂衆徒舁出郊外舉火火將及脅忽呼曰左脅炭尚少可再添足至火盡白骨不解清香襲人觀者莫不稱異鎮逺府古聖婆不知何許人領五男行至鎮逺卭水司岑樓山渴甚以手拄竹杖卓地祝云我得地水當隨杖出果得水又以竹植地祝云我得地竹當成林果成林時揮涕竹上今霧雨竹有液如涕又土人拾得一裙呼為聖婆裙一十二幅長五尺二寸每與苗戰即揭以為幟苖見幟即敗去蓋苗畏鬼故敗今岑樓山聖婆井猶存明談守真本衛冠帶總旗幼慕髙真習先天道驅邪屢驗性甚孤介不屑為黃白術一日遇跛乞願從服役未幾病且疥臭穢不可近守真贍養數年略無憎意及死棺斂之葬於衛之西郊是日有遇於偏橋道中者自言姓李且曰為我致聲主人吾有遺於墓以酬數年之養守真驚訝啓棺視之則符籙一帖令牌一具始悟其姓知為鐵拐仙也追悔無及嗣後亢旱禱祈無不立應傳五世皆然當事以道彰天澤旌表李道堅鎮逺縣人棄家訪道得水火升降之術與其侣徐教𢎞修煉於中河山南洞郡守周瑛以太和名之祖復號立禪立關募化供十方僧衆雖巨蟒鼠雀咸依時就食後製一龕結跏趺坐住西天寺三載未嘗見其寢息嘗絶粒月餘徒從强之回滇遂化留肉身於寶臺山今滇之金光紫溪黔之太平西天等寺皆其創建白雲道人姓徐名貞元偏橋千戶明隆慶間年已四十忽棄家慕長生之道偕同里周惠登闢雲臺為勝境雲臺古名為團倉巖其中多毒蛇異獸徑甚險素無人跡道人入三日達山頂坐古柏樹下振動木魚四山皆響惠登繼之遂結廬焉越數十年道人趺坐留偈數語遺蛻去至今鬚髮皤皤指甲長數寸生氣宛然後人修亭供之顔曰遺真蕭雲山天柱人萬厯初得異人授以奇門之術知人世吉凶本所千户徐𢎞被苗掠入深山中雲山作法夜行越數寨直抵山中取回雞犬不驚歸始日出苗人駭以為神後尸解去有人復見其飄然獨行始知為仙遊也白頭羅公不知其召洪武間隱居興文里之山中童顏鶴髮行動如飛能識未來禍福厥後不知所終因名其山為白頭羅公山思南府唐陳致虛號觀吾一號紫霄上陽子嘗從緣督真人趙友卿授金丹妙道遍遊夜郎至思唐與宣慰弟至陽子田琦鍊丹於萬聖山巖壁中後皆仙去編注金丹正理大全數十卷金丹鼎罏竈遺跡尚在山頂明鏡文郡人幼聰悟長涉經史出家龍華寺既受具遍參叢林深契內典永樂初赴京㑹衆僧談宗理推為首座各為頌偈而還景泰間歸隱石笋山年八十趺坐而逝黃冠道士郡人徐可大幼讀書觀音閣偶回見道士與父坐談不揖而入道士問此子為誰父答曰小兒道士曰好箇舉人但榜首未生耳時可大年已二十為郡名士聞言甚怒後數科至四十三嵗中庚子鄉試榜首張文星亦同里人年二十二歲追昔榜首未生之言始信道士為仙苗僧本府受水人初為張氏僕小時常念一佛字及長願出家久之得悟偈曰本是菩提種打落有苗胎曹溪一派水清風引出來年九十而寂國朝圓戒字默一四川重慶人住持婺川梓潼閣戒行精嚴年逾百嵗齒髮重易如童朝夕誦經不倦後百有五歲而卒思州府唐通慧天寶時僧在黃道司鼇山麓建般若招提因上患病久不瘥有道士奏寧夷郡鱉山寺有僧能治奉詔不終朝詣闕上果愈賜金帛不受賜乘馬回山亦不終朝而至後不知所之明鹿皮翁不知何許人椎髻藍褸身披鹿皮與玉屏人鄭維藩善嘗謂藩曰培補心田當生好子約期來賀子生之日果至隨辭不知所往後藩子指揮使逢生子君錫中崇禎丙子舉人官至知府卒如其言銅仁府宋鬻履道人開寶間甕蓬洞民楊再從好仙術一日道人假乞者狀㩦草履一雙詣再從求售索金五兩再從知有異將買之入商於妻妻不從道人擲履於地化雙鶴飛去旋失所在但見柱上題詩云新打麻鞋巧又牢五兩黃金價不髙楊君不聽妻兒話從我蓬萊走一遭再從大悔其字深入於木久而益顯雖洗削不去明洪武中柱方圯大定府元仙婆永寧人名滿道篤於戒行善知休咎人多就決焉卒葬於烏降山至今呼為仙婆墓明月溪江安人宣德初以罪戍赤水役於陳百户棲廄中夜輒有光陳異而遣之遇禪宗得正法眼藏至藺州印山見其林麓洞壑别有天地結庵曰永洪居二載憲宗召天下名僧十三人詣闕月溪與焉將别語弟子曰此中徒衆無踰四十踰則不利抵京將召入上密令中使置經於地覆以錦諸僧皆履而入月溪獨伏不前上促之對曰非敢以方外自髙懼籍經為罪非上所以召臣意上異焉取經入賜以茶不飲而南灑問其故對曰留都火焚四十八户用禳之上未信後守臣奏火災如其語久之遣還至留都遂示寂後人廣其故居以為寺緇徒僅四十人過五人則一斃三人則一病過一二人則有怪莫能踰其數雪軒趙州人雲遊永寧宣撫司並立夢緣庵坐山十四年戒行誠實後禮部差錦衣衛舍人蕭興訪取赴京不知所終賈姑莫知其自來自謂賈姑終日棲於殷官村之石洞亦弗見烟火如此十數年一日忽不見有自滇來者云在雞足山後人謂其洞曰賈姑仙洞南籠府明性良普安州僧天姿竒秀戒行篤實創興福寺談經釋徒多從之尋有芝産於堂色如青玉王徽作靈芝賦以紀其異年八十四忽一日沐浴更衣趺坐而逝人見其乘白馬西去云遵義府唐趙練士綏陽趙家里人幼有仙術讀書綦江之趕水距家二百餘里朝往暮歸有石重千斤能挾之而行殁後屢顯靈異土人立祠祀之祠前遺石猶存明李珏未詳何許人修黃老金丹之術時久旱先期有夢其至者及至求珏禱雨即應後至正安州玉虛庵以其術授道人張紫霞羽化而去後紫霞猶見之於青城山云張顛􅋖名道凝生有異質遇異人授洞天法律能役使鬼神居紫霞石室論三教一原之理內則凝神定性以合大道之虛外則明教演法以祛流俗之妄後莫知所終紫霞山有楊廷和碑記孤舟不知何許人萬厯初至正安磻溪寺面壁數年一日謂本寺住持曰明日余逝矣寺外二樹將折一樹有聲即長老一樹無聲即余也次日二樹果折示偈曰勘破無無世界了然何物心頭自性已歸圓寂清風明月自由端坐而逝錫牌不知何許人自金陵來常掛一牌號錫牌和尚萬厯九年至正安胥覺寺不言不臥一日别僧衆曰去矣幸置我石巖中數十年後又當再㑹言訖遂逝越數日視之神色如生衆僧依其言置石巖中廣惠合州人不傳姓氏天啓間寓綏邑之祖師觀以符水藥餌濟人咸稱為廣惠道人或五六日不食或一食數斗與人戲常於手中作霹靂聲邑令以其妖妄將擊之乃謂其徒曰吾將逝矣遂卒邑人葬之馬鞍山後有丐者名可可言廣惠是其師必不死人咸異之後發棺僅存衣冠可可亦隨遁去不知所往兩生蜀永川人前世本僧名真從鄰家有丁姓者一日坐堂中僧至直入跡之不見其長子適生一孫未幾聞僧寂滅因名曰兩生寺有匱牢鎖失鑰兩生四嵗遊寺於壁隙中取鑰開之後讀書頴悟絶倫父命應試逃出為僧居原剎仍其前名後於遵地建松丘禪院一日上座索筆書偈曰八九功完語不空傳虛空縹眇優曇花鮮遂端坐而逝三修吳人自言三世為僧因名三修住綏城西川主廟天啓六年十月一日坐化有自成都來綏者於十月二日相遇簡州三修寄語諸護法云我西去矣其冢猶存廟後何道者不知何許人明末棲綏陽何家山冬夏常衣一葛往來城市能作十里霧病者求療止書一好字於病者手中即愈遇貧者墮拾地上石與之輒化為白鏹後不知所往張仙桐梓人為道士得修煉術結廬山中運精伏氣數十年鮮有見者值冦亂遂歸㩦妻入葫蘆山不出人疑為尸解後有舉火至山內一洞見男女足跡沙磧間今日踏平明日又復如前相傳為張仙夫婦云程光祚字柏亭道號元初重慶江津人幼穎悟通經史一日遊峩嵋山遇異人授以五雷祕訣明末之亂避兵來遵時僞國公王祥多行慘殺夜夢一道人龎眉鶴氅揖祥而言曰上帝好生何多殺為公如不悛禍不旋踵祥驚悟次日微行至郡東橋遇光祚適如夢中所見遂敬禮之後凡官斯土者每值亢旱即延祈禱無不立應年八十四行步如飛或一月不食晏如也一日作歌端坐而逝國朝紫石不知何許人康熙三年卓錫於郡之淨土庵數載常持一鉢丐飯若紫石因號紫石一日坐中堂說偈曰三十六年作客清風無枝無葉了了分明歸去一任東西南北端坐而逝郡人異之鐫其偈於石巖方技明林春錢塘人父文中永樂時以道術徴尋坐謫戍貴陽卒春賦性敏悟受業於真人周思德盡得其醮水禱祈之法而行之以誠多所感召卒年九十二子宣有才行書法遒徑劉明德貴陽府人少遇異人授以五雷祕法能呼召風雨奔走鬼神凡祈禳驅逐無不驗張道人貴陽府人逸其名有道行自幼不娶得祈雨祕術萬厯間旱巡撫郭子章招致之道人築壇於城西縞衣披髮運五雷訣刻次日日中雨至期天無纖雲人皆誕之道人書符於童子掌握之令詣太守請迎雨童子至郡堂開掌忽霹靂一聲衆未至壇而霖雨大注趙鶴軒廣順州人有道術善縮地日行千里呼雷遣將祈雨立應錢珍思南府人道貌純古性至孝得道士李天真術以符水治症輒驗有祈晴禱雨退星禳火平癭開啞之異知府寧閲奬曰道成一悟籙闡三元密毗治化潛衛家邦雖漢張道陵無以過也余中瑞安化人字靜齊博學能詩尤精於醫能起沉疴年八十有五尚矍鑠行城市中不以鳩杖人稱為半仙國朝張國鎮江西人籍思南幼博學書史擅盧扁術貧無資者不吝與劑雖頻數無難色全活甚衆且深內理年八十餘秀髮兒齒步履如飛人以方費長房云陳道清錦屏縣人明天順初遇異人授以符訣能飛劍召鶴呼風雨適境內大疫求符治疫者衆手不及書以符焚之井中任人汲飲皆愈都督李震駐兵渠陽因旱邀請祈禱立應且曰雨潤銅鼓遣人驗之果然貴州通志卷三十二
