body:
  text: 貴州通志卷二十七人物選舉國朝順治庚子科照舊定額減半共二十名顧鼎新黎平人田茂頴婺川人劉在銓貴陽人元瀚孫庚戌進士龍元熹湄潭人官教授任中鳳思州人之望子陳舜印鎮逺人官知縣周廷尚興隆人官教授張體仁新貴人官教授彭程漢新添人官知州張拱北黃平人官教授劉世忠都勻人徐國珍貴陽人官知縣趙東升新貴人玥子王甡新貴人官知縣張德溥安順人官教授王家俊興隆人官教授徐人龍平越人官知縣趙應琛安順人孫衍慶烏撒人官知縣萬鍾禮平溪人官教授康熙癸卯科以共恩詔加五名二十五名王承正貴陽人尊德孫黃昊平壩人官教授徐玉陛定畨人官教授奚恆平越人官教授周廷適興隆人官教授費以誠石阡人道用子官學正王承祥新貴人尊德孫庚戌進士王祚蕃平越人王元璐銅仁人唐啓中湄潭人官教授田茂詔思南人張之偉敷勇人越闓新貴人張拱樞偏橋人官教授蔡師旦貴陽人吳豁然都勻人周卜若黎平人王之相新添人宋安全偏橋人王賓臣敷勇人熊非熊思南人徐兆熊新貴人紳子熊士章偏橋人官教授費以矩石阡人道用子徐必遴貴陽人卿伯子丙辰進士董子策遵義人文運新綏陽人徐鳳翽遵義人闈以上三名蜀中試丙午科章萃貴陽人爾珮子王承祜新貴人尊德孫己未進士陸運昌都勻人徐枝榮思南人張鼎臣思南人李中桂貴陽人孫世澤偏橋人黃彪定番人潘芳黎平人田泰運思南人王洪締敷勇人金渾安順人尹湯寅定番人王祚昌鎮逺人陳起蛟定番人周九萬興隆人萬鍾艾平溪人談瑞平壩人先召子潘萼黎平人周齊濂興隆人劉沛遵義人陳明經綏陽人萬人英綏陽人盧世選綏陽人宋文蔚遵義人闈以上五名蜀中試己酉科以共恩詔加三名二十三名程春翔貴陽人張贊台黎平人陳柿祚平逺人梅首安順人豸孫周廷正興隆人胡定之黎平人朱門李思南人王復宗普安人祚逺子官知縣王國璜石阡人學敬子林樾敷勇人陳廷藻大定人張可立貴陽人李士焻婺川人英才子萬其智黔西人章爾瑜貴陽人志龍子蕭嗣昌思南人重望孫游恪貴陽人張心錦思南人潘德徵貴陽人王承烈平逺人癸丑進士徐世榮都勻人陳儒敷勇人張克壯畢節人程崇遵義人朱榛正安人羅士柏遵義人陳仔綏陽人闈以上四名蜀中試壬子科李士英貴陽人洪灝平溪人運昌子官知縣蔣洪泌新貴人克達子曹亮黃平人程桂蕃貴陽人春翔子袁錦敷勇人田祖思南人邱孫涂應詔貴陽人王殿元貴陽人蘇瑋大定人癸丑進士張從聖新貴人越珃新貴人應甲孫王喬年平越人劉鏞大定人劉貴陽人閻鍈新貴人王如綸平壩人孫上元偏橋人宋安讓偏橋人安全弟瞿纘曽貴陽人傅之范桐梓人唐知章遵義人唐廉遵義人楊希震遵義人熊禾遵義人闈以上五名蜀中試副榜准貢入監陳修聖黃平人高士徵黎平人易道貫平壩人羅啓裕思南人陳介桐梓人辛酉科壬戌年補行劉子章貴陽人官御史蕭登崇鎮寧人官教授廖應熊餘慶人官教授陳佳士平壩人李祺貴陽人之仁曽孫吳以仁偏橋人楊之苓敷勇人夏文炳定番人官知縣徐縯貴陽人卿伯孫王夢麟平越人官知縣何子澄貴陽人兆柳孫官知縣張應詔黎平人官鴻臚寺少卿劉璧清平人張覲北敷勇人胡晸貴陽人傅天竒貴陽人梅建安順人惟和曽孫朱煥石阡人運久孫樊祚興平越人師孔孫楊昌言黔西人副榜黃曠平壩人夏敷倫安順人周起渭貴陽人中丁卯舉人趙珍貴陽人甲子科是科以二恩詔加三名共十三名項繼曽安順人王鵬普安人復宗子傅九鼎新貴人戴綬黃平人吳旦貴陽人中蕃子章頥新貴人爾珮子胡燦安順人劉芳早黎平人蒙珍甕安人施澤逺思南人宋洪緒黎平人胡奉衡黎平人王士儀銅仁人胡鍾鼎鎮寧人馬羲浩定番人文卿孫邱應震都勻人蔡方炳鎮寧人蔣洪澍貴陽人克達子王冕都勻人張雲霱偏橋人楊光燾銅仁人黃元色偏橋人尹鏕廣順人李晉桐梓人曽光祖遵義人闈以上二名蜀中試副榜葉林新開州人黃沆平壩人徐忠黎平人宋如嵩甕安人官教授丁卯科周起渭貴陽人甲戌進士王橒興隆人丁丑進士胡澡黎平人宋應舉偏橋人官教授劉建貴陽人官教授鄭人惠思南人全天秩安南人蕭沛貴陽人官知縣王嗣衍敷勇人丁丑進士丁昌逺鎮逺人官教授杜學林普安人曽世煌大定人鄒以惇餘慶人官學正董中駿定番人田慕芳新貴人甲戌進士田仁淳婺川人官國子監典簿白光衢黃平人官知縣龔履善石阡人趙殿邦新貴人官知縣戎軒平越人官教授陳至誨綏陽人試蜀闈中副榜葉林新開州人潘珍貴陽人官教授周正貴陽人鄒聖生思南人庚午科管遴新貴人官教授賀有章黔西人官參議陳懋德黃平人官知縣黃之驂安平人馬常黎平人官知縣胡奉鼎黎平人知縣行取劉殷思南人官知縣周國棟印江人李紳修文人知縣行取許文魁都勻人官教授徐時成新貴人必逺子晏賓平逺人官知縣改教諭楊翰徵思南人官知縣馬騰衢普安人官知縣李士煃婺川人官知縣梅廷標安順人首子庚辰進士周庠貴陽人官助教李鴻緒平逺人劉俊新貴人官刑部主事商璉甕安人官學正談惟迪籍貫闕副榜劉鉽思州人焦應旗清鎮人吳君爵安南人官教授史筆貴定人陳邦殿遵義人試蜀閬中癸酉科田仁漸思南人詹昻清浪人周文侯開州人官教授陳珣施秉人甲戌進士劉玉泉平逺人官知縣傅天爵貴陽人官學正劉兆興平逺人官教授楊襄新貴人周士鳳都勻人朱可熹思南人張存烈思南人黃育嵩都勻人官教授李士熉婺川人覃岱印江人知縣行取張翊聖新貴人官學正章履貴陽人官知縣唐紀都勻人官知縣柴大任新貴人官學正商基鏞甕安人官知縣周仁平逺人官國子