body:
  text: 貴州通志卷十二食貨田賦元以前貴州田地自來原無丈量頃畝每歲該納糧差俱於土官名下總行認納明𢎞治十五年如洪武年間例夏稅麥菽二百五十五石四斗五升五合秋糧米四萬七千四百四十二石二斗五升六合六勺四抄四撮萬厯六年貴州除思南石阡銅仁黎平等府貴州宣慰司清平凱里安撫司額無頃畝外貴陽府平伐長官司思州鎮逺都勻等府安順普安等州龍里新添平越三軍民衛共五千一百六十六頃八十六畝三分零國朝貴州布政司原額田三百一十二萬三千四百二十四畝六分二釐九毫五絲三微四塵八纎七渺荒蕪田六十萬四千六百五十畝二分二釐九毫九絲四忽五微三塵二纎二渺實在成熟田二百五十一萬八千七百七十四畝三分九釐九毫五絲五忽八微一塵六纎五渺原額租地山土一十五萬五千三百畝七分四釐六毫六絲一忽三微一塵三纎三渺又屯陸地六百三十九分五釐一毫四絲荒蕪地土七萬八千二百五十二畝七分三釐六毫六忽六微八塵屯陸地四百四十六分五絲實在成熟地土七萬七千四十八畝一釐五絲四忽六微三塵三纎三渺屯陸地一百九十三分五釐九絲原額本色米穀一十七萬三千三百二十五石五斗三升四合八勺九抄二撮七圭四粒小米四石七升七合九勺二抄二撮八圭八粒八粟耗米七十九石八斗七升五合一勺三抄八撮七圭二粒七粟田荒無徵米穀五萬三千六百一十二石八斗八升二合三勺五抄八撮八圭六粒一粟耗米二十五石六斗二升八合六勺九抄三圭三粒九粟又减則無徵米三千七百四十四石一斗二升一合四抄五撮二圭一粒二粟無徵耗米二合八勺一抄四撮五圭九粒九粟實在應徵米穀一十一萬五千九百六十八石五斗三升一合四勺八抄八撮六圭六粒七粟又小米四石七升七合九勺二抄二撮八圭八粒八粟耗米五十四石二斗四升三合六勺三抄三撮七圭八粒九粟原額全熟黃豆七百五十五石一斗八升五合一勺六抄四撮六圭二粒九粟原額本色荍八千八百九十六石四升二合六勺六抄八撮七圭一粒四粟地荒無徵荍四千二百六十七石六斗五升六合二勺五抄二撮七圭五粒九粟實在有徵本色荍四千六百二十八石三斗八升六合四勺一抄五撮九圭五粒五粟原額折色秋米並折色屯糧米麥穀共五萬一千一百三十八石二斗三升八合六勺九抄六撮六圭四粟內除長寨歸化二㕔廣順州折色米四百七石八斗九升七抄八撮八圭六粒八粟例係撥充馬館另於馬館額內開造外實在折色米麥穀四萬九千七百三十石三斗四升八合六勺一抄七撮七圭三粒六粟該折色銀三萬一千三百四十五兩二錢四分九釐三毫九絲九忽九微五塵二纎六渺四漠一茫七漂田荒無徵折色米穀八千一百七十四石七斗八升六合七勺三抄五撮七圭一粒三粟該折色銀四千五百七十八兩一錢八分七釐二毫五絲八忽一微二塵二纎一渺减則無徵米二百六十五石四升九勺一撮九圭二粒四粟無徵折色銀一百二十四兩二錢八分一釐一毫四絲六忽八微二塵七纎三渺實在應徵米穀四萬一千二百一十九石五斗二升九勺八抄九粒九粟該折色銀二萬六千六百四十二兩六錢八分九毫九絲五忽三纎二渺四漠一茫七漂原額條編歲用力差租祭幫解田租灰瓦烟差加增蠟價貢馬土賦桑絲等銀五萬九千五百四十八兩六分一毫一絲七微八塵七漠四茫九沙田土荒蕪逃亡無徵銀一萬八百二十三兩三錢一分八釐二毫六絲七忽五微七塵五纎四渺减則無徵銀八十四兩一錢五分六釐四毫七絲四忽四微六塵六纎三渺實在應徵銀四萬八千六百四十兩五錢八分五釐三毫六絲八忽七微三塵九纎九漠四茫九沙原額馬館及廣順州折色馬館銀四萬三百三十五兩五錢六分五釐八毫七絲六忽八微七塵七纎九渺田荒無徵銀一萬四百五十三兩六分四釐八毫七絲二忽三微九塵一纎六渺又减則無徵銀一百二十四兩九分八釐一毫三絲四忽五微二塵一纎七渺實在有徵銀二萬九千七百五十八兩四錢二釐八毫六絲九忽九微六塵四纎六渺原額遇閏加徵銀二千二百五十兩九分一釐二絲六忽一微四塵八渺三漠二茫九沙荒蕪無徵銀一百九十三兩一錢三分三毫三絲四忽一塵五纎三渺實在有徵銀二千五十六兩九錢六分九毫九絲二忽一微二塵五纎五渺三漠二茫九沙無閏之年例不徵輸原額額外化誨苖民認納無畝本色苖糧米一百一十六石九斗四升二合八勺原額額外化誨苖民認納糧賦並禾棉布雞折價等銀四百三十五兩一錢九分四釐三毫貴陽府原額田三十二萬三千一百七畝九分二釐六毫一絲六忽四塵三纎二渺荒蕪田六萬八千九百四十八畝五分五釐二毫四絲八忽三微八渺實在成熟田二十五萬四千一百五十九畝三分七釐三毫六絲七忽七微四塵二纎四渺原額成熟租地四千一百九十畝八分三釐九毫六絲四忽三微三塵三纎三渺原額本色米三萬五百五十七石八斗四升六合九勺九抄六撮五圭三粒八粟荒蕪無徵米六千三百三十七石五斗一升九合五抄一撮六圭六粒减則無徵米一百四十三石八斗九升五合八勺二抄六撮一圭一粒實在有徵米二萬四千七十六石四斗三升二合一勺一抄八撮七圭六粒八粟原額全熟黃豆六十六石六斗九升七合八勺原額全熟有徵本色荍糧二百三十七石七斗九升二合二勺八抄六撮原額折色米六千四百一十六石七斗三升五合八勺四抄六撮五圭六粒五粟內除長寨㕔廣順州折色米一千三百六十八石七斗六升五合一勺八抄三撮六圭六粒九粟例係撥充馬館另於馬館額內開造外實在折色米五千四十七石九斗七升