body:
  text: 貴州通志卷四十二藝文記三國朝重修盤江鐵橋碑記卞三元盤江之源出烏撒繞曲靖西導七星關而下安南境為入滇渡處兩山夾峙類巨靈擘之以界滇黔者也兩崖中絶壁立如削江水注之淵澄而湍激比險於瞿塘灩堆雖差狹其濤瀧澒洞不可嚮邇魚鱉弗窟蛟龍弗宫鯨鱷怪物弗能遊是以方舟無功用楫無力雖忠信如梁之父莫敢涉也顧盤江之外滇實宅焉兹為黔唇齒輔車之厄若之何其隘而不可渡也前方伯朱公家民頗出竒思乃錘鐵以為絙鑿崖以為㭬亘兩壁而貫之緯以板其為絙也其為板也如其度蓋亦棧之類橋者名曰鐵鎖橋始通道云即莊蹻以下曽未及此不知當日何以飛渡而迄今有之抑亦海內之竒制也歟苐鐵之性也剛絙之性也弱橫亘幾十澮其中自弗能强矣行其上者足左右下絙輒因之升降而板則或起或伏欹躍咿軋人之體亦與之搖撼不能自持如乘巨浪之艇如履將泮之冰鮮不掉眩而寒栗者且眂前者陟岸而後者始登不則相躡而愈震殆欲前欲却俱不可得危孰甚焉况萬騎萬卒之遄邁乎我大清削平海內拓土暨滇而疆埸猶未盡靖恆遣禁旅更班彈壓嵗運數百萬金錢以供芻糗月頻至焉此外飛章羽檄及他遞郵絡繹不絶而昔之七絙今為冦燬者二則力益弱而度益危人胥患之督憲趙公統攝二省大政嘗往來於曲靖安順間嵗數道此橋乃熟習形勢則謀於豫曰盍亟圖而新之豫拜手曰可於是營諸鐵索之次鼎建輿梁焉石之不可而取諸木乃命官督丁役採於山得巨材二百二十八株排連之使卧於兩岸臨水復鎮之以巨石柱之以徑幹各層纍而加率如之凡叠序出焉咸鐍其本加固及兩木之末不接者僅三十有四尺選材可六丈者矩之以交其上而彌縫之植者為檻幬者為屋兀者為門無不宜焉於是乎騰未雲之龍駕未雨之虹矣則與古之鐵索並存於險阻之間雖踵事增華神明其物不可謂非竒思軼出者也視故橋之用則可以雁序而前可以魚貫而越可以方軌聨鑣攜笈荷擔千萬人逐隊建旟而坦行且不知有山水之厲寧知有風搖電掣之驚乎於戲水土之窮前人濟之以金今也繼之以木五行之利溥矣哉是役也授略於總督趙公諱廷臣濟其用者藩司顏敏糧道王廷弼程其工者安順司李沈璣永寧刺史徐國維董其役者盤江遊擊王官姚有智安南守備程璧余則贊成之而已工役之值則取諸關稅三閲月而就不以為勞費俾由滇黔者自今無恐公私賴之僉曰趙公濟川之功哉關嶺漢將軍碑記彭而述自黔入滇蜒程嶢崅彌望皆山車馬多行隙中獨安順迤西當胸而立亘矗雲起則嶺名嶺從關將軍索得名將軍而前不可考也余於順治十七年庚子由滇藩逾此陟將軍祠拜焉閲四年甲辰復以黔臬至則威清使者陳公新其宇丐余文碑其事且言曰此前制府趙公意也余竊往讀史傳漢前將軍赫赫矣今天下方州僻壤粢盛肥腯幾與有國者之祀社稷城郭之有孔廟等今將軍名索漢前將軍子其軼事不少概見荆州之役既已父子殉難無以索名者史失其名歟且中原徐泗宛鄧之間為前將軍百戰之地何以竟無將軍在也既而思之將軍父子所事者劉氏耳南郡之後劉氏既西將軍隨之黔志稱建興之始將軍從諸葛丞相南征將軍先驅拔山通道為此嶺開先宜血食於此古之名山大川率有神人居之將軍戮力王事焄蒿悽愴與山川相為不朽豈顧問哉爾時中原鼎沸為西南一隅將用蜀以用天下以延火德之基若使雍闓之亂不止則蜀中震動褒斜以東不敢問矣孔明先南中而後乃有事於中原饒有深意將軍之心與孔明同此嶺之所以傳將軍與將軍之所以常有此嶺非偶然矣或者曰孔明舍荆州不問稱戈瘴毒之鄉與鱗介爭雌雄逮擒縱既成而力亦憊矣安能復問髙光之鼎乎此大不然譬之千金之子方有事於强鄰怨家而垣墻之內乃有伺窺筐篋厝火於積薪之上者此之不除禍豈在逺孔明之先克南中亦猶是也然則天下之嶺多矣而此嶺獨以將軍𫝊何歟曰此人心之不忘劉氏也今山半有飲馬泉有關帝像此又因將軍而思及帝者也帝始終為劉將軍亦始終為劉成都雖去後主雖淹沒不𫝊而人心之帝與人心之將軍不可誣也此關嶺之名後天地而不朽賴是歟先是孫氏竊據黔滇十有六年大師西征惟此嶺戍最嚴逮我師直搗而風靡今緬甸車里南交奉正朔恐後車書一統此嶺實先之何莫非將軍之靈哉按是祠之建肇前代通道都督馬公置守禦所正統麓川之役靖逺王公拓之及大司馬松月伍公登詩告成祠之起皆以邉圉有警行師克振今國朝膺命滇黔職方開於十五年之後總制趙公按輿圖考祠典飭榱桷而蘋藻之國之大事在祀與戎其知之矣重開諸葛洞碑記彭而述偏橋距沅州四百餘里中聨三衛為黔楚喉沅居楚西偏𨽻楚偏橋居黔南孔道屬黔而兼隸楚先朝偏沅撫軍之設取名於此以為滇蜀黔粵楚五省總樞故撫軍駐節兩地從中持緩急楚東南都會百貨所聚江漢而外衆水所歸沅水上接黔之鎮逺所謂㵲水也發源於黔在黃平而上可濫觴下此即可通舟乃偏橋之南北上抵黃平下抵鎮逺二百四十餘里有所為諸葛洞與夫老洞鷂子灘等巨石填咽不受舟楫沅州至鎮逺而止即勉强溯流夾舟而上必不能踰諸葛洞洞夾兩山青嶂萬仭石大者如象小者如牛從上而下趺為深潭不能容舠前朝督師太和郭公子章曾經開鑿有碑記可考事久石還本位水歸舊流阻礙如故於是楚粟入黔者自鎮逺而上二百餘里擔負之功百倍其難國朝順治十五年王師定滇黔貝勒諸軍駐滇黔及鎮兵散布黔南郡縣者以億萬計厥費正等新鎮道徐君及副戎王君以事關軍興力議修舉請之臺使者及藩臬之長初以時絀舉贏未便二君請之固議乃僉同鳩工襄事告厥成功下起鎮逺上至黃平竟可通舟轉餉不至乏絶豫庚子夏捧滇藩檄道經偏橋聞而壯之與王君並轡往觀歎曰鄭國開渠遂為萬世之利西門豹决滏水潤鄴下國人祠之不衰况乎排鑿疏導力同開山且事關軍國之大乎今夫二百四十里中山路險隘牛車莫施計一夫所負不過四斗一日所行不過五十里二百四十里往返所費一日止以二升計之十日之中已去其半如是而進計之四十石止得二十四百石止得二百而此百人中之妨農功賠里遞以及胥吏之浸漁不與焉若夫舟即最小者可受十石或二十石是一舟可以省百人數十人之費矣其勞逸奚啻倍蓰若夫商賈免捆載之勞魚鹽得順流之勢而都勻平越之郡得借此轉輸可以仰給他縣無水旱之困且環黔南之洞苗犵狫亦得以本土所産貿易外貨勿生戎心是一舉而四善備焉又不止軍興一事為然也難者曰黃平而上距黔尚三百餘里安得不陸曰是不愈於已乎古人有言得尺即尺得寸即寸况二百四十里之間乎滇南千有餘里粟所難及所需惟金計東南吳越之間襁屬不絶於道其所需人功不資亦可以稍貸黔之餘力以為滇地黔困少蘇一力辦滇不尤愈於二者並急乎滇地宜五穀産金錫益州沃野千里漢唐以來皆屬內地黔兩腋皆苗中通一線粟不足供外來之用先王開黔所以開滇也昔莊蹻略黔地而王滇正以非黔則入滇無路今日之役亦猶行古之道也後之君子纘而行之征繕稍暇拓而大之利在百世其興作費用詳載徐君記中兹不悉嚴革協夫碑記蔣應修語曰天地之性人為貴古之善保天下國家者未有不慎用其民者也慎用之則治否則亂慎用之則安否則危慎用之則田野闢而財賦足否則土滿帑虛公私交困民猶水也水能載舟亦能覆舟亶其然也我朝驅逐流氛定鼎燕薊吳楚閩粵倐忽蕩平未嘗煩一民負芻茭運糧糗為大兵供億故民之從之如水如市豈非慎用其民之效乎區區滇黔片地何難走一騎抽一矢刻期掃卷而世祖章皇帝固遲之十五年之久始從事焉亦曰大兵之後中原民力竭耳乃滇黔底定駐鎮維難又不惜歲捐五百餘萬之餉以厚兵力而戢疑二凡以一隅蠕動上厪睿慮譬若癬疥之憂雖全體無患而搔癢不能去心先皇帝之念不忘民也如此是以經略閣部洪公上體宸𠂻下恤民隱飭令軍餉所至郵遞官辨得以便宜開銷給價雇運一時民樂趨事餉無停軌甚盛心也無何而稽核令嚴專責驛運驛運力匱爰議幫協因幫協而生科𣲖因科𣲖而生橫索因橫索而生濫應一民也而拉馬而載狗而遷貨賄而肩花木而軒優妓而輿罪孽皆民也一民之役於官也而上官而使客而親識而勢豪而差役皆官之使為之役也嗟乎黔陽一帶民幾犬豕不若矣是烏識天地之性之貴人也哉總督甘公畿輔重臣天子念邉荒控制為難毅然簡公經理滇黔兩省公受命星言夙駕汲汲出民湯火如勤訓練稽尅减繩貪墨禁餽遺威梗頑輯柔懦崇節儉躬勞苦無事不從民生起見尤於協夫一事謀之撫軍飭司道張之示告凡屬下吏晉謁者罔不諄諄命誡誠以役民之力必妨民之農必耗民之財必輕民之故土必離散民之父子兄弟妨農穀貴耗財室罄輕土業徙離親情散一二民苗不逺而之蜀楚即與紅黑種為伍耳於是核金錢給郵遞革協濟舉雇募勸力行懲不率始之法令初具繼乃經畫倍明蓋量逺近酌險易大抵雇價權輿於一錢一分嗣有三分四分六分之差等行之期年小民曉然公慎用其民之意即使客亦曉然公慎用其民之意科𣲖杜橫索斂濫應戢一時士農樂業工賈安生如公疏所云米值一年減倍者其明驗也乃公猶慮法久玩生日積蠧起繕疏入告訏謨洋洋部議允覆天語煌煌礱石勒銘垂憲彰彰愚聞之父母之愛其子也非茍且旦夕謀必為之計深逺慮長久使永不即於殆公之於民豈非計深逺慮長久者乎詩云樂只君子民之父母公之謂也修守平越後於公之蒞黔蓋協夫之革始未嘗不病其扞格難行及奉檄訊衛辨濫應一事蓋兩閲月而驛夫至六千餘名喟然嘆曰何賤視吾民而虐用之若是用是一遵公令寧以罪我聽之人而不敢暴用一民即公務跋涉必價雇往返不敢自欺欺人以速謗戾爰奉㫖勒公疏於通衢俾紳士民苗咸知弊政永革復為之記刋之行館庶登斯館者共曉然天地之性之貴人而用之者之宜慎也則由一隅及天下由一日及萬年坐致庶民用康國祚罔替公之志其一暢也夫於是乎書重修陽明書院碑記楊雍建貴陽撫署東偏有陽明先生書院故明大中丞阮公文中之所嗣修也自兵燹蹂躪以來髙陵下谷一望蒼然而空木頽垣猶僅存於寒雲落日烟埃起滅之餘豈有幸歟余以聽政之暇攬其遺址摩娑斷石而按其文辭所稱述先生在黔功德為甚悉因念黔於職方為西南徼遐濶僻陋民雜苗犵山棲而草處椎結卉裳攻劫鬭暴往古所不能柔馴自數百年之間始循法度稱贄奉貢以至於我國家進以文治學者爭自奮於六藝由於訓程感道懷和薰蒸砥礪卓犖間出登進顯庸發聞四方雖朝廷文教覃被實大以遐而揆厥阮初報本反始則黔人之俎豆先生宜不能怠庶幾充大厥宇崇答弗替而風廓雨立陊剝不堪登其門門壞升其堂堂廢徘徊俯仰以余之蒞兹土也而又烏得無情哉遂乃徴工執用來會祠下凡齊舍之傾圯無存者棟楹榑櫨椳闑扂楔之腐敗撓折與級磚甍甓之破缺者赤白之漫漶䵝昧者或作或仍以葺以治室宇具修神位毖清蘄示後人而亦無侈前功工既訖乃伐石以紀之其詞曰伊昔先生至於是邦葺軒以居何陋因名惟德無陋惟人無逺去陋本儒則思其返有祠奕奕親臨炙之尚俾來者欽兹訓辭佩服無斁如參於前良知內照其敢不䖍居而無陋罔二昔言申陳嚴祀永永是尊陽明書院碑記田雯余嘗考昔人之不合於時而遷謫其官者或海外或蠻鄉比比然也柳州播州皆非善地而播州尤非人所居黔地接壤於栁州而播之版圖則半隸於黔明朝二百七十餘年前後以謫官來兹土者有王文成鄒忠介兩先生忠介以抗疏忤江陵杖戍都勻衛日與勻士講明陽明良知之學著書立說大抵尊信文成者文成先生疏救戴銑遂謫為龍場驛丞得罪之由南臯略同宜其意之相從也其學問關乎世道人心其功在於生民社稷明臣中無有出其右者非氣節文章一才一藝之士所可企而及也故南臯尊信之不置而黔之士俎豆之無已也方先生初至龍場劉瑾憾猶未已事且不測自計得失榮辱頗能通脫獨生死一念未忘乃為石槨自誓居易俟命忽中夜大悟格物致知之㫖寤寐中若有人告之者呼躍而起從者皆驚始知聖人之道吾性自足向之求理於事物者誤也乃以𫝊記五經之言證之莫不吻合因著五經臆說嗚呼先生之學以謫官而成先生之道其亦由龍場而躋於聖賢之域也耶當日坐擁臯比講習不輟聞風而來學者雍雍濟濟觀其課諸生四條並問答語録俾尼山之鐸被於羅施絃誦流𫝊以迄今日黔之士肆成人有德小子有造嵗時伏臘或走龍場致奠亦有遙拜於其家者先生之教何其廣而澤何其深且逺歟乃復於窮岩茂箐之間以何陋名軒寅賔為堂君子亭玩易窩舊跡巋然遺風宛然雖樵人獵士過其地者無不感而生敬流連而愾慕其為人所謂頑夫廉懦夫有立志而况於親炙之者乎其最大者則在於水西安宣慰二書當是時劉六七之巨冦方興安氏之奸謀欲啓發微摘伏有以片紙數言讋服而震懾之消反側於未萌伸天王之大義雖司馬諭蜀殆無以過也嗟乎先生一謫官驛吏耳亦何與地方事而乃寓深心以弭禍亂講吾道以正人心實大有造於黔也哉而凡膺封疆之重有斯民之責者其亦當愧而知勉矣逮平茶獠征岑猛浰頭八寨猺洞革心鄱湖一戰宸濠授首異勳銘於景鐘大名垂於青史皆自龍場之石槨悟道始奈之何拘牽之說者謂其鄰於佛老而輕詆之然而光鋩萬丈揭日月而行先生之道固自若也夫知行合一致知為力行之本而力行實踐則必從功業中體驗而出先生之生平功業赫赫如是當時寧吉輩豈不聞知之顧乃甘為蠡測不惟先生所哂抑且為南臯所不受也余於撫黔之明年重修其祠既告厥成援筆書此且勒諸石以示黔士之來學者若夫祠之亭樹花竹因革始末則有阮楊之碑在皆所不道也是為記重修武鄉侯祠碑記田雯黔城南貯甲銅鼓諸山多武鄉侯陳蹟世𫝊侯於章武時南征此其平蠻略地處也按侯以南陽布衣受三顧之知佐先主奄有巴蜀而成帝業自離草廬以來二十餘年夙昔以管樂自期可以無餘憾矣洎乎受遺詔謂其才十倍曹丕終定大事夫所謂大事者非斤斤於六尺之孤而一隅之安也昭烈之志實未嘗一日忘併魏吞吳身將沒而志不衰蓋欲侯大展其才瞰中原之變興復漢室斯已耳建興元年侯以丞相領益州牧開府治事手握兵柄或以侯處此痛思先帝之顧命勢必奬率三軍首出祁山為北伐之舉其事審其計决矣而乃汲汲於南征之役者何歟當是時成都甫定根本未固也主幼國疑羣蠻蠢動而人心未歸也鳬蠶蕞爾之國財用弗充也脫一旦興師動衆驟議逺圖彼雍闓朱褒孟獲之徒得從而窺伺之且有以襲其後吾知侯之謹慎必不出此所以遣使聘吳因結和親可以畢力於南征而不敢輕試於北伐此侯之雄略亦逺謨也夫侯之南征後主親送於郊詔賜金鉞一曲蓋一羽葆鼓吹各一部虎賁六十人分兵三路遣馬忠攻朱褒李恢向益州達昆明而躬率步騎由水路入越巂又得酋帥濟火率羅鬼諸部刋山通道聚糧以供軍不百日褒闓悉平聞孟獲為蠻王長募生致之於是自艮坑佛光漾濞川而北厯髣州慶甸而西以暨乎驃國木鹿都魯普坎之問七縱七擒南人不反而心歸矣攻心為上由於街亭敗將之一言而成都根本之地如盤石矣三月興師五月渡瀘至秋而事定凡牂柯昆明越巂永昌地方數千里莫不收其豪傑以為官屬出其金銀丹漆耕牛戰馬以給軍旅之用財用充而國以富饒矣國富而後治戎講武北伐中原此固善體乎昭烈之志無負永安之托而侯之雄略逺謨為何如耶是豈管仲樂毅之儔所可比擬萬一者哉嗟乎出師二表日月爭光五丈秋風英雄揮涕正所謂運數有歸不可以智力爭也若夫損益連弩之妙木牛流馬之竒行屯田於渭濱作八陳於魚腹又侯之餘才剩技矣然蜀書所載於侯平蠻之道尤詳不置吏不留兵不運糧三者至當而不易蓋置吏而終不相信必成禍患留兵則無所食運糧則苦於山川險阻旦夕告匱而多脫巾之呼惟於既平之後即其渠帥而用之示以信義布以德威俾分守其土各部其民綱紀初定而蠻漢相安此道得也且其征之之方蠻習擊刺侯故困以兵蠻善燎原侯故攻以火蠻俗尚鬼侯之用兵疑鬼疑神也蠻所恃者深山密箐之中為羣狐三窟之計侯故窮搜之無得避震讋之弗敢出也至於貯甲銅鼓陳蹟依然何莫非侯之竒跡閟響有以服蠻人之心也哉山下有祠數百年矣距城不逺余故謁之而且新之復築小亭於山之上覽黔之勝而立石其旁因得考侯南征始末而述所以平蠻之道如此重修甲秀樓碑記田雯甲秀樓者江公東之之所從事也越今百餘年矣波濤洶湧之衝激風雨雷霆之動蕩烏得完樓哉蓋江公而後無復喜從事者何今之人不逮前人也江公當日知樓之有關於黔而皇皇為之且有關於黔之人才風氣而以甲秀名之其用意深矣假使江公之後或數年而一人焉或三五十年而又一人焉而不聽乎波濤洶湧風雨雷霆之交於樓也樓雖不完亦不若今日之甚矣無如江公而後遂成絶響落落百餘年無復喜從事者斯亦樓之不幸也使人而皆喜從事則天下何足治不獨一樓然矣後之君子常有所不屑則躁否則惰躁則妄惰則廢既妄且廢則天下之所以不治者常出於此而不足怪嗚呼此蘇子瞻之所以致嘆於驛館歟夫事之始也有創之者事之終也有成之者當夫創者既往成者未來欲存欲亡可斷可續之際有人焉存一線以待來兹其人不可少其功最大如經學與理學相表裏也理學成於宋儒韙矣然言誠言敬言禮言格物致知正心誠意莫不本於經學茍於嬴氏灰燼之餘非得漢儒諸人經各有注𫝊各有釋火盡薪𫝊以聞於後世宋儒欲直接洙泗之淵源詎可得乎蓋前事者後事之藉而絶續之交不可無其人也嗟哉此樓也江公之後有人焉今則事半而功倍也惜江公之後無人焉今則事倍而功半也大扺泄泄焉無復喜從事者吾慮黔之終無此樓也於是鳩工集材而新之度木於林伐石於山計瓦甓墁釘於匠興工於己巳之二月凡百五十日而成立於魚磯烟水之上跨乎長橋垂虹之間可以為黔人之美觀焉雖事倍功半逺不逮江公之所為亦可以無遺憾矣然而人才風氣之所關其在斯乎今日者風氣日挽人才輩出甲乙科名之盛又於黔士之文章卜之不盡係乎樓之完不完也余將以告夫後之喜從事者是為記重修偏橋碑記衛既齊施秉彈丸邑耳而黔楚往來實為東西咽喉由黔而之滇之蜀之粵西一線羊腸聨絡省會且四五焉縣北門外故有橋名偏橋夫楚南密邇荒服故設偏沅巡撫挈一州一衛以命幕府重其地也橋而専有衛名其為關津衝要非一日矣顧地當岑鰲景洞之間洪江南繞春夏霖雨暴漲山泉百道爭注奔騰震蕩橋亦易圯圮則行旅次且艱苦萬狀康熙二十七年橋圮即於是年議修之官黔中者皆協力鳩助伐石集工糜金一千六百有竒凡閲四寒暑至今三十年而後成其將成也余適奉撫黔簡命道經其上解槖中糗糧資助之工乃竣其工之巨而時之久蓋如此余觀古昔盛時雨畢除道水涸成梁畚挶之任一司里舉之有餘孟子之論子産曰嵗十一月徒杠成十二月輿梁成奏功不過句日間耳由今觀之何其難易懸絶與蓋黔地紆盤萬山中山嵐蒸鬱恆陰易雨謂之天末又謂之漏天一切橋梁道路與中土之平原曠野較不啻倍蓰無算其工之難成而易壞也大率風土限之也雖然人事修則風土為之潜移綢繆未雨先事而預防每每用力少而成功速及其傾圮潰爛然後圖之雖在中土難亦十倍凡事皆然豈容専諉其咎於風土也哉方今天子神聖深仁厚澤徹於梯航萬國之外黔雖逺猶郊圻耳余不敏竊欲奉揚德意俾黔中百度振興儷於中土值斯橋之成於下車時也記之以為百度權輿可也若夫經營鳩助則衆人之成績也其詳書之以志余不欲掠美之意云重修文昌閣碑記衛既齊會城東郊外有峯突起是為木筆文星支衍蟠曲而入城中為院司場屋之祖術家嫌其未盡聳拔思有以助之乃於子城之上建閣三層中祀文昌上以祀魁下以祀武安王而總名之曰文昌閣蓋從其類也閣成而人文蔚起科目奪省榜之半薦南宫宴鷹揚者從不乏人即蒞官於兹土者亦多譽寡咎不數嵗輒遷擢扶輿之霛信亦有所鍾耶邇來戈㦸頻仍城闕蕩焉若掃而此閣巋然獨存不可謂非呵護之力也然嵐侵雹損桷敗瓦飛神且不免於櫛風而沐雨幾幾有不能復全之勢余見而有觸於𠂻遂蠲資募工以整理之未幾而朽者輪敝者奐摩空切日頓還舊觀因伐石以志之曰吾聞文昌六星一曰上將二曰次將三曰貴相四曰司祿五曰司冦六曰司勳為天六府計集天道而其司籙之神則東晉越巂張亞子在周為張仲詩所稱孝友者是也在建興為謝艾𫝊所云以鐵如意贈姚萇一麾而戈盾戎馬畢列者是也若夫斗柄戴筐一星奎其形似履履以行逺言之不文行之不逺故文章之事歸之而武安王則所謂絶倫超羣讀春秋明大節義以成仁者也是皆有裨於風教其從而祀之也宜然非徒祀之已也古之大聖至神即古之忠臣孝子信友仁人茍大倫之無忝斯百世而可師生為上卿歿為明神在天為日星在地為河嶽無二道也則欲紹往烈啓新圖掇鴻名樹駿業當思與鬼神合德砥躬飭行補造化之所不及庶幾可相可將景命有僕百祿是遒不負重修之意也夫重安江新建浮橋碑記閻興邦五行之性莫柔於水而亦莫險於水隄之厚也而水能刷之石之巨也而水能轉之甚者從髙而下洶湧澎湃怒似共工捷同夸父其險極矣先王知其然以為水之散者可障以土水之暴者當浮以木稽之大易渙之彖曰利涉大川乘木有功也中孚之彖曰利涉大川乘木舟虛也夫坎水也兌澤也巽木也木作舟楫利以行水而橋梁之功有時而窮者通之以舟楫則險者可平今黔險地也而為滇之孔道從西而往者莫險於安南之盤江自鐵橋成而盤江之險不驚從東而來者莫險於黃平之重安江自石橋傾而重安之險益甚蓋此橋齧於水而行旅之號呼於兩涯者已數年矣前制軍范公目擊其險首捐五百金以倡滇黔之文武而飭黃平徐牧為之重修適豫自豫移黔亦捐三百金以樂觀其成如是者三年費金六百五十兩突遭山水衝頽一旦付之波臣時康熙三十四年五月二十五日也聞報憮然因念以剛制柔剛必不勝且水性悍土性疏置石其旁溪急澗陡衝之而去奏功實難爰進同事商度良䇿僉曰古有造舟為梁者盍師其意建為浮橋以通往來庶幾盡善豫應曰可仍上其議於制軍王公公亦以為然乃問司庫得兩省捐助銀若干檄令平越守逐一估計共酌價銀一千四百二十六兩零隨委餘慶牛令専司其職採木於山柔鐵於冶油麻灰漆工銀口食纎悉畢備凡江之廣濶二十餘丈用船一十六隻每船相去三尺通水勢也船面鋪板一丈五尺護以欄楯防失足也鐵鍊二根橫繫兩岸貫於船中使有約束也兩岸平砌馬頭重起階級使行者如履大道也其船定於九月搭造三月拆卸仍為住房一十六間所以便堆貯慎守護也酌撥水手八名給以工食處以屋宇則人多而接應易食足而用力勤也有船以聨之有板以平之繫以鐵索則堅施以石磴則坦為房以貯船則可久設夫以守船則可遵如是而重安江之險天地留之而人謀勝之於以知事不相其宜而膠於一定之法未有能濟者也夫世之人必以為木不若石之固舟不若橋之安乃盤江之橋架木於鐵絙之上而行者免覆溺之虞重安之橋造舟於大水之中而行者無望洋之歎皆所謂易道也易窮則變變則通通則久不變而求通古未有之者是役也起工於三十四年十月告成於三十五年九月文武之樂輸兩省之協助例得備書於石以告後之人時加修葺焉俾往來於滇黔者利涉大川不震不竦則險者失其險矣貴州通志卷四十二
