body:
  text: 貴州通志卷二十六人物志序選舉隱逸鄉賢列女忠烈流寓孝義仙釋宦迹方技文學貴州於十五國中風氣開闢為獨後宜人材寥落也夫民秉五行之秀以生原不限以地而風厲濯磨以底於成則朝廷教化之涵濡父兄師友之講習繄有賴焉漢晉時尹珍受經華夏許慎謝恕乃心中朝文采風烈焜耀南土明代開科取士俊乂彚征及王守仁謫戍龍場一時孫應鰲李渭諸人皆得興起絶學然則賢人君子蹤迹所至豈小補歟夫夷險之遇各殊隂陽之質復異或宣猷掞藻或仗節含貞流譽家邦咸足令山川生色即曲學方技精於其道亦有可觀雖才分不同要皆乘時以自見者也我國家重熙纍洽夀考作人光天之下至於海隅蒼生萬邦黎獻共惟帝臣而黔當風氣方開之會瓌瑋特達以光邦國者其未可量也已述人物志人物選舉明洪熙元年令貴州願試者就試湖廣宣德元年令貴州就試雲南二年定會試南北中卷數以貴州入中卷四年增雲南解額一名貴州取中一名七年增雲南解額四名貴州取中五名正統四年賜赤水衛張諌進士貴州有進士之始六年增雲南解額五名貴州取中七名十二年增雲南解額五名貴州取中十名景泰元年詔開科不拘額數是科貴州中十二名七年仍定雲南解額三十名貴州取中十名成化四年增雲南解額十名貴州取中十六名十年增雲南解額五名貴州仍十六名𢎞治七年準奏雲南貴州鄉試進呈録稱雲貴鄉試録貴州量助錢糧以備雲南供給雲貴解額共增五名八年增雲貴解額五名貴州取中十九名正德五年定雲貴解額五十五名貴州取中二十一名嘉靖十一年三月永寧進士趙維垣選庶吉士貴州進士選庶常之始十六年從巡按王杏請定貴州本省開科鄉試額中二十五名二十二年貴州試録訛舛巡按魏洪冕削籍布按司考官降謫有差二十五年從撫臣王學益請增貴州解額五名萬厯二十二年增貴州解額五名四十三年增貴州解額二名天啓元年恩詔增貴州解額一名四年以水西用兵減貴州解額七名典試以巡按傅宗龍代之七年令貴州鄉試復舊解額崇禎三年增貴州解額一名國朝順治十七年定貴州解額二十名康熙二年增貴州解額五名五年仍定貴州解額二十名八年增貴州解額三名十一年定額每科取副榜四名準貢入監二十一年補行辛酉科鄉試仍照五年額數取中二十名二十三年增貴州解額三名定會試南北中卷貴州屬中卷三十五年從巡撫閻興邦請照廣西解額定中三十名外副榜六名三十八年太和殿告成加貴州本科解額三名四十四年恩詔加本科解額三名五十年定貴州解額三十六名外增五經二名副榜一名恩詔加本科解額三名五十二年萬夀恩科額外增五經四名五十六年停五經中額雍正元年開恩科貴州鄉試加本科解額十名其癸卯正科以甲辰二月補行四年增五經二名共解額三十八名諭各省學臣將有猷有守之士舉薦二三人五年諭各省生員中有文行兼優者每學各舉一人七年諭京官自主事以上外官自知縣以上各舉所知一人以四川遵義府五州縣及湖廣五開平溪清浪各縣衛歸貴州撥四川解額四名湖廣解額二名外五經二名共解額四十四名副榜八名十年恩詔增貴州本科解額五名十三年諭各省官生中每十名取中一名乾隆元年開恩科貴州鄉試加本科解額十名徴辟漢尹珍牂牁人桓帝時以經術厯尚書郎宋冉璡播州人官承事郎冉璞播州人官承務郎進士宋冉從周遵義人李敏子遵義人猶道明播州人楊震遵義人白震遵義人趙炎卯播州人楊邦彥遵義人楊邦傑遵義人以上未詳科分明正統己未科施盤榜張諫赤水人官順天府尹壬戌科劉儼榜秦顒宣慰司人官參政乙丑科商輅榜申祜婺川人官御史王敞永寧人官布政戊辰科彭時榜黃紱平越人官右都御史南京户部尚書景泰甲戌科孫賢榜周瑛興隆人官布政使易貴宣慰司人官知府天順丁丑科黎淳榜鍾震宣慰司人官工部主事黎遜宣慰司人官知府陳迪赤水人官御史彭杲永寧人官工部郎中癸未科彭教榜趙侃普定人官左通政朱謙赤水人官僉事成化己丑科張升榜楊遵平越人官參議壬辰科吳寬榜茅鋐赤水人徐節宣慰司人官巡撫都御史俞璣宣慰司人官户部主事李珉烏撒人官御史甲辰科李旻榜朱璧宣慰司人官都察院經厯丁未科費宏榜熊祥鎮逺人官僉事郭珠按察司吏官僉事𢎞治己未科倫文敘榜詹恩宣慰司人官大理寺副汪大章安順人官參議正德辛未科楊慎榜侯位思州人官巡撫右副都御史甲戌科唐臯榜周昺永寧人官知府田秋思南人官左布政辛巳科楊維聰榜湯冔宣慰司人官知府嘉靖丙戌科龔用卿榜梅月安順人官副使壬辰科林大欽榜趙維垣永寧人官左布政使戊戌科茅瓚榜繆文龍烏撒人官參政敖宗慶思南人官巡撫副都御史王炯清平人官同知蔣宗魯普安人官巡撫都御史辛丑科沈坤榜聞賢永寧人官推官甲辰科秦鳴雷榜錢嘉猷鎮逺人官户部員外丁未科李春芳榜李佑清平人官巡撫都御史孫裒清平人官御史劉秉仁宣慰司人官巡撫都御史庚戌科唐汝楫榜姚世熙新添人官太僕寺卿孫守宗思南人官户部主事陳治安宣慰司人官刑部主事癸丑科陳謹榜陳珊銅仁人官行人孫應鰲清平人裒姪官工部尚書己未科丁士美榜汪若泮宣慰司人官大理寺評事梅惟和安順人月子官御史乙丑科范應期榜邵元哲普安人官參政蔣思孝普安人宗魯子官副使李良臣普安人官參政隆慶辛未科張元忭榜宋儒都勻人官禮部主事李大晉清平人佑子官同知許一德貴陽人官御史副使萬厯甲戌科孫繼臯榜陳揚産銅仁人珊子官知縣丁丑科沈懋學榜沈存仁普安人官知府孫世正清平人官副使庚辰科