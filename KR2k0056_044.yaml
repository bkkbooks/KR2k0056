body:
  text: 貴州通志卷四十四藝文賦詩明聖泉賦王杏客有謂日岡子曰𦕈茲牂州蕞爾一陬仰視中原猶寄黒子於人身之一胠其間怪石纍纍如吐如叴層巖嶪嶪如結如浮蟠蒼聳翠連亘綢繆是固子之所徧歴而旁收者洪邊之曲貴山之幽有水一泓天鑿其湫名曰聖泉謂匪人謀是殊方之獨擅亦賢士所遨遊子嘗知之乎不也日岡子應之曰吾嘗見茲邦之水矣高者懸瀑下者聚漚濶者為港窄者為溝廣不能容大壑之鱔深僅足泛㘭堂之舟何乃茲泉之名得為聖者之流子言迂矣殆亦未之詳搜客曰嘗聞之天惟至公不愛乎道地惟至平靡惜其寳人文正氣中原多抱山谷之深溪流之巧彼蒼或為殊方者造之子胡視之乎𦕈㵿也哉空言無徴泛聽亦藐口誦之真不如目擊之了請乘子之暇屈子之軺為子御重輪駕細褭借烟景於須臾拂風塵之繚繞相與觀茲泉之淼淼以明予言之非矯日岡子可之乃惟季春天日朗霽言秣其駒言膏其轊循郊墟以啟行遡層阿以深詣動微翠於干旌納輕飈乎短枻屹萬崖之陰森忽一壑之清麗聲出竹以泠泠風拂面以泄泄客曰斯聖泉之際也請於是乎少憩以惠吾子之睇日岡子下車而䀽之南山之阡惟谷谸谸中涵一窟甃以方圓冰冽其澌漱瑶滴璇石疏其罅排琚列蠙湛波光之上下㨗瞬息乎飛漩俄而瀰漫漲於巨川倐而翕聚滙於重淵有若巨海之鰲兮噴濤吐浸以侵軼乎八埏霎颶風之恬霽兮吸頷迴涎有若玉之麗於日色兮晶光蕩漾於藍田迨其静閟兮斂之於半畝之烟聽石鼔以為候兮輕重互為其闐任綸竿以為測兮高下各得其平迭往來之相繼兮殊過續之不愆迅時候之反覆兮妙消長於涘涓陰不能使之溢兮暘不能使之晙旱不能使之涸兮澇不能使之湮僅一斗之涵容兮浩氣吞吐乎旻天寄白雲於野草之隩兮宛潮汐之伸縮於大江之堧凝目以視兮凡幾轉圜窮神以索兮莫測其然將以為石竅之間而通兮泥藪或有時乎閼填或以為沙水之壅而成兮陵谷又若是乎屢遷是必蒼蒼之上兮結構於太乙之前神以為之範圍兮數以為之陶甄星宿其揚波之脈兮河漢其濫觴之源浮槎無所於窺兮鮫人求涉其偏顧謂客曰是誠聖矣非子之言幾失此泉非茲泉之勝幾不味子之言繄中原之未見諒大化之獨全已無有於蜀川之峽又奚數乎昆明之滇也哉客喜而笑曰因野人之諓諓而見與君子之明詮否者將不與畝澮之盈同耶是固嘉賞之有待抑亦茲水之有縁於是汲水烹茶釣鱗煮鮮採蘋採藻充皿羅籩泛元酒於蓬壺兮飛瑪瑙於瓊筵啜醴以遨兮縱真境之無邉賡考槃之章兮相與永矢於弗諼咏濯纓之歌兮挹爽於滄波之漣逝者如斯兮悟造化之真傳以兹為鑑兮戒光景於流連日臨於酉兮騐消息之有先樵歌送清兮倚斜曛於崦嵫之巔徜徉天地兮並匹馬以言旋次第其事於石間兮俟來者有考於斯編鰲磯賦江東之耽瑞子遊黔二稔撫鎮無庸喟然長嘆偶從直指應公憩釣磯謁武侯祠見城南河水清漣與梁亘跨曰美哉水中不停民其魚矣公曰隄津未備瀦澤奚繇障而防之亦其事也相與鳩工壘石擁階宛然鰲極臨流覽勝遂作斯賦其詞曰余承簡命言撫黔藩襟楚澤鎖滇垣背烏納面龍番牂柯金筑簇綺攢旙爾乃命駕乎綦郭飲馬乎流泉容與乎南明凝盼乎富川於以相厥攸宜卜築隄閈俯察仰觀上虹下案宛在水中水無漫涣廼進三老而問之曰孰有當於此者乎河水瀰瀰寜能使逝者如斯三老對曰僕聞成梁不易防川則難測而定之有基無壊民其永賴然則君侯之所指也母亦務是乎願聞其概余吿之曰是其源也未窮其際來自夷箐達涪出定中滙貫城其漲也湯湯乎若洪濤之浮拍而怒號奔激其耗也涓涓乎若清泠之赴坎而潺湲淅瀝易盈易涸乍沉乍浮與汨俱没與化俱流逺而環之敻寥邈而綽約廹而對之見阻隘而摶輖峻為之防驟汜濫而虞决低為之闔時淋漉而逐滮睠彼涵潭就伊沙渚方廣得衷下高合宁弱水中丘南溟蹲嶼積而能去散而還聚頴峯天表是曰署賔為章雲漢秀卓城闉左蠻架筆傍列貴人衍清唐之寒潄兮挹犀馬之甘泉吸三寳之靈液兮貫明珠以綴連綰北汪之青栁擷西池之白蓮帶霽虹之腰玉兮極南浦之縈漩於是我臺杌控我坁綫紆介在涯崖安於覆盂飛翬岧嶤作鎮鼎湖象文昌與武曲運經緯以昭憲斷鰲首以立極兮卧長鯨之横堰迴狂瀾於碤磧兮厰瑯玕之疊瓛浮海屋之龍宫兮訝蜃樓之非幻步登瀛以出塵兮共題名於塔雁左瞻右睞徙倚婆娑俯濯清纓反射紋波灘聲陵影晨夕烟蘿若吟梁父忽起漁歌伊惟幽人潄流枕石心逺地偏山青水碧灌木叢陰匿景逃籍希躅嚴陵垂綸自適維九鼎以一絲兮客星隠而名高棹扁舟之去來兮汎不繫而逍遥遺名利於烟水兮委直鈎於釣鰲一水盈盈對瞻古廟錦官森嚴諸番並曜懐美人於三顧兮綣魚水之遘竒余心悅其盡瘁兮鼎足成而運移誕天威以擒縱兮烏蠻震而靖夷儼遺容於尸祝兮据最勝之江湄嗟卧龍之蟠潤雖百世其可師為龍為魚一潛一見出處侔時蠖屈虎變既葆真而閟秀期人傑而地靈榮光塞河卿靄鬱蒸乘桃浪以遊瀚海兮謂熊飛而干城挽天河以洗甲兵兮騰八陣之遺英歇蘭若而奪琳珪兮淡二表於承明進可獻而退可懐兮憂則違而樂則行山之髙而水之長兮登斯臺其含情匪大夫作賦兮勉爾榮名髦士壯懐之磊落惟先哲之是程國朝他山賦錢邦芑瞻寰區之曠夐信山水之離竒乃黔地之荒僻更聳異而嶔﨑既嵽嵲而陡削亦峥嶸而逶迤余也忘情塵累遯跡遐陬遘茲異境心契神投闢萊穢於􅑬嵼焚荆榛於岰丘嵱嵷高下而畢現崱屴前後而俱收登椒巔以遥矚覺􅲡􅴁之奔投烟雲開闔以萬狀氣象變眩而莫求若夫崧屾㟪􅕲以艱陟洞穴合沓而陰尋迴溪漭潒而滂㵒大壑奔崩以懐靈隠窺地軸之維絡邈測天柱之矗撑至於叢柯偉木干霄礙雲榕樟翹負以飛曳㭚栛楚捷而隠森春花列綺於岓岤秋葉驚霜而換金高霞華映於峩峉朱雲采亂於岊岑獨是竒石磈磥拔地插天或贔屭而硈或碪􅑇而屈鬈或横仄而䂚或逆竪而倒懸或龍盤而虎奮或鵬舉而鳯軒或蛟騰而鴻下或獅怒而狻狂叶魚軒切或纛引而旗導或羽展而翅翩或雲垂而烟斷或浪擁而濤旋高者遏日下者迴嵐巨者藏谷空者隠潭皺者膚蹙漏者竅含瘦者骨削薄者縠彡散者星落簇者毛毿仰者如嘯俯者如凝立者如望欹者如嬉蹲者如怒踞者如思揚者如舞抑者如企端者如拱斜者如窺前者如待後者如趍聨者如布斷者如虧尖者如刺利者如刲既􅱕􅱓而嶻薛亦䃬礐而􅕲峩叶魚羈切况齟齬而曲􅥥又巧妙而因依抑且松檜叢倚栢杉掩映篁筠疎密以相間花卉參差而互襯蘚衣斑蝕而蒼木根盤嵌而凸勁玉膏涵毓而甘香石髓凝結而精潤況復淵泉迸湧流澮成河既汪洋以潲亦􅥼濈而迴紆兼曲汀而斜渚更危嶼而淤瀦加之高栁叢生於浩淼枝柯披蔭於洪渠荇藻絲牽而帶續芹茝斜刺而劍舒禽鳥間闗於林杪鳬鷖泳唼於蒲菰連峯倒影於波底懸崖插根於水隅以至淌澌浻澋石折崖迴穴鳴竅答巒傾岫摧魚鳥騰躍而莫定柯業浮盪而横排山因水而幽窅水得山而紆迴維山有亭名曰拜石斵木結茅依林傍窟據屻屽之巃嵸當䂜䂛之崒屼砇拱侍而碁羅砮䂤硱􅑇以陡嵂況復蹇烟佇嵐洗雨伴月時探竒而入影時伐虚而剔骨雲根倒灑夫珠泉䂥脚横穿乎木甲叶吉協切維水有舟名曰恰受一葉浮波清流獨潄漾淪漪而上下棹苔萍而簇湊遡輕漪而織影盪素瀾而破皺涵嫩緑於霄光挹柔碧於空秀月采沉璧而耀金雨痕滌沫而漂漚叶烏侯切蘭橈宛轉而夷猶布帆飄拂而邂逅維山之陽南望鰲溪山幽水繞泉石多姿既􅬵􅺌而明麗亦岭嵤而舒徐盼立鐘而接招隠望洞鵞而訪石鷄登峯西眺山曰五雲千崖嶢竪萬壑巉深嶚􅥲仰曕而神悸磵户俛瞰而骨驚鵰鶚斂翮而莫度狖猱援羅而懼深非禪棲之脩侣孰追級而遐登厥峯之陰山名佛頂杉溪環帶清駛絶影崨嶫􅪾㠑而難躋巗嵁嶙􅭆而奚騁名刹焜耀於危巘鐘鼔響傳於絶畛樹駐曦而虧耀巒障蟾而蹴景石磊砢而層疊泉瀑注而㵼井西南遐矚湄水如綫庵曰西來塘名古練當水轉而山環亦村古而林蒨幽人於焉結契賢士或爾憑眷環山百里萃茲名區龍潛鳯舉霞隠雲遊叶羊朱切明哲晦跡而耕牧英流韜采而魚枯乃復深宵歌嘯詩酒歡娱聲林隔而遥答氣谷短而潛呼於是雅尚相憐淪落為友朝夕過從味視蘭臭風雨無阻於昏㝠嵗月雖賖而猶遘時登高以遐想或聨袂而紆遲時銜觴以逺望或白眼而移時當唱和之相得每感慨而淋漓何諸子之髙尚矢肥遯以相期況山水之可樂奚荒寂之自疑且竒聞之共賞質今古而無欺復品行之修潔實風流而可師吾將托此以終老造化於我其何私朱砂賦田雯考夫銀燭流於朱提銅山啟於吳會合浦有夜還之珠番洋有醋潑之瑁精鏐美簜林邑螢飛黄鶻青雅錫蘭流潰西域之苜蓿葡萄南粤之珊瑚翡翠莫不居之為竒有以為利至若丹砂之名首見禹貢與砥砮而並稱入髹漆以成用鍾乳質近而形分紫英體殊而貌共烹而練之綘雪瓊膏餌而服之十洲三洞術傳鴻寳鷄犬昇雲書秘枕函杖藜照誦稚川勾漏是求香山廬峯見弄衞公以之􅛱羮昌黎因而兆夢石可㸃兮逋償金可化兮采送訪卲陽之巔遺井尚存過洞庭之埜鑄鼎猶頌匪怪匪迂宜愛宜重於稽所産不一其鄉二酉之麓間出湯池之下深藏雖習聞而未覩今乃見於黔疆阡江盤水婺邑銅崖咸可掘而可採然忽閉而忽開未有開陽之夥者也於是竒贏之徒廢舉之士指烟嵐以爭趨驅舟車而來至相與募保傭工畫壤列肆追一錢之蚓蛇探重泉之幽閟墏高支以造天脂親齎以覔地悵曉夕之莫知置死生於非意乍吐微鋩儼獲大貝雜土石以同居寢礦牀而酣寐或如矢鏃或如斧劈或瑩如鏡或黯如漆韎韐比光火齊較色燦矣霞披歘然榴滴是禀離精聿鍾火德細若輕塵巨等拱壁壘瑰陸離尺量斗計謂之砂寳辟邪魘魁豪客名家連城肯易鍤入畚出梯升綆墜附螘引猿擔肩負背載檢載披且淘且汰審厥楛良别夫族類此什襲而韞藏彼貿遷而罔市别有沿邨埜老接澗孤㷀措斗引竿漉末拾零足清溪而蝕趾目注粒而損睛波濤為之盡赤襟袂為之頓頳茍錙銖之可取雖纎忽其敢輕爾迺作竈支爐置碾施杵研之則我朱孔陽蒸之則揮汗成雨學團璣之走盤任㸃易而滴露更呼為汞改號曰硃其實則一其變則殊噫􅐵此一物也既不充耳目之玩乃妄傳服食之神以致多搜索於官牒遂視為希世之竒珍使者不言神仙願下令而長禁砂其莫産山谷何為苦此一方民漏趵泉賦田雯富水之西去城五里峰迴逕轉隠軫駢闐在彼中阿有㳅出焉名曰百盈字之聖泉庱庱淜淜瀯瀯涓涓虎鬚方聚魚目更煎閲寒歴暑不知嵗年置準其中以騐後先俛仰深沉罔越罔愆蓂莢謝榮璣衡廢旋重黎解政常羲罷占綫景徒測葭灰徒然螘運周髀之磨儀渾顓頊之天麐朴脩墜而未精郭許晰理而難詮一日之内俄頃之間甫除甫椉倐滿倐蠲何必登觀象之臺臨鐡勒之邉商度次於壺遂較盈虚於巫咸哉此其所以為百盈歟方其進也㳅行及其退也坎止始焉不驟終焉不已如日之經猶星之緯莫測其源莫竟其委孰鍵其闗孰斡其裏大旱竭澤而不焦巨浸稽天而不圯以晝以夜以施以閉見兮麐游隠矣鳯舉神龍之時屈時伸至人之可出可處往而知返求而能與寸陰是惜尺度必軌不可得而挹其可得而徙耶此其所以為聖泉也歟吾聞水之潤地脈之周身一呼一吸一縮一盈釋氏數息而觀鼻黄老騐炁以養生動則俱陽静亦凝陰華池灌潄湧泉引伸嗇淫尾閭坁漏金莖百蓄一洩吐故納新散華斂樸翕虚闢清按之澄泓汲之囦渟節宣輔和樞紐調真繇此而推猶未可勝潮有春秋之信木有開落之辰雁乘之而去來蛬候之而蜚鳴抑聖水之稱不一其目琉璃之澨亳州之麓烏竜二池武陽一掬巫山之峰並此為六更讀鴻書亦云漏汋語其情狀比於趵突惟厚德之難量斯佳名之屢托無怪乎間至錦鞍時停華轂埜客對之而流連風人臨之而躑躅石船賦常安維黔有石船形宛然杙於何日棹於何年扣之有聲琢之彌堅爾乃泊於牛渡河中停乎獅子峰畔遥倚白蘋之洲近接紅蓼之岸任其朝霧之迷聽其夕雲之亂幾經天上春秋更歴人間月旦且復檣收曲澗碇重盤渦高碍斗牛楫揺丹桂逺牽雲浪纜結修蘿寒浸中流有月不貫冷涵水底無風可波空號羽毛似駛難稱葦葉如梭久阻思歸之棹淹留乘興之艖若夫叱石兮羣起而化羊射石兮夜行而疑虎鞭石兮血出而海填煉石兮彩成而天補取笏而拜兮無為之石丈刻桐而扣兮臨平之石鼓昆明池兮鯨鳴零陵郡兮燕舞是皆故蹟之相傳猶有遺踪之可數羡此船也無沉而無浮誇此石也歴今而歴古是以長為礎潤不逐星流觸虚焉終無所怒不繫矣寜將何愁豈勞工倕之輩無煩虞姁之儔堪為僕射之居處不類孝亷之停留白鵠湖中舴艋頻泛太虚山下漆船常浮惟是秋蘆嵗嵗迷離春水年年蕩漾汨萬頃之長流倚四圍之疊嶂縱操瓊楫何施不問布帆無恙悠然樵子之歌邈矣漁郎之唱於是鷁首霜鋪潔白螭頭月照空明擊楫聲聞澎湃扣舷響答噌霜滿秋郊紅葉落雨來春夜紫苔生庶可免朝來暮往又何須故送新迎豈非深鑒風波之險頓悟桑海之情哉五言古唐送趙判官赴黔府中丞叔幕李白廓落青雲心交結黄金盡富貴翻相忘令人忽自哂蹭蹬鬢毛斑盛時難再還巨源咄石生何事馬蹄間緑蘿長不厭却欲還東山君為魯曾子拜揖高堂裏叔繼趙平原偏承明主恩風霜推獨坐旌節鎮雄藩虎士秉金鉞蛾眉開玉樽才高幕下去義重林中言水宿五溪月霜啼三峽猿東風春草緑江上候歸軒經亂離後天恩流夜郎憶舊遊書懐贈江夏韋太守良宰李白天上白玉京十二樓五城仙人撫我頂結髪受長生誤逐世間樂頗窮理亂情九十六聖君浮雲挂空名天地賭一擲未能忘戰爭試涉霸王畧將期軒冕榮時命乃大謬棄之海上行學劍翻自哂為文竟何成劍非萬人敵文竊四海聲兒戲不足道五噫出西京臨當欲去時慷慨淚沾纓嘆君倜儻才標舉冠羣英開筵引祖帳慰此逺徂征鞍馬若浮雲送余驃騎亭歌鐘不盡意白日落昆明十月到幽州戈鋋若羅星君王棄北海掃地借長鯨呼吸走百川燕然可摧傾心知不得語却欲棲蓬瀛彎弧懼天狼挾矢不敢張攬涕黄金臺呼天哭昭王無人貴駿骨騄耳空騰驤樂毅倘再生於今亦奔亡蹉跎不得意驅馬還貴鄉逢君聽絃歌肅穆坐華堂百里獨太古陶然卧羲皇徴樂昌樂館開筵列壺觴賢豪間青娥對燭儼成行醉舞紛綺席清歌繞飛梁歡娱未終朝秩滿歸咸陽祖道擁萬人供帳遥相望一别隔千里榮枯異炎凉炎凉幾度改九土中横潰漢甲連胡兵沙塵暗雲海草木揺殺氣星辰無光彩白骨成丘山蒼生竟何罪函闗壯帝居國命懸哥舒長㦸三十萬開門納兇渠公卿如犬羊忠讜醢與菹二聖出遊豫兩京遂丘墟帝子許專征秉旄控強楚節制非桓文軍師擁熊虎人心失去就賊勢騰風雨惟君固房陵誠節冠終古僕卧香爐頂餐霞潄瑶泉門開九江轉枕下五湖連半夜水軍來潯陽滿旌旃空名適自誤迫脅上樓船徒賜五百金棄之若浮烟辭官不受賞翻謫夜郎天夜郎萬里道西上令人老掃蕩六合清仍為負霜草日月無偏照何由訴蒼昊良牧稱神明深仁恤交道一忝青雲客三登黄鶴樓顧慙禰處士虚對鸚鵡洲樊山霸氣盡寥落天地秋江帶峨眉雪川横三峽流萬舸此中來連帆過揚州送此萬里目曠然散我愁紗窻倚天開水樹緑如髪窺日畏銜山促酒喜得月吴娃與越艶窈窕誇鉛紅呼來上雲梯含笑出簾櫳對客小垂手羅衣舞春風賔跪請休息主人情未極覽君荆山作江鮑堪動色清水出芙蓉天然去雕飾逸興横素襟無時不招尋朱門擁虎士列㦸何森森剪鑿竹石開縈流漲清深登臺坐水閣吐論多英音片辭貴白璧一諾輕黄金謂我不愧君青鳥問丹心五色雲間鵲飛鳴天上來傳聞赦書至却放夜郎迴暖氣變寒谷炎烟生死灰君登鳯池去忽棄賈生才桀犬尚吠堯匈奴笑千秋中夜四五嘆常為大國憂旌斾夾兩山黄河當中流連雞不得進飲馬空夷猶安得羿善射一箭落旄頭憶秋浦桃花舊遊時竄夜郎李白桃花春水生白石今出没揺蕩女蘿枝半掛青天月不知舊行徑初拳幾枝蕨三載夜郎還於茲錬金骨夜郎承恩放還兼欣復京師示息秀才李白黄口為人羅白龍乃魚服得罪豈怨天以愚陷網目鯨鯢未剪滅豺狼屢翻覆悲作楚地囚何日秦庭哭遭逢二明主前後兩遷逐去國愁夜郎投身竄荒谷半道雪屯䝉曠如鳥出籠遥欣尅復美光武安可同天子巡劍閣儲皇守扶風揚袂正北辰開襟攬羣雄胡兵出月窟雷破闗之東左掃因右拂旋收洛陽宫囘輿入咸京席卷六合通叱咤開帝業手成天地功大駕還長安兩日忽再中一朝讓寳位劍璽傳無窮媿無秋毫力誰念矍鑠翁弋者何所慕高飛仰冥鴻棄劍學丹砂臨鑪雙玉童寄言息夫子嵗晚陟方蓬流夜郎永華寺寄潯陽羣官李白朝别凌烟樓暝投永華寺賢豪滿行舟賔散予獨醉願結九江流添成萬行淚冩意寄廬嶽何當來此地天命有所懸安得苦愁思竄夜郎於烏江留别宗十六璟李白君家全盛日台鼎何陸離斬鼇翼媧皇鍊石補天維一迴日月顧三入鳯凰池失勢青門傍種𤓰復幾時猶會衆賔客三千光路岐皇恩雪憤懣松柏含榮滋我非東牀人令姊忝齊眉浪跡未出世空名動京師適遭雲羅解翻謫夜郎悲拙妻莫邪劍反比二龍隨慙君湍波苦千里逺從之白帝晚猿斷黄牛過客遲遥瞻明月峽西去益相思贈黔府王中丞楚孟郊舊説天下山半在黔中青又聞天下泉半落黔中鳴山水千萬遶中有君子行儒風一以扇汙俗心皆平我願中國春化從異方生昔為陰草毒今為陽華英嘉實綴緑蔓凉湍㵼清澄逍遥物景勝視聽空曠并困驥猶在轅沉珠尚隠精路遐莫及眄泥汙日已盈嵗晏將何從落葉甘自輕長安送友人之黔南薛能衡嶽猶云過君家獨幾千心從賤遊話分向禁城偏陸路終何處三相在素船琴書去迢遞星路照潺湲臺鏡簪秋晚盤蔬飯雨天同文到鄉盡殊國共行連後會應多日歸程自一年貧交永無忘孤進合相憐元七星闗馮福可㸃蒼何蒼蒼環以西洱河百年雨露恩詎敢煩天戈轅門振烏撒衣帶踰牂柯巨險久已平故闗尚陂陀云胡七星名亦復重不磨翠屏山何𢎞士俗山如俗人過眼不相揖據鞍無好詩羇思廹胸臆行行見翠屏景意兩相適烟蘿幕青黛山厓剷蒼璧雲霞油然生杉檜森以立鳴禽遞清響飛泉散珠急我疑有幽人相傍崖居密朝餐紫霞英暮㗖香松實明獨嘯亭周瑛一年卧衡門復領楚西牧此行誰使之應不為斗粟和衷乏僚寀供御少徒僕訟庭日無事何必修邉幅每當風日佳散步自捫腹仰天舒鬱襟大塊苦局促正聲發唇齒餘響振林木浮雲斂太清長風動虚谷雖未諧宫商猶堪擬絲竹縁非不平鳴祇用矯庸俗新亭已結構徙倚一寓目燕雀莫驚猜吾將逐黄鵠題飛泉周瑛下馬碧山阿散坐清溪濵遐觀千古上地下人已陳引手弄清湲與君懐抱均安能被炎汗日與簿書親北山深窈窕逺接魚樵蹤中有寒泉水如奏嶧陽桐灑雨映疎竹隨風鳴長松坐久人跡絶孤雲生前峰杜甫愛西瀼淵明登東皋而我有高興石面覯飛濤平生得喪心對此輕秋毫不謂宣尼逺白日坐聞韶飛泉落深潭波瀾方渙渙中有得意魚往來或聚散銜杯意方適忽爾接竒玩解組嗟未能臨川發長嘆西園王守仁方園不盈畝蔬卉頗成列分溪免甕灌補籬防豖蹢蕪草稍焚薙清雨朝來歇濯濯新葉敷熒熒夜光發放鋤息重陰舊書漫披閲倦枕竹下石醒望松間月起來步閒謡晚酌檐間設酣時藉草眠忘與隣翁别水濵洞王守仁送逺憩岨谷濯纓俯清流沿溪陟危石曲洞藏深幽花靜馥常閟溜暗光亦浮平生泉石好所遇成淹留好鳥忽雙下鯈魚亦羣遊坐久塵慮息澹然與道謀謫居龍塲結草庵居王守仁草庵不及肩旅倦體方適開棘自成籬土階漫無級迎風亦蕭疎漏雨易補葺靈瀨響朝湍深林凝暮色羣獠環聚訊語龎意頗質鹿豖且同遊茲類猶人屬匏樽映瓦豆盡醉不知夕緬懐黄唐化畧稱茅茨迹陽明小洞天王守仁古洞閟荒僻虚設儼相待披萊歴風磴移居快幽塏營炊就巖竇放榻依石壘穹窒旋薫塞夷坎仍掃灑卷帙漫堆列樽壺動光彩夷居信何陋恬淡意方在豈不桑梓懐素位聊無悔送劉美之太守赴銅仁杭淮園栁何青青江草萋以碧送子適萬里執手情脈脈嗟彼雲中雁翺翔依沙磧不為稻梁謀何以有南北努力慎所之悠悠豈終隔送王陽明謫官龍塲驛杭淮白日野中微浮霾結朝陰送子逺行役躑躅傷我心豈無良朋儔不如子同音寂寞及窮荒誰能念浮沈願為雙玉軫相隨麗瑶琴聖泉篇楊慎龍圖天生水羲畫山出泉睠茲觱沸流肇自混沌年盈涸在頃刻消息同乾坤塵刹變潮汐億垓無貿遷帝臺盎漿下神瀵壺嶺巔冰雪姑射質風露綽約仙竇雲騰潏潏泓月涵涓涓蝦鬚穿皎鏡蟹眼瞭淪漣岷觴衍遊聖㘭舟喻思𤣥迷蹤鬼方霧藴真羅甸烟詎逢陸羽品那遇桑欽傳名公紆勝引喜招陶芳筵折簡開薈蔚飛觥延霽天玉珂鳴重巘金艾明華田碧瀲灑柔翰翠微鑑洞絃臨淵稱混混倚谷望谸谸麗闉鼛鼔動迴谿蕡燭然荒塗欣長㑹興言遂成篇烏撒喜晴楊慎易見黄河清難逢烏撒晴陰霾既已豁險道況復平蜀日杳千里滇雲惟十程江花與江草異國看春生平壩南村何景明朝出城南村策馬入荆杞村中八九家烟火自成里兒童候晨光稍稍荆扉啟田隣務收穫時復披草語昵昵何所云但云好禾黍秋陰結林霏細雨灑茅室牧放止近郊牛羊不相失廣園散花林平疇藹風日長幼不出門咸知戀儔匹喧喧車馬中徒為慕高秩懸輿當何時可使志願畢沉沉古陂水日暮寒更緑隔阪見居人蘿蔓纒草屋摘禾留客飯採薪伐枯木童穉持竹竿雨中放鷄鶩區區化外國猶得覩淳朴普定何景明鼓絶掩山城空堂思超忽孤燈明夕帷悄悄凉風發落葉何飄蕭飛螢互明沒客窻臨古寺坐待微鐘歇清平令何景明清平之縣令不識何為者庭前長野桑庭後長山檟猛虎上我城青狨啼我舍昨日出城去騎馬到部下部民道遮之持刀殺其馬入門顧妻子所居無完瓦秋風吹樹木白日落原野永夜空城中哀哀淚如㵼平越何景明清晨發平越霧暗山益密僕夫各相戒路途恐迷失薄午游氛清參差衆峰出鷄鳴溪谷中始見厓上日雲葉分沓冥高原被華實秋風起叢林興感乃非一悠悠逺行邁歴險難具述黒石樵歌程㸅黒石落窮崖崚嶒亂溪滸獨有執柯人忘却登山苦朝出弄蘆笙暮歸敲石鼓風清一肩息黄童和諸父東山吴國倫九日不登高烟霞澹林麓十日秋氣清東山倚天矗複道舒新蓁琳宫隠扶木振衣躡其巔一縱千里目荒城大如斗衆山渺焉伏掃石坐層雲鳴鐘發幽谷僧至焚妙香居然在天竺忽開西域蓮掩彼南陽菊何言非土良遊此築堪卜羲馭難可停且倒樽中緑别貴竹諸友張翀十年與君遊千里與君别把袂意不言含杯氣欲絶漸隔瀟湘雲空留夜郎月一曲瑶琴彈知音對誰說川上雜咏李渭巖阿黄虞民獨志惟田園日出復日入不知城市喧去草培嘉禾兩者不並存汲隧甘自掘抱膝聽禽言野步任頡頏所到成流連況復泉壑清渡雲澹浮烟石高坐垂釣月出歌放船達人各有懐那復論百年雲渚澄素景奩澹披秋夕沙渫沸蓀畹潦盡見村宅一鶴自零丁千峰散虚白揮手弄潺湲借茲洗形役山影江半陰渡口喧人語東林精舍近幽人自來去漁父歌放逸澹然寡塵慮為愛乘槎行直到水窮處遊嵇公泉李渭吾與二三子覽勝求前賢嵇公昔垂釣傳聞於此泉披雲尋往事流水不知年山空琴欲冷樹古鶴來眠聞黔中平志喜林堯俞皇風式九圍聲教暨邉鄙由來西南夷難用漢法理其居雜編氓其道羈縻耳撫馭乖所宜騷騷孰為弭黔本𨽻鬼方滇蜀相唇齒各自有君長號令一齊止昨者糾諸樊西川亂無紀況乃安奢酋水藺負堅壘目覩貴陽城疊氊同折箠我軍寡且弱日夕呼庚癸相距及嵗餘如肉置諸机疾聲望外援割髪而噬指幸然捄兵至背城拚一死又逢賊氣惰乍合便披靡既以解重圍亦足療瘡痏雖未極兵威庶幾褫不軌斯維社稷靈人力詎至此但此全城功僉云李與史願懐往事虞勿生戰勝喜如聞老鴉闗去城僅五里城南江亭學使壁哉韓公邀同參知大涵謝公小集五首謝三秀旦發虹梁門暝投漁磯路春水半篙緑褰裳不可渡溪深烟復深遥遥辨庭樹官栁變寒條二月孤鶯早細水浣殘花幽風梳短草川原霽人目曠然愜探討羣公結駟處乃在清川曲危石疊飛雲奔泉潄鳴玉隔浦見茅茨寒燈影深竹空亭留讌言山牀壓春酒以茲川上意緬懐魯中叟白鷗不避人矯翼下溪口踞此松間石盈盈春一望秀月吐層潭清輝幾千丈何處夜漁歸前村人語響謫仙橋鄒元標盤谷清溪上滴滴山間鳴盤谷逶且邃山泉流且清酌此杯中飲欣然得我情坐覺塵蹤逺還令世慮輕欲構留雲窩時來濯我纓龍山鄒元標曲徑排雲上層崖插碧空古木環青靄烟霞亂石叢磨碑拭古偈翻經一叩鐘曇摩今何在偓佺竟不逢真有逍遥趣泠然欲御風飛雲巖鍾惺吾聞山出雲巖則雲之室茲巖雲所為雲與山為一山雲老亦堅浮者化而實初至怯空遊梯磴乃歴歴下上於其間步步可遊息石以雲為神雲以石為質石飛雲或住動定理難詰草樹過泉聲尋之莫可覿曉行黎蛾道中陳際泰高霞飲朝氣水木澄空宇嵐光半欲浮輕鷗依淺渚峰影逺近開次第如展羽春溪雨乍收景色特清舉好山無數青歴歴真可語久置塵勞中煩悶深自苦忽得此蕭曠心神淡相取耳目引清端遇物都有主一往果情深何必夢天姥遊雙明洞張瑞圖誰於疊嶂中闢此虚明境山迴石壁峙儼若列九鼎四門森開張萬象無遁影碧潭凝其源澄泓開天井似開睡龍鼾兼愁佛骨冷六月若清秋炎觸失所柄玲瓏若鳯穴輪轉無停頃此意非偶然惆悵過夜永次平城葛一龍言從擷香芷五日瀕江路傾危赴偃仰偪仄謝回顧深林雨濯濯隔水山箇箇亦有不耕人木末營茅蔀自謂巢居尊罔知夜郎大出普定葛一龍怪哉兼日路坦坦無迍邅居人不著土結構山之巔舉爨悮烽燹辟穀餐雲烟久處弗自異行者目為仙四序一氣候常此黄花天得黔報寄示兩子尹伸仕宦通黔藉時比於放流頃者用戎馬反以才名收我昨權出處曾慮當見投未即猿奔林己同鷹在韝衰年履瘴鄉病軀親戈矛中子不樂聞況使老妻憂惟余性頗達死生同一漚炙額兼噴鼻壯夫昔所羞茍能了二觀未必無一籌世法今頗解勉師老氏柔冠軍當辨戰都䕶或深謀聲靈仗英主小醜何足劉虔勤奉簡書功利不敢求畸人倘天幸為我營菟裘軍中詩尹伸往時言苦樂總未行三軍軍中無尊賤軀命等一塵日月在雕鞍期會敢逡巡渡險每需次竟日河之漘危峰霜雪中斗帳冒荆榛暮炊常丙夜朝櫛必先晨銅焦徹曉鳴鄉夢苦不伸疲馬囓枯草聲息凌枕茵行營無餽糧捃摭常未匀甘言慰徒旅卞性轉慈仁嗟哉靜潔心往往違天真有家不敢懐同曹羡居人夙好黄老言謬謂通於兵為和不為倡陰節欲其盈主者有𤣥契桴鼓不輕鳴驕賊百里來剽鋭亦善爭躍馬迫吾壘白刅光縱横其氣已先竭矧能窺我情一决千仞谿殱之如落英遊甕安後巖曹代之寒氣斂餘肅晴風振天表林麓動幽懐探歴盡竒窈孤笻躡危級寓目延清眺烟嵐淨逺山諸峰青未了湖光一片明孤情窮浩渺百感從中來俯仰各有道茫茫集百端欣慨縈懐抱古碣讀遺文嵗月不易考轉境得幽異絶壁參空杳草木肆蒙茸怪石迷絲蔦石穴不可尋寒雲棲樹杪諸子爭勝情領畧具清皎踞石發高嘯登峰絶危討曲折頓忘疲感觸亦深悄歸途月色明回首孤峰小新添晚村劉泌春力通原野車馬恣新緑歸心行失次日入在荒麓有村流水邉溪花亦多簇畎澮晚烟蒙穉子驅歸犢三五指行車問君何所逐感此良嘆嗟欵扉止我轂昏堂燈延客居人失幽獨夜深人盡卧掩巵對殘燭榮名亦區區以已聽伸縮如此車馬間何曾語昔夙月光明吐階渠響越平陸簡較生平心惆悵鷄聲促國朝秋日邀諸子遊黄平鼔臺山米璁風日具清皎秋氣在巖谷之子三五人逍遥互追逐領畧各為情幽勝隨意足修枝著微黄新篠蔭深緑樵徑縱横開落葉迷荒麓時聞鷄犬聲隔籬見茅屋杉檜隠荆扉短籬雜疎菊委折得石梁溪流琤寒玉殘陽漸欲低孤􅐟引清穆剥蝕古跡深摩挲苔蘚覆憑弔見興亡蒼茫動心目小酌倚長松高霞照幽獨仰視浮雲翔因悲時序促塵網暗相牽高尚難自朂安得素心人共卧深山曲蒲村歸田錢邦芑生平寡世情賦性躭閒逸塵網一羈牽舉步成礙窒沉思本無味忽忽如有失一朝決去就曠然深自得理我荷葉衣拂我笋皮笠逍遥田畝間昻首看雲色百物適自然欣彼歸飛翼闗索嶺田雯吾足右跛跎一人纔餘半畏登百尺樓况復凌霄漢茲嶺箭鋒直勢傾一柱觀花鬘疊似螺嵐光鋪如練鳥徑一綫垂誰為假羽翰泠泠清風吹躡級倐無算兩腋盪閒雲籃輿張風幔樹杪度午鐘依微露僧院畇畇竹嶼寛淰淰泉珠灌茶話已移時坐久烏巾岸格磔鳴不休思逐山禽散層層上上頭峰冒明霞亂古麛驚人跳戌旗隔樹斷小雨白㲲濕晚店青䕸㸑高吟行路難夜凉生寤嘆石花田雯㶁㶁三岔河矗矗萬仞砦劃然地勢開烏川合一𣲖兩屋古所劈峭立山不壊清和四月半湍流忽滂湃斑斕石上花初發卷如蠆望之塗朱紅晴霞落天外竒葩三五夕小者復漸大十里百數叢赤城罥青靄或圓如羽輪或高如飈斾經旬色微黄淡寂餘殘瀨天女采之去瓣蕊不可丏水漲畏蛟鼉觸舟多水怪洎夫水落時花空已難再石青壁蘚光離離無根蔕獨於逺眺宜巨靈何狡獪習安山水佳紅溪抱緑岑無如石花竒疑是優曇林安得凌首夏洄溯一相尋挐烟駕漁艇泛泛斜陽沉馮夷息浪鼔高栁鳴幽禽繫花衣帶間紅霞滿清襟汲水胭脂井晚炊還孤斟月上沿屋行往聽三潮音平溪道中湯右曾五更江起霧暗裏蕩雙漿洶洶無停聲浩浩信長往推蓬暫窺臨艓子浪花上川光互明滅山影迷俯仰纜船呼晨炊風日漸晃朗澄澄碧波映皎鏡平似掌迴湍成圓淵觸石怒濤響灘行屢紆直石骨轉森爽天寒竒姿露刻畫勞萬象千林散青紅絶景見無兩晨霞互斑駁雲錦亂泱漭緑流恍舊山水盡憶弭榜永懐滄洲趣暫此足清賞高真觀張大受我來訪仙蹤幽亭築巖麓長松化龍鱗老桂孕兔腹涓涓屋頂泉不竭寒繼燠逺望玲瓏石近倚蕭疎竹粤稽明始興創業重誅戮游戲似譎諌異人肯羈束浮沉隠亦仕轉旋禍為福山城騎鶴遊事比綺與甪當今天子聖仁德漸百族升朝釐紀綱賢俊罕隠伏不聞方伎流用幻惑世俗豈無高隠者學道侣麋鹿招之即肯來敢辭曳尾辱回望三百年荒厓寄孤躅殘碑竒字留捫蘚試重讀飛雲洞常安飛來何處雲却到黔山住片片入洞中化石結鐘乳象如瓔珞垂氣若噴烟霧造物騁竒怪渾似人工錯洞外澎湃聲半空懸瀑布虬松老漢唐鳥道路迴互心目一豁然低佪還四顧役夫促前行斜陽正滿樹山行常安山行復山行曲折羊腸路雲磴摩蒼穹人在雲中度斜陽照馬鞍馬嘶芳草渡憶得二年前身從此山去無何白髪新此山青如故王文成祠晏斯盛孟氏學有源龍門觀禹迹公獨得逕途良知自開闢當年謫龍塲真幾茲勃發講學來貴陽知行無岐陌時復重一言大方消虺蜴經濟遽崢嶸有明資斡擘煌煌著事功的的原心宅中稍異程朱亦自沛津筏夜來讀要書錢王未窺摘至善在人心此知奚假易夏遊思念庵記言在紬繹安得祈濫觴相與存餘澤世世事春秋庸敢漫騷屑飛雲洞陳悳榮古巖如屋覆山根足幽䆳石形各異狀一一煩仰睇玲瓏冰筯滴比櫛蜂房密滑突人乳垂拳曲佛手繫大者疑雲龍頭爪露靈異又如洪濤翻盤渦互騰沸沉沉太古色青蒼鬱虧蔽遥想融結初真宰勞位置下有不測洞䝉幕鬼窟閟藴蓄雲水根吐納山川氣倉皇昔經過鞅掌役王事今茲撫石欄揮洒勞人淚方池一泓水清徹識我意老栢勢更竒撑拄青霄際日月促勞筋倦足此暫憩摩挲亭上碑遊人富清製愧無曹劉才難勒石上字好帶片雲歸間擬栁州記石阡道中題將軍陔鄒一桂孤標凌太虚受氣變霜雪樷木不能附㸃綴亂一切稜稜蒼骨寒孑孑挺高節山為仁所樂毋乃過勇決那知堅壁中泉脈出自穴虚中涵智水流潤生膏澤外樸内文明此圖可觀易豈徒誇石筍椽筆書天闕過天柱縣幫洞山鄒一桂三壺在海表風烈不能舟秦皇覔不見漢武將焉求物理近可譬此山即神洲鴻濛未歸壑激盪成彫鎪一朝變桑田陸海膠浮鷗宛如白蓮朶半放含清秋上結寳花臺疎磬鳴松楸得非壺公宅於此邀浮丘盤旋轉蝸舍往返周華不蜂腰附螻蟻蝤領飛蜉蝣對岸立鋒㦸晨光耀兠鍪湯湯濯古礎砥柱滄溟流雀蛤以時變䕫蚿憐其儔安知吾不化鼔翅同莊周七言古唐流夜郎贈辛判官李白昔在長安醉花栁五侯七貴同杯酒氣岸遥凌豪士前風流肯落他人後夫子紅顔我少年章臺走馬著金鞭文章獻納麒麟殿歌舞淹留玳瑁筵與君自謂長如此寜知草動風塵起函谷忽驚胡馬來秦宫桃李向誰開我愁逺謫夜郎去何日金鷄放赦回明飛越峰天馬歌楊慎高皇御天開大明龍馬出自養龍坑房星夜下盧龍塞天駟曉來驃騎營殿前重瞳親賜閲仗外奚官爭相迎鷄鳴牛首試控縱鳯師麟儀無逸驚追風絶塵羡迅疾逐日光影羞翾輕四蹄蹁然不蹍地六飛如在空中行是時蠻婦有奢香左驂牡驪右化黄貢上金陵一萬匹内廐惟稱此馬良宸遊清燕幸鸞坡學士承㫖贊且歌飲以蘭池之瑶水秣以藍田之玉禾飛越峰名自天錫駿骨雖朽名不磨至今百七十嵗時山頭猶有養龍池方經地志或挂漏箐苗洞獠那能知吾聞天下有道飛黄伏皁又聞王良策馬車騎滿野前時吉囊冦大同𤇺火直達甘泉宫近日莫瀛亂交趾羽書牙璋徧南中安得將星再降𫝊友德房宿重孕飛越峰一月三捷獻俘馘千旄萬旟歌熈雍嗚呼將相寜有種龍駔豈無媒經途訪迹一興慨郭隗孫陽安在哉長歌終曲長風來赤虺河行楊慎君不見赤虺河源出芒部虎豹之林猿猱路層冰深雪不可通千尋建木撑寒空明堂大厦採梁棟工師估客穿蒙籠此水奔流似飛箭縳筏乘桴下蜀甸黯淡灔澦險倍過海洋流沙爭一線誰驅烏鵲役黿鼉秋濤夏潦息盤渦栢亭雲屏濟川手奠民枕席休干戈安得修為夷庚道鐫刻靈陶垂不磨普市楊慎孤城比屋雪封瓦重霧濃嵐羃四野飄飄風凹巧回鳶凝涸冰漕工溜馬倦客落日投主人冷突無烟炊濕薪敢辭白首禦魍魎眼見木天尤苦辛盤江行何景明四山壁立色如赭盤江横流絶壁下驚濤赴壑奔萬牛峻架懸空容一馬危叢古樹何陰森尋常行客誰敢臨猺婦清晨出深洞虎羣白晝行空林沉潭之西多巨石短棹輕舟安可適日光射壁蠻烟黄雨氣蒸江瘴波赤土人行泣向我云此地前年曽敗軍守臣祇