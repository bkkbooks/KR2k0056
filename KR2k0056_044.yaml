亂餘榛棘漫經過野殿疎墻睹薜蘿猶聞劉女遺祠處往蹟蒼茫思若何始知昔日昭平水烈女三人本劉氏梧州别駕館舍捐兩姬一女年相似白馬牽旒歸去難輕船遥泊莞藤灘寜期擾路驅青犢㩦手俱沈江水寒盈盈寒水空江曲懐沙負石驚人目御史封章入九重褒題祀典崇華屋瀘州舊州守别駕之賢孫投簪解紱已高卧東山嵓壑開蓬門逢余約契稱相厚家世遺型幸討論銅江守令持清議俎豆重新事堪記館榭蒼苔夜月深簾階芳樹春風醉貝齒蛾眉兩地愁南黔西粤總千秋莞藤潭水今如昨那比香名萬古流三丰道人壁影歌田雯神仙之説果有無幾見員嶠兼方壺風蟬蜕骨幻術耳逃名欺世夸清都劉安鷄犬事頗怪籛鏗年紀言多誣漢武不識東方朔祀竈却老何其愚人生百年五倫重學仙佞佛皆傖夫羅施自昔號鬼國碧鷄金馬西南隅草木瘴癘山川窟其間或有烟霞徒熊經鳥伸訣自秘寸田尺宅理豈麤地産丹砂大於斗彭亨鼎火鉛汞腴異哉三丰偓佺侣揧蹋道士羣相呼永樂初載來黔地黎峨城市吹都盧石鉢流泉清且㫖廟砌老桂榮不枯郭外層巒立千仭忽於巔頂傳形軀勾展顧吴作小照儼然一幅行仙圖華陽笠子兩芒屩手拖藤杖西方趨飛瀑直衝入袍袖松花下落黏髭鬚馮虚御風將焉往何不為我停須臾神留宇宙四大字筆法倒薤非糢糊誰人結搆置峭壁巧匠斵削驚天吴始信靈蹤非妄誕裴徊不去坐日晡長生思假六禽戲前村微雨鳴鷓鴣栁阬行田雯麴塵楊栁春三眠風晴絮飛鋪白氊兩山夾岸生野烟栗留鳴樹何翩翩拖藍一沼清且漣下有萬丈蛟龍淵牝驪下嫁柔絲牽俄頃異物來蜿蜒晦冥雲物紛勾連神駒生長烏江邉粤昔貢自洪武年載拜稽首蠻王箋其毛如雪鱗如拳首高九尺花連錢壓沙八斛箭控弦奚官不用珊瑚鞭天閑十二人喧闐爭誇此馬真無前天子下詔黄帕纒賜名飛越峰以傳沙苑雲錦那並肩王毛仲爾將徒然貳師將軍絶可憐西域笑指中郎騫羅鬼嶺下奔紅泉但餘春水流濺濺按圖索駿空盤旋老鴉闗上斜陽懸臣濓之筆豐如椽高歌更有青藤篇謁武鄉侯廟田雯銅鼔峰插城南陂漁磯百尺溪瀰瀰蠻雲作態僵不動上冒諸葛丞相祠丞相渡瀘來何速綸羽遍歴牂柯陲祁連未出首南服眼前雍孟如螘蚳九月凱旋捷書上瘴烟漠漠將軍戲遺廟三間塑泥像旁有酋帥濟火兒纒頭青布身藤甲野花覆額連雙眉毒弩千鈞矢三十黄區月耳烏䝉騅當時再拜伏道左聚粻刋路無敢辭僰卒一隊擁前後乞憐丞相相許之功成配饗英風在手招羣鬼揺靈旗我瞻廟貌三歎息為譔文字磨豐碑水西黒羅最狡黠爾之鼻祖何人斯攻心為上術誠善如公作用良可師千載而下弔陳蹟古屋深箐藏狐狸長澗潺湲弄寒水似聽寳瑟彈哀絲四山寂寞秋色老霜白楓葉紅於脂鐵鎖橋田雯粘天拔地山槎枒下有黝潭龍所家捷玃飛鳥不敢渡莊蹻瞠目空咨嗟巧鍜長絙三十六東西穿鼻貫石腹螮蝀屹立體横陳直使天塹作平陸紅酣白糝兩山口蜃霧噴吐羣峰首畫家能事李將軍瀾滄江上如斯否縹緲五城十二樓神仙海嶠崑崙丘拔劍斵空不知險今朝快御天風遊女官詩田雯我觀女官如觀畫閻立本繪職貢圖我觀女官如異夢竒形詭狀非一徒我觀女官如破寺陰風慘淡魍魎呼古鬼昏燈掲鉢立老佛變相獅龍趨妖貍髑髏抹粉黛脩蘿甲胄呼笙竽雌者青㲲包蓬首雄者碧眼拳髭鬚女官氣概偉丈夫火浣大布纒其軀九尺藤杖紅珊瑚金環兩耳垂蠙珠腰下斜挂雙湛盧繡裙拖地蓮花襦迎春詩田雯上犎禿速毛頳黄勾芒鴉髻鞭箠長千夫舁舉蜃霧吐春帖紅膩蠻花張岑牟操撾次第起立部之伎何堂堂權輿一隊老農態荷鉏驅犢東作強立旗大書豐年字蒙頭草笠腰鶉裳山謡秧歌語莫辨盱睢口眼羣相將逐隊結連各變化風檣陣馬神飛揚僰童年紀十四五朱鉛塗面錦襧襠或彈箜􅔃弄箏笛或披甲胄揮㦸槍或騎兕象佛子國或鬭珠貝波斯羗壯者壁壘頗與牧美者嬌冶施兼嬙旋風豈類天魔舞當筵不是成都娼最後一隊更竒絶身輕一鳥空中翔聳尻翹足立肩背公孫劍器爭毫芒斑文貍走雲旓動游龍蜿蜒來何方掉竿嫋索又一隊𦍕獚犵狫排兩廂村翁侏􅍣如狰鬼揺鈴跳月心顛狂金鍍雙睛銀貼齒假面獅子吟西凉白樂天有西凉伎詩上句即用白語鍾馗手拍銅綽板揶揄調笑隨白狼傀儡登塲乃如此何年演自宜春坊木𤓰金筑接六詔一髪萬里西南疆山青敢嗟瘴癘毒雪消且喜梅花香羅施之戲迎春曲放衙觀者如堵牆他時採作黔俗記蘆笙䕫鼔牂柯鄉到黔常安年來擬作壯遊賦踏盡東西南北路帆影纔衝湘水波馬蹄又破黔山霧斜插尖峯形勢竒平懸峭壁重闗固亂松坡上雨初晴古驛門前烟欲暮電激巖頭百道泉翠迷谷口千年樹猿啼虎嘯幾愁聞星炯月寒頻怯步足厎潛窺宿烏歸耳根平洗飛雲渡嶺崖有路石為梯懸市無城嵐作䕶村落參差勢不齊民情質樸安其素蠻烟掃淨廓封疆萬姓歡騰書露布白水河觀瀑鄒一桂吾吴富水黔富山有山無水山不活深林秖覺嵐氣重多穴僅與狐兔窟十里一匊泉五里已成渇涓涓洑流山草沒縱有清駛無人撥轉岡忽聞萬馬聲荒山鐘鼓何鏗鞫遥看始見白一線匹練晝暴妖虹横兩旁水氣浸石壁濺跳珠玉烟霏輕天紳長垂不可卷白龍歸壑山風鳴觀瀑亭中頓忘飯馬芻僕飽遲行旌山靈怪我笑枯寂獻此血脈流其精華峰蟻穴昔曾到莫炫竒異欺先生望水亭瀑布竒絶作歌紀之張鵬翀山幽路敻窮攀縁時聞細溜聲濺濺忽驚長橋萬里橋古澗邉上流繚繞疑鋪氊下流百丈臨平川斷崖一落空中懸濛濛似滚萬箔綿隨風裊裊騰蜿蜒須臾直訝化作烟噴為晴雪飛翩翩乘虹飲練光熾然白日照耀摩尼鮮重重覆影斷復聨砰崖裂石雷闐闐神揺目眩心魂顛舊聞野兕藏渦漩吐珠今見驪龍淵川霞雪練斷碣鐫望川亭上風光偏窮觀直擬脱幘眠羲和未肯停征鞭欲去未忍情悁悁我臨匡廬三疊泉石梁瀑布天台巔龍湫雁宕阻未前黄黟九龍更鳴絃此間僻奥誰為傳不悔萬里乘飛韉飽看銀河落九天重來坐擁歸輪遄朗吟逍遥秋水篇此身定作飛空仙飛雲洞靖道謨豐隆當年求虙妃南過黎峨憺忘歸徒御不戒喪軿茀化作岩石雲不飛石勢輪囷更飄颺千年猶作飛雲狀紛紛郁郁嵌玲瓏軒然高敞窮殊相金柯聳擢玉葉舒魚鱗劈絮堆砲車驚蛇走虺出穴窟猿臂鳥伸龍攫挐世人日看飛雲態看盡飛雲無此圖巉巉雙峰峙洞口蹲踞昻首如蒼狗武丁巨斧削不成不隨風捲長相守蒸濡靈液飛素練蒼壁白衣垂片片潺湲衝激響鏗訇空裏阿香車輪轉雲昏雨洒雷填填咫尺幻出心目眩造化不憫儵忽勞直將混沌都鑿徧南行險路難登陟來躡雲岩一休息襟袖飄飄爽氣生纓珞俱帶飛揚色世間原有飛來峰峰可飛來去亦得願假巨靈手劈開褰裳乘之周八極石船潘淳南明河經銅鼔山名陽盤渦激石流湯湯江面不容泛漁艇渡頭久已成輿梁吴楚昔聞戰長岸胡然鬼國留餘皇天豃地豁墜山骨神工鬼斧為舟航刳剡沙棠自中古鑿破渾沌開鴻荒長年次第具篙槳估客絡繹浮湖湘豈知巨舸實其腹何時宇内曾聊浪魚鄰鷗社幾聚散秋漲冬涸無低昻不事捎濆與撇漩莫施錦纜兼牙檣挽縴徒勞衆力集拍天一任洪濤揚下瀨千秋阻瀛海伏波萬里停遐方有力欲負不能負沉吟毋乃莊周藏蜀麻吴鹽永寂寞蘆花山月常蒼凉其上可列百人坐兩頭簫管歌中央俯憑夷宫子瞻嘯釣富春渚嚴陵狂造物結構詎無意天孫或用杭銀潢人間亦有登汞渠其濶百步容龍驤不沉瓦鐵豈沉石誰能縮地如長房或如菱溪一大石幸逢六一傳篇章我欲留題復斂手斷無金薤垂琳瑯中流擊楫嘅焉嘆如泉之酒澆千觴吾生安得似汝夀亘千萬世觀滄桑題雪厓洞錢元昌夜郎既伐靡莫滅山神効靈靈秀出麟鳯魚龍各擅名此洞清寒誰賞識職方圖志記載疎惟有神仙曾物色神仙物色亦年深塐塌祠荒鐘磬失直待安州方伯來搜剔空明除礙窒法相重裝丹碧新洞門四照光華逼光華透徹洞門開太虚㝠㝠通呼吸六月揚風返日輪三冬積雪埋雲級還仗高僧一口風吹散雪花殺蟊蠈太平嵗嵗慶豐収永逺苗民安力食貴州通志卷四十四
