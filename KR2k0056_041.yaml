body:
  text: 貴州通志卷四十一藝文記二元八番順元宣慰司題名碑記范滙八番順元相傳為夜郎牂柯之表殆古鬼方之境歟蠻獠種落雜處叛服不常入我國家軍徇其地諸部悉歸順始置宣慰使都元帥府總戎以鎮之更貴州為順元屯駐城中領萬户府一鎮撫司一安撫司十長官司五而順元思播三宣撫地皆聴撫鎮其任重矣然而土司相襲或有争奪則道路梗塞外連南詔嶺徼兩江溪洞侵削鬭䦧徃徃有之閫政稍弛即戒不虞故官於閫府者號稱才難至正十年秋宣慰司都元帥諤勒哲公以臺省宿望仁勇兼著蒞政未數月號令肅然旌旗改色於是紀綱立法度行百廢興而大府未有題名何以昭勸懲乃命立石屬余次序而題著之將鐫刻以俟來者乃考諸聞見自開闢以迄於今邊政之得失才諝之崇卑則公論自在將厯指而議之可不懼哉明司學題名碑記趙琬正統六年冬貴州按察司副使濟寧李君睿奉命往按是邦至則宣揚聖化懐柔遠人人用嚮服乃益修孔子廟學以敦化源而貴州宣慰司之學實惟諸州之望君於此尤切注意時按察使莆田林君坦副使束鹿朱君理僉事濟南戴君誠左布政使宜春易君節左參政錢塘嚴君泰左右參議顧君理汪君詠聞之各出俸以給土木而又壘石為塔取韋肇慈恩故事考求是邦厯科鄉貢次第書其姓名嵗月刻於其中凡有善行可法而被顯擢者使人有所感發否則有所儆戒於此可以勸世勵俗所係甚重非他題名可比謂宜有述可以昭示永久詣予請記予惟貴州古為南荒椎髻卉裳之俗雖唐虞三代之治不能覃被漢唐宋以來不過羇縻而已逮我國家列聖相承聲教所暨無間遠邇其人始循禮制稱臣奉貢咸若采衞而建學立師無異畿甸學者明經登第出而為世用者往往與中州士相伯仲然後知皇明統御之大至治之隆聲名文物之盛與唐虞三代嫓美齊休非漢唐宋所能企及也李君為朝廷耳目之司循省風俗乃能不鄙夷遠人孜孜以修治學校作興人才為務而於科目士表顯之如此雖然自古賢人君子亦豈藉此以隆其名哉固將為當世用也士由是升於春官入對大廷而顯名太學尚當刮劘淬礪以務求實用顧不偉歟陸宣公嘗曰上不負天子下不負所學吾於題名之士有望焉平越衞儒學碑記黄紱皇明大一統極天地之大而有之惟夏惟夷悉臣悉主粤若貴竹古炎荒蕞爾苗區其類鳥言鴃舌椎結卉裳習尚刀戈而好勇闘狠我太祖髙皇帝龍飛之初以神武剪其昏狂而納於甄陶之内肇置采衞之兵以鎮之於是平越有衞蓋昉乎此然當是時功化始行而禮法之教未備故學校並興庶官齊建蓋有待於可行之日也歟宣徳癸丑宣宗章皇帝始命建學置官頒篆而隸於衞泮宫講室則有貴州按察司副使李公睿僉事屈公伸初焉相土之宜得佳勝於衞西南之隅蓋前隆平侯為衞之日所居之址也厥位南向厥勢髙廣山水之清林樾之秀所共鍾萃僉謂協吉遂命指揮王俊劉璿版築之殿庭門廡講堂齋舍一時畧備擇俊秀子弟為之徒而教焉未幾不肖紱謬叩兩第後之起者接武雲蒸神化之速可見矣正統己巳諸苗叛亂列城皆圍而平越尤甚兵民困於城中不能樵採公庭吏廡之楹卒毁為㸑惟學宫僅存然亦毁瓦畫墁頽垣撤户曠莫之守師徒散逸而絃誦不作其不致於廢學也幾希自後王師赫伐削除穢亂而修廢舉墜之政必有待於其人而後行今上皇帝嗣位之初簡命左監臣鄭公忠作鎮兹土都憲李公浩實巡撫之總制則南寧伯毛公榮而佐以㕘將吳公經監察御史周公源復按治焉時皆文武衆臣賢良寅協咸欲振作頽風廓清邊鄙以故衆務修舉庶民子來適襄陽吕侯貴以錦衣清軍指揮改任於越謁廟之日周視學宫圯壊缺畧慨然以為己任且以其子昇嘗第進士為地官主事出自學校乃銳意作新捐俸購材倡諸竂屬而葺治之櫺星門俱易以石殿庭門廡垣墻階陛咸撤其敝而一新之正室神位前則重䕶以板屋黝堊丹漆焜燿潔澤外建儒林坊以表之廟學規制之美輪奂之精視昔為有加焉經始於成化丙戌冬十月而以次年丁亥夏四月訖平越之士夫守吏戍卒民庶奔走觀望合詞歡慶乃以其成告於總戎毛公聞而嘉之謂紱曰吕昔以金吾近臣去國來邊畧不以為窮戚而作新學校思以成法化民俾聖人之化行於遠方者已晦而復明學校之敎施於邊人者已墜而復舉其為功利蓋有闗乎風俗之易移苗情之去逆效順格暴為良宜以其事刻之於石以垂不朽紱以謭劣後進曩服官行人以奉宣天子徳敎為念而吕侯乃能用心及此迄於有成其賢於人也遠矣總戎不没其善既稱許而又為之求記以示永遠豈非有君子之心得大臣之體者乎是皆可書也故記之以紀嵗月因以告夫士之遊於此者皆當自知其性分之所固有與其職分之所當為而各俛焉以盡其力考求聖經賢傳而講明修齊治平至於忠君孝親施於有政舉不外於倫理之常以求復其仁義禮智之性焉庶無負朝廷建學立敎之恩與夫衞侯修廢舉墜之意矣於是乎書布政司題名碑記蕭儼洪惟我髙皇帝承天肇運混一六合覆載之内悉主悉臣睹兹貴州在牂柯之西南即古三苗鬼方之域歴代所未服者今皆威之以神武而納於職方始建貴州都司統衞所二十以鎮其地錢穀之出納刑獄之按治則兼於隣屬迨我文皇帝繼統守成丕熙洪業永樂十一年乃以貴州漸被治化復議設布按二司維時魏郡蔣公廷瓚以行在工部侍郎選任左布政使乗傳而來暫造城外之北驛舘假為公署而聴政焉時思南思州宣慰司尚隸湖廣二蠻長田氏梗化不道蔣公奏於朝族其家遂以地改設思南思州銅仁石阡鎮遠黎平烏羅新化八府及貴州宣慰金筑安撫二司并割雲南普定之界為州總隸貴州布政司設官則有左右布政使左右㕘政左右㕘議及首領各官視中州無甚異宣徳中又因民稀事簡復革烏羅新化二府併入黎平銅仁其所轄者祇府六州四縣三宣慰安撫各一長官司共六十有七而衞之長官司不與焉至於官制亦有損益右布政右㕘政及屬之檢校副理問案牘府之判同縣之丞簿漸次裁减不一景泰七年廵撫都御史蔣公琳至以假署外舘非承流宣化之所奏徙城中得隙地以建衙宇規制宏壯輪奂一新儼以菲才為藩愚闇無補但以斯城爰自列聖相繼徳化涵煦百年之久而前政寅僚奉宣徳意漸摩撫循善政遺愛其注人耳目而浹人心者也然而世遠人亡不能不冺用是撮建置大畧與昔今官僚名位庸刻堅珉庶沿革履歴易見來者有徵且知祖宗肇造之艱繼化之盛邊俗丕變之懿相與懋修職業益隆治化以永終譽於悠久儼則不敢自望相與僚采勉圖之鍾鼔樓碑記白圭皇明有國度越前古天覆地載悉主悉臣肆惟貴州本窮荒三代以前鄙而不治自後雖有羈縻不過通使以貢其土物而已我太祖皇帝以大有為之君乗天與之運威以神武綏以文徳由是城郭宫室衣冠禮樂師儒命吏守將戍兵罔不周備而鐘鼓樓未建前都知監深水鄭公忠作鎮於兹歴十五年為成化癸巳公於暇日訪求故老知其故址於城之北隅正街蓋自前元嘗為順元都元帥府所建土城樓國初展其城於今北門而陵夷其廢址世遠人亡無以考其沿革公以是役謀於廵撫都憲宋公欽總戎都督吳公經廵按侍御梁公澤既協其謀而三司僉以為然經始於是年四月八日鑿石南郊掄材北野陶於肆冶於塲役匠與夫必更番而不再籍既食而又貨之有若傭者訖工之日是為明年甲午五月七日樓基以石為臺髙六尺周方一十六丈有竒虚其中以為通衢屋重其簷通髙五丈有竒廣與之等而深則殺其五之二焉鑄為大鐘者一製為大鼓者四又走使滇南募匠製為銅壺滴漏俱以良旦懸鐘寘鼓於樓而奠壺於其下自是暮鼓晨鐘更漏有凖節候不爽晝夜分明遠近之人莫不聳觀而趨聽使夫在公者不失其夜寐夙興之期養生者各遂其出作入息之候又外而使椎結之衆襁負其子而來環而觀之若龍蟠虎踞鯨吼雷轟莫不改容而奪氣有以潛消其陸梁梗化之心洵可昭示來許垂之不朽者於是乎書重建思州城碑記盧秩思州府治春秋時本楚黔中地秦漢吳隋唐以來郡治州治建置沿革隨時變易莫有定制宋大觀丁亥蕃部長田祐恭願為王民始建思州即今思南至元間自龍泉坪改置思州宣撫司於此天朝鼎命率土賓王洪武壬子改思州宣慰司永樂壬辰嗣宣慰者肆惡干罹憲典遂革宣慰司為思州府入隸貴藩而領四司自是典郡者率天子命吏然而後先相代往往視廨宇如傳舍間有草創復為苗㓂焚蕩迺成化紀元之初蜀王君常以民部尚書郎奉天子簡㧞來知是郡仁風流布義問遠揚未及三載民有經業乃議築城維時總戎吳經㕘戎彭倫俱頓兵清浪保障邊陲遂立心贊襄力主其事經始於成化庚寅訖工於甲午嵗凡五更役凡萬徒為城一千三百步悉建連屋其上覆以陶瓦防風雨霜雪之凌周闢四門架層樓以置鐘鼓為寅夜之儆界四門以畫通衢因地勢以建公署逋逃四歸商民聚處環城内外櫛比蜂屯鮮有空隙絃誦洋溢雞犬熙蕃非復萍浮星散昔之蕭索也蓋吏有所據以治事民有所倚以為安不逞之徒消其覬覦之謀去其臲卼之危宜其皆安堵奠枕於今日矣都御史題名碑記洪鍾都御史之設國初無定員地方有大事則請之朝遣廷臣往理之九卿正佐隨時簡命亦無定官出則奉簡檄給驛廩至其境凡事有宜俗利民者許便宜以行即古大夫出疆得專之義也事竟還亦無定期至正景間四方多事於是各邊腹地方有軍務者始遍設之矣貴州廵撫行院舊在省城南隅衙宇僻隘古乾宋公欽始遷建於此後先相承益加闢治規度宏備時題名碑記未立恐其久而難稽也乃遍考舊籍得上元丁公璿以下廿四人并其字貫鐫之於石以圖傳之永久夫廵撫一方安危攸寄而刑賞黜陟舉得以專之惟在公而無私明而無蔽而已鑑惟明也而妍與醜自見衡惟平也而輕與重自分惟其無私無蔽也故妍者重者無所徳而醜者輕者無所怨前之諸公所謂公與明者宜無媿矣抑豈無優劣之議者乎𣺌予小子承乏在兹尸素之誚吾固知其難乎免於後之人之議之也噫前人行之而後人議之後人懼其議之而不思所以戒之則後之議者將無已矣可不慎哉察院題名碑記席春柱下史曰古者天子廵狩方岳開明堂朝諸侯躬行慶讓故諸侯率職而天下治自秦罷侯置守後世相仍天子不復廵狩時遣御史分按天下旌舉其吏之賢能而廢職敗度者罷黜之用是有御史代天子廵狩之議御史之責重哉夫方岳守令古諸候也御史得舉黜之是故御史良則寮惟貞度惟肅否則寮且玩度且弛也夫貞肅玩弛世用淳澆而其端在御史御史之任殆難矣貴州古牂柯地入國朝為宣慰使司舊隸四川設行都司以控制之永樂間始設藩省地雜漢夷蒞兹土者撫柔允諧則寧輯稍失則叛去加一生事邊徼冒功納賄者又從而開其隙則兵革無寧日按兹土者之所以難也察院舊有題名碑列開設以來廵按清軍刷卷諸公名氏於上迄今無餘地矣數年來代而去者闕漏無紀今年春延平胡子國華按是邦克振厥職邊鄙賴安暇閲前碑既盈廼謀勒石補題舊遺並俟來者春適被命叩按雲貴謂予宜有言春竊謂諸同官持風裁懋激揚皆有聲於時者不類亦獲厠名其上使春果賢後有指而言者曰此名御史也否則人將起而議其後矣可懼哉於戲人情無所警則玩玩則怠怠則議斯集矣有所警則懼懼則愼愼則議斯免矣春乃今視斯石能無警乎哲人自勵勉予小子是固胡子勒石意也按察司題名碑記彭華貴州古夷蔡域秦漢來羇縻而已或稍稍郡縣終不能約之就法度我皇明有天下武功文敎無遠弗及洪武初即貴州立都司統兵衞暨諸蠻長永樂癸巳遂建布政司悉州郡其地間以宣慰宣撫主之越十八年庚子乃設按察司以掌風紀置按察司副使僉事五員分廵貴寧道安平新鎮思仁四道於是三司相維以治部内咸與中藩等矣顧誕敷教化朝廷固付之有司而操黜陟任激揚使有司循禮法以導民者則在風紀得人與否其所係重矣同年盧君崇績自湖廣按察副使遷貴州按察使剗奸除弊扶弱植良甫及朞吏畏民懐間出廵山谷閭里間喜其俗之日遷因歎曰夷俗丕變固聖明之化亦由前此諸公奉揚之也盍録其名氏勒諸堅珉以示永久乃走書徵予記之予曰先盧君官於貴者奚啻數十百人中固多賢未必盡賢賢者能以禮法持身率下不賢者自放於禮法之外烏足以勸吏導民盧君概書之將使後之人指其名歆羡其賢者而思取法譏誚其不賢者而内自省惕然戒懼油然興起懽然共相飭勵以正憲度仰稱聖明設官至意此其有警於在位者無窮矣興隆衞科貢題名碑記李聞祥興隆建學古未始有聞也貴州志稱邑為狼洞歴代罔攸臣其沿革無傳焉曁我明洪武己巳始開衞建官蓋已貢其士而呈其人矣又三十有四年為宣徳甲寅始開學招生徒蓋庶且教之矣然時領其事者祇論於鄉而㧞焉猶未始有官也又數十年為正統癸亥始設官分篆而生徒日益衆盛於是人物寖備始赫然與中州並矣未幾今廣西右布政使周公瑛遂以春秋領庚午鄉薦登甲戌進士第而戊子則朱公玉羅公璿同發己酉則公子希黙也凡三人其貢士登名胄監然後人知學士之貴狄公瑄以迄於今凡十有二人科貢蟬聨衣冠委蛇視古昔殆將百一焉嗚呼地固若是其未改闢也民固若是其未改聚也而賢才之殊異乃如此亦獨何哉是固足以見國家變夷之治矣𢎞治二年予以罪謫興隆經歴會學員缺官遂得攝學事凡學中規制久已頽廢而諸科貢士僅名氏於堂之右壁鐫裂塵蝕日就湮滅間有求其人而弗可得者予甚憫焉乃僦工鑿石一通髙七尺五而廣殺三之一礱為四面畫為四區題曰進士曰舉人曰監生而次其名氏於本區内仍各虚其餘以待來者樹立於㦸門之外且亭焉工畢衆遂乞予記昔周公之戒成王曰思皇多士生此王國王國克生維周之楨蓋言文王之所由興也康王之命畢公曰旌别淑慝表厥宅里彰善癉惡樹之風聲蓋言殷民之化不出於勸敎則凡思佐王國而化頑㝠者豈復有他道乎亦惟作人材明勸敎而已矣故予之樹立斯石蓋以彰賢而明教也豈徒為斯名哉嗚呼名不易得也古昔人非有大功徳於宗社則不得金石其名氏又有艱苦其行終身竟湮沒以幾一名氏而卒弗遂者名豈易得耶然則諸賢之勒名斯石者固宜益知所重而將來有志之士固宜益知所勸哉誠若是則知所以楨王國而率頑冥將於是乎賴也豈惟立石者之惠使或士焉而忘其名名焉而忘其實禄位焉而怠其職與忠則古所謂庸人也已雖貴且富吾無取焉耳名以遠善亦以遠惡遠之而弗善焉孰與不遠哉諸賢當知辨於此矣謹記思州府題名碑記蔡潮思為古黔中地歴隋唐宋元沿革不一國朝吳元年前宣慰田氏歸附隸湖廣行省永樂壬辰田氏弄兵坐廢改宣慰為府分屬貴藩然地僻民貧洊罹夷燹日敝敝焉鞠為荒翳往年郡守張君常張君价漸次修舉而文獻猶未足徵正徳丙子秋上元髙君節守邦之三年嗟兹缺典博詢於長官周縉何純輩其所記憶前人之名氏籍貫凡二十六人屬記於予予惟思郡蕞爾一隅猥潛荒服重以夷氛嵗歉之故吏兹土者恒以投瘴禦魑視之速欲解去不能一朝寧處自崔賀啟治以來能久安其位不甚鄙夷其民者王張趙李唐孫嚴柴曁今髙趙數公焉髙侯又能於勞來安輯之暇以經術訓飭子弟且猶徵文辭以表章思郡思何陋矣重修司學碑記費宏學校之設擇秀民羣處其中而以六經之道訓而迪之蓋欲其明大倫崇正學惇治體探化原以成君子之行以備公卿百執事之選以收正朝廷治天下之功而人才之盛衰俗化之厚薄恒於是乎繫實治道之最先且急者髙皇帝得國之初即詔天下郡縣建學立師以興起文敎貴州雖遠在西南為禹貢荒服之域而宣慰司之學已建於洪武甲戌前禮殿後講堂旁為齋若廡而外表之以門具如法式景泰間御史楊綱副使李睿嘗因舊增修之則又建尊經閣於堂後育英堂於閣前翼之幕室以居諸生之講肄者於是乎規制大備而為國作人之意益以廣矣百五十年來此邦之士往往以明經効用齒於内地豈非以上之聲敎所及既遠而下之振勵又得其人故耶比者閣日就頽而所為育英堂者僅存其故址御史江君汝器以清戎至見而歎曰春秋大復古古之不復可以為非吾責耶謀於巡撫都御史熊君子山巡按御史劉君器重議既允協遂卜日鳩工而從事焉堂與幕室皆基構如初閣故二楹今增六矣已而撫按復用僉事趙公淵議併建神厨及祭器樂器二庫徙泮池祀鄉賢凡位置名物之有闗於學者罔有弗飾經始於甲申秋七月而以乙酉冬十月告成其材與力皆江君以罰鍰給之而勞費不及於民其董治則布政使梁君材按察使于君鏊及各執事皆與焉既成使來請記在易之蠱先甲三日後甲三日傳曰終則有始天行也蓋興壊相仍亦事物自然之理然當其壊也茍不更新以飭乎始丁寧以備乎終則已壊者不可復興而已興者且將速壊豈君子振民育徳之義哉諸君於兹學協志畢力易故為新而又欲紀以昭之庶幾久而不廢何其勤耶士之藏修於此者其惟念學殖之不可荒而聖賢之道非六經無所就正日取遺編而玩之精思力踐卓然以天下英才自期待由是進而為百執事公卿遭時之泰則懐仁輔義以尊主庇民脫弗遇其時猶必仗節死義以勉進乎忠孝夫然後無負於今兹育才報國之意若徒志於青紫買櫝而還珠則閣之所尊與堂之所育豈端使然哉蔡公祠碑記田秋生祠非古也記云以死勤事以勞定國能禦大災能捍大患則祀之故峴山表叔子之靈宣城著謝公之姓是也清平蔡公生祠之作其亦此與正徳十三年清平縣苗夷作亂據香爐山以為巢穴憑陵遠近動揺藩省清平其切近蓋門庭之冦也賊擁數千之衆攻城公適以少㕘分守其地内無勁卒外鮮强援止以數百守城之兵畫地分障運竒設謀擒其桀黠散其黨與不數日賊俱引去闔城老㓜得再造皆公之恩也未幾公遷去民不能忘迺為生祠二楹肖公像於中飲食必祭且私之曰此吾清平之羅池柳侯潮陽韓公也祠成三十餘年為嘉靖庚戌麻城喻九山以公髙弟僉憲貴陽道經清平謁祠下見礲碑尚未有詞徵記於秋秋惟公在貴凡八九年不鄙夷其地所在多品題建置公之去貴三十年矣而貴人思公徳澤者如昔公以貴㕘議陞福建㕘政轉河南右方伯人方仰其柄用乃抗疏乞休時論髙之左布政使思南田秋謹記都察院題名碑記徐問貴陽撫院舊存題名碑創於古杭兩江洪公為之記兩江後為刑部尚書尋改都察院左都御史余嘗官於部見其器度宏博有大臣端揆風記中制度沿革疆圉綏威兵民安養亦概言之而所書名氏則自正統癸亥迄於正徳辛巳以後無餘石而亦莫為之續也余承乏至見所控諸桀盭吞殘所司狎習羈縻弗申大戮而又丁兵後帑藏耗亡既已爬搔敉集以為邊休其跳梁甚者又弗獲已於動衆以為民靖至於軌度之所未能周而風紀之所不能廢者非拾公之遺粕以旁搜遠取酌時宜以資損益其安所取衷哉夫考其事必知其名知其名斯知其人名之不可已也如是古之人箴銘簡牘琬琰彛敦為謨訓箴銘類皆圖遠以志勿忘至其實之所在而為可久者則雖編磨石泐而所以不忘猶存也昔司馬文正公諫院題名有忠詐直囘之語將欲揭諸後之人俾矚目警心聿興勸戒然則今日之記寧非後事之師乎用是以懼爰命伐石以續書焉興隆月潭寺公館碑記王守仁興隆之南有巖曰月潭壁立千仞簷垂數百尺其上􅐓洞玲瓏浮者若雲霞亘者若虹霓豁若樓殿門闕懸若鼓鐘編磬幨幢瓔珞若搏風之鵬翻隼翔鵠螭虺之糾蟠猱猊之駭攫譎竒變幻不可具狀而其下澄潭邃谷不測之洞環密囘伏喬林秀木垂䕃蔽虧鳴瀑青溪停迴引映天下之山萃於雲貴連亘萬里際天無極行李之往來日攀援下上於窮巖絶壑之間雖雅有泉石之僻者一入雲貴之途莫不困踣煩厭非復夙好而惟至於兹巖之下則又皆灑然開豁心洗目醒雖庸儔俗侣素不知有山水之遊者亦皆徘徊顧盼相與延戀而不忍去則兹巖之盛蓋不言可知矣巖界興隆偏橋之間各數十里行者至是皆憊困飢悴宜有休息之所而巖麓故有寺附巖之戍卒官吏與凡苗夷犵狇之種連屬而居者嵗時令節皆於是焉釐祝寺漸蕪廢行禮無所憲副滇南朱君文瑞按部至是樂兹巖之勝憫行李之艱而從士民之請也乃捐貲備材新其寺於巖之右以為釐祝之所曰吾聞為民者順其心而趨之善今苗夷之人知有尊君親上之禮而憾於弗伸也吾從而利導之不亦可乎則又因寺之故材與址架樓三楹以為部使者休息之館曰吾聞為政者因勢之所便而成之故事適而民逸今旅無所舍而使者之出師行百里飢不得食勞不得息吾圖其可久而兩利之不亦可乎使遊僧正觀任其勞指揮狄遠度其工千户某某相其役遠近之施捨勤助者欣然而集不兩月而工告畢自是飢者有所炊勞者有所休遊觀者有所舍釐祝者有所瞻依以為竭忠効誠之地而兹巖之竒若增而益勝也正觀將記其事於石適余過而請焉予惟君子之政不必專於法要在宜於人君子之敎不必泥於古要在入於善是舉也蓋得之矣况當法網嚴密之時衆方喘息憂危動虞牽觸而乃能從容於山水泉石之好行其心之所不媿者而無求免於俗焉斯豈非見外之輕而中有定者能若是乎是誠不可以不志也已寺始於戍卒周齋公成於遊僧徳彬治於指揮劉瑄常智李勝及其屬王威韓儉之徒至是凡三葺而公館之建則自今日始貢院碑記吳維嶽貴州古荒服也虞帝北而不畜殷宗克而未化秦漢以降逞則澒洞順亦羇縻無定疆無恒賦至我皇明混一寰宇際天所覆寄象鞮譯殊俗向風貴州遂登版籍尋設學校興冠裳俎豆之儀洪武甲子天下開科取士貴州赴雲南試永樂乙未貴州始樹藩臬建省等内地文敎寖明今上凝命中興盡倫盡制澤洽威暢古所不畜而未化者咸入涵濡陶鑄中雖疏蹻巖穴之夫罔不喁喁承徳貴士引領開科希奎壁之照者愈切嘉靖庚寅給事中田秋疏為貴士請下撫按議踰五年乙未巡按御史王公杏具奏貴建省設學校養士厯百五十餘年文敎茂往昔十倍諸生就試雲南苦於道路今度地得西南隅甚勝可以營建計所需金二千四百有竒檢藩貯羡緡可辦夫士盛既足為科而費復易措倘另開科可免諸士䟦涉益感恩勵學願覩賓興盛事以仰贊聖化從秋議便宗伯覆言事與時可乃荷俞行限取士二十有五嵗丁酉火麗金方運屬貴州遂專試諸生鷟翔豹變彬彬以升放榜日會有龍見之祥次年敷䇿内廷拜秩者四人又踰十年丙午巡撫王公學益巡按蕭公端䝉念貴士愈日盛請廣解額復增五人前後符河圖地數維嶽不類祇役兹土今甲子復當大比周視棘門疎密岡巒左聳溪環如帶既美其地之盛而有待顧碑則缺焉貴州鴻濛弗論即有虞迄昭代三千六百餘年甫脫烟莽晦㝠遂起為揖讓之區又將二百年值我皇上崇文籲俊開科增廣聲敎闓朗將與中原相雄長顧盛典未述且邊裔鮮掌故嵗月漸久舊簡易湮將命創議成事者或泯或淆非所以揚丕績而答昌期也因亟蒐使牘採其事而伐石以志之如此修思南府學碑記李渭思南學為宣慰氏舊居先師廟乃舊居堂皇兩杏樹干霄蔽兩階宣慰氏所植傳者近三百年云若為今杏壇樹者樹不易果果惟比士嵗登第數視果數樹亦竒矣𢎞治前廟廡規制不稱正徳辛巳郡守李公文敏拓之日久就圮逮隆慶辛未郡守育菴田公闗白吏吏出資筭撤朽新焉起敝棟葺垂橑華榱藻幹絫墁易瓦自廟廡亭堂門階臺墉皆袚舊增麗美博士宅先在明倫堂左正徳問遷於堂右撓不可居還於左至於藏修甲乙舍皆墮地矣即舊址復之工有緒將進諸學士綴習其間置經史若干費約而勞勩則多矣閭里民毫無喧也壬申渭自粤入都過舍省封樹育菴田公洎司理松滋伍公晉諸譽彥真武觀中論孔子之學育菴曰孔學學仁也是日陽和清穆雲行鳥飛天地生生大徳洪鬯兩間在坐者長㓜循序荅問取次誦書歌詩肅肅雝雝渭曰此即仁何以加諸育菴省里甲氓隸庸調奬孝弟力田者導不誼以敎化措法比不用此即仁何以加諸命渭撰學記且欲得一二語明孔仁以勵諸譽髦今九載尚虚然諾也萬厯戊寅郡守王公崑源以名侍御來思南繼修之司理王公逢吾屈公心寰先後共成之修文昌宫培學之左山修櫺星門儼學之具瞻敬一亭乃批剝圮矣新其椽墉名宦舊合祀於鄉賢祠奠祝雜施也分祠祀之且命塲師植翠栢芳桂數百章育菴之所未為者益備矣其敎膠序給膏楮視士比偶文皆罔抒心乃授軌義俾由衷還雅己卯占解額即倍往歲興學愛士汲汲然渭不得指拾也感今憶往記之曰孔子學學仁也堯舜禹周莫不以此生人孔子紹述之授於三千朋徒非惟三千朋徒嫺其誼指即顯者邦君卿大夫隠者接輿荷蕢以至難與言如互鄉愚㓜如闕黨小子罔不鰓鰓引誘欲人人共立而共達焉用是皇皇於齊衞陳蔡宋楚之邦席不暇煖轍不得輟其心為何心耶孔子四方千古之心與蓋載大徳並之無二已今委蛇膠序問讀孔子遺書展袠逐墨并心而赴時父師見其誦讀勤劬不少悖謬師可之父兄以至朋戚皆稱可不以為非彼亦怡然自許也其可而許也果孔子所謂仁者乎長獻於有司信牒染楮不可窮以辭有司見其不可窮以辭而其詞不忤於衆故有司可之黨里四方人士皆稱可不以為非彼亦泰然自滿也其可而滿也果孔子所謂仁者乎果為仁即日展袠日逐墨日日學孔也否則道越而欲面㝠山吾見其日背㝠已比就除日得蒞蒼赤措注宰割與往歲習於父師獻於有司者証合否耶其不視往昔所為如故楮弁髦鮮矣宦足而身退宫室隆矣妻妾容與備矣問其向所謂誦讀者十不能記其二三也若夜寐啽囈中事矣已不用又使其子弟為之子弟能趾其所怡然泰然者閭里之人靡不哆哆而聲稱有以孔子所生人者喁喁欵語即相顧逡巡辟易莫敢或承甚有疾視譙諤以為遠且於國家造士顧欲得若人已哉昔兩杏樹今栢桂初植培以沃土灌以甘澤深其根柢以猥大其枝柯根既深惟不害其長不得動揠而增設焉孔子之仁即樹根柢也養士於膠序也厚其餼廩縱其游習土沃而澤甘欲其㧞地千丈不稱良於崇朝者也以孔子遺書比偶為文詞是枝葉耳國家課士以枝葉因以觀士中藏非敎人逐逐外騖也至於挾無當空言獵榮邀利斧斤伐之牛羊牧之且又濯濯槁矣吾郡士彦邇共渭明孔學於川上學舍躬庸徳之行篤信底理彬彬然近仁豈若是瀰瀰下哉育菴田公諱稔山東髙唐人崑源王公諱琢玉莘縣人逢吾王公諱竒嗣蜀之蓬州人心寰屈公諱羣言粤之番禺人陽明書院碑記阮文中昔王陽明先生以糾論逆瑾謫居貴陽之龍塲者三年始至居巖箐與夷犵豺虺為伍於是屏徒侣絶書冊盡棄昔時僊佛之見晝體而夕思之已而忽悟吾心本來之體與古聖賢無殊中夜躍然不自知其手足之舞蹈身之在夷落也而道徳之奥經綸之業咸於是乎基焉貴陽舊有祠與書院祀先生既而遷徙靡常僻在委巷中予奉命撫兹地抵祠下歎曰此豈所以妥先生靈者哉檄司府為改建之於是方伯蔡君文憲使馮君成能協其議命知府李濮等董其役擇軍門前左空基為之而增以民居出贖鏹以佐其費前為享堂後為講堂俱六楹前後為左右房各四楹前為二門又前為大門樹卓楔於通衢匾曰陽明書院未幾工告成予乃諗於衆曰夫尚徳而右功者非天地之道乎崇徳而報功者非人心之良乎惟先生之居龍塲也不獨悟徹微㫖而功徳實大可表見維時蠻長欲减驛館變百年成規阿賈阿札等擅兵為地方患先生徐出數語以利害喻之其言輒中肻綮乃竟落其膽而不敢萌僭肆之念數十年來貴陽賴以安堵者非先生之功遺之耶始貴陽人士未知學先生羣諸弟子日與講明良知之㫖聴者勃勃感觸日革其澆漓之俗而還諸淳邇者衣冠濟濟與齊魯並先生倡導之徳至於今不衰改祠宇而新廟貌固所以闡揚先烈抑亦以貽後範於無窮也雖然先生之功徳尤著於江右䖍為江之上游三巢馮險肆禍相時撫剿動中機宜寧藩不軌大戰鄱湖而奏厥績方其鎮䖍與撫洪都時日與士大夫究心性命雖祁寒暑雨罔輟其所造人才彬彬然繼師志而効國家之用今在吉有懐徳祠在䖍有報功祠其遐思仰體者視諸貴陽尤甚也故人於先生之澤知其汪洋於天下而不知入於江右為獨深知其涵濡於江右而不知於貴陽為獨至予江右人也而官於貴陽故其知先生之功徳尤為獨詳雖然先生之孚化翼飛在人耳目者可得而言也而其涵養之精粹造詣之淵微非聞見之所能窺測者不可得而知也嗣是宦兹境與生兹地者顧瞻遺像奮志思齊由其可得言者以潛究其不可得而知者庶幾毋忘先生之澤而不辜今日改建之意云新鎮道題名碑記孫應鰲萬厯戊寅平越創建分守新鎮道行省逾庚辰㕘議振海黄公駐節於兹樹績宣榘起殘敷惠蓋一方遂稱靖謐云粤稽貴竹本古鬼方靡莫地秦漢晉來稍置黔中牂柯夜郎諸郡唐宋元或附楚或附蜀或置八番羅甸順元宣慰都元帥要以土蠻順叛殊狀又隔閡中土故率隨所疏屬而區處之未有畫一逮我明威徳四被風化昭起為列郡縣衞戍設省設臺設閫曰三司埓他藩綱紀法度燦然具舉矣省臺各有長有貳省之貳分守各路臺之貳分巡兵備各路人莫不展采錯事矣牽他路者不論其分守新鎮都清兵巡專轄都匀鎮遠黎平三郡龍里新添平越清平都勻興隆黄平七衞所兼綜湖廣偏橋鎮遠清浪平溪五開銅鼓六衞廣西南丹一州山河遼阻蠻苗獷悍壘伍凋廢地産呰窳皆倍蓰他路不可不謂難與劇矣都清兵巡駐都勻久在提封中章程之沿革户賦之征徭徼塞之防捍課殿之施設莫不資揆度取裁擇乃分守以駐都會去牽路逈遠一切上之人案牘闗白甚尠故下之人苐習知兵巡不復知分守乃分守亦延緣往昔之素樂閒適目為吏𨼆而亦自以燕安不鈎校非一朝夕所由來漸也萬厯乙亥雲南寅所嚴公清巡撫兹土察之因駐都會諸分守大夫屢日開衙有全無報牒及稟公家計者歎曰分守兵巡均地官要秩分守無所事事若是朝廷列秩本意必不其然遂疏於朝大約謂詰戎勅罰廣厲條憲為兵巡事理財覃澤奠守封疆為分守事銓管雖異實須偕濟不可以獨倚一偏臣簡核分守貴寧同畢節兵巡牽貴筑西路地險苗强止一兵巡駐畢節難控馭宜以分守貴寧移駐烏撒分守新鎮同都清兵巡牽貴筑北路境壤犬牙於他藩尤甚刦敓且充牣宜以分守新鎮道移駐平越分守安平宜改兼清軍清軍事寡普定距都會聲聞易及彼此俱利其鉅細諸務守巡兵備宜協恭調贊文武臧否則交互咨詢重大機密則交互定命遴委典授則交互詳覆獄訟則交互鞫讞闕任則互相權攝兵刑主兵巡分守㕘之錢穀主分守兵巡㕘之事可責成官無尸曠免偏重之嫌得術業共飭之義䇿似便制下吏部議如撫臣指制下允所請而分守新鎮即移平越矣是時分守巴渝劉公世賞爰卜平越城内隙地丁癸向吉選經厯劉信董厥工繕造於丙子十二月構竪於丁丑三月完美於戊寅二月堂廡廨署門楔階除攸躋攸寧有倫有序功既畢諸公俾清平孫生應鰲記其事孫生曰凡公署有題名將覈治蹟垂標凖備徵文獻稽實功令抑亦待觀者按評品而彰鑒戒之㫖咸寓於中兹所營拓已見部使善審畫不再具吾聞物聚則好醜形事比則得失辨人並則賢不肖判異日士民覩斯石口誦而手摘曰某裨益邦域某遺愛在人心有去思某節概當名宦則斯石非特分守諸大夫考政鏡徳之林實一方所由視為甘棠蔽芾勿翦伐敗拜之具哉余固不能私不敢私矣提學道題名碑記况叔祺國朝稽古建官尤重文學之臣在兩都命司成掌其事在諸路命憲臣奉璽書乗傳得非隆官師求茂材異等光輔中興之業乎嵗己未予自禮官大夫督學貴陽既至閲公署舊無題名夫今之守一官者無論中外巨細其所居必紀名而貴之督學獨闕焉曷以昭懿矩垂將來爰慨文獻之莫徵悼先哲之易冺蒐求往牒咨詢故老得上元沈君而下凡二十四人以予耳目所睹記其人皆卓犖恬靜韜光匿美列於不朽之塗視他省為獨盛何以哉夫味道腴者甘澹泊薄寵利者樂疎逖巨材𨼆於深箐丹砂伏於幽巖足跡不履採搆不逮故得全其天真珍竒錦繡列於通衢朝過而夕鬻二者較其遲速不可同日語矣貴陽僻壤寂寞之態等於野戍荒村溺紛華者不居焉然貴雖殊俗雜處章縫之堂皆能習孔孟之說誦仁義之文其質淳朴愿慤循循雅馴以予振鐸其間甚易相信又其地冬無嚴寒夏無酷暑四時如春得陰陽之和彼煌煌要津炎炎通達或未必勝此也予見宦者多薄貴陽故識之以告夫後之蒞兹土者建施秉縣城碑記李曰材嘉靖乙丑冬施秉縣城成施秉縣者鎮巖邑也古牂柯地明興内附置縣設官正統甲子始縣當岑鰲景洞間西控播凱南枕洪江皆封猰㺄之隣而伏弩衷甲之地也獨一靣北通郡治走滇楚而通上國施固則播洪之苗不敢窺鎮陽而滇楚路通若人身然鎮為襟喉而施為肘腋也肘腋嬰患則襟喉梗故施秉雖小邑實鎮重地也論者謂欲固施秉則城守為急成化間守臣嘗議城岑麓諸堡會工鉅不果尋稍調番休衞卒為守戍計嘉靖辛酉容山司構亂環甲挺戈焚刦縣治時戍卒無能禦者居民竄巖穴間喘息求旦夕活賴一二帥臣整師誓衆殱元惡縣境旋復而横罹兵燹者莫可救藥矣使當時城數雉而守之苗雖豈能蹂躪至此中丞柱峯趙公奉璽書至歎曰患至為備已無及矣奈何不亟圖之乃與臺察巫公協議為城守計謀之守巡徐君敦張君廷栢僉畫允諧乃檄郡守袁成能守備孫繼武鳩工畫地同知何承訓董其事費計金一千六百有竒粟計一千九百有竒堵計四百一十有竒經始於壬戌孟冬厯三載乙丑冬告成維時中丞仰亭陳君侍御春樓潘君甫下車揆文奮武圖萬世之利嘉前畫而樂兹城之有成也謂材職載籍當記材按春秋書城郭嚴外防也書城堞慎内治也易曰王公設險以守其國豈惟山川丘陵金城湯池即險也故和戎城而北馬不敢南牧青澗城而夏人不敢東向用此道耳况施秉當鎮扼塞較之和戎青澗功未知先後豈無當於易象春秋之義乎雖然城可守也不可恃也晉陽之城不浸者三板而卒能扞敵存趙子囊城郢而沈尹戍非之豈真城無益哉故城一也善守之則環堵皆堅壁不善守之則百雉為冦壘語曰公侯干城在得人也衆心成城在得民也是為記貴陽府學碑記江東之黔中古西南夷地自髙皇帝闢乾肇造後遂得列為藩服而貴陽尤黔省首郡故牂柯程番地更始於穆考御極之三年明年秋始設學如令甲一時規恢未備姑就陽明書院改署明倫堂羣博士弟子員講業其中若聖廟賢廡所為瞻禮陳樂也者則苐因宣慰而貴陽附焉萬厯甲午春當事者始興創建議遂於會城門北得吉壤昔為蜀行都司今割入黔偃武修文實相迭運固山川靈秀所鍾最勝之遺而都人士所注念已久於是鳩工御石今始告成亦閱三年於兹余被命撫黔時用師髙砦監司詹君梁君以㨗奏於是督學沈君入而申之曰詩言既作頖宫淮夷攸服先生什倍僖才蠢兹苗醜不二於淮獻之訊之行且懐好音也先生終無意乎余謂黔即古羅甸國鋒悍時起七萃聨鑣士之覽穰苴入彀者與燕趙争竒亡論已方今聖天子右文教諸藩皆以制科加額請特於黔詔可豈以諸士異采嫻辭緣飾儒術為足多亦以夷方秀出於民鏡檢所歸從今月會旬修蜚騰茂實中原文獻未之或先斯聖謨之訏也士生斯際千載一時兹廟貌已新適逢其會諸士仰而思之將何以攄所學而不負吾君也矧諸士之先皆來自舊都所稱故家遺俗藉以逺實徼外原操用夏之權向之抵掌而譚據梧而吟者又東越講良知故館諸士服習已深即令學舍移而中有不移者使處為孝悌出為忠良胥自翺翔書囿間養之語云堅樹在始今之時也是謂卑之無甚髙論若猥竊而附於魯頌之末則余豈敢置貴陽右文田碑記江東之余撫黔之三月有青衿子數人謁余曰嵗云晏矣藿食者憂之余惟貧者士之常而黔士之貧則撫者之辜也乃出廪餘分之所及無幾且非可繼也及見萬馮兩公創置學田始獲余心業喜而為之傳今計田且七十六分以贍府州司三學之貧者二公於諸生有豐施矣顧每年租貯定番州廣儲倉距省四百里而遥使貧士躡蹻度支所得差半故郡諸生之無田者獨未沾成惠耳余令州官俟價以糶隨價以解士無徃來之煩榖收一倍之利是不費之說也苐思以空言移粟人其謂我何固且圖之會屯中清出烏當把路之田若干畆故征巴香備餉而今無所用之最號沃疇嵗收米二百石有竒徃輸直十六緡於藩而大半肥佃者余以為屑越甚也因念貴陽學宫昔以講武今以修文烏當之田昔贍戎剛不若贍文髦從今衝輣不馳而瑶華耀爽黔雖丹徼乎亦知左武矣與直指應公議割其田於庠復以三百金置田益之總命之為右文云重修鐘鼓樓碑記郭子章萬厯己亥夏六月余奉天子命來撫黔故事三日謁文廟廟在城北隅道鐘鼓樓下余仰視之規頗昻崇勢若陁崩心識之謂當釐改也於時有夜郎之役亡論藏匱弗克民敝弗振即吾儕心思弗暇及庚子六月六日夜郎平貴陽劉太守文光來黔仲秋稍隟守偕徐丞庭綬請於余及柱史宋公曰挈壺之政匪棘匪遲君子小人興息維時以司晨昏以嚴更漏惟鼓與鐘是賴此黄帝所推迎唐堯所敬授者兹樓且圯守甚懼亡以為民觀也葺之亟余與宋公敬諾下監司議司檄守會而稽之材若干章竹若干箇塈若干畚糇若干鍾赭堊青黝若干色剞劂鉤繩若干匠錢若干緡守與丞總之中軍官劉岳指揮楊師震李棟材槌鼛役之千戸金鱗李東生百戸王懋勲吏目張大紀䕶作之辛丑六月劉守遷憲副署平越府經理夜郎去天子命宋公徃按滇命柱史畢公代之畢公至趣其役徐丞竭力已事以某月落成而請紀其成於石余諗之曰危哉樓也寜獨貯鐘鼔刻漏已乎寜獨辨朝夕弗迷風雨已乎黄鐘生一一生萬物君子鑠金為鐘四時九乳故鐘調則君道得五音十二律鼓無當焉而弗鼓弗和其聲一也刻漏法漏水一升重一觔時經一刻故鐘為聲氣之母鼓為衆樂之君刻漏為中星之騐惟其一也一也者所以一民視聴之不一也周禮六典夏官挈壺秋官司寤春官雞人漢以後太史掌之隋置刻漏令掌以率更教以博士典以掌漏司刻分時唱之漏童更以擊鼔為節㸃以擊鐘為節故含元賦曰節晷漏於鐘律架危樓之筍虡鐘鼔之有樓舊矣黔當珍夷歛霧三渡息波之後舉斯樓而更新之景鐘髙縣䕫鼔雷鳴玉衡稱物金壺博施曉而鐘耶吾儕莅兹土者何以修天子之業命考其國職講其庶政士何以受業何以講貫自戍卒庶人而下明而動何以耕食何以鑿飲何以蒐苗獮狩夕而鐘耶鼔而嚴耶吾儕莅兹土者何以序其業糾其典型儆百工使無慆淫而後即安士何以習復何以計過無憾而後即安自戍卒庶人而下晦而休何以宵綯何以夜績庀其家事而後即安庶幾日惜寸陰夜知向晨斯樓之新為不徒矣嗟嗟余以斯樓廢興之故而重有感也樓創於成化甲午實自鄭都知忠始記出白少保圭筆其語周覈通志亦稱忠有心計與總兵李貴撫捕諸苗貴人為立祠尸祝之今銀璫左貂充斥宇内飛而食人在在重足黔以瘠土大兵後主上閔而不遣而吾儕得以韜戈撤堠之餘因革明時乘隟葺樓以都知始者以吾儕新不可謂非大幸故若鄭都知者自今視之固亦鐵中之錚錚與而况創樓故碑猶言言也監司郡縣衛所與是役者例得書姓氏於石之右孫文恭祠碑記郭子章人情所極慮於身後者在易世之裔與易名之典而此二者恒相因也有子孫陳乞雖中才可獲褒稱無子孫陳乞即髙賢未免堙圽抑勢使然乎亡論徃故如我國家李韓公之功不遜於武寜武順而李不諡祺不善終也解大紳之賢不遜於楊文貞黃文簡而解不諡家徙遼陽也鄒吏目之忠不遜於羅文毅舒文節而鄒不諡雖云秩卑亦其嗣斬也人臣生竪太常之勲死為若敖之鬼非國家念其故䘏其私誰為然已溺之灰而反既失之履故人情所極慮而不可必得者國家曲體之令其世絶而祀存骨朽而名揚所以彰徃而勸來也隆萬以來此論稍明章耳而目之無子孫陳乞而褒諡如故得四人焉少保于公謙改諡忠肅少師夏公言諡文愍中丞海公瑞諡忠介尚書孫公應鰲諡文恭文恭之諡實章與御史宋公興祖李公時華同請者公賜諡詔下章又與御史畢公三才作公祠於清平市田以供嵗祀平令劉啟周等以公祠記來請余計公督學秦中為三秦士師瞽宗北雍為天下士師及門入室弟子當有善言師者乃請於今御史大夫三原温公温公故公所簡秦士也温公曰弟子即誦師無若公言公且以哭公集杜八首示余讀之令人涕落余辭不獲乃稽公履厯記之公姓孫氏諱應鰲字山甫揚州如臯縣人占籍清平衛嘉靖丙午舉鄉試第一癸丑成進士選庶吉士改戸科給事中出僉江西厯陜西提學副使都察院僉都御史撫治鄖陽入為大理卿遷戸部右侍郎改禮部掌國子監祭酒事隆慶改元上幸學公進講無逸賜茶請告起刑部右侍郎晉南京工部尚書卒賜祭𦵏墓木拱矣萬厯庚子章等為請諡於朝壬寅詔下諡文恭錫之誥命始祠公於清平城中余按諡法恭有九義諡公曰恭其尊賢貴義執事堅固之謂乎余師胡正甫先生嘗語章曰宇内講明正學楚有黄安耿公蜀有内江趙公黔有清平孫公吾豫章有南城羅公皆賢人也已余入蜀余師與趙孫二公皆捐舘舎乃合祀三公於大儒祠及余入黔别鄒爾瞻江上爾瞻曰黔中孫淮海李同野馬心菴皆致力斯學君此行惜不及見三君耳余平播後輯黔記乃合三公類傳於理學已復為公請諡而得恭乃知正甫先生與爾瞻言不我欺也嗟乎公亡易世之裔而得易名之典人情所極慮不能必得之身後者公不慮而得之遭逢聖明視李解鄒三公千里矣公所著有學孔精舍彚稿易談四書近語教秦語録春秋節要律吕分解等書共若干卷發明聖學具載諸書立朝大節他日國史當有大書之者兹記止紀公請諡及建祠顛末祠即公書舎故趾袤若干丈長若干丈中為堂祀公堂外為門顔曰工部尚書孫文恭公祠祭田若干畆具在碑隂西南平播碑記陶望齡皇明奄宅方夏象寄所隸極於西南賧僰濮洛烏蠻白夷荒忽么䯢前世所弗役莫不箠使纒馭咸在職貢維播古之郡縣楊氏以唐之季䝉亂固險世長厥地顯襲朝號内相君民區裂版章以淪夷裔厯宋暨元羈縻弗絶雖聖人繼起洗濯腥穢包併荒逺猶取其貌恭因而建置葢仍徃宜令茍便民俗而已至今皇帝御宇神武英斷威徳醲鬯仁風既宣義殺時舉遂乃誅夏戡倭捖强獷植單弱參伐順建旬始隕消維播孽應龍怙其昏嚚湮滅彛紀禍芽帷牆以條以蔓夭㭬姻黨遂延甿黎七姓五司逢其蠆螫咸仰天搶地而呼曰吾君乎匪覆匪載胡逺獨遺天子曰播人余子余可弗問令吏召應龍置對逋佚抵嫚未竟厥理用反戈於白石疆吏來言狀是當誅討天子曰嗟豈不或悛命大臣遄徃宥辟之迨至應龍詭服請受罰贖首領自效使者宣上㫖褫爵赦死春煦夏長父教母嫗惡枿桀息馮倚慈惠長傲滋慝䆒厥狡狠遂乃放兵擾境逆我顔行戕我將士於飛練事聞廷臣僉曰播徒蟣蝨上不忍爪甲數置之覆用嘬噬此自棄天天所廢絶不可宥天子曰然遂以前巡撫遼東兵部侍郎李公徃總師事建督府成都總統黔楚賜劍一得揮誅大將以下而以都御史郭公撫黔都御史支公置幕偏沅以江公徃楚視師咸聴於李公己亥五月公至蜀受事當三方積平士恇戈刓􅖲饟弗屬公謂以天兵誅小醜當䇿萬全取一決而定於是徴師輓粟内修攻戰具陽示無動以紓之賊入綦江燒王嶰梗偏隆煽引九股恫喝躙轢圖以怵將吏就懷拊公因布之文告賊志果岐用緩深入明年春所徴秦魏燕齊滇浙之師暨土司兵畢集衆二十萬正月望日登壇誓師五監六帥八道並進以伐之推官髙折枝先以南川兵擣官壩降真州進據桑木蜀帥綎破楠木婁山闗再與應龍父子遇力戰大殱其軍帥廣别擊斬賊大將郭通緒夷崖門以入再㨗水牛塘賊棲􅋭上楚帥璘盡芟四牌七牌之苗躡青蛇巔戮數千人進畧大小三渡而黔師亦再渉烏江毁闗以水西兵抵於白田壩夏五月諸將士大會海龍􅋭下公命按察使悌來視師無何封侍郎訃至公飲血茹涕責戰愈厲六月五日綎應祥兵破其城二翌日廣璘攻之城圮衆繼以入應龍縊收其尸係擄妻孥盡檻其屬獻闕下皆論如法斬磔於市夫播人竄伏榛莾沉於雰霾不覩天地之大日月之朗者八百年於兹矣刖割舂斫束身淫威霆鬼其酋不敢遌睨其視王人天吏若異穹壤一旦更建城邑設守令飭新膠庠猱梯虺穴虎豹馮阻者皆剗削崷嶮廓為周道茫施羅甸谿洞君長震叠懲艾益祗罔怠明天子刑徳我公功烈於是乎逺宜標諸金石昭示萬禩永奠我南紀用都司𢎞吉所相白田之南山下鋭頂平樹銅柱其上就厥址桃源建公生祠銘功徳麗牲之石望齡舊史官於職宜有紀述遂系以辭曰播古州縣端淪於夷封以順完地以鄙遺明之肇興鑑先納土膚使窮階仍珪襲組南金象齒嵗獻於王稱爾干矛載啟戎行天命不滔妖興徳寡有孽於房有謀於社女戎勝晉禍水滅炎大猶弗勝小醜詎堪纓虎冠蛇揺牙噴毒嘯刄嚬鋒刑人以族髙髙昊天聴民則邇命執罪人歸諸尉氏拲梏就訊為我繫囚既縱而西鶻隼去鞲白石弄兵射天嘷主大吏執言譸張其語糾聚奸慝公相讙囂糜肉播人用以豢苗鹿鋌其險兎狡其窟再抗黔師兇窮罪迄邉人告訩帝用憯憯爰命虎臣亂是大戡桓桓虎臣曰維李公惟郭暨支佐佑厥庸偏師未集綦城宵壞公狃以詞俾疑罔害裒兵聚穀機沉色閒難知如隂不動如山仡仡王師有來自東盧濮髳微並以兵從師既會止神謀電發八道攻進濤掀岱壓公曰有命誅止其魁播聞鼓聲若旱始雷拜跽扶㩦百千其伍有不用命乃斨以斧重闗嵳峩若騫若墜恃險與兵以即顛躓殷伐鬼方憊乃克之三月告旋天子之釐維播在昔陂池潦洿今始會同乃江乃湖昔為鱻薧以飽兇淫今有室家乃父乃兄告爾播人勤爾征役襏襫韋衿以償帝力告爾播人維千百祀我公之功以名爾子赫赫天威銅標在南逖矣西人我公是瞻傅公祠碑記馮時可傅公諱天錫字祐之世系錢塘於宋髙祖時為望族迨潁國公友徳為明佐命臣潁國四子公行三當元季天下擾攘傾側父子奮身各圖雲臺業因相失焉公長身瑰瑋矯矯若雲中龍為經生即有聲尤工詩詩格髙不作大厯以後語暇則談兵屈指穰苴司馬自負為封狼居胥禪姑衍無難者每籌策天下事忼慨中竅揚眉裂眦人不能難應江浙行省試一日忽語同學諸生吾仰測渾儀旁察方輿江淮間鬱鬱薄層霄成龍文五彩者其天子氣耶遂間闗投謁髙皇帝被偽兵執送偽將潘允明欲臣屈公環以兵公曰聖主出矣我翹然男子非若臣也鬚蝟張目光炯炯射賊聲震行幕皆辟易不敢兵俄報明李武靖公破富陽餘杭兵壓允明營允明謀拒公嘆曰明天子天授神兵百萬前茅至此無完卵矣允明雖駭公言抗而與其黨計以為然乃計諸公縛偽員外方彛往獻䇿於武靖與公語良久竒公因納允明欵還薦公拜明州訓導時僧幾先黠有謀引倭襲明州因詩通公公得幾先狀以請乃設備誘縳幾先用功陞知大名府元兵犯大名公厯任甫七日備未具不敵綰璽還請就司冦法詔報曰傅某有殊績郡新造非爾咎安置雲南永平公配于氏㩦以往明年抵永平又明年拜大理衛知事未幾普安賊安乃叛公督兵與戰不利或勸公逸公曰爾何餒悖失䇿徃吾守大名不完郛皇帝不以膏斧使衣冠待罪徳甚厚非畢命枹鼓曷報免胄搏賊死之土人以𦵏驛後公生寛寛生瑄瑄生易菴證證生教諭江安公風風生工科給事中良弼以蹇諤著正徳十六年部使者奏公忠請於朝立祠祀焉至萬厯十禩而公七世嗣侍御公來按黔黔人徳公念無能報謀新公祠中丞劉公聞之曰偉哉傅氏明徳逺矣亟新之時可以督學行郵拜瞻公祠悵慕久之因為序次其事云葛鏡橋碑記張鶴鳴平越之東五里有水瀎潏嶈嶈深不可測兩岸皆岝崿沓障拔地挿天薄岸視之澶湉窟若有異物盤焉渡舟徃徃覆没平越人葛鏡誓建橋初建崩壞再建費倍初建建滭沸處又崩壞鏡誓曰吾罄家資必成此橋乃於岝崿沓障拔地挿天之處募工鑿其麓崆㟅之石悉展為平陸東西岸合開約五六丈壘址於淵為蹲䲭鴈齒屹然亘石虹於江上矣余以萬厯四十三年乙卯四月過此江尚舟渡鏡祈檄運木者余為允行四十六年戊午三月余有事勻哈之役鏡橋已成四十八年庚申二月余奉命督陜西三邉移沅交代鏡已物故夫鏡一匹夫耳非有陶朱猗頓之富建橋一念之死不移一建而壞人情已厭之矣再建再壞三建卒成計費不下五六千金人情所更難者聞鏡饒田計嵗米餬口外悉用之橋前後三十年功始成此其從容樂善不吝不倦豈世俗人所能企其萬一者余嘉鏡之行憐鏡之死又喜其橋成而死得敉寜也因名葛鏡橋勒石橋上又為記紀之碑如左云武侯祠碑記劉秉仁世𫝊諸葛武侯畧地黔中時殆抵牂柯遍金筑云又侯所過輒有遺蹟付諸山靈後人發得竒跡閟響必謂侯所遺葢謂非侯其誰宜為也今貯甲銅鼓兩巖皆謂侯遺蹟葢故老相𫝊如是然不可考矣南崦故有祠祀侯前挹郡城下瞰漁磯烟水飄渺翠微亦稱廟貌我龍洲王公開府兹土瞻侯祠宇想見侯扶漢三分事慨然興懷低徊久之乃手侯舊𫝊增損校讐再四剗之楔貯之祠以為薦紳典型以慰甿庶遐思愚嘗反覆深維之見公有逺意匪直寓仰止之勤已也忠武在章武時欲完蜀以瞰中原之變志圖恢復故其所經畧蜀地務先讋服笮僰諸夷之心要在奪之氣以藉其力曰思惟北征宜先入南是也故夷俗習格鬬知兵侯故兵威困之夷善匿燧燎原侯故烈熖燔之夷巧避毒箐幽岩侯故窮捜之夷信鬼幻惑侯故竒跡閟響以震讋之謂所過輒有遺蹟付諸山靈者葢侯讋夷之一端也夷讋而無變然後得藉其力以瞰中原此侯之逺謨也閱千百祀來我太祖髙皇帝兼有區夏削砦落而樹以郡邑夷箐洞而代以控弦戍守自黔達滇蜀皆星絡雲屯己倍蓰什百於侯所措注矣顧國家亦武侯意也夫居今諸夷不靖則黔蜀滇不完黔蜀滇不完則非所以重西南之屏翰矣然欲靖諸夷匪得侯之才量及侯之規畫如侯其人者未足以語此今觀龍洲公之措注則得之公自幼挺拔沉浸羣籍馳騁今古厯職方卿寺於邉腹形勝險易經畧事宜罔不洞究要領故撫臨遐服譬之熟轅游刄也地之貨儲利則啟蠧則杜途之梗塞髙則陂渉則梁兵之募畜干則稱戈則比酋之魁傑馴則懷叛則兵土之習俗游則警惰則戒行逾年夷無鼓譟民無讙譁有苗來格在在帖寜不與侯之逺謨曠世相孚耶公所經畧匪直全黔以完滇即三蜀亦藉公以完如侯之故志侯所完蜀雖未足窺中原公所完黔蜀滇則屹然為中原一大藩鎮衣裔曰邉器羨曰邉裔具而衣澤器完而中好他日舒國家南顧憂者公力也公之意逺矣大都欲尚友於侯以繼偉畧匪直寓仰止之勤已也余於亟𫝊侯者而深維得之矣試持以諗公將謂余知言哉故不揣荒謭而僣記之郭青螺祠碑記鄒徳溥貴筑介在要服古夜郎羅施之地後漢武侯擒孟獲濟濟火從之以從征功表王羅甸則今安氏逺祖也安氏立武侯廟於大方前為闗侯廟巍然兩峙水西隔烏江一衣帶便是播州播酋楊應龍獍負險逆顔行王師屢征不克聖天子赫然震怒拊髀思安攘臣廷推泰和郭公才猷將畧足膺重閫萬厯二十七年春三月奉勅開府貴州兼督理湖川諸軍務夏四月匹馬入黔黔中物力單弱一切兵食仰藉楚蜀協濟綦江一陷全貴阽危公請増兵益餉以充兵實計募兵守偏橋等十二處要害以遏冦衝調補文武將吏㕘劾規避以嚴紀律身先臨賊以倡勇敢總督長垣李公移駐重慶請上方劍與公協心朋力而軍政肅然矣明年二月公誓師四月進兵首摧賊鋒宣慰安疆臣斬闗先登弟堯臣佐之大水田一戰獨冠七路興師至壁海龍􅋭纔百餘日六月應龍伏誅剉屍𫝊首妻孥田氏朝棟等七十二名檻俘闕下是役也貴州斬獲首級四千八百六十生擒首從一百五十八俘獲賊屬男女一千一百一十招降播民二萬九千八百五十奪獲賊仗不可勝紀天子賚軍興百四萬金公僅用其半漕糧三十萬鍾用十之一餘悉還帑藏恬然奉身而退温㫖欵留以定播地經理郡縣新設遵義平越二府正安黃平二州遵義桐梓綏陽仁懷湄潭龍泉甕安餘慶八縣改置安化貴定二縣播地方平皮林復熾頼公餘威進剿擒斬俘獲與播畧相當未幾議播水地界公與新城王司馬公議令疆臣入苞茅代播輸將於黔西沙溪仍舊又未幾議鎮雄公命堯臣挈妻孥還黔代兄為宣慰而鎮雄還隴人言公慮逺謀深功髙事苦然哉先是公以二品誥命改給京銜廕仲子生員孔廷入監讀書及叙播功陞右都御史兼兵部右侍郎廕長子孝㢘孔建男武舉承昊世襲錦衣衛指揮僉事三十五年公陳情終養至九疏上不得已准養親以俟起用遂得舞斑衣於膝下朝夕承歡至三十八年五月大事已襄榮膺䘏典四十年五月叙路山二苗功晉兵部尚書兼都察院右副都御史賜緋魚服給三代誥命孫昊晉錦衣衛指揮同知世襲公乃建忠孝寺於里以報君親恩四十一年皇太后頒賜藏經勅賜寺名大忠孝禪寺公在黔十年始終出處忠孝大畧如此黔人思公恩建生祠祀公者七所俱載祠録乃宣慰安君堯臣獨建祠大方名曰懷徳與諸葛武侯夀亭闗侯鼎足而三惟生祠之建自昔有之石慶為齊相齊人髙其行有石相祠欒布守燕燕人服其㢘有欒公社至荀勉朱邑之遺愛童恢韋義之異政載在史冊班班可考而未有専祠殊方者尤未有特祠於宣慰者有之自今郭公始宣慰率羅甸人合武侯闗侯郭侯而並祠之真可謂懷徳矣夫徳有厚薄懷有深淺尸而祝之社而稷之春秋俎豆之懷其懷也淺郭公曰忠順宣慰亦化而忠順無迕纎毫郭公曰仁厚宣慰亦化而仁厚無隕蠕蝡仁義道徳之懷其懷也深畏壘之細民竊竊然祠庚桑子庚桑子不釋然曰是妄鑿垣墻而殖蓬蒿也何也為淺也物不答施於天地而天地亡恫子不謝於父母而父母無憾何也為其深也羅甸人無庚桑郭公而天地父母郭公是名曰感其感無心是名曰宫應角應其應無跡懷之摯也祠以柱史南海馮公奕垣左方伯通政使寜國趙公健配享葢左右郭公施徳於黔者例得並書建設貴定縣碑記丘禾實貴定何以始城曰新縣也貴定何以始縣曰改土也然則改土便乎曰道有升降政由俗革標枝野鹿化而冠裳卉服鳥言化而絃誦獍之民日控弦鳴鏑嗜鬬如飴一旦化而賣刀買犢由此言之吾安知舊貫之非因循而更張之非善治也惟是時詘舉贏以區區枵腹待哺之黔而動有草昧經綸之計業已郡縣其地勢不得無治有治勢不得無城有城勢不得不興役動衆而帑藏一空待道傍之議委而去之當此之時難於得財乎得人乎貴定故龍新之間屬夷地也當萬厯中兩平伐間實為萑苻之澤徃徃禦人國門一嵗既數見告而又黠夷飛詭賦不就徴督撫郭公青螺有憂之於是上疏請縣四司治平伐而貴定名焉自是民稍稍歛戢窮谷之老有歎生平始見漢官威儀者然於城郭宫室禮樂教化謙讓未遑也凡五六年而今督撫胡公瑞芝來日檄所司城貴定時藩帑如洗司會不充先令者且以拮据鞅掌斃於是人益側目新封視為堪巖而黠夷益乘是登山嘯梁以相恫喝縣中夜數驚胡公聞之曰是不難難於人耳於是檄所司遴屬吏有膽智者徃而所司同聲一詞曰無如獨山萬守是嘗别駕肇慶治兵欽州有能吏聲者於是公乃上書請移萬守於獨山城貴定當是時人猶言萬公即智畧膽勇能役神使鬼俾天雨粟耶乃不期年崇墉言言公報貴定城矣先是議城約費二千緡猶虞不給公至拓地鳩工因民情而盈縮焉百工咸悦民亦子來量田助工樂輸恐後纔請金千四百緡而城工訖城四門門每相距百餘丈樓櫓稱之濠塹又稱之自是縣治巍如象魏秩如比屋翼如人之視貴定又不啻通邑大都也易曰天造草昧宜建侯而不寜公其所建之人也督撫胡公其建之者耶從此蚩蚩之民心志日易習俗日移周公孔子之道差可漸被葢禮樂教化之務與城郭宫室之制若相待而然者獨書城成而已哉當是時余在京師目覩兩觀之燬工用不興問是何以故或曰少府之金錢不給也或曰中璫之估計太濫也或曰奚斯之委用無人也嗚呼以蕞爾黔舉一城而有餘以國家全盛舉一雉門而不足由前之黔百相委也而城之難由後之黔且招提且輿梁也而城之易是在人是在人謹記始末作貴定城記東坡義烈祠碑記余懋學播之役賴主上廟算御史大夫司馬郭公幄籌八道陳兵六月奏凱㨗聞廷臣合辭頌公神武黔縉紳衿弁之士下及田夫野老黃童紅女拜司馬公袵席賜亦合辭頌公神武公曰不佞之節鉞從事於兹殪鯨鯢築京觀以保此黔諸將士所戮力也何敢居露布草疏臚列諸將士斬馘捐殉狀議爵樹功者祠死義者於是東坡路諸戰亡兵得次第舉祠祀先是播不道逆我顔行糾黔東九股苗為翼東坡以一如綫路阨其衝既募兵戍守苗日徃來不得恣大恚憤因舉兵來冦勢甚猖獗衛城老稚旦夕惴恐無不相持泣下自分必墮虎口會少㕘梁公銓駐城中馳請幕府指自集衛三老䇿曰城心腹也東坡肘腋也肘腋誠急當援然勢且及城萬一援兵出賊乘虚襲城謂心腹何遂一意嚴城備士大夫弟子員而下與諸軍荷兠鍪持矛盾雜立睥睨間自甲夜達曙無敢交目寢者東坡兵殊死戰以衆寡不敵竭力死戰賊屯三晝夜時時奔突已兵至城下偵知備嚴乃引去禮以死勤事者祀弔祭不至精魄何依吾師青螺先生檄治祠祀録諸兵忠勤昭示方來存慰忠魂庇之寜宇俾無號呼於日寒草短月苦霜白間仁也祠而烝之嘗之爼豆之且與簮笏之榮同施不朽兹吾師意哉噫已亥冬滇值順寜之變予實身在軍時聞播賊冦東坡内顧在念不任怦怦憂久之聞賊退幸無恙則又不勝欣欣喜非倖也惟梁徐兩公指奉謀斷守城而城完是以有今日井廬不改室家相保以東坡完興隆微司馬公密畫嘉惠不及此今事定司馬公改築吾城垣墉言言并龍新平黄諸城雄稱黔東保障而且祠諸兵垂之永世春秋書城諸及防子時也董安于於趙簡子縊而死曰我死晉寜趙氏定矣趙氏祀之諸兵之為興隆死也異世同事也城奠生靈祠慰忠魂皆民所欲舉舉之以順民志總為吾隆計久逺非尋常所蠡測者兹司馬公意哉咸曰敬聞命祠在東坡站闗東經始於乙巳秋八月落成於丙午春三月中構堂三楹祀站百户劉宗仁軍兵夏時董邦仁等外周以垣垣有門以其羡購田四畝有竒為嵗祭資工訖請於司馬公顔祠曰義烈凡有勞於祠者暨田區書碑陰創建十一城碑記閃繼廸漢法之不行於黔也非治黔而廢法不用黔固未可以漢法治也萬山林立鋭首異軀怪石猙獰狼奔虎視箭簇鎗攅散無統紀又山肥水瘠剛柔數觭逐隊東馳環繞不定生理窘蹙而衣食以禦人倘亦其形局使然故初未嘗不鋭意殱洗後廼不勝犯不勝誅何也聚則抨弓露刄怒爪磨牙散則牧犢飲羊鋤犁胼胝皆吾人也又或郊闗之外毒箐巉崖我不得而至焉囊篋腰纒委之而去倖以身免厯險衝危踉蹌呼籲官兵疾馳踪影滅没甚者𦂳闗扼要伏莽䲭張徃徃失利而返是故始於剥商近則目無官長始於攫貨近則人茹慘辱何忍言也葢寨苗以水西為頭額水西以寨苗為爪牙反賊熾則截路之冦滋孔道迷則中國之援絶威清以南跫然聲斷滇之宦於四方與四方之宦滇者率北道建昌南假交趾冒瘴癘經嵗年而後達文軌之世頓若異域者六七年矣朱同人大㕘奉命監安普軍䝉茸荆棘重開一線厥功綦偉於是相地勢酌逺近創議建城者十有一座則盤江西坡板橋海子馬塲諸要害地皆蠻苗所據盤而受指顧於水西者諸城建則宿兵其中出可攻入可守行李徃來收保足恃且於地之中界壘石為樓名曰望髙急則樹幟鳴金連珠營可合併邀擊賊乃不能施其飄風疾雨之故智而我無深入覆敗之虞聲應脉合勢如臂指葢不血刄而盗賊止息威清鴨池間水西賊無復有獷而飲馬者閱二年而安邦彥授首餘孽惴惴請降矣是故彼一時也生理窮於山川徃來窮於盗賊黔幾不可為矣公講求長䇿嘔心竭智用能使山澤祟消光耀闇䀜寛然戴履無致遺造物之憾然則黔又何不可為之與有甚矣公之治黔而長於任事也藉使蚤得任事如公者何至百餘年羣盗狎處又何至燧煽水西禍中全黔而滇受其敝加楚餉請内帑捐朝廷金錢千百萬者且十餘禩於此也公為政好從塞處求通糾結處作解是役也與盤江鐵橋並出人意表肇工在天啟六年丙寅六月迨崇禎四年辛未五月而城成戍樓官廨廟貌市㕓井井具備費取諸節餉捐廩役取諸營兵董役取諸將領無躊躇捜括之苦無誅求侵尅之弊崇墉相望所在金湯疏聞天子嘉其勞績更下大司馬覆議錫之令名盤江曰連雲西坡曰有嘉板橋曰靖氛海子曰恬波馬塲曰奏膚以上蒙賜名城者又於歸集小黃河建龍新城亦資孔建資孔城頂站建鼎新城定頭建定邉城尾灑建維藩城阿機建石碁城次第告成共建十一座蛇嗔豕突之區霾霧昏慘嚮所聚族不敢前恫疑駴却者一旦雉堞言言旌旗金鼔逺邇相屬負販絡繹烟火凑集又重以欽名規制赫然重已不佞維君子之仕也既已圭組専制一方庶幾利害便宜是故裴行儉之碎葉張仁愿之受降遂使西域漠南邉患頓絶作法自我安得謂古今之不相及也貴州通志卷四十一
