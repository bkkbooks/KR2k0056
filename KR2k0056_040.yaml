body:
  text: 貴州通志卷四十藝文記一明東坡月潭寺記王訓貴與楚鄰封當兩疆之界曰東坡由道左入躋攀林麓僅百武許有飛巖倒懸巑岏巧怪垂珠滴乳盡熊極竒若神蛟之駕秋雲鳴鳯之騫晴漢又如千乘萬騎浮空以馳仙子靈姝御風而下雖以五丁之力吳剛之技追而琢之不足以方其妙蓋天成也旁有崆峒邃不可入而一清泉冷冷自半巖出奔流平野居人飲焉其佳勝無與為比惟在夷區古所弗治故轍跡罕焉爰自皇明一統始制兵衛隸貴曰興隆隸楚曰偏橋而周道由之由是來往者得以觀遊間有學佛者結廬號普陀岩正統間遊僧德彬來營寺址名曰月潭時貴之都指揮使常智為衛興隆倡衆募財首建正室中塑法像金碧麗美茂林修竹環擁芳翠遂有聞於四方余惟山川因人而顯宇內佳山水經品題而載輿志者固多若斯岩之美蓋千百而什一也表賢祠記湯􅒐表賢祠貴州衛站以祀憲副吳公也公諱倬字克大浙淳安世家登乙未進士成化間僉事尋陟兵備副使剔政蠧發吏奸清介剛正難以殫述惟吾站役繁劇舊制未設廩餉公惻然欲月食人米三斗㑹侍御桂林包公裕按巡兹土議合馳疏上聞報曰可公又區畫贖金七百兩有竒購附近常稔之田若干𤱔以助不給今去公遼邈吾人思公之惠談不容口夫前乎公者未必不賢於公也後乎公者未必不加意於吾人也譬之荒墾而畚挶之功實公伊始按祭法有功德於民者祀之吾人豈私公惠哉乃就站境立祠專祀額其門曰表賢屬走為記系之以詩俾歌以祀公辭曰豸冠繡斧溫溫春煦賜我土田膏澤伊溥繡斧豸冠凜凜霜寒遺我餱廩百世不刋祀事聿修答公之休在晉尹鐸在蜀武侯碩牲清觴薦公之堂惟公降只雲軿翺翔我稼我穡繄公之力惟公歆只享兹飲食嵗月孔長頌聲洋洋庇我祐我惟公之慶何陋軒記王守仁昔孔子欲居九夷人以為陋孔子曰君子居之何陋之有守仁以罪謫龍場龍場古夷蔡外習類尚因其故人皆以豫自上國往將陋其地弗能居也而豫處之旬月安而樂之求其所謂甚陋莫得獨其結題鳥言山棲羝服無軒裳宫室之觀文儀揖讓之縟然此猶淳龎質素之遺不得以為陋也夫愛憎面背變亂白黝浚奸窮黠外良而中螫諸夏蓋不免焉若是而彬郁其容宋甫魯掖折旋矩矱將無為陋乎夷之人乃不能此其好言惡詈直情率遂則有矣世徒以其言辭物采之渺而陋之吾不謂然也始豫至無室以止居於叢棘間則鬱也遷於東峰就石穴居之又隂以濕龍場民老稚日來視豫喜不豫陋益孚比豫豫嘗圃於叢棘右民謂豫之樂之也相與伐木閣之就其地為軒以居豫豫因而翳以檜竹蒔以卉藥列堂階辨室奧琴編圗史講誦游適之道略具學士之來遊者亦稍稍集於是人之及吾軒者若觀於通都焉而豫亦忘豫之居夷也因名之曰何陋以信孔子之言嗟夫諸夏之盛其典章禮樂歷聖修而傳之夷不能有也則謂之陋固宜於後蔑道德而專法令搜抉鈎縶之術窮而狡匿譎詐無所不至渾朴盡矣夷之民方若未琢之璞未繩之木雖粗礦頑梗而椎斧尚有施也安可以陋之斯孔子所為欲居也歟雖然典章文物則亦安可不講今夷之俗崇巫事鬼瀆禮任情不中不節卒未免於陋之名則亦不講於是耳然此無損於其質也誠有君子而居焉其化之也蓋易而豫非其人也記之以俟來者象祠記王守仁靈摶之山有象祠焉其下諸苗夷之居者咸神而事之宣慰安君因諸苗夷之請新其祀屋而請記於豫豫曰毁之乎其新之也曰新之新之也何居曰斯祠之肇也蓋莫知其原然吾諸蠻夷之居是者自吾父吾祖遡髙曽而上皆尊奉而禋祀焉舉之而不敢廢也豫曰胡然乎有庳之祠唐之人蓋嘗毁之象之道以為子則不孝以為弟則傲斥於唐而猶存於今毁於有庳而猶盛於兹土也胡然乎我知之矣君子之愛若人也推及於其屋之烏而况於聖人之弟乎哉然則祀者為舜非為象也意象之死其在干羽既格之後乎不然古之鷔鴛者豈少哉而象之祀獨延於世吾於是益有以見舜德之至入人之深而流澤之逺且久也象之不仁蓋其始焉爾又烏知其終之不見化於舜也書不云乎克諧以孝蒸蒸乂不格姦瞽瞍亦允若則已化而為慈父象猶不弟不可以為諧進至於善則不至於惡不底於姦則必入於善信乎象蓋已化於舜矣孟子曰天子使吏治其國象不得以有為也斯蓋舜愛象之深而慮之詳所以扶持輔導之者之周也不然周公之聖而管蔡不免焉斯可以見象之既化於舜故能任賢使能而安於其位澤加於其民既死而人懷之也諸侯之卿命於天子蓋周官之制其殆倣於舜之封象歟吾於是益有以信人性之善天下無不可化之人也然則唐人之毁之也據象之始也今諸夷之奉之也承象之終也斯義也吾將以表於世使知人之不善雖若象焉猶可以改而君子之修德及其至也雖若象之不仁而猶可以化之也聖泉記劉汝楫黔筑聖泉遊者步自西郛沿溪流躡石磴可五里許磊砢疊嶂中一泓自石罅迸出滙為方池日每潮汐無停好事者置石鼓其內潮溢咫餘下至鼓之半而止通晝夜計之凡百次弇州録名百刻泉一統志稱靈泉大抵泉名自人其百為期則亘古無易也余自髫年遊其地每偕衆詫之苐私心又謂他境有然者亦不甚異也逮後周覽吳楚燕齊之墟歷考職方紀載乃知聖泉靈異獨黔筑為然允矣大塊中奇絶也蓋宇內名泉若湯泉火井瀑布趵突諸類洎陸羽所品次靡可縷指特壤界色味稍殊而無潮汐惟漳浦蠟潮侯官潮泉鍾山應潮連州潮泉固亦消長有期而其地瀕海乃緣海為潮汐泉不得與也若池陽湖泉章貢三潮安寧海眼樂平鳳遊荆門蒙泉郴州潮泉吾鄉龍場驛潮井去海懸絶似與聖泉為伍苐彼潮候僅再至三至亦未有百刻消長别具一槖籥者則聖泉之靈且異在别境寧復有此乎觀者探其故莫測其由或謂如漢陰丈人所云其中有機械焉余曰泰山盤石莫當霤水謂其久則陵夷也按泉志迄今二百餘祀即機械竇中水石衝激安能百年無改此其說無當已余意寰中地形若人一身其在西南昆詔其首中原其腹吳越其足也黔筑居首下腹上當以吭名夫吭於人身蓋神明之關也是故環四海周八埏精靈之竅獨於黔筑發之而有聖泉之異理固然哉或謂地域廣輪罔知紀極聖泉勺水耳何獨於此呈靈竅曰礎潤而雱𩃱至壺氷而巨澤堅小固可以驗大且堪輿家躡蹻眂龍脉蜿蜒千里外針所注不越毫芒勺水雖微不函地軸耶抑又聞昔人志水樞繫以材品測香辨味則異産可卜焉聖泉良異矣將不有苞奇育秀丕顯地靈俾之雄視西南為宇內一大式廓而與斯泉相符應乎即今省郡規模日恢人文競耀其兆蓋可徴也余敢識此以俟庶後有覩驗不謂今日無前識云讀書堂記張翀士生於今之世方童而習之之時即為章句比偶之學以取榮科第而不考究羣籍以求古人之用心及其年齒稍長識見稍定知欲考究羣籍以求古人之用心而又牽奪事務沉淪奔走不暇一玩索者何限余三十年坐此弊久矣嵗戊午遣戍是邦自謂閒暇可究初志逮抵戍日則又瘴癘頻作疾病相仍且為啼飢號寒者纍心又明年旅事始定殘軀稍蘇聊於城市僻處相其林木深邃者搆地一隙築草亭半間攜破篋殘篇時一展讀嵗既久亭為風雨侵癸亥初夏千戶侯韓子夢熊王子尚武詣余於亭中見其弊壞私與軍政使婁君拱辰及諸士夫謀曰盍相與為張公葺之三人者遂卜日命匠然不使豫知也勻中居民聞之各執鍤相爭來助或以瓦或以木石乃前為堂三間後為寢室室之上復為一小樓以便登眺又兩旁為廂房門戶墻垣各備焉工既成請居之余升其堂慨然以思入其室登其樓仰而四望因憶子瞻在儋州時僦民舍以居日與其父老子弟吟咏從容儋州之人相與誅茅築土特作室以居公夫子瞻一代偉人也而人慕之乃能如是余鄙陋何敢望公而勻之居余亦如儋之居公又何以副諸君意不佞因僭為說以告諸君曰人之有堂所以安身也堂之有書所以明心也庶人不明書則不足以保身士大夫不明書則不足以啓性靈而𢎞功業軍旅不明書則不足以察古今之成敗四夷不明書則無君臣而上下亂貴州雖在西南去中州不甚逺六籍亦往往具備今諸君能取而讀之與余聚堂中一事商確耶諸君曰唯唯遂匾其堂曰讀書堂鶴樓張子復移其破篋殘篇者朝夕於此前所謂考究羣籍以求古人之用心或庶幾乎少得之矣龍山道院記張翀余居都勻每吟誦少暇即與諸生司子推輩搜奇於山水間見隔河有峯雄峙崔嵬其髙插天遂杖履躋其頂山勢逶迤數十里羣山俱出其下徘徊四望南盡交廣北極湘漢西連滇蜀皆在目前余曰壯哉觀乎安得結廬而棲之時有霽川司君撫月泉劉君鏜二人殊好奇者即以其言謀於衆衆曰誠吾勻之勝槩豈天以啓張公耶乃各捐金募工即其山之旁取材得巨材若干楹山勢陡峭不可作屋基衆方卜其處俄有靈龜大尺餘自石中出突至其前三日不去衆以為神告其地遂即其處掘而平之前為樓樓之上復為小閣後為殿殿之旁復為小廊其所祀神惟民自山嶺以至其麓皆鑿石磴曲折盤柦可數千尺循磴而轉各樹以柏殿後有石坡髙廣平坦其文青赤登之使人曠然石下有泉出冷冷然潔也院左右皆古木藤蘿時有清風至聲如萬壑之濤起伏而不可為狀樹多烏猿白鶴往來其間憑欄望之若素相狎者工既成鶴樓張子負甑而來以習靜其間就樓之上設一小榻每至夜分常有白雲數片從窗入樓中徐徐進榻傍與余相依逮平旦則又飛去半鎖山腹使余下盼之宛然如霄漢間也清平孫子亭訪余於山中見其景而恱之欲得記其事余曰噫嘻自開闢以來即有兹山孰從而棲之余産在五嶺外相去數千里安知其來遊此耶即來遊此又安知結樓於中遂為一方勝概耶由是觀之其山川之開闢與余之來遊皆天也非人之能為也山舊名蟒余與劉君鏜走飛泉處見有龍青色因更號為龍山故院亦隨其山名云興隆飛雲巖記吳維嶽興隆東行三十里有月潭寺寺左為巖榜曰飛雲距地百餘尺中虛而下嵌乳液融結紛詭殊狀竪者柱矗懸者珞綴揚者鳥厲突者獸蹲躡級漫瞻斂衽徐睇極意所愜邃洞谽谺而窅際清渠激注而前繞舊即巖麓稍右構樓攬轡脂轄者息而飲焉余閲武沅江㵲溪而還春和晝熙停馭周覽惜於徑去而樓且向圮屬按察副使祁君清葺牖闢垣傍飭吏廨時偶成四詩手書於石而記其端貴州實殷周鬼方靡莫地秦漢以來間稱置郡羈縻未改草昧至我昭代開藩樹文武官吏始稱屏藩黌序之鄉今檢圗志錦岩珠壑祕洞靈淵所至有之若澄泉噴折匿見怪石巉岏林立在大都名區得其餘溜斷塊亦足以誇巧而競於人者雖周道往往是焉而兹岩之竒又最也當其湮翳於蠻烟冦莽中穆駿不馳騫節靡指蛇虺所穴豹虎所遊提兵拓疆之夫尚趦趄未嘗輕置足焉而今日冠蓋以臨圗志以載披霧覩天欣欣有遇矣然使生於大都名區則有力與好事者將營以萬金侈以衆觀笙簧韉轂宵膏繼晷窮遊覽之盛而貴州遐壤雜夷中原士彥非膺命不蒞商旅非入滇不經其暇而遊遊而知賞者幾人也噫岩固幸而遘昌時出穢墟而為人所知耶又不幸居於斯不能并大都名區岩洞泉石稱雄於世而為人所盡知耶天然洞記田汝成古之官於其地而善為山水遊者若晉謝靈運唐栁子厚是也靈運永嘉守子厚永州刺史也守刺史專一州官尊而政劇而二子灑然脫略恣蕩風情凡州之山水稍可取者必涉足而寓目焉又能作為詩文以張大景物使不落漠寰中斯亦竒矣然未識二子踪跡所遺者至於今復有表章之乎否也方今海內名士善為山水遊者豫所聞姑蘇郁元敬天水方思道天台蔡巨源是三子之好為山水遊也若飢食渴飲而病就醫也其有聞而求必得之也若獮搜而虞逐也元敬思道之遊豫未之考蹟若巨源則既知矣正德中巨源參議貴州貴州山水磽硤鮮可遊者而巨源必遊凡一丘一壑茍不為糞壤者皆涉足而寓目焉又善為大書嘉勒名稱以紀踪跡庶幾靈運子厚之風者夫巨源之遊貴州亦密矣而清平尤熟清平者巨源所與民同患者也清平地東三里所謂太極洞又其東十一里所謂雲溪洞雲溪太極者皆巨源因象名之也潔其間去太極百步許即今所謂天然洞也當其時翳於榛莽狐狸之宅而螻蟻之封不為巨源所甄録乃今去巨源二十餘年矣風雨滌薄門徑呀然𢎞邃虛明可肆筵几較其奇於雲溪太極不啻若華屋層軒之與蓬蓽伍也晦於前而顯於後豈非數與今夫崑山之玉滄海之珠千載求之尚有遺寶物之無盡藏也如是然則人君之求賢也招以弓旌聘以圭璧焉知草澤之下不有懷珍而槖者乎何以異於此洞之不得暴白於當時也雖然洞之顯雖後時猶不落漠於世吾安知此外不復更有遺者終有能表章之乎否也是歲巡按御史宿松楊伯生暨清平士夫僉事王子升侯汝言遊而恱之其名則楊伯生命之又子升汝言聨句詠之縉紳聞者屬而和之錢塘田汝成記之雙明洞記徐樾樾按考畢事之日州守莫子讚漆子登及守備謝欽以遊觀請願半日留為山洞光豫一笑而往抵洞蒼然兩山夾道下有寒泉注為澄潭怡然我懷從者曰未也白石壁立半折岩側下有通徑劈竇圎如滿月竒哉洞也從者曰未也緣門以入小徑夾崖前峯屼嵂蒼碧潭流穿石折而西回又一方渚磷磷有聲雲氣覆面靜觀山色山影沉澄如鏡東西風日相射南北繚繞石盤如蓋衍土一區可坐可憩往百步餘而興入風泉雲壑之外矣顧崖間石笋數尺形類粧㸃佛座虛可容背傍婉曲侍童環立者可數人俯皆平石樾欣然據笋而坐其巔莫子漆子左謝子右席平石也小子者數人負歌而前命之歌豫盼流泉而莫測其往小子再歌豫再和之莫子歌伐木節以磬水石冷然交奏好音徐子頺然發浩歌童冠者八士摳衣而進立斯須間歌湛露前溪橫小梁渡涉者莫子起以請曰未也渡此則雙明洞矣徐子臨水卻顧步小橋微吟半聽流泉之潄穿石洞緩步而登六七步間恍然光敞堂壁四周洞開一面以吐日月上圎下方奇偉一室環壁靈異莫窮變態徐子中坐而四顧焉轉而忘其美隔水鼓吹聲希奏雅而歌者繼作二三子列席酌㫖酒俎雜山肴有事於奔走數十人環崖而侍者翼如也山水之竒足以洗心如是夫誰謂其娛於觀聽之美而已哉歌酒話言方極懷抱葛衣輕飄山色半黯紅光入水起視郵人秉燎束楚以繼夜遊揖二三子起賡再歌凜乎其不可留矣雲龍洞記焦希程威清衛本羅甸國故地也國初始置衛以中華人守之去城西二里許有洞人莫知竒也且辱以凉傘之名丙辰秋杪藩參莆田雪峰黃公暨余往焉洞門卑隘磬折而入其中寬衍可容數十人其上則氤氲之氣蒸而成溜清而成漳蓊然蔚然崖石變幻望之如雲而狀態互異或如靈芝或如蓓蕾或如璣衡或如凝露或如蜂房或如蛛網篆烟盤旋於密石或如齊紈越縠飄渺於風中或鋭如懸錐而鋒芒射目或幻如長虹而夭矯乘空或如神龍自天而下凜乎雷電之將至也余因憶家食時每觀夏雲竒峯往往見神龍埀其端信宿上下而雲從今洞殆不異也因名以雲龍重修張公讀書堂記鄒元標讀書堂頺圯日甚刺史段䝉岡公葺以居余肄業其中因為之言曰古之學者一今之學者二古之學者純今之學者雜古之學者逸而有得今之學者勞而無成混沌剖判朴茂未漓入孝而出弟耕食而鑿飲吐辭為經舉足為法文與行出於一結繩風逺百家蜂興人私利士私學相軋以勢相與以詐文與行出於二矣一則純純則從事身心而日臻於髙明二則雜雜則從事章句而日流於汙下世之勤勤懇懇於章句間者有二上焉者謂一事不知吾儒之耻必由博以之約不知舜居深山木石與居鹿豕與遊及聞善言善行若決江河舜之為聖者自有在也下焉者欲冥搜網羅鷹揚藝苑不知古今名家雲蒸霞滃亡異飄風好音過耳宋作者且傷之矣嗟乎丈夫七尺所係以炳烺千古灼爍後代者無幾耳伏羲未生八卦未肇孔子序書斷自唐虞生唐虞之時未有秦漢之文生秦漢之時未有李唐之詞賦生李唐之時未有宋之詞章日月迅速流光幾何刓精敝思於楮墨間何異鼫鼠之耗太倉也若然捐典籍兀然穆然遊亡何有之天可乎此釋氏不立文字之教未敢以為然也昔人讀史一字不遺程先生鄙之為玩物喪志夫學先於立志孔子七十不踰矩亦志之不踰矩也志之在人譬之木其根焉詩書其培之者也章分句晰是溺志於訓詁也不敢以訓詁而溺吾志提要纂玄是泛濫於詞章也不敢以詞章而卑吾志親先覺以明之求正友以輔之俾吾志炯焉燦焉不見異物而遷焉是之謂以我觀書以我觀書未越方寸卷六經為己有以書博我萬卷茫茫終為支離章句也沛六經之正脉揭斯道於日星庶幾哉無負虞孔真傳而可讀古人之書矣登斯堂者尚三復於余言南臯書院記江東之自昔忠臣義士揭天綱振地維擔扶人紀何代無之而惟真一不二者芳流逾逺故百世可師焉彼感慨攄憤鋒厲一朝未幾而濡泥迫隘已不勝委頓若中亡真宰悠悠世味入焉而染始非不伉爽而後遂芻狗棄之兩者於叔季猶云小補總無當於大儒輔世之道若吾友鄒君爾瞻氏其殆庶幾乎方公成進士時㑹主上冲齡御極惟是江陵竊國內連閹宦廢倫棄制莫敢巷議公極言非孝者無忠疏入未悟主心先逢相怒一時杖闕下者五人公承嚴譴戍都勻至則僦居氓舍鷤鴂先鳴莫必其命日方與鬼物鄰尋得張公讀書處一僑足焉張公翀者馬平人嘉靖中以比部郎疏論分宜戍於勻勻人搆此以讀書張公是為鶴樓書院而公視張公後先一轍遂結茅於張公堂右居勻六年時時與都人士講天人性術之學翛然皭然蓋身在局中法流界外委化運於儻來而不以人我參耳其門弟之髙者往往負奇氣掇巍科詞章行誼得廬陵文憲之傳如陳給諫尚象亦以讜言放逐要其凌霄亮節不負所學又宛然鄒氏家法也癸未江陵事敗上召還直言忤相諸臣而公再入朝省聲望益為天下重勻弟子有羮墻之思就於公所嘗登覽論讀處更創為南臯書院址在黌序右傍近聖人居如此其甚也規制若環堵門屏講堂夾室甍樓學舍大都靚深虛閴不啻一畝之宫前面龍山江流襟帶後接髙真觀半山之麓美哉堂皇峩峩乎渠渠乎蓋始於郡諸生之倡義作於督學徐君之表章若有司學博鄉先生武胄之捐資俸與門弟子拮据之勞視昔勻人成鶴樓不啻過之公去勻已久而是中之濡名教景風神者方喁喁興起月殊嵗異非復向之舊都乃公再出依然一故吾不改即隨牒南北浮沉郎署間而自見一無增減何以故得一故也惟真一不二之精始能埀世立教化俗育才視彼乘意氣博名髙者不同日語矣按省志惟勻地多嵐瘴本以安置罪人乃今不病君子而勻之人又能尊信其言反資賢者以孚化他如龍場夷窟無能危新建後之尸祝陽明祠下者異世且未艾焉假令公如新建遇主於巷即屠龍術隱而文德武功固無二道奈之何三仕三忤權貴不能一日安於內耶嗟乎稷下之椽有涯而鴻名無涯峴山之碑有壞而遺愛無壞則書院不足以重公而勻人之善善可重余言不足為公重而公自有為勻地重者微獨與鶴樓競爽且與龍岡並傳余不佞承乏黔中搜名賢遺跡得三遷客夷夏於今稱之顧不佞有晉寧之謫而未罹其憂有新建之還而愧無其伐總之勿二其心則於二公有餘師也夫陽明著矣鶴樓已自有記今監司梁君銓亦以直指觸忌來勻感公正氣而以碣石請故為公記之以寓髙山一慨且使後之觀者渠復目黔為有北之鄉耶便河記陳尚象雲故有便河實始於正德間兵憲李公麟鑒往事防來患以貽千百年之安者也嵗久跡湮居民多鞠為蔬圃年來內侵之患往往而有頃播賊猖獗大中丞郭公頒有城書維時所司僉議及此㑹徴兵運餉力不暇及識者殊以為憂今憲使袁公甫下車既平播平黎內安外攘威德茂著一時野有寧宇頌聲翕然交作而公所長慮卻顧未已也一日談及便河周巡外慨然曰兹綢繆之至計也可廢不舉乎遂屬司理楊君應第與視衛篆者圗新之捐俸斥緩計徒採石簡材官有心計者董其役自小河口築長堤若干丈引水灌於故道歷兩西門而南與東山左掖諸水㑹流以達於龍潭民不告勞瘁工不易嵗時而長河如練與金城相表裏真可謂賢於勝兵十萬矣余聞諸父老言建城之初髙皇命有司繪圗以進恐諸苖憑髙俯窺遂以御筆指㸃於東山之巔嗣是雖間有憑陵絶無敢有從東門入者獨西北一帶地形稍下故逺如正統之變圍城至十閲月近如壬癸之際軍民士大夫咸不得帖枕席則兹河所係良非鮮鮮昔蜀大夫李氷鑿離堆辟沫水為民除害蜀人至今祠之雲固僻在一隅無他擾獨其害在苗耳公修舉永賴之利於百十年廢壞之餘體中丞公如保之心以慰髙廟奠安南服之至意功德於吾雲者寧有涯哉余烏得無紀陽明祠記馮成能隆慶辛未余自里中赴貴陽廉訪及抵貴謁先生祠蕪陋特甚蓋先生舊有祠院二所自貴陽遷入一為郡治一為庠故廢墮至此余復為憮然茫然即檄有司為更新計既而得地於郡城東風氣明秀冠於黔中若天故作之以待今日者於是請於撫軍而諸僚大夫咸協厥議遂各捐贖鳩工凡文武吏士莫不翕然子來不數月落成先是同志長者敬齊蔡公及心泉程公少松滕公偕豫延鄉先生心菴馬公主會郡兩學師生講學别署兹則移㑹於祠之正學堂諸士子瞻先生像則已肅氣斂容相與尋致知之端緒究精一之心傳則復勃然興起蓋若先生復出而相與周旋問難於何陋賓陽間也久之余有蜀藩之命告行諸士請為述先生學脉以詔來者余固讓不已乃諗於衆曰道本無言也自伏羲畫一而堯舜名之曰中曰道心惟微是微者天地之中吾心之本體也以人見與之而微者危矣危即人心非有二也文王不大聲色不長夏革不識不知順帝之則孔子無意必固我而知天夫所謂聲色夏革知識意必固我者皆危也無是危也而微體全此至聖所以契天之中立萬世之極也成功巍然文章煥然參贊經綸之業與宇宙同其廣大而皆謂之微蓋任其天然之則直心以出之而我無與焉則雖仰而思之夜以繼日而亦謂之無思身勞天下過門不入而亦謂之無為授受之際與回言終日而亦謂之無言何者皆天之微也非人之危也孟氏沒而道心之㫖不明諸儒習於聞見之末沉溺於訓詁詞章浸淫於權謀功利而欲窺聖人之緒不知其求端之初已落惟危之路其去中也萬里矣至宋周程大儒始能以無欲存仁之學體天地之常聖人道心之㫖復明天下而其後解說日煩支離益甚其流之弊遂至於遺心而求理逐末而忘源使後世謂聖人之學惟在於言語事業之間知能技藝之末而不復知所謂本天之微幾於是為二氏之學者反得以虛寂之說動髙明之聽而聖人之學大晦而不可復求吁弊也久矣陽明先生以挺世之豪立希聖之志其始也博之詞章其既也又求之佛老而見猶未卓也惟其志求必得百鍊千磨至龍場處困之後始大悟此心之本真直契吾儒之正脉故倡明良知之㫖以立教良知即道心也一㸃靈機天地萬物之所生生而不息千聖授受之際心心相契而不可形之於言者不得已而發之二字以泄其微使天下學者知心即道道即心而聖人本天之學復幾於大明先生嘗曰吾此良知二字自萬死一生中得來嗚呼亦苦心哉然則非有萬死一生之功者未易語此也惜乎世之學者率以知解承當不因積纍入悟認知識為良知以聲色作用言語辨論為致知或髙談性命而聲利是謀或收攝元同而經綸則滯競笑宋儒以聞見為致知而不知吾黨之所謂良知者聞見也以窮物為支離而不知近世之所謂忘物者支離尤甚也求其實致德性之知而默識天然之則者幾何人乎嗚呼知得良知却是誰先生固有深憂矣以成能之謭陋豈足以與知顧此一念真切心盟不敢自棄也嘗夢交於神明而聞所謂帝懷文王與文王之所以順帝者覺而忽有悟焉於是始信良知之㫖直契虞廷道心之微而孔顔默授之機無能出此矣雖然余未能真得也直為諸君說夢耳夢之覺不可言也先生故曰致知存乎心悟致知焉盡矣義倉記萬士和削竹為箸屑木為香績絲為網與夫負米裹鹽搬柴運水其為事勞也貴州以生儒業之則其地瘠民貧可知也盡貴之地山陵林麓居十之七而軍居其三軍尸自屯田官賦外所餘無幾其闔城老幼俱俟苗民負粟入城郭計升合貿易有不足者出重息以稱貸於人故苗粟一日不至則飢稱貸不得嗷嗷待哺而已平嵗如此設有水旱螟蟊之災備戒不虞之變將若之何往己酉嵗祲民之填溝壑者幾半此非地之貧而備之不豫耳頃豫視學政欲明禮義以淑人心然飢寒迫其身俯仰勞其志則不可以責人於善豫為惻然欲拯之未能也既而思之力不足於已豈不可以望於人效不可以見於今豈不可以圗諸後乃倣晦翁社倉遺意稍得贖金糴粟數十石積貯於官視諸生貧乏之差而多寡其數以散之不責其利豐年取其耗二十之一凶嵗則緩其期俟稔而償其散也如拿故物以還人其受粟於倉也如取諸寄官特為之收斂節縮之耳名之曰義倉意數十石之粟其濟幾何然余繼而益之後來者又繼而益之日計不足嵗計有餘所積彌多所及彌廣此余所望於人而圗諸後者也使稍脫諸生稱貸溝壑之患則余之惻然者庶幾有瘳乎雖然一人倡之十人從而和之則其事可久十人作之一人從而壞之則其廢必速余之是舉常恐積粟之不多也茍還納不時約信不著積者錙銖耗者什伯欲是倉之久而不廢也胡可得哉雖然即使是法之行盡寒士衣食飽暖之余之意尚有進於是者蓋士有各足乎已而無待於人者明禮義以淑人心是也禮義未明人心未淑則余之惻然者終懼其不免焉爾願與諸生共勉之至若積儲為生民大命倣常平社倉之制為百姓備旱荒賑災祲者則又視乎司牧之留意民瘼而非學使者之所得為也養牧所記郭子章夫物有外之而實以內之讐之而實以愛之者夫非以外內之以讐愛之也欲內故外欲愛故讐事固有相反而相成者張樂於洞庭之野曼而饋代射而食而鳥不至椒蘭為餌瑰玫為鈎而魚不至此愛之而讐也豢豕於義臺路寢而蹢躅逾甚食鹿於廣厦細旃之上而鹿逾逸此內之而外也何者非其性之所適也豫因是而悟夫治丐治馬者焉黔故有養濟院在兩臺署之東雜處於縉紳宅舍之閒而日呻吟作苦故有牧馬院在閫司傍貴陽府後馬日瘠而死者已過半矣乃訊之丐長圉人曰罷癃殘疾吾兄弟也馬以備戎事田事備郵傳於公家勞矣有司處於闤闠朝夕耳而目之庶幾時其衣飯稽其水草若之何苦且瘠也丐長顰而對曰養濟舍於城丐之院丐之圉也丐日汲井井者驅之曰毋汙井丐日曝於衢市人驅之曰毋汙市丐日樵城距樵所逺又病弗克負荷丐是以苦圉人曰齕草飲水翹足而陸交頸相靡馬之真性也城惡乎水城惡乎草馬是以日瘠而死豫憮然曰是非張樂投椒以來魚鳥耶是非豢豕鹿於臺厦耶乃謀之直指宋公宋公曰亟遷之而可乃檄監司及貴陽劉守文光徐丞公綰熊司理新貴前二衛署篆指揮楊師震李棟材市隙地於北關演武場西以其半􅢠蓋居丐者半作廄治皂棧居羣馬而令千百戶鄒宗魯羅三省等董其役役暨總名之曰養牧所堂曰胞與堂為郡縣有司及圉林氏蒞臨之所經始於萬厯庚子仲秋已事於辛丑長至豫以閲武一過焉丐長率其徒迓曰丐今而後始得汲且浴於渚樵於近林曝於壇場不為市井驅矣校人庾人呵引馬而前曰今而後始得時出入游靡分庌棧牝牡嚴刻剔羈䇿不局於城隈矣豫又憮然曰兹非所云外而內之讐而愛之耶夫丐不樂與市鄰馬不樂與官舍鄰則日苦而瘠逺之郊坰牧之洲渚則日喜而肥適不適之故也丐不適不能治丐馬不適不能治馬民不適烏能治天下夫治天下亦適之而已新河記郭子章萬厯辛丑春正月豫提兵㑹楚粵師討皮林三月克之四月班師還貴陽道偏橋城畔河流環繞衛郭滲灕可舟而江絶帆楫豫未知其解詢之父老父老進曰此去五里許有三洞名諸葛洞巨石嵯峨橫踞江心餘磧磊磊鱗次㦸列水流至此驚波轉騰望沫揚奔即芥為之舟頃刻而膠豫曰疏川導滯以鍾水而豐物古之人有行之而若是難也明日詢之諸監司諸監司進曰是河之闢其為利豐矣野航輕舠即極隘者受四五人載三四任省夫騎之半為驛傳便賈客自鎮逺募一騎不能負百斤而一舟可貯十百為商旅便粟自楚一葦至黃平而割分於餘甕龍湄四邑為經理便省城負粟鎮逺七百里而今去其半以從水為濟飢便頃夜郎之役楚粟艤於洞下今直抵黃平异日脫有急為軍興便豫曰便若是而數百年來亡議疏决者何也諸監司又進曰是河之難闢微獨石障已也其費資亦巨偏故楚轄而黔之邊圉也楚力裕而鞭長不及馬腹黔藏絀而舉贏難支曰吾何以代匠斫也且偏人利於開以通商而牟其利鎮人利於塞以留商而獨牟其利百道阻撓或陰醵金以餌石工石工曰是頑悍必不可鑿者故數舉而數輟乃偏人亦自謡曰若令三洞開除非諸葛來黃口皓髮習聞其說亦以為天險人力亡如之何豫曰撤黔楚之藩而獨任其費其責在我鎮人阻撓者吾責之鎮守匠受餌而輟工者半水西人吾責之宣慰塗人可為禹行所無事則智亦大而何疑於諸葛之謡豫將躬視焉明日泛一棹直抵洞口豫與諸監司周遭相度豫曰石即巨無若龍門牛峽之雄也費即侈無至白馬玉璧之沉也其險可鑿而吾力猶足辦顧誰可任此者諸監司曰都司錢君中選偏人有心計宜莫如錢豫乃顧錢曰屬之子矣錢君唯唯豫復愛其景幽而鄰水恣搜討於江滸得一洞似荷葉之半名曰半蓮左突起一臺外臨江潭內不靠岩墻名曰妙髙臺臺上橋之可入洞名曰接引橋洞前滙為二大浸名曰上蓮池下蓮池東西二山如巨屏刻其石一曰大屏山一曰小屏山豫以其勝似武夷總名之曰小武夷而刻於洞口石壁日暮返棹入城明日趨清平至新添晤宋直指公告以故公曰宜急圗之豫還貴陽筮日為文告於偏橋山川以六月六日經始開第一洞自沙築堤至老虎口出沈家溶又由砥柱石黃石板至夾船口其石如堂如坊如宫如霍約共百十有六丈八月八日報竣次開第二洞自團倉石歷半蓮洞前至小屏山下石磷磷不似一洞之嶠而扈者巋者嶧者蜀者墮者重甗者絡繹不斷約共六十有八丈九月十日報竣次開第三洞自二洞塘以下至沙石岩山大小别解不相連石旁岸脅多礓礫多礐多排崎稍易為土共三十有五丈九月二十五日報竣鎮舟挽而上偏舟放而下而渠成矣是役也為日僅百有二十朝夕石之匠五十鐵之匠二十匠之役夫二百有奇匠之餉六百鍾有奇匠之直百二十金有奇督匠之工錢君主之指揮韓紹梁千戶劉應麟葉正暘經歷王樞倉大使謝宥陳旻佐之餐風宿水亡須㬰離役所守備董龍王之棟指揮許繼祖把總王允聽間捧豫檄一至而省試焉諸首建議而襄成事者總兵官都督陳君璘右參政尤君錫類右參議張君文竒副使洪君澄源袁君應文劉君冠南副總兵陳君寅例得書於石陰遊馮虛洞記丘禾實余既改鳳凰哨路於山之麓因由麓得所謂母猪洞者洞髙數十仞玲瓏層復宛然樓居洞左有水自半山東下勢如建瓴前與洞水合流去為澗覔水所自來不可得蓋此山為藤蘿所封幾千年矣余既詫其勝則趣左右芟夷藴崇之行火焉火燼得洞門門於洞稍折而西曲捲逶迤宛若天搆顧陡峻不可級則先後各一僮附葛余以手若足屬僮登焉洞廣數丈深倍之前俯臨澗尚有藤蘿封之蒼翠交映其後為沉泉深數尺清可以鑑泉後崖最穹嶐稍左有門方丈厥中黯如余不能渡泉亦不敢就視苐循崖而西有滴處可級可達上洞然循崖處耳相錯也級處趾相藉也稍失足則墮泉中余畏甚然不能捨上洞則呼僮掖豫如初再登焉登處有罅下通者二余不敢旁睨苐以目屬僮以足捫級凡再喘息得達余坐洞門縱觀之則懸崖繽紛如伏龍如蹲虎如委佩如流蘇不可狀乃前一罅直貫山頂罅上一石直立如人形崖漿滴其首端蓋千百年來漿所結也洞上睨下洞如百尺樓瞷澗水又似在重簷下鳳山前峙若相拱揖而北風襲人令人有馮虛御風之想余因名洞曰馮虛以更其陋方余登洞時余弟嘉捷甚凡先余上下者再不恃僮又數數代僮掖余余既下則鼓余渡水視石門余辭不能則褰裳獨往久之出謂余曰門內方丈餘更有重門其中若明若暗若泉若洲且重門上纍纍若有所屬殆龍蛇之屬乎弟又前視泉中一物長尺有咫鱗甲皆具余恐其真龍也挽俱出然弟猶惜不以火竟云出洞已晡時相與就壺觴然意水所從來不勝豪舉因復從左山索之復得一洞深入無內履其旁則聞聲如吼稍入則聞聲如雷然不知何物也深入而後乃知為澎湃聲有坎巉巖下臨無際則渟泓一潭也余不敢入苐聞之僮若此因名洞曰雷鳴乃余弟索竒無已仍援石下視建瓴處則當小洞下有尾閭為灘水所泄水三叠如珠簾云此洞去馮虛洞百餘步仍處髙然水不下泄而旁穿為瀑布乃余所改路徑傍穿之上石生如梁小洞當路旁雖有聲然不令人見險噫嘻水亦有情避余馮虛之勝又避余雷鳴之險造化之密亦靈怪矣哉此外巖洞叠出在在現奇時方誅茅未及盡覿而日暮矣因為興盡之返歸記之東山記謝三秀山在黔東門外故曰東山峭壁陡絶百仞朱樓縹渺欲飛前俯金湯後枕銅鼓固儼然西南一具瞻云山麓舊無結構萬厯初中丞何公始建東山閣兩山夾谷之間頗足幽勝閣後為都是春風樓樓髙不及閣之半而濶倍之檻外社壇諸山一目都盡徑松謖謖如聽浙江八月潮能令坐者忘倦出閣啓短扉梯石而上望一天門如在霞表山椒祠靈官虬髯如㦸凜凜有生氣門東西各翼以祠祀關趙二將軍嵗時香火不乏祠右髙阜則小魯亭在焉亭據三面之勝故自佳惜不見城南如練耳亭下小有洞僅容二人坐亂石岌嶪相倚去小魯望卓楔而進是為空中樓閣閣不甚華呼吸帝座左右與樓絡繹東為雲堂以客方外殘碑斷碣相枕藉苔蘚蝕而蔦蘿封也僧橫小樓於叢薄中三聖殿與閣對峙負山雄麗而眺望不賒殿左為文昌宫小爽塏近亦頗圯斗姥閣半嵌崖畔飛駕空中憑欄極目自有天際真人想然而據險為不甚適自此過通明殿僅數十武皆從岡脊上行罡風蓬蓬然吹人欲起殿祀東嶽玉帝金像頗肅真足奔走萬靈左為鍾亭右為積翠亭咸與殿稱前楹軒豁松檜陰森即六月不受暑下視城市殆如蟻垤千甍翼張萬瓦鱗次明江一派盈盈扇履間虹橋卧波漁人操舴艋如在鏡中行大都黔中之勝無踰此已國朝他山記錢邦芑宇內山石之竒無過川黔楚粵然幽遐荒險車馬不交之處竒詭殆甚而世或鮮知之至川黔楚粵之交選第名山竒水幾以百計而藜峩之鰲溪幽麗為最自鰲溪至湄水可百餘里幽崖深溪堪怡玩者何止數十而蒲村為最也村之上有栁湖湖之陰為他山山髙不半里回曲斜抱上多竒石樹多楓樟楠梓中一石最竒突名曰翠屏外削而內空余鐫他山兩大字於上石腰有洞曲透其背其峯勢橫飛處瘦薄而偏聳為石帆峯峯背古木掩映四布如房然名曰雲房左一石髙而怪異曰九面峯峯前石壁中虗梅幹從洞口長出名曰梅蒼稍上一石橫卧中刳如船有孔植梅其中名曰梅舟石帆之右有洞曰小洞天梅蒼之左有崖竒險名霹靂崖稍上有峽曰藏書峽此外前後大石二十餘處低者如蹲如伏昻者如奮如翥不可名似中構一亭名曰拜石坐亭中則諸石之竒畢呈自拜石亭後上二百步極他山之巔四顧諸峯環拱如兒孫俯視栁湖湖光圎淨如鏡此外縈青繚白攢􅕚㸃聚蒼碧圍混逺與天際竒觀哉夫宇內名山巨川載於經志者寧可殫述而是山之竒殆未多遜也乃千百年無知之者余以逃名之故荒遁萬山深處始得遇此然則世之竒偉名勝𨼆匿幽遐不復見知於人世者又寧獨此山也哉飛雲洞記彭而述黔山多童樹不及尺石亦頑自沅入鎮逺可四五百里皆然疑黔山止此矣偶鎮逺北道傍忽見山半壁如墻堵百仞嶙峋色態青緑結陳而來馬上神眩同遊者曰即前所云飛雲洞也嶔崎歷落萬山飛動豫驚悟曰何竒怪乃爾城濮之役一戰而霸何求多為先登者呼曰此中大有物盍先內而後外為拾級而登朱門照耀時官題楔折而上有巨象一軀可十餘圍自山椒俯身下捲鼻與巖牙相鬬雌雄未决若有待者又晉一階為平臺爽塏如飛樓數間濶可數丈下臨絶壑有石欄為遮欄外三峯肺石鼎峙山額溢出飛榭四蔽懸瓠下埀乃簇光怪樓中左右壁大且環堵如陳雲戰馬劍㦸相列如怒獅搏豹有鳳翔者有鸞舞者其慧且黠者如獼猴數百纍纍引手飲澗下如鼯鼪跳躍追逐木末如鷙鳥愁胡攫身欲動其朴如定者為甑為釜為尊彜為胎銅為珊瑚或簇荇藻或結芝蘭或圎若璧或半若圭種種不可思議洞中兼而有之嗟乎此明堂考王㑹圗也又折而右有石蟒塞路猙獰矯首而出石梯再下數武又有一小洞水潺潺流出石乳亂下其詭譎欲過之聞此中二三年大水湧出輒見龍一枚以為常噫龍神物洞龍宫也變化不測故應爾爾易曰雲從龍非誣也寒神酸骨不可久留尋前路下審視門外半壁大約與門內所見相勝不相學難為兄弟石唇掀舉窢然穹然乃仰觀門前古柏髙十餘丈盤錯離竒似在漢孝武以前唐䝉相如所未見者與柏相對山腰飛泉一股瀉瓶而下不雲而雨灌田無算旁渟為石潭惝恍若失久之然後始悟黔山之童石之頑蓋有由來殆此洞之故乎此洞尤物足以奪造化之巧罄天地之藏矣彼山靈者尚有餘力以飾諸山哉昔夜郎王謂漢使者孰與漢大即此一洞觀之誠哉是言又豫嘗思扶輿精靈所鍾不在人則在物黔中地自莊蹻闢以王滇誕為名賢供上國之用者絶少為此洞所奪無足怪者吾行天下多矣洞之奇未有如此者抑何偏生於此荒陬蠻裔之鄉乎若置此在中原五嶽間為人耳目近玩反不奇矣抑王者不貴異物宜秦漢以前之君棄而弗取也嗟乎自孫李負固黔滇萬里隔聲教之外者十有五年矣今六師式廓盡有西南之地此洞欲自外於天地之間有所不能雖然此洞不見中國人久矣又頗怪見之而不為異與夫不能傳者則洞亦有幸不幸焉也路經平越乃檢篋中是作質之少參徐公鐫之片石附洞不朽用敕山靈自愛時二子始騫隨侍并記山水記田雯黔跬步皆山然童阜也至於水舟楫不能通又井幹之觀其水細矣而山亦不雄鋒攢鬵列犖確可為蹄轍之妨皆無足道然就黔而論亦有可觀者貴陽都㑹之區風景自别左棲霞右相寶夾岸連壤負險相望龍井湧於北富水滙其南杜若洲邊漏汋泉上偶一登臨為之旁皇追賞自威平而上山莫大於雞背關嶺尾灑水莫迅於滴澄盤江自龍新而下陽寶石屏萬勝梵淨山之至髙者也楊老甕城麻哈重安水之至深者也上游之山來自滇而盤江之水則入粵下游之山分於省而麻哈重安之水皆入楚烏江源自六圭卭水直通巫峽羣山萬壑雖云盡赴荆門未嘗不遡崑崙而趨大海也山皆石則崖洞玲瓏水多潛故井泉勃窣碧雲憑虛之洞飛雲香爐之崖得以分詠於昔人而百盈噴珍之泉胭脂神魚之井亦得監碑於淵底也其餘一丘一壑怪石奔湍在在有之而未暇詳是皆禹跡之所不經酈元之所未注時無栁子孰問鈷鉧之潭遊乏客兒誰闢石門之徑遂使山靈藏其姓字不求封禪於長安水自匿其聲光以待品題之髙士云爾雙井記田雯習安城東北隅一井名雙井上有石欄居人汲左以炊則色紅汲右以炊則色白是豈可以尋常理道求哉常閲異物志云廬陵城中有一井中有二色水半青半黃黃如灰汁取作糜粥皆成金色此色之一定者也又閲廣州記云鬱林郡有石井半甘半淡潛通江波冬夏長盈此味之一定者也獨習安之井其源同也其色同也其味同也何以汲之以炊則遂不同然其不同也不在乎水而在乎井上之欄與夫汲之者垂綆之左右斯為造物之竒而不可解者矣水之竒如此而寂寂不聞於世此蘇子瞻所以歎酈道元之簡而笑李勃之陋歟又習安胭脂井炊稻飯成桃花色鮮妍可愛故得名然於義别無所取蓋與景陽宫畔同名而異實也碧雲洞記田雯盤州出郭里許平疇交風淨翻緑浪環溪繞陌清見赤鰓沿緣芳徑直造巖陰有洞憑焉谽谺忽裂齒頰皆露不知鴻濛何年鑿也一屏當門灑青抹緑遊者摩挲拂拭疑為古玉幽流旁泄㶁㶁作擊筑聲上有片石如泗濵之浮磬又如涿鹿之神鉏叩之清越以長始入暗甚必假松炬以行沙石錯然戞人踝趾坐息稍定則劃然開朗天窗漏日下射層深毛髮可數黃爮下垂如斗瞿曇大士番僧之像各一或倚岩舞褎或踞石跏趺或蟠崖仰覷鬚貌如生絶壁千尺有龍升之長與之竟倘使葉公見之知其必驚走也稍進則駭浪奔雷奪人氣魄望之欲止左方一徑甚微側仄欹足不可置前牽後挽蟻附螺旋而後達丹竈藥爐無一不具安期耶羡門耶何以舍青城而穴處於此也巍然一塔拔地粘天鬼斧雖工憑誰著想漸進漸濕亦漸狹不欲往亦不敢往乃緣崖而上可出洞頂俯視萬山川原歷歷乃復知有人世一僧為豫言曰水入洞則世運泰亨蓋已信而有徴矣雲臺山記張拱樞雲臺山在施秉縣之西北去城二十里許從望𤣥關入山皆深澗幽壑古木崇嶺山形四面削成獨逈出於層霄之半俯瞰萬山羅列如兒孫左峙塔山右對彌勒山腰有石洞擊之若鐘鼓聲洞旁有龍泉紆徑而右㑹自垜河繞其山麓絶壁有白雲洞如哆吻張齶盤旋而入朝夕間雲往來山巔如臺隍然因得名焉人跡從不到相傳其中猛虎毒蛇與通臂猿山道士及竒形猓豸之獸甚夥隆慶丁卯之嵗白雲徐道人與周惠登氏學養生固𤣥牝結廬於望𤣥關者十載一日謂惠登曰赤城天姥古人曾經開闢矧此山相去幾許而顧使之沉淪於蠻烟瘴雨間乎吾願捨身以入如聽木魚有聲則登此山不則為虎狼吻矣言訖攜木魚以往散石灰以志其跡越三日山頂魚聲響應於谷惠登曰吾友達山矣即持鉢沿灰跡以行攀援而上遂登巔道人瞑雙目誦皇經端坐古柏樹下惠登手拍其肩曰我來矣相顧大笑而此山遂樂有千秋知己矣越數十年道人趺坐而逝有石嶄然壁立即其蟬蛻處後人顔之為遺真亭也明末戎馬生郊苗叛冦訌逺近人多避秦於山山靈貽誚戊戌之秋余與宋子次梅重理舊業讀書其上者若而年雞鳴風雨露飲霞餐罔有或間時乎洗眼看山則與領其要時乎掉頭看雲亦不堪持贈人用是山之得名有以副其實也因縷筆而為之記重建鎮逺府學記張大受學之設遍天下所以設教勸學復性明倫其道至重矧夫荒逺之區朴僿之俗無以崇其居而安其業可乎哉自常德經五溪灘險石惡百折而上為鎮逺府無城郭兩崖對峙一江中流康熙己亥嵗大水學宫被衝决辛丑奉命司衡始涖鎮逺悚然學之無存亟思更造嵗科兩考畢童子委贄則令周教授仁馬訓導驤暨諸生沈樞趙廷相等辦材募匠自壬寅二月經始踰一年工成改建聖殿髙舊址丈餘啓聖宫明倫堂及兩廡兩門以次興舉據江山之要路昭文明之大觀美哉煥乎癸卯天子建極改元設教取士鎮逺府學登鄉榜四人沈樞為解首恩拔嵗貢復得五人僉謂學之重建得舉貢之盛向未曽有而學使者之願不止此也蓋登科第受爵祿其小焉者有如此邦人士日游於學尊師取友誦聖經剖晰義利絶夫人欲之私保其天性之正孝弟廉耻修之於身而於天地人物食貨兵刑之書博習詳審體立而用裕必有卓然傑出之才輝輝廊廟為學者表率若夫教之既久化之已成則其土風之醇厚士氣之和洽直足以召嘉祥却災沴所係詎不大哉彼厠聖人之宫牆而不以希聖賢為志茍且利祿鹵莽名教何足尚也凛此簡書執事罔敢懈與諸生揖讓講論欣欣讀書砥行越千里來學相愛而相敬蓋有得於性情之感而非徒以貌親以文飾庶幾相長有成矣彼謂五方燥濕各别知愚不齊吾道有所窮者豈其然乎始營聖殿􅓪吉上梁日朝升旁繞雲五色逺近望之稱瑞並志於後重修平逺州學記張大受皇朝德化逺敷文教大啓自古域外蠻荒之境皆列版納稅立之學校以教其秀且良者侏􅍣之俗皆知讀書願為學官弟子而平逺之設尤後康熙三年除安氏平逺始府繼改為州學之創建則在康熙七年而吳逆亂後學燬於兵至二十七年督學丘公創首捐資司土者相繼興舉宫殿堂廡以次訖功其費半出於開墾額莊田故民不擾而工易成知州事朱君紹琨為政有方善造士加意學校楊學正芝先奉行克謹莊田所入修葺學宫無少惰猶以舊制卑狹將崇而廣之紳士慕義竭力相助落成有日朱君以卓異去楊君慮九仞之虧一簣而思始之終之請為文勒諸石告於後人無怠此志也夫人不知學則人倫不明而悖亂之事作苗夷新附之地尤當誘之以詩書使其勉强禮義而不敢為非故學之制不可不新平逺自服屬中土而絃誦彬彬人皆慕文學聖天子風化之盛教思之遐超越千古使者生逢其盛奉命來兹兢兢思盡厥職於魯頌泮水之義濟濟多士克廣德心者鋪陳而揚厲之尚冀平逺之士日從於學而敦善行不怠覘其俗之益進乎醇也俾學正刻文於石以風示學者書安化縣言是堂記後張大受古之治民者教焉而已月吉讀法考行習射有賞罰以勸懲之自卿大夫以逮州長黨正族師皆然民有不帥教則移鄉左右移郊遂冀其變而為善蓋居上者所以待其民至誠惻怛委曲詳盡有父母之愛師保之嚴如此若夫五刑之用因教之窮非得已也後世以法令為吏考成箠楚所加有傷肌膚之戚而已至其僻在蠻荒帝閽萬里而遙嗜欲言語不同有司者孰肯勤懇引之詩書禮義之區漸摩陶冶俾成中華之儒雅也哉山陽丘君洪巖知貴州之安化縣其地荒陋官此者鬱鬱無所施君獨不然創立書堂進縣之秀士揖讓其間講經書論文藝以月課之拔其尤加以奬誘縣之士皆喜以學為務它州縣之士聞其風多有來者凡四年安化之民一變成俗君以憂歸至今登其堂人人思慕其德久而不忘也夫民之習有不同而性無不善觀安化所以戴其長知天下無不可教之俗無不可化之人庶有合於周禮設官行政教民之遺意乎堂名言是楊侍講凝齊先生既為之記乃書其後修畢節縣學記張廣泗黔為古南荒地漢唐以來僅事羈縻明始置郡縣然學校未廣我朝列聖相承聲教之所暨罔間逺近建學立師無異畿甸學者用明經登仕進往往與中州人士埓然後國家統御之廣至治之隆所以一道德同風俗者日新月盛逺軼前代也畢節處黔西陲舊為衛學後改衛設縣因為縣學自康熙三十一年邑令方君瑞合修葺之後嵗久傾圮雍正七年秋龍溪李子曜來令兹邑甫下車周視學宫圯壞且規制未備慨然以為己任捐數百金為倡鳩工庀材百役俱作首舉正殿兩廡作新之次改建大成門明倫堂又次開鑿泮池砌石泮水又次忠孝節義諸祠及齊舍廨宇無不增修其經畫之善視昔有加方李令之治畢也正值烏䝉蠢動王師雲集羽書旁午兼以鼓鑄初興爐鞲鎔冶庶務紛紜猶汲汲以學校為事可謂識當務之急矣在易之蠱先甲三日後甲三日傳曰終則有始天行也蓋興廢相仍乃事物自然之理茍不更新以飭乎始丁寧以備乎終則已廢者不可復興而已興者且將速廢李令於兹學竭志畢力易故為新俾學校之化及於遐方者已墜復興朝廷之澤無逺弗屆非大易君子振民育德之義歟蓋民性之善無間於中國遐荒惟涵濡漸摩之使阻深暗昧咸曜於光明則朝廷之教化師儒之講習端有賴焉學校者所以為敬敷五教之地也然非平素尊道敬學不鄙於其民之君子則不能以有為今聞李令司鐸武平時嘗捐二百餘金創造櫺星門補完歷宋以來未有之制其攝威寧别駕又捐俸百五十金修治本府學宫今履任畢邑復孜孜以興賢育才建學明倫為急其規模逺舉豈尋常俗吏之所能為者乎宜以其事昭示來兹俾後之人有所視效焉因為之記大風洞記潘淳由清平而北十餘里距大道數百步有山焉與諸山接而狀如蹲虎山之西有洞洞口埀藤掛蘚蒼翠蒙翳若從未經人出入者清泉一道涓涓流出掬之寒沁肌骨雖酷暑不能堪洞中時殷殷作雷聲少頃怒濤岔湧已則奔屋撼木勢不减海中颶土人曰洞中大風出矣故名大風洞云邑人髙一廬物外士也每與朋好三四人挈壺觴坐洞口緑莎茵臨流嘯歌劇飲竟夕一日謂其儕輩是洞深邃不知所底吾等生長於是而不能一探其奇得不令禽向笑人乎且吾與若皆有濟勝具何甘讓客兒也皆曰諾於是裹餱束火而入初甚平曠約里許瘦石森立如竒鬼上視鐘乳纍纍如瓔珞下垂徑忽仄僅通人冷風颼颼自石罅射人毛髮俱竪蜿蜒而行髙髙下下不知凡幾里乍聞鐘磬響答引火四照頗寥濶頭上岩光如鏡與火相耀數十步外有數炬熌熌奪目相與驚悸不測何物注目久之始見一潭廣數畝火光映水澄徹晶瑩適所聞鐘磬聲則岩間乳滴潭中也地既坦夷易行所見多盤龍騫鳳蹲獸之屬皆石乳凝結巧奪鬼工竒勝引人欣然忘其疲役有蝙蝠二大於扇聞人聲驚撲下上盤舞炬光中一人謂一廬曰我輩來不知幾時行不知幾里而洞之曲折逶迤正未有窮盡盍歸乎前行引炬者忽失聲曰洞盡矣衆共視之石壁陡絶壁間一石穴穴尚容人匐匍一廬縮身入其中髣佛見天光餘人亦魚貫入穴漸大日漸明行未數步豁然雲開修竹茂林儼然在望炊烟縷縷上穿屋脊雞犬之聲依稀到耳俯瞰則大江千尺洶洶洞口外四面巉岩鮮藤蘿可捫凝矚竚望寂無往來人相顧恍惚不知為何處也發火燃炬回穴中扶向路出所見與去時同異各半方一廬入洞時日亭午出則次日二鼓矣一廬偕諸人緣山尋數十里內所謂大江一𣲖隔岸人家者杳不可得貴陽府學記晏斯盛天子重道崇儒師尊先聖雍正三年念聖德髙逺積纍肇基宜隆所自追王夫子五世定釋奠禮示中外無逺弗屆貴州舊學崇聖祠居文廟左偏而明倫堂踞大成殿後四配十哲兩廡先賢先儒名位多參差失次七年少保雲貴廣西總督鄂公巡黔謁夫子廟肅然不寧謂非所以追崇報稱巡撫都御史張公尤大懼循舊習故宫墻暗汶文教未光至道罕格集司道議新之同心協慮卜日鳩工改明倫堂左方以大成殿後建崇聖王祠前殿四配十哲兩廡以及宫墻門宇俱完葺加新而釋奠樂舞之儀籩豆之數悉按㑹典正定凡學博之署齊宿之舍講貫之所皆備巍乎煥乎有嚴有翼祭菜致敬鼓篋遜業圜橋聽觀氣孚志協督學使斯盛有事於文廟禮畢進弟子員而告之曰聖人之道考於經可覩矣漢世學者六經各有師承單辭隻字一禀所受歷終身研辨不肯易為繁引博稽以申其說其為志篤而用力勤其守之一而流之也逺専門相髙名家相尚蓋自髙祖太牢之祀興而儒術日貴藏書日出西漢文景孝武東漢光武明章之際郁郁乎文則古稱先敦行醇茂成為風俗延及蜀漢未有衰止四百餘年間䇿究天人者首冠乎西京才裕王佐者盡瘁於末造王侯以樂善保世卿相以稽古寧家二千石守令循良茂異所在著聞草茅之士姱修懿範直方𢎞毅者時時輩出其視奏晉士人譎詐刻深之風放誕清虛之習果何如也唐世稽修其業因文見道者亦振起乎其間而宋儒蔚興遂得藉是以窺性命之源知孔顔之樂大學中庸得特立論孟及學庸有集注易書詩春秋禮各有指歸雖盡掃前人拘攣而未嘗不因其說而參定之也記曰祭川者先河而後海詎不信乎於呼聖人之經具在雖篇次句讀或小有異同而大義微言簡易明白所謂權衡誠懸不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圎者不本之訊而輕於疑古得毋過宫墻而赧悚而無以副國家尊經重道之實哉黔本漢牂柯郡屬當時郡人尹氏珍自以生於荒裔不達禮義乃從汝南許慎應奉受經書圗緯學成還鄉里教授西南由是知學孝桓時尹氏以經術選用歷尚書丞郎荆州刺史而應奉為司隸校尉師生並顯近世如陳氏五栗馬氏心菴沉潛理奧陶然於棲雲芳杜間至如清平孫文恭思南李少參篤學超詣契合遺經施於政事為世所仰賴夫以荒陋之中卓然崛起如彼耽道協心而後先相望又如此豈非志之不可域而聖人之道本一哉書曰厥考作室厥子乃弗肯堂矧肯構厥父菑厥子乃弗肯播矧肯穫則夫作之勤述之光繩前武而恢其業後之人實有重望今風氣日開譽髦俊造駸駸乎與中土埒而遭逢聖明文教覃敷遐邇學校日隆又復頒賜經書刋布肄習規矩方圎有物有則循階級而望堂奧誕登尤易所造必深性功德業與為扶世而翊運者當追比四代又不僅如兩漢及前世之士已也畢節縣龍神堂記靖道謨畢節縣城響水河之左有潭焉世傳有靈物居之號為龍潭明隆慶二年六七月不雨按察使孫公仲野因公事至畢竭誠往禱大雨如注遂建堂以祀顔曰龍神堂黔之氣候號曰漏天潦多而旱少即有旱禱或未必應於是向時之堂遂為頺垣斷瓦荒凉於榛莽荆棘之間亦其勢然也閩中李侯以雍正十年來令畢節三年政通人和年榖順成百廢俱舉當事薦其賢擢遵義别駕大計羣吏又以卓異書上考今夏六月不雨農田龜坼禾苗且就槁侯率其屬禱雨於龍潭俄而雲氣靉靆雨澤滂沱四野霑足侯因訪舊蹟復新龍神之堂屬豫為文記之豫考祭法凡山林川谷丘陵能出雲為風雨見怪物皆曰神有天下者祭百神諸侯在其地則祭之今之邑令古侯伯之任龍神能福吾民建堂以祀之禮也顧龍之神不能自神也有神之者也蓋天之愛民也甚矣天生民而立之君承以大夫師長不惟逸豫惟以亂民一邑之宰百里之封數萬家之命於是焉繫平日能拊循其民以感格天心一旦有水旱疾癘之災呼籲於天天必鑒之神奉天以從事於是乎恪恭震動而不敢虛其請茍無愛民之誠心則急而求之神必不應非神不靈也天不與也不然斯堂之成埀百七十年倘有禱而隨效相與繼續而維新之者久矣寧待今日哉李侯以父母斯民之道設誠於內而致行之始旱致禱而天即賜之雨是雨為李侯降也乃侯不自以為功歸功於龍之神建堂以祀之古君子敬恭神明之義自當如是豫特為推其致雨之由以告世之為民牧者使相勉於立政寧人以為昭格上天之本而無僥幸於倉卒之間謂可呼籲而立應也李侯名曜閩之海澄人廉潔正直今之賢令尹也豫重其請遂不以不文辭而為之記貴州通志卷四十
