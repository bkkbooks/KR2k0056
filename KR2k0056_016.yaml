body:
  text: 貴州通志卷十六秩官志序官制名宦職官土司元深冠裳圖於王會龍番朝見不在前廷豈非以其荒逺僻陋不受命於王朝故嚴舌人門外之位歟元置順元路宣慰兼用流官明設貴州布政司漸治以中土之法我國家裁衛所置州縣闢新疆定營制揆文奮武各舉其職向之土司存其名號而已無尺寸之柄跋扈倔强者誅殛放流俯首聽命則建官惟賢制度之詳卓越前代矣自漢以還宦轍所至或建節裔土或捧檄蠻方代有其人雖載籍放失而博採旁搜庶幾循名責實矧功德在人尤有難以泯沒者乎至土司之厯世相承逺者千年近者亦數百嵗為著其世系别其沿革使後來者考之於以見聖朝德化涵濡無逺弗届云述秩官志秩官官制文武分編元以前未設郡縣多係土官明制附注備考國朝文職總督一員明初值地方有警特命專征事定還朝無常職嘉靖三十一年從御史宿應麟請設湖川貴總督駐沅州四十二年裁萬厯二十七年因播州叛復設駐四川三十二年裁天啓三年水西叛設川湖雲貴廣西五省總督駐貴陽元國朝順治十六年設雲貴總督兩省分駐康熙年改設貴州總督四年仍設雲貴總督駐貴州二十一年移駐雲南雍正七年因清理苗疆加雲貴廣西三省總督雍正十二年苗疆事竣仍為雲貴總督乾隆元年因新疆苗叛事平設貴州總督兼攝巡撫巡撫一員明正統四年始設巡撫成化八年裁十一年復設正德二年裁五年復設至嘉靖四十二年裁湖川貴總督始加貴州巡撫提督軍務兼制湖北川東地方萬厯二十九年平播後又加兼制湖南川南二國朝順治十八年停提督軍務裁撫標兵康熙年設巡撫護衛馬兵五十名二十年平吳三桂後復提督軍務兼理湖北川東地方駐省城明設巡按貴州監察御史一員裁提督學政一員明自洪熙元年令貴州就試湖廣嘉靖中始以按察司副使僉事為提學道廣國朝初仍明制康熙四十一年裁設提督貴州西兩省學政四十五年始專設今職駐省城巡試各屬布政使司布政使一員明布政司設有參政二員一分守安平督糧道駐省城一分守貴寧道駐烏撒參議二員一分守新鎮道駐平越一分守思仁道駐思南國朝康熙六年裁止留督糧道又舊有都事一員理問所理問一員俱裁經歷司經厯一員照磨所照磨一員豐濟庫大使一員按察使司按察使一員明按察司設有副使四員一分巡思石兵備道駐銅仁普國朝康熙二年裁一分巡安平威清兵備道駐定一分巡貴寧兵備道駐畢節一分巡新鎮都清兵備道駐都勻六年俱裁僉事二員一清軍兼理驛𫝊道康熙二年裁一提督通省提學道四十一年裁又舊有知事一員經厯司經厯一員先後奉裁照磨所照磨一員司獄司司獄一員清軍糧驛道一員明成化十六年設布政司管糧右參政又設督糧參議萬厯八年裁督糧參議歸併右參政後為分守安平督糧道國朝康熙二年裁清軍驛𫝊道歸併督糧道二十六年設題糧驛道兼理貴東道雍正八年另貴東道定今職駐省城分巡貴東道一員年國朝雍正八設駐鎮逺分巡貴西道一員明為分守貴寧道駐烏撒設國朝康熙六年裁十一年復平大黔威守道二十八年改分巡貴西道駐大定尋移駐安順古州兵備道一員年國朝乾隆二設駐古州貴陽府知府一員同知一員初分駐永赤雍正二年加理苗銜五年移駐長寨通判一員初分駐畢烏康熙六年改駐安順府南籠至三十四年復添設本府通判經厯一員司獄一員儒學教授一員訓導一員康熙三年裁各學訓導每府衛止設教授四十三年復設貴陽安順平越都勻鎮逺思州思南石阡銅仁黎平威寧十一府訓導豐濟倉大使一員隂陽學正術一員醫學正科一員僧綱司都綱一員道紀司都紀一員明設推官一員裁又有稅課司大使一員皇華驛驛丞一員俱裁貴筑縣知縣一員典史一員儒學教諭一員康熙三年各縣學止設訓導四十三年添設貴筑龍里貴定修文普安安南安平清鎮甕安湄潭清平施秉印江婺川畢節永寧餘慶一十七學教諭訓導一員定番州知州一員州判一員分駐大塘年國朝乾隆四設吏目一員儒學學正一員訓導一員康熙三年各州學止設學正四十三年添設定番廣順開州普安鎮寧黃平黔西平逺大定九州及平溪清浪二衛學訓導廣順州知州一員吏目一員儒學學正一員訓導一員開州知州一員吏目一員儒學學正一員訓導一員龍里縣知縣一員典史一員儒學教諭一員訓導一員貴定縣知縣一員典史一員儒學教諭一員訓導一員修文縣知縣一員典史一員儒學教諭一員訓導一員安順府知府一員同知一員添國朝雍正九年設分駐郎岱通判一員原駐南籠雍正五年南籠改府裁九年復設分駐歸化營經厯一員雍正五年分駐舊安順州儒學教授一員訓導一員毛口驛驛丞一員係平越府黃絲驛驛丞於雍正九年移駐明設推官一員裁普定縣知縣一員典史一員儒學教諭一員初無教諭康熙四十四年同平越都勻鎮逺安化龍泉銅仁永從七縣學添設訓導一員鎮寧州知州一員吏目一員儒學學正一員訓導一員永寧州知州一員吏目一員儒學學正一員訓導一員初無訓導康熙四十四年同麻哈獨山二州學添設坡貢驛驛丞一員十國朝雍正二年設安平縣知縣一員典史一員儒學教諭一員訓導一員清鎮縣知縣一員典史一員儒學教諭一員訓導一員平越府知府一員經厯一員儒學教授一員訓導一員明設同知一員推官一員平越倉大使一員裁平越縣知縣一員典史一員儒學教諭一員訓導一員楊老驛驛丞一員黃平州知州一員州同一員年國朝雍正十二設分駐舊州吏目一員儒學學正一員訓導一員重安江驛驛丞一員甕安縣知縣一員典史一員儒學教諭一員訓導一員餘慶縣知縣一員典史一員