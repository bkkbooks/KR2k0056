body:
  text: 貴州通志卷二十四武備師旅考國朝順治四年春正月流寇孫可望等陷遵義明末流寇猖獗張獻忠據蜀僭號以延安人孫可望為軍師已而疑之乃改為平東將軍而以李定國為安西將軍劉文秀為撫南將軍艾能奇為定北將軍隂制之獻忠戮蜀人幾盡次及其兵將可望等懼值肅王至保寧獻忠中流矢死遂率衆奔貴州破遵義入據貴陽城官民避去賊四路搜捕箐洞殺掠無算平威龍新之間千里蕭然無雞犬聲二月攻定番州城屠之按察使張耀參議曽益都勻知府陳瑞同士民死守盡遇害三月我大清兵西征至遵義可望聞風屠貴陽城遁去留偽總兵柏永馥巡道董顯忠守之旋大軍引還保寧可望遂圍鎮寧州參議武右文率衆據守城破被屠並屠安南普安等城遂入滇故明總兵羅聨芳與前撫范礦復據貴陽城時黔省未頒正朔苖蠻蠢動諸擅兵相攻者蹂躪地方無有寧日四月苗賊藍二糾衆反攻陷甕安黃平復圍平越府故明總兵張才擊走之旋就擒戮於市十月綦江人王祥率兵數萬據遵義五年七月王祥與皮熊即羅聨芳搆兵相攻圍貴陽城八月平茶司人楊光謙等敗王祥兵貴陽圍解十月皮熊遣兵攻王祥次烏江為祥所敗全軍覆沒十二月皮熊及王祥平六年正月故明總兵張先壁擁兵由楚入黔至偏橋皮熊遣楊光謙敗之八月孫可望與皮熊等以通好為詞遣其前鋒白文選取安順府攻青崖白納燕樓等箐硐破之旋撤去先是明桂王子由榔自立於肇慶稱號永厯至是封皮熊匡國公王祥忠國公使守貴州七年四月白文選襲貴陽入之李定國至自滇與皮熊范礦等盟而去八月孫可望由雲南襲據貴陽皮熊走清浪追執之奪其兵又攻遵義王祥兵敗自刎死十四年八月孫可望降可望自據貴陽八年遣雲南僉事楊畏知謁由榔請封為秦王設行宮官屬及府州縣衛所等官遣營官臨田徵租以十之三給民九年可望迎由榔於桂林置之安籠所改曰安籠府相待無人臣禮偽知府范應旭至書其支糧簿籍皇帝一名后妃數口月支糧若干十年由榔聞李定國與可望有隙使內監張福祿全為國諭定國以兵來迎馬吉祥私告可望十一年春可望使鄭國王愛至安籠殺福祿為國與張鐫等十八人十二年可望遣兵犯常德敗歸十三年李定國敗於新會將由安籠走滇可望偵知之促由榔移黔由榔故遲行定國至遂奉由榔由安南衛走雲南至是可望率兵向雲南與定國戰於交水會白文選馬進忠內變大敗還劉文秀率兵追至貴陽可望遂走長沙來降十五年二月宗室寧南靖寇大將軍都統羅託經略洪承疇率師取貴州三月至沅州賊遁四月入貴陽五月都統侯李復遵義八月李定國遣兵寇城下擊却之又遣兵襲青崖城敗去九月安逺靖寇大將軍信郡王鐸尼率師至黔次偏橋時巡撫趙廷臣亦至即於行營受印視事十月會師取雲南三路並進十一月信郡王發自貴陽李定國扼雞公背圖侵貴州遣别賊將守七星關抵生界立營窺遵義以牽蜀師十二月王師出遵義由水西取烏撒賊將棄七星關走霑益王師入安籠連敗李定國於安籠之羅炎涼水井撒寨定國遁歸雲南十六年三月宗室寧南靖寇大將軍羅託班師旋京閏三月偽總兵官馮天裕等聚衆攻陷湄潭劫掠平越思南等處總兵官胡茂正李本深等會川兵剿平之夏四月偽將軍楊光謙降安置貴陽施秉縣苖亂殺知縣趙玉奇十七年正月安逺靖寇大將軍信郡王鐸尼班師還京四月馬乃營土目龍吉兆等反雲貴既平各土司俱奉貢賦遵約束有普安州所屬馬乃營土目龍吉兆者與安南衛屯軍王回子田界相連互相侵奪積為仇讐吉兆因收養亡命私造軍器姦民文元胡世昌況榮還黑把事謝把事毛把事等俱黨附之遙結李定國為聲援糾合鼠場營龍吉佐樓下營龍吉祥軟血盟掠廣西泗城州之土寨安南衛之阿計屯水橋麻衣沖下三阿白屯等處所過劫戮民人竄逃總督趙廷臣巡撫卞三元再四招諭負固不服乃合疏請討之六月偽寧國侯王友進降黎平曹滴司土官楊華如招納亡命陳洪金等謀亂黎靖兵討平之九月擒叛賊呂洪等誅之洪順天人自海賊鄭成功處轉入黔省竄伏水西隴革地方招逆黨權時泰賀鼎等自稱興國公謀取貴陽為水西宣慰安坤發其姦擒洪斃於獄餘黨伏誅十一月總督趙廷臣進討馬乃十九日破果母寨殺賊數千擒吉兆子吉佐妻殱逆黨文元胡世昌於陳遂乘勝破咔呷寨吉兆閉寨拒守官兵圍之十八年二月總督趙廷臣令官兵人持一炬縱火焚其寨破之龍吉兆及逆黨況榮還等皆伏誅馬乃平三月分駐大兵纛章京杜爾德等班師還京九月逆賊劉鼎叛圍定番州提督李本深擊走之康熙元年八月黎平歸弓寨苖亂提督李本深討平之二年正月丹平土官莫之亷以隱匿劉鼎伏誅金築土官王應兆與劉鼎通總督楊茂勳討平之鼎敗逃水西七月被獲伏誅十二月廣西夷阿仲反僭稱永龍元年盤據廣西隴納山出犯晉坪安籠等處安順總兵官張鵬程討平之三年正月逆賊常金印等謀反伏誅金印上元人自稱常遇春之後從粵走黔與水西安坤皮熊等同謀反金印稱蕩虜大將軍湘平伯偽造印敕旗纛聚黨陳鳯麟高岑吉士英米應貴等煽誘諸土司為亂為同黨陳大出首俱就擒二月水西宣慰司安坤叛上命總官吳三桂督雲貴各鎮兵分東西兩路討之三月朔三桂統雲南十鎮兵由畢節七星關入果勇令總兵劉之復駐兵大方遏其衝逸令提督李本深統貴州四鎮兵由大方之六歸河會剿而屯糧於三岔河首尾夾攻布置既定而檄黔省兵書誤書六歸為陸廣於是本深兵及黔蜀二省所運之糧盡屯陸廣三路氣息隔絶不相通三桂受困兩月食將絶外援不至永順總兵劉安邦戰死受圍益迫適水西土目安如鼎遣人偵黔營虛實為本深所獲始知三桂被圍已久乃使為引導整兵入援副將白世彥手斬驍賊以罵於陳賊遂敗走總兵李如碧亦率精兵入重圍運糧接濟兵始合為一敗賊阿作洞復敗之得初洞九月又敗之紅崖洞坤率其妻祿氏逃於木弄箐復逃至烏蒙烏蒙不納坤遣漢把曽經賫印投降不許生擒坤於大方之杓箐並擒賊黨皮熊安重聖等熊不食十五日而死坤與重聖俱伏誅四年十二月郎岱土司隴安藩反命吳三桂發兵討之藩乃安坤親黨坤滅後招納坤餘蘖隴勝等及安重聖妻隴氏殺安順府經歷袁績攻破關嶺直犯永寧隴勝等亦攻犯大定威寧殺畢節衛經歷秦文五年五月平逺兵變尋撫定之六月隴安藩等伏誅郎岱平十二月湖廣通道縣苖吳老潘僭稱王號煽惑黎平府屬黑洞口等處各苖造亂尋討平之烏撒隴氏叛伏誅八年正月黎平田心等寨苖亂鎮逺副將石玉貴等合兵討平之十一月定番苖阿戎等亂尋討平之九年六月鎮逺府屬那磨等三十六寨逆苖降十年春正月扯處烏夷目俄凹阿蠟等降十一年春正月凱里苖亂尋撫定之十二年春二月廣順州苖變殺吏目蔣士璘都勻苗亂殺夭壩司長官夭應祿冬十二月吳三桂反於雲南提督李本深以貴州應賊總督甘文焜死之二十八日吳三桂陷貴陽十七年七月吳三桂死於衡州十九年十一月大兵復貴州先是逆黨郭壯圖因三桂死擁其孫世璠屯貴州以拒大兵及是定逺平寇大將軍固山貝子章泰統征南將軍穆占各旗正副都統喇賽薩克查巴圖魯釋伽保陜納海莽吉祿陶代宜思孝官保內閣學士薩海總督盧崇峻蔡育榮董衛國將軍林興珠提督趙賴周卜世等滿漢官兵由湖廣克辰龍關取鎮逺清平破偽將軍韓天福於平越世璠遁回雲南二十年正月大兵克盤江吳世璠遣偽將軍線緎屯兵江西坡扼險以待大將軍章泰大敗之賊兵分據黃草壩征南大將軍賴塔統各旗正副都統勒貝希福馬齊趙連額黑里花色紅實録祖植椿總督金光祖將軍馬九玉滿漢官兵由泗城州奪石門坎拔安籠所繞出賊後大破之二十一年三月定逺大將軍章泰征南大將軍賴塔及正副都統穆占希福莽吉祿喇賽孫他劉顯忠等先後奏凱詔移逆屬家口及偽將軍總兵副將等進京參遊以下俱發河南江西山東湖廣四省安置民間起夫運送自二十一年起至二十七年始止二十四年七月黎平賊何新瑞反新瑞本李姓初在靖州為僧後至平茶所犯罪逃至新化乃冒姓何稱故明總督何騰蛟子煽惑苖民作亂黎平官兵擊敗之十月夷目王騰龍王成龍謀叛擒斬之二十五年二月何新瑞伏誅徙土司韋有能等以其地入永從縣三十年十二月黎平府高洞苖金倒大倉晚挂補哄等劫殺行旅知府張瀲遣吏目劉浡往緝之副將侯奇遣兵同往苖以為剿已也遂殺浡及官兵二十餘人合十數寨俱反三十一年二月巡撫衛既齊遣官諭撫不從因會題請剿官兵至首惡就擒古州車寨等處亦次第就撫既齊劾張瀲侯竒激變之罪命吏部尚書庫勒納內閣學士溫保會同雲貴總督范承勳勘問晚挂補哄等伏誅侯竒張瀲並論斬三十八年都勻白苖甲多等寨作亂參將張應金剿平之四十年十月黃平革夷苖奴計羅尤等拒捕傷凱里都司胡安國殺土官何瓚逺巡撫王燕遣兵剿之奴計等伏誅四十二年十月銅仁鎮筸紅苖亂提督李芳述討平之四十三年冬黎平苗黃明謀叛尋擒獲伏誅四十六年八月普安州三江㺜苖不法安籠鎮總兵李得勝督兵剿平之普安苖明初設土司羈縻之𢎞治時夷婦米魯叛經年始平至是有三江㺜苖黃柱漢殺菴章寨黃國一家七人又仇殺紅車凹洞阿里虜其人畜總督貝和諾委官擒治抗拒不出因與撫臣合疏請剿仍令安順府知府許天馥副將李雄招諭之止下江苖寨奉命餘皆負固得勝率參將王應龍遊擊洪容魯岱分兵布上中下三江調雲南副將高文成平逺副將駱儼廣西守備劉鳯鳴李霖等為犄角十一月四日李雄兵抵隴戞苖以數千人據險誘我兵進擊而伏賊數百於四坡把總林鳯翔奮擊伏賊皆披靡奪中江要隘駱儼由叢箐進取法崖寨其寨高十五里懸崖陡絶甫上半坡苖數百鏢弩迎敵我兵擊却之遂破其寨高文成亦率兵由乃革渡河直搗這都這那復分路夾攻挖者勒洛籠空崖諸寨苖俱竄上獨石􅋭其􅋭千尋絶險叢箐無路難以仰攻乃絶其水道數日賊窮蹙始將渠凶抱應抱省等縛獻軍前自是不敢復出侵犯五十年三月蔡江洞苖老吳大田等作亂先是提督王文雄題改黎平頂洞汛移駐蔡江名為西山營洞苖忿占其地乃自毁房屋以示不服至是因催辦木料騷擾苖寨老吳等遂殺兵役圍其營鎮逺遊擊王國印救却之繼遣千總馬似龍諭降誘擒首惡伏誅西山營守備官亦坐革職裁其營五十四年四川烏蒙土府祿鼎乾與貴州威寧屬土目祿世華因爭稻田壩之地劫虜世華人民牲畜川撫委員往勘鼎乾負固不出川撫年羮堯欲剿之黔撫劉蔭樞持不可乃遣都統阿爾納副都統昊坤侍郎噶敏圖會同雲貴川三省督撫於畢節縣勘審鼎乾懼請釋仇和解歸所掠人畜及侵地雍正二年冬討定廣仲苖平之黔苖種類仲家最為凶頑在定番廣順間者尤甚明時旋剿旋叛後用雕剿法稍知畏戢仍時出劫掠漢夷男女售與漢姦轉販他省以獲重利居民苦之有阿近者勾結羣苖據散幹山寨自稱為苖王總督高其倬會同撫臣毛文銓提臣趙坤調兵往剿擒獲阿近暨其弟阿卧斬之四年四月討長寨仲苖平之廣順州長寨地方內接安順府屬之十三枝普定縣屬之五枝外通粵西獞獠實為盜藪阿近阿卧誅後總督高其倬遂請於散幹西孟等處添設營汛控其險要會其倬調任去總督鄂爾泰繼至敕修建營房而餘黨阿搗阿撈等聚衆抗阻旋建旋焚爾泰遣定廣副將劉業浚進剿怯不敢前乃以都勻參將劉朝貴代之朝貴至令遊擊官祿攻谷隆關卜萬年攻者貢等寨破其巢穴擒獲甚衆餘黨畏懼獻首惡阿搗阿撈併漢姦李奇等俱伏誅遂定兵制設長寨營併移貴陽府同知分駐其地五年三月剿謬沖苖平之黎平府屬有花苖一種介黔楚之交喜鬬好殺獷悍難馴而謬沖寨三面削壁路通一線諸苖恃此為險不務耕業專以劫掠為生至是總督鄂爾泰提督楊天縱會湖廣總督邁柱遣兵進剿斃其渠魁陸太還餘皆奔潰黎平府知府張廣泗鎮逺遊擊韓勳率知縣孫紹武守備左垣等鼓勇先登衆隨猿攀而上直破其寨擒斬無算有芋河溪寨者素與謬沖為聲援乘勢並剪滅之其黨歸歐鬼壘九厥交椅几馬等寨皆聞風震懾詣行營繳器械願納糧賦乃視地之逺近分隸黔粵兩省七月總督鄂爾泰請改廣西泗城土府歸流分其地設永豐州隸貴州廣西泗城土府延袤二千餘里其地北與黔省普安南籠永寧定番相錯夷㺜雜處仇殺時聞兼以山高地險姦民犯法者藉為淵藪爾泰洞悉其害適泗城之者相與普安之者坎互爭地界黔粵俱委官會勘泗城土知府岑應宸帶土兵三千餘人亦至者相爾泰疏列其罪革其世職改土歸流安置應宸於浙江以紅水一江天限黔粵乃割江以北地泗城之長壩桑郎羅斛等十六甲並西隆州之羅煩册亨等四甲半零二十一寨歸貴州南北約三百里東西約七百里請建永豐州於長壩設知州焉八月總督鄂爾泰委黎平知府張廣泗會同副將李登科往古州相機招撫生苖六年三月廣西西隆州八達寨土目顔光色等不法安籠鎮官兵協剿平之十月巡撫張廣泗討八寨生苖平之八寨為都勻要隘丹江清江古州之咽喉窟穴其中者為黑苖往者半隸夭壩土司自將土司戕害後雖改屬都勻府而流土俱不受制與化外無殊楊排楊堯乜告楊烏四大寨恃強恣肆附近諸小寨皆為役使又番仰番扛擺卓等十餘寨與丹江諸生苖勾結剽掠其地既為苖疆之肯綮其苖又屬梗化之渠魁欲靖苗疆宜從八寨始正月總督鄂爾泰謂生苖不亟加懲治匪獨為苖害且大為民害既審地勢察苖情詳悉具奏荷蒙聖鑒指示周詳調貴州按察使張廣泗赴滇授以剿撫機宜五月十六日廣泗由貴陽率兵赴都勻六月初九日同都勻營參將趙文英等營於八寨隘口仰體皇仁不遽加兵張示開導冀其悔悟有代理代省九門長塘等四十餘寨詣營就撫而楊排楊堯等寨拒抗如故且脅數寨為援然苖素未經大敵不過凌轢單弱十二日文英督兵攻擊交鋒未逾時即奔竄次日有被脅之牌牙壩固等賊及大肚小肚等十餘寨咸相率投誠時獨山汛漢土官兵自普􅋭奉調赴八寨途經交歸羊甲等寨曽與楊排楊堯糾結不知二寨敗猶競出堵截官兵鼓勇連破六寨於是附近交歸之甲些等十餘寨皆來降十七日移營斗魁斗魁者八寨適中扼要地也當是時軍威初震數十里內之山洞生苖紛紛歸附惟番仰番扛拒命十八日廣泗密飭撫標守備張瑢麻哈州知州孫葵將兵分攻趙文英據要䇿應苖亦分路拒敵官兵奮擊擒斬追焚巢穴於是番仰番扛暨楊排楊堯等寨諸賊皆逃匿亦有畏威乞撫者七月廣泗移兵開丹江總督飭以兵雖屢勝而地險苖衆未可玩視緩急進退務籌萬全廣泗乃於二十四日率兵下丹江賊千餘阻去路擊走之二十六日抵梧桐隘口賊瀰漫山谷擊之則四竄林莽少頃復聚是時都司羅資衮奉調由凱里進丹江亦為苖所阻乃改途由囊孟走烏疊鏖戰九日始達廣泗營適總督密飭至以丹江逆苖雖屢經挫衄而毫不畏縮倘勾結八寨以襲我後則糧運必不繼戒勿輕進於是廣泗等移營甕城以其地扼八寨之吭而拊丹江之背也而八寨已附之苖果為丹江苗煽誘復叛廣泗請益兵八月總督調左營守備徐希達把總楊漢飛提標遊擊田昌友貴陽遊擊史應貴守備任龍等各領兵赴軍前而統以定廣協副將蘇大有又造靖蠻大炮送行營飭廣泗等以羣苗負險狡詐莫測天時可乘地利宜審近功速效亦非逺圖凡事知難斯易視易轉難務須慎重是月廣泗奉命巡撫貴州總督復以機宜咨授謂八寨與丹江聲勢相倚而丹江在內八寨在外非大創八寨使其弭耳帖尾恐苖情反覆無常欲進丹江輒為所阻即不然而我兵已入丹江兩地逆苗更番擾我益滋掣肘廣泗乃於九月二十六日先進剿甲些烏歸等附賊之三十餘寨十月初四日詗得丹江苗賊來助逆伏兵待之初五日苗果蜂擁而至猝遇伏兵驚潰官兵追擊遂破附近乜告之大小八寨又乘勝焚首惡之楊排楊堯楊烏附惡之乜條楊列者良等數十寨是日蘇大有率兵分剿偵知前路有賊令官兵分左右潛伏少頃見苗數千來俟其過半截擊之苗首尾不能相顧把總高選等由左路逐殺燬擺楷乜略壤頂壩構四寨大有率守備傅又新等由石路逐至乜告關口手斬逆苖無算會文英兵亦至遂焚乜告三大寨各寨苖皆震讋數日內楊亭番仰黨找達石硐爽排戞等數十寨各刻木輸誠廣泗示諭除首惡不宥外餘許就撫八寨既平議進丹江留文英鎮守知縣魯朝聘招撫附近生苖其極逺之千家寨俱後先歸化隨建城設官隸都勻府十二月巡撫張廣泗討丹江生苗平之丹江與八寨密邇而清江古州諸地界亦牙交繡錯生苖聲氣相通盤踞其中者為桃繞等四十餘寨名大丹江右有烏疊等二十餘寨為藩籬名小丹江左有雞講等十餘寨切近九股凶惡尤甚又大小丹江所恃以濟惡之區也十月八寨既平總督鄂爾泰咨巡撫張廣泗於十一月十一日率兵進取丹江相度形勢烏耶為大小丹江要隘抱得亦大丹江出沒之區烏騷則延屬雞講乃調副將蘇大有由八寨九門歷枯桐寨直取小丹江令副將張禹謨由烏溜進攻抱得期會於大丹江並分兵屯烏騷山岡以牽制雞講廣泗率遊擊田昌友史應貴都司羅資衮等駐兵烏耶坡以扼要隘十二日大有自八寨出烏高抵枯桐兵威初張群苖紛紛竄匿官兵沿途搜剿十五日越枯桐抵石板寨苖數千阻扼大有以重兵伏叢薄而率輕兵誘擊之苖潰敗次日大有分兵四伏獨登相近烏疊之山岡覘賊虛實彌望深林灌莽閴若無人突聞四山震動賊擁如蜂伏兵起賊大敗隕首洞脅者纍纍填澗壑二十日趨小丹江賊於頭關土城密布銃炮以拒大有直逼城下奮勇先登手刃賊四十五人連破土城五座追至小丹江燬其巢穴移營駐烏疊寨由是大有為諸苗所深畏雖婦人小子聞其名無不咋舌是月十三日昌友等分兵奪烏耶左右山岡進劄頭關口禹謨亦奪烏溜寨進攻抱得焚三寨時烏耶關口苗四路來寇昌友連日攻擊旋敗旋聚相持未下以故禹謨雖破抱得懼賊襲其後不敢進廣泗聞之輕騎赴抱得營令羅資衮出左路守備梅先春出右路夾攻囊猛賊奔散火其寨囊猛者大丹江綰轂處也此寨既平可以直走大丹江乃令禹謨馳赴烏耶助昌友而自領其衆二十四日廣泗遂移營於小丹江賊糾衆數千乘官兵初至肆衝突參將王惟一領定番土兵擊敗之賊乃遁十二月初三日大有進攻大丹江黃茅嶺破之楊排等八寨刻木來降昌友應貴等分攻固猓計籠等六寨悉燬之初五日官兵分三路攻破桃繞於時諸苖震恐皆赴大營乞撫惟抵箇雞講等寨堅守不出而大小丹江之苖剿撫歸附者十已七八初十日廣泗令昌友應貴等率兵直趨抵箇又令安南營兵據其寨左之高嶺苖數千競出皆殊死鬬官兵併力夾擊大破之窮追至雞講山後次日禹謨兵亦至苖仍聚衆合戰官兵合擊之披靡奔潰棄刀鎗火銃攩牌諸器械山徑為之阻塞官兵焚雞講等五寨是時衆苖竄伏山箐無所得食相繼赴大營匍匐乞憐旬日之間次第就撫遂編其户口留兵鎮之明年丹江鬼師老楊老水等煽衆復叛襲大丹江營時總督坐鎮貴陽命參將官祿剿之不克復檄總兵哈元生將兵協剿賊敗遁尋獲老楊等梟示餘黨乃平乃建城設官亦隸都勻府七年六月巡撫張廣泗討清江叛苗平之清江亦黑苖境也以上下九股為門户丹江八寨為藩籬與施秉舊縣接壤明時結連播州楊應龍為寇肆焚掠因遷施秉縣治於偏橋以避之順治十六年殺縣令趙玉奇鎮逺黃平居民悉遭蹂躪厥後稍斂戢而時剽掠行旅以故清江上通重安以達都勻下通黔陽以會朗水舟楫往來雖較潕溪為便而估客帆檣不至焉春總督鄂爾泰駐貴陽以八寨丹江既平檄鎮逺知府方顯招撫九股次及清江又令副將張禹謨領官兵彈制之於是顯等親歷諸寨宣布皇威下九股諸寨不煩兵威相繼就撫上九股向恃雞講為援及雞講等寨既已芟夷亦相率就撫小江橫坡等處咸望風歸附顯等次第稽其村落户口而編管焉及抵清江柳羅柳受等寨爭先降附願為良民惟江外有公鵝苖與柳利雞擺尾雞呼黨白汗白索等十餘寨素相連結復有漢姦從而嗾之曰若歸漢官彼且重賦繁役以魚肉若不如結黨固守官兵設與相持則彼飢若飽彼勞若逸可以坐困即相攻併死力以禦亦可圖存於是探禹謨甫駐兵柳羅即渡江攻劫官兵勢甚猖獗總督聞警調各路兵從巡撫張廣泗進剿兼示機宜以公鵝等寨逼處清水江宜及時剿滅彼所恃以抗拒官兵者江深崖險耳急之則併力死守當緩以誘之俟其防虞稍疏潛師渡江上下夾擊一鼓成擒矣是時農務方急大兵既至柳羅賊詭言願受招撫為緩兵計廣泗佯許之傳諭行營曰安撫諸寨訖即撤大兵賊防守果懈五月十四日方顯邏知江邉有小舟白廣泗選健卒夜半奪之僅十餘隻柳受苗素恭順潛駕舟四十濟師師全濟廣泗乃分兵八百屬遊擊母椿齡斷苖右臂以絶外援又分兵五百屬守備徐希達伏林以截逋竄而自領大兵直搗其寨賊措手不及殺傷無算遂進據其寨苖用兵無他能惟以昏夜劫營為奇計次日廣泗䇿其必來薄暮令衆兵伏要隘而空大營以待二鼓苖果銜枚逼大營咆哮而入寂無所遇急反走不數武四面炮聲震地火光燭天官兵前後夾擊苖互相擠墮死者無算十六日董兜寨暨附逆之柳利雞擺尾諸大寨咸赴營受撫並縛漢姦曽文登以獻六月初五日公鵝諸逸賊窮蹙悔罪願受約束時廣泗有古州之役留大有方顯同駐清江經理諸務十一月初六日雞呼黨東庫白汗白索諸寨復聚衆劫營官軍偵知嚴兵待之抵夜賊萬餘分四路夾攻大有當先奮擊賊奔潰官兵分路追殺總督聞之復調大定協兵赴清江諭令殄盡根株而大有與顯等誘擒渠魁奬率將士戮力攘除賊乃塪要道闊丈餘參差樹大橛又掘阱覆茅葦於上以拒官軍二十二日大有令劉成龍章奇相韓生耀皮衮任龍分兵三路而身先士卒拔橛填阱以搗賊巢縱火燎其居賊大潰東庫夭臘黨泥白汗黨苖四山號泣皆稱為雞呼黨迫脅願擒凶首繳器械以就撫由是清江諸苖寨悉平以公鵝寨據清江形勝就其地建城設官隸鎮逺府九年七月古州上下江逆苖悉平古州地方遼闊形勢險峻苖種繁衍叛服靡常自漢迄宋羈縻而已元至正中設古州八萬軍民總管府明洪武間以外古州設潭溪龍里洪州八舟歐陽新化亮寨中林曹滴西山湖耳赤溪古州永從等十四司而裏古州棄之化外我朝定鼎後逆賊吳三桂偽將馬寶兵敗於楚取道古州以竄滇諸苖遮獲其大炮火銃盔甲而內地作姦犯科之徒教以施放之法並為購鐵增器械製火藥於是諸苖日事讐殺官司不能禁又往往窺伺內地劫奪捆虜六年總督鄂爾泰奏聞欽遵廟謨由凱里進兵先其近而易者於是八寨丹江清江等處以次平定巡撫張廣泗前守黎平時有謬沖之役於古州苖情地利頗得梗概七年二月總督自雲南來駐貴陽居中調度咨廣泗開古州六月十五日廣泗由清水江統兵至岑龍坡取道黎平府以進而古州羣苖勾結岑梗梅得二寨及附近山苗萬餘人拒命廣泗令黎平協副將趙文英遊擊周豹攻二寨破之隨令黎平知府張鉞平越營遊擊向之榮貴陽營遊擊史應貴各領漢土兵護糧芻進屯岑隴古州故分上中下三堡諸葛營在三堡之中是時諸苗叛形未露咸豫招撫值科場屆期廣泗將回貴陽監試乃命文英鉞等統兵駐古州之諸葛營以鎮撫之十二月都江上遊之來牛定旦叛文英請益兵禦之二寨地廣人衆性尤凶悍兼煽動革招革雄搖排搖晒擺調方勝等數十寨相與梗塞河道文英遣土舍林天錦吳和禧前往招撫和禧為所殺總督鄂爾泰摺奏謂都江一水在古州諸葛營之南由諸葛營而西為上江來自黔之都勻由諸葛營而東為下江直達廣西之柳慶沿江山硐諸苖多未歸附非用粵兵協𠞰難以開通乃調廣西慶逺協副將潘紹周永寧營參將施善元各統兵由沈口至古州以慶逺知府徐嘉賓監紀軍務會趙文英溯都江而上剿諸蠻疏通河道又飭都勻協副將卜萬年獨山州知州孫紹武領兵由三角􅋭直取來牛以距上遊又調桂林協副將董芳領兵由荔波縣三洞至平宇與文英等相聲援八年正月紹周善元先後抵諸葛營同文英於二十一日往攻定旦兼程而進直據定旦後山賊鳴鼓聚衆競放銃炮我師擊敗之奪其大炮銅鼓鐵甲燬其巢定旦既平來牛諸苖皆竄入林谷自都江至平宇沿河四十餘寨無不危懼羊邦羊翁十餘寨去定旦甚逺亦來歸附惟八飛隴寨雖附近行營兩岸陽順隂違狡黠特甚督撫檄催萬年董芳紹武守備馬允升合兵進剿二月十四日萬年等抵隴寨前山賊蜂屯兩岸狂呼大噪直犯大營萬年等以官兵為正土兵為奇張五路以分賊勢自寅至未炮斃數十人賊始退保隴寨萬年等督兵進攻奪賊船以渡直逼寨門銃炮齊發苖不能支從後山遁遂破其寨二十一日移師進八飛賊伏莽以伺官兵追逐斬首數級餘皆鼠竄於是布養豐柳擺勞等寨咸願納糧應役而來牛搖排搖晒革招革雄諸寨餘孽散而復聚猶截河道以拒官兵且期於是月二十五日併力攻大營萬年等偵知之預令千總楊剛等以兵七百伏來牛南岸上流張唯等以兵七百伏南岸下流誡之曰聞炮而動翌日辰刻賊果蟻聚北岸喊聲震山谷萬年率守備殷起龍馬允升由南岸迤邐前進日午苖見官兵無後應遂渡河衝突俄而炮聲動地官兵三路齊發賊倉皇不知所為俘斬與溺死者不可數計遂移營平定山議剿革招老你等寨而文英善元亦自定旦來會次日萬年等領兵二千餘分道並進山高箐險革招苖營窟其中不虞大軍遽至及我軍攀藤披棘齊逼寨門苖乃大驚空寨逃匿官兵分道搜剿焚其巢附近之俾爽柳疊平甲排告諸寨咸刻木乞降三月初七日攻老你寨破之搖排搖晒諸苖懼相率詣營門乞撫怎冷有厄撇高等十數寨亦聞風歸順二十一日師集來牛凡要害處分兵彈壓萬年紹武防來牛遊擊周豹防定旦守備高本陽防寨北守備張鳯翥防八開遊擊徐希達防都江而文英紹周等率所部兵於五月初七日回古州議建城於諸葛營是時古州之上中下三堡雖已就撫而心懷觀望以為大師必撤彼仍得以自恣及聞於諸葛營建城下堡之車寨苖最險譎距大營僅隔一河中堡之口月寨頭藏弩數寨素稱凶悍為山苖渠魁遂相與勾結倡亂龍早則殺通事黃永吉寨頭則殺民人姚𢎞才苖光坡牛圈坡八孖諸寨一時響應謀於十五夜焚劫大營利洞頭人靳瑞林因把總徐祺生來告十四日文英等議進剿時河水陡漲渡船僅二隻古州同知滕文炯集新撫諸苖寨船六十餘覆以板纜以大絙夜半成浮橋次日五鼓濟師善元率守備侯𢎞道張焕等趨永鎮關為夾攻計文英紹周分兵直抵中堡攻口月寨頭江墨等寨苖以河水阻隔懈於防守突聞官兵至驚惶奔竄我兵焚其巢俘首惡而誅之餘俱繳械受撫六月初七日文英紹周由右路搗龍早善元應貴由左路攻黨祥兩路皆絶險巇賊又伐大木阻截之我兵緣山間反徑騰踔而行窮搜大索俘馘甚衆擒苗一名老戞則車寨前往助逆者也十二日攻車寨是夜三更車寨防守之苗聞繞寨馬蹄聲視之寂然如是者三及五鼓甫就寢而大兵至賊瞀亂恇怯自卯至已斬首千餘級就縛者三千餘人搜獲子母大炮十三座火銃長桿刀弩皮鐵盔甲無算梟斬首惡餘皆釋而撫之自是三堡諸寨無不褫魄同知滕文炯因勢招撫者百餘寨而來牛定旦復叛先是二寨雖已安營駐兵而上江山苗無慮數十寨擺調方勝素凶悍為諸苖雄長革招怎冷怎衣邱車有已有厄龍坡冷硬烏泥雅灰等寨莫不聽其指蹤於是煽衆作逆奪據柳疊隘口劫糧運謀犯新營柳疊隘口者上江路之咽喉糧運郵遞所必經也萬年紹武得警報飛檄各路官兵預備合剿並調八寨官兵暨爛土普安土兵於二十九日齊集拉攬臺萬年領兵直趨柳疊賊見官兵衆不敢出惟於柳疊北岸遙施火銃官兵攀崖逐殺賊散走於是柳疊不失而糧運復通七月總兵蘇大有自清江抵古州任時文英紹周鉞嘉賓等先期往溶洞清理下江大有飛調文英紹周等星馳上江䇿應而副將董芳亦奉調至來牛遂同萬年等進兵堵剿初擺調方勝倡逆時首附和以殺夫奪糧者革招也聽其脅制不敢少抗者排怪有厄邱車諸寨也衆議先落其角距不半月而諸寨可平乃於八月朔進剿擺調文英以兵一千攻其左萬年以兵一千攻其右殺賊數百人餘潛奔密箐乘勝直攻方勝張翼夾攻殺百餘賊斃於銃炮者無數焚燬其大小四寨擺保羊烏者距方勝三十里與擺調方勝狼狽相依二寨餘孽悉逃於此恃山險箐深官兵不能至文英萬年等分兵伐山通道直逼其寨賊併力奔突官兵銃炮齊發僵尸橫地餘皆潰走追至加雅大箐復斬馘數百俘二人於是黨找者飛甲石等七寨苖民相率赴營求撫擺調等四寨逃竄逆苖亦悔罪來降而是月二十三日龍坡冷硬等寨潛勾定旦餘孽突攻新營為遊擊周豹擊散大有飛調董芳帶兵會剿官兵既合於九月初二日先攻龍坡冷硬由是而俾硬而恩堆而俾舉一路蕩平勢如破竹弓桃雞髓等三十餘寨皆遮道受撫文英萬年乘破擺調四寨之餘威於初八日由奪弄攻雅灰雅灰故與定旦通恐官兵至坎其道路塞以巨木文英萬年等踰岸越嶺直搗其寨賊逃匿一空官兵四路搜捕隨有色彛色排羊長羊羔等十餘寨暨阿黎阿墨撒高擺地等二十六寨相繼輸誠誓為良民是役也為時未匝兩月俘馘以千計向化者百餘寨獲賊仗不可數計二十八日撤師回古州去古州五十里許有苗寨曰滚宗計十有二寨陽示恭順隂懷叵測舊與車寨頡頏左右數十寨山苖咸憚其凶𦦨近見中下二堡皆剿心不自安乃煽誘通倒高牙等寨並招納定旦龍坡亡命以自助肆行劫虜大有檄善元任龍統黔粵兵分路進剿時文英等以上江之役未回大有慮頑苖乘虛覬覦限善元等以三日旋師十月初八日抵滚宗後山善元領兵由左路取火燒寨一路崎嶇犖確無尺寸坦途守備凃有功力攻前關賊死守善元潛從山僻小徑陟後山之顛下搗其虛賊首尾不能顧有功斬關而入殺苖數百焚其寨乘勢破中南兩寨立燬之任龍由中路取領月寨纍歷深箐去領月咫尺逆苖壘石為關留小竇僅容一人匍匐出入又用大木為柵多鑿小孔以架火銃守禦嚴密千總周熹奮勇前攻一矢貫兩苗苗膽落棄關守寨自辰至已攻寨門不能破周熹瞋目大呼守備侯𢎞道偕千總王嘉猷李梅得等協力急攻苖始棄寨走黨補周熹追之中火銃死善元督兵為後徑發火箭延燒苖屋須臾灰燼附近之俾景與上寨下寨悉行剿滅殺苖百人銃炮斃者倍之初十日善元等還古州適如三日之限而滚宗十二寨已破其八是日文英紹周等亦至自上江大有以滚宗雖經小創而凶猾未改須草剃禽獮之方議加兵而烏泥公台等寨與定旦逸賊殺邏卒數十以叛官兵進剿不數日二寨皆滅時大有病故以董芳署理十一月文英紹周各將兵千餘進擊滚宗十七日抵其寨設伏待之賊犯大營為伏兵擊走官兵逐北經喬扣養黨碑尾等數寨俱縱火焚之賊遁入土􅋭大寨層壘土牆又嘯聚俾賴加頭邦受高烏等數十寨堅壁自守官兵纍攻不下芳調定旦兵千名領以守備殷起龍於十二月初八日由古州進援適總督遣員賫賞賚至營宣布聖恩密示方略將士倍鼓勵十九日分道進剿先以伏兵剪其外援然後文英率兵攻其前紹周率兵攻其後賊分兩路拒敵自辰至未賊兩路皆披靡遂破土􅋭由是滚宗十二寨咸懾兵威而俾賴加頭數十寨亦相與匍匐營門願受編管文英等撤師歸先是上江來牛邱車革招排常排怪柳排等寨旋服旋叛時犯軍營是月十一日萬年遣馬允升姚宅中沈𢎞謨等相機先剿後撫邱車等寨皆畏服惟革招來牛排怪三寨負固至是年正月萬年等分兵攻剿三寨賊遁匿深箐萬年焚排怪𢎞謨破革招並獲其首惡阿屋解大營梟首時當春耕衆苗因千家革雄布養三寨之苗哀懇就撫於是革招等一百餘寨咸繳器械受約束四月上江邱車寨復叛文英等率兵攻剿獲其渠魁阿桶斬之又擒獲高孖定旦等寨附逆之阿種等十八人檻致古州梟示於是來牛定旦等寨無不畏服而上江一帶胥底定焉下江苗視上江為恭順獨滚塘才瓦二寨頗頑梗復有加的寨同惡相濟同知滕文炯親詣招撫不應六月董芳率文英紹周善元等抵蘇洞危峯障日鳥道懸橦文英等率領官兵分路攀緣而上將近才瓦賊衆林立善元手刃二苖官兵銃炮並發斃數十人砍死首惡老門等三人始棄寨遁又分兵剿加的寨亦望風四竄時大雨如注者數日有蘇洞苖民老巴者𨗳內滚塘八寨外滚塘二寨苖赴營求撫雨霽後發漢土官兵搜剿逸賊才瓦加的苖民咸凛凛然不敢復萌異志即附近滚塘之高麻等十八寨並逺隔滚塘之黨牛加耳等十九寨俱繹絡赴營繳械願入版圖七月十一日班師回古州由是上下兩江乃克大定當清理上江時總督即有會勘黔粵疆界分地鑿江開道之檄逮車寨滚宗等寨次第平定遂檄按察司張鉞及文英紹周嘉賓通勘上下兩江上自三角􅋭至三硐下自諸葛營至溶洞濬淺灘辟險磧伐巨林鑿怪石舟楫上下郵遞往來無有阻礙乃建城設鎮於諸葛營其餘來牛定旦高舊打略八開拉攬革赧柳疊籠寨丙妹各要地或協或營或汛碁布星羅聲勢聨絡並𨽻黎平府十年九月逆苖圍台拱至十一月官兵擊破之圍乃解台拱即九股苗相傳漢武鄉侯南征戮其種殆盡餘九人滋蔓蕃衍分而為九因名九股近丹江者曰上九股近施秉者曰下九股寨密人稠土饒性悍明季屢征不克本朝定鼎初猶不免竊發康熙辛酉大師整旅黔疆乃罔敢恣肆然弱肉強食自相讐殺纍世不悛雍正四年噶覺番隴等寨夜出施秉劫琵琶洞石口溪等處發鎮逺協兵剿之六年總督鄂爾泰清理苖疆越明年丹江雞講以次底定遂檄委鎮逺協副將張禹謨知府方顯領兵開九股抵台拱宣揚朝廷威德戒諭勿相侵凌繳凶械為良民是時羣苖為兵威所懾皆俯首聽命於是清户口編里甲版圖登之天府此亘古所未有也苐苗既凶狡未經大創慮有反側議於台拱建城設兵以鎮撫之且上為丹江聲援下與清江犄角而施秉鎮逺之籓籬以固十年秋七月總督高其倬巡撫元展成會檄按察使方顯董其事二以貴東道黃世文檄清江總兵趙文英領兵二千五百偕往定廣副將曽長治佐之八月由施秉稿貢進次排略各分兵防守旋至台拱經畫既定工方興時秋禾遍野苗偽為恭順然日夜刈穫不少息及農工甫畢城築數板而諸苖叛初歐家墨引羊翁市界桃賴各寨倡議曰官兵定居於此如我輩何盍驅之城工成將無及諸苖謂衆寡不敵墨引寨苖曰吾將東連高坡南結丹江多傭老虎漢必能取勝老虎漢者苖之敢死士也遂傳遞木刻刴牛誓衆上九股三十寨下九股四十二寨高坡三十餘寨皆附焉惟在濃台拱稿貢三寨不從九月初六日夜各寨苖俱集殺通事郭英歐玉勝等及商民數十人凌晨犯大營外委張壁戰殁文英攻羊翁寨把總劉鳯林戰殁急檄調援兵並檄稿貢之兵進保排略時排略被困兵不火食者三日長治領兵五百往救適鎮逺援兵亦至大破賊火其寨拔營歸台拱苖阻截歸路守備高本陽死之排略為台拱咽喉相去十五里防守兵僅二百人苖攻圍三日不能破使圍解後益以長治所領兵與大營相犄角刁斗相聞糧運無阻得勝算矣撤兵歸營苗得據險孤軍坐困外援不通此則主兵者之失計也初十日報抵省城巡撫元展成飛檄各路兵赴援撫標遊擊馬似龍先往平越營遊擊羅資衮督軍糧輜重隨之將抵排略伏賊突起官兵潰資衮戰殁似龍退駐稿貢台拱發兵接應把總王朝傑死之是時黔西遊擊馬騏提標遊擊王友文遵義遊擊吳朝貴先後率兵至以持議不合遲疑逗遛巡撫元展成攝提督印嚴檄四將赴援而賊堅守大關不能進又委大定副將楊馥為總統星馳解圍未至文英攻市界寨僅焚苖屋數間千總蘇成鳯把總徐三錫唐起鳯等戰死方逆苖之圍營也軍糧僅足支二十日文武官兵啜粥待援至是糧盡人心惶惶方顯曰初入九股時張禹謨欲屠台拱在濃余力阻得免二寨感不殺恩誓不反曷與謀之遂召二寨苗議米薪之價升米銀三錢有奇束薪銀一錢牛羊價數倍二寨欣然未幾賊知以糧濟我軍誓先滅二寨二寨懼不敢以米薪至十月九日楊馥至見大關山高路險賊壘石以守曰此可以夾攻破也十二日令馬騏王友文從旁抄出賊營後自領兵前進士卒有懼色馥曰孤軍忍飢待援吾若後誰肯當先者遂舍騎抽刀徒步登山嶺天未曙賊睡卧中聞官兵突至驚愕四散馥殺傷無數追逐至壘石下賊伏草中發銃中馥左肋馥猶揮刀前進不數步仆衆兵奔潰馬騏等不敢進依山為營為賊所困凡三日水絶士卒飢渴棄軍械從間道歸賊盡收之勢愈猖獗遂由稿貢出苗鼻嶺景河一帶劫掠十八日犯下秉督糧知府滕文炯甘士琇率兵渡河擊敗之生擒六人又於草中擒獲二十餘人俱梟示河干自是平兆景洞諸苗始有懼心方楊馥陳亡之日逆苖被馥逐殺負尸而歸者踵相接在濃台拱乃復以米薪濟我軍是月署提督左江鎮總兵霍升履任即兼程赴援與黔西協副將康世顯撫標參將馮茂先後至十一月朔苗賊由偏寨平閔渡江犯舊施秉官兵雖擊退而賊勢愈張逺近諸苖皆搖惑觀望台拱在濃又不敢以米薪至烏孟番招諸苗夜築土牆阻我兵後山樵汲文英屢攻不克千總黃招賢戰殁我軍於營中掘草根而炊文武官兵人日食米不及二合幾不能支欲移營就糧方顯文英曰國家新疆尺寸不可失吾輩當以死守知府劉同知宋厚皆持堅守議適巡撫元展成檄至諭以援兵即日大集慎勿移營衆志始定十一月十二日康世顯馮茂等自下秉達干翁連營三十里方顯知援兵將合與文英密計遣千總李勳夜四更領兵繞出後山直逼賊營文英長治攻其前賊懼棄營遁隨破井底烏孟二寨獲米穀有差十五日大營圍解閲二日凱里都司侯𢎞道之兵亦至附近墨引歐家市界桃繞桃賴各苖俱逺遁文英發兵火其寨又攻南世桐木各寨殺賊十餘級獲米穀牛羊十二月提督哈元生入覲回奉命進剿仍留左江鎮霍升總統諸軍先是奉上諭九股頑苖向未攝以兵威是以未能革心革面今既敢行悖逆若不痛加懲創使之畏服非一勞永逸之計命調湖南兵二千廣西兵一千八百赴貴州會剿至是湖南副將母椿齡何勉廣西副將王無黨先後俱集元生偵知賊潛匿高坡欲分兵五路同進會大雪乃止十一年三月提督哈元生征高坡苖平之正月八日廣西遊擊許應虎由清江攻克烏溜殺賊數十生擒十餘人台拱獲姦細訊知賊匿山中康世顯發兵剿之擒苖十三人守備蔣秉忠戰殁元生乃發兵進剿高坡世顯由中路進椿齡馬騏等佐之參將紀龍由右路進友文等佐之霍升總統三路由清江前往䇿應大兵既集交撇交工南弓交上世登各寨皆先後投順而烏羅南山烏茫黨道番牌獨結連九股拒敵霍升等破之三月十二日元生移駐台拱咨霍升會剿番招番招者高坡苖寨也其旁曰陽遼曰交汪曰烏腳交曰烏腳南凡數千人與九股賊築土城於蓮花􅋭高二里許廣倍之四面皆深箐聚積米穀牛羊可支數年推其渠白黨為主併力死守我兵屢攻之不克二十五日元生至番招二十八日親自臨陳分兵六路進攻賊不能支遂破其􅋭斬獲無算番招既破搜𠞰各箐日獲百餘人高坡平九股各苖皆面縛赴營投誠五月二十五日班師建城設官隸鎮逺府貴州通志卷二十四
