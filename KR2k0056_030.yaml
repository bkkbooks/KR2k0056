body:
  text: 貴州通志卷三十人物宦迹貴陽府明王讓貴陽人成化末知洪雅縣為政平恕實心愛民去任時囊無一物署後有手植柏人呼為王侯柏平鋼宣慰司人成化癸卯舉人𢎞治間知廣東徐聞縣事性清介而政尚平恕時縣治以避寇附於海安所軍甚民不能堪鋼力請遷於原邑正未就而卒子孫因留家焉祀名宦張厚宣慰司人正德己卯鄉舉任潼川令政多仁愛嘉靖戊子年大荒力請當路得發帑金全活甚衆明年麥秀五岐以得罪監司去官士民泣送至有釋耒耜爭肩其輿而出境者韓立宣慰司人嘉靖戊子舉人嘉靖中自仁壽縣調洪雅嚴介有法數年積猾屏迹無敢捍網者王夢説貴陽人嘉靖丙午舉人嘉靖末任四川彭縣令政尚簡靜嘗曰政在去其所害而興其所利耳虛譽不必賈也極意民瘼調停賦役百姓頌之王紹先貴州衛人嘉靖己酉鄉舉知四川中江縣令刻勵苦節一介不取百姓陰受其福以不肯阿時乞休去士民思之胡璋貴州衛人嘉靖時守備普定苗寇亂璋防禦有方士民不擾視衛篆二十餘年仁愛忠勇軍士畏懷官至滇西參將龍奮河貴陽人萬厯乙酉舉人知浙江縉雲縣精明爽朗練逹周詳宿蠧頓清案無留牘撫循遺黎尤極盡心楊起瀛貴陽人萬厯庚子舉人任通海縣令有才力建縣城民得安堵楊州鴈貴陽人萬厯間任陜西環縣知縣仁愛節儉厯官九年不貪名利尋升任致仕歸邑人深慕之朱新運貴州衛人任葉縣訓導崇禎五年大水衝城土賊聚衆作亂新運率鄉勇堅守城賴以全升知本縣王璽龍里指揮忠直剛勇李鳳朝貴州人嘉靖戊午由嵗貢任江西信豐主簿時三巢賊賴清規等屢掠城下鳯朝督兵出戰屢破賊癸亥二月賊入青村谷鳯朝攻之賊距山逆戰鳯朝奮力先登為賊所害數日得其尸顔色不變邑人哀之呼其山為主簿腦兒汪夢説貴州人萬厯中任浙江仙居令時議間架之稅夢説以民貧甚強項不奉法郡守強之不能得民賴以免見祈江志國朝章爾佩字琳友貴陽人崇禎壬午舉人恂恂謹飭孝友無間言順治十六年任澄江知府時兵燹後瘡痍未起輸挽頻繁一切行以寬大不事束濕滇民戴若慈母康熙五年擢金滄道副使以裁缺赴補卒於京師王承祐貴陽人康熙乙未進士官順天府丞康熙三十年監試禮闈榜發見廣西雲貴無一中式者因疏言禮闈中卷久偏請將江南安廬滁和等州郡仍歸南卷其中卷額歸川廣雲貴四省較卷數目不必分經就文録取遂著為令越闓貴陽人康熙癸卯舉人厯任山西解州牧勤學殖有知人鑑賞識胥登甲乙為政安靜不擾先是民間多宿逋檄一嵗並徴闓詳請分年帶徴士民懷之劉子章貴築人字道暗康熙補行辛酉科以第一舉於鄉任鎮逺教授以實行朂士嚴操守擢襄城令賑荒開渠戢兵弭盜多惠政邑有營卒王荆州強逼孀婦婦不從被殺前任惕於營辨越四年獄不決子章至立逮訊之其黨蜂擁至署不為動持法益堅又把總孔起揚戲田玉才婦婦不從自殺子章奮筆判其罪申請題旌二婦王與孔皆伏誅報最擢御史巡視河東鹽政盡革陋弊裕商便民風紀肅然安順府明趙鳴鳯普定人正德中知四川奉節縣御下以嚴吏胥不敢舞文尤勤於造士嘗修邑乘文獻有考薛大梁普定衛人嘉靖間為四川什邡令邑相沿苛政弊竇百端一切革去清正嚴明流民聞而復業後升雲南石屏州牧行李蕭然民厯久思之邵昱永寧州人正統丁卯舉人景泰間知晉寧州亷介有為九年秩滿耆民赴京奏留復任三年遷廣西平樂府知府趙逺永寧州人嘉靖庚午舉人任四川敘州府通判署富順篆天性儉約一僕自隨節省財力鼓舞人士邑人為立遺愛碑聞道立永寧州人隆慶庚午舉人萬厯間知洪雅縣英爽敏練修飭學宫吏畏民服擢戶部主事李忠臣永寧州人萬厯乙酉舉人任雲南順寧知府立政寬大節儉持身而樂施與與前守余懋學嫓美余亦黔人郡中立余李二公祠祀之楊應霑威清衛人萬厯丙子舉人知成都縣慈和敏決不激不隨成都令之入覲者自應霑始升南部主事厯雲南參政國朝梅建普定人康熙辛酉舉人知山西髙平縣性亷介精於吏治發姦摘伏不爽創宗程書院集雋異授以文義又立義學延師教貧人子弟後解組髙平人建祠祀之平越府明張信臨淮人父興為永寧指揮僉事嗣官以征紫江草塘功遷都指揮僉事遂為平越人常與張三丰遊因授以葬父地建文初大臣薦信有謀勇調北平都司受密敕令與謝貴張昺往察文皇信懼不知所為母問之以實告母大驚曰不可汝父每言王氣在燕汝無妄舉比至北平三造燕邸文皇辭不見乃乘婦人輿求見文皇召入時文皇詐稱風病不能言信再三頓首稱臣文皇乃與信密謀遂定計起兵以信從屢見戰功升都督僉事封隆平侯與世劵文皇每呼信為恩張解立敬字誠齋興隆衛人萬厯乙卯舉人崇禎十一年厯任廣州海防同知性寬厚和簡而天姿英敏剖決如神每讞獄畢即搦管成爰書徐取律例朗誦一過無不服其神明間有未喻者復曲為引譬務使兩造曉然乃已時通判推官南番縣官並缺上官僥立敬攝之身綰四符案無留牘會丁內艱去服闋補惠州同知遷本省副使後擢僉都御史巡撫江西粵民思之舉祀名宦按解立敬舊志載鄉賢傳甚略今用廣東名宦傳移入王宗周興隆人字公旦崇禎拔貢初任直𨽻保定府倅改江西金溪知縣亷明仁恕綜理有方時軍興旁午內保民命外籌兵餉耕市不驚士民德之葉應甲甕安人號元胎令鍾祥清慎愛民致仕歸樂善好施鄉人稱之都勻府明王漳清平衛人正德間以貢授清苑令有惠政時劉瑾奉使至漳不折節遂棄官歸孫裒清平人字益之嘉靖丁未進士選庶吉士轉御史巡視南城以風裁自持中貴等悉受約束請託不行奉命清戎兩粵彈墨吏懲猾胥嘗疏列貴陽敝政如議永寧赴試之字號清平馬政之苦纍糧儲定限之催徴皆切中情實又疏劾雲撫鮑某貪黷狀褫職鮑素交通權貴既斥造飛語中傷謫裒定州州判旋擢汝寧司李時伊藩坐違祖訓聽勘裒一一辨復之厯升湖廣蘄黃江防僉事蘄黃為水陸盜藪裒至嚴訓練繕城池造戰艦一日而縳盜數十凡守令勤惰廉汙分别勸懲境內大治會鮑冉起裒復為飛語所陷回籍王墀字允敬清平人授羅山教諭甫九月擢廣通令才思敏捷剖決如流縣故有土主簿假姓者素骫法上官加以約束則用巫蠱術咒詛之墀廉得實發其巫蠱物械假送府置之於法聲譽大起適縣庫被盜謫河南藩司理問父艱起復補閩藩尋擢鶴慶府判先是麓川之役多虛冒升賞直指屬墀往勘盡得其實尋以疾乞歸墀性嚴急不能容人過然操履清約囊無餘資先世所遺産悉以讓弟姪有古人風孫世正字興甫清平人自幼篤志立學萬厯癸酉舉於鄉丁丑成進士授桂平縣令時猺獞嘯聚為亂世正至即單車撫諭之擒其渠魁餘黨悉平行取南工科給事中萬厯初閹寺多不法世正悉數其罪詞甚激切政府報書曰自巨璫馮保擅權內外章奏不敢一字及中官者十有餘年大疏入心甚憂之昨得旨使人釋然云會上取翠屏甚急屛料及雕鏤甚細出窰見風多碎難成督厰內臣嚴刑催逼斃箠楚者多上疏極諌得旨報罷出為韶州知府居六月丁父艱歸哀毁骨立服闋補順慶府府舊有官店太守徴其租悉捐之以店舍為社學以餘租給貧士升雲南副使備兵瀾滄紆道歸里省母相聚月餘無何母卒哀痛過甚尋亦卒入仕籍近二十年囊槖蕭然家徒四壁汪良清平人萬厯丁酉舉人任陜西環縣教諭德性溫厚氣度安和每與人言忠孝大義娓娓不倦一時文風丕變王鍈清平人萬厯丁酉舉人任雲南臨安府知府平訟獄練鄉兵郡人德之顧閔清平人萬厯間任楚雄縣年尚少性術慈厚見刑非其辜者惻然哀憐之實畝清賦平徭恤惸尋遷趙州知州國朝丘應宸都勻甲子舉人官柏鄉知縣性孝友居官亷潔弭盜安民興學校置義田士民德之鎮遠府明梁棟鎮遠人隆慶丁卯舉人知雲南亦佐縣有循良績後離任民攀轅留之韓應良施秉人號正寰萬厯癸卯舉人性慈祥耿介任廣西岑溪令謁臺使者問曰與某有親乎意將庇之應曰無使者默然在任三年不杖一人不受一錢以伉直忤大吏挂冠歸李維珩施秉人萬厯戊午舉人通經學善書法令洧川中牟以循卓著聲遷磁州保境息民寇不能擾升戶部轉四川副使陶洪謨施秉人多智略明季安邦彥叛上書巡撫王三善署為守備從征三善敗沒洪謨軍獨全屢征諸洞蠻升貴陽總兵國朝陳珣號特菴施秉人康熙甲戍進士厯知冠雒容天河四縣皆稱亷明轉禮曹擢御史厯升大理寺卿持法平允著冇百尺摟家稿五經文集思南府明周憲章思南人萬厯間知雲龍州平假進忠之亂消林養中之變建城立治創廟設學招撫流離清田畝定里甲裁冗課經畫盡善後遷四川保寧府同知纍建軍功息訟寬徭亷介自守人呼周青天尤精形家言遷學宫科第自兹曰盛崇祀名宦田興吳思南人萬厯二十五年由選貢任湖廣衡陽縣丞居官亷靜惟一子一僕相隨督運不受常例舟至嘉魚遇風他舟多溺興吳舟獨安人謂清節之報奉檄勘災自擕具以往倦則蔭樹下不入民舍卒之日止一敝笥不滿一金同官為置棺其請於當路賻櫬以歸任賓臣印江人崇禎庚午舉人官遂州府同知在任清白平易敦崇學校值獻賊圍城遂與鄉官呂大器招集義勇身先士卒力守城池賊遁邑民賴以保全國朝張繼曾安化人明天啓丁卯舉人順治五年授户部主政遷廣西梧州知府練達有為冰蘖自矢減徭省役修學課士三載卒於官僕從僅有二人囊槖蕭然無長物黃世發印江人字如射事繼母以孝聞康熙丙子舉人任直𨽻肅寧縣知縣惠愛在民輿情感念擢營田觀察使勸導農功殫心盡職雍正八年以疾卒於官其任肅寧時有未完欵項銀兩特諭豁免令地方大吏資助路費使其子扶櫬歸石阡府明彭允年石阡人字鶴廷天啓甲子舉人知廣東新安縣節儉寬厚與民休息輕徭役蠲鍰贖恤行户去日行李蕭然邑人思之簡國寧郡人崇禎間知吳堡縣時值兵荒力請輕徭役多方生聚布衣蔬食囊無遺金思州府明周懋仁思州人太湖知縣蒞政七年撫字有聲升海州知州丁艱回里蕭然自守以清白稱鄭國賓平溪衛人舉人隆慶間任雷州府推官姿性敏捷兼攝府篆事無巨細迎刃而解疑獄一鞫輒白每按行他部却常例飭吏胥以嚴明著增設沿海墩臺海警有備民賴以安劉尚德玉屏人萬厯戊子榜首厯任雲南臨安府同知亷潔惠愛有滇南清官第一之名龔漢臣平溪衛人萬厯甲午舉人知廣東瓊山縣時邑當採珠征黎後財力耗敝漢臣一切省節每從寬厚未幾以艱去士民咸思之朱祚盛清浪人萬厯戊午舉人任江南安慶府推官升授思石銅仁勦撫道安慶士民有政協天人評髙月旦之頌國朝夏爔清浪人嵗貢康熙八年廷試候補值滇逆不受偽職至二十一年任思南府婺川縣訓導後以清浪歸楚改補德安府應山縣訓導勤慎守職課督不倦在任卒應山人士思慕不置黎平府明王鎡銅鼓衛人永樂間任巴陵知縣居官勤慎守正不阿儲維銅鼓衛人選貢萬厯時任四川隆昌知縣居官九載清慎如一日歸之日宦篋蕭條百姓醵金助歸國朝張應詔字采臣開泰人康熙辛酉舉人為直𨽻肅寧令清亷愛民任事勤敏升泰州牧轉部曹出守廣東潮州府時都察院趙申喬以才守兼優保薦之特授兩淮巡鹽御史任事三年潔己奉公以鴻臚寺少鄉告歸卒大定府明吳習赤水衛監生嘉靖間知廣通縣仁恕公廉不畏強禦不濫科徴凡公署橋梁靡不修葺邑人感之升順州知州盧安世赤水衛人字環水萬厯壬子舉人天啓中任巴縣學博奢賊掠城邑令死之安世鼓集義勇誘賊渠孟竇山入城斬首持示賊驚潰掩殺無算後以監軍平賊有功升兵備參議盧朝棟赤水人萬厯間任四川江津縣教諭剛方正直不避權貴勤於考課郤寒士餽遺諸生有貧不能婚者捐俸助之有寃不能逹者力為白之衆論推服國朝蓋世祿字民標畢節人厯仕至雲南屯田水利道副使所至有熊聲康熙十年見吳逆潛蓄異志即謝病歸隱終身不履城市洪亮采字揆菴畢節人平遠州籍康熙丙子舉人官江南青浦令有惠政以父憂解任槖無餘資浦人醵金贈不受擕書數千卷以歸居鄉杜門却掃日課子弟植學子楷中雍正壬子亞元南籠府明邵元哲普安人嘉靖乙丑進士萬厯間知淮安府城東澗河通射陽湖入海為輸灌咽喉久淤白於上司立疏濬之增築城西長堤堵黃河下流之決建閘壩以通漕艘士民立像祀之孫思述普安州人萬厯丙子舉鄉試第一知四川新繁縣慈祥莊雅無峻辭遽色吏民畏愛之嘗計擒大盜屢決疑獄兩稅不違嚴限民自樂輸尋升大理府同知郁德據普安州人萬厯壬午舉人知浙江龍遊縣摘發姦猾智在鉤距缿筒之上而出之寬仁轉判東昌府士民泣留遂以别駕仍攝縣符十載龍丘風和日暖前令南昌佘杰鄒陽唐興俱有賢聲人以據嫓美焉邵以仁普安州人字子任萬厯間任雲南兵備副使寬簡持大體一時幾於刑措永昌立祠祀之國朝沈弼字長垣普安州人由拔貢厯任部曹康熙三十八年出守廣東高州時屢經兵火地瘠民貧弼加意拊循治尚安靜不求名譽以誠率屬和協文武禁副倅擅受訟牒除地方供應陋規添防汛以靖盜源設行埠以便行旅權化州篆清虛糧蘇逋戶減糧額恤徭民實政嘖嘖人口以勞瘁卒士民哀之請祀名宦遵義府明傅元和桐梓人萬厯甲子拔貢授廣西桂平令教士愛民振興學校賦役均平邑人祠祀厯任雲南按察使司傅爾才桐梓人由嵗貢任湖廣會同令多惠政邑人號曰慈母國朝李先立字卓菴遵義人康熙甲戌進士筮仕新安令事務求便民擢銓曹主政釐宿弊疏壅滯仕路一清直𨽻分闈壬午戊子兩試僉稱得人後請假歸居鄉謙和鄉人表之曰淳厚之門陳明經字春麓綏陽人康熙丙午舉人性至孝居繼母喪哀毁骨立人品端方不事干謁吳逆逼仕逃入深山抗節不出賊平授陜西咸寧令有惠政以詿誤解任士民遮道詣督撫請留後升山東東昌府通判著績河工卒於官文學貴陽府漢應世叔牂牁人以經術辟司𨽻校尉明陳銑前衛千户儀度修整博覽文翰多積竒書以自娛尤好吟咏有醉鄉詩集劉汝楫字濟川貴陽人嘉靖戊午舉人歷官長史長於文學所至山川皆有紀述子元清元浣登賢書曽孫在銓康熙庚戌進士宋炫字廷采宣慰昻子嘉靖初人以詩名著有桂軒拙藁周文化字元淑貴陽人幼頴敏工古文詞嘉靖甲子舉人授欒城縣令鄧川守有治行以不見知於世作蜉蝣公子問答宦遊所至輒有吟咏歸里後盡步唐人五七言律韻彚為四卷又著鄧賧稿紫亭雜稿謝三秀字君采貴陽人天才卓越博覽羣書早有令譽為諸生時巡撫郭子章副使韓光曙皆深器之晚以明經起家三任教職已乃棄去為萬里遊厯覽山川與東南大家建詞壇旗鼓有正始遺音天末才子之目著雪鴻堂諸集行於世楊文驄字龍友貴陽人萬厯戊午舉人崇禎時為兵部郎博學能詩文尤精於書畫雖片楮寸幅人爭寶之著有山水移等集舊刻崇禎八大家詩文驄其一也邱禾實新添人萬厯戊戌進士官翰林院編修才髙學博著有經筵進講循陔園等集行於世二子懋朴懋素皆登鄉薦傅宗祥開州嵗貢官興隆衛教授升四川梓潼令博通天文地理隂陽數學尤精易理國朝潘馴字士雅貴陽人性端平仁恕孝友過人多學能文弱冠即以回文詩三十首擅名吳下崇禎己卯舉鄉試為主司陳際泰所賞識曰國家欲以策論收賢才此其首選也馴以母老不仕國初始補蒙自縣令在任潔已愛民日與諸生講學論文考績以亷能薦會因土逆李世藩之叛遂詿誤歸壬子修通志自萬厯丁酉以後六十年事實悉出胸臆無絲毫舛謬其博聞強識如此卒年七十有三子德徴登己酉賢書生平所著有瘦竹亭出岫草行於世周起渭字漁璜貴陽人康熙丁卯解元登甲戍進士選庶常厯官詹事府詹事敦孝友工詩文士林重之簡應時開州人幼嗜學工文與同里盧學新盧應龍盧應鳯盧應奎盧國賢王之林同以制舉業知名於時吳逆叛迫脅應試皆棄諸生服逃匿不出及吳逆平始出就試黔人稱為開州七賢安順府明汪大有普定人正德丙子舉人知金華縣居官亷慎以疾歸纂修衛志著有宋元品藻陶陶亭集張繼宗安莊人由明經任教職倡正學嚴課程歸家教訓子弟成就甚多平越府明楊遵郡人成化己丑進士官至參議政事文章所至推重一時知名士爭師事之宦成歸里杜門著述終其身樊師孔平越府人萬厯戊午舉人官至山西參政有勘亂才譽聲甚隆拂衣歸以詩文自娛著有聽命堂好還紀略冷况等集劉璿平越指揮好學工詩文所著有竹亭退隱等集奚榮先平越府人官學正品行端方博學好古撰郡志二十卷後之作者多採擇焉都勻府明周綱清平人能文章工吟咏自號南坡學者稱南坡先生國朝劉蛟都勻府人康熙壬辰進士官翰林檢討為人重厚居家孝友德行文章為一郡儒林首推鎮逺府明何一中施秉人號少崔萬厯時嵗貢厯任宣豐祿川二縣多惠政文思敏捷與蕭時芳齊名所著有少崔山人集行世宋騰熊施秉人崇禎己卯舉人博學多聞長於詩賦令寧海半載辭歸以詩文自娛侄安全孫應舉皆有詩名思南府明李廷謙安化人萬厯乙酉舉人初授真定縣教諭遷國子監助教日進諸生講論皆服其淹雅王蕃郡人讀書尚義安貧守正自號一瓢道人工篆𨽻善寫梅為詩清逸老而益工當時名流咸與交遊著有一瓢齋集石阡府明唐必聰石阡人成化丙午舉人任南寧令歸以經學開導士類文學品行見重一時思州府明胡士芳郡人字瑶草號眉雪拔貢幼有夙慧比長學問該博多讀異書識竒字時有書厨之目其詩文造詣高邃使事奧僻自成一家言國朝許之獬玉屏人拔貢學問淵博工詩古文敦行誼厲名節厯任鎮遠教授不責修脯實心訓士所著有太朴園詩文集袁良佐玉屏人康熙戊午舉人品行端方學問醇粹教授生徒先器識而後文藝邑中經明行修之士多出其門官大定州學正黎平府明張應竒天柱人諸生博聞廣記持身謹厚口不言人過郎有言及者輒止之年八十餘猶日與同學講論經史不輟何東鳯黎平人以明經授新興學正纂地輿志大定府明吳濟赤水人素樂隱居學行為一時推重正統間衛學缺官御史徴之以布衣署學事凡五年克盡厥職士類悅服南籠府明史銓普安州人任教授苦志篤學老而不倦蔣杰字美若普安州人萬厯己丑進士以北部郎出守南雄風流文雅譽重當時後罷歸流寓荆州放情山水娛志琴書雖屢空晏如也詩文清麗書法效顔真鄉體與黃董米稱四大家遵義府明曽宗孔遵義人年十二為諸生讀論語至古之學者為己豁然曰格致誠正己事也修齊治平因之人只為耳目口鼻四肢自利自私耳若以此任之造化而我不有獨主一誠以立於天地間豈不快哉工夫以致良知為主經史性理百家諸書靡不探索精研性純孝每父母忌辰必素服危坐揮淚終日自喪親後郎不復赴科舉隱逸貴陽府明王璘號樵隱郡人性耿介取與不茍博通經史長於詩詞隱居教授一時俊彥多出其門著有樵隱雜稿朱憲郡人正統間舉賢良不就蜀獻王聞其賢以禮幣羅致未幾辭歸汪成郡人工詩文韜光弗耀為鄉里所重著有納庵詩五卷顧璇字良玉郡人性明敏工詩文凡醫卜諸書以及繪事靡不精究斑衣娛親不求聞逹晚年尤好黃老構來仙樓以居巡撫孔鏞嘗造其家為作東樓記王佐郡人工詩不樂仕進與郡人士結社唱酬纂修貴州志有詩文行於世越梁郡人少遊庠隨棄去隱於槐亭有鹿門風人稱為槐亭先生年八十卒俞舉龍里縣人篤行博學年八十屢舉鄉飲不赴鄉評重之黃鳯新添人為諸生高等將貢以母老辭隱居養母精醫卜見重當道然未嘗輕於干謁安順府明朱相鎮寧州人性耿介有清節應貢不仕屢舉大賓陳嘉瑞安莊人淳朴孝友吟咏林泉不求仕進鄉里重之平越府明盛仲芳郡人隱深山鍵户讀書足迹不至城市德行詩文一時稱重著有獨齋等集張茂英郡人隱居城西不與户外事博學能文與盛仲芳金聲齊名號黎莪三隱王譏郡人幼讀書恥為章句學高尚不仕嵗荒歉盡出所精粟以賑全活甚衆三舉鄉飲年百嵗詔建坊表之逾年乃卒陳應熙黃平人初為庠生旋棄去講學著書從遊者二百餘人尤精史學人有勸之仕者輒掩耳不願聞有司尊禮之以夀終趙培郡人才髙識朗不求仕進有令名楊光夔字虞卿明末舉孝亷不仕博學好古從遊者衆著有待證録國朝鄒大賢餘慶縣貢生隱逸不仕年登大耋孫以惇登賢書都勻府明潘子安郡人性聰敏詩文清麗常遊滇蜀多所題咏纍薦不就著有清嘯集吳頌郡人與弟預俱博學能文隱居不仕教授子弟多以文學顯陳楷清平人博學隱居不仕開孰授徒多所造就王銓清平人篤學勵行屏居飬母以孝聞鎮遠府明周鳳毛郡人字羽瑞事母以孝崇禎壬午舉於鄉為辰溪尹以德化民有懷金獻之者怒曰若欲汚我耶責遣之既而挂冠歸甫年三十餘卜築深山中絶足城市守令欲識其面不可得家故饒田産盡為豪占踞人或慫之公曰何為以田土故而拂鄉里心置弗問郡以鄉飲大賓請堅辭不赴年八十餘日攜子姓論文課僮藝圃外人罕識其面思南府明尚安政郡人性純朴耕耨為業不樂仕進夀一百二十二嵗李明榮郡人性質朴好讀書隱東溪年九十八未嘗一至城市尤敦友愛四世不分居流賊之亂村落俱被害獨其家以尚義免田惟安郡庠生性純孝有識見應襲世官不就篤文志好學遊郡人李渭之門後卒渭哭之以黃文婺川人少頴敏治舉子業應𢎞治初年貢不就銓除歸隱於鄉步趨言動皆有尺度足迹未嘗入公門唐楚善婺川人耕讀勤儉不樂仕進好賑施宗族不能嫁娶喪葬者皆賴其助年七十始生一子且見二孫人以為隂德所致夀百十有七胡學禮婺川人廪生素精邵堯夫數學志向清潔淡泊自如不求仕進有古隱士風銅仁府明李標郡人性耿介孑身居寺觀中日彈琴自娛能詩尤工古名家山水南籠府明朱繪字素之普安人成化丙午鄉舉不仕隱居養親訓誨鄉人士多及門者當道旌其門曰表正鄉閭婁廣普安人宋參知政事璣五代孫雅素好德耽嗜經史尤長春秋善於訓詁當貢推讓者三隱大林山輯景泰以下志稿楊念祖普安人萬厯丙子舉人淵懿博雅恬退不仕日彈琴賦詩自娛與兄承祖友愛俱以夀終孫守仁普安人恬靜守正不妄交接年九十餘人稱無違先生遵義府明何敏樹郡人放浪山水寄情詩歌飄然有出世之致著滄浪孺子集傅爾訥桐梓人崇禎時歲貢時遵義𨽻四川任貴州鎮逺令尋歸里隱居不仕教授生徒著有春秋講義行世國朝楊應麟字吉庵先世麻城籍卜居正安州天性仁厚嘗從亂軍中救虜掠者二十餘人拾遺於道訪而還之晚年屏迹林泉究心易理著有易經辨義三十五卷劉之文江陽籍因避亂來遵精研周易太極諸書工書法隱居東里課農桑量晴雨樂善好施租負有不能償者輒焚其劵鄉人德之貴州通志卷三十
