body:
  text: 欽定四庫全書貴州通志卷二地理志序輿圖郵傳建置風俗疆域苗蠻形勢古蹟山川邱墓關梁貴州古三苖之域明始建都指揮司後改布政司治東西千里南北三百餘里於十五國中壤地最狹山川形勝則復嶺密箐迅流急湍非有平原廣澤之沃衍也風俗皆苗蠻雜處椎結侏離未盡漸被華風也我國家改易衛所俱置州縣又開自古不臣之古州清江諸處益以湖南四川廣西附近壤錯之府州縣幅􅊷益為式廓我皇上仁覆萬國無有遠邇以貴州之荒遠僻陋而山川風物遂與中土不殊然則文德誕敷有苗來格典謨所傳於今為烈矣述地理志貴州通志卷二地理輿圖貴州全省圖說貴州雖僻在西南一隅然東楚西滇南粵北蜀不與外夷接壤固居然腹裏之地也特以山箐阻深苖蠻雜處前代皆羈縻勿絶至明始置郡縣東西千里南北三百餘里形如蜂腰上下廣而中狹近益以蜀之遵義粵之永豐荔波又開設長寨南北之境幾與東西埓且古州八寨古昔化外之生苗今皆設官置鎮黔之四封屹然有截矣其山來自雲南宣威州之倘塘驛入大定之威寧州折而東南經水城以至安順盤江界其西烏江界其北南籠一府在盤江之西遵義一府在烏江之北大定則烏江諸水源沿其間此上游形勢之大較也自安順折而南由安順土州以至定番分南北兩枝其南枝由都勻八寨古州至黎平以入於楚粵閩越所謂南幹也其北枝則自清鎮安平至貴筑之老鴉關折而南結為省治南明河界其東南陸廣麻線諸河界其西北皆入於烏江者也都勻一府處南幹之脊都江發源於右經古州以入粵清江發源於左經台拱以入楚黎平夾兩江之間受都勻之委輸焉鎮逺思州在清江之北中有㵲溪水貫之亦謂之鎮陽江源自舊黃平經青溪玉屏以東之沅水者也平越石阡在烏江之南而平越之湄潭石阡之龍泉及思南一府又在烏江之北其山脉來自遵義其水則北界以赤水三江者也銅仁一府在省治之極東大小江諸水皆滙於楚之麻陽此下游形勢之大較也總十三郡計之大約山勢峭削少平原廣野之觀水流急湍無舟楫灌注之利師旅官吏之經費多仰給於鄰境然大定南籠扼雲南之咽喉銅仁思州踞湖南之腰膂思南遵義為四川之輔車都勻黎平處粵西之肘腋少有不靖不免有震鄰之虞則物力雖瘠薄而形勢固居要害矣我國家德威遐暢川嶽效靈四夷賔服惟黔中頑苖螳臂蜂蠆時或竊發然大兵所臨不旋踵皆禽獮草剃二而討之服而懷柔之因地以制宜擇人以任事使馴擾移易同於內地豈非守土者之責哉貴陽府圖說自有明隆慶時易程番府為貴陽遂為省㑹之首郡南南籠西安順北遵義東連平越都勻地處十三郡之中而貴山北峙南明東環靈秀亦甲於諸郡所轄三州四縣附郭曰貴筑西南百一十里州曰廣順其鎮山曰白雲其水曰麻綿入於烏江者也南一百里州曰定番南幹與省治之脉自此而分大幹迤而東南省脉迤而東北州有泉曰蒙潭濛江之源出焉或謂之牂柯江入於粵西者也東北百二十里曰開州有山曰南望千峰萬壑蒼翠接天洗泥河之水經焉北五十里曰修文昔安氏水外六目之地也水西以居陸廣鴨池河西者為內地地在河東故名水外云東五十里曰龍里百一十里曰貴定甕城河界其間北流入於巖門郡治之下遊也近者平定仲苗設同知於長寨在府東南百七十里形勢稱完固焉安順府圖說安順盤古州地踞省城之上遊作滇南之門戶自割一州二縣以𨽻南籠東西尚三百餘里南北二百里盤江之水界其西三岔河之水界其北遂為黔中之奧區焉領二州三縣附郭縣曰普定居幹脉之脊有山曰新坡髙廣數里為府治形勝西五十里為鎮寧州有山曰東坡輪囷盤鬱髙三十里州之鎮山也西百四十里為永寧州白河之水從髙而落瀑布飛流轟雷捲雪極天下之竒觀東六十里曰安平百二十里曰清鎮滴澄河之水介其間自郡城而東地勢漸平每每原田流泉灌注自郡城而西地益髙山益峻重巖復嶺行者苦焉近者設同知於郎岱郵傳出其途不須回九折之車矣舊有康佐土司地在府南百六十里山箐阻深苗仲雜處今者復設通判治之標嘉名曰歸化伏莾升陵庸足慮乎平越府圖說平越古播州地清水江界其西重安江環其南巖門江貫其中境內諸水多滙焉以達於烏江作省㑹之藩籬據楚蜀之要害所轄一州四縣附郭曰平越黎峨崷峻七盤縈紆髙峙城東險於蜀道魚梁一江兩岸壁立飛湍瀑流今則石梁砥平長虹卧波皇華四牡所取道也東百二十里為黃平州昔為興隆衛舊州治在其北㵲溪之源出焉州東有飛雲巖玲瓏詭異為黔中第一竒境東百四十里為餘慶縣白泥江環其東小烏江環其西俱㑹巖門江者也北五十里為甕安縣玉華之峰上插雲霄黃金之􅋭路通一線可稱邑中名勝北二百二十里曰湄潭縣城南之水環曲如眉故以名邑去郡治最逺孤懸巖門江外者也都勻府圖說都勻居省治之東南接粵西北與平越之地犬牙相入領二州三縣附郭曰都勻西有凱口囤最為險要近則龍山蜿蜒長河如帶張鶴樓之遺跡猶有存焉北五十里州曰麻哈貴人南蟠玊屏西峙為州治壯觀南北二十里州曰獨山有山焉羣嶂相聯一峰獨峙州因以名都江東逝經古州以入慶逺深河南流由定畨以過泗城皆入於粵西者也北百一十里縣曰清平有香罏峰形如博山四靣陡絶明時屢為諸苗巢穴而凱里一司尤為生苗出入之咽喉防守最須嚴密近又以粵西之荔波來屬去郡治二百餘里而南蔽之藩籬始固總之貴州環處皆苗歷來剽掠最甚者無如勻哈近者開八寨闢都江丹江設官以鎮撫之庶幾阻深暗昧咸耀光明矣鎮逺府圖說鎮逺為黔省之門户㵲溪一水下達沅湘檣帆輻輳雖地勢險隘不能建甓垣墉然據石屏山以為城帶鎮陽江以為池居然楚國之方城漢水也馬場鼓樓兩坡為諸苗出入必由之徑一泥丸可封昔人戍守之遺跡猶存也附郭自鎮逺而外所轄止施秉一縣幅􅊷稍隘往者九股生苗剽掠舊縣因遷治於偏橋以避之自台拱清江設官置鎮翻狡兔之窟作飲馬之川封畛所届懋遷化居雄於諸郡近又以湖南之天柱來屬茨嶺鐵坪東西環峙郡治東南益壯屏蔽焉思南府圖說思南古婺川地東西廣四百里南北袤五百六十里幅􅊷最為廣濶德江一水旋繞三靣東有萬勝山壁立千仞龍洞仙臺頗著靈異石峽芙蓉諸關雄峙東西形勢險固縣曰安化其附郭者也西四百里為婺川縣華蓋之山巖壑深邃前代倚為避世之桃源豐樂之水滙泉流而注烏江九杵一關據播州之要害前明平楊應龍時所爭戰處也南四十里曰印江縣峩嶺東亘思卭北流而湍瀨淺狹亂石嶙峋四方舟楫罕至焉石阡府圖說石阡南通鎮逺北距思南東抵銅仁西連遵義壤地在諸郡之中不與他省接南眺十萬山髙爽寬平楊再興屯兵之故壘在焉新開一河自明時知府郭元賔疏鑿安流遂通舟楫之利率作興事豈不存乎其人哉郡所轄止龍泉一縣在郡西二百五十里境內諸山連岡叠嶂雞翁北蟠義陽綏陽東西遙峙皆昔時故城廢縣之址古瓦頺垣深人慿弔而烏江南繞青溪北環稱襟帶之險固矣思州府圖說思州東北界楚西南接鎮逺於十三郡中疆域最為狹小近雖益以楚之玉屏青溪東西二百里南北三百餘里然特就各土司村寨孤懸於境外者極其所至而為言耳若辨方正位則南三十里即與沅州界北四十里即與鎮逺界矣顧向時之黔以鎮逺為門户今二衛來屬則又當以思為門户矧郡治之海龍溪玉屏青溪之界牌龍塘諸隘為紅黑諸苗出入之所必經扞蔽牧圉尤宜加意至若盤山龍溪縈紆峭聳郡城之壯觀也山擁三台巖開萬卷玉屏之勝概也青溪臨江為治地當孔道邑小事繁然治內北障瑞雲峥嶸突兀雲氣時往來其間風土瘠薄而形勝有餘矣銅仁府圖說銅仁居省治之東北隅西南與思南石阡接壤北則蜀東則楚松桃一營綰楚蜀之樞俗名為三不管之地實紅苗盤踞之區也其郡治則依翀鳳以為城襟大江以為池天乙之山峙其左銅巖之水繞其右舟楫西來沂沅水歷麻陽經郡治以達江口商旅輻輳亦西南之都㑹也𨽻郡者僅附郭銅仁一縣其境內名勝則泉名甘梗水源同出而清濁異流峽號金刀一峰劃開千仞如削中分而巔合皆錦州之竒觀也黎平府圖說黎平在省㑹之東南向者新疆未闢孤懸清水江外取道鎮逺天柱而後達黔中郡治去省之逺未有如黎平者然其地居楚粵之交都江南繞由古州以下粵清江北環由錦屏以歸楚古州湖耳等十三司環處其間明時置五開衛屬楚與郡同治軍民耦俱相猜致有五譁六譁之變則措置之未盡善也本朝以衛來屬改為附郭之開泰縣石門東障寶帶南環南六十里曰永從縣唐之福祿州也有山曰皮林髙出羣峯頗標靈異明將鄧子龍之遺蹟在焉東北百二十里曰錦屏昔楚之銅鼓衛也自屬黔中改而為縣石榴梅花峯回路轉巖壑隱秀西北八十里曰古州蓋古州有裏外之分今之建城置鎮者乃昔之裏古州歷代棄諸化外者也自兹由都江八寨西接都勻以達於省㑹黔之疆域封豕無驚版章式廓矣大定府圖說大定本水西烏撒地可渡河界其西南三岔鴨池諸河界其東南赤水河界其北大小天生橋落折渭河諸水分流其中東西五百八十餘里南北六百六十餘里山箐阻深巖洞幽邃幅􅊷之遼濶形勢之險固黔中諸郡殆未有過之者自本朝討定二安開設四府各置重鎮以控制之後改黔西平逺為州𨽻大定府旋改大定為州𨽻威寧府後以大定為府威寧為州所轄三州一縣西威寧北畢節東黔西南平逺府居其中藩籬密而呼應靈措置最為盡善府治為昔之大方城安氏之巢穴也鳯山東翔五老西拱六歸南環氣勢雄偉宜自漢至明時代滄桑而濟火之封相承不替也黔西昔之水西平逺昔之比喇壩織金杓裏諸關箐昔時羅鬼所負隅也威寧三靣接壤滇南烏門山徑﨑嶇石龍蜿蜒起伏昔之烏撒府也畢節當滇蜀之要衝七星關扼其西木稀關障其東舊畢節赤水二衛也水城居郡治之西南漢夷雜處復嶺回溪築城設官以資彈壓誠桑土綢繆之至計矣南籠府圖說南籠西控滇南聯粵雖從安順分置然所轄二州二縣東西廣七百餘里南北袤五百餘里固上遊重地也郡舊為南籠廰治緑海東瀦九峯西峙形勢開敞雄於西南郡西州曰普安唐之盤州元之普山府也西有香羅山即昔時之平夷縣治東有格孤山即明𫝊友德平雲南自曲靖率師搗烏撒之所取道也郡東北州曰永豐原割粵西西隆泗城地所置畫紅江以為界粵南黔北若天限之者北之縣曰安南有晴雲山崔巍峭拔境內諸山之鼻袓也東北之縣曰普安鸚鵡山聳峭於西江西坡綿亘於東往時驛道所經行者每以登陟為苦近改出松巋沿途翠竹虬松引人入勝焉遵義府圖說遵義昔附川東距省千餘里僻在一隅無關扼塞今者割入黔疆而北藩之形勢始壯其封域南鄰貴陽東接思南西連大定北至重慶之綦江縣其山自永寧之雪山關蜿蜒而來過仁懷之關門􅋭轉折盤曲特起崇巒則郡城之鎮山碧雲峯也旋而左者為遵邑之海龍􅋭居萬山之顛四靣陡絶昔播賊楊應龍倚為巢穴又左為桐梓之婁山關旋而右者為綏陽之桑木關鎮安州之龍硐關皆髙出雲表一夫守之千人坐廢所謂天險殆不過是水則烏江界其南迤而東北過思南入四川之彭水縣其西則赤水河限之黔蜀畫疆以此為界據山臨江廣袤二千餘里田賦關稅抵全黔之半豈非雄郡哉貴州通志卷二
