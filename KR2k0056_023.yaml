body:
  text: 貴州通志卷二十三武備師旅考唐堯克三苖於丹水之浦以服南蠻見竹書紀年注虞舜命禹征有苖殷成湯化異俗而懷鬼方出匡衡疏高宗三十二祀伐鬼方三年克之周宣王時南蠻叛命方叔伐之平王元年秦禦有蠻氏之戎是年晉文侯率蔡其侯擊蠻破之楚威王遣將莊蹻從沅水伐夜郎軍至且蘭㭬船於岸而步戰遂滅夜郎因留王滇中以且蘭有㭬船牂牁處乃改其名為牂牁詳苗蠻志赧王三十五年秦昭王使白起伐楚略取蠻夷始置黔中郡漢元鼎五年南粵反使越馳義侯遣别將巴蜀罪人發夜郎兵下牂牁江咸會番禺且蘭君恐遠行旁國虜其老弱乃與其衆反殺使者及犍為太守漢乃發嘗擊南粵者八校尉擊之會越已破漢八校尉不下中即將郭昌衛廣引兵還行誅隔滇道者且蘭斬首數萬遂平南夷為牂牁郡夜即侯始倚南粵南粵已滅還誅反者遂入朝以為夜郎侯始元元年牂牁談指同竝音伴等二十四邑凡三萬人皆反遣水衡都尉發蜀郡犍為奔命萬餘人擊牂牁大破之河平中夜郎王興與鈎町王禹漏卧侯俞更舉兵相攻遣大中大夫蜀郡張匡持節和解不從大將軍鳳薦金城司馬陳立為牂牁太守及至牂牁諭夜郎王興興不從命立請誅之未報立召興數責因斷其頭衆皆釋兵降事詳名宦志蜀漢建興元年夏牂牁太守朱褒反應雍闓二年南蠻反李恢擊敗之事詳名宦志三年丞相諸葛亮南征以牂牁蠻長濟濟火為先鋒所至皆捷事詳名宦志延熙八年涪陵夷反車騎將軍鄧芝討平之按晉志涪陵即夷費思播黔五州地十一年南夷豪帥劉胄反馬忠討斬之晉永昌元年李驤等寇寧州刺史王遜遣將姚嶽距戰於堂狼大破之遜以姚嶽不窮追寇鞭之怒甚冠裂而卒二年梁水太守㸑亮益州太守李逖以興古叛降於李雄三年以尹奉為寧州刺史募徼外夷刺㸑亮殺之諭降李逖咸和二年正月寧州秀才龎遺起義兵攻李雄將任回李謙等雄遣其將羅恆費黑來救寧州刺史尹奉遣禆將姚嶽朱提太守楊術援遺戰於登臺嶽等敗績術死之八年正月李雄將李壽陷寧州刺史尹奉及建寧太守霍彪並降於雄咸康二年廣州刺史鄧嶽遣都督王隨擊夜郎克之五年建寧人孟彥執李雄寧州刺史霍彪來降寧康元年十一月苻堅取梁益二州邛筰夜郎皆附於秦太元中苻堅為姚興所殺二州復為晉有宋元嘉十八年十二月晉寧太守㸑松子叛寧州刺史徐循討平之二十八年沿江蠻為寇遣太子步兵校尉沈慶之等伐之齊永明四年向宗頭與黔陽蠻田豆渠等五千人為寇巴東太守王圖南遣府司馬劉僧壽等斬山開道攻其寨宗頭夜燒寨退走梁承聖三年徵南寧州刺史徐文盛詣荆州土人㸑瓚據其地延袤二千餘里遂授瓚南寧州刺史許其子震玩承襲周保定二年蠻獠蜂反詔開府陸騰討平之按本傳騰量山川形勢隨便開道蠻獠畏威承風請服所開之路多得古銘並是諸葛亮桓溫舊道隋開皇三年㸑玩遣使朝貢命韋冲以兵戍之置恭州協州昆州以㸑玩為昆州刺史十七年㸑玩叛以史萬歲為行軍總管擊平之諸蠻大懼請降唐顯慶元年矩州人謝無靈反黔州都督李子和討平之天寶九載十月南詔閣羅鳳反取夷州三十二六年辰叙二州蠻反寇播州費州長慶二年黔中蠻叛劍南西川節度使假文昌使人開曉蠻引退開成三年牂牁蠻寇涪州清溪鎮鎮兵擊却之晉天福五年楚王馬殷遣八姓帥率雍管栁州兵討兩江溪洞留軍戍之遂各分據八番宋乾德二年四月溪叙奬等州民相攻劫遣殿直牛允齎詔諭之乃定至道二年六月黔州蠻寇鹽井巡檢使王惟節戰死大中祥符四年牂牁蠻寇掠轉運使寇瑊調兵擊之建炎二年調思州田氏兵討劇賊王闢紹興六年詔沿邉溪洞諸州置弓弩手知鼎州張觷言澧辰沅靖與溪洞接壞祖宗時嘗置弓弩手得其死力比緣多故遂皆廢缺因詔荆湖北路帥司以聞帥司言營田四川舊制弓弩手九千一百一十人習練武事散居邉境鎮撫蠻夷平居則事耕作緩急以備戰守深為利便今辰靖等州乏兵防守今誠復置分處要害量給土田訓練以時耕戰合度庶可備禦以所餘閒田募人耕作歲收其租其於邉防財賦各得其便可為經久之計詔從之二十四年三月猺賊楊再興寇邉前軍統制李道討平之乾道六年盧陽西口獠陽添朝寇邉知沅州孫叔傑調兵數千討之敗績初猺人與省戶交爭殺一人死叔傑輒出兵破其十三柵奪還所侵地於是猺人相結為亂諸司請調常德府兵三百人益官兵二千人合擊討之宰臣虞允文奏曰蠻夷為變皆守臣貪功所致今猺人仇視守臣若更去叔傑量遣官軍示以兵威徐與盟誓自可平定帝允其奏俾葉行代叔傑開示恩信諭以禍福遂招降之邉境悉平嘉泰元年土官宋永高平麥新以其子宋勝守之改麥新為新添新添名始此嘉定六年八月思州田宗範謀作亂䕫州路安撫司遣兵討平之寶祐四年五月羅氏鬼國遣報思播言元兵屯大理國取道西南將大入邉詔思播結約羅鬼為援五年四月元兵攻苦竹隘詔京湖調兵援應十一月詔京湖帥臣黃平清浪平溪分駐屯戍庚辰詔三邉郡縣官毋擅離職守諸制帥臣共嚴紏察元至元十五年七月壬午朔官軍襲張烈良劉應龍於思州烏羅洞宋湖南制置張烈良提刑劉應龍與周隆賀十二起兵行省調兵往討獲周隆賀十二斬之烈良等舉家及餘兵奔思州烏羅洞為官軍所襲二人皆戰死十六年兩淮招討使經厯劉繼昌招下西南諸番以龍方零等為小龍番等安撫使仍以兵三千戍之十七年三月甲辰思播州軍侵鎮遠黃平界命李德輝等往視之己未詔討羅氏鬼國命以䝉古軍六千哈喇章軍一萬西川雅爾哈萬嘉努軍萬人三道並進六月壬申遣官告蠻部安撫使王沃濟同萬戶咱坤招諭羅氏鬼國七月括䝉古軍成丁者敕伊蘭等率萬人入羅氏鬼國如其不附則討之九月丁卯羅氏鬼國主阿察及阿里降安西王相李德輝遣人皆入覲十月丁丑以湖南兵萬人伐亦奚不薛降之壬辰亦奚不薛以病遣其子入覲不許帝曰亦奚不薛不禀命輒以職授其從子無人臣禮宜令亦奚不薛出乃還軍十二月己卯羅氏鬼國土寇為患思播道路不通發兵千人與洞蠻開道戊子以征也可不薛軍千五百復還塔海戍八番羅甸十九年二月壬子詔僉亦奚不薛及播思叙三州軍征緬國三月辛酉朔烏䝉民叛敕納爾琿哈喇蘇默率蒙古漢人新附軍討之六月丁巳征亦奚不薛盡平其地立三路達嚕噶齊留軍鎮守命雅爾哈總之九月壬申亦奚不薛之北蠻洞向世雄兄弟及散毛諸洞叛命四川行省就遣亦奚不薛軍前往招撫之使與其主偕來二十年六月辛亥四川行省參政竒爾濟蘇等討平九溪十八洞以其酋長赴闕定其地立州縣聽順元路宣慰司節制七月丙寅立亦奚不薛宣慰司益兵戍守開雲南驛路分亦奚不薛地為三設官撫治之壬申亦奚不薛軍民千戶宋添富及順元路軍民總管兼宣撫司阿里等來降詔班師以羅鬼酋長阿利及其從者入覲立亦奚不薛總管府命阿里為總管二十一年四月壬寅敕發思播二家軍從征緬十二月劉繼昌諭降龍昌寧龍延萬等赴闕奉羊馬白氊來貢各授本處安撫司立宣慰司招撫西南等處酋長二十七年七月貴州苖蠻三千餘人作亂劫順元路入其城遂攻阿延寨殺傷官吏其衆遂盛湖廣省檄蔡州均州二萬戶府及八番羅甸宣慰司合兵討之三十年五月庫爾播等處亡宋涅手軍十二月遣使督思播二州及鎮遠黃平發宋舊軍八千人從征安南元貞元年始於黔中等郡置屯戍大德元年九月八番順元等處初𨽻湖廣後改𨽻雲南雲南戍兵不至其屯駐舊軍逃亡者衆仍命湖廣行省遣兵代之十二月播州宣撫司楊漢英請以己力討平伐等未附蠻仍命湖廣省達爾罕便宜收撫五年五月壬戍雲南土官宋隆濟叛水西土官之妻蛇節以其衆應之時雲南行省右丞劉深將兵征八百媳婦由順元入雲南調民供餽宋隆濟因紿其衆曰官軍徵發汝等將盡剪髮黥面為兵身死行陳妻子為虜衆惑其言遂叛蛇節亦以劉深脅取其金三千兩馬三千匹遂偕羅鬼諸蠻以應焉六月丙戍宋隆濟攻黃楊寨壬辰攻貴州知州張懷德戰死梁王遣雲南行省平章綽和爾參政布哷齊將兵禦之殺賊酋散月斬首五百級十一月丁未遣劉國傑及額森呼圖克婁將兵萬人巴爾及阿克塔齊將兵五千人征宋隆濟六年正月乙卯增劉國傑等軍仍令屯戍險隘俟秋進師二月丙戍遣陜西省平章伊蘇岱爾參政汪惟勤將川陜軍湖廣平章劉國傑將湖廣軍征亦奚不薛一切軍務並聽伊蘇岱爾劉國傑節制罷征八百媳婦右丞劉深等官收其符印驛劵三月烏撒烏䝉東川芒部及武定威楚普安諸蠻因蛇節之亂乘釁起兵攻掠州縣命伊蘇岱爾分道率師討平之十一月甲午劉國傑禆將宋光率兵大敗蛇節賜衣二襲仍授以金符十二月丙子劉國傑額森呼圖克婁來獻蛇節羅鬼等捷七年四月劉國傑師出播州境大破蛇節於墨特川庚辰蛇節降令哈拉蘇將兵五千守之餘衆悉遣還撥四川碉門軍一千人鎮羅羅斯其土軍修治道路者悉令放還丁亥誅蛇節十一月亦奚不薛賊黨魏傑等降人賜衣一襲遣還俾招其首亂者八年正月庚申以雲南順元同知宣撫事宋阿重生擒其叔隆濟來獻特升其官賜衣一襲十年四月雲南羅雄州軍火主阿邦龍少結豆溫匡虜普定路諸蠻為寇右丞汪惟能進討賊退據越州諭之不服遣平章伊蘇岱爾率兵萬人往捕之兵至曲靖與惟能合從諸王實保齊伊埓吉達等進壓賊境獲阿邦龍少斬之餘衆皆潰命伊蘇岱爾留軍二千戍之其從軍有功者皆加賞賚至大三年正月辛丑乖西帶蠻阿滿等連結萬人入寇遣萬户伊喇薩納及調思播土兵討捕樞密院臣等議事勢緩急地理要害薩納備知乞聽其便宜調遣制可延祐五年十月己丑播州南寧長官洛麼作亂思州守臣罕珠格爾招諭之洛麼遣人以方物來覲至治二年十二月葛蠻安撫司副使龍仁貴作亂湖廣行省督兵捕之三年十月丙戌八番順元諸路猺兵為寇敕湖廣雲南二省招諭之泰定元年七月丙戌思州平茶司楊大車酉陽州冉世昌寇小石耶凱江等寨調兵捕之二年七月丙辰播州蠻黎平愛等集羣夷為寇湖廣行省請兵討之不許詔宣撫使楊雅爾巴哈招諭之十月癸巳播州凱黎苖率諸寨苗獠為寇丁巳岑世興結八番蠻班光金等合兵攻石頭等寨敕調兵禦之八番宣慰司官失備坐罪三年正月丙午播州宣慰使楊雅爾巴哈招諭蠻酋黎平慶等來降三月癸巳八番巖霞洞蠻來降願歲輸布二千五百匹設蠻夷長官鎮撫之四月丁卯岑世興及鎮安路岑修文合山獠各六萬餘人為寇命湖廣雲南行省招諭之六月癸未播州蠻黎平愛復叛合謝烏窮為寇宣慰使楊雅爾巴哈招平愛出降烏窮不附命湖廣行省討之天厯二年正月丁亥四川囊嘉特攻破播州苗兒埡隘宣慰使楊雅爾巴哈開關納之壬午播州楊萬戶引四川賊至烏江岸官軍敗之八番元帥脫出亦破烏江北岸賊兵復奪關口諸王裕嚕特穆爾統䝉古漢人逹爾罕諸軍及民丁五萬五千俱至烏江二月丙午囊嘉特分兵逼襄陽湖廣行省調兵鎮播州及歸州癸丑諸王裕嚕特穆爾等至播州招諭土官之從囊嘉特者楊雅爾巴哈及其弟等皆來降四月湖廣行省參知政事博囉奉詔至四川赦囊嘉特等蜀地悉平諸省兵皆罷八月囊嘉特以指斥乘輿坐大不道棄市至順元年正月雲南諸王托卜嘉及萬戶博勒呼等反二月攻陷仁德府至馬龍州調八番元帥旺扎勒將八番逹爾罕軍千人順元土軍五百人禦之三月甲寅乖西䚟蠻三千人入松黎山燒沿邊官軍營堡戊午以八番順元宣慰特穆爾巴哈為雲南省左丞從豫王由八番道討雲南四月壬寅祿余殺烏撒宣慰司官吏降於博勒呼羅羅諸蠻俱叛與博勒呼相應平章特穆爾巴哈為其所害戊申祿余以蠻兵七百餘人拒烏撒順元界立關固守五月甲戌八番乖西䚟苖阿滿察伯秩等萬人侵優邊境詔樞密臣分兵討之乙亥置順元宣撫司統逹喇齊軍征雲南人賜鈔五錠豫王喇特納實哩等由八番分道進軍七月丁丑托卜嘉博勒呼等勢愈猖獗烏撒祿余亦乘勢連結烏䝉東川芒部諸蠻欲令博勒呼弟巴雅遜等攻順元樞密院以聞詔即遣使督豫王喇特納實哩及行樞密院四川雲南行省亟㑹諸軍分道並進十月乙亥四川行省平章托爾楚引兵由永寧左丞博囉引兵由青山芒部並進陳兵周泥驛及祿余等戰殺蠻兵三百餘人祿余衆潰即奪其關隘以導順元諸軍十一月十三日戰於馬金山獲博勒呼及其弟巴雅遜等誅之餘兵皆潰獨祿余猶據金沙江四川行省臣托爾楚圖卜特穆爾等以十一月九日領兵至烏撒周泥驛明日祿余阿奴阿答等賊兵萬餘自山後間道潛出托爾楚圖卜特穆爾等進擊屢戰敗之十五日又戰七星關六日凡十七戰賊大敗潰去新添安撫司甕河寨主訴他部猺獠蹂其禾民饑命湖廣行省發鈔二千錠市米賑之二年正月戊寅徹爾特穆爾擊敗烏撤蠻兵射中祿余降其民九月庚寅祿余寇順元路丁酉雲南行省遣都司諾海鎮撫欒智等詔諭祿余授以參政制命至撒家關祿余拒不受俄而賊大至諾海因與力戰賊乃退及晚烏撒兵入順元境左丞特穆爾巴哈禦戰諾海復就陳宣詔招諭遂遇害特穆爾布哈等斂兵還三年己酉祿余言於四川行省自父祖世為烏撒土官宣慰司使佩虎符素無異心曩為伯忽誘脅比聞朝廷招諭而今期限已過乞再降詔赦即率四路土官出降仍乞改屬四川省𨽻永寧路冀得休息四川行省以聞詔中書樞密御史諸大臣雜議從之祿余降二十二年鎮遠州知州田茂安降於四川明玉珍明玉珍初為紅巾賊黨倪文俊僞元帥據守川蜀至是年據成都自稱隴蜀王二十三年僣稱皇帝建國號曰夏玉珍置思南道都元帥府即今思南府治遣指揮李芝麻帥兵由八番分陷雲南出平夏録是時貴州屬玉珍明洪武五年三月辰州一十八洞及九溪九渡米坪散毛狋溪等洞蠻共連結作亂命衛國公鄧愈為征南將軍楊璟為副討平之復命江隂侯吳良率指揮胡海等攻銅鼓五開曹滴騰浪篤莫洪州古州等蠻平其洞寨百餘所皆編户附籍輸糧奉法七年平伐谷霞谷浪等苖攻劫的敖諸寨指揮僉事張岱討之岱攻谷峽刺向關破之追至的敖大破之擒的令的若而還蠻大讋八年貴州江力江松刺回四十餘寨苖播具播共桶等連結苖獠二千作亂平越安撫司乞兵援命指揮同知胡汝討之九年黃平蠻獠都麻堰亂宣撫司捕之不克千户所以兵討之亦為所敗乃命重慶諸衛合擊大破之平其地十年安陸侯吳復破普定阿買寨十三年五月湖南五溪蠻作亂江夏侯周德興請行征討師至蠻悉散走不敢復出十四年九月命潁川侯傅友德為征南將軍永昌侯藍玉西平侯沐英為副將軍列侯吳復金朝興仇成張龍王弼都督張銓等率師三十萬討雲南友德至湖廣分遣都督胡海郭英陳桓等領兵五萬由四川永寧趨烏撒友德等率大軍由辰沅趨貴州進攻普定擒土酋安瓚諸蠻苖犵狫聞風迎降友德下普定留兵戍守十二月友德等兵攻普安下之戊寅克烏撒取七星關以通畢節又克可渡河於是東川烏蒙芒部諸蠻悉定時元右丞實卜聞胡海等進自永寧乃聚兵赤水河以拒之海等造木筏夜半濟河而友德亦至實卜遁去友德令將士於烏撒築城版鍤方具蠻衆復合遂出兵斬首三千餘級餘衆潰散遂城烏撒進取諸部十五年四月烏撒諸蠻復叛傅友德沐英會兵進討斬首三萬餘級諸蠻來降以烏䝉烏撒芒部地近四川分𨽻之八月命安陸侯吳復充總兵官平凉侯費聚為副勦捕普定等蠻破寨數十十八年四月思州苖叛命信國公楊和江夏侯周德興帥師從楚王楨討平之九月乙亥五開諸洞蠻吳奤兒寇古州命湯和從楚王剿捕十月乙卯湯和平古州詔楚王還國十九年六月甲辰平越麻哈苖楊孟等叛傅友德討平之二十年十一月靖寧侯葉升普定侯陳桓討東川普定諸蠻平之二十一年九月普安土知府普旦連結阿資馬乃叛陷普安府友德遣將討之生擒一千三百餘人沐英亦遣都督寧正從擊阿資大敗之阿資遂降二十二年五月黃平狼洞蠻叛傅友德討平之都督何福奏討都勻叛苖斬四千七百餘級擒獲六千三百九十餘人收降寨洞一百五十二處二十三年正月貴州苖叛延安侯陸勝宗討平之都勻散毛散狗二蠻叛凉國公藍玉遣鳳翔侯張龍討平之西平侯沐英奏普安百夫長密即叛殺屯田官軍及驛丞並百户調指揮張泰討之於盤江木窄關官軍失利更調指揮蔣文統烏撒畢節永寧三衛軍剿之乃遁二十五年正月命都督俞通淵統貴州辰沅各衛軍征古州諸蠻以次平復九名九姓蠻亂命何福平之二十六年普定西堡長官司阿德及諸寨長作亂命貴州都指揮顧成討平之二十八年八月貴州蠻阿榜及曹寧等司叛守將顧成討平之二十九年十一月命都督顧成率貴州都司軍馬征勦水西不納糧差諸蠻十二月成破濶水克宗那革賈母龍等洞寨斬首三千餘級俘萬餘人諸蠻懾服平浪洞水寨蠻狄把殺土官王應名都指揮陳暹討平之清水江金牌黃作亂都司發兵捕之金牌黃遁去帝以賊首賈哈剌未獲募能擒者賞千金未幾捕獲五百人械至京以其脅從宥死戍遠衛有言金牌黃匿宣慰家者詔勿問三十年三月古州蠻林寬叛龍里千户吳得鎮撫井孚死之五月乙卯楚王楨湘王柏率都督楊文等征清平黔陽古州諸蠻悉平之鎮遠鬼長箐等處苖民作亂指揮萬繼百户吳彬戰死都指揮許能率兵會偏橋衛軍擊敗之衆散走永樂七年播州楊升請勦尚科等寨不許九年正月敕貴州都司發兵討交趾宣德元年平浪賊紀那阿魯等占副長官地殺掠葉果諸寨招諭不聽詔蕭授討平之新添土舍宋志道紏洞蠻肆掠蕭授討平之鎮遠邛水奧洞蠻苖章奴劫掠清浪道中為思州都坪峩異溪長官司所獲其父苖銀總劫取之聚兵欲攻思州因令赤溪洞長官楊通諒往撫銀總伏兵殺諒又掠埂洞命總兵蕭授調辰沅諸衛兵萬四千人勦之會於清浪衛授奏指揮張名討銀總克奧洞盡殺其黨銀總遁二年水西宣慰頭目阿閉妨宜與普定衛西堡長官蠻民阿骨阿哈共為亂貴州總兵官蕭授上書請討上不許敕遣官撫諭已而授奏阿閉妨宜為傍寨所殺惟阿骨尚猖獗請調兵討之未幾平五年烏羅知府嚴律已言所屬治古答意二長官石各野等聚衆出沒銅仁平頭瓮橋諸處誘脅蠻賊石雞娘并筸子坪長官吳畢郎等共為亂招撫不從緣其地與鎮溪酉陽諸蠻接境恐相煽為亂請調官軍土兵分據其地絶其糧且捕且撫事平之後宜置衛所巡司以守之事聞命總兵蕭授及鎮巡諸司議授築二十四堡環其地守之兵力分卒難扞禦四出劫掠殺清浪衛鎮撫葉受勢益獗巡按御史以聞言生苖之地不過三百餘里乞别遣良將督諸軍殄滅授復言殘苖吳不爾等遁入筸子坪結生苖龍不登等攻劫湖廣五寨及白崖諸寨為患滋甚宜令川湖貴州接境諸官軍土兵分路併力攻勦庶除邉患從之既降敕諭授言暴師久恐蹉跌為蠻羞或撫或勦朕觀成功不從中制七年陳䝉爛土副長官張免奏所司去衛遠地連古州生苖與廣西獠洞近化從寨長韋翁同等煽亂乞立堡併請調泗城州土兵一千鎮守從之八年總兵蕭授奏言臣受命統率諸軍進攻賊巢破新郎等寨前後生擒苖賊首吳不跳等二百一十二人殺吳不爾王老虎龍安軸等五百九十餘級餘黨悉平將所掠軍民男婦九十八口悉給所親獲賊婦女幼弱一千六百餘口以給從征將士並械吳不跳等獻京師帝顧謂侍臣曰苖蠻好亂自取滅亡然於朕心不能無惻授威服南荒前後凡二十餘年九年韋翁同紏下高大刀蠻合廣西賊韋萬良等恣殺掠指揮陳源討擒賊首萬良等三人翁同遂聽撫而落昌蔡郎等四十寨仍聚衆拒敵總兵蕭授遣指揮顧勇進討未幾賊平丹行土舍羅朝煽誘寨長卜長逃民羅阿記等侵占卧龍畨長官龍保地又攻猱平寨肆焚劫時苖民素憚指揮李政尚書王驥因奏遣政往撫諭從之正統四年計砂苖賊苗金蟲等紏合洪江生苖僞立統千侯統萬侯名號劫掠四出命都督蕭授調兵勦之賊首苖總牌等為都督吳亮所戮洪江生苖遂詣軍門降授諭遣之而命千戶尹勝誘斬苖金蟲以狥十四年二月邛水苖陷思州府爛土凱口苖攻都勻城官軍却之草塘苖龍惟保陷石阡府知府胡信死之連陷平越衛黃平所及思南府命總督兵部侍郎侯璡副總兵都督方瑛率兵討之苖賊攻赤水城都司張祥死之景泰元年命保定伯梁瑤佩平蠻將軍印督師勦蠻先是正統中兵部尚書王驥征麓川悉調貴州兵以行久之諸苖反驥還討擒酋韋富撓等獻俘驥以老病告歸使侯璡代之璡駐師雲南相去遠保定伯梁瑤自湖廣奉命入貴州未至其當推貴撫無敢往者獨修撰王恂慨然請行行則平越新添畢節龍里諸衛已圍困久兵少難進時值吏部侍郎何文淵上言貴州總兵官生事激變已非一日今兵疲民困又當遣將征南之際湖廣雲南四川三布政司轉運不給貴州山高嶺峻本難設守蠻人叛服不常乞敕兵部會議其被賊燒燬官舍勿再造暫將布按以下及各府大小官吏并從征官軍一切撤回祗照洪武年例設宣慰使司管屬土人設都司都指揮等官鈐束軍衛而以大將鎮守之便時邉警方亟衆唯唯謂文淵言是獨兵部尚書于謙執不可以為太祖高皇帝開創於前成祖文皇帝經營於後迄今將百年矣法制已定勢無可更比來邉將處置乖方加以征南之師數出遂致賊寇竊發勞師逺征然且一年之間各該城池雖被圍困而官將死守未之稍變今總督總兵參將巡按三司等官初未嘗言此地可棄其請兵請餉亦未嘗言此地難與守也夫土地者祖宗之土地人民者祖宗之人民萬一缺軼猶宜補救今堂堂布按盡轄其地小有枝梧而動言棄擲日蹙百里伊誰之咎文淵先曽奉使貴州備諳山川險易夷情向背宜量從升職給敕以往令相度形勢便宜行事至賞賜銀幣即就彼官庫支給不必京師運發議定請㫖帝是謙言然不復差官祗著侯璡梁瑤整理進勦時王驥尚候代未行并敕協力於是副總兵田禮進兵解平越圍侯璡調都指揮鄭俊及都盧等寨宣慰瓏宜勦水西梁瑤調雲南兵由烏撒會於畢節調普安州土官隆本援安南衛遂克彌勒安南等二十餘寨降阿蒙等五寨賊復圍平越璡回兵擊却之分哨七盤坡羊腸河楊老堡解清平圍仍哨清平迤東至重安江與王驥兵會自是隆安至鎮遠道路皆通而普定之圍未解璡選雲南善射者為前鋒自將之至普定疾戰矢下如雨賊大敗驅之時田禮等以兵來會遂大破龍里瓮橋及新添平越清平都勻諸賊貴州平苖酋韋同烈據香爐山叛羿蠻叛攻永寧指揮吳玲率兵敗之保定伯梁瑤右都御史王來督參將都督方瑛陳友等征湖廣貴州叛苖二年三月右都御史王來討韋同烈平之先是安莊女苖撒得為土舍林夭仲妻不相能值富蠱倡亂得乃挾土兵三人牛四頭從富蠱圍平越蠱感之迎得巨魯寨通得住三日許事成為后會王驥征麓川歸乃擒蠱并得解京師時香爐山賊惟蠱與韋同烈最强夭仲憾妻得奔蠱曽借同烈兵殺得不克至是得自請於朝願為香爐山向導立功贖死值于謙遣國初降番徙置河間東昌者令從征香爐山勒留南中以絶也先之應於是許得請苐殺蠱而使得為向導帥降番行且指之曰苖女之美如是也以歆之得乃引保定伯梁瑤直搗同烈巢擒之而夭仲戰死先是永樂間邉塞來降者多安置於河間東昌諸郡嘗慮其乘釁騷動至是發兵征湖貴二廣冦盜兵部尚書于謙請籍其有名號者厚與賞犒隨軍征進事平遂奏留於彼於是數十年積患一旦潜消水西永側夷叛攻平霸城官軍敗之五年巡撫王永壽以苖賊䝉能攻圍龍里新化銅鼓諸城乞調兵勦之而賊欲取龍里為巢穴急攻破亮寨銅鼓羅圍堡諸城都指揮汪迪為賊所殺朝議以南河伯方瑛為平蠻將軍統湖廣諸軍討之䝉能紏賊三萬出攻平溪衛瑛遣指揮鄭泰等以火鎗攻之斃賊三千人能亦被殺而能黨李珍等尚煽惑苖衆官軍計擒之克復銅鼓藕洞連破鬼板等一百六十餘寨覃洞上陸諸苖悉降天順三年督理軍務都御史白圭與南河伯方瑛征東苖平之圭以谷種山箐乃東苖羽翼宜先勦因同瑛進青崖總兵李貴進牛皮箐參將劉玉進谷種參將李震進鬼山所向皆捷克水車壩等一百四十七寨諸將復合兵青崖攻石門山克擺傷等三十九寨仍分兵四路進攻董農竹蓋及甲底等四百三十七寨賊首干把豬退守六美山合兵大進斬五千餘級生擒干把豬至京伏誅先是麻城人李添保以逋賊逃入苖中自詭為唐後聚衆萬餘僣稱王建元武烈立故賊首蒙能子聰為總兵官遺之銀印敕書縱兵剽掠震動遠近至是為李震所敗餘賊大潰添保僅以身免潜入鬼池及絞洞諸寨煽惑諸苖劫攻中林龍里亦為震擒伏誅四年西堡蠻賊聚衆焚劫鎮守貴州內官鄭忠右副總兵李貴請調貴州土兵及川雲都司兵共二萬并貴州宣慰安隴土兵二萬進勦至阿果擒賊首楚得隆等斬首二百餘級餘賊奔白石崖復斬級七百餘焚其巢全師還七年鎮守湖廣太監郭閔奏洪江南洞賊苖蟲蝦等紏合二千餘人僞稱王侯攻劫鎮遠囤寨殺掠人民撫諭不服誠恐滋蔓當合兵進討命總兵李震李安等分道入賊退守平坤寨追至清水江獲蟲蝦并斬賊首飛天侯苖老底額頭等六百四十餘名并復黎平之赤溪南洞遂平成化三年打罕州土蠻韋阿禮叛調泗城兵討平之打罕屬永寧州十一年總兵官李震奏烏羅苖人石全州妄稱元末明氏子孫僣稱明王紏衆於執銀等處作亂鄰洞多應之因調官軍往勦石全州已就擒矣而諸苖攻劫未己命鎮巡官設䇿捕撫以聞未幾平十四年貴州總兵吳經奏西堡獅子孔等苖洞亂先調雲南兵八千助防守聞雲南有警乞改調沅州清浪諸軍應援十五年吳經奏賊阿屯堅婁等皆已擒斬以捷聞陳䝉爛土長官司張鏞奏夭壩干賊首齎果侵掠又請於所侵大陳大步等寨設一司𨽻安寧宣撫而豐寧長官司楊泰亦奏峯峝陸光翁等聚爛土為亂先是宣慰楊輝平夭壩干後即灣溪立安寧宣撫司爛土諸苖惡其逼已至是果等既攻陷夭漂遂圍豐寧時輝已致仕子愛承襲力弗支求援於川貴二鎮各奏聞命仍起輝會兵討之十六年鏞復奏齎果紏合九姓豐寧并荔波賊萬人攻剽愈亟帝責諸守臣玩寇於是巡撫謝果言自天順四年以來諸苖欲劫丹溪等處不靖至今乃命鎮守太監張成總兵吳經相機勦撫二十年爛土苖賊龍洛道等攻劫丹溪等處僣號稱王且欲犯都勻清平諸衛而豐寧長官楊泰與土目楊和有隙誘廣西泗城州農民九千於鐵坑等一百餘寨殺掠苖賊愈盛二十三年巡撫孔鏞誅清平苖阿溪阿溪者清平衛部苖狰獰多猜有養子阿剌饒膂力能披甲三重躍地而起越三五丈兩人謀勇相資橫行諸苖間假子母罔苖利而誘他苖為偷兒間劫旅商有官兵探捕者反為之居間邀重賂否則捕遠苖之不伏己者强指為賊鎮巡以下則夤納歲幣以為之地巡撫孔鏞初到官患之詢之監軍總帥皆譽溪剌如一口鏞大怒親往清平訪部曲中最能者得指揮王通歷詢苖害始備言所以夤緣要上官者鏞詢其人為誰曰指揮王曽總旗陳順也乃以曽為巡官使順誘溪剌出寨取之苖俗喜鬬牛順乃覔好牛置中道伏壯士百人於牛旁叢薄間乃入寨見溪溪曰新都堂何如曰懦夫無能為也溪曰聞渠在廣東殺賊有名何為無能順曰同姓者非其人也因縱談鬬牛事順曰適見道中牛恢然巨象也未審比公家牛若何溪剌遂牽牛聨騎出至牛所觀而喜之忽報巡官至矣順曰此乃王指揮耳溪剌往迎會伏兵起叢薄間擒之至鏞前溪垂首不語剌獨仰頭視鏞曰吾不畏千萬人獨畏一孔公然不知擒我若是易也溪剌死有子竄都勻檄往擒之悉殪焉𢎞治二年爛土苖賊七千人攻圍楊安堡都指揮劉英統兵覘之為所困命鎮巡官往援出之四年爛土酋乜富架重惡龍等叛五年四月副都御史鄧廷瓚總兵鎮遠侯顧溥帥師討爛土蠻七年諸軍進勦分路追討令熟苖詐降於賊乜富架長腳等誘令入寇伏兵擒之直搗其巢凡破一百十餘寨以捷聞於是始開設都勻府及獨山麻哈二州十六年五月命南戶部尚書兼副都御史王軾督兵討普安苖米魯平之米魯者普安州土判官隆暢後妻也嘗以忤暢出居其父霑益土知州安民家暢前妻子禮因暢老奉朝命替暢為判官而聽營長阿保讒父子間不相能魯覘知之諷阿保使禮迎已同室居禮因蒸魯暢聞大怒立殺禮燬阿保寨阿保乃挾魯統其子阿鮓莫阿歹兒攻暢暢敗竄之雲南時東寧伯焦俊為總兵官與巡撫錢鉞召阿保及暢曲為調釋而讋以官法各唯唯於是魯遂隂中暢毒暢死阿保與魯據寨反會暢别有妾適烏生二子曰珀曰瑢居安南堡魯欲并殺珀瑢絶暢後於安南城外築阿先硬寨阿保與魯親守之而别築青黑猴場查剌三硬寨於普安州拖長江諸處令阿鮓莫阿歹兒互為防守更名所居寨為承天寨號無敵天王出入建黃纛御史張淳飭捕之不克賊益橫鎮巡官以聞十一年乃命發十衛官軍及諸長官司土兵萬三千餘人分道進兵且召安民責以匿賊狀使殺賊自贖民乃率土兵攻斬阿保父子於查剌寨魯走匿安民家安民隂資魯兵五百襲殺適烏及二子珀瑢密遣營長福祐隨魯據别寨肆殺掠且投牒鎮巡乞以女土官襲職巡撫錢鉞及副使周鳳都指揮劉英吳遠指揮任禮張英楊芳太監楊友總兵官焦俊皆受魯賄請宥魯聽襲朝議獨不可切責之必得魯乃已會副使劉福自謂知兵衆倚之進討營於阿馬坡而福仍作移文取賊賂賊憤甚乃襲殺周鳳吳遠劉福等執楊友而布政司閭鉦指揮史韜李雄郭仁李宗武等皆轉戰死上乃命南京兵部尚書王軾巡撫陳金都指揮李政等統官軍進勦奪楊友還破阿舊阿滿阿黑阿維二十餘寨斬寨首阿烏阿宗及福祐子阿咎而米魯福祐皆走匿馬尾籠大兵合圍擒斬之而下安民於獄既而赦之正德元年暢族土婦適擦襲土判官職親赴京朝賀貢馬上甚嘉之或曰適擦亦暢妾正德三年金石酋石承寵卧龍酋王阿倫叛六年六月江津賊方四等寇思石貴州兵敗之八年巡撫陳天祥討王阿倫等平之十年銅仁苖龍童保與鎮溪苖龍麻陽筸子坪百夫長龍真紏衆為亂都御史沈林湖廣都指揮潘勳會兵征之連破鎮筸亞酉亞保生擒童保麻陽及其家口而釋餘叛者十二年八月湖貴巡撫都御史秦金鄒文盛合兵討清平香爐山苖平之先是清平苖阿旁阿革於十一年據香爐山稱王遍攻興隆偏橋平越新添龍貴諸鎮道路皆阻巡撫曹祥檄諸路兵進勦不克乃奏請總兵李昻及湖撫秦金會勦擒賊阿革阿義阿黎而香爐山險百攻不能下乃雜製繩梯及鐡猫爬山虎諸具督令宣慰彭九霄彭明甫等選精鋭緣崖而上拔木柵縱火焚巢斬賊首阿旁等乘勝勦黑苖破龍頭寨及都蘭都蓬密西大支馬羅擒酋阿兹等其夭漂夭壩黎從楊保苖坪諸寨悉聽招撫復業者三千八百餘户斬首一千五百九級通撫苖衆三百七十五寨捷聞下璽書奬諭賞賚有差十四年芒夷叛寇永寧嘉靖四年參將何卿征芒部平之六年芒夷復叛八年副總兵何卿復平芒部叛夷九年真州賊周天星等寇婺川縣境十年巡撫劉士元討真州賊平之十六年都御史汪珊討凱口囤苖平之都勻苖王阿向者屢據凱口囤稱亂官司不能制遂於十五年攻平浪鎮巡官招之不下詔遣巡撫陳克宅調漢土官兵三萬集囤下囤故絶險賊復於要害設弩樓壘石防守攻三月不克乃先分兵歷破賊黨凱酋等囤隨招降附近諸苖四十九寨賊稍離散然後令土官安萬銓購壯士能猿攀者乘夜雷雨以鐡鈎縳手足若指爪然攀巖援木以上然後用軟梯鈎繩使衆軍魚貫躡絶頂發弩石下擊總兵楊仁等督各哨仰面夾攻之萬銓兵自山後馳下開囤門遂斬阿向及賊黨十餘人凱口盡平先是阿向之祖世襲土官忽為平浪王仲武先人用計奪襲遂為世讐及凱口既平克宅議盡逐苖黨以其地屬都勻府召軍民佃種改前囤曰滅苖鎮仲武因諸夷失業隂遣人招復旋科索之諸苖怨望私推阿向餘孽王聰王祐朱兔等為主謀紏合黑苖與其黨復攻據前囤驅逐耕種軍民多所殺虜鎮巡檄副使參將守備等官分領土義兵進勦賊乘雨夜襲破諸營生執參將李宗祐指揮陳佐周鍾并百户軍舍等三十餘人詔革總兵楊仁及前任巡撫陳克宅職而下王仲武於獄既而巡按御史楊春芳遣官撫諭賊願釋宗祐等謝罪而訖無成說至是都御史汪珊仍調土官安萬銓都指揮朱文指揮李木統漢土官兵三萬有竒集囤下萬銓親率花鎗手與賊相拒賊敗走渡河萬銓追之朱文等三面並進因樹招降旗於道賊走旗下者五百餘人聰兔據險下矢石我兵殊死戰遂破其囤斬兔等聰冒雨潰圍出為萬銓部兵所執已而賊酋王祐等復入據囤隨執之賊平前後斬首二百六十三級降苖寨一百五十俘獲賊黨男婦二萬餘口十九年金石司酋石顯高叛官軍討平之二十一年銅鎮苖叛陷石阡府執推官鄧本中二十七年九月以張嶽為右都御史總督湖川貴兵討銅鎮苖苖賊龍許保陷印江縣羅番龍受祖叛官軍討平之二十九年銅仁苗陷思州府知府李允簡死之三十一年金筑賊阿季叛官軍討平之三十二年總督張嶽進討湖貴苖平之蠟爾山界辰州銅仁之間最為險峻先是有筸子坪土官田興爵者以事繫辰州諸苖賄吏隂脫興爵歸藏蠟爾山久之興爵稍聚衆自大會銅仁苖久逋賦知府按逋籍責見户見户且亡命知府乃責其土官償之於是平頭長官與所部諸苖逃奔興爵共保蠟爾稱兵反官軍討之不能克鎮巡上其事上特就家起萬鏜為副都御史開府辰州命相機進𠞰鏜徵諸路漢土兵討之仍不克至二十五年湖廣巡撫姜儀言鎮筸銅平諸苖皆互相結援而土官從征者復故為隂縱以牽掣之遂至蔓衍不可拔自今以後宜專責宣慰彭藎臣彭明輔指揮田應朝等督土兵同漢兵會𠞰不克者治之以法如是則事可立辦上是之於是遣侍郎張嶽督諸路會𠞰責成土官之從征者遂破蠟爾山斬其渠且以計擒興爵等並杖殺田應朝而其亂始定田應朝者本土指揮使以田氏與興爵同族鏜用為巡捕使伺興爵應朝反結興爵煽諸苖亂是時鎮筸銅平及貴州諸苖龍許保吳黑苖等皆其所隂結為應援者至是杖殺之萬厯六年招降夭漂諸苖夭漂者苖坪黑苖種也在湖貴川廣界與者亞鼎足居每入漢必道者亞顧為生苖前此未為漢所屬至是夭漂阿蓋等三十餘人詣長官金篆所願輸賦役為編氓請刻木立信都御史何起鳴下兵巡蘇愚問狀遣指揮郭懷恩及金篆同往而阻於者亞乃遠從丹彰間道通夭漂會苖坪黨銀等十餘人亦詣篆所同夭漂所請皆以者亞閉關不得通時都御史王緝新赴官使使者簿責者亞酋阿斗斗叩頭服謂我等本平定部也為養善牌所誘因暫去平定而歸養善今養善奴視我閉關所以拒之也今願往平定緝謂平定孱弱無可藉其願往詐也此必有主謀其間者下吏案驗吏乃呼阿斗密詢之果得實謂漢人夭金貴及張受主謀教言往平定而實隂借諸䝉兵以襲養善乃治夭金貴等罪令者亞一十五寨仍屬養善牌如初而者亞路通於是苖坪夭漂皆請奉貢賦名其牌曰歸化𨽻都勻版籍凡使往自生齒以上悉跪拜送使至平定夾騶從行前吹蘆笙杖鼓唱蠻地歌呼道而馳事聞上嘉之後者亞阿斗反伏誅乃罷樂平吏目加麻哈州州判一人令居樂平司以養鵝者亞羊場落邦諸苖屬焉七年毛吳墜苖亂都御史王緝撫定之毛吳墜者永寧苖寨也其鄰有長牛阿田者於隆慶初曾出劫都指揮陶鼎持斧逐捕之中流矢死而毛吳墜酋長光賽光見攻剽羅紹華張斌匡廷鑾寨殺羅顯竒五人斌等上變言賽見反并及長牛殺指揮事詔令都御史王緝御史馬呈圖督兵進勦緝與呈圖疑所上不實遣知府按視長牛毛口諸寨光見知知府至負弩出郭迎叩頭乞哀請輸貢賦比編户氓乃拘使對簿無實釋之而坐斌等誣罔律斌嘆曰吾北行時有阿迷土目方仲八贈我百金為治裝以我能告見反也不如是吾何以對方土目哉九年十二月湖廣巡撫陳省遣兵討五開衛叛軍平之衛軍與黎平府共城國初時苖民常內侵四郊多壘猶與府戮力禦苖𢎞治以後邉境漸無事軍夷皆富則猜嫉轉甚居常合衆為欵借號曰禦苖誨其屬陵轢府僚亦不有監司矣嘉靖十七年副使朱藻按部至五開欵軍周泰等大譟不果納縱火焚其司門藻度不可制亡走靖於是欵軍揚揚謂計得也張甚二十九年欵軍周宗劉芳等撻守備路良於衛堂縱火焚府門三十九年上黃潘老寨夷與軍相讐知府張廷桂往勘五開嗔不約會使其衆撻廷桂擊碎公座四十二年撻守備姚紹武四十五年撻守備魏麒黎平民王成潘應星素無賴欵軍起因相倚為姦㑹新化所軍與潭溪民爭婚因嗾諸軍攻潭溪遂啓局庫出兵器縱掠諸富室無所憚知府劉汝順召問諸軍面侮之萬厯元年汝順赴貴州城軍懼其訴已也阻不與出城已而率衆逐之潭溪又逐之靖居亡何汝順遷去始發其罪上撫按乃按逮王成潘應星等六人調戍邉欵軍稍戢於是成應星各案問贓至二百餘兩閲數年不肯出則訴諸軍分坐之衛司捕輒乘間受為理而啖其利軍忿不堪復鼓譟起八年六所軍劉應胡國瑞盧國卿周官姚朝貴劉髙各率其黨號六譁又傳木刻紏天甫銀賴諸苖賊為應援者凡五司號曰五譁劉應者指揮劉璋戶丁也璋懼禍及已隂使人刺殺應胡國瑞知之譟起焚掠劉璋家欲殺之逼出銀三百三十兩償應命縳百户恕學仁刈其髮砍其指令自裁一日中撲殺所憎陸繼先等六十餘人是時守備林維喬奉命移駐五開國瑞謂衆曰彼處此吾曹大不便悉焚衣冠圖籍逐之萬福山閉城門建號稱變衛司捕嚮所挾取於軍甚衆將甘心焉焚其居舍掠家産索償牛酒贖鍰無算九年夏右所軍與中所軍爭摘豈葉國瑞奪創格殺彭玉彭大武父子及射中仆地者五人苖尚萬入城互市因抽佩創殺軍一人國瑞捉之自臨演武場宣令斬其首於是銅鼓靖州中潮龍里諸軍皆嚮應猖獗先後巡撫兵備屢檄下所司撫諭之竟跳梁不解至是湖廣巡撫陳省來代始疏於朝請討之十二月調諸路兵四千餘人省駐靖州分遣參政賀邦泰僉事龍宗武參將鄧子龍各率所部搗五開國瑞盛服張蓋登城陴大呼曰若有精兵吾固有堅城時衛司捕亦領一麾薄城軍怨之磔其妻擲城下曰今日猶能挾王成取吾財乎兵圍城急諸軍脅從者寖悔稍稍解去宗武覘知之帥所部火攻其東門諸賊爭救東門遂分兵入北門擒盧國卿周官及斬馘數十人撫其脅從者國瑞奔西門亡去尋獲之於武岡伏誅十一年討貴陽叛苖平之貴陽苖寨有也香狗場與者亞通婚媾酋長老頂宋已歸附輸租賦有年顧貧甚歲比逋負而不得償寨旁有高山以為險每漢使至輒走高山頂鼓譟詈罵使還報有司無如何於是稍稍輕漢使乃隂集亡命劫人奪金帛久之遂反至是都御史劉庠檄宣慰安國亨宋懋德統兵勦之生擒老頂宋等九十人梟以狥十三年者亞苖復叛巡撫舒應龍討平之十四年討答干寨苗平之答干雞賈甲多皆都勻苖寨也者亞阿斗反而答干寨阿其應之及斗誅阿其以幸免是年土舍吳楠王國聘慮阿其叵測禍及已請以答干雞賈甲多屬蒙詔立宣威營設把總一人而以䝉詔佐之凡答干一十三寨歲輸賦三十九石中間答干輸十石著為令阿其獨不伏引者亞殘苖圍宣威營鼓譟曰阿地誰令而營居中乎阿其居常張繖鼓角繪龍鳳什器遂興雞賈甲多阿賣胖鐡仰枯諸苖擊牛酒為誓稱兵劫歸化巡徼至答干問狀阿其出與戰詈罵去官軍莫敢進獨山土吏䝉天眷請于都御史願提兵進𠞰而先使間者佯言漢已黜蒙詔令以營地還阿其立阿其酋長朝暮當撤兵去阿其親馳樂邦牛場詗往來者言言皆符遂弛備天眷乃設伏左右伺其間驟入斬阿其并阿賣胖鐡仰枯等一十六級雞賈甲多諸寨皆歸降於是屬䝉詔者自答干雞賈甲多外又有塘蛙當井斗坡甲樹蠟臼磉馬崖埋等一十七寨小橋熟苖龍木恰曾賜冠𢃄視寨事年老請子俸替值參議給糗糧與俸不及恰恰奪之俸訴諸參議下守備逮恰恰揮其屬龍黨蘇鎖漢使已而逐之曰速走此是我家事如再來則我當以烏雞寨殺汝反矣時參議秦舜翰聞其語以計擒之死獄中亡何龍化龍羊山引川苖攻孟漢焚其邑居曰漢無故殺苖苖請報之官軍戰不利既而都司蔡兆吉齎奉旗牌諭令降待以不死於是諸苖皆散去俸視事如故又羅金寨生苖吳老夭為諸苖雄長溆浦張把髙盧溪吳老虎下里楊武楊再興五寨黃牯牛水德苟朝隆茍朝祖等皆依之時守備陳䇿為巡官嘗捕盜得苟朝祖楊再興搒掠放去而阿酋下水有酋長龍老朋索老夭逋錢奄至羅金寨掠張把高妻向氏及楊申兒等五人去老夭贖之不肯與反鬻之他寨苟朝祖故惡策謂策受賂縱苖匿虜婦嗾把高訴御史所策至羅金寨呼老夭質問老夭遂與楊再興等殺策反都御史舒應龍勦捕之老夭與黃牯牛苟朝隆走湖廣匿錦朵山久之副將陳天祐搜諸山設伏獲夭等梟之銅仁市二十八年六月總督李化龍率師討播州宣慰司楊應龍平之播州自洪武初楊鏗內附世授宣慰司地方千里西北塹山東南俯江稱西南奧區傳至應龍性猜狠嗜殺數從征調恃功驕蹇知川兵脆弱隂有據蜀志間出剽州縣嬖小妻田雌鳳讒殺妻張氏屠其家用誅罰立威所屬五司七姓不堪其虐十八年走貴州告變巡撫葉夢熊疏請大征詔不聽二十年逮繫重慶獄應龍詭將征倭兵自效得脫歸復逮不出二十一年四川巡撫王繼光請於朝討之繼光至自重慶與總兵劉承嗣等分兵三道進婁山關屯白石口應龍佯約降而統苖兵據關衝擊承嗣軍敗殺傷大半會繼光論罷即撤兵委棄輜重略盡黔師會𠞰亦無功二十三年邢玠總督貴州檄重慶知府王士琦諭應龍至松坎聽勘論斬得贖輸四萬金助採木以次子可棟羈府質追未幾可棟死於重慶促喪歸不得復檄完贖應龍大恨擁兵驅千餘僧招魂去分遣土目置關據險厚撫諸苖名其健者為硬手州人稍殷者沒入其資以養苖苖人遂願為出死力二十四年應龍掠大干諸壩焚劫草塘餘慶二司遍及興隆都勻各衛又圍黃平殺重安江長官勢大熾二十五年流劫江津及南川臨合江索其仇袁子升縋城下磔之時兵備王士琦調征倭應龍益統苖兵大掠貴州洪頭高坪新村諸屯詗原奏仇民宋世臣羅承恩等擕家匿偏橋衛襲破之大索城中戮其父母子女備極慘毒二十七年春巡撫江東之都司楊國柱領兵三千勦應龍龍遣子朝棟弟兆龍何良漢等迎敵於飛練堡我師奪三百落賊佯敗誘我師伏發國柱及指揮李廷棟等死之東之罷以郭子章代而起李化龍節制川湖貴州諸軍事調東征諸將劉綎陳璘等南征六月應龍乘大師未集大勒兵犯綦江時城中新募兵不滿三千而應龍以兵八萬奄至參將房嘉龍遊擊張良貴戰死綦江陷應龍盡殺城中人投尸蔽江江水為赤退屯三溪以綦江之三溪五渡南川之東鄉壩立石為播界號宣慰官莊聲言合江江津皆播故土初賊本無意竟反徒以安忍猖狂既覆我師飛練則騎虎勢不得下於是益結九股生苖及黑腳苖等為助十一月應龍屯兵官壩聲言窺蜀已而焚東坡爛橋楚黔路梗次年正月應龍五道並出破龍泉司守備楊惟忠擁兵二千以勢不敵避去土官安民志率步卒五百拒守死之二月癸未播賊襲執宣慰宋承恩去承恩應龍壻也時總督李化龍已移駐重慶征兵大集遂以十二日丙戌誓師分八路路約三萬人官兵三之土司七之川師四路總兵劉綎從綦江入以參將麻鎮等𨽻參政張文耀監之總兵馬孔英從南川入以參將周國柱宣撫冉馭龍等𨽻僉事徐仲佳監之總兵吳廣從合江入以參將徐世威等𨽻參議劉一相監之副將曹希彬受廣節制從永寧入以參將吳文傑永寧女土官奢世續等𨽻參議史旌賢監之黔師分三路總兵童元鎮統鎮雄土知府隴澄泗城土知府岑紹勳等由烏江參將朱鶴齡受元鎮節制統宣慰安疆臣等由沙溪總兵李應祥統宣慰彭元璠等由興隆參議張存意按察司楊寅秋監之湖廣一路由偏橋分兩翼總兵陳璘統宣慰彭養正等由白泥副總兵陳良玭受璘節制統宣撫覃宜等由龍泉副使胡桂芳參議魏養䝉監之巡撫郭子章駐貴陽湖廣巡撫支可大移沅州總督李化龍自將中軍䇿應諭諸將以抵婁山等關為期且曰關外且戰且招降多不可勝誅也關內疾戰勿受降師不可久老賊詐不可信也綦江道最要綎當之應龍熟綎才頗懼益兵守要害十五日諸將克丁山銅鼓崖村遂直搗楠木山羊簡臺三峒峒絶險賊將穆照等衆數萬連營諸將憚之綎分兵攻其三面大戰於李漢壩生擒其魁餘賊奔入峒乘勢直搗峒前焚之賊多死盡克三峒擒穆照及賊魁吳尚華是日綎督戰左持金右挺劍大呼曰用命者賞不用命者齒劍鬬死者四十人遂大捷三月應龍乃遣子朝棟惟棟及其黨楊珠統鋭卒數萬由松坎漁渡羅古池三道並進綎伏萬人羅古待松坎賊以萬人伏營外待漁渡賊而别以一軍䇿應賊果至伏盡起綎率部下轉戰斬首數百追奔五十里朝棟潰圍走幾為我師獲應龍憚綎威名意首挫其鋒屬朝棟悉徑兵間道相角曰爾破綦江馳南川盡焚積聚餘無能為也及朝棟敗益膽落聚守石虎關綎亦掘塹守初綎聞征播命逗遛多設難要朝廷言官交劾綎議調南京右府僉書綎至是聞之即辭任李化龍以平播非綎不可固留之力薦於朝綎乃復受事遂進克石虎關拔賊滴淚三坡瓦窑坪諸隘直抵婁山關婁山萬峯插天叢箐中一徑才數尺賊設木關十三座排柵置深坑百險俱備綎分竒兵為左右路間道趨關後而自督大軍仰攻奪其關追至永安莊兩路軍亦㑹時三月二十九日也綎老將持重慮賊衝突聨諸營一據婁山關為老營一據白石口為腰營一據永安莊為前營都指揮王芬者勇而寡謀每戰輒請為前鋒連勝有輕敵心獨營松門埡之衝距大營數里賊方有烏江之勝謀再奪婁山適穆照遣人泄芬孤軍狀四月朔賊乃襲殺芬守備陳天綱天全招討楊愈亦死失亡士卒二千人綎聞急往救部將周以德周敦吉夾攻賊始大奔追至養馬城而還是日應龍幾被獲乃不敢窺婁山綎懲前失劄近關堅壁且請濟師踰十餘日克後水囤營於冠子山尋會馬孔英壁海龍囤下孔英道南川獨險遠去應龍海龍囤六七百里未至重慶時推官高折枝監紀軍事請獨當一面乃與參將周國柱先以石柱宣撫馬千乘兵破賊金筑復督酉陽宣撫冉馭龍敗賊於官壩時賊既破龍泉方移師攻婺川聞敗乃遁及孔英至軍平茶邑梅兵亦集軍容甚壯先師期一日入真州用土官鄭葵路麟為鄉導别遣邉兵千扼明月關諸軍鼓行前進破四寨攻赤崖抵清水坪封寧關悉破賊營十數逼桑木關關內民降者日千計折枝結三大寨處之禁殺掠降者日衆賊益孤關為賊要害山險箐深賊憑高據守三月初八日乃令千乘馭龍出關左右國柱搗其中賊用標槍藥矢鋭甚官軍殊死戰奪其關逐北至風坎關賊復大敗連破九杵黑水諸關苦竹羊崖銅鼓諸寨國柱攻金子壩無一人疑有伏焚空寨十九嚴兵以待賊果哭出擊敗之孔英乃留王之翰兵守白玉臺衛餉道平茶邑梅兵守桑木關而親提大軍進營金子壩應龍聞桑木關破大懼遣弟世龍及楊珠以鋭卒劫之翰營之翰走殺餉兵無算平茶兵來援賊始退孔英還擊世龍復不勝步卒發火箭禆將劉勝復奮擊賊乃奔官軍進朗山口由朗山進䝉子橋深箐蓊翳賊處處設伏悉𠞰平之應龍遣其黨詐降謀為內應折枝盡斬之伏以待賊果夜劫營伏發賊驚潰追奔至髙坪已奪賊養馬城直抵海龍第二關下賊守兵益多孔英軍已深入而諸道未有至者酉陽延綏兵皆退賊躡殺官兵六十人居數日劉綎兵至乃合兵連克龍爪海雲諸囤壓海龍囤而壘初總督李化龍刻師期諸將莫利先入孔英所將邉卒及諸土兵皆獷悍監紀折枝勇而有謀故師獨先入道至囤前吳廣出合江屯二郎壩大行招徠賊驍將郭通緒者迎戰將士襲走之陶洪安村羅村三寨土官各出降他部來歸者數萬廣擇其壯者從軍通緒扼穿崖囤廣督土漢軍擊破之劉綎馬孔英已入播廣猶頓二郎總督李化龍趣之乃議分四哨進攻崖門别遣奢世續等督夷兵二千扼桑木埡諸要害以防餉道諸將連破數囤進營母豬塘應龍令通緒盡發關外兵拒敵廣伏炮手五百於磨槍埡外南岡下而遣禆將趙應科挑戰埡兩山相夾中甚隘通緒橫槊衝應科科佯北通緒追出埡遇伏急旋馬中炮墜方躍上他馬伏兵攢刺之殪餘賊大奔官軍逐北賊盡降遂薄崖門徑小止容一騎賊衆萬餘出關拒戰曹希彬懸賞千金士攀崖競進追至第四關關上男女盡哭於是賊黨自殺其魁羅進恩率萬餘人出降其第一關猶拒不下廣乘夜疾進奪其關關內民爭獻牛酒時李應祥陳璘猶在關外廣合希彬軍連戰一碗水土崖分水關皆捷遂進營水牛塘應龍知廣軍孤深入謀欲襲之乃遣人詐降廣測其詐堅壁以待應龍擁衆三萬直衝大營諸將殊死戰會他將來援師乃退廣遂進壁海龍囤童元鎮督永順泗城鎮雄諸土軍由烏江初元鎮先駐銅仁憚應龍久不進屢趣乃行時劉綎吳廣諸軍已進羣賊議分兵守其參謀孫時泰曰分兵則力薄乘官軍未集先破其弱者餘自退矣應龍善之聞元鎮將抵烏江應龍曰此易與耳縱之渡江密以計取監軍楊寅秋言烏江去播不逺宜俟諸道深入協力齊驅元鎮不從於是永順兵先奪烏江賊遣千餘人沿江呌罵以誘之諸軍既濟復奪老軍關前哨參將謝崇爵乘勢督泗城及水西兵再拔河渡關三月望賊以步騎數千先衝水西軍軍中驅象出戰賊多傷俄駕象者斃象反走擲火器者又誤擊已營陳亂泗城兵先走崇爵亦走爭浮橋橋斷殺溺死者數千人河渡既敗烏江軍相去六十里猶未知明日參將楊顯發永順兵三百出哨道遇賊數萬咸為水西裝永順兵不疑與盟誓賊掩殺三百人亦襲其裝直趨烏江烏江軍信為水西永順兵不設備遂為賊所破爭先渡江賊先斷浮橋數千人皆溺死顯及二子與焉元鎮所部三萬人不存什一將校止崇爵等三人江水為不流貴陽聞警居民盡避入城遠近震動化龍用上方劍斬崇爵益徵兵檄鎮雄土官隴澄邀賊歸路隴澄者即安堯臣水西安疆臣弟也軍不與元鎮合獨全當事頗疑其通賊寅秋以鎮雄去播止二日令搗巢立效澄許之河渡未敗時澄已遣步將劉嶽王嘉猷攻拔苦竹關及半壩嶺既敗二將移新站賊伏兵大水田别以五千人來襲敗還嘉猷乃揚聲搗大水田而潛以一軍敗大夫關直抵馬坎斷賊歸路與疆臣合賊遂遁會都指揮徐成將兵至合岑紹勳兵冉克河渡關賊將張守欽袁五受據長箐萬丈林永順兵擊破之生擒守欽攻清潭洞復擒五受會朝議責元鎮敗狀逮下獄令李應祥并將其軍應祥由興隆入受事於二月下旬副將陳寅等已連克數囤拒賊四牌高囤下别遣兵從間道直搗龍水囤他將蔡兆吉又自乾坪抵箐岡過四牌賊首謝朝俸營其地四面峭壁深箐賊從高鼓譟官軍殊死戰俘朝俸妻子乘勢抵河畔㑹烏江敗書聞斂兵不進者旬日應祥已受任趣諸將急渡寅等乃取他道渡河而潛為浮橋以濟師諸軍既渡賊失險乞降者相繼應祥悉受之賊所恃黃灘一關壁立衆死守㑹賊徒石勝俸等率萬餘人降告曰去黃灘三十里有三關入播門户額森襲破之則黃灘孤難守應祥然其計令偕陳寅率精卒四千夜抵關下勝俸以數十騎誘開前門盡殱其戍卒黃灘賊懼益增兵固守寅督諸將渡河攻關前勝俸由墳林暗渡襲關後賊乃大敗應祥遂直抵海龍囤陳璘由偏橋進軍次白泥應龍子朝棟率賊二萬渡烏江迎戰璘前禦之而分兩翼躡其後賊少挫追奔至龍溪山賊合四牌賊共拒璘四牌在江外與江內七牌皆五司遺種九股惡苖素助賊璘廣招撫乃進軍龍溪諜報有伏令遊擊陳䇿以火器擊之賊據險矢石雨下璘先登斬小校退者以狥把總吳應龍等陷陳賊大潰退拒四牌保兒囤璘遣二禆將逼之中伏璘募死士從應龍等奮擊賊復潰奔據囤巔夜由後遁黎明追及於袁家渡賊復敗悉渡江遁四牌之賊遂盡三月望諸軍為浮橋渡江知賊將張佑謝朝俸等營七牌野豬山璘即夜發抵苦練坪前鋒與戰後軍至夾擊之賊敗逃深箐官軍遂入苦菜關會童元鎮烏江師敗璘大懼請退師李化龍不可璘乃進營楠木橋次湄潭賊悉聚青蛇長坎瑪瑙保子四囤地皆險絶而青蛇尤甚璘議同日攻則兵力弱止攻一囤則三囤相助乃先攻三囤次及青蛇良玭師亦來會令伏囤後别以一軍守板角關防賊逸璘督諸將力攻三日賊死傷無算三囤遂下青蛇四面陡絶璘圍其三面購死士從瑪瑙附葛至山背舉炮賊惶駭諸軍進攻焚其茅屋賊退入囤內木石交下將士冒死上燬大栅二重前後擊之賊大敗七牌之賊亦盡時四月十三日也乃分兵六道攻克大小三渡關乘勝抵海龍囤海龍囤者賊所倚天險飛鳥騰猿不能踰者及諸路兵俱集囤下賊見勢急父子相抱哭上囤死守每路投降文緩我師化龍檄賊詭降即斬使焚書無為所紿虞綎與應龍舊檄無通賊綎械其人自明賊詭令婦人於囤上拜表痛哭云田氏且降詐為應龍仰藥死報吳廣廣輕信按兵不動已覘知田氏詐降緩攻而所云應龍死乃川兵攻囤以火炮擊死所謂楊珠也珠驍勇善戰既死賊痛如失左右手廣覺詐益列兵協攻燒二關奪三山絶賊樵汲五月十八日始築長圍化龍令諸將分日迭攻安疆臣攻囤後受賊重賄多與通且潛以火藥貽賊故賊不備其後陳璘知之與監軍者謀令疆臣退一舍璘移其處置鐡牌百餘距囤丈許賊强弩無所施又為箛板於柵前賊每夜出劫為釘傷不敢復出會化龍聞父喪詔以墨縗視事化龍跣而草檄益治軍時天苦雨將士馳淖中苦戰六月四日天忽開朗五日劉綎身先士卒進克土月二城應龍益迫夜散數千金募死士拒戰諸苖皆駭散無應者起提刀自巡壘見四面火光燭天倣徨長嘆泣與妻子曰吾不能復顧若矣六日陳璘與吳廣當進兵璘夜四鼓銜枚上賊鼾睡斬其守關者樹白幟鳴炮賊大驚潰散廣兵亦至應龍倉皇同愛妾二闔室縊且自焚廣獲其子朝棟及妾田雌鳳急覔尸出焰中廣中火毒失聲幾絶頃而蘇自出師至滅賊百十有四日總督李化龍露布以聞七月詔偏沅巡撫江鐸墨縗討皮林苖川湖貴廣西督撫督兵協擊十二月庚辰督撫李化龍郭子章江鐸俘楊朝棟等獻於闕下丙寅上御樓受之羣臣稱賀命磔楊朝棟等於西市釋宋承恩二十九年正月壬子朔頒平播詔於天下甲子巡撫郭子章如鎮遠㑹楚師粵師協剿皮林三月指揮使李楷剿皮林苖平之皮林苖吳國佐少入學為永從縣生員驕黠有大志居恆往來洪州草坪等寨相度形勢自為皮林與九股接壤山川險奧可因之成大事於是帥皮林諸苖反自稱天皇上將有石纂太者亦自稱太保始播發難時皮林嘗助逆至是播滅乃結聨他寨搆營陳攻破永從縣燬城郭廬舍殺守備陳世忠等劫獄囚而去沅撫江鐸亷指揮李楷智勇請授楷征剿事㑹楷征播還自謂當便道掃除不煩專兵至是先遣他總兵進剿地險不得入且所遇潘老諸酋引衆萬餘盡為牛首陳當者多傷楷嘗探苖洞得其根株從叢箐中取道道僅尺餘旁臨溪不測步騎相持如是者數十里苖又斷溝畫塹布以竹簽楷所在填接使壯士鄉導逐步拔簽而後行乃先搗潘老寨奪其險隘遂進擊賴洞岑朝二寨斬酋楊滿金首生獲龍貴才吳寅龍諸渠膠至軍門轉攻六背山斬酋革海艮等三十八級連破洪州草壇斬獲首虜及婦女牛羊無算乃進逼時洞時洞者國佐所據寨也然國佐已竄去楷分遣偏將由他洞入而自與逰擊董獻䇿沈𢎞猷當其險者曰甘坤即俗名銅關鐡寨破之而入窮追至赤沙高茶生獲國佐及石纂太金董四吳海等斬首五百八十二級諸洞悉平三十四年巡撫郭子章奏討東西二路及水銀山苖盡平之東西二路苖名曰仲家者盤踞貴龍平新之間為諸苖領䄂在水銀山介於銅仁思石者曰山苖紅苖之羽翼也窺黔自平播後財力殫竭有輕漢心經年剽掠無虛日三十三年六月子章乃命總兵陳璘參政洪澄源率官軍五千益以土兵五千攻水銀山監軍布政使趙健率宣慰土兵萬人使逰擊劉嶽等督之攻西路苖皆九十餘日而克二寇既平至是乃専命總兵陳璘率漢土兵五千移營新添進攻東路苗不一月復克其六箐斬獲賊首吳老喬阿倫阿皆等諸苗盡平三十五年三月丙寅四川追永寧司印擒奢世續餘黨燒普市摩尼三十七年紅苖陷印江縣典史邵士元死之四十年邛水司土目彭必信不法誅之邛水土舍楊光春行邛水長官事老而貪頭目彭必信為之聚斂民怨甚逃諸梁上巴野六甫鬼計諸苖寨參議以上皆議請免春改土為流議未行春與必信單騎遍馳所部莊寨紿言漢兵剿夷民當斂金贖夷民死凡三十六莊七十二寨合得金五百兩兩人分其金都御史何起鳴詗知之下都清道逮光春繫獄瘐死不及必信於是用漢經歷劉試到邛水管事立青頗茨瓦四哨每四户擇壯兵一人邛水四百户户不下二百人出為兵凡不為兵者佐糗糧三斗魚鹽月人一斤有八兩皆廪食餘稅而簡土吏何文奎等掌四哨别選精兵五十二人立營居中禆將徐軻巡徼之未幾必信乃密誘諸苖謂新法不善不利苖請十五洞洞長約為我治裝我當訴之朝以復舊例洞長唯唯乃議每洞出裝銀三兩合得四十五兩走長安上書謂巴野梁上六逋鬼計諸寨酋長喬鵝苗女喬苗柴虎苗高艮等數百人阻水為亂樹旗幟鼓角攻七十餘寨殺男婦五百人而指揮使陶啓忠不之問也反索土吏楊光春錢而殺之改舊例用新法欲求苗不反難矣書上不省然而必信意自得歸謁知府王一麟意揚揚一麟叱縳之送司獄乃檄召諸苗以為必信所奏喬鵝事此在萬厯初孰與今日今日若等苐不利漢吏耳乃假此為恢復計有國法在不便思若等所患苦或以兵餉戶賦米三斗過甚府能為若等寬之故事本司歲給白蟲鋪米每洞月八斗凡一百五十石他於平溪驛剩餘徵二十二兩此皆可足餉今已後毋苦諸洞諸洞皆叩頭稱便乃坐信誣妄誅之而新法竟行四十四年定番州仲苗作亂巡撫張鶴鳴親督兵入其巢圍之於猱平堡克之諸賊悉平四十七年清平興隆平越諸苗賊出劫官道巡撫李橒發兵勦之四十八年藺州土司奢崇明叛陷四川重慶府遂陷遵義府天啓元年二月宣慰司同知安邦彥詣巡撫李橒請討奢崇明自效不許安邦彥者宣慰使安堯臣族子堯臣死子位幼其母奢社輝崇明女弟代領其衆邦彥遂專兵權㑹朝議徵西南兵援遼邦彥素黠桀欲乘以起事詣橒請行橒諭止之歸益為反謀橒纍疏請增兵益餉中朝方急遼事置之不問會橒被劾六疏乞休十月始得請以王三善代而崇明已陷重慶遵義貴陽大震橒遂留視事時城中兵不及三千倉庫虛殫橒與巡按御史史永安貸雲南湖廣銀四萬有竒募兵四千儲米二萬石治戰守具而急遣總兵官張彥方都司許成名黃運清監軍副使朱芹提學僉事劉錫鉉等援四川戰屢捷遂復遵義綏陽湄潭正安桐梓諸州縣二年二月安邦彥叛圍貴陽城或傳奢崇明已陷成都邦彥遂挾安位反自稱羅甸王四十八支及他部頭目安邦俊陳其愚等蜂起相應烏撒土目安效良亦與通邦彥首襲畢節都司楊明廷固守擊斬數百人效良助邦彥陷其城將士三千人俱沒賊遂分兵陷安順平壩效良亦西陷霑益而邦彥自統水西軍及羅鬼苗仲數萬東渡六廣河直趨貴陽别遣王倫等下甕安襲偏橋以斷援兵洪邉土司宋萬化紏苗仲九股陷龍里李橒史永安聞變急議城守會藩臬守令咸入覲而彥方鎮銅仁運清駐遵義城中文武無幾人乃分兵為五令提學僉事劉錫鉉及參議邵應禎都司劉嘉言副總兵劉嶽分禦四門橒自當北門之衝永安居譙樓團街市兵防內變學官及諸生亦督民兵分堞守賊至盡鋭攻北城橒迎戰敗之轉攻東門為錫鉉所却持數日賊多死乃日夕分番馳突以疲官兵城中出精卒哭賊賊驚却乃為三丈樓臨城用婦人雞犬厭勝術橒永安烹彘雜斗米飯投飼雞大而張虎豹皮於城樓以祓之乃得施炮石夜縋死士燒其樓賊盡死賊又作竹籠萬餘土壘之高踰睥睨橒永安急撤大寺鐘樓建城上賊棄籠去官軍出燒之數出城邀賊糧賊怒盡發城外塜遍燒村寨又先後攻陷廣順州普定威清普安安南諸衛貴陽西數千里盡為賊有初被圍彥方運清來救敗賊於新添賊誘入龍里二將皆敗賊縱之入城曰使耗女糧城中果大困川廣總督張我續巡撫王三善擁兵不進橒永安連疏告急我續等卒不進會彥方等出戰頻得利賊退保宅溪橒永安又遣禆將商士傑等共九千人分控威清新添二衛且乞援兵賊謂城必拔沿山為營柵隔內外旬日始一攻輒敗去副總兵徐時逄參將萬仲仁來援遇賊甕城河食盡仲仁兵先逃賊乘虛擊之軍盡潰諸將馬一龍白自强等殱焉援遂絶賊聞三善將進兵益日夜攻架木高坡以瞰南城橒永安募死士燔之火五日夜賊盡攻擊之術已登陴天將曙忽自退明日梯而登守城者止餓卒六人荷戈强起賊才殺一人倐驚退墜梯死者無算賊大駭疑城中尚有精兵數萬云十二月王三善大破賊於龍里貴陽圍解自李橒史永安連章告急趣三善赴援三善始駐沅州調集兵食已次鎮逺再次平越遣知府朱家民乞兵四川兵未至不敢進疏請便宜從事給空名部牒得隨才授任帝悉可之至十二月朔知貴陽圍益困三善急召諸將曰事迫矣前則以戰死後則以法死夫死法與死戰孰優尚何待也乃分兵為三副使何天麟等從清水江進為右部僉事楊世賞等從都勻進為左部自將二萬人與參議向日升副總兵劉超參將楊明楷劉志敏孫元謨王建中都司陳嘉謨等由中路當賊鋒一日抵新添又一日進母猪洞又一日次新安是夜報賊至合營驚擾議退兵三善手劍疾呼曰退即死此既而覘無賊乃命劉超為前部超三善同里人有智略疾行抵龍頭營三善身尾之相去不二里聞炮聲衆懼不欲前三善督之既而劉超捷音至初超兵遇賊却超下馬斬却者二人而自揮刀斷賊標時賊首阿成驍甚超與步兵張良俊直前斬其首賊披靡會大兵至齊進奪龍里賊復大集乃大戰却之遂據龍里城衆議休息三善曰我兵猝至賊無備此可以破竹而顧却之何也遽䇿馬前進衆隨之自平越至此凡六日抵城下而邦彥已遁遂乘勝窮追至畢節鋪賊步騎如雲皆自相蹂踐而追騎如牆並進斬獲無算安邦俊戰死輜重山積時城守十月旦夕陷忽賊兵奔潰如蟻喊聲雷震俄頃五騎衝鋒至城下曰新撫至矣軍民大悅慶更生橒等迎入城三善不許曰賊兵不遠軍心猶未定也我不可即安遂營於南門外坡上大雪次日移營宅溪賊遠遁陸廣河外居數日左右二部及湖廣廣西四川援兵先後至三善以二萬人破賊十萬有輕敵心且憂乏食欲因糧於敵舉超為總兵官令渡陸廣趨大方搗安位巢以世賞監之總兵官張彥方渡鴨池搗安邦彥巢以天麟監之漢土兵各三萬别將都司線補衮出黃沙渡尅期並進超等至陸廣連戰皆捷彥方部將秦民屏破賊五大寨諸將益輕敵三年正月劉超渡陸廣賊薄之獨山土官蒙詔先遁賊乘之官軍大敗超走免先鋒楊明楷被執諸將姚旺等三十六人殱焉賊遂攻破鴨池軍部將覃𢎞化先逃諸營盡潰彥方保威清惟補袞軍獨全諸苗見王師失利復蜂起土酋何中尉進據龍里而邦彥使李阿二圍青巖斷定番餉道令宋萬化吳楚漢為左右翼自將趨貴陽遠近大震三善急遣逰擊祁繼祖等取龍里王建中劉志敏救青巖繼祖燔上中下三牌及賊百五十寨建中亦燔賊四十八莊龍里定番路皆通又夜遣建中繼祖搗楚漢八姑蕩燔莊寨二百餘薄而攻之賊溺死無算萬化不知楚漢敗詐降三善佯許而令諸將捲甲趨之萬化倉皇出戰被擒邦彥為奪氣群苖復效順三善給黃幟俾樹營中邦彥望見不敢出增兵守鴨池陸廣諸要害是時川撫朱燮元屢破奢崇明兵崇明窮蹙投邦彥四川總理魯欽馳赴貴陽𠞰擒何中尉彥方亦追賊鴨池而賊復乘間陷普安時代總督張我續者為楊述中駐沅州畏賊朝命屢趣始移鎮遠三善議㑹師進討述中暨諸將多持不可三善排羣議以進十月自將六萬人渡烏江次黑石連敗賊斬前逃將覃𢎞化以狥賊乃柵漆山日遣逰騎掠樵採者官軍食漸乏諸將議退師三善怒曰汝曹欲退不如斬吾首詣賊降諸軍乃不敢言三善募壯士逼漆山緋衣峩冠肩輿張蓋自督陳語將士曰戰不捷此即吾致身處也旁一山頗峻揮左軍據其巔賊倉皇拔柵爭山將士殊死戰賊大敗邦彥狼狽走三善渡渭河降者相繼師抵大方入居安位第位偕母奢社輝走火灼堡邦彥竄織金先所陷將楊明楷乃得還位窘遣使詣述中請降述中令縳崇明父子自贖三善責並獻邦彥往返之間賊得為計三善以賊方平議郡縣其地諸苗及土司咸惴恐益合於邦彥三善先約四川總兵官李維新滅賊以餉乏辭三善屯大方久食盡述中不為援不得已議退師四年正月王師敗於內莊巡撫王三善死之三善以糧盡焚大方廬舍而東賊躡之中軍參將王建中副總兵秦民屏戰殁官軍行且戰至內莊後軍為賊所斷三善還救士卒多奔陳其愚者賊腹心先詐降三善信之與籌兵事故軍中虛實賊無不知及隨三善行遇賊其愚衝三善墜馬三善知有變急解印綬付家人拔刀自刎不殊群賊擁之去罵不屈遂遇害同知梁師泰主事田景猷等四十餘人皆死賊拘監軍副使嶽具仰以邀撫具仰馳蠟書於外被殺事聞總督楊述中回籍聽勘四月起傅宗龍巡按貴州命右副都御史蔡復一代楊述中總督貴州雲南湖廣軍務兼巡撫貴州賜上方劍便宜從事時喪亡之餘兵食盡絀斗米銀八錢復一勞徠拊循人心乃定召集將吏申嚴紀律遣總理魯欽等救凱里斬賊五百餘都勻凱里土司者運道咽喉也邦彥結諸蠻困其城長官楊世蔚不能守復一遣魯欽及劉超救之拔賊巖頭寨遂移師克平茶已而邦彥盡驅玀鬼結四十營於斑鳩灣結寨二十餘里分犯普定復一令魯欽及總兵官黃鉞分道禦之欽率部將張雲鵬劉志敏鄧玘等大敗賊汪家冲鉞及參政陸夢龍副使楊世賞亦大敗賊蔣義寨斬首千五百餘級搜山復斬六百餘級尹伸守普定亦敗賊兵與大軍會共剪水外逆苗邦彥大窘渡河西奔欽鉞督諸將窮追而夢龍等諸監司分駐三岔河岸為後徑前鋒雲鵬玘等深入織金織金者邦彥巢也緣道皆重關叠隘木石塞山徑將士用巨斧開之或攀藤穿竇而入賊戰敗遁深箐斬首復千級窮搜不得邦彥乃班師是役也焚賊巢數十獲牛馬甲仗無算復一以鄰境不協討致賊未滅請敕四川出兵遵義畢節抵水西雲南出兵霑益抵烏撒犄角平賊帝悉可之因命廣西雲南四川諸郡鄰貴州者悉聽復一節制傅宗龍擒陳其愚誅之其愚既陷三善安居貴陽城為賊耳目宗龍戮諸市軍民大快五年正月魯欽等旋師渡河賊從後襲擊諸營盡潰死者數千人時蔡復一為總督朱燮元亦以尚書督四川湖廣陜西諸軍以故復一節制不行於境外欽等深入四川雲南兵皆不至復一自劾因論事權不專故敗巡按傅宗龍亦以為言廷議燮元督河道令復一專督五路師御史楊維垣獨言燮元不可易請令兼復一任帝用維垣言解復一任聽勘而以王瑊為右僉都御史巡撫貴州復一俟代仍拮据兵事六月復一與宗龍計𠞰破烏粟螺蝦長田及十五寨叛苗初自平越至興隆清平二衛苗二百餘寨錯踞其間以長田之天保阿秧為魁邦彥初叛即授二酋都督使通下六衛聲息是年寇石阡餘慶監軍按察使來斯行啖阿秧使圖天保阿秧反以情告斯行乃誘斬阿秧議討天保會以疾去復一令貴陽同知周鴻圖代為監軍會阿秧弟阿賈與天保請兵邦彥復兄仇復一以兵事屬鴻圖及魯欽而遣參將楊明楷胡從儀等佐之欽等三道進賊敗走大戰米墩山生擒天保阿賈亦俘先後斬賊魁五十四人獲首功二千三百五十級破焚一百七十四寨盛夏興師將士冒暑雨衝嵐瘴積年劇寇盡除土人謂二百年所未有復一既奏功未獲報十一月卒於平越軍中鴻圖以功授平越知府六年春三月安邦彥復大舉入寇魯欽禦之楊家海連戰數日賊夜半直逼欽壘將士逃竄欽遂目刎諸營盡潰賊勢復張遂燒劫麻姑孫官堡苗仲復助逆貴州三十里之外樵蘇不行城中大震巡撫王瑊巡按傅宗龍遣周鴻圖胡從儀等先攻河沙壩玀鬼盡俘之廣順定番青巖白納一𢃄苗蠻為之奪氣然後拒邦彥於趙官堡小戰二日大戰二日所殺傷甚衆水內水外之賊奔走潰歸道路復通總督朱燮元以憂歸加偏沅巡撫閔夢得總督控制五省夏巡撫王瑊巡按傅宗龍遣兵平都勻麻哈諸叛苖黔中四面皆苗而最狡悍者無如勻哈安邦彥初叛圍龍里新添皆藉其衆至是數出沒剽掠清平新添地方餉道為梗平越知府周鴻圖㑹同都司張雲鵬率兵攻擺沙大寨擺沙居寨之中距平越百餘里乘夜由間道掩襲破之賊遁入箐其中米榖山積次日搜百里大山移營牛場箐攻甕嶽等寨復攻都勻城西南仲賊八路㑹兵入箐各有斬獲復攻江時户西高平養古數十寨斬首二千餘級掃蕩二百餘里七年春參將楊明輝奉命宣諭安位令擒獻首惡為安邦彥所殺崇禎元年秋七月詔起朱燮元仍總督貴湖雲川廣五省軍務二年八月總督朱燮元討安邦彥誅之先是三善由陸廣入大方凡百七十里皆羅鬼巢窟前衝後截已失地利燮元初議滇兵出霑益遏安效良應援而别布兵天生橋尋甸等處以絶其走路蜀兵臨畢節扼其交通四裔之路而别出龍場巖後以奪其險黔兵由普定渡思臘河徑趨邦彥巢而陸廣鴨池搗其虛粵西出泗城分兵䇿應然後率大軍由遵義鼓行而前尋以憂去未及用總督閔夢得繼之亦以貴州抵大方路險而賊惟恃畢節一路外通用兵當自永寧始由永寧而普市而摩泥而赤水百五十里皆坦途赤水有城郭可憑而守宜結營於此而漸進漸迫為白巖為層臺為畢節共二百里至大方然後以重兵扼之可一鼓擒也亦不果用至是燮元至乃檄滇兵下烏撒蜀兵出永寧畢節扼各路要害而親率大軍駐陸廣以逼大方時崇明號大梁王邦彥號四裔大長老其下歹費阿鮓等各號元帥悉力趨水寧先犯赤水燮元授意守將許成名佯敗引之深入度賊已抵永寧分遣林兆鼎從三岔入王國楨從陸廣入劉養鯤從遵義入邦彥分兵四應力不支羅乾象復以竒兵繞出其背急擊之崇明邦彥皆被創斬其首以獻九月貴州四川雲南合兵進討水西餘黨三年三月安位遣漢把左之賔等乞撫疏聞許之八年水西頭目卧這化沙爭襲相搆各獻土地請設流官總督朱燮元議設二十州分治其地各置副將鎮守十年三月化沙杓佐等復叛圍大方城副將方國安誘斬化沙潰圍出四月發兵進討尋撫定之仍其舊不設州十五年下衛苖仲復聚衆出劫官道屢發兵禦之不能制苖賊攻圍清平衛及黃平州參將宋民倚擊定之十六年四月開州仲賊叛陷州城知州黃嘉雋死之白蓮妖賊黃邦民聚衆反圍湄潭知縣吳邦寧率民擊斬之貴州通志卷二十三
