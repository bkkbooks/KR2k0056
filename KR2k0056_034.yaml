body:
  text: 貴州通志卷三十四藝文疏明請忠烈廟南公祀典疏略王憲臣聞以死勤事則祀之為民禦災則祀之竊見貴州城中舊有忠烈廟祀唐忠臣南霽雲洪武初都指揮程暹建至今軍民皆稱其神靈每嵗春首風狂境內常有火災及水旱疾疫蟲虎寇盜䖍禱於神其應若響雖神貺久孚人心而聖代未䝉祀典臣謹考南霽雲在唐天寶末安祿山為亂賊將尹子竒圍睢陽守將張巡許逺與之誓死拒賊嘗求救兵於賀蘭進明初嚙指示信已而城陷霽雲死之兹者顯靈八番隂為禦災捍患乞追賜美諡頒祀典每嵗春秋有司致祭非惟聖恩廣布不遺前代之忠臣抑使神惠愈彰永濟邊方之黎庶叙捷疏鄒文盛苗民逆命自古為然而恃險肆惡於今獨甚倡亂於阿傍阿階之桀賊蠢動於車碗門樓之諸寨動稱六十年氣數該然輒以韋同烈故事藉口呼吸之間蟻聚蜂屯奔跳之際鴟張豕突自清平興隆以及偏鎮諸衛欲攻阻上京之路由平越新添以及龍貴諸鎮欲據為己有之區軍屯財蓄燒劫無遺衛堡城池攻圍不次嘯聚香爐巢穴敵殺應捕官軍若居民若行旅殘傷無算若村市若鎮店搶掠一空稱呼自為苗王出入僭乘轎馬惡熖重熾於逺邇凶聲聨絡於蠻夷請兵討罪湖廣交章得㫖會師撫征並舉蓋叛逆久錮於冥頑顧招安適資乎玩侮大兵壓境猶戕殺軍職方靣厥罪滔天實自絶覆育生成神人共憤征剿何疑於是預分玉石明示恩威大會三省之兵共圖萬全之計舍羽翼之羣寨先根據之香爐四靣圍繞五哨夾攻官軍土軍輪番攻擊軍器火器錯雜交施厚賞激之於前嚴罰懾之於後是以官兵各輸謀勇共圖成功或造樓接戰或架梯攀登我攻之無間於晝夜彼禦之莫救乎東西覘其無備之處密為暗取之謀一登而戮其梟桀鋭鋒已挫再登而斬其首惡巢穴盡灰種類盡於三登根株不遺一縷軍聲震地烟熖燭天數十尋􅏭嵲之山一朝失險千百年逋逃之寇一旦誅夷香爐裂摧夷寨震動舉此加彼順若建瓴圖易先難勢如破竹故傳檄漂壩諸苗輸誠納欵歸我侵疆加兵黎蘭等寨落膽飛魂以次授首必渠魁之是誅縱脅從而不問師雖無敵兵不窮追功幸有成勳歸破險惟兹賊巢諸夷窺望山名香爐形如磨盤盤之下壁立四圍堅若金城盤之隅平衍十頃穩稱巢穴而盤之上則突兀盤旋可望而不可登賊據此以為天險人望之以為虎穴先年賊聚實勤王師衆至二十三萬營連四十餘里圍之數月竟至老師而費財得一首賊遽爾班師而報捷是以賊未痛遭挫䘐心常狃於反叛動因小忿弄兵每以前事為詞今兵不滿五萬厯時未及三月破先年不能破之山滅先年不能滅之賊功高往昔威震羣夷皆皇上聖武布昭乎遐邇英謀妙契乎神人而本兵大臣與帷幄元老又能運謀指示默中機宜所謂定於廟廊之上有主其事者故將士得以奮貔貅之勇而臣等亦得以效犬馬之勞以致有此克捷地方底寧人民胥慶從事官僚如參將洛忠都指揮葉曇楊淮許詔陶霖劉麟祝鎮王璽專統哨軍料敵制勝而參將洛忠與委署都指揮楊仁分布撫處尤盡心力副使李麟參議蔡潮先同緣事都指揮邵鑑防禦撫捕久著勞勩督糧有措置之方供軍無缺乏之患貴州參政胡濂之勞可録給軍餉於經過之時防騷擾於必由之處湖廣參政張天相僉事汪玉之長可數貴州見任布政使趙文奎升任布政使陳雍綜理錢糧區畫惟謹見任按察使林長吉都指揮王麟緣事都指揮潘勳協贊戎務幹理亦勤至如將才宣慰與凡領征百執事漢土官目或參謀逐殺或督責駿奔亦皆宣力效勞而不敢有怠焉者也臣等又恐大兵既撤漏殄殘賊及新撫夷寨或至乘虗反側議留本省並輪戍官軍行委參將等官統領於各該衛堡駐劄防守會同兵備守巡官將殘破城池關隘逐漸修理以為長久之圖遇有殘賊出沒相機追捕以靖地方初附夷民資助安插使得生理候至明年三四月間苗夷既歸地方無事將前留官軍發回該衛所著伍差操其四川𬋩下夭漂夭壩等處黑苗雖經招撫退回巢穴但性類犬羊叛服不常乞敕該部轉行彼處巡撫巡按督行該道守巡官嚴督播州宣慰楊斌責令該管舍目不時撫諭不許仍前越境侵占貽患地方除官軍人等獲到功次該巡按紀功御史宜照造册及將僣王首惡阿傍等會審明白各另具奏軍中用過錢糧等項行布政使造册徑繳該部查照已於本年十二月二十一日班師外緣係捷音事理具本專差將才指揮余大綸奏議以楚衛屬貴州疏杜拯沅靖二州與平清偏鎮銅鼓五開六衛之去湖廣酉陽播州永寧三土司之去四川俱二千餘里遙屬於二省而兼制於貴州服役者興逺道之嗟蒞事者無畫一之軌民情政體甚不便也革數州縣土司專畀之貴州其便有十齊民賦役自逺而移之近勞費損於舊者數倍一便郡縣專心志以聽一省之政令無顧此失彼之慮二便軍民力役彼此相濟無偏重之纍三便科貢悉隸本省禮遇資遣有均平之規四便司道政令有所責成郡縣不敢以他屬為辭五便府衛互制悍卒豪民禁不敢逞六便歲徵緩急可無失程盜賊出沒易於詰捕七便土酋之桀各相牽制不得肆其毒螫八便僻逺之區監司歲至吏弊民瘼可以咨詢而更置之九便釋兼督之虗名修專屬之實政體統相安事無阻廢十便臣愚以為三司所呈聯近屬以全經制其說可行也臣等又看得各省㑹城府縣并置豈徒備官要以親民事悉下情爾乃貴州獨闕焉軍民之訟牒徭役之審編夫馬之𣲖撥盜賊之追捕藩臬不能悉理往皆委之三司首領與兩衛指揮及宣慰司夫三司首領類皆異途操持靡定政體未諳指揮則尤甚矣委牒方承即懷私計防緝未效反貽厲階宣慰則尤甚矣逞其恣睢日事贖罰破人之家戕人之命往往如是故士民爭欲增建府治而該司議程番府附省㑹其說可行也請開貴州鄉科疏田秋臣秋原籍貴州思南府人竊惟國家取士於兩京十二省各設鄉試科場以掄選俊才登之禮部為之㑹試然後進於大廷命以官職真得成周鄉舉里選之遺意所以人才輩出視古最盛惟貴州一省逺在西南未曽設有鄉試科場止附雲南布政司科舉蓋因永樂年間初設布政司制度草創且以逺方之民文教未盡及也逮今涵濡列聖休明之治教百五十餘年而親承皇上維新之化又八年於兹逺方人才正如在山之木得雨露之潤日有生長固非昔日之比矣臣愚謂開科盛舉正有待於今日也且以貴州至雲南相距二千餘里如思南永寧等府衛至雲南且有三四千里者而盛夏難行山路險峻瘴毒浸淫生儒赴試其苦最極中間有貧寒而無以為資者有幼弱而不能徒行者有不耐辛苦而返於中道者至於中冒瘴毒而疾於途次者往往有之此皆臣親見其苦親歷其勞今幸叨列侍從乃得為陛下陳之邊方下邑之士望天門於萬里扼腕嘆息欲言而不能言者亦多矣臣嘗聞國初兩廣亦共一科場其後各設鄉試解額漸增至今人才之盛埓於中州臣竊以為人性之善得於天者本無遠近之殊特變通鼓舞之機由於人者有先後耳今設科之後人益向學他日雲貴又安知不若兩廣之盛乎議者曰科之不開病於錢糧之少臣竊以為不然蓋貴州雖赴雲南鄉試而舉人牌坊之費貴州自辦也鹿鳴之宴貴州自備也今所加者不過三場供給試官聘禮耳鎮逺永寧等稅課司每歲不下數百兩思南府又有棉花稅若設一稅課司委一亷幹府官監收之每歲亦可得數百兩只此數項足充其用况求才大事又可靳於區區之小費乎且歷年撫按官亦屢有舉奏蓋一方之志願上下之同情其建置之地區畫之詳在彼必有定議乞敕該部再加詳議舊額二省共取五十五名雲南三十四名貴州二十一名臣請於開科之後量增數名以風勵逺人使知激勸則逺方幸甚請預籌流民疏田秋臣見得巡按四川監察御史戴金奏內開稱川東饑民流移滿道布政使凌相奏稱四川各處盜賊漸起臣原籍貴州思南府與川東重慶播州酉陽等處接界中間山溪平壤連延千里每遇荒年川民流入境內就食正德六年流民入境數多賊首方四乘時嘯聚起於地名任仙峰攻劫本府婺川縣石阡府龍泉司地方官司不早撲滅遂至擁衆數萬長驅入蜀勤三省之兵延數年之久僅能除之傳聞今年流民入境者絡繹道途布滿村落已不下數萬較之正德六年尤多本處災旱與蜀無異去年雖有薄收人多食少勢難周給其間乘時搶掠者已漸有之本府僻在省城東北三省之交守巡官或因帶管别道或因山路崎嶇往往歲不一至今又進征鎮雄府撫按鎮守諸臣併力西向勢必忽此兩府守臣當釁蘖未啓之時必互相推諉莫肯先事隄防今冬明春兵變必起臣請於鄰近知府或本處兩司推舉素有才望官一員量升副使職銜授以撫民之任駐劄思南府整飭提備撫綏安插邊郡儲蓄素少原無軍衛城池乞於太倉之銀量運二三萬兩前去賑濟備警精選名兵聽用若有不逞之徒乘機騷動者即行剪撲土流巡捕官下鄉擾害者嚴行禁治一應保障撫處事宜聽其斟酌修舉庶患可禁於未萌事得立於豫定而不蹈往年之覆轍矣臣待罪言官有此一得之愚伏候睿鑒採擇施行增設縣學疏李時華為三省干戈幸戢萬年計畫宜周恭陳一二膚見以備善後採擇事內欵開一曰議增縣學貴當開荒草創之初經制未備省城故無府而有府自隆慶元年始附郭故無州縣而有州縣自近始規模初定已儼然省㑹之具體矣惟是新貴有縣而無學尚非全制今播事蕩平諸凡創建煥然一新獨令首善之地有此缺典可乎謂宜增一縣學官不必添取諸府司二學改授一員廩不必設取諸府司二學各撥十名廟不必建府學原與司學共近方改於城外則縣學仍府學舊制可也教官衙舍俱全一轉移間而規制自大定矣此非臣一人之私言也地方先後撫按諸臣皆有此念獨以加廪之難又不欲割府司之所有以是中擱耳今播已剿平何難處此廩餼應行撫按酌議詳細具奏伏候睿鑒施行吏治民瘼疏鄒元標兩廣雲貴吏茲土者悉謂之逺兩廣滇南文物埓中土俸餼稍厚以故人多樂居之惟是貴州僻在亥步窮處黃茅嵐氛猿猱為伍士人聞命有投牒不往者有既赴鬱鬱死者臣請備言其艱辛之狀臣往見都勻一驛丞南京人也懸鶉百結乞食道死又有麻哈等州衙齊荒蕪舉目凄凉而獨山知州吳譽聞者文學吏事亦自名家夜篝燈同女子守孤印皆含寃被論去視諸臣餘可知矣臣每撫膺太息曰聖天子明見萬里外忍使諸臣困至此極耶勞逸不均北門大夫不免興嘆今之情豈異古耶臣愚謂司銓者宜劑量其間除方靣知府知州知縣外如各衛經歷吏目等官或升或遷宜以四川湖廣雲南三省人當之蓋三省風氣接壤視他省稍習如或居官稱職其升遷視他省量速一年庶幾雨露無不被之澤逺臣無向隅之泣報禮有不重者未之信也又雲貴二省原無驛夫以軍為夫道里長逺山勢險峻每夫一名幫貼數名始得成役晝不得力耕夜不得安枕月支米不過數斗亦良慘矣國初屯戍額五千名今清平衛不過二三百人昔何以充今何以耗此其故不難知矣臣愚謂宜敕該部乘此清時一洗民間清勾夙弊至雲貴以軍代夫合無行彼處撫按官乘此清閒悉心議處以杜後患每月量加月米以恤其苦此柔逺能邇之長䇿也不然他日有不可知者矣請廣額疏林喬相貴州古稱遐荒我朝籍入版圖羅甸回春夜郎始旦宣德四年設科取士附於雲南嗣後人文漸興至嘉靖十六年與雲南分科二十五年為湖廣偏橋等四衛生員就近赴貴州科舉始增五名非為貴州且每科常中六七人又於中間妨占名數後節經巡撫臣嚴清舒應龍按臣秦時吉毛在議疏請加未奉俞允人心鬱然况今附四川永寧宣撫司學矣增貴陽府及定番州學矣列聖棫朴作人之化皇上菁莪樂育之仁家藏卞壁人握隋珠真有莫知其然而然者分科之始貴州生員通省止一千餘人今至七千有餘加以川湖五學本省二學若猶仍舊貫甚非所以廣搜羅而鼓舞遐方之士也况雲貴人才本不相逺雲南四十五名貴州連外學三十名多寡懸絶學校漸增解額仍舊每至鄉場棄璞遺珠落卷强半主司長嘆不忍釋手國家科取貢士再無别途皇上興學右文千載一遇伏乞體太祖設科取士之意纍朝久道化成之功酌雲貴多寡之中參今昔盈虗之數增新科制舉之額以揚國家文治之盛使臣等亦得附於以人事君之義則文風丕振夷方興起暗昧得耀於光明疏逖免嗟於遺棄地方幸甚平播疏李化龍楊酋匪茹與國為仇萬姓荼毒三省震驚孰不以為不可以歲月克者乃自出師以來甫三月有奇而元凶授首黨羽悉擒千年狼虎盤踞之窟一旦掃蕩無遺上足以伸中國之威下足以泄生靈之憤其他狡黠土司獷悍惡苗無不落魄亡魂西南半壁天下可永無虞矣皇上德威遠被指授方略所致斷非文武將吏敢貪天功為己力者唯是各官兵暴露行間勞苦萬狀不可不查叙也先是臣奉命入川賊知罪在不赦已統兵深入有擒王剿叛之說遂破綦江且逼重慶地方洶洶皆謂有長驅之志於時目前兵力略無可恃臣乃以計緩之一靣調兵一靣移文詰責若未嘗絶之者賊果信之即具文求撫且不西向臣因得以徵調漢土諸兵急為之備其時賊氛甚張川人畏之如虎臣發成都兵甫出門欲投錦江不復肯東及聞綦江守城兵見賊來競譟而走多投水者止餘二將與其家丁遂及於難臣念漢兵心膽已碎土兵狐有情自非招客兵不可因請調陜浙諸省之兵又念外兵之費甚侈往來途次且生擾害不可過多乃於每省鎮止調一二千多者三千共數省實僅僅二萬其餘乃三省及滇粵土兵也然西南人見外兵來莫測多少以為天下之兵皆至矣自是漢兵之氣壯而土兵之心亦折無不樂為我用者時賊雖知調兵然以為虛聲嚇之如往日非實事也臣亦止在成都積糧治器若無事者然不復東賊亦不疑北兵俱集臣移駐重慶賊始知必剿頗肆衝突然我兵漸益未易得志也臣又念兵以一路進既道狹不能容一有前郤不可復振因分為八路又念路分而兵少賊厚其陳以衝之敗矣因命每路皆三萬以上每一路皆可以當其全師又念關外賊黨多不可勝誅㑹兵部頒賞格至首重招降臣亦推廣之但投戈者皆赦不誅臣又念無賞士不勇往㑹兵部賞格首言得賊者即以其家資與之臣亦推廣之克關破囤各懸賞賞各以千萬計既川兵入關臣又恐其人自為心若九節度之師然因復委按察使張悌入總監之殺牲涖盟務必得賊臣又恐賊事急詐降得以遷延至暑雨漸深我兵不能久因令但急攻之有稱降者斬使焚書無為所紿時湖廣之兵亦至囤下臣欲入營親監之㑹聞先臣之訃臣恐營中遂懈惰不可用因不待成服跣而草檄亦以例應候代照常督兵有慢令者尚方具在令代中軍余德榮等再往監之臣又念賊囤後易攻囤前難攻時諸將壁囤下者各有分地因令以徑兵一枝壁其前其餘并力於後臣又恐諸軍士爭趨賊財物或至亂行至有他虞移文再四申禁臣又聞營中流言水西目把尚不絶賊恐漏軍情因移文令其退劄水西土官懼撤其兵退而引嫌曰吾不欲為亡播之續也時久雨軍士日在泥淖中至六月之初四而天忽晴初五日遂破其二城初六日遂登其囤賊以滅亡總計八路兵生擒賊首賊從一千一百二十四名斬級二萬二千六百八十七顆俘獲賊屬五千五百三十九名口招降播民一十二萬六千二百一十一名口全活被虜男婦一千六十四名口奪獲馬牛七百六十七匹隻器械四千四百四十四件是役也自賊破綦江至剿滅可一年自進兵至滅賊百十有四日當八路對壘時土漢兵既參差不齊諸將領亦彼此觀望播人劫於賊之積威人自為戰未易即克找各路又運糧艱難時有脫巾之呼臣日夜催督走使持檄至數百千即兩省撫臣各路鎮道亦靡不忘寢忘食或至頭鬚為白總之諸文武知廟堂之意必欲滅賊故鼓之即應勞之不怨誅罰之亦無敢囁嚅者倘更一月而賊不滅暑雨久瘴疫深我將自潰無問賊矣該臣㑹同巡撫貴州郭子章巡撫湖廣支可大巡撫偏沅江鐸議得國家方制萬里日所出入之邦悉為郡縣獨西南諸省不廢土司蓋亦曰因俗而治與之相安云耳二百年來此輩犬羊之性不堪馴擾亦時有之然未有如播酋楊應龍之公然叛逆者則何也蓋其地險其兵强其才力足以使鬼通神其聲勢足以呼羣嘯黨加以年來方㝢多事九伐之旌未遑南指彼遂時時狂逞亦遂時時得志井蛙之見謂縣官真無奈我何諸羣不逞如楊珠楊明何漢良孫時泰輩瞷其雄心或時有以公孫躍馬尉他自王之說進者賊亦自念騎虎勢不得下將曰等死耳無且舉大名乎於是恣其狂圖淫怒以逞而破城殺將鵲起西南之勢成矣夫天下非小弱也九州四海兵非脆糧非乏也向賊逆未著皇上不忍遽觀之兵曰吾且舞干吾且解網姑俟其悔過而與之相安無事乃不謂凶人之性不移也始天怒赫然斷在必剿夫斷而敢行鬼神避之况此么䯢者乎蓋自進剿之㫖下上方之劍頒然後海內熊虎之師如雲而集陳紅之粟蔽江而上智士陳謀勇夫效力火燎毛山壓卵賊即欲不灰飛烟滅亦曷可得已臣等嘗即諸路之功而評叙之在四川則楠木三峒賊黨以為三窟謂天險不可升者也婁山關賊前門我所必由賊所必爭者也海龍囤賊以為天造地設人跡所不能到兵力所不能加者也三戰而克之賊力竭矣不亡何待夫賊黨自戰其地猶易與也惟賊父子親在行間諸賊人人致死難與爭鋒該路到處與賊父子對壘最快者九盤子之戰賊悉其精鋭以付朝棟令之從綦江進從南川回此其目中尚復有官兵乎劉綎一戰而走之自是播人為之破膽尤快者諸軍壁海龍囤下連月不拔綎至一日而克其二城賊遂滅亡至今羣口囂囂然竟無敢沒其先登之烈者兵法無選鋒曰北綎於諸路其選鋒乎則綦江路之功也臣嘗言破賊關外宜招降謂多不可勝誅也關內宜疾戰謂師不可老也安村羅村陶洪三寨生口以數萬計勝兵以數千計令貪功者以大兵初入必且多殺以報捷勝之則傷仁不勝則損威矣而該路坐受其降兵不血創自是一戰而斬郭通緒再戰而入崖門關三戰而屢捷於水牛塘賊計無復之遂父子相哭而上囤矣當其入水牛塘時川兵入關去囤尚逺湖貴兵在關外絶不相聞吳廣以孤軍去囤數十里而結營犯兵法之所忌而卒以得志自非其令嚴而戰力當不及此後雖有講降誤事然有激而奮竟以成功逆賊父子盡獲其首終不失為全捷則永合路之功也南川路最險最逺去囤可六七百里賊以為官兵必不能從此進當馬孔英之未至也高折枝以一書生請自將漢土兵以往此固已雄偉不常矣乃師期一月之前先搗官壩營以寒賊膽而撤回龍泉之兵且以解思石之危其事甚奇其功甚大比進兵從真州入真人則簞食壺漿以迎播人則棄甲曵兵而走居然有三代之氣象時諸將欲候各路消息方入關折枝毅然曰若是則誰為當先入者䇿馬而前衆隨其後竟以三月初八日奪桑木關而據之臣用是以催各路尚有四月入者令諸將皆折枝諸路皆南川滅賊當更速抵關而馬孔英至則文武相得如樂之和自是日日約各路攻圍有應有不應甚或以相誹詈而折枝不顧也分攻令下諸將爭走後門該路獨壁前門夫後門我易攻賊前門賊易衝我亦曰誰為當賊衝者蓋亦先入關之意乎破囤之役後門以二路更攻前門以一路搏戰日夜揮戈人百其勇坐使賊自盡而逆黨無一逸者總之倡諸路之先作三軍之氣令黔師不得以賊强我弱借口而竟以奏功臣於該路文武蓋心折焉則南川路之功也在湖廣則偏橋一路江外為四牌江內為七牌皆五司遺種九股惡苗盤據糾結乎其間四牌不掃即武騎千羣未易窺二渡也陳璘獨以一旅之師先掃四牌開我進兵之路用是烏江內賊黨寒心長坎瑪瑙青蛇三囤自昔以為險絶官兵所從未易得志者臣亦慮其難下令降之璘以為除惡務盡竟以一鼓而升其巔殺戮數千臭聞十里時龍泉哨施南兵亦已先克板角關至今湄潭白泥之間四牌七牌之苗遂無遺種非璘之力不及此該路漢兵少土兵多糧運少遲便成噪呼璘令嚴而法肅卒能使之用命而不為害逮至克關逼囤議設木柵製鐵牌以防賊逸其機智有足多者卒以入虎穴得虎子閹人繡女纍纍在俘則偏橋路之功也貴州各路與川湖不同其地近其兵少其餉乏其夷性反覆而靡常其民心搖惑而不定茲之用兵又非以一淬厲一鼓舞之為競者烏江失律己見法矣然能借是以激厲水西俾之絶狐之情踐虎狼之窟母氏囤一戰大足褫逆酋之魄而奪之氣此則失之武人得之文吏蓋運籌者之苦心乎李應祥以孤危之兵當臲卼之時能自審於緩急進止之間以守為戰以招撫為進攻卒之轉弱為强揚旌直指斬首數百招降數萬因破諸囤斬三渡抵白田何其壯也竟以連合川兵同心戮力破重城俘羣醜振積弱之邦舒華夏之氣始如處女繼如脫茲其審於機而神於用豈易得哉則平越烏江沙溪諸路之功也夫我國家從來用兵未有大得志於西南夷者國初傅友德統二十四將軍止言防守未聞戡定正統間麓川之役用兵五十萬轉餉半天下升叙萬人三返而罪人竟逸嘉靖初思田之役以剿始以撫終至今為諸夷借口茲其大致可覩已諸帥固庸衆人臣等三五書生耳其智略才力不及古人遠甚乃兵才逾二十萬進兵才逾百日費才二百萬而幸成功此非臣等之力皆由我皇上神武獨斷委任不疑用使文武同心將士效死爰有成績臣每誦詔旨即十行之札萬里之外往往瞭於指掌而析於毫毛輒沾沾自得以為賊平矣已戰勝於堂上矣夫淮蔡之平直須一斷何况聖朝廟謨洋洋若此哉播地善後事宜疏李化龍查該州地鄰三省然楚止偏橋路通一線蜀與黔蓋無所不接壤夫蜀無藉於播黔瘠壤也若乘此時而割播地以附黔則於蜀無損於黔有禆且臣等别疏又請以楚之四衛并割附之從此黔省幅􅊷得與十二省比長潔大甚為長便但盡屬之黔則地方千里諸凡締造勞費尚多亦黔所不能堪因議設為二府分隸黔蜀庶建邦啓土各自經營成聚成都指顧可就皇上廓清之績既已盡被於三藩而帡幪之仁又復再造於黔土矣除寬脅從撤兵馬招流移厚賑恤抑兼併清橫恣等項凡明㫖所叮嚀而兵部所條議者俱已陸續舉行尚有後開欵目謹集衆思列為十二事呈覽一復郡縣播州南極牂牁西連僰道漢唐改為郡縣在川貴之間亦一都㑹也至唐乾符間陷於南詔楊端取而據之今逆酋既平相應改土復流以變夷俗及照播州白田壩沃壤數百里即播州遵義縣故地當復府治設縣附焉桐梓當綦南之衝走川貴道也舊為夜郎縣故地當復一縣望草南接婺思北達真涪為綏陽縣故地當復一縣仁懷濱播枕永襟合帶瀘為懷陽縣故地當復一縣真州即古珍州川原平衍商販周逰應復一州以上俱隸川省統轄黃平為川貴要區舊設撫苗通判一員列銜重慶駐鎮彼中其與播勢相控馭並為重地應設一府湄潭龍泉地里廣邈各應建設一縣甕水重安合設一縣餘慶白泥合設一縣並草堂容山二司應割隸各縣以上地方去黔甚邇相應改隸貴州統轄總計增府二州一縣八蓋亂流初殄地濶人稀姑建數城以為繫屬以後地闢民聚無妨增設其二府治與附郭縣分正佐首領各應照例全設外州縣正佐首領俱應量減一設屯衛播州地方千里山川險惡夷漢雜居又逼鄰二大土司時有啓疆之志必須設官軍建屯衛以明居重馭輕之勢因設一衛於白田壩與府同城指揮使一員同知二員僉事二員鎮撫一員經歷一員知事一員所屬前後中左右五所每所正千户一員副千户一員百户四員所軍各一千共五千衛所官於從征有功者酌量升授不足者於鄰近願入者調取移實之其邊隅逼鄰土司地方各設屯田每軍照祖制二十四畝再加六畝為冬衣布花之費其三十畝自種自食不必納糧於官又復領出紛紛滋弊各開屯處除養屯軍之外餘田仍照民地起科上納本折於各州縣為衛官俸廪及不時軍興之用每年孟冬仲冬孟春仲春農隙各屯官時加操練又以十月二月望日齊赴兵備道大操三日驗其武藝較其强弱而明賞罰焉老弱者汰之一屯老弱多者並革其官軍田即另募壯丁補伍庶軍得實用異時即募兵散盡此五千軍與主兵三千自有八千可用之兵矣一設兵備播地三靣環夷干戈甫戢當此經綸草昧之始設立有司可以招撫流亡或未能長駕遠馭而圖久安布置將領可以備禦倉卒或易於生事徼功而開邊釁欲以內修戎備外懾夷心整肅羣僚畏服衆志為地方長久之計必設分巡兼兵備官一員於播州白田壩新建府城駐劄專一整飭新復郡縣并重慶衛忠黔二所永寧酉陽石砫平邑等土司兵務兼理有司錢糧獄訟其重慶府巴縣綦江南川涪州武隆彭水切鄰地方悉聽管轄以便行事黃平新設一府四縣雖割屬貴州但人心初附田上界連與貴州水西宣慰司并聽兼制一設將領播淪於夷閲八百餘年風俗獷悍法令扞格已久今地雖蕩平而逋孽潜藏漢夷錯雜招苗樹黨越界侵田時所必有今議播州留兵一萬黃平留兵三千粗足防守然必得一大將鎮之始可無事查得先年克平九縣議留總兵一員鎮守其地今建武視播稍緩即一參遊足領之合無將軍門標下添設練兵遊擊一員改駐建武防守原設總兵移鎮播地應留各兵挑揀家丁三千員馬三百內標下標兵家丁二千七百馬二百七十以坐營千把總領之兵道員下家丁三百馬三十以中軍領之有事俱聽總兵提調名為正兵此外兵七千酌量分布於白田壩真安桐梓等縣播川等邑防守內以一遊擊領三千以二守備各領二千各用千把總分領之有事征戰無事即為築城鑿池建郡縣修郵驛之用糧銀照依舊例支發徐俟建置竣工日除家丁三千馬三百外餘軍以次議撤有願附籍當軍及民當差者聽千把總俱於附近衛所官內選用其黃平留兵三千仍設一參將領之總聽防播總兵節制一丈田糧環播幅􅊷千里田地無慮數千萬畝舊時額糧止歲以五千八百石輸貴州蓋蠻方賦稅原輕至應龍巧立新法名曰等賨每田一畝徵銀數錢初猶斂其財以招苗後并奪其地以養苗而賦法蕩然盡矣今既改流自當責成道府親率州縣官定疆界沿丘履畝逐一丈量分為等則造冊呈報以定賦法額糧輕重蜀無定規查克平九絲丈量田地分别上中下三等每畝上田四升中田三升下田二升播地山水間雜不止三等尚有上上下下者宜逐項分析最上者一畝可當上田幾畝最下者幾畝可當下田一畝則待臨時酌定難以預計丈完總計田地若干糧若干徵本色若干折色若干俟二年之外起科除足一年夏秋二稅銀力二差一切雜費外餘解布政司充邉餉支用一限田制播土舊民自逆酋倡亂大兵征討之餘僅存十之一二遺棄田地多無主人冊籍不存疆界莫考復業之民往往冒認影占原少報多原瘠報肥甚至一人占田一二千畝尚有異省流徒假播籍而希冒占者今應將播之舊民號楊保子者查果真的無論原業肥瘠俱人給田三十畝上中下攙配均給若一處皆上田皆下田者臨時酌給大率純下田多不得過一百畝純上田不得少過二十畝其原非播民凡不能為楊保語者無問曽否寄住皆不得妄認遺下無主民田另行招人承種納糧當差應龍官莊并楊兆龍田一鵬何漢良等諸擒斬過有名頭人莊田盡數沒官聽三省之民願占籍播州者承糧其領田之人查照時值量行上納以充目下建立城池衙門驛傳諸費亦定為限制平人不得過五十畝指揮千百户不得過百畝俱於丈量時定糧定價令不得那移州縣官收過絶産價值給付印契登入循環聽兵備道稽查轉報撫按查考官吏乾沒從重治罪一設學校播故有學宋元之世俊茂朋興如冉從周猶道白明鎮之流俱登進士蜚聲上國自逆龍禁錮文字寇讐儒生坑儒燔書禍同秦始今干戈既戢文教宜先白田黃平舊有學宫補葺亦易特當於二府原學各補教授一員訓導二員至博士弟子員無論附郭外縣但入學使之選者蜀新四縣隸白田學黔新四縣隸黃平學待各縣人文漸盛物力稍紓嗣各立學未晚真安既改為流其地方殷富人物頗華亦須建一學宫設一學正以示維新之化一復驛站播州各驛自逆酋閉關負固驛官不敢赴任過客不敢經行站户逃徙館舍丘墟十數年矣茲者地方底定道路大通驛站之設勢不容己查播州舊轄松坎桐梓播州永安湘川烏江昌田砂溪仁水湄潭鰲溪岑黃白泥一十三驛俱當川貴孔道所有各該驛館應趂時興工合用匠役亦於兵夫內查有慣造者徑撥不足者於附近州縣取用工食銀米計算於該邉支剩軍餉內動支仍責成新設府佐一員往來稽督不許虗冒錢糧曠廢時日事完冊報又查各驛夫馬支應及官吏俸薪舊額土司供辦今既改土設流似應與腹裡驛站一體僉𣲖但流民授田方始難便買馬行差目前一切站銀暫令官為出辦俟里甲稍定即行編𣲖至夫馬額數應照衝僻為凖湘川驛附郭為四路最衝應設馬四十匹夫八十名松坎桐梓播州永安四驛地衝路險應各設馬三十匹夫五十名烏江仁水湄潭岑黃鰲溪白泥各驛俱次衝應設馬各二十匹夫各三十名昌田沙溪止通水西次僻應設馬各十匹夫各二十名各驛官見在者行令赴驛任事驛吏因屬土司舊未撥發今應行川貴兩省布政司照缺查撥一建城垣播州一府一州四縣與黃平一府四縣並宜改築石城石少者以甎代之其兵備道總兵府並府衛州縣衙門公署倉厫庫獄城隍廟演武場與二府一州儒學文廟殿廡齊舍等項俱當以次修舉而各官一抵地方棲身為急衙舍之建尤宜首圖各府州縣正官選委勤敏佐二於堪動銀內行支尅期興工多方稽督大約城垣以歲辛丑二月內起工限年終落成餘各以次修舉就中員役有怠惰冒破工力草率者俱聽該道參詳拿究事竣之日造冊報撫按衙門奏繳庶險要可資防禦有賴一順夷情播州皆夷也大兵之後為賊用力者芟夷藴崇已無遺種今見在者曰各司土官曰七姓奏氏曰投降夷目皆宜安插得所顧就中情事不同亦宜分别如八司曰播州真州白泥餘慶草堂黃平重安容山內安撫二長官六又一司甕水原無印信亦稱長官又有宣慰司同知羅氏此皆世有官號與播並建者播州長官王積仁以附播被擒獻俘與楊氏俱滅真州附播多年綦江之破助兵三百著在耳目同知羅氏與江外五司具疏改流挑怨速禍至有今日之事海內震動流血千里則諸司者罪之魁也故說者謂真州宜正其附播之罪江外諸司宜以起釁絶之苐王道如天罰宜從輕賞宜從重真州當進兵之初率先歸附正副長官各以千人從軍江外諸司各招兵聚義充黔楚鄉導合將真州長官即為該州土同知副長官即為土判官江外諸司安撫與正長官即為該縣土縣丞副長官即為土主簿同知羅氏為新府土知事此外尚有投降夷目原非長官本無冠帶但賞格曽坐名開諭輒爾先事歸誠亦宜少示眷酬以明恩信如上赤水里頭目袁年父遭酷禍投降最早宜授以所鎮撫職銜下赤水里頭目袁鍪仁懷里頭目王繼先安羅二村頭目羅國明羅國顯安鑾以上五名念其返邪歸正量授冠帶總旗諸人田産止將本身者照冊撥給應納稅糧通附州縣官處上納其餘里人俱今附籍納糧當差不許仍以家人為名恣行霸占違者治其前罪至於七姓奏氏始助楊氏之惡繼傾楊氏之族尤為禍首今蒙王仁寬宥外如仍蹈故習豪橫害民該道徑行拿問發落地方人民指稱前事告害者亦如之一正疆域播地東北接連三省縣衛各有疆界無容溷淆西南左接水西右逼永寧雖犬牙相攙未能齊一然畫野分疆亦自有相沿界址惟是夷性互為雄長强則侵凌弱則減削甚至有一地而甲乙互臨一人而齊楚兼事如儒溪沙溪水烟天旺皆播州五十四里之數見有黃冊可考緝麻山李博埡仁懷石寶甕平等處亦皆播州世業祗緣先年楊氏中衰時曽為永寧水西侵占後應龍當事治兵相攻恢復故業各邉目又已任其糧馬兩下支持此在土司可也今既改土設流自宜各復其故乃水西正求清查永寧輒行瀆擾且動以瓜分為言罔上行私垂涎占業應行該道㑹同鄰近道分及早清查一切相鄰地方原係播者歸播原係永寧水西者歸奢安刻石立碑永為遵守其鄰邊目把如不安分義妄肆爭侵重行究治干礙土官一併參處此疏從四川志中採入叙播中善後事最為詳悉但前書十二條後止列十一條且文勢尚未收束疑有脫簡别無書可查姑仍之開平越新疆疏郭子章題為播地蕩平經制宜定敬陳善後切要事宜伏乞聖明採擇以永奠遐方事萬厯三十一年據貴州布政使司經理分守新鎮道等呈前事該臣看得播未平之先急在征討播既平之後急在經理征討者矢在弦上不可不發經理者鹿在圍中不可不緩仰誦明㫖一則曰牽纍的都免窮治流移的招他復業還與優加賑恤以安新定地方一則曰招撫流移復業毋令豪强冒奪大哉王言明見萬里恩加八番所以安集鴻鴈於澤休息鴛鴦於梁者靡不周且詳矣臣等奉行綸音宣導德意與經理諸臣上自道府下至丞尉亦至於再至於四矣顧經理之節目甚瑣甚冗而其體統在官與民土官曰先人歷代遺土新官曰朝廷業已改流枘鑿不相入而互相持舊民曰此吾世業而偶失之也何知新民新民曰汝罪人幸而脫刃者也何得復戀熊虎各相噬而勢相戕甚至新官與新民依倚土官與舊民連結各恃衆怙力將人人棊峙以觀成敗此體統之難正也築城垣於豺虎之穴而獷悍不可使度田土於荆棘之中而尋丈不可核建學校以化夷而口舌紛紜徵糧馬以給公而支吾推諉開道路以通商而戎賊莾伏物力詘而無以應多役粻餉殫而無以張兵威捉襟則肘見調宫則商亂甚至謂改土徒勞不如還舊此節目之難理也臣與督臣按臣㑹議諭諸經理司道府官凡教在初而禮為始暫給土官冠帶劄付引於繩之內次定與縣令迎送接見儀節委以職事稽其勤惰毋令逸於繩之外而官志始定查舊田有憑者還舊主查逆田入官者給新民俱不令入價而責其納租土著子弟稍通者令之入學青其襟毋左其袵新民子弟即平通者止令寄學不許觀場二十年後始令赴試而民志始定體統既正漸議築城垣首砌龍泉次砌甕安又次砌餘慶湄潭又次砌平越水城黃平州城銅仁縣城又次修銅仁平越府城新添龍里衛城又次築平越行府銅仁營堡而城垣舉矣即不敢謂金湯足恃而三板安堵千里聨絡實空虛之地為扞蔽之資脫有不虞民亦可倚而守也乃漸議度土田起糧馬丈出田地一十九萬四千有奇歲徵銀一萬五千六百有奇本色米四百有奇雖比之遵義不及十之一而在黔中稍稍成聚即一郡一州四縣官員之俸薪道路之夫馬皂快之工食踐更之戍餉僅僅取給焉又漸議建學校則改平越衛學為府學以黃平州學附於平越府而土著新附之子弟肄業有地變椎結為絃歌柔靡莫而詩書或者其藉此乎又漸議開道路則團聚哨兵建立鋪户修飾候館滇楚賓旅亦稍出途回視豺狼當道荆棘塞路之時則有間矣蓋自播平至今已歷四年各官經理亦踰一載城市鮮犬吠之驚叢祠罷狐鳴之盜是皆皇上威逺暢惠廣被故令夜郎牂牁驚鳥獲安平江湄水窮魚復樂豈臣等區區智力所能辦哉苐二三營造拮据之臣其勞亦有不可泯者謹將各府州縣築完城垣公署丈完田地糧則並户口册籍上塵御覽題設府州縣疏略郭子章播州之地東西相距二千餘里南北相距二百餘里雖云憝國亦係樂土今議改流東西可設二府每府各設二三縣播地原屬四川與貴州鄰二省界限原自分明至論建置大概臣意自沙溪以至白泥當以烏江為界設一府於白泥壩而真州蔞山松坎等處可為三縣黃平在元已為府矣當設一府於黃平或平越而餘慶白泥二司可為一縣甕水重安二司可為一縣此沙溪至白泥一帶建置之大概也自白泥渡江至婺川縣以三渡板角苦竹三關為界其中漢苗田土雜錯惟湄潭可縣龍泉可縣龍泉土官安民志陳亡其子尚幼其印已失土地已為楊賊踐躪合無將龍泉改建一縣增置城郭而以安民志之子世為土縣丞以為死義者之勸其祖職長官世為土主簿此則思石一帶建置之大較也苐播州之名其來已久播之為字番之有才者也以故應龍阻兵崛强獷戾竭四方之力僅乃克之夫南越破而聞喜建呂嘉得而獲嘉名龍州平改為龍安九絲夷更名建武即播州納土於宋亦改名遵義計廟堂當有定謨而播之名似當更易題設新貴黃平等學疏郭子章臣看得建學育賢化民成俗首務今據司道㑹議改平越普定二衛學為平越安順二府學增設黃平州新貴縣二學裁平越衛學訓導改黃平州學學正裁宣慰司學訓導改新貴縣學教諭此一轉移間不煩官帑允宜建設黃平州學除土司土著子弟照舊取考外其新民子弟須照禮部題准近例三十年後方准收考今據司道府㑹議黃平等州縣乃新造之邦土著鮮少禮義不知新民子弟目前准其收考文理平通者止許入學不許觀場待三十年方許入試既不失化誨苗方之意又不礙冒籍中式之例似應俯從其平越安順二府學廪額貢期俱照都勻府學例各廪二十名一年一貢黃平州學准廪十名二年一貢須在十年之後方准起貢二衛學印記當改為二府學印記至於增解額一節邇來黔中文教漸昌庠序日增且會試中式不下於粵滇而鄉試解額獨少於二省似應於原額量加以廣聖化伏候睿鑒施行題奏缺漏申侍御土木堡忠臣廟名位疏蕭重望為立闡幽忠乞懇天恩俯從輿論敕賜入祠表揚忠孝以鼓天下賢豪人心以勵萬世地方風俗事臣代巡宣大等處地方密訪風俗輿論首及忠臣孝子義夫節婦貞烈諸輩賢良等臣拔擢其一以為國家巡方得人慶幸臣遍查屢訪無一可得忠憤之懷時勤諸念轉思薦揚舉核之典朝廷總以風勵人心人才難得自古記之頃者巡歷土木堡見忠臣廟忠憤之念勃勃欲發竭誠詣祠展拜親目牌位姓名係正統時死難諸臣獨未見申侍御忠臣牌位目擊心傷寸腸碎裂萬斷已何也申侍御黔人也名祜原任巡按四川監察御史其死節實蹟臣亦黔人稔知最詳即他無所論叨䝉景帝敕命一道旌忠真為的據其節有三臣請為陛下言之祐在童時居鄉隨父之田虎忽爪父去祜執杖擊虎脫父命於虎口事親之難其一及鄉試入胄監國學祭酒李時勉以言事忤㫖枷示國子監門祜倡六館諸生石大用等撾鼓願以身代師難上霽天威得釋事師之難其二逮至土木之役王振惑帝親征兩軍對壘危亡旦夕上命羣臣中選有與朕貌相合者不妨代朕乘輿庶脫朕難衆推申侍御與君貌若相似即命以身代天躬乘鑾遠馭保帝駕以全歸事君之難其三嗟嗟鑾輿反正宗社寧謐聖子祌孫所以晏安坐享太平全盛之業者伊誰之力也哉奈何天順改元登極竟忘代駕之命通紀不掛一字諡與廕典不及一言而土木堡忠臣廟渺焉無聞公道湮沒之後人臣亦何樂於以忠自見者景皇帝即位尚憫孤忠之死難深憐塞草之悽愴寵賜祜以敕命連廕二子申璉申瓚恩榮第緣兵荒未襲迄今終屬缺典正統時同死事諸臣百千其人但無親識在朝子弟在職當國步多艱之際倥偬喪亂之秋誰能啓聰牖明代為悉晰也者申祜逺在天末非景帝賜以歿後龍章即臣抱憤縷悉代訴終為虛誑雖然忠貞湮沒士類𨼆跡如申祜者宜載皇明通紀英國公張輔尚書鄺野等十四位以上不惟今人中少此子臣弟友之完人即三代前克敦在三者亦罕見此臣隨據㑹試舉人申承文呈稱先祖故宦申祜有功英廟抱恨沙漠良以焦頭爛額為上客意也臣行牌委懷隆兵備道孫布政并土木堡操守王懋德及儒學陳所學暨諸生鄉耆等有傳聞識記者確查回報覆案屢訪細查與臣里閈紀載者吻合無差再閲禮部尚書程敏政議草為申侍御代駕死難苦忠扼腕不平疏稿可見公道恆在人心天理不容泯滅伏乞陛下敕宣聖㫖乞將申忠臣補入廟祀請加諡號以光幽穸廕及子孫以隆恩典我皇上培八百年有道之長享千萬世無疆之福在此盛舉矣謹疏題表吳氏節烈疏馮晉卿題為遵例表揚節烈以勵風化事臣竊惟民風至今日而凌夷矣朝廷化民成俗盛心三令五申臣綱紀一方無日不宣揚教化罔敢少懈每念士人之守己如女子之守身二者並重揚女貞以勵閨範即借女貞以勵士行誠今日維風易俗之急務也臣每巡行首問忠孝節義若事有可紀行無大奇者即照例表閭旌以布粟不敢概見啓事其應請㫖旌表者為已故烈婦吳氏係普安州貢生蔣橋之妻於萬厯三十二年生一十四歲適夫蔣橋於天啓三年安賊陷城氏夫蔣橋為賊擊掠幾死復執吳氏罵賊不辱挺身投烈熖之中自焚時年二十歲道府通詳到臣復行提學僉事龍文光查核無異呈報前來該臣看得見危授命人臣節也自廉耻道喪而偷生茍免之事屢見於縉紳大夫之間吳氏以一婦人能力持大義罵賊亡身烈烈轟轟視巨熖為植節之場與日月爭光可也男子中猶不可多得况井臼中饋者豈易能耶伏乞敕下禮部即將本婦節烈再照查核請㫖照例從優旌表於以維正氣而勵民風匪淺矣臣無任悚息待命之至貴州通志卷三十四
