堯韭又名昌陽一寸九節生石上者可入藥蕁草即燖麻多刺生於澤畔土人採以沃湯可療瘋瘃茯苓黃蘖陳皮青皮厚朴枳殼茱萸海椒俗名辣角土苗用以代鹽牡丹花繁多種其美者曰鶴鴒紅軍容紫海棠有鐵梗西府埀絲三種沈立海棠記云蜀花之美者有海棠黔鄰蜀故比他省為多繡毬府屬尤繁盛梔子即薝蔔花一名越桃桂花有黃白紅數品至秋而開亦有四季放花者杜鵑俗名映山紅芙蓉至秋而開一日之內花容遞變由白而淡紅至深紅出貴陽者花瓣細密色更鮮艷水仙芍藥一名婪尾春木香薔薇荼䕷雞冠蛺蝶蜀葵向日葵月月紅山丹鳳仙剪秋蘿罌粟虞美人石竹芭蕉蓮紅白二種菊紅白黃紫數種不甚佳秋海棠鐵線蓮玉簪竹松柏栁椿槐棕櫚楓桕梧桐有青白二種冬青其實名女貞子紫薇一名百日紅花攢枝杪紫荆雞鵝鴨鴿雀鷹錦雞産深山中杜鵑一名子規春深始鳴土人呼為催耕鳥鷓鴣藏叢薄中似雞而小啼聲悲切鴉鳩鵲燕鶺鴒鷺布穀鴙䳺鶉鸛隼鷂畫眉烏鸜鵒鸕鷀鵁鶄鷗鶻啄木百舌鳬馬舊出養龍坑土人立栁坑畔擇牝馬之貞者繫之當雲霧晦冥時有物蜿蜒上與馬接蓋龍云候天色開霽視馬傍之沙有龍迹者則馬與龍交必産龍駒明洪武時夏明升曽得獻之牛羊驢騾犬豕貓鹿獐麋猿猴麂兔狐狸虎豹熊羆豺野豬山羊貛即果狸鯉鯽鮎青魚鱔鱉螺鯪鯉蚌龜蟹最小不可食以上係本省各府州縣通産雞㙡出府屬有紫白二種白者不可食初秋生蔓草中始奮如笠既如蓋漸則紛披如雞羽故曰雞以其從土中出故曰㙡蒸食甚美然不可多得不如滇産之廣羊肚菌亦生於細草中俗以形名美倣雞㙡蒟醬味辛乃蔞蒻所造食之可以消悶木薑子産深箐中實如胡椒味辛香可佐食硃砂出開州三腳巖白洋林等處土石相雜穴洞深入取出淘洗用力甚艱有箭簇箇子斧劈鏡面諸名水銀出修文白馬硐馬蹄關等處以硃砂熬鍊而成鐵出開州木老山三岔河等處貴築修文亦有降真香出府境深箐中懸巖上古藤所結厯久乃香雄黃器出府治以雄黃琢成人物尊巵之屬頗工緻榖皮紙出定畨翁貴白韌如綿俗名綿紙文史多用之土人或以製帳厚者名夾紙油之以為雨具葛布舊出貴定甚粗苗布定番苗婦所織為手巾亦佳苗錦亦出定番茶産龍里東苗坡及貴定翁栗沖五柯樹擺耳諸處土人製之無法味不佳近亦知採芽以造稍可供啜天麻出府境俗名土蘿蔔性辛溫治諸風明亮堅實者佳其苗名定風草紫草出定廣間其根主理血又用以染茜羊桃藤出府屬爾雅曰長楚姚弋今羊桃也白花子如麥其葉與實皆類桃取汁可膠巨石藍修文廣種其色最青桃竹出府屬烏江等處可作杖䈽竹出府屬養龍諸苗寨最有筋力為用甚多俗名筋竹蘭府境山谷中生有黃白紫碧數種然幽香遜閩産亦有蕙玉蘭出府屬以上係府屬專産安順府革器有盤盂尊罍之屬纍漆以成故耐久偽者布以灰不足用皮韉綵繒光澤柔韌耐久鐵笛布出永寧鎮寧眉公紬出清鎮稍粗可為衫裡蜜羅柑藤本實大如瓜皮黃厚如佛手白肉無穰甜與蜜同作清供香色經日不散出永鎮等州山間梨産鎮寧等州美異他郡無花果出永寧不花而實生於枝葉之間其大如李沙參府屬俱有其苗可食三月採威靈仙其根叢鬚治風濕紫石英出永寧州屬色淡紫瑩徹大小不一皆六方兩角青風竹出永寧關嶺俗名藍竹仙人掌無枝葉狀如人掌側纍而成自三掌至十三掌而止色緑七星魚出永寧即鱧魚又名鮦魚首有七點細鱗黑花又諸魚膽皆苦惟鱧魚獨甘可食平越府杉板紅班稠糯香禾米豬毛糯金叉糯俱晚稻名府屬皆産葛布舊出府屬橘出府屬白花赤實秋深金顆壓枝離離可觀黃精出黃平俗名山生薑製服之輕身延年何首烏本名夜交藤秋冬取根赤者雄白者雌出甕安重十餘斤者佳南星出黃平大者南星小者半夏黃蘖出府境石膏出餘慶草坪里木香出府屬叢生其色有二黃者無香白者心紫清馥襲人黃夀菊出餘慶瓣大於菊金黃色耐久不落桃竹出餘慶通名棕竹紫竹府屬皆有水竹節長而質薄竹雞出黃平都勻府苗酒出府屬色紅而味醇厚鉛舊出府治東沖有白黑二種棉花出八寨髙坡間遍植斜文布出獨山州爛土司甚密緻橘出府治者佳土人呼為金橘柑麻哈州出者佳他屬不及栗清平出者味佳銀杏出府屬俗名白果梧實出清平百合府屬皆有方竹出府屬體如削成徑挺堪為杖桃竹通名棕竹出獨山州秋蘭春蘭是處皆有惟都勻産秋蘭邵白溫曰細葉者春花花少葉濶者秋花花多勻鴨肥美肉離骨鰣魚出都勻江一名箭魚土人於春夏之交間網之亦不多得鎮逺府白露早洗耙早俱早稻名杉板紅香禾米府屬皆有金間出天柱縣然採之甚難無餘利且地近苗穴今已封閉柑皮細者佳山茶出府境自十二月開花至二月與梅同時其色淡紅一名茶梅萱草出府治各溪邊榆一名白粉所在皆有管子五沃之土其榆條長四民月令曰榆莢成者取乾以為旨蓄其皮亦可食木槿禮記仲秋之日木槿榮土人取其材以編籬竻竹䥷竻嶺南竹也又名澀勒東坡詩倦看澀勒暗蠻村是也肇慶府志竻竹俗名刺竹竹譜曰笆竹有刺可作籓落本草綱目訛為刺竹蔓竹府屬俱出廣南志皮青內白軟韌可為索俗名棉竹用以織筐篋等器竹雞出府屬油魚出府城東江上味蟹出鐵溪小如螃蜞而有味故名思南府金叉糯出府屬香美逾於諸種蔓菁又名蕪菁孔明南征所止處必令軍士種之人因呼為諸葛菜硃砂水銀出婺川木悠板場巖頭諸處鐵出安化文石出白鷺州文有五色可為盆玩棉花是處皆種居民紡織為布葛出府屬茶出婺川名髙樹茶蠻夷司鸚鵡溪出者名晏茶色味頗佳白蠟佛手柑本閩廣佳種今府屬亦産重有斤許者橙出府境其大者如盤有别致銀杏黃連出婺川者稍良茱萸出印江菖蒲出府屬五色芙蓉出朗溪司茉莉出沿河司蘭出府屬油桐是處栽種結實如桃取其子為油竹雞出府屬白鷴出府境鴛鴦出府屬猴小者如拳黃蠟府屬皆有石阡府硃砂水銀鐵俱出府屬各土司地棉花黃蠟出府屬苧麻出府境木瓜爾雅謂之楙所在皆有知母府屬俱出楓香出龍泉湘妃竹俗名斑竹府屬皆有鹿出龍泉白兔府屬皆有白甲魚出龍泉思州府粟即小米有黃白二種青溪廣藝秬即黑黍出青溪硃砂舊出施溪鉛出都坪司鐵出龍塘金星石出架溪潭中堅潤者可琢為硯葛棉花西瓜出青溪綿紙火燒笋出青溪山上多竹歲十二月土人縱火焚山至春笋生味甘美與他竹所生者異鱸魚出玉屏巨口細鱗味美銅仁府硃砂銅仁産者有形如箭鏃者號箭頭砂最為可貴産於萬山厰他砂皆産於土中此砂獨産於石夾縫中取之最難每塊並無重至一兩者黑芝麻出府屬方書稱久服能烏鬚髮可以延年水銀鐵舊俱出大萬山等處葛布府屬俱有白蠟楠木舊出深山中今已伐盡杉舊産山間今亦伐盡黃楊府屬俱有箭竹細小而徑通竿無節可為箭黎平府鐵出各土司地方洞錦出曹滴司以五色絨為之皆苗婦所織精者甲於他郡又有諸葛硐錦出古州皆紅黃棉紗所織甚粗不可用葛布出府屬皮布出土司地方苗人採樹皮所織木耳出深山中土人伐楮樹卧於地雨久則生茯苓府屬廣出松根下結成大塊堅白者良紫草出錦屏排香草出府境俗名隨手香降香出永從乳香出錦屏一名薰陸香如乳頭透明者為良市人以楓香偽為之青皮香出府境各土司地方居人取焚頗香大定府巖尖穀羊毛粘稻名府屬俱産麥藍菜出威寧州葉如麥藍味頗香木耳香菌俱出威寧西瓜出黔西者為佳土瓜出畢節形如茯苓煮食可療飢銀礦銅礦黑鉛白鉛俱出威寧各厰畢節亦有黑鉛厰乳漆器漆出平逺州寨中土人加五色纍器雕刻斑剝謂之纍漆雕漆革器出府境諸器俱有制同安順堅緻過之馬氊出府治即羶裘鷜毼土人聚羊毛為之可以禦雨褐出威寧致化里葛出平逺遍山皆是葛土人採製之甚粗茶出平逺山巖間製如法味甚佳烏梅出府屬松實出威寧地産大松其實如松子而味清香花紅出府境味甚甘無花果出平逺茯苓出威寧致化里丹參黃芩山樝出威寧是山皆有有大小二種小者入藥一名棠毬子薏苡仁出黔西平逺山丹出府境葉莖花俱類百合根大如拳粉可充食杜鵑花四季桂出府境俗名七里香鸚鵡出威寧可渡黑章等處白鷴出黔西九香蟲出畢節赤水河馬出威寧舊為水西烏撒地所謂水西馬也麋出府屬豪豬俗名刺豬其狀如豚鬃毛大如笄白根黑端能射物苗人拾其豪以為簪竹𪕋一名竹鼠嶺南所珍其狀類松鼠大如鼠重可二三斤食笋故腴美得之最難以上二物府屬俱出南籠府硃砂雄黃俱出永豐州近粵西地水銀出普安縣濫木橋厰黑鉛出丁頭山厰鐵出鷓雞厰榛出普安州山間紫羅橘出安南俗名蜜筒香色似蜜羅而小皮薄有穰橄欖本閩廣所産今安南亦出即青果舊志謂與青果味同而實細苧麻出安南供績織子亦可食粉葛蔓延遍野根可漉粉花可解酲有甘苦二種芭蕉花大如盆其子房包甜美普安州多此種楓香樹出安南樹似白楊葉三岐經霜則丹有脂而香歲久則生癭文理堅緻土人或得之深山中俗呼為癭木羅漢松古名麈尾松出普安笻竹竹譜載髙節實中狀若人形俗謂之扶老竹張孟陽云興古盤江縣今普安州是也俗名羅漢竹竹雞出安南猿出安南遵義府白鉛出小紅關等處鐵出府屬漆出府境布土人所織甚粗綿紙出綏陽者為佳靛府屬皆出楊梅出綏陽仁懷二縣香櫞出仁懷皮粗而大香於他郡佛手柑亦出仁懷黃連府境及各屬俱出仙茅出府境茉莉南方草木狀稱其芳香酷烈嶺外海濱恆多今黔省亦栽隔年則不花獨仁懷土地為宜楠木産正綏桐三屬近亦難得黃鸝府屬俱有畫眉府屬皆有鰉魚府境所産不大漁人偶得之亦如都勻鰣魚以通省所無而珍也貴州通志卷十五
