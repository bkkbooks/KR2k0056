body:
  text: 欽定四庫全書貴州通志卷三十三藝文序敕論詔解諭考疏傳狀序頌事紀贊記針記碑銘文書議議教詩說記雜賦南離為文明之方夜郎接荆梁之壤周秦以還屈宋流芳湘水揚馬摘艷錦江獨牂牁古郡徵文考獻零落無傳亦又何也自有明王守仁鄒元標倡明理學何景明吳國倫諸人並播風雅繼以郭子章之纂述黔記搜討故府博採舊聞彬彬質有其文矣我國家文運𢎞開化成天下洎乎滇黔底定誕告萬方列聖重光德意旁敷天章炳煥奎文所被炳炳乎荒裔遐阻咸耀於光明下及對揚所述敷奏所陳皆辭尚體要動中機宜固不特原本山川極命草木斐然有作卓爾不羣已也至於靈蛇自斷人虎復形說類虞初事同志怪列諸雜紀以資博雅云述藝文志歷代宋太祖諭普貴敕豫以義正邦華夏蠻貊罔不率服惟爾貴州逺在要荒先王之制要服者來貢荒服者來享不貢有征伐之兵攻討之典豫往年為扶播南楊氏之弱勞我王師罪人斯得想亦聞之有司因請進兵爾土懲問不貢豫曰逺人不服則修文德以來之窮兵黷武豫所不忍尋乃班師近得爾父子狀知欲向化乃布兹文告之爾若挈土來庭爵土人民世守如舊故兹制㫖想宜知悉明太祖諭湘獻王敕前令爾兄弟以七月二十徑剿洞蠻今占太白七月三日伏未可行十月二十三日當夕見西方太白出高入深者勝此用兵所當知者今指揮齊讓已歷蠻境令且出奇設伏嚴為備禦休息士馬以乘其敝候太白出後併力討之若生擒蠻夷不可輕殺蓋兵以安民非殃民也明太祖諭楚王同湘王征古州蠻敕近蠻夷倡亂爾能與民同憂率護衛軍馬親往征之豈不稱為賢王夫尊居王位安享富貴宫室衣服輿馬之奉皆民力所供而不能為民禦災捍患則鬼神必怒百姓必怨福祿將薄矣若能奮威武除民患山川鬼神亦將助順福祿庶可悠久爾其欽承明太祖諭築銅鼓城敕前令爾兄弟帥師征蠻既不親臨戰陳建立功勳宜各以護衛軍一萬銅鼓衛軍一萬靖州民夫三萬餘築銅鼓城每靣三里城池宜高深坊巷宜寬正營房宜齊整期十一月訖工令銅鼓衛指揮千百户守之其銅鼓軍士除留一千守衛餘從總兵征進至耕時令還本衛爾兄弟可率築城護衛軍士還國繪圖來奏明太祖諭西平侯沐英敕曩因元政不綱豪傑縱橫朕提師旅與之並驅十有二年然後命征虜大將軍平華夏諸將四征五年中原是平萬姓寧家紀年已十五年矣惟爾烏撒烏䝉東川芒部建昌等處抗命弗庭况雲南梁王誘我邉士因是發征南將軍潁川侯傅友德副將軍永昌侯藍玉西平侯沐英率三十萬衆問爾西南諸夷之罪今潁川侯等報至言雲南等處盡行克復今特遣使齎詔諭爾雲南烏撒烏蒙東川芒部大理建昌水西普定等處人民今後敢有不遵教化者加兵討平之於戲春秋之義最重者釋有罪而納逋逃爾雲南王及諸夷蠻長宜其然乎明太祖再諭西平侯沐英敕東川芒部夷種雖異而其始皆出於羅羅厥後子孫繁衍各立疆場乃異其名曰東川烏䝉烏撒芒部祿肇水西無事則互起爭端有事則相為救援若唐閣羅鳳之居大理唐兵追捕道經芒部諸境外稱歸順內實挾詐聚衆積兵據險設伏唐將不備遂墮其計以致喪師幾二十萬皆將帥過信無謀故也近稱東川諸夷不叛者號為循良雖未可逆詐然須防間嚴整師旅使不得肆其奸謀然後賊可破也明太祖諭信國公湯和敕行師用兵須晝夜慎防毋輕視蠻人深入其地雖有來降者亦須審察慎勿輕信辰沅寶慶等處士卒壯者攻戰弱者運糧務使軍容整肅饋餉有餘楚王尚幼未能練達軍務今遣都督劉寧來總宿衛之兵軍旅之事卿自裁决然後啓王知之明太祖諭宣慰司敕天生一代之君必成一代之治自古以來莫不皆然而其間治有隆汚政有得失亦由人君善用人與不善用人之所致也朕承大統之後迄今已為天子而肯私以怨惡加於人耶故用人盡忠於國者雖讐必賞朕仰遵成憲俯察輿情推至公之心廣仁厚之化嘉惠海內子育元元欲比隆前規以臻至治爾天下上官遵守朕訓各盡乃心毋妄懷疑以速咎戾則可以共保富貴於無窮明太祖諭宣慰司田仁智入覲敕汝在西南逺來朝貢其意甚勤朕以天下守土之臣皆朝廷命吏人民皆朝廷赤子汝歸善撫之使得各安其生則汝亦可以長享富貴矣夫禮莫大於敬上德莫大於愛下能敬能愛人臣之道也明孝宗諭都勻府敕朕惟都勻逺在貴州東南因無流官撫治往往自相殺奪不得安生而又時出劫掠為地方之害近因貴州鎮巡等官奏請特敕大師征之既已克平各官奏如永樂年間事例開設府治州縣銓除流官撫治之以警其後今從其請設立都勻一府而以新開獨山麻哈二州清平一縣並舊設都勻邦水平州平浪四長官司屬其管轄僉舉爾文獻熟知民事諳曉夷情堪任知府故特升爾往知府事賜以璽書蓋重其任也夫新府之設與舊郡不同外夷之治與內地殊異非徒賴汝撫安而實資爾控制爾須深體朕委任之意稽考制度創造衙門宣布條章立為一定規模使後人有所遵守凡府中一應該行之事當備之物合用之人一一悉如內地若力有不及則度以待時勢有未可則留以待後順其土俗之宜施以安利之政歸附者安之使得其所流移者招之使復其業仍須時常戒勉所屬土官頭目人等諭以大義開其善端俾其遵守法度謹守地界辦納糧馬不致臨用有缺撫恤夷民不許非法虐害如有多聚妾媵以庶奪嫡爭襲官職及窩隱賊人為盜分贓者具奏問革改設流官凡係夷情務要與都勻衛指揮協合議行遇有漏殄殘賊或生苗竊發即便起調官軍土兵剿捕以靖地方不許執拗誤事其公差官員人至府但有違法生事爾即具實奏聞所屬土流官吏軍民人等敢有倚勢刁潑違法傲慢者爾須嚴加禁革輕則㑹官問擬如律照例發落重則奏聞區處爾尤宜亷公仁恕奉法循理體朝廷一視同仁之心以夷治夷使之日染月化而皆囿於華夏禮法之中庶稱委任爾其欽承毋怠毋忽國朝詔諭康熙二十年平定滇黔詔奉天承運皇帝詔曰朕纘承丕緒統御寰區仰惟天地眷佑之麻祖宗付託之重聖祖母太皇太后慈訓之殷蚤夜孜孜勤求化理期於兵革寢息海㝢乂安不意逆賊吳三桂負國深恩倡為變亂隂結奸黨同惡相援抗違詔令竊據疆土滇黔閩浙楚蜀關隴兩粵豫章之間所在驛騷肆騁痡毒三桂僭稱僞號逆熖彌滋負罪尤甚朕恭行天討分命六師剿撫並施德威互濟或縶頸於闕下或駢戮於師中擒捕誅鋤以次收服乃三桂既膺神殛逆孫世璠猶復鴟張踞六詔之一隅延殘喘以拒命朕惟賊患一日不除則民生一日不靖策勵將士屢趣師期於是虎旅協心追逼城下賊衆計窮勢蹙通欵軍門約日獻城凶渠授首師克之日市肆不擾邉境晏如捷書既至上慰郊廟社稷之靈下抒中外臣民之憤神人胥悅遐邇騰歡念自變亂以來軍民荼苦如在水火披堅執鋭卒歲靡寧行齎居送千里相望被兵之地既罹於鋒刃供億之衆復困於徵輸朕憫恤民艱不忍輒加額賦間施權宜之令用濟征繕之需意在除殘事非獲已而身處宫寢之內厪懷閭閻之依中夜屢興旰食不暇惄焉思治八載於兹今羣逆削平疆圉底定悉翦歷年之蟊賊永消異日之隱憂用是蕩滌煩苛惟新庶政大沛寬和之澤冀臻熙皥之風所有事宜開列於後於戲體覆載好生之德秋肅必繼以春溫法帝王更化之模義正尤期於仁育誕告天下咸使聞知康熙二十一年諭祭原任雲貴總督兵部右侍郎兼都察院右副都御史因殉難加贈兵部尚書諡忠果甘文焜文朕惟國家任重封疆寵命聿隆乎節鉞臣子時逢危難忠貞宜勵於氷霜茍下有授命之誠斯上錫褒忠之典特彰優恤用示殊恩爾甘文焜才略夙聞勤勞克著擢之畿甸委以滇黔總領西南佇奏輯寧之績撫綏將吏庶銷反側之謀何期大逆之猖狂頓悼貞臣之殞逝扞艱寡助丹心永恨於黃壚為國捐軀碧血長淪於炎嶂茲長鯨之既殄乃旅櫬以言旋眷爾幽魂動朕憫惻式稽曩制爰易休名載頒窀穸以昭榮復沛苾芬而致享於戲際艱難而效節臣心之正直允彰恤死事以施恩國典之褒揚惟厚爾其不昧庶幾來歆康熙二十二年御製雲貴總督殉難加贈兵部尚書諡忠果甘文焜碑文稽古仗節死難之臣國家必賁之典禮榮其服命載在史冊厥有舊章夫效力盡命臣之經也旌善顯忠國之憲也昭激勸而垂奕葉於是焉在惟爾甘文焜服官有年勞績懋著朕擢授旄節往涖滇黔俾督率乃僚綏靖南服屬逆臣悖德敗亂天常狂逞狡謀變生倉猝爾以勢窮援絶衆畔軍孤遂出貴陽捐軀鎮遠雖不克殄賊成功亦可謂舍生取義眷爾壯烈深惻朕懷宜賚嘉名式揚大節特賜諡曰忠果仍贈官廕子如例於戲忠不避難永為臣子之型果以矢心尚壯河山之氣勒諸貞石以表丹誠康熙二十二年諭祭三等伯提督贈太子少保諡忠毅王之鼎文朕惟烈士受臨戎之任盡瘁封疆貞臣矢報國之忱遺光泉壤節著則無分成敗名成則罔間死生眷此忠魂宜昭異數爾王之鼎才裕折衝勇堪禦侮家受金書之劵五等攸崇閫專鐡甕之城中權久握自滇池之負固移黔蜀之交衝擐甲長征誓鯨鯢之盡剪援枹寡應值蛇豕之方張一旅難支孤踪被陷從容就義指皎日而不汚慷慨捐軀貫秋霜而並厲今九域廓清之㑹正孤忠褒録之年爰詔所司詳稽憲典錫几筵以致享加封秩以敷恩嗚呼國事祇承生副貔貅之寄令名追賁沒昭史冊之光惟此苾芬爾其克荷康熙三十年御製三等伯提督贈太子少保諡忠毅王之鼎碑文朕惟國家崇奬臣誼凡將帥之士能宣力疆場捐軀赴義者褒恤有加典綦重矣爾王之鼎性資朴茂智略深沈自作鎮京江著有成績屬西南違命移鎮兩川蜀道﨑嶇蛇豕未戮爾志存殱寇期報國恩聞命戴星鼓行而進賊勢初却旋復狡焉思逞爾慷慨誓師激我士氣迄乎賊窺睥睨猶能奮擊突圍被陷之時罵不絶口嬰禍毒慘朕心惻焉今氛祲全消節烈炳著特命所司加恩追贈諡以忠毅嗚呼惟爾精誠貫於白日與城存亡義不返顧有臣如此忍令湮沒弗彰用勒貞珉永表風烈爾後人尚其承體無斁哉上諭康熙二十二年免康熙二十二年二十三年錢糧奉上諭黔省為滇南孔道地瘠民貧大兵凱旋挽輸芻糗供應人夫極其浩繁且起解吳逆家口絡繹運送不無苦纍恐小民竭力供億生計艱難朕心深為憫惻所有本年秋冬及來年春夏應徵地丁正項錢糧盡行蠲免以示朕勤恤民隱至意欽此康熙二十五年免二十五年二十六年錢糧奉上諭自古帝王撫馭九有軫念民依凡鞠謀生養為計甚周猶以賜復蠲租為布德行仁之要務朕嘉與海內元元共圖樂利弛徵減賦時厪於懷惟頻渙恩施俾萬姓得沾實惠念直𨽻畿輔重地天下根本寬租之詔屢沛往年但順永保河四府較之畿南諸府差役倍多供億尤劇應再加軫恤又湖廣湖南福建四川貴州地方昔年為賊竊踞民遭苦纍今雖獲有寧宇更宜培養以厚民生一體蠲免用昭愷澤直𨽻順永保河四府及四川貴州兩省所有康熙二十六年應徵地丁各項錢糧俱著蠲免二十五年未完錢糧亦著悉與豁除湖廣湖南福建兩省所有康熙二十六年下半年二十七年上半年地丁各項錢糧及二十五年未完錢糧亦與盡行豁免爾部速行該地方官通行曉諭務使人民均被恩賞以副朕愛育蒼生至意如有不肖有司官役借端朦混及私行重徵者該督撫指名題參從重治罪如該督撫狥隱不行糾舉或經參奏或被告發定行一併從重治罪特諭康熙三十二年免三十三年錢糧奉上諭朕撫馭寰宇蚤夜孜孜惟以實惠及民俾登康阜為念廣西四川貴州雲南四省俱屬邉地土壤磽瘠民生艱苦與腹內舟車輻輳得以廣資生計者不同朕時切軫懷歷歲以來屢施恩恤廣西省康熙十六年通省錢糧十七年十八年民缺錢糧貴州省二十二年秋冬及二十三年春夏地丁錢糧又貴州四川二省二十五年未完及二十六年應徵錢糧雲南省二十七年以前屯地積缺錢糧俱經次第蠲豁茲念育民之道無如寬賦矧邊省地方非再沛優恤之恩則閭閻無由充裕所有康熙三十三年四省應徵地丁銀米著通行蠲免仍行文該督撫遍加曉諭令人霑實澤以稱朕加惠遠省民生至意如有不肖有司借端朦混私自徵收者該督撫指名奏劾從重治罪特諭上諭雍正二年嚴飭土官奉上諭四川陜西湖廣廣東廣西雲南貴州督撫提鎮朕聞各處土司鮮知法紀所屬土民每年科𣲖較之有司徵收正供不啻倍蓰甚至取其馬牛奪其子女生殺任情土民受其魚肉敢怒而不敢言莫非朕之赤子天下共享樂利而土民獨使向隅朕心深為不忍然土司之敢於恣肆者大率皆漢奸為之指使或緣事犯法避罪藏身或積惡生奸依勢橫行此輩粗知文義為之主文辦事教之為非無所不至誠可痛恨嗣後督撫提鎮宜嚴飭所屬土官愛恤土民毋得視為魚肉毋得濫行科𣲖如申飭之後不改前非一有事犯土司參革從重究擬漢奸立置重典切勿姑容寬縱以副朕子惠元元遐邇一體之至意欽此雍正二年平定廣狆苗奉上諭貴州定廣狆苖從來比他省苖蠻凶頑尤甚朕向知之前雲貴總督髙其倬摺奏調遣官兵剿捕狆苗時朕曽降㫖與高其倬狆苗凶頑所居之地山深箐密進剿官兵務期擒捕首惡勿致疏忽今據髙其倬等奏稱進剿惡苗時官兵用命攀援而入直扺賊巢於十月初七十四等日擒獲渠魁阿近暨其弟阿卧及妻子賊黨等地方從此安靜深為可嘉此朕御極以來第一次平定凶苗之事高其倬趙坤毛文銓並從優議叙此內著有勞績官員著該督查明造冊報部一併從優議叙效力兵丁即加恩賞欽此雍正五年四省接壤分界安汛奉上諭雲南貴州四川廣西督撫提鎮等狆苗素稱凶悍加以漢奸販棍潛藏其中引誘為惡以致燒殺劫掠毒害善良居民深受其擾今督臣鄂爾泰等奉㫖剿撫業已擒獲凶苗販棍正在撫恤地方籌畫久逺之計朕聞滇黔蜀粵四省接壤之區猺猓雜處不時統衆越境讐殺攪害鄰封地方文武官員往往以責任不專彼此推諉茍且因循以致塵案莫結者甚多此天下之共知共聞者如廣西西隆州古障地方土目王尚義等與貴州普安州捧鮓地方之苗目阿九等互控一案遷延數年之久尚未審理朕已降㫖督責此即其明證也况各省所設汛防在於腹內而猺猓則環居腹外防範難周遇有殺掠必待事主禀報始行追捕往返耽延凶徒已遠遁矣四省督撫提鎮宜各委賢員於四省接壤之地勘明界址凡猺猓販棍往來要路設立營汛𣲖撥逰守等官帶領辨兵駐防稽察倘有越境讐殺劫掠之事即時擒解不使漏網其委防辨兵以一年為期即於四省附近營伍內輪流撥換如一年之內無越境生事之人有而能逐名拏獲者四省督撫提鎮㑹同保題從優議叙兵丁量加賞賚倘有貪功生事騷擾地方者立即題參從重治罪朕意如此於地方有益與否其如何分界設汛𣲖撥辨兵經理妥協之處著四省督撫提鎮悉心商酌定議具奏欽此雍正五年生苗歸誠加恩督撫奉上諭苖民梗化由來已久况屬生苖尤難攝服綏靖鄂爾泰剿撫並用威惠兼施俾生苗等嚮化輸誠咸願納賦歸附版籍又謬冲逆苗等素稱獷悍難馴今剿撫已靖悉皆內嚮鄂爾泰辦理甚屬可嘉著給與世襲阿達哈哈番以奬勞績張廣泗遵依鄂爾泰調度實心出力著交部從優議叙所有在事官兵應如何議叙賞賚之處著鄂爾泰分别等次具奏欽此雍正六年撫綏生苗奉上諭貴州巡撫張廣泗從前石禮哈署理貴州巡撫印務時曽摺奏古州八萬地方未入版圖其人愚悍無知往往互相讐殺時出劫奪擾纍居民今各處苗蠻皆頃心嚮化獨此一隅未通聲教應請用兵剿撫等語朕比時批諭石禮哈古州八萬苗人雖未歸政化但用兵進剿震懾苗衆朕心實為不忍所請切不可行是以石禮哈遵奉諭㫖而止後因爾奉差經過其地報稱苗人等歡欣迎接情理恭敬僉稱願歸版圖共沐聖化朕又訪問從滇黔來京之大臣亦云夷情恭順是實朕思內地苗疆之人皆吾赤子其果能抒誠歸嚮者朕豈忍令其獨在德化之外是以准爾所奏令爾料理撫綏以慰苗衆近聞爾到彼地有撫剿兼行之事想因苗寨繁多心志不一其中有實心歸附者亦有中懷疑懼而未即就撫者若倉猝之間脅以兵威未免戕殘苗命且强所不願非朕本懷今特遣翰林官二員前來將朕意宣諭倘伊等到日爾所料理之事已竣則加意撫綏使之得所倘或執迷不悟切勿徒恃兵力殺傷苗民統俟從容再行化導以副朕好生胞與之至意欽此雍正六年苗民歸誠加恩官辨兵丁奉上諭雲南等省所有苖蠻㺜獞種類甚多殘忍性成逞凶嗜殺剽掠行旅賊害良民又或販賣人口捉當勒贖所以為內地平民之害者不可枚舉而衆苗之中又復互相讐殺爭奪不休於其所轄土民則任意傷殘草菅人命此皆天下所共知者自朕即位以來內外諸臣條奏苗蠻不法者不可勝數而邊省督撫提鎮等又復屢屢陳奏朕念普天率土之民皆吾赤子豈肯令邊省蒼黎獨受苗人之侵擾而苗衆繁多朕亦不忍聽其獨在德化之外是以從封疆大臣之請剿撫兼行而切加訓誨務以化導招徠為本不可脅以兵威或致多有殺戮屢頒諭㫖甚明今幸數年之內苗人陸續歸誠者甚衆將來可望地方寧謐但官辨士卒跋涉於深林密箐之間歷險峻之區染瘴癘之氣而苗性狡獪反覆當用兵之際往往詭詐負嵎出其不意以致官兵受傷亦間有之事夫辨兵受國家多年教養之恩雖臨陳捐軀義不避難但以蠢然無知之苗蠻而致損我義勇之士卒若計算得失不足相抵朕心深為憫惻除已降㫖賜恤賞賚外其雲南貴州四川剿撫苗蠻之官辨兵丁從前若有預借銀兩俱免其還項陳亡之官辨兵丁著照陳亡例加倍賞給銀兩得病身故及受傷之官辨兵丁著照陳亡例賞給銀兩俱交與鄂爾泰嶽鍾琪各於所屬確悉查明動支公帑遵㫖賞賜務俾均沾實惠以副朕優恤辨兵之至意欽此雍正七年慶雲現加恩滇黔各官奉上諭朕治天下不言祥瑞每䝉上天錫福愈深敬畏之心鄂爾泰節制滇黔公忠體國求之古名臣中亦不多見用能化導所屬官吏奉公盡職人人懷忠君親上之心是以於朕萬夀之辰天錫慶雲於滇省特以表著該省官員敬恭協和之忱悃前據鄂爾泰摺奏廷臣稱賀之時已降諭㫖宣示朕𠂻鄂爾泰郝玉麟表率訓導通省文武屬員而滇黔兩省官員均能遵奉上司之教誨殫心奉職應加特恩以示優奬鄂爾泰著由頭等阿達哈哈番超授為三等阿思哈尼哈番郝玉麟著由拖沙拉哈番授為拜他拉布勒哈番滇黔兩省巡撫提督總兵官俱著加二級兩省文官自知縣以上武官自千總以上俱著加一級凡受恩賜者益當敬謹黽勉以仰承上天之貺從茲逺近臣工慕義興起則人人受福凝祥矣欽此雍正七年慶雲七現奉上諭據總督鄂爾泰奏稱黔屬思州及古州之梅得等處自七月初八日至閠七月十一日有五色彩雲光輝燦爛叠秀爭華歷時經久一月之內七見嘉徵等語朕嘗言天人相感之理捷於影響督撫大臣等果能公忠體國實心愛民必能感召天和錫嘉祥於其所轄之地即如鄂爾泰頻年駐節本省祥雲三見於滇南今年以公事前往貴州慶雲即見於黔省又如今歲嶽鍾琪領兵甘肅而甘肅禾稼豐登田文鏡節制山東而山東秋成大稔又如李衛總督浙江比歲以來境內農田豐熟今年甫離浙省而衢屬山鄉即有蛟水泛溢之事舉此近事數端仰見上天昭示顯然欲使君臣共知警惕也朕素不言祥瑞所以屢年以來從未曽因嘉徵而受慶賀而敬慎之念日益加䖍想中外臣民亦共知之矣夫上天示人君以災祥亦如人君加臣下以賞罰也人臣受君上之賞固不可侈然自足放逸驕矜若並無欣慰之心而不以為慶則受君上之罰亦不知畏懼悛改此非矯情違衆之人即胸無忌憚之輩矣人君之於天其理亦復如是至於鄂爾泰之屢次奏報慶雲者蓋以滇黔地方有此瑞應萬目共覩在人臣之心無不願國家之䝉福兆庶之凝禧州縣申詳而督臣陳奏此皆出於情理之不能自已倘有心懷不肖之人或且議其為迎合或且譏其為諂諛此皆藏幸災樂禍之邪心不止於春秋責備賢者而已惟是滇黔逺省荷上天之垂象加恩如此則是大臣以及官辨兵民宜何如之敬謹䖍恭以永承天貺所當夙夜加勉者也該部知道圖并發欽此雍正七年進瑞穀圖奉上諭朕從來不言祥瑞是以從前降㫖自雍正五年以後各省所産嘉禾俱停其進獻今據貴州巡撫張廣泗奏稱黔省各屬及新闢苗疆今年皆風雨應時歲登大有所産稻穀粟米之屬自一莖兩穗至十五六穗不等稻穀每穗四五百粒至七百粒之多粟米每穗長至二尺有奇實從來所未見特將瑞穀呈覽並繪圖附進等語朕覽各種瑞穀碩大堅實逈異尋常不但目所未見實亦耳所未聞若但見圖畫而未見穀本則人且疑而不信矣又據廣西巡撫金鉷摺奏今年粵西通省豐收十分者十之九九分者十之一穀價每石自二錢以至三錢二三分乃粵省從來未有之事等語朕思古州等處苗蠻介在黔粵之間自古未通聲教其種類互相仇殺草菅人命又嘗越境擾害鄰近之居民劫奪往來之商客以致數省通衢行旅阻滯迂道然後得達而內地犯法之匪類又往往逃竄藏匿其中此實地方之患不得不為經理者今總督鄂爾泰籌畫周至調度有方巡撫張廣泗敬謹奉行殫心奮力俾苗衆等革靣革心輸誠向化地方寧謐和氣致祥感召天和黔粵二省歲登大稔而黔省磽瘠之區苗夷新闢之地又䝉天賜瑞穀顯示嘉徵仰見天心以經理苗疆為是特昭瑞應以表封疆大臣之善體朕心實為慶幸若歸美於朕朕不居也著將張廣泗所進瑞穀圖交與武英殿繪畫刋刻頒賜各省督撫俾觀之時共知勉勵該部知道欽此雍正七年慶雲瑞穀奉上諭據貴州巡撫張廣泗學臣徐本摺奏本年七月內黔省地方慶雲七見光華絢爛藻彩繽紛萬姓歡呼共稱奇瑞更可異者副將趙文英領兵征剿梅岑黑苗正在抗拒之際忽覩祥雲湧現苗衆各棄器械合掌頂禮叩天輸誠不數日而古州口內數寨亦傾心來歸黔省山多田少最為瘠薄若雨水稍多則髙阜者得濟而低窪者浸損若晴霽稍久則低窪者尚資灌溉而髙阜者已覺旱乾是以歷年收成不過六七分至八九分而止今歲自春徂秋雨𤾉應時通省田禾悉皆十分茂盛據各屬禀報稻穀有每莖十餘穗者有兩岐三岐者有髙七八尺至於遍畝者且每穗多至六百餘粒至於髙梁亦有五岐六岐者小米有穗長二尺並二十四穗者他如秋蕎紅稗以及菜蔬瓜果之類無不暢茂條達而深僻苗地並新開之丹江八寨等處亦皆十分豐收居民苗衆咸以為從來未有之事等語朕從來不言祥瑞但䝉上天恩賜嘉祥亦不敢䙝慢從來屢降諭㫖甚明今據張廣泗徐本等奏稱黔省慶雲七見瑞穀盈疇內地苗疆悉登大有地方寧謐萬姓得所朕心深為慶慰從前石禮哈在貴州時曽將古州八萬等處苗蠻擾害地方之處奏請剿撫朕以石禮哈未能承辦此事而總督髙其倬亦非可以統理之人是以未允所請降㫖申飭至於狆苗一事朕料張廣泗之才力可以辦理有成又有鄂爾泰總理調度是以令其舉行彼時何世璂心懷退縮從中阻撓具奏朕前以為不可經朕降㫖切責及至狆苗畏服諸事就緒何世璂始知從前所奏之非深自慚悔逮鄂爾泰奏請剿撫古州等苗蠻朕深知鄂爾泰籌畫周到調度有方必能經理妥協是以允其所請而祖秉圭曽密奏以為不可朕知祖秉圭識見卑陋不能辦理此事且恐在任掣肘於時將伊調回而以領兵之事屬之張廣泗等但此事雖計出萬全然兵馬深入險僻之地未必迅速可以成功或致歲月遷延士卒勞頓又恐苗衆無知負固不服迫以兵威未免多有戕害用是時厪朕懷今荷上天默佑官兵甫臨苗境而苗衆即嚮化輸誠俾自古未通聲教之區胥歸版籍朕心始為安慰總之行兵重務專在得人古州之事在因循茍且者不肯辦理而膽量怯懦者又不能辦理瞻顧身家者不肯辦理而好大喜功者亦不能辦理鄂爾泰忠誠敬慎為國為民是以上感天心下孚衆志俾頑梗之衆慕義從風黔省民夷俱享寧靜之福且鄂爾泰身在貴州慶雲即見於黔省而今年通省地方雨暘時若百穀豐登苗疆田畝禾稼更喜倍收可見上天默鍳朕心以朕簡任得人辦理苗疆之事為是顯示嘉徵以昭感應朕心所慶幸者實在乎此並非崇尚祥瑞以誇耀於天下也可將朕意宣與九卿知之欽此雍正七年免八年錢糧奉上諭朕愛養黎元遐邇一體而邊逺之地小民家計不及近省尤朕心之所繫念數年以來甘肅四川雲南貴州廣西五省有用兵西藏及剿撫苗蠻等事其一應軍需皆動用公帑備辦秋毫不𣲖及於民間而糧餉轉輸亦有資於民力今藏地苗疆俱已寧謐朕心嘉慰特沛恩膏著將庚戍年甘肅額徵地丁銀二十七萬七千六百兩零四川額徵地丁銀三十一萬六千三百兩零雲南額徵地丁銀一十四萬一千六百兩零貴州額徵地丁銀七萬四千二百兩零廣西額徵地丁銀三十五萬三千九百兩零悉行蠲免其西安各屬地方近日亦有預備軍需之事朕心軫念著將庚戍年額徵錢糧蠲免十分之三共計銀四十七萬九千九百兩零此六省督撫大吏宜仰體朕心轉飭所屬有司敬謹奉行務使閭閻均霑實惠如有奉行不力被不肖有司暗飽私囊或被奸胥土棍强紳劣襟包攬侵蝕者朕必訪聞得知將通省大小官員分别從重治罪至於國家設官本以理民官有恤下之責民有奉上之義若設官而不為計及養亷之資則有司之賢者將窘迫而莫能支不肖者又將橫取而無所檢束矣是以酌定以錢糧耗羡均給各官養亷之法此揆情度理上下相安之道但思加恩百姓豁免正賦若將耗羡一並蠲除是民雖邀格外之恩而官轉有拮据之苦上司或因此稍有寬假則必致巧取苛索於民流弊種種轉多於耗羡之數於吏治民生均無禆益常見庸劣之地方官每以蠲免錢糧為不便於己心懷悵怏即此意也著於庚戍年為始凡遇特恩蠲免錢糧者其耗羡仍舊輸納諒必民所樂從若因水旱蠲免者不得徵收耗羡將此永著為例欽此雍正十三年免本年錢糧奉上諭從前經理苖疆之意原因苖性凶頑久為地方居民之害是以計議剿撫為乂安百姓之計若云利其民人則其人不過如鳥獸之屬若云貪其土地則其地本在吾版圖之中縱使日久之後苗衆抒誠向化輸納少許錢糧計算尚不及設汛養兵萬分之一然則國家果何所利而為此哉乃經理之始既多疏虞而善後之䇿又復草率即如逼近苗疆之緊要州縣設兵不過三四十名全不足以資捍禦而逆苗萌動之時文武官辨又皆在睡夢之鄉茫然一無知覺今逆苗突入內地勾引熟苗肆行搶掠良民遭其荼毒以安民之心而成害民之舉朕與前後經理之大臣安能辭其過耶每當讞獄之時遇身獲重罪之犯應加刑辟者朕與執法之臣皆再四推研求其生而不可得然後置之於法此心尚應惻然其見小卑劣者尚欲賣法以為陰德今黔省被害之民皆無罪之良民也我君臣目視其遭凶苗之慘禍如蹈湯火朕言念及此幾為淚落實無顏以對被害之黎庶也不知代朕經理之大臣又如何存心矣其幸得保全之民人此時當竭力撫綏以贖吾君臣從前之過勿憚煩勞勿惜公帑期登灾黎於袵席若再稽查不力董率無方以救灾恤困之資或飽汚吏貪官之腹不令窮民得霑實惠經朕訪聞必將大小官員在該省即時正法以示衆或有但知潔已而不能安插貧民者著該督撫即以溺職題參不必論其向日之官聲稍為寬貸其灾黎避往之地方亦照此㫖一體料理若視為鄰省之事稍存怠忽之心朕亦必治以溺職之罪若將賑恤之項借名侵蝕者亦必即行正法貴州既有被害之州縣則運餉募夫俱須鄰郡接濟著將今年黔省錢糧通行蠲免其被賊殘害之州縣蠲免三年錢糧若有已徵在官者准抵下次應徵之額賦著將此㫖通行曉諭各省官并兵民等咸使聞知特諭上諭雍正十三年九月二十四日奉上諭朕聞黔省逆苗奸狡異常官兵來則暫行退避過則仍復肆逆緩則恣為焚劫急則求討招安以叛逆為尋常視招撫為得計乃係逆苗實在情形所當痛加剿除不容稍有姑息者其地大苗衆凶頑之寨及首惡之人定應剿洗搜獲務盡根株其餘附和迫脅之苗分别料理必令盡繳器械方許投誠從前王大臣所議原令哈元生等照此辦理可傳諭張廣泗等知之其雲貴等省苗疆有應行彈壓者亦先經王大臣等議令該督撫等留心彈壓現今古州等處用兵各省苗疆正不可因現在寧靜而稍為疏懈可再行𫝊諭雲貴廣西督撫密飭各地方官不時稽察加謹防範毋致疏虞欽此雍正十三年十月初二日奉上諭黔省逆苗不法地方文武官辨不能先事預防及苗衆猖獗用兵征剿而領兵大員又復各持己見不能和𠂻共濟加以張照舉動乖張妄行調遣以致辦理失宜用兵數月仍無頭緒朕心甚為憂慮因湖廣總督張廣泗才品優長且從前久任苗疆諸事熟練是以命其前往代張照之任今思用兵關係緊要事權若不歸一難以早奏膚功張廣泗著授為經略自揚威將軍哈元生副將軍董芳以下俱聽張廣泗節制調遣所有經略印信著該部速行鑄就遣官賫送軍營欽此雍正十三年十一月十九日奉上諭貴州古州台拱等處生苗雖自古未沾王化然其地實在數省疆域之中我皇考怙冒如天不忍棄之化外是以就其歸順之誠為之安撫區畫俾得與海宇人民共享升平之福並非利其土地人民而為好大喜功之事也屢奉諭㫖至為明晰乃伊等野性難馴就撫未幾旋即反側近復勾結熟苗恣行抄劫甚至蹂躪內地殘害民生種種凶惡實屬法所難宥是以調發各省官兵刻期進發期於蕩滌逆氛以安良善今用兵已逾數月逆苗畏罪竄伏巢穴官兵正在進剿但朕念即位以來施恩宥過咸與維新薄海內外皆吾赤子乃兵行糧集曠日持久不惟吾民挽粟飛芻荷戈執㦸勞苦堪憫即彼生苗亦為血氣之倫必駢首就誅俾無噍類揆諸朕胞與之懷亦深為不忍目今大兵雲集聲罪致討恐伊等冥頑無知以為罪在不赦自分必死則必負固不服抗拒兵威雖欲自輸誠悃而無由即至身陷屠戮而不悟著即諭張廣泗等明白曉諭除怙惡不悛者定行剿除以彰國法其餘若能聞詔投戈輸誠悔過當悉勩其罪豫以自新務使邊宇安寧百姓樂業以副朕乂安海內一視同仁之至意特諭欽此乾隆元年七月二十日奉上諭貴州古州等處苗衆從古以來未歸王化我皇考世宗憲皇帝如天之仁特允督臣所請不忍棄置帡幪之外遂因伊等俯首傾心輸誠歸順之切收入版圖使得沾濡德澤共享升平之福原非利其土地民人為開拓疆圉之舉也即如從前所定糧額本屬至輕至微不過略表其向化輸租之意俟數年之後原欲并此加恩寬免此皇考撫恤苗民之聖心向朕與諸王大臣曽經再三宣諭者詎苗衆生性反覆靡常於上年三四月間騷擾內地并勾引熟苗攻掠城池燒燬村落百姓被其茶毒凶惡頑梗法所必誅是以遣發大兵分路進討剿撫兼施其中肆逆抗拒者或就誅夷或被擒獲而脅從附和之苗寨又各擒縳為首之犯相率投赴軍前呈繳器械悔罪歸誠軍務漸次告竣朕思此等逆苗孽由自作固王法所當重懲者而在皇考與朕視之則普天率土皆吾赤子此特赤子中之不肖者耳今身罹刑辟家口分離朕心仍覺不忍且現在就撫苗衆多屬脅從附和其中尚有並未從逆始終守法之各寨均當加意撫恤俾得生養安全因思苗人納糧一事正額雖少而徵之於官收之於吏其間經手重叠恐煩雜之費或轉多於正額亦未可知惟有將正賦悉行豁除使苗民與胥吏終歲無交涉之處則彼此各安本分雖欲生事滋擾其釁無由况蠲免新疆苗賦原屬皇考聖意朕此時當敬謹遵循見之施行者也用是特頒諭㫖著總督張廣泗出示通行曉諭將古州等處新設錢糧盡行豁免永不徵收伊等既無官吏需索之擾并無輸糧納稅之煩耕田鑿井俯仰優游永為天朝良順之民以樂其妻孥長其子孫苗衆亦具有人心豈有舍袵席而蹈湯火之理至於建立營汛分布官兵乃國家定制原以詰奸禁暴安戢善良各省內地且然况苗疆險要防範尤不可不嚴且設兵之意所以禁約漢奸播弄搆釁又以查察熟苗私入勾引朋比為奸非特以新附之苗為不可信而以重兵彈壓之也其設兵事宜仍著總督張廣泗遵照前㫖悉心妥議辦理至駐守辨兵均當謹守法度不得借端滋事如有絲毫擾纍該管官即行詳報題參從重治罪若或隱匿不報經朕訪聞定將該管文武各官一并重處苗民風俗與內地百姓逈别嗣後苗衆一切自相爭訟之事俱照苗例完結不必繩以官法至有與兵民熟苗關涉之案件𨽻文官者仍聽文官辦理𨽻武官者仍聽武辨辦理必秉公酌理毋得生事擾纍貴州總督張廣泗可一併曉諭知之欽此貴州通志卷三十三
