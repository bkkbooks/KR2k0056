body:
  text: 貴州通志卷四十五藝文五言律唐送崔員外黔中監選綦母潛持衡出帝畿星指夜郎飛神女雲迎馬荆門雨濕衣聽猿收淚罷繫鴈待書稀蠻貊雖殊俗知君肝膽微送上官侍御赴黔李嘉祐莫向黔中路令人到欲迷水聲巫峽裏山色夜郎西樹隔朝雲合猿窺曉月啼南方饒翠羽知爾飲清溪送侯侍御黔中充判官劉長卿不識黔中道今看遣使臣猿啼萬里路鳥似五湖人地逺官無法山深俗豈淳須令荒徼外亦解懼埋輪黔中書事竇羣萬事非京國干山擁麗譙佩刀看日曬賜馬傍江調言語多重譯壺觴每獨謠沿流如著翅不敢問歸橈寄黔府竇中丞羊士諤漢臣旌節貴萬里䕶牂柯夏月天無暑秋風水可波朝衣蟠艾綬戎幕偃雕戈滿歲歸龍闕良哉佇作歌初離黔中泊江上李頻去去把青桂平生心不違更蒙蓮府辟兼脱布衣歸霽岳明殘雪清波漾落暉無窮幽鳥戲時向棹前飛黔中酬同院韋判官李頻平生同所爲相遇偶然遲各著青袍後無歸白社期江流來絶域府地管諸夷聖代都無事從公且賦詩自黔中東歸旅次淮上李頻行旅本同愁黔吳復阻修半年方中路窮節到孤舟夕靄􅂷陰野晨光動積流家山一夜夢便是昔年遊黔中罷職過峽州題田使君北樓李頻巴中初去日已過使君留及得尋東道還陪上北樓江衝巫峽出橋過洛宫收好是從戎罷看山覺自由寄黔南李校書許棠從戎巫峽外吟興更應多郡響蠻江漲山昬蜀雨過公筵饒越味俗土尚巴歌中夜懷吳夢知經灧澦波送人尉黔中周繇盤山行幾驛水道復通巴峽漲三川雪園開四季花公庭飛白鳥官俸請丹砂知尉黔中後髙吟採物華宋送鮮于秘丞通判黔州梅堯臣壺頭山下俗巴婦曲中聽汲井熬鹽白燒田種穀青巖風來虎嘯江雨過龍腥事簡能談者揚雄所草經元貴州范梈離思久不愜幽情晚旋添天宜明月獨山與宿雲兼蛩語通支柱蛛絲映捲簾若無光霽在何以破朱炎明和祁順遊西峽韻周瑛溪洞入玲瓏尋山半是空松篁山鬼路烟雨水仙宫人立紅塵外馬行綠水東忽聞黄太史詩句落黔中清平道中杭淮亦知春久去花尚滿陵岡小朶穿籬白微風過馬香清平蒙伐罪苖獞識尊王鹽米通吳蜀人今無異方鎮逺喜即舟杭淮連山霧不開壑轉一溪廻洶洶奔湍下濛濛細雨來巫山疑有峽灧澦不成堆撇旋看舟子乗流亦快哉元日新添喜晴楊慎白日臨元歳新雲放曉晴城窺氷壑逈樓射雪峯明客鯉何時到賓鴻昨夜驚離心似蔓草處處逐春生平溪道中何景明徙倚平溪館天高秋氣清水螢光不定山籟響難平夜火雲間戍寒松江上城終宵無夢寐高枕聽灘聲過鎮逺何景明地僻光揺落空亭長緑莎山川連蜀道市井雜夷歌旅篋衣裳少秋程風雨多無人相問訊盡日撫寒柯古郡青山下經過駐使車土官迎詔拜蠻客望城遮疊嶂營孤壘清江繞百家晚來官署裏獨坐咏皇華寥落古城池斜光照戍旗關臨苗子砦洞入長官司殊俗終難近蠻音久易知踟躕暮江上又是仲秋時安南何景明﨑嶇踰嶺路到郭已昬鐘城險苗難越關高賈不通郊烟秋牧馬崖日煖收蜂民俗殊中域生涯亦頗同查城十五夜對月何景明中秋看月色移席又前楹河漢三更沒關山萬里明風烟依獨戍砧杵閉空城此夜髙堂上多應念逺征天上何所有團團白玉盤可憐秋半月只是客中看影直朱樓午輪高青瘴寒美人何處共光影隔雲端小市無兼味隣家酒亦慳佳期三五夕逺客萬重山霄漢分秋色風塵照旅顔去年當此夜坐對紫薇間鎮逺署徐九臯邅廻沅浦曲轉入夜郎天路出浮雲上山懸飛葢前烟霏開逺戍林薄帶長川羽檄宵來急横戈欲按邊過善化寺夏言月向潭中靜泉從雲外流寺門通徑曲樓閣傍崖幽掃石懷留偈慿軒一散愁偶來得竒賞忘却入遐􅑍板橋龍遂行部當長夏停軒靜野埃暗雲侵座入横翠度墻來啼鳥窺戎斾飛花落酒杯蠻烟村市集物色足徘徊關索嶺孫璽萬里雲南路三年始得歸野梅渾破蕚官栁半垂絲嶺峻盤空險城尖疉石危邊江據形勝天畔控諸夷軍中酬焦學使過予思南别署有懷見寄田汝成誰道軍中樂徒勞物外吟朔風凄鼓角嘉節罷登臨草閣依山逈江梅映雪深無由欵高駕愁絶暮雲心烏蠻灘田汝成一葉中流下千山兩岸開黿鼉吹浪轉燕雀受風廻巨石迎船出啼猿近客哀從來輕險絶涉此寸心摧自炎方驛暮宿亦資孔萬士和遠道資人力扶持萬嶺中仗隨徒𨽻亂輿放僕夫空雲動嵐移黒霞收樹斂紅祗貪趨館宿未暇泣途窮送陸給事燦謫都勻驛黄甫汸國論何年定鄉心此夕揺鴈飛天畔驛龍隱日南橋謫宦恩非薄居夷路詎遥誰憐梁太傅淚灑漢文朝象鼻嶺吳國倫山形如象鼻磵道擬蠶叢筏渡千崖底車旋萬石中短亭微上月鳴瀑逺生風白髪悲行險乾坤一轉蓬署中登閣望雪吳國倫署閣擁城心羣峯䕶玉林彤雲一夜合積雪九夷深白髪寒相照清樽欵自斟幽蘭意不淺蕭瑟向鳴琴碧雲洞吳國倫何意盤江外乾坤更一丘却令驄馬使早爲碧雲留煮石顔堪駐巢松蹟故幽種𤓰成五色不忝邵平侯王闇齋先生隱居高真菴屬贈吳國倫不覩遺榮賦誰知好道心巢雲開石室采露入青林遂與世人絶杳然仙路深浮丘如可遇吾意亦招尋夜過髙真觀訪闇齋不值吳國倫爲覔遊仙侣重過禮斗壇松雲開閴寂蘿月䕶高寒葉落疑捐珮泉鳴憶洗丹盈庭霞似雪益作剡溪看聖夀寺孫應鰲空城存古寺寂寞已無僧獨有横經客時分供佛燈淡雲盤老桂寒日隱荒藤斟酌談時事相看百感增平旦草堂詠懷孫應鰲中野霞千片前峯翠萬重分襟披小草結屋倚高松懶尚儲新釀貧爲具宿舂村居無外户一任白雲封雅歌軒除夕感懷嚴清更試終何補蹉跎忽歳除長途憐四牡逺水憶雙魚地瘠宜覊處官閒勝索居棣花今欲韡矯首倍躊躇牂柯路葛一龍苦雨風凄凄頑雲墮惡溪警柝響晝堡束薪防夜蹊路從虎穴出家愧鹿門擕僕夫欣涉水一洗没脛泥昨日葛一龍昨日度牂柯神竒應接多漆城新化石碧牖下懸河山鬼嘯風去雲君乗雨過晚從晴處宿煖酒趂苗歌平越山中葛一龍不見鳥飛還只愁天壓山泥行穿谷底火食到人間澗影石千怪秋光花一班偶聞譚過虎色變戒前攀月山寺趙之屏石透長溪雨人穿半壁烟蠻村沒瘴草古寺斷荒田世事愁為病浮生拙是賢孤忠能自許彈鋏動髙天再憇飛雲巖江盈科郵亭依梵刹古壑傍人烟泉滴渾疑雨崖浮不碍天蘚深埋舊刻藤老長新顛車馬重來日登臨憶往年華嚴洞寺江盈科一壑藏幽境羣山繞梵宫鳥窺僧竈飯猿掛洞門松石溜晴疑雨爐烟午颺風塵蹤憐碌碌小憇且從容觀音山絶頂黄堂荒林聳碧岑久坐靜禪心不雨苔常濕無雲洞自陰僧閒祗樹冷鳥語落花深高陽有伭度支遁足相尋嵇公泉次李渭韻李培初選勝近魚峽題詩憶昔賢披雲循古道倚石聽鳴泉攀幽乗逺興問道愧流年坐起前山月松髙白鶴眠華嚴洞史旌賢古洞誰初闢翛然無住心偶緣丹竈入因識白雲深風鐸傳空谷松鐃落梵音賢愚如許軰吾意正蕭森文筆山祁順巨筆卓晴峯天然制度工雲霞糚五色風雨助三紅脱頴非囊底生花似夢中流年多少恨終日漫書空飛雲巖郭子章萬丈闢巖扄浮雲去復停幻裝螺髻碧巧綴石痕青老樹清堪掬飛泉靜可聽凭欄紆逺望暫博客懷醒靜黎洞郭子章皮林甫罷兵振旅入黄平山繞猿聲近江環雉堞清連空岩洞響向晚暮烟生徙倚禪壇下憑欄寄野情雙明洞黄閣天外鍾佳勝偏憐闢地開懸崖鳴一鳥虚谷響如雷水自羣峯落人從曲徑囘寄言車馬客知否是仙臺黔中雜咏王士昌南服天垂盡銅標向此分洞中厖吠日天半犢耕雲蠻語逢人譯夷歌到處聞干戈新戰後殘照幾家村極樂菴黄龍光正有塵勞苦來尋極樂菴玻璃千佛照空寂萬山涵香染蓮花妙僧依净土參何年仙子跡吹笛度鸞驂涵碧潭李時華一水繞山城曾將洗甲兵秋波涵碧玉春漲㸃紅英龍卧歸雲濕犀沉夜月明寒潭深萬丈徹底本來清安莊夜聞警謝三秀鼙鼓中宵急愁聞戰伐頻數家出灰燼一郡入荆榛地亂難為客途窮耻傍人披衣待明發華髪鏡中新村行即事謝三秀十里荒村路尋幽到薜蘿陂寒菰葉少籬晚豆花多廢寺紛蟲網貧家靜雀羅老翁晞髪坐相對説干戈送吳使君攝八畨郡事謝三秀才子飄零久今看治郡功地當三楚盡山到八畨雄詞賦霜毫裏桑麻露冕中孤城饒吏隱解帶聽松風黎峨寗相武曠心投逺曙四野接孤烟隔樹湖光滿穿雲瀑影懸草香山氣合苔古石痕連夢境曾過此應知有夙縁貴筑憇越孝亷别業范汭結宇數峯間泓渟一水灣谷風過午冷原樹入秋閒苔動頳鱗戲花揺翠羽還誰知于役者彌日此開顔讀鐡橋圖記王思任水折三江裏橋飛百濮間化民無訟獄贈客有江山制鐡龍能避銷兵虎自閒金城方畧壯常鎮九疑關出黔途次漫興尹伸日日思歸去今成如此歸貪趨王儉府愧息丈人機用舍從時論馳驅與願違生還差可喜風日駛驂騑渡鐡橋楊繩武屹立盤江滸飛梁繫半空九臯來瑞鶴一澗飲長虹翻浪鯨鯢吼奔雲車馬通我非題柱客蹤跡感飄蓬題鐵橋陳士竒瘴水春猶早炎方日未齊虎當官路鬭猿掛驛樓啼繩鎻金沙界橋飛乳洞梯當年無寶筏腸斷夜郎西過安南龍文光絶頂見孤城征驂向曉行鳥啼多異響花發不知名石澗閒雲碓山田趂火耕愁聞耆老説三月未曾晴碧雲洞趙天佑依舍千重樹連城百囀鶯勝遊常近郭吾意欲通名竹色窮詞賦山靈識性情慿誰祈岳手爲寫輞川屏國朝遊東山寺韻黄敬璣古刹東山上蕭條兵火餘秋聲連逺壑酒興滿幽廬翠色當忩合雲光映座虛天涯正好客不必賦無魚秋日旅懷李良年懶作丘園卧幽尋住此邦漏知天近蜀低見斗垂忩隔水聞寒杵踈籬帶逺江因風思舊隱新鴈幾雙雙平越禮斗亭彭而述何處覔丹鼎苔荒舊石梯隂林飛鳥過畫棟古蟲題物色勞英主窮追到海西至今禮斗處俯瞰萬山低中河洞對月張𢎞猷月到招提靜清光隔岸看峯高輪影障水濶露華漙暝色通幽徑春流響急湍坐聽鐘漏盡返照佛樓寒築邑城丘元武按轡城頭路參差石磴斜平雲連野水霜木俯官衙風落天邊鴈秋悲日暮笳逢人多卉服珍重問桑麻中和寺林華晥山意諸天雨溪痕獨木橋遡流知菜葉開徑折蘆條筧接香泉到茶成禮樹遥太平如不隔鐘鼓自昏朝暮秋遊照壁山吳廷正孤嶂開僧舍山門碧蘚侵遊人不到處吾軰獨登臨黄葉尊前樹清秋客裡心黔南風日好只是憶山陰平越道中望三丰影潘馴仙在山之後焉能預寫真定知無色處先有不亡身羽化亦已久兹形何尚新始知惟肖者反是再來人鎮逺舟行彭始奮到來黔地盡人語隔溪東孤驛微茫裏寒流隱見中灘髙常畏石舟小不須風寂寞何王殿岩花强自紅偏橋至鎮逺張一鵠有水可乗筏其如難渡何不辭車馬憊還怯虎狼過楚水偏橋盡黔山平越多城陰最慘淡一路少田禾宿太平菴是日至新添衛張一鵠僕御荒疆少牂柯戰壘殘蟲迎秋作響水激石生湍黒霧連雲暗青山背日寒莫言烟瘴苦久役厭征鞍炎方驛道中髙晫秋色來何極逺山接近山松穿雲滴翠花過雨飛斑鳥道烽烟外柴門蠻僰間盤江千萬轉祗自照愁顔鸚鵡寺田雯去地數千尺御風天際行空中鸚鵡寺何處鷓鴣聲嵐漲羣峯失霞鋪逺水明前山雲不斷片片馬蹄生送李遜五舍人田雯九月驚寒早驅車别夜郎青山遮馬首紅葉壓行裝蘆酒村蒭賤梅花驛館荒金門臣朔飽贈爾數檳榔秋日遊漏趵泉衛既齊靈泉不盈掬時縮復時盈脉脉元精合鱗鱗細浪生似徴潮汐信因悟卷舒情徙倚塵機息凭欄欲濯纓黔中雜咏張履晉賦難登禹貢版止𨽻周官無海魚鹽嗇重山虎豹蟠司農煩粟帛開府集衣冠願覩垂裳化虞廷再舞干甲子三月貴陽汪使君載酒邀同吳參軍遊東山黄元浩共赴尋山約山行午欲晴嶺腰猶接寺雨脚已離城危磴苔衣滑繁花石縫生到門參古佛鐘皷半空鳴醉與山門别無愁沾濕歸急揮風色過截住雨聲飛馬已辭青嶂僧猶立翠微晚鐘崖上落囘望思依依遊憑虛洞越珃一龕藏古洞陟磴探其幽雲氣忽然合天風吹不休險逾累黍力幻失五丁謀攬勝兹方始已居最上籌水月庵訪友譚瑞自昔繙經處重來伴客吟編籬花滿徑傍水竹成林鐘靜僧初定情空境自深留連溪上月探取滌塵襟水月庵唐肇健兹庵饒野趣四面俯漣漪客少苔蘚嫩僧慵佛火遲茶㕑依水結蓮座鑿山支靜極晨昏候梵聲雲外吹九日登東山劉逺譽欲將秋盡覽極力上崔嵬㕍陣連雲結風濤逐樹來捫碑觀舊句坐石掃蒼苔天氣重陽好迎人菊正開送許竹隱之任思州汪琬故國兵戈滿長途雨雪滋當予去官日值爾逺行時芳草投書渚叢篁鼓瑟祠好從登眺處遥爲寄相思萬聖山許虬丹砂勾漏覔絳雪更堪餐不借峩眉嶺長依玉露盤穿花麋角煖巢樹鶴裳寒簾捲先疑曉清光萬古傳松巋寺寺舊在深山今臨新路高其倬溪色澄無滓嵐光翠欲流幾盤松外徑一牖竹間樓鐘放依岩殷雲停爲客留髯僧同一笑蹤跡愧藏舟山家高其倬逕有於莬跡林多格磔音踈烟通屋角凸石露田心懷土生涯薄謀家意念深依仁還望歳循政等甘霖普安道中常安水勢盤州好三溪滙一溪路窮山向背人倦驛高低密樹遮輿幰飛雲襯馬蹄南中山硉矹日擬上丹梯再行龍里遇風雨常安一綫天開塹前峯接後峯寒崖飛白練空谷老青松雨過秋容淡烟平驛路封重行雲竇裏衝破萬千重上元前三日遊黔靈山晏斯盛深窈同盤谷陰森少六塵探泉從曲折看竹每逡巡簷積舊年雪堂開元夜春餘寒怯中座傾榼醉來頻杳靄探何極嚴城近可凭平疇流㶁㶁雉堞齒稜稜梅柳猶含雨松杉未脱氷行㕑烟散後天半有春燈題來仙閣錢元昌朗吟人不識别却岳陽樓直訪黔山勝無如雪洞幽塵清開法界機靜見瀛洲片刻飛雲駐仙風萬古流傑閣凌虚構䖍心祝瓣香祥烟通四面爽氣接三光欲迓乗雷駕先瞻渡海航自今來往數即此是仙鄉排律明碧雲洞孫應鰲早罷荆門鎮言尋石户耕風塵閒老眼丘壑淡秋情忽枉騷人劄深懐勝地盟洞泉開僻壤詞賦振韶韺一徑層林入千巖曲竇平軒忩含宿潤箭括引新晴雪障羅青壁霞標帶赤城龍蟠潭隱隱猿嘯谷碀碀五韙俱旌美千竒不辨名鬼神留斧鑿造化見生成日淨沉朝彩天澄起夜聲蔚藍盤島嶼花鳥映空明信矣遺塵世悠然薄太清念心思得象閲世欲餐英何日搴裳去同君策杖行鈎𤣥舒雅况發興出髙評獨往探牛斗相知洽弟兄斯遊如可遂豈羨接蓬瀛太虛洞韓仲雍磴路逶迤上岩扉杳靄窺澄霞漾飛蓋新月隱横坻地主勤供帳山僧逺執覊燭天紛雉炬殷地動鼉吹綠荔懸眥迥丹梯置足欹陰房愁涅袂温室競揚綦雪色疑伭乳烟光逗紫帷牀爲龍卧處穴是鳯來時擁徑成三秀堆峯列九嶷玲瓏連不斷廻曲到還離佛座輝珠絡仙臺暗碧滋雙林初止觀六道宛低眉通氣理非謬雕形工若爲莫須驚造物直欲問庖羲舉策家風劭無蹊國步竒勝情輕捫陟名士暢追隨歩幄重徴伎花宫再引巵接䍦拚倒著玉漏且催遲玉池趙釴疊石圍池水誅茅結舫亭偶然成野趣曠矣勝郊坰開鑿何人力幽深本地靈兩堤新樹緑萬㸃舊山青􅆼窕牛羊徑瀠洄鷗鷺汀花繁添滉漾月出照清泠心逺少塵事何須慕四溟送周子賢按貴州薛蕙萬里牂柯路炎洲百粤南懸梯穿鳥道流沫下龍潭赤坂黿鼉出𤣥厓日月含虹霓蒸海氣烟霧灑春嵐飛􅚦縁篁竹垂猿墮石楠橘花香細細藤刺緑􅆴􅆴嶺外青驄馭臺中白筆簪秦冠高鐵柱漢節照金函行邁應多暇登臨素所耽江山吟謝客物色助清談送逺都無緒憂時且不堪安危廷諍地遲子促朝參金芝亭劉應麒王師若時雨草木亦蕃滋共道中丞署雙蟠五色芝芬芳蘭弈葉掩映樹連枝道路壺漿後轅門燕喜時歌應階寶鼎茹可駐仙姿蒟醬兼筇杖窮兵空爾爲七言律唐送王十五判官扶侍還黔中杜甫大家東征逐子囘風生洲渚錦帆開青青竹笋迎船出白白江魚入饌來離别不堪無限意艱危須仗濟時才黔陽信使應稀少莫怪頻頻勸酒杯送義舟師却還黔南並引劉禹錫黔之鄉在秦楚爲爭地近世人多過言其幽荒以談笑聞者又從而張皇之猶夫束藴逐原燎或近乎語妖適有沙門義舟道黔江而來能畫地爲山川及條其風俗纎悉可信且曰貧道以一錫遊他方衆矣至黔而不知其逺始遇前節使而聞今節使益賢而文故其佐多才士麾圍之下曳裾秉筆彬然與兎園同風蕃僧以外學嗜篇章時或攝衣爲末至客其來也約主人乗秋風而還今乞詞以颺之如捧意珠行住坐卧知相好耳余曰唯命筆爲七言以應之黔江秋水漫雲霓獨泛慈航路不迷猿狖窺齋林葉動蛟龍聞咒浪花低如蓮半偈心常悟問菊新詩手自擕常説麾圍似靈鷲却將山屐上丹梯將赴黔州先寄本府中丞李頻八月瞿塘到底翻孤舟上得已消魂幕中職罷猶趨府闕下官成未謝恩丹嶂聳空無過鳥青林覆水有垂猿感知肺腑終難説從此辭歸便掃門寄黔中王從事羅隱故人刀筆事軍書南轉黔江半月餘别後鄉闗情幾許近來詩酒興何如貪將醉袖吟鶯谷不把瑶緘附鯉魚近日舉觴君莫問生涯牢落鬢蕭疎元過七星闗李京七星闗上一囘頭遥望鄉闗路阻修欲向雲山攀北斗不辭鞍馬過南州兩厓斬壁連天起一水漂花出洞流聞道清時無瘴癘行人經此不須愁過牂柯江李京歸歟何日是真歸慙媿山林與願違垂老八千餘里謫囘頭四十九年非窮邊野水黄雲渡夢裏田家白板扉珍重沙禽頻見下也應知我久忘