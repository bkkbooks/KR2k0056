蒼翠間平窪自相逗有時石上眠雲來觸衣袖潭靜山同色雲寒鳥不飛微茫烟溆際獨見釣船歸和凌𤣥洞原韻周瑛鷄鳴桑樹深犬卧苔花濕何處課春耕獨倚斜陽立長江春雨過綠水生青苔行人過江急江濶船不來石濕雲不起石晴雲亦逗對石閒觀雲蒼翠落衫袖江暖雪初作江寒雪漸飛一竿潭水上雪深猶未歸羅甸曲楊慎山圍羅甸國水繞滴澄橋橋下東流水可惜無蘭橈蠻樹不凋葉蠻雲不放晴長亭望不見何處是查城寒燈閟孤館陰雲鎻重城長夜恒思曉久雨恒思晴林間山胡鳥聲聲啼我前何似故園裏花亭聞杜鵑桃源洞劉綎仗劍飛虎穴停軺憇洞天幽巖可鐫石何處不燕然夜坐大峨石蔣勸善白雲石之上清泉石之下趺坐萬竹中凉風生靜夜初至永寧許邦才風塵誰自料花鳥故相猜問是山東客何由萬里來宿普安程本立漢婦良家子從軍歳月多生來小兒女唱得僰人歌國朝查城曲林華晥樹樹山楂子蕭蕭頂箐城四時常黯淡祗聽暮猿聲盤江曲林華晥古渡千盤水連雲一望城守橋諸將在枕劍聽江聲泊思州灘孫勷思心已不極况復到思州輸爾牂柯水滔滔正北流甲秀樓宗天植青山四面圍一水當中界宣城太守詩小李將軍畫六言絶明披雲巖謝三秀曉起雲分畫墨渠添水弄青蘋石隙桃花笑客茅簷燕子衝人巢穴環居九姓犬牙控馭三藩峽外乾坤錦里烟中雞犬桃源水去千巖漏洩雲興萬壑平鋪買犢人猶帶劍觀風我亦懸弧七言絶句唐龍標野宴王昌齡沅溪夏晚足凉風春酒相擕就竹叢莫道絃歌愁逺謫青山明月不曾空送崔參軍往龍溪王昌齡龍溪只在龍標上秋月孤山兩相向譴謫離心是丈夫鴻恩共待春江漲聞王昌齡左遷龍標遥有此寄李白楊花落盡子規啼聞道龍標過五溪我寄愁心與明月隨風直到夜郎西聞酺不與李白北闕聖人歌太康南冠君子竄遐荒漢酺聞奏鈞天樂願得風吹到夜郎南流夜郎寄内李白夜郎天外怨離居明月樓中音信疎北鴈春歸看欲盡南來不得豫章書哭黔中薛大夫戎昱亞相何年鎮百蠻生涯萬事瘴雲間夜郎城外誰人哭昨夜空餘旌節還自京赴黔南竇庠風雨荆州二月天問人初僱峽中船西南一望雲含水猶道黔南有四千送人歸黔府司空曙伏波簫鼓水雲中長㦸如霜大斾紅油幕曉開飛鳥絶翩翩上將獨趨風獻歳送李十兄赴黔中酒後絶句權德輿一樽歳酒且留歡三峽黔山去路難志士感恩無逺近異時應戴惠文冠自黔中歸新安李頻朝過春關辭北闕暮參戎幕向南巴却將仙桂東歸去江月相隨直到家宋錦屏山喻汝礪暝色輕烟罩郡城漁舟燈火倒觀星寒山逺水江村暮自在籹成水墨屏元瓮蓬洞石刻唐中立在山形勢已仁威何必驅車占水湄爲汝礙舟呼匠者少須一刻即平夷題諸葛箭唐中立古樹參雲仰望中武侯曽此一彎弓不遺箭鏃經千載那得蠻夷懼武功過牂柯江陳孚青草風吹毒霧腥交州何在海溟溟牂柯已恨天涯逺又過牂柯二十程送李文清之官八番宣慰司幕中宋褧武昌城外柳如絲曾見吳儂笑詠詩張緒而今漸憔悴定應不似昔年枝明啞泉謝三秀人云啞者泉之忒我云啞者泉之德早知世上如流口何不一歃長嘿嘿却金吳訥蕭蕭行李向東還要過前途最險灘若有藏私並土物任教沉在碧波間曲溪山閣留别李曲溪子楊慎東風樓上水盈盈爲鼓離鸞一再行明日梁園懷李白寒山一帶短長亭平溪道中楊慎野雞坪邊繞雜花幽蘭石竹交山茶可憐春色浩無主空使騷人惱鬢華豐樂秋成林晟野老杖藜山徑裏牧童吹笛晚風前要知擊壤聲中趣社酒新篘樂醉眠普市所李陞三里孤城鼓角嚴遶城青擁萬山尖鳥音晴碎巧娛耳草色春深亂入簾筆岫張守讓筆岫横天插曉雲長風飄落氣氤氲夜來正有江淹夢散作晴空五彩雯香爐巖張守讓溪邊流水遶香臺瑞氣金爐五色開却是玉樓仙子度馮夷捧出博山來石屏山張守讓誰將屏幛倚雲開削壁當空抱郡廻自是皇圖天外壯長城擁出日邊來鎮安渡張守讓津頭風雨暗埀楊兩岸相逢即異鄉春水横江不可渡誰爲鞭石造輿梁平冒山張守讓平冒山頭漢將營鐃歌不見夜來聲夜郎此日韜笳鼓留得秋山半月明宿聖夀寺黄龍光十年多病學無生客裏因縁到化城亂後山僧零落盡石床空對一燈明與祁致和陳獻章六年飽讀石阡書習氣而今想破除雪月風花還屬我不曾閒過邵堯夫西禪晚鐘任思永禪林僻在􅄔城西竹徑斜開帶小溪萬井樓臺當月夜一聲清響出招提新添驛許邦才野館孤燈半滅明江壖月落夜潮生無端鄉思三更後聽盡蕭蕭風雨聲萬山春耕髙任重萬仭層巒倚郡城春深官路擁花明空濛㸃綴青山色喜見蓑衣帶雨耕平壩謝肇淛愁雲三月風滿溪一日一程西更西鬼門關外無相識頭白老鴉朝暮啼西山夕嵐蕭伯宸誤疑作雨隨龍去或訝如雲伴鶴還颯颯天風吹不散長如積黛擁千鬟天然洞吳國倫竒峯倒作萬蓮開洞裏陰晴只浪猜罔象不驚龍正卧寒秋夜夜吐風雷瑞竹孫應鰲一本髙抽八節竒即從九節挺雙枝滿林時引鈞天奏聽到無聲祗自知翠葆聨翩紺纛攢從今日報竹平安寧知勁節氷霜骨也似芙蓉結合歡雪中同諸友過聖夀寺小集孫應鰲十年裘馬倦風塵此日驚看故里春漫憶舊遊重載酒祗園飛雪亦親人黔中曲朱茂時疉嶂曾無三尺平盤江狹處鐵橋横短裙窄袖花蠻女宛在鞦韆索上行慿虛洞丘禾實咫尺巑岏别有天寒雲莾互不知年我來踏破蒼苔徑風月無邊㑹與傳右初得洞懸巖到處鑿鴻濛疑有秦人托此中見説渡頭楓葉落年年秋水似桃紅飛雲巖萬士和洞裏幽深未可窮洞門竒峭䕶雙龍風雷若有山靈妬飛作江南鐵柱峯國朝聞黔中風景鍾淵映沅江西去接滇池風土依稀記往時銅鼓迎神歌一曲居人多賽竹王祠黔陽雜咏李良年荻港松扉曉柝傳半春愁説火連綿山城不用逢寒食晴過三朝便禁烟盤江橋彭而述鐵橋黒水舊知名天險曾當百萬兵試問臨卭持節客當年何路入昆明頂箐許延郡新種瑯玕翠幾重踈枝密篠綰清風使星走馬紅塵外刺史彈琴綠箐中食署中櫻桃甚酸田雯西園木蜜紅如火北地林檎大似匏可笑山薑一饞口八千里外噉櫻桃楊梅盧橘尋常有紫李黄𤓰分外甜偏戀櫻桃二三樹飽嘗酸味不知嫌薔薇花田雯瑟瑟絲絲絶可憐紅鬚綠刺弄春烟分明一段蜀江錦鋪在竹忩晴日邊引得春駒太多事倒飛斜舞十分狂慿誰繪向東風裹半是徐熙半趙昌堪笑香山老居士花開將爾當夫人我唯一看一囘醉消盡缾中麴米春題屏山菴周起渭龍塲佛寺伴諸生夜倚松杉各問名我爲看山來此地傳經還有舊陽明弔朱太常死難趙吉士朱季由來彊直名誓將七尺障孤城可憐功業隨流水罵賊猶堪比杲卿甲秀樓鄂爾泰鰲磯灣下柳􅆴􅆴芳杜洲前小駐驂更上層樓瞰流水虹橋風景似江南炊烟卓午散輕絲十萬人家飯熟時問訊何年招濟火斜陽滿樹武鄉祠鐵索橋鄒一桂豈徒騎馬似乗船鐵索横橋欲上天正是扶風揺不定怒濤飛吼起龍眠踰黄哨山宿毛坪鄒一桂黄哨山髙上接天下窺萬嶺隔雲烟陡然身落雲烟裏閒倚江樓送客船閏重九安順考棚口占鄒一桂來日題糕貴嶺旁棘闈今日又重陽何當山郭兼旬雨滌遍農家九月塲天與秋光歳月寛葛巾原不礙儒冠一行鼓吹簪花去好作茱萸插髩看是日發落生童雨後新晴日色妍薄寒風近小春天黔中遍是登髙地難得重開落帽筵貴州通志卷四十五
