body:
  text: 貴州通志卷十三食貨田賦鎭逺府原額田地二十三萬五千一百七十八畆三分八釐三毫三絲五忽九微六塵六纎五𣺌荒蕪田地一十萬九百一十七畆五分三釐九毫六絲一忽三微六塵七渺實在成熟田地一十三萬四千二百六十畆八分四釐三毫七絲四忽六微五纎八渺原額本色正米豆糧八千七十九石七斗八升五合六勺七抄一撮三圭三粒九粟耗米三十七石二斗三升六合八勺三抄九撮八圭七粒六粟田荒無徵正米豆糧四千九百七十二石六斗六升八勺九抄九撮八粒九粟無徴耗米一十八石四斗六升九合八勺九抄九撮八圭五粒五粟减則無徴正米一十八石六斗六合二撮八圭一粒四粟耗米二合八勺一抄四撮五圭九粒九粟實在有徴正米豆三千八十八石五斗一升八合七勺六抄九撮四圭三粒六粟有徵耗米一十八石七斗六升四合一勺二抄五撮四圭二粒二粟原額條編鹽鈔屯餉等銀四千四百二十二兩二錢五分三釐二毫一絲一忽三微八塵五纎四𣺌六漠七茫田荒無徴銀九百六十四兩二錢九分四釐二毫四絲八忽六微八塵一纎七渺减則無徴銀一錢二分三釐九忽三微一塵三𣺌實在有徴銀三千四百五十七兩八錢三分五釐九毫五絲三忽三微九塵三纎四渺六漠七茫原額馬館銀一千八百二兩一錢一分五釐二毫七絲七微四塵九纎五𣺌田荒無徴銀九百三十七兩五錢三分九釐六毫六絲七忽八微一塵七纎三𣺌减則無徴銀八分六釐八毫三絲二忽九微三塵三纎六渺實在有徴銀八百六十四兩四錢八分八釐七毫六絲九忽九微九塵八纎六渺又額外化誨苗民認納自首無畆本色苗糧二十八石四斗三升二合八勺鎭遠府親轄原額田二萬三千九百三十五畆五分五釐二毫荒蕪田一萬九百一十四畆三分二釐四毫八絲六忽二微三塵實在成熟田一萬三千二十一畆二分二釐七毫一絲三忽七微七塵原額本色正米並無畆苗糧四百九十六石四斗七升六合八勺三抄八撮六圭二粒耗米二十四石六斗四升八勺四抄一撮九圭三粒一粟田荒無徴正米二百一十三石四斗三合七勺四撮七圭三粒二粟無徵耗米一十石六斗七升一勺八抄五撮二圭三粒七粟减則無徴正米五升六合二勺九抄一撮九圭八粒一粟耗米二合八勺一抄四撮五圭九粒九粟實在有徴正米苗糧二百八十三石一升六合八勺四抄一撮九圭七粟耗米一十三石九斗六升七合八勺四抄二撮九粒五粟原額條編鹽鈔等銀一千九兩六錢一分三釐五毫七絲七忽六微一塵九纎二𣺌田荒無徴銀四百三十三兩八錢五分六釐一毫一絲四忽八微八塵一纎一𣺌减則無徴銀一錢二分三釐九忽三微一塵三𣺌實在有徴銀五百七十五兩六錢三分四釐四毫五絲三忽四微二塵七纎八𣺌原額馬館銀七百三十八兩四錢七分五釐四毫六絲二忽一微一纎二渺田荒無徴銀三百五兩九錢一分三釐九絲七忽二微七塵五纎六𣺌减則無徴銀八分六釐八毫三絲二忽九微三塵三纎六𣺌實在有徴銀四百三十二兩四錢七分五釐五毫三絲一忽八微九塵二纎又額外勸化容山等寨苗民認納無畆本色苗糧七石五斗鎭逺縣原額田地九萬一千五百三十五畆一分六釐九毫荒蕪田地六萬九千四百三十五畆五分一釐二毫六絲二忽二微八塵一纎四渺實在成熟田地二萬二千九十九畆六分五釐六毫三絲七忽七微一塵八纎六𣺌原額本色正米豆糧二千五百七十五石四斗二升四合九勺二撮三圭三粒三粟耗米一十二石五斗九升五合九勺九抄七撮九圭四粒五粟田荒無徴正米豆糧二千一十九石九斗二升三合九勺九抄五撮八粒三粟又耗米七石七斗九升九合七勺一抄四撮六圭一粒八粟實在有徴正米豆糧五百五十五石五斗九勺七撮二圭五粒耗米四石七斗九升六合二勺八抄三撮三圭二粒七粟原額條編鹽鈔等銀五百九十二兩二錢六分六毫一絲九忽五塵二纎六𣺌田荒無徴銀三百六十七兩四錢七分八釐二毫二絲二忽八微六塵六纎二𣺌實在有徴銀二百二十四兩七錢八分二釐三毫九絲六忽一微八塵六纎四𣺌原額馬館銀九百三十六兩四錢五釐六毫八絲四忽七微七塵四纎三渺田荒無徵銀五百七十九兩八錢四分二釐六毫七絲二忽二微六塵一纎三𣺌實在有徵銀三百五十六兩五錢六分三釐一絲二忽五微一塵三纎施秉縣原額田地三萬三百七十一畆八分一釐四毫二絲二微五塵七纎五𣺌荒蕪田地二萬五百六十七畆七分二毫一絲二忽八微四塵九纎三渺實在成熟田地九千八百四畆一分一釐二毫七忽四微八纎二𣺌原額本色米三千七百六石七升九合六勺三抄三圭八粒六粟田荒無徵米二千七百三十九石三斗三升三合一勺九抄九撮二圭七粒四粟减則無徵米一十八石五斗四升九合七勺一抄八圭三粒三粟實在有徵米九百四十八石一斗九升七合二抄二圭七粒九粟原額條編鹽鈔等銀三百九十九兩四錢七分九釐八毫七絲六忽一微五塵五纎五𣺌田荒無徵銀一百六十兩九錢五分九釐九毫一絲九微三塵四纎四𣺌實在有徵銀二百三十八兩五錢一分九釐九毫六絲五忽二微二塵一纎一𣺌原額馬館銀一百二十七兩二錢三分四釐一毫二絲三忽八微七塵四纎田荒無徵銀五十一兩七錢八分三釐八毫九絲八忽二微八塵四𣺌實在有徵銀七十五兩四錢五分二毫二絲五忽五微九塵三纎六渺天柱縣原額全熟田地塘八萬九千三百三十五畆八分四釐八毫一絲五怱七微九纎原額全徵本色秋糧米一千三百一石八斗四合原額全徵條餉等銀二千四百一十八兩八錢九分九釐一毫三絲八忽五微五塵八纎一𣺌六漠七茫原額額外化誨苗民自首