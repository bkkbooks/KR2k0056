body:
  text: 貴州通志卷八營建志序城池書院公署義學學校壇廟貢院寺觀周禮惟王建國辨方正位城郭溝池之固掌固掌之周知其山林川澤之阻而達其道路司險掌之至於表著之位壇壝之制庠序學校之設領於宗伯載在司徒皆體國經野之洪規也貴州介荒服野處穴居依倚山洞明洪武初始令馬築貴州城為都指揮治奢香復開九驛厥後設官置署興文教崇祀典規制漸備非榛狉之舊我朝聖徳神謨無逺弗届凡扼塞之處皆建築城垣官署以鎮撫之夷民秀者亦得補學官弟子荒村深箐絃誦沸聲開闢郎岱坡貢諸驛易羊腸之險為鴻漸之逵而先農建壇神龍立廟以為民祈禱迓福尤為從古未有之曠典煌煌乎光史册而昭來許矣若夫蠻俗尚鬼信巫浮屠老子之宫所在多有而亭榭樓臺亦古昔望氛祲察災祥之遺意不容畧也述營建志營建城池貴陽府貴陽府城明洪武十五年都指揮馬建石城週圍九里七分髙二丈二尺門五東曰昭文南曰迎恩西南曰廣濟西曰振武北曰布徳東北有池西南一帶濵河天啓六年總督張鶴鳴巡撫王瑊於北門外増砌外城六百餘丈設威清六廣紅邊小東四門國朝順治丁亥年賊毁外城十六年總督趙廷臣巡撫卞三元重修内城増髙三尺康熙十一年總督甘文焜復修外城雍正四年巡撫何世璂十年巡撫張廣泗元展成前後修葺貴筑縣城附郭定番州城原為程番府城明成化十三年知府鄧廷瓚築土城萬厯十四年改州知州范郴重修砌以石週圍五百一十丈髙一丈五尺門四廣順州城明萬厯二十九年設州無城崇禎二年知州李紹沆議請題建工未竣都司陳謙議改建新城於北岡上今州治仍舊城而以新城駐防兵開州城明崇禎三年建週圍五百一十丈髙一丈二尺門四東曰布徳西曰永迎南曰貴陽北曰茶山昌國朝康熙元年知州徐重修城樓四龍里縣城原為龍里衛城明洪武二十三年建週圍五百三十八丈髙一丈七尺門四東曰朝陽南曰通化西曰威逺北曰鎮靖萬厯二十一年巡撫郭子章増築二百餘丈貴定縣城原為新添衛城明洪武二十二年鎮撫王璧建土城正統間指揮孫禮重建萬厯十三年巡撫舒應龍巡按毛在㕘議王恩民甃以石週圍一千七十丈髙一丈一尺門四東曰熙春西曰延秋南曰武陽北曰肅逺城樓四月城西北二座國朝康熙二十六年裁衛併縣遷治於此修文縣城原為敷勇衛城明崇禎三年建石城週圍七里三分髙一丈八尺門四東曰祥曦南曰迎恩西曰布徳北曰平安縣國朝康熙二十六年裁衛改縣因為城長寨城週國朝雍正十一年一題建圍四百八十丈髙丈大塘城在定番州姑盧十國朝乾隆三年樓題建週圍二百九八丈城門四城四安順府安順府城原普定衛城舊普定府城在今府南四十里元泰定七年創明洪武五年安陸侯吴復建十四年置普定衛始建今城週圍九里三分髙二丈五尺門四東曰朝天西曰懐逺南曰永安北曰鎮夷城樓四水闗三水樓三垜普定府後改為安順府成化中移州於衛萬厯二十年陞州為府遂為府城明末毀於冦年國朝康熙九年知府彭錫纓等捐修完固十一知府胡宗虞壘石増髙重修四城門傅以鐵普定縣城附郭鎮寜州城舊安莊衛城明洪武二十五年指揮陸秉建週圍四百八十丈門四東曰朝陽西曰鎮夷南曰永清北曰迎恩嘉靖十二年改遷州治於此國朝康熙十一年裁衛併州因為州城永寜州城明時建小城一座名查城墻未及肩圍繞僅半里許建東西二門國朝康熙十二年知州林華皖増築週圍一百八十五丈髙一丈四尺安平縣城原為平壩衛城明洪武二十三年築週圍九百丈有竒髙一丈寬六尺門四城樓四月樓一水闗一因國朝康熙二十六年裁衛改縣為縣城清鎮縣城原為威清衛城明洪武二十六年指揮焦琴築週圍七百九十六丈髙一丈五尺寬一丈城門樓五萬厯十三年副使鄭秉厚重修久圮國朝康熙十一年重修二十六年裁衛改縣因為縣城歸化城圍國朝雍正八年厚題建石城週六百丈髙一丈四尺門四平越府平越府城原為平越衛城明洪武十四年指揮李福建三十四年改甃以石週圍一千四百丈髙二丈二尺廣一丈五尺門四月城三城樓四警舖四十五城内無水正統末苗冦圍城人馬渇死成化間指揮張能建水城於西門外别開一門曰小西門萬厯二十九年設府因為府城三十一年知府楊可陶指揮奚國柱於水城外築外城五十五丈水經城内汲者便之崇禎間知府陳紹英於城北隅建敵臺名雄鎮樓造望樓十二修國朝順治十八年道府徐𢎞業喻全昱前後增平越縣城附郭黄平州城原為興隆衛城明洪武二十六年穎國公傅友徳建指揮張龍築石城週圍五百三十丈髙一丈五尺廣八尺門四東曰豐潤西曰宣威南曰鎮安北曰昭化國朝康熙二十六年裁衛併州移州治於衛城乾隆二年題請修建舊州城同時題修甕安縣城明萬厯三十年巡撫郭子章署府事劉冠南建石城週圍六百九十丈髙二丈廣一丈門四城樓各一座餘慶縣城明萬厯三十年巡撫郭子章署府事劉冠南建石城週圍三百一十七丈髙一丈六尺廣一丈城門三東曰来喜西曰太初北曰南薫城樓三後閉北門止行東西兩門國朝康熙九年知縣陳世任修乾隆二年題請修建湄潭縣城明萬厯三十年巡撫郭子章署府事劉冠南建磚城週圍三百八十八丈髙一丈五尺廣一丈門二南曰久安北曰長治城樓四水洞五月城三今南北二門月城皆廢都勻府都勻府城原為都勻衛城明洪武二十七年平羌將軍何福築土城後指揮黄鏞砌以石週圍一千七十二丈髙二丈寬一丈城樓五月城轉閣敵樓八門五東西北各一南二成化間副使李麟濬鑿河引水環城為壕萬厯間副使蘇愚増修國朝順治十八年都清道僉事姚啓盛新鎮道㕘議徐𢎞業知府龍納銘㕘將龍略中軍守備李子玉重建尋傾數十丈康熙六年副使吴毓龍知府黎際臯㕘將龍畧衛守備崔基重修都勻縣城附郭麻哈州城原築土墻明嘉靖三十年知州楊敏砌石尋圮萬厯十六年知州胡友祿復砌以石週圍四百丈髙一丈二尺寛七尺門四東西南北各一月城二獨山州城原無城明萬厯五年知州歐陽輝諭令南北二街市民各照界限修築土墻髙一丈厚三尺清平縣城原為清平衛城明洪武二十三年指揮司鐸建土城萬厯間巡撫羅瑶請發帑銀五千三百兩委㕘將侯之胄等修砌石城週圍六百六十三丈髙一丈門四乾隆二年題請修建縣屬凱里城同時題建荔波縣城舊城在穹来里喇軫村明嘉靖間知縣尹東表建萬厯三十五年知縣劉邦徴續修為三門後圮莪國朝順治十七年知縣王家正詳請遷於方村嶺是為今城去舊城五十里築土垣週圍一百八十二丈髙五尺厚一尺五寸開西南北三門建有草樓歳久廢頺康熙二十年知縣劉棻捐資重建南北城樓乾隆二年城題請改建石城於䝉石里週圍五百二十二丈門四城樓四八寨城奏國朝雍正九年圍題建土城十一年尺請改建石城週六百四十八丈二高一丈一尺門五東曰安定西曰中孚南曰成化北曰威寜又曰思恩丹江城奏國朝雍正九年圍題建土城十一年一請改建石城週六百二十五丈髙丈四尺門四東曰布徳西曰宣威南曰撫逺北曰向化雞講城城國朝雍正九年丈題建土週圍三百四十門四小丹江城城國朝雍正九年丈題建土週圍二百六十門四上江城城國朝雍正九年九題建土週圍六百三十丈門四鎮遠府鎮逺府城明正徳間生苗刦掠知府程㸅於治西木家灣跨江據崖甃城四十五丈髙一丈五尺直至屏山髙低不一共垜口七十有六城樓一萬厯二十一年苗襲府治掠東西二闗巡按馮奕垣捐贖鍰六百兩檄知府張守讓於木家灣城外築石城一百二十丈治右採樵小徑為石圈硐門又於治右老虎衝空凹處壘石塞之崇禎十五年知府張宗煒以施秉苗叛又於西門臨闗磯上砌石為臺髙丈許後東西兩闗門樓傾頺臨國朝康熙十年重修乾隆二年題請修建除河岸毋庸建城外於山上隘口要路分築城闗列建炮臺共四百四十四丈零衛城沿河低處多遭水患今將舊城加寛為堤堤上建城垣髙七尺又塞兩北門硐另建樓開門可以永防水患鎮逺縣城附郭施秉縣城原為偏橋衛城明洪武二十二年築週圍一千一百二十八丈髙一丈二尺外石内土垜二千二百城樓四西角敵樓一東水闗一萬厯二十七年增建敵樓八國朝康熙二十六年裁衛併縣移縣治於衛城乾隆二年題請修建縣屬舊施秉城同時題建天柱縣城原為天柱所𨽻湖廣明萬厯二十八年改縣知縣朱梓增築週圍一百八十丈有竒門四東曰迎恩西曰懐逺南曰迎薰北曰拱極崇禎六年遷於縣東五里之龍塘後以苗亂復還舊治府國朝雍正五年改隸黔屬黎平十二年改屬鎮逺府清江城建國朝雍正九年九題建土城十一年改石城週圍七百十丈髙一丈四尺門四東曰尚徳西曰遵義南曰澄清北曰肅威栁羅城城國朝雍正八年丈題建土週圍二百七十門二稿貢城城國朝雍正八年丈題建土週圍二百八十門二栁霽城週國朝乾隆二年門題建石城圍三百四十丈三城樓三台拱城百國朝雍正十一年四題建石城週圍九四十二丈髙一丈尺門四城樓四砲臺十二座水闗二思南府思南府城明𢎞治十四年知府羅璞始築土城正徳間蜀冦至城壊知府甯閲繼修之嘉靖二十八年苗冦印江知府李夢祥重修週圍七百七十丈餘髙一丈五尺寬八尺門五東曰清州西曰清溪南曰清江北曰清泉東北曰遵化城樓五水門城樓一嘉靖間知府宛嘉祥易以磚石知府趙恒重修明季城壊年國朝順治十八年知府葉蕃重修康熙十二知府陳龍巖修葺安化縣城附郭印江縣城明嘉靖二十八年鎮筸紅苗猖獗攻刦縣治知縣徐文伯築土城週圍五百一十二丈有竒門四東曰来儀西曰金馬南曰咸寜北曰康阜崇禎十三年改建石城後毁於兵國朝康熙十一年知縣蔣元㨗重修婺川縣城明𢎞治二年知縣熊玠築土城四十四年知縣劉敏之重築内外甃以磚萬厯二十二年知縣張仕教以播州兵變増修堅髙週圍五百四十丈門四東曰東平西曰西寜南曰南安北曰北靖城樓四明季兵燹城樓灰燼墻垣頺圯國朝康熙十年知縣雷起龍重修石阡府石阡府城明嘉靖元年知府何邦憲創立土城四十年知府蕭立業甃以石週圍六百六丈髙一丈八尺廣一丈五尺門四東曰對旭西曰澄清南曰迎恩北曰拱極城樓四水闗四四十二年知府王管議増串樓年久傾圯萬歴間巡撫郭子章補修國朝順治十八年推官陳龍巖重修龍泉縣城明萬厯三十二年巡撫郭子章知縣凌秋鵬建石城週圍三百六十一丈七尺髙一丈八尺門四東曰義陽西曰綏陽南曰明陽北曰大保城樓四水闗二思州府思州府城明永樂十三年知府崔彦俊創築土城隆慶三年知府張子中議遷於平溪衛城萬厯五年復還舊城外砌以石週圍三百二十丈髙一丈五尺門三城樓三十年知府蔡懋昭以後山髙峻俯瞰城中敵至難守乃議築後山石城一百二十丈増築敵臺十二明季毁於兵火國朝康熙八年知府陳龍巖増修十一年復傾塌四十餘丈知府李敷治重修雍正九年知府褚世晫加修玉屏縣城舊為湖廣平溪衛城明洪武二十三年衛指揮使許昇建週圍九里三分髙二丈門五黔國朝康熙五十年守備吴丕烈修雍正五年𨽻改衛為縣因為縣城乾隆二年題修青溪縣城舊為湖廣青浪衛城明永樂二十年建週圍九里三分髙一丈一尺門三國朝雍正五年𨽻黔改衛為縣因為縣城乾隆二年題修銅仁府銅仁府城明景泰二年知府朱鑑建土城嘉