body:
  text: 欽定四庫全書貴州通志卷二十二武備志序兵制師旅考旅始末苗疆師𫝊曰德以柔中國刑以威四夷武備之不可一日弛也於蠻方尤甚昔殷宗伐鬼方三年乃克之葢地勢絶險山洞阻深急之則鳥駭獸散緩之則蟻聚蜂屯如馬援討武陵諸葛亮征南中厥功甚著然旋服旋叛宋太祖得夷人秦再雄任以刺史再雄練土兵三千人能被甲渡水飛塹㨗如猿猱而蠻方畏服元置宣慰明設屯衛然伏莾升陵時時間作而水西蛇節播州楊應龍皆勤數省之兵僅而獲勝厯代得失可考矣我國家定水西平馬乃剿繆冲長寨自時負隅阻化漸次懐來而古州清江諸蠻介居腹裏迨我世宗憲皇帝聖武布昭咸歸版籍分閫設戍因地制宜尤昭昭度越前古者也凡厯代征討之畧悉循其本末詳著於篇述武備志武備兵制明初置翼元帥府又改為行都督府省城或稱都衛都鎮撫司洪武八年改都衛及行都督府為都指揮使司凡天下都指揮使司十六貴州其一也自省以外大處置衛小處置所各衛有指揮使有同知有僉事有經厯鎮撫諸司各所有千户或𨽻衛或直𨽻都司其軍有馬步旗軍有屯軍有舍丁有軍餘名數多少不一成化間始設兵備道督各衛所及土兵嘉靖以後復添設叅將守備諸官始有招募之兵黔中各衛所軍數舊志俱不載其所載管兵諸官或有兵數或無兵數其兵或稱漢土官兵或稱哨兵或稱防兵或稱營兵民兵軍兵苗狆兵俱不著其分别之由又别無可查姑仍舊書之以備考明廵撫標下遊擊一員坐營中軍一員把總二員標兵五百名募兵五百名後改設總督設中軍副總兵一員旗鼔叅將一員鎮守貴州總兵官一員舊駐省城嘉靖三十二年加提督麻陽等處地方銜駐銅仁府節制鎮筸叅將督調两省漢土官兵標下坐營中軍一員漢土官兵四千八百名普安守備一員駐安莊衛專管普安安南安莊三衛普安永寧鎮寧三州地方兵一百五十名壩陽守備一員駐平壩衛專管威清平壩普定三衛安順一府地方兵一百九十名迤西守備一員駐烏撒衛專管烏撒畢節赤水永寧四衛地方興黄叅將一員萬厯二十七年廵撫郭子章因播亂疏題設駐興隆衛專管興隆清平二衛黄平州餘慶縣地方後裁都清守備一員駐平越衛專管平越都勻二府平越新添龍里都勻四衛地方清鎮守備一員駐鎮逺衛專管鎮逺府平溪清浪偏橋鎮逺四衛地方銅仁府守備一員駐平頭司專管銅仁一府地方思石營守備一員駐湄潭縣專管思石二府湄潭一縣地方貴陽軍民府防守四方河等十哨共哨兵二百二十九名新貴縣防守青巖哨兵一十五名定番州防守程番關等十七哨共哨兵一百七十七名貴州衞防守闗口等七哨共哨兵一百七十一名貴州前衞防守頭橋等二十三哨共哨兵四百八十名普定衞防守楊家闗等十哨共哨兵三百四十名威清衞防守平夷等十五哨共哨兵三百九名平壩衞防守鎮夷等九哨共哨兵一百七十名安莊衞防守大山等十九哨共哨兵三百四十三名永寧州防守馬跑等十三哨係頂營募役等處民兵安南衞防守盤江等八哨共哨兵一百五十六名普安衞防守亁溝等四哨共哨兵七十五名龍里衞防守西闗等二十八哨共哨兵四百七十三名新添衞防守舊橋等二十五哨共哨兵二百八十八名防兵一百四十名平越衞防守武勝等三十八哨共哨兵六百二十名防兵一百五十三名黄平州防守七里等三哨共哨兵七十三名餘慶縣城守兵五十名甕安縣城守兵六十名防守木老等六哨共哨兵一百十二名湄潭縣城守兵八十名都匀府防守營兵二百五十名一碗水等二十三哨共哨兵四百二十五名獨山州防守靖夷等二哨共哨兵二十八名麻哈州防守營兵五百八十名闗口等五哨共哨兵六十五名清平衞城守兵四十名防守蘆草等十二哨共哨兵一百五十六名興隆衞城守官兵一百二十九名防守東坡楊老官兵一百四十名冷水等七哨共哨兵一百二十名鎮逺府防守卭水等三哨共哨兵一百十名施秉縣防守後山等三哨官兵三百五十名焦周等四哨共哨兵一百四十名思州府城守兵八十名防守芒箐等三哨共哨兵一百二十名思南府城守民兵九十名防守太平等四闗共民兵七十名印江縣城守民兵五十名防守濫泥哨兵二十五名婺川縣城守民兵四十八名防守濯水哨民兵二十名石阡府防守提溪三哨共哨兵七十名銅仁府防守軍兵四百名銅仁等五十八哨共苗仲兵四千七百四十名畢節衞防守長冲等三哨共軍兵一百三十名烏撒衞防守平山等三哨共軍兵一百五十七名赤水衞防守梅子等六哨共軍兵一百三十名永寧衞防守歸樂等四哨共軍兵七十名國朝兵制以標鎮協營為次第各營以官職為次第官同者以各府州縣憲綱為次第其官制及駐防沿革俱詳秩官志總督標下舊設中前左右四營兵四千名駐劄貴陽省城國朝康熈十九年添設後營移駐雲南副將一員遊擊四員守備五員千總十員把總二十員制兵五千名糧餉俱在雲南開銷廵撫票下舊設䕶衞兵五十名自總督移駐雲南設左右二營駐省城叅將一員遊擊一員守備二員千總四員把總八員制兵一千六百名内馬戰兵一百六十名步戰兵六百四十名守兵八百名原設兵一千五百名長國朝雍正五年撥往寨兵一百二十名乾隆二年新増馬步兵二百二十名提督標下駐安順府中軍叅將一員遊擊三員守備四員千總八員把總十六員制兵二千八百名内馬戰兵五百二十名步戰兵八百八十名守兵一千四百名原設兵三千名撥國朝雍正七年兵三百二十名歸安順營又撥兵二百五十名歸長寨營十年添兵三百七十名現存二千八百名鎮逺鎮總兵官一員遊擊三員分防一員守備三員分防二員千總六員分防三員把總十二員分防