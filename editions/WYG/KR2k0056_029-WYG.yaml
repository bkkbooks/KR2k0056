body:
  text: 貴州通志卷二十九人物忠烈貴陽府明徐資貴州衞戍籍正統時巡按御史黄鎬聞資有才畧辟置左右隨鎬巡邊至羊腸河猝與賊遇資奮挺直前厲聲叱賊曰螻蟻餘孽敢害朝廷憲臣耶我分死之明年此際當殱爾羣醜遂遇害踰年賊果平鄉人名其墓為忠節岡子節官副都御史李毓陽貴陽人征水西遇害祀忠烈祠周思稷貴陽人萬厯乙酉舉人任新㑹令致政歸天啟初安逆圍城困守經年以食盡自縊同時效忠而死者鄉官李固棟孫枝衍楊之寧胡仰極不能悉紀附記於此劉琯貴陽人萬厯丙午舉人崇禎間任南京户部主事謝政家居以剛直不諧於俗丁亥流寇入黔與鄉官吳子騏楊元瀛李公門李世甲王孫齊胡修超蔡紹周等同時被執不屈死吳子騏字九達貴陽人矜尚氣節喜為人排難解紛萬厯壬子舉於鄉筮仕興寧以才幹聞㑹安賊叛母劉氏堕圍城中騏聞變倉皇棄官歸崇禎十年夷目阿烏謎復叛陷大方城逐守將稱兵内向人心洶洶總督朱燮元屬騏往詣六廣走書召諸目諭以禍福賊果悦服遣目把白舍等就撫事平督按上其事奉㫖奬賞丁亥流賊入黔騏與楊元瀛等之威清率土兵扼賊於滴澄橋敗之賊悉衆攻擊被執不屈死顧人龍定番州人流賊孫可望攻州城人龍率土民與之相持殺賊甚衆力竭城陷與妻李氏對縊子諸生大元抱父母屍哭不去賊並殺之同時殉難者鄉官尹思民賦詩壁間投筆引繩死黎維垣城上督戰死胡允中冠帶坐庭中叱賊受刃死土官龍在田土舍龍起潜龍飛血戰死貢士饒謨大呼率諸生王道中顧從龍黄文芳李一龍夏朝卿李二龍毛一練尹湯傅尹湯卿熊化楊東明唐璉賈翰張新建王仰王基昌土官程民悦韋帝臣土舍韋之福把總許華宇巷戰死舉人毛琛投井死教授艾養中諸生周卜年尹湯賔熊鍾隨鄉約杜凡六赴火死諸生謝賜璠黎應陽江山秀潘達黎應辰投泮池死武舉蒙九錫為賊將艾能竒逼降不屈中箭死按察司司獄陳玉環自經死馬士升郡人御史文卿子性癖潔喜讀書幼為諸生旋棄去屏跡山寺一榻蕭然意泊如也日以篇什自娛不與俗人交後寇亂被執憤罵而死金鎮貴開州人原籍江南㑹水西苗叛輸資助軍需有功厯官總兵致仕崇禎十六年狆苗圍開州鎮貴與知州黄嘉雋協力守城城陷遂遇害李科開州人官副總兵崇禎十六年流寇亂科率兵次茶山渡與賊戰殁於陣安順府明黄運寧平壩貢生天啓壬戌安邦彦圍省城撫按以蠟書召援運寧傾産募衆援省至太子橋衝突賊營戰死事聞贈光祿寺丞黄運逺平壩人慷慨有勇天啓三年領兵隨王三善進勦大方戰死祀忠烈劉安鼎平壩人天啓壬戌安逆圍貴陽分兵攻刼上游衆皆逃避鼎獨毅然大呼曰生為天朝人死為天朝鬼肯披氊椎髻以屈膝於逆猓乎遂閉户登樓舉火自焚死譚先哲平壩人舉萬厯壬子鄉試歴官户部郎解組歸閉門養高流寇犯黔舉家殉難石聲和平壩人中天啟丁卯鄉試厯官叅政平生以忠信自許流寇入黔舉家死之蔣勸善字小范威清人蚤慧稱竒童弱冠登萬厯乙卯鄉魁主司鍾惺於諸生中尤加賞異屢上春官不第授孟津令清苦自持一介不茍津民逋賦萬餘金積欠已久勸善力請蠲之民困稍蘇遷河間郡丞以不善逢迎與當道左遂拂衣歸臥林下者二十餘年日討論篇什力追大雅著有秦遊草莪石齋諸集明末流寇入黔被執不屈遂遇害平越府明李藻平越府人正徳丁卯舉人任江油教諭鄢藍賊變調委督餉守高城親身決戰亡於陣城賴以全馮世寵湄潭人博學性嚴介隱居不仕明亡不食死國朝黄進忠平伐營外委把總雍正十三年逆苗背叛進忠途次城中目擊危急狀官民公畱貼防毅然協守奮勇戰殁事忠聞給䘏銀七十兩賜葬祭並祀義祠都勻府明陸從龍都勻人萬厯戊子鄉舉任湖廣新化知縣致仕歸值安邦彦叛圍省城從龍罄資募兵督征陣亡事聞贈光祿寺卿廕一子入監從祀王三善忠烈祠楊鳴高都勻人任浙江湯溪令安賊叛募兵援省至谷龍司敗績死之楊廷烈鳴高次子年十八娶吳氏生子甫一歲聞父陣亡棄家募兵援省誓報父讐屢立竒功加叅將轉戰至鴨池河死之國朝邵煥麟山隂人任典史雍正十三年四月逆苗攻陷凱里肆行焚刼時煥麟在城奮前殺賊手刅數人賊怒環擊之戕其身為數段其死最慘事聞贈主簿賜葬祭祀忠義祠鎮逺府明楊瑄上通判貌魁梧有膽畧成化三年征茅坪賊亂同叅將吳經進勦至江口卒遇賊力戰死之楊昌祚鎮逺廪生襲土推官安酋叛代父領兵援省至甕城河遇伏死思南府明李盤思南副長官宣徳間鎮筸苖叛命大將討之賊匿山中久不出人皆疑怯盤毅然率孤軍深入遇賊數百盤䇿馬奮擊斬數十餘級賊四集援兵不至遂被執盤素勇敢賊畏而惡之及執賊曰而銅仁李耶思南李耶賊舊為銅仁轄銅仁李善撫之故云從卒曰銅仁賊欲釋之盤厲聲曰予思南李何必紿之從弟邦政告急於徳江長官楊潮海潮海至盤已遇害邦政以石置樹間記之久而樹合生夾石夷人夜過樹下聞空中有㸃兵聲以為神立祠樹前號為畱石坡御史申祜盤姪甥也為忘年交每論及時事盤大聲曰身蹈白刃之鋒鋩血潤原上之野草然後不愧舎生取義之道申曰大丈夫當如此卒之申亦死義於土木人咸曰盤祜素志云田景猷思南人天啟壬戌進士值安賊亂上疏曰請招撫水西授以樞部主政深入賊巢為賊所執幾二載巡撫王三善兵至大方脱身出謁備陳賊中情形後師敗遇害事聞贈太僕寺卿廕一子入監石阡府明安民志龍泉司長官龍泉與播隣無城民志與播賊將朱擎善以好言結之應龍信之不入寇已而播氛日熾民志入省請兵五百捐資築堡墻自衞應龍惡之自率賊寇龍泉民志衆寡不敵死之播平改龍泉為縣巡撫郭子章請於朝以民志子世襲土縣丞以旌其忠其祖職仍世為土主簿思州府國朝譚徳溥龍里人歲貢任訓導雍正十三年五月逆苗入城徳溥衣􅃣自若為賊所害事聞贈國子監學録賜葬祭祀忠義祠大定府明羅仕儒赤水人萬厯辛卯舉人官學正致仕歸值水西變自縊死以火焚室謝名臣赤水人萬厯丙午舉人官知縣丁父憂歸適水西變城陷舉火焚其室自縊死張䕫升赤水衞指揮張大壯子城陷督鋭士巷戰短兵相接身被數鎗乃脱身入城隍廟指神而言曰神不予助使予死當以頸血濺之乃自殺擲其頭於神座前賊大駭而去王碩輔赤水人字斗瞻自幼定省不懈人稱其孝萬厯丙午舉於鄉天啟初任四川南溪知縣時奢寅叛碩輔募兵戰守有汪舉人者與賊通伺碩輔出戰舉火内應城陷碩輔整衣冠北面稽首曰臣力竭矣自縊而死事聞贈光禄寺少卿廕子錦衣千户遵義府明周鎮郡人立功任遵化叅將崇禎時戰死於邊闔家殉難事聞封墓贈祭孝義貴陽府明易楚誠郡人父病楚誠泣天致禱已而果愈又嘗病痬醫欲得兔髓和藥楚誠求之野有羣鷹攫一擲於地持歸付醫有司欲上其事固辭曰此非吾誠所致偶相遇耳不願以是得名陳晟前衞人敦禮尚義正統間蠻入寇公廩不繼晟輸粟助之授七品散官景泰間又輸金以助軍事聞賜勅奬之汪勝宗郡人早孤家貧事母至孝母卒負土成墳廬於墓側晝夜哀號不已朱璥郡人好學能書早喪母事父以孝聞父嘗疾劇璥禱於神願以身代及卒刻木為像事之如生段達郡人父病攣達侍起居不刻離夜寢榻下聞謦欬轉側即起扶掖日則負出外庭具飲食邀鄉隣相與談笑為歡如是者三十餘年父病卒哀毁踰禮時人稱之陸緒郡人事親至孝親卒廬於墓側守禮盡哀馬端郡人事母至孝母疾思鯉為膾端遍覔不得忽一老翁持雙鯉到門來售端入室取值酬之比出翁遂不見人以為孝感所致時有征苗之役端輸粟數百石以給軍奉敕旌異周昇郡人父為耆老奉遣往夷落解爭地事中瘴癘垂絶昇甫弱冠亟往視之割股為羮以進乃甦夷人見之皆感歎遂罷爭王軾郡人友愛其弟轍同室七十年始終無間舉族化之劉繼宗郡人早孤事母至孝母卒設主以事如在生禮終身不衰陳純郡人事嫡母孝母病足艱於行純旦夕出入背負備極勞瘁母卒將𦵏值久雨純仰天號泣忽晴葬畢復兩人以為孝感湯良弼貴陽人貢生萬厯間任栢鄉郴州清平儒學擢廬陵令賢聲屢著以母老乞養歸每問省必􅃣帶進見下氣怡色旁觀為之感動又能敦睦族姓周急鄉隣多隠徳云汪瀾宣慰司人天順己卯鄉舉任嘉定州知州事繼母孝處異弟友族人流落夷方者冒險收之且為之立業畧無吝色楊襘字希祥宣慰司人𢎞治戊午舉人性至孝母曹嬰心疾每一發輒顛狂如不欲生襘號泣隨之飲食依曹為進止露禱於神願以身代母卒哀毁骨立杖而後起三年如一日舉於鄉以父老不忍離左右孝養十餘年父卒始任新寧縣值流賊破殘之餘多方招撫安集士民懐徳解組日無以為行李年八十餘卒子文炳照磨文焕知縣孫其寧以寧俱通判之寧同知曾孫世華舉人人以為誠孝之報云黄瑾新貴人與弟瑜共處相敬如賓至老無私蓄守棺孝子新貴人不知姓名天啟壬戌安賊叛將圍省城城外居民争入城以避孝子居郭外獨守其母棺不去賊至城下義之不加害後餓死於側李彬貴筑人性慈煦好急人難嘗謂濟人之術莫善於醫遂精之時郡中大疫彬曰煮藥數斛令子弟分擕赴閭陌療之全活者衆龍見廣順人弟龍起溺於河見赴水救之起得免而見竟溺育司以其事聞謝體仁開州人有經濟才萬厯三十三年水銀山苗叛總兵陳璘監軍叅政洪澄源率師討之辟體仁為叅軍誘執叛苗賊首餘黨悉平三十五年賊黨仇殺體仁屠其家被難者五十三人汪澤民開州人素有志畧崇禎十六年苗狆王阿辛等謀刼城澤民聞變密白知州黄嘉雋賊知事泄遣賊黨七人夜抵澤民寢所刃其腹將死命其妻以紙筆納腹中曰死當書賊罪狀訴於神死踰旬七賊各遇澤民追逐墮峻坡肌肉盡裂而死張琪龍里人嘉靖辛酉舉人官河南衞輝府司李有㢘能聲因丁母艱歸廬墓三年居鄉教訓生徒人材蔚起子文衡文錦並登萬厯庚子賢書姚璋新添人性至孝讀書學古以子貴封副使益自謙抑鄉人稱之後廷科新添站軍不知書事母閔氏極孝母病跪禱城隍祠自暮達旦及母死居喪三年不入私室既𦵏廬墓三月萬厯間巡撫楊宏科題旌其門曰庻人之孝國朝周家正郡人性孝友年十二種圃養親居喪哀毁幾於滅性兩兄斷手失明悉賴以養兼撫諸姪如子友愛著聞巡撫衞既齊奬之黄維章開州人性孝母疾割股以療因得痊州守上其事巡撫旌之何兆柳開州人字星如崇禎庚午舉人水西賊化沙杓圍副將方國安於大方城總督朱燮元委兆柳救援兆柳捐資助餉救國安出重圍斬化沙杓流賊至黔兆柳招集義勇捍禦鄉里為孫可望所殺籍其家子東鳯鳴鳯並死之幼子人鳯白其寃於經畧洪承疇奏聞給還家産墻焯開州人康熈辛酉武舉事父曲盡孝道父殁事繼母愈加謹三十年如一日宗族鄉黨無間言汪啟徳貴定民汪逢霖子年十歲有至性霖病篤藥不效刲股以進霖竟殁啟徳哀毁如成人巡撫衛既齊憐其誠摯優賞之朱重義貴定人廪生事庶母如父在撫幼弟不踰初心巡撫于凖給匾旌奬張覲北修文人性至孝居母喪哀毁骨立後中康熈辛酉鄉試安順府明梅雪郡人事親純孝姪惟和疏請立純孝坊蔣文蔚府庠生幼值親病嘗割股萬厯間旌異倪勲普定人弟然烈羔熊五人同爨永不分居勤儉營生竭力事母其妻各守夫訓孝友著聞御史陳鑑旌之張大猷普定人天啟間安賊叛死義牟嘉粢與大猷同死於義郡紳安上逹為之合傳徐國俊安平人家貧極孝雖菽水必怡顔致敬親病欲絶夜禱割股以進親病遂愈院道旌其門曰榮膺天寵譚泮平壩人明經處已孤介接物無欺輸田以建學捐資以助餉力行義舉教二子皆登賢書王瑚落架兵目安賊叛圍城食盡人心惶惑瑚運糧濟衆賴以生全曹一鵬威清庠生事二親定省不違禮母没哀幾絶繼母疾湯藥必親嘗撫按旌其孝平越府明彭文郡人通州學訓導性至孝母亡廬墓三年具聞旌奬楊時椿郡人歲貢任大足縣訓導在任思母棄官歸養母疾侍藥衣不解帶人稱純孝李時用郡人七歲失怙母撫成立為郡庠生應貢不忍違離棄貢養母母卒哀毁欲絶以孝聞旌表周與慶郡人舉人父殁甫歲餘母葉撫養成立訓徒供母及厯任奉母偕往母疾躬侍湯藥至廢寢食尋棄官歸養孺慕終身張顯仁郡人庠生母戴氏病顯仁密禱於神請以身代刲股和藥以進母病立愈有司上其事奉旌王志雄郡人生平以賑濟貧乏為事凡稱貸不能償輒焚其劵鄉人異之趙鉉郡人祖仲元病父應壁任金陵鉉延醫侍藥晨昏無倦祖病篤鉉復割股以進乃痊事聞旌表徐思卿郡人事父母至孝奉旌徐勝郡人立身理家俱有典則五世同居𢎞治間賜羊酒奬勸李學書郡人初任綦江縣訓導尋解組歸閉户著書居家孝友值時疫盛行施藥拯救全活者衆樊為霖郡人孝友謙謹里人化之以子思孔貴封叅議奚國采郡人品行真淳孝親最篤奉旌葛鏡平越衞指揮樂善好義郡城東五里兩山陡峻中亘麻哈江江深不可測行人過渡每遭覆溺萬厯間鏡捐千金建橋後為水所圯天啟六年鏡復傾家産重建者再亘若長虹堅緻牢實至今行人利賴名曰葛鏡橋丘本厚平越府人隆慶間安莊貢生鍾士竒赴京宿本厚店遺金三十兩本厚追士竒還之後士竒選清平學訓導請於有司匾其門曰義士還金張鵬黄平人父梅疾危鵬年十歲刲股愈之事聞旌奬彭必達黄平人事祖永年極孝鄉黨稱之朱芳興隆人初聘趙晟女尋以痘傷目及納幣欲娶女家辭之芳曰吾不娶若將安歸竟娶之子璣當貢陪貢衰老遂讓之李俊黄平州人事孀母彭氏至孝正徳間題旌張也恭黄平州人母王氏早卒事繼母楊氏竭力承歡曲盡孝養楊夙有氣疾每發恭侍湯藥日夜不懈事楊四十餘年如一日恭卒楊疾發嘆曰無長子治藥必不起矣遂殁李際時興隆衞千户幼失恃事父與庻母極孝父惑於庻母之譖日鞭笞之且逐於外際時自怨自艾父悟召還孝敬有加劉宗臣甕安人事父選繼母趙氏備盡孝道天啟間水西兵變破甕安城邑人盡逃宗臣祖母冷氏年八十病不能行宗臣不忍捨去賊至身被數刃終不離祖母側賊義而釋之崇禎間以事聞特加奬勸勅有司每嵗給糧六石優恤宋廷階甕安人遇歲凶以財物賑貸又不取償人高其義楊再亨餘慶人六歲失父事母至孝十四歲播逆作亂再亨負母避山箐採藜蕨以供凡遇母有疾必籲天求代至刲股嘗糞事聞建坊旌表唐顯瑨湄潭人萬厯末以邑庠生赴試偏橋道中得遺金一囊畱待之次日二人哭而來云收軍餉銀百二十兩盡遺之今將赴水死瑨啟囊驗其數符遂歸之王昆湄潭里民王良家僮良夫婦相繼死遺子邦雄與女皆幼值賊亂逼境昆負兩孤匿山箐中身出傭以養之孤賴以生後邦雄為諸生昆猶拮据給事執僕禮至死不渝國朝冷起鳯郡人母久病起鳯禱神刲股母病遂愈康熈三年督撫給匾旌賞黎阿案黎阿誾苗民兄弟割股救父巡撫于凖給匾旌奬戎祚長甕安人家貧為人傭工所得悉奉父母父恚加責怡顔順受及議婚力讓弟先後五年乃娶學使沈翼機給匾旌奬都勻府明徐惟郡人素性篤孝偶所居火惟一切不顧獨抱木主冒火而出以孝行奉㫖旌表吳裕郡人號松菴少遊郡庠慕古之為肥遯者不仕以長厚醇謹聞鄉人宋晉以事貸富人白金二百兩偶遺道上為裕所拾大書於門晉至還金晉以其半謝堅辭弗受又湖廣指揮奉調來勻寓裕所事竣反楚榻下遺金一囊可百餘兩裕藏以待明日果至亦檢還之郡人稱為還金公近城水漲屍骨暴野裕募工掩埋後置舟以濟卒年八十有二屠總郡人好學尚禮幼娶徐氏生子方一歲妻卒總不再娶年八十一終𢎞治間副使金子淑旌之楊愚郡人性仁厚樂為善事歲施藥以濟里人人皆徳之司朝相沈雲翰沈應麟雲翰子周系逺俱郡人咸以孝義推重見黔記李源清平人性至孝父病源嘗糞甘苦以占吉凶父愈人以為孝感官至都指揮僉事金章清平人少孤善事母母病氣絶逾日章呼號籲天請以身代母復甦呂大綜清平人性純篤父病危急藥必親嘗衣不解帶夜必焚香祝天服食溺器咸以身親之萬厯二十二年提學沈思克奬之孫枝榮字奕葉清平人天啟初聞父英死安酋之難日夜號泣氣絶復甦仍擕一僕往尋父骸時賊黨充斥枝榮從僻徑夜行晝伏半月乃得入城尋至一官署中見封一大甕上書清平衞弁孫英骸骨舉人趙邦俊記乃負之歸生平謹厚端潔言辭不茍家極貧以舌代耕從遊者甚衆國朝胡全忠郡人康熈九年於狇狫坡上神廟拾遺金一包及遺金者反全忠還之其金一十五兩五錢封識無異鎮逺府明王儒鎮逺縣民貧無立錐事親愉悦母劉氏有疾焚香䖍祝嘗糞告醫母疾遂愈院道奬之李廷正號心存鎮逺縣人以舉人為蜀雅州知州操持清潔尋告終養林下三十年事母純孝撫院表其門曰孝節可風蔡雲祥鎮逺縣人由歲貢任貴州宣慰司教授以母老不能同赴遂棄官終養侍母凡三十載年八十餘乃卒旌其門曰孺慕維風鄭之和鎮逺縣人母高氏病篤和九歲刲股調糜以進母病立愈當道旌之楊正位施秉縣人生甫七歲父再翔慕神仙術雲遊十餘載正位朝夕哀思屢欲尋訪其祖母疑翔必客死而正位尚未成立不忍使之逺出唯勵之讀書遊泮後遂齋戒籲天誓必見父遍歴西南將十年果於泗城州之觀音洞迎回未幾翔病親侍湯藥夜不解帶者三月卒於家後正位長子通宇中萬厯己酉鄉試為御史孫友楠官都督人以為孝感云陳越天柱所人九歲喪父事母楊氏至孝母殁廬墓三年嘉靖十五年本所火災延燬殆盡越所居茅屋獨存人以為孝感所致王偉天柱人好施不倦親族待以舉火者甚衆歲饑出粟賑濟全活無算有貸金不能償者輒焚其劵湯克義天柱人事父母冬溫夏凊刲股嘗糞備極孝養萬厯間知縣詳請旌表見湖廣志蕭宷天柱人樂善好施信義孚於逺邇明萬厯間凶苗傅良嘴負固梗化時初議設縣吏目朱梓多方撫諭良嘴必欲得宷為質然後出宷欣然往謂家人曰若得縣成苗順雖死何惜良嘴見宷至始率衆就撫諸苗聞風向化建縣之議始定且捐地以為縣治地方凡有經畫無不諮之楊文煒天柱人崇禎間諸生父病割股療之復活數十年邑令旌其門國朝李蕃施秉縣爛橋民一日三虎入市其父逐之虎撲父嚙其股父持虎急蕃奮往救之格殺虎父乃得生縣令上其事巡撫田雯旌之湯之新天柱人廪生事親以孝聞父柩在堂值戊子歲苗變破城之新守父柩不去賊殺之鄉人皆為流涕李徳芳天柱人幼喪父事母王氏最孝崇禎甲申後流寇與苗賊相繼擾亂德芳奉母避亂轉徙無常得米少許炊粥供母自採野蔬充腹數歳始得歸母病臥數月徳芳晝夜不離親滌帷裳母卒喪葬如禮至老孺慕不衰鄉黨訓其子咸以李孝子為法思南府明劉可揚郡人母病禱神求以身代親侍湯藥晝夜不離左右母愈事聞旌表張翬水徳司人嘉靖間蜀寇之變翬領土兵破賊備嘗艱險事平不受賞隂士膚府庠生年方弱冠父昊病篤醫不能療士膚禱於天割股以和藥父尋愈葉其英郡人早孤年十三母疾甚英皇遽無措割股以進母遂愈張大玉府庠生性至孝母病祈神刲股王應甫郡人嘗割股以療母疾人以孝稱曹士銓府庠生戊子亂奉母避兵大聖登洞中已而賊攻洞擄銓母子以父曹應舉曽為遂寜縣謂銓宦家子横索金備極拷掠無所得欲刃其母銓大呼曰寧殺我勿傷母賊怒甚竟刃其母銓以身蔽並殺之兄士望尋母弟屍顔色如生並葬之劉達府庠生事母孝待弟友邑人稱之無間言有司匾其門曰慈孝一派申厚郡庠生事二親最孝父母殁相繼廬墓各三年鄉人欽之田景祚沿河司人父病篤祚甫十二歲焚香告天請減算以延父命復割股救之後三年父復病祚仍欲刲股父覺阻之曰爾廣隂徳教子孫成名即孝矣何事刲股為遇凶歲設粥賑濟有病者扶至家養之孫茂穎曽孫仁淳相繼登賢書人以為報云安濂蠻夷司人年荒出米賑饑民賴以活勅賜旌奬陳友儒印江人嘗積穀數百石賑荒全活甚衆又嘗堤潰傷禾友儒聚衆謀改堰於上流一切鳩工約數百金悉出己力引水穿城兩壩汪洋民皆食徳叅政李渭旌其門曰集義致祥徐文林婺川貢生年十二時割股救母事兄恭謹縣令旌其門曰孝友之門國朝孫繼康府庠生天性篤孝年十四母病日侍湯藥不刻離病轉篤康涕泣祝天刲股進之母果愈何文龍郡人康熈三十年二月父疾篤夜祝於神引刀割股父疾果愈有司以聞劉司直郡諸生事母誠孝母病刲股以進遂痊丘崇聖丘崇儒印江人少孤貧竭力事母兄弟同居友愛見閭里有不孝不友者輒勸以至性語人多化之有司給匾旌奬石阡府明揚維鑰郡人隆慶丁卯舉人任通州守親殁廬墓三年鄉里稱其孝朱嘉賓龍泉人庠生隆慶間苗賊刼掠縳其父應乾痛加炮烙索取金帛嘉賓奮身直入手刃一賊解父縳翼之而出衆賊刃嘉賓死題旌思州府明田應秋郡人嘉靖三十年苗賊攻陷府城擄其父母秋與弟應期泣奔苗穴願以身贖父母得歸節奉旌奬周紹昌郡廪生家貧性孝割股以療母疾院道旌其門劉惠郡庠生父患癱醫家以穢不可施藥惠口吮之及卒哀毀骨立葬後廬於墓側一夕隣家火將延其舎惠心不為動火尋滅人皆異之事聞撫按旌之鄭維正平溪衞人素喜施與值兵亂收瘞枯骨置萬人塚見在東山之麓以子逢元貴受誥封國朝邊士斌清浪衞諸生性純孝甫十嵗父患臂毒斌口吮之晝夜泣禱於神願以身代父病頓愈越三載父卒值兵亂斌負母逃難走沙江江水泛漲幾遭覆溺忽有白氣繞身母子已出洪濤登岸矣人皆異之夏炳清浪衞廪生年十三喪父值丁亥兵亂舉家分散炳獨奉病母以居頃刻不離母卒哀毁骨立葬後廬墓其庻母祝氏及幼弟燨失散已久炳遍覔之至地名落脱始遇迎歸奉養訓弟成名督學屢加旌奬黎平府明徐洪銅鼓衞人天性純孝居喪三年不入私室哀痛泣血未嘗見齒劉運昇五開衞人事繼母盡孝困苦流離承歡不懈值賊臨城負母入山逃避賊追及母曰汝速逃勿以累汝昇曰母不能前兒將安去賊義而釋之大定府明薛賢烏撒衞人景泰三年賢與盛福周宣邵瑾張宣鄭暹各出百金義助軍餉賜勅旌奬復其家趙啓烏撒衞指揮使與弟哲友愛甚篤其父年老命啟襲職遜讓與弟鄉人異之姚之典烏撒衞庠生父殁於任徒歩扶柩歸泛舟溧數里不溺廬墓遇虎不傷人以為孝感張伯安赤水人讀書好義以孝友清儉為時所重正統間以子諫貴封御史馬行健畢節生員與弟行毅隱居好學不干外事以孝友著聲水西叛城陷弟兄相抱舉宅自焚死南籠府明盛全普安戍卒家貧而孝母嘗病齋戒祈禱願以身代又三年母病垂危全乃刳腹出肝刲之死而復甦和羮進母母病復愈此𢎞治己酉事也莆田林廷弼為之歌邵元吉普安人天性孝友博通經史應嘉靖庚子鄉試第一塲畢聞行路人私語曰重慶邵郡丞病郡丞者元吉父也元吉疾趨問語所由來行人漫應曰得之傳聞未確元吉心怦怦急入旅舎束裝倍道行同試士勸止之不聽至重慶父已殁哀毁骨立匍匐扶櫬歸經播州遇虎同行人令避茅屋中元吉泣下弗忍離父柩虎竟去人以為孝感所致隣家火延其廬元吉左手抱父木主右手掖母出再入取圖書曰有先人手澤在取之出火亦旋息後應歲貢入都時仲弟元善謫通州郡丞元吉就通視弟不語不食時時泣數行下弟問故曰我思母即欲歸不願仕也且有我奉母爾始得安心於仕即棄牒歸母思子致病見之喜病遂愈元吉以母病故善岐黄弟元善元哲元高先後登科第悉元吉教之也孫文恭應鰲為作邵隱君傳沈濟普安州庠生志向高明養鄉隣之㷀獨殯朋友之親喪出粟賑貧置田睦族洪遇普安州僰人事祖母孀母極孝雖貧寒奔走衣食而奉養必求飽煖菽麥精者奉母粗者自給一菜蔬亦必先進院道俱奬勵之支美瓊普安人諸生古貌古心操守嚴肅孝繼母友愛異母弟無戯言惰行遇鄉族輒以道義勸勉不匿遺金萬厯間督學凌琯以喻義表其門國朝王瓚安籠人父早喪家甚貧事孀母甘㫖不缺撫養弟妹善體親心三弟俱入泮有司表其廬遵義府明楊正東遵義人萬厯時楊應龍阻兵淫虐正東糾被害者赴京告變適楊應龍贖罪歸仇殺奏已者正東棄家潛逃僅以身免劉臣武遵義人天啟時奢酋亂同兵備道盧安世恢復遵義以功授守備鄭規正安州土長官司僕人嘉靖間賊困土司規語其主珪曰主尚乏嗣若罹於賊鋒如世系何願以身代遂著珪衣􅃣誑賊殺之珪間道逃免尹知明正安州人父早喪撫弟知朗知清成立婚配以自置田業分給之子尚春亦以已産分姪為之聘娶時稱義門李神童綏陽人生五月能言七嵗通經義不由師授下筆成文性至孝父早喪與母相倚母病貧不能醫典身於鄉人鄉人憐其誠而助之母卒不能葬泣血死時年十一鄉人為之營葬邑令朱由鋌表其墓立祠以祀之傅元勲桐梓人庠生天啟間因奢賊破城慷慨從戎設計破賊上嘉其功授團營副總兵張顯光仁懐人母病醫藥罔効晝夜憂思叩禱於神母病尋愈縣令旌其孝國朝董子策郡人康熈癸卯舉人事繼母陳氏至孝教異母弟竒策遊泮母喪哀毁盡禮遭吳逆叛不受偽職後數年卒唐一元郡人年十三侍父疾以孝聞平生撫孤助婚施棺槨賑饑寒出金帛為人贖身義舉甚多子廉孫羲伯相繼登仕籍楊長春郡人幼以孝友聞長立軍功授副將明末退隱山林四世同居百口共爨年踰八十足跡不履城市何天章遵義諸生内江籍避亂遷遵性剛直深明春秋周易事母孝創議建學吳逆之亂偽將擄男婦三百餘人天章挺身營救偽將感其義悉釋之年七十終張士偀字柱石南川縣籍避亂居遵少失怙恃惟兄是依行必隨食必候事必請命兄殁諸姪皆教養婚娶友愛之誼化及一鄉王竒爵郡廪生頴悟能文應歲薦辭歸不就生平善事親竒爵殁後數十年其間安視膳之節閭里猶稱述之子又旦登癸酉鄉薦續編國朝貴陽府姜伏乾貴陽人家貧父病伏乾先意承志竭力供甘㫖三十年如一日嘗客遊習安於井畔拾遺金百兩止於旅店不去次日有黄姓者號泣而過詢其故乃市産償債者伏乾還之其人願分半為謝不受居家孝友兄弟五人皆同居無間言子文在文濵登武科甲文澤㧞貢生能世其家平越府張兆舉黄平州人習儒業喜讀書持身以禮事父母左右就養豫順無忤父縉患痺症不能動履者六七年兆舉躬自負之刻不相離雍正十三年四月苗叛兆舉請避去縉不許及城破舉家老穉八口同時死難乾隆四年總督張廣泗題旌張于昌黄平州人六歲時得菓不食以啖父母有懐橘之風家赤貧母嘗臥病不能買藥于昌入山燒炭以為醫藥資母病尋愈雍正十三年苗叛父緘時遘疾垂危于昌率家屬二十餘口侍疾不忍去緘責令擕家避之至以頭觸地于昌乃令諸弟負其母逃以身守父俄而城破父子俱被害乾隆四年總督張廣泗題旌思南府廖天培印江廪生天性篤孝父鳯文病親嘗湯藥左右床簟不分晝夜及卒哀毁骨立又值母病甚危天培泣禱於神願以身代是夜夢神授以方次日如方治之即愈後母夀至八十四歲而終天培亦年週花甲哀毁如少時𦵏務從厚不以家貧有缺友愛幼弟飭躬端謹屢舉優行乾隆四年總督張廣泗題旌黎平府朱文縉開泰縣附生居長春堡兄弟五人文縉最幼乾隆六年粤苗石金元勾結黎屬南江寨苗作亂二月二十八日圍堡文縉母七十餘臥病在床縉負之逃至丁丁崖賊追及欲殺其母縉拜懇之賊砍其頂心倒地舎其母而去母扶縉起賊回顧知其未死也復來砍其頸深寸許未殊賊退縉逾時而甦母扶之歸敷藥四日而口合十日而愈人以為至孝所感云貴州通志卷二十九
