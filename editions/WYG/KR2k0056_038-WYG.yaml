body:
  text: 貴州通志卷三十八藝文傳漢西南夷傳班固南夷君長以十數夜郎最大其西靡莫之屬以十數滇最大此皆巴蜀西南外蠻夷也始楚威王時使將軍莊蹻將兵循江上蹻至滇以兵威定屬楚欲歸報㑹秦擊奪楚巴黔中郡道塞不通因乃以其衆王滇變服從其俗以長之秦時常頞畧通五尺道諸此國頗置吏焉秦滅及漢興皆棄此國而開蜀故徼巴蜀民或竊出商賈取其筰馬僰僮旄牛以此巴蜀殷富建元六年大行王恢擊東粤東粤殺王郢以報恢因兵威使番陽令唐䝉風曉南粤南粤食蒙蜀蒟醤䝉問所從來曰道西北牂柯江江廣數里出番禺城下䝉歸至長安問蜀賈人獨蜀出蒟醤多持竊出市夜郎夜郎者臨牂何江江廣百餘歩足以行船南粤以財物役屬夜郎西至同師然亦不能臣使也䝉乃上書説上曰南粤王黄屋左纛地東西萬餘里名為外臣實一州主今以長沙豫章往水道多絶難行竊聞夜郎所有精兵可得十萬浮船牂柯出不意此制粤一竒也誠以漢之强巴蜀之饒通夜郎道為置吏甚易上許之乃拜蒙以中郎將將千人食重萬餘人從巴筰闗入遂見夜郎侯多同厚賜諭以威徳約為置吏使其子為令夜郎旁小邑皆貪漢繒帛以為漢道險終不能有也乃且聴䝉約還報乃以為犍為郡發巴蜀卒治道自僰道指牂柯江蜀人司馬相如亦言西夷卬筰可置郡使相如以中郎將往諭皆如南夷為置一都尉十餘縣屬焉是時巴蜀四郡通西南夷道載轉相饟數嵗道不通士罷餓餧離暑濕死者甚衆西南夷又數反發兵興擊耗費無功上患之使公孫𢎞往視問焉還報言其不便及𢎞為御史大夫時方築朔方據河逐胡𢎞等因言西南夷為害可且罷専力事匈奴上許之罷西夷獨置南夷兩縣一都尉稍令犍為自保就及元狩元年博望侯張騫言使大夏時見蜀市卭竹杖問所從來曰從東南身毒國可數千里得蜀賈人市大夏在漢西南慕中國誠通蜀身毒國道便近又亡害於是天子乃命王然于柏始昌呂越人等十餘輩間出西南夷指求身毒國至滇滇王當羌乃留為求道西嵗餘皆閉昆明莫能通滇王與漢使言漢與我孰大及夜郎侯亦然各自以一州王不知漢廣大使者還因盛言滇大國足事親附天子注意焉及至南粤反上使馳義侯因犍為發南夷兵且蘭君恐逺行旁國虜其老弱乃與其衆反殺使者及犍為太守漢乃發巴蜀罪人當擊南粤者八校尉擊之㑹粤已破漢校尉不下中郎將孰昌衛廣引兵還行誅隔滇道者且蘭斬首數十萬遂平南夷為牂柯郡夜郎侯始倚南粤南粤已滅還誅反者夜郎遂入朝上以為夜郎王兵威風諭滇王朝滇王者其衆數萬人其旁東北勞深靡莫皆同姓相仗未肻聴元封二年天子發巴蜀兵擊滅勞深靡莫西南夷君長以十數獨夜郎滇受王印最寵焉夜郎傳范蔚宗夜郎者初有女子浣於遯水有三節大竹流入足間聞其中有號聲剖竹視之得一男兒歸而養之及長有才武自立為夜郎侯以竹為姓見華陽國志武帝元鼎六年平南夷為牂柯郡夜郎侯迎降天子賜其王印綬後遂殺之夷獠咸以為竹王非血氣所生甚重之求為立後牂柯太守呉霸以聞天子乃封其三子為侯死配食其父今夜郎縣有竹王三郎神是也初楚頃襄王時遣將莊豪從沅水伐夜郎軍至且蘭㭬船於岸而歩戰既滅夜郎因留王滇池以且蘭有㭬船牂柯處乃改其名為牂柯牂柯地多雨潦俗好巫鬼禁忌寡畜生又無蠶桑故其郡最貧句町縣有桄榔木可以為麫百姓資之公孫述時大姓龍𫝊尹董氏與郡功曹謝暹保境為漢乃遣使從番禺江入貢光武嘉之並加褒賞桓帝時郡人尹珍自以生於荒裔不知禮義乃從汝南許慎應奉受經書圖緯學成還鄉里教授於是南域始知學焉明尚書黄公􅌧傳李夢陽尚書黄公封丘人也名􅌧字用章其先洛人髙祖克讓始徙封丘克讓生思豫思豫生秀秀生中中生公初髙皇帝兵起思豫掌太常寺以罪編氓沅州已又軍平越衛於是平越封丘洛皆有黄氏乃後秀商金陵死中収其資商重慶娶於張生公重慶於是重慶亦有黄姓公生之夜夢老人抱嬰兒曰送蹇尚書為汝子長依舅氏張宗琦宗琦為麻城學博從如麻城歸如平越補衛學生正統丁夘以春秋中雲南鄉試第五明年登進士第除行人陞南京刑部員外郎轉郎中出為四川參政進右使轉湖廣左使陞右副都御史廵撫延綏進南京戸部尚書改左都御史尚書仍舊公亷峻直執遇事飈發正色山立即重忤時貴弗恤智巧所避公毅然肩之人率竊笑其呆然亦以是獲名為郎中時人業以硬黄目之矣部堂嘗缺官公署堂印諸寮事之即猶堂官也亦才識超之之故譚千戸者大猾也善懽權貴人嘗奪民蘆塲顯貴人無敢為民直者公直之竟歸之民為參議督松茂諸倉兼備其兵釐革宿弊擒豪惡數百人舉劾將官各當邉賴以寜參政如崇慶旋風擁輿不得行公曰汝寃氣耶姑散予圖之至州齋沐禱夢翌日清其囚無驗乃禱諸城隍夜果夢若有神言州西寺者寺去州四十里邉路而巢山公旦起率州官吏兵往詣寺圍捕之有僧少而惡詰之無牒使醋垔塗其額曬洗之則有巾痕乃鞫訊之遂盡暴其奸慝云寺後有巨塘凡投宿人則殺之投塘中衆分其財有妻女則分其妻女又攅典李節陽王親也侵盜官糧鉅萬數王為之窟公按之悉如法公雖錢榖司然善摘發奸伏以是威行境中嘗道川東青神令望風解印綬去為右使奏閉建昌銀礦許之大盜周主簿者嘯衆抄掠檄公平之公謂盜起於煩苛宜少寛養而閹宦以方貢横斂公抗不從閹擠移近省陞左使時兩京工興徴銀二萬例派民公以庫積餘充又勢豪馬快船債萬坐逼索又荆王奏徙墳塜公悉不從省費巨萬又計錮僧繼曉於是威惠大行繼曉之來也勢熖灼人公私謂諸公曰曉以妖術媚上遂奸眠食共之今避而反鄉名掃墓而實逃生耳乃令武昌府錮之後堂陽尊禮之居無幾曉果敗檻送京斬之西市公在蜀嘗忤閣臣萬安銜之三年六推咸抑公知之乃以連疏乞罷凡三上已乃有廵撫延綏之命首劾叅將郭鏞都指揮鄭印李鐸王琮葭州史知州等又計捕豪奸張綱乃於是㧞才能察幽隠問疾苦飭廢墜申號令修器械嚴警邏節候望邉政維新公見飲馬婦片布遮其下體乃悲以慚曰嗟乎士之貧至此極乃驅之戰守邪於是令豫支米三月㑹詔毁菴寺公使汰尼解軍門給配鰥士人人大懽悦無不願為公使者及公去尼有􅂝子女拜送路傍者公既官六曹益無所顧避威稜截然特㫖改掌憲院天下方仰望風采公自以歴侍五朝中外凡五十年戅直岸異忤人獲名伏禍難測又盛滿宜戒乃引年乞骸骨居無何疾作竟不起年七十有一所為奏議及政蹟並所著文詩悉棄不留晚嗜參同契號精一道人國制文極於六曹尚書官之北斗天造不論夏蹇經綸悃愊太宗北征全國是屬三楊公亮寅協熙績臺省坐臻太平君逸臣勞所謂代天之相英廟之遇文達畧似馬周吁俞一徳宻畫顯斷萬幾積覈局體一變成化間中良外植三原河州單縣封丘巍然輩出居則岳屹動則雷擊大事斧斷小細海蓄帷幄幸佞請劍必殛使見之者畏聞之者懾斯其人死生富貴足動之哉然較之天順以前則殊矣時與位不同耶委任權力殊耶𢎞治中華容洪洞鈞陽靈寳陽曲盧氏金陵安福咸稱名卿然志存納約行在精審茍濟其事小枉安焉局體又變矣雖形迹罔暴義遵矯直亦運數然歟自言路志伸毁譽進黜氣燄滿盛公卿斂遜正徳以來遂靡靡難觀亦諸人甘寵飾譽稍有嘉美便立祠樹碑要歌徵頌鏤板䥴石惟恐不流今信後也此意既横機巧自生工言論務彌縫斯又一變然黄公為左都則嚴甄御史量能委之火其差簿於庭曰事貴得人耳資勞久近豈立官者意哉當是時言官能毁之黜否耶斯為政在人耶抑時不同耶公焚奏草自冺其嘉美視汲汲流今而信後者又何如耶江淛食鹽錢鈔民苦包攬掊勒呻吟公為尚書力條其折徵銀狀以聞至今行之便此其事比之汲汲流今信後者得與失不較然白哉公年二十六舉進士始室孫郎中鏞女也生子楫霖彬封宜人贈夫人繼室魯衛鎮撫宣姊生子杞桓封夫人葢終其身無妾婢云彬工部司務桓光禄寺署正公卒之日皇帝驚悼不已遣祭勅有司營𦵏墓在長葛縣馬陵岡侍御申公祜傳田秋先民有言父生之君治之師教之天下之三本也故惟其所在則致死焉於公盡之矣古之孝子固有冒白刄而赴親之難者若猛虎搏人志在吞噬非若盜賊之猶有人心也公以孑然童子直犯其爪牙脱父之厄至九重震怒生死叵測當時寄言責擁重任者何限且環視扼腕莫敢攖逆鱗之威公以太學生毅然申辨無少難色非卓然不易之見定於中見義必為之勇隨以發乎然公於親之難師之難已致死矣而卒不死且濟其事終之以土木禍始殉節焉或者有黙而相之歟胡為乎奮其死於初年而炳烺砰訇以重其死於晚節也或曰斯難也萬衆同冐何以異秦坑之慘雖願無死不可得也噫以公之前事觀之則仗節死義之忠固有素抱不待取決於土木矣夫豈猿鶴沙蟲同時俱化者比哉昔唐段太尉笏擊賊泚而死人且以為武人一時激發之行徳宗在奉天聞其死輟朝至七日當時宰相尚有難之者及栁宗元上其逸事而後太尉平時奉職守正樹立不凡之大節始暴白於天下異議至今斬然矧公逺方孤士冺滅無聞宜也余髫齓時先司諫朴菴君每舉公事跡以訓既又於鄉先生李立之孟震處時時聞之訪公之後則無招魂之墓片石之紀所僅存者勅命一道而已其諸恩廕恤典俱未及也今夏與郡博鍾君謁公祠因叙其所聞如此以留於後副長官李公盤死節傳敖宗慶西南夷曰鎮溪筸子坪卭僰裔也嘗弄梃耡副長李公盤從師徂征卒於師曾孫湜之奉狀屬予傳愚少時亦聞其概而竊敬慕之矣兹夷近復猖獗流毒諸郡勤兵已五年餘尚未底績乃感慨今昔按狀而傳曰公諱盤襲副長官其先京兆人宣徳間鎮筸苗叛命大將往伐之賊引匿山中持久不出人皆疑怯公毅然率孤軍深入遇賊數百公䇿馬奮擊斬首數十餘級賊四集援兵不至遂被執公素勇敢賊畏而惡之及執公賊曰汝銅仁李耶思南李耶賊舊為銅仁轄銅仁李善撫之故云從卒以銅仁紿之賊欲釋公公厲聲曰予思南李豈畏汝耶從弟百户李邦政告急於徳江副長官楊潮海潮海公姻戚比二人至公已遇害邦政以石置樹間記之久而樹合生夾石夷人夜過樹下聞空中有㸃兵聲以為神立祠樹前祠公號其地為留石坡櫬歸窆府治西北十里人同村後世子孫稱為留坡公公所披鐵甲鐵片各有銅鈴所乗馬髙五尺性嚙人人莫能近公冠帶乗之則歩驟如常度披甲據鞍銅鈴齊鳴則奮躍呌號如戰陣之狀公雖武夫樂與衣冠之徒遊御史申公祜公之甥忘年與之友每論及時事公大聲曰身蹈白刄血潤野草然後不愧舎生取義之道申公曰大丈夫當如此卒之申公亦死義於北人皆曰二公素志云贊曰士死事大夫死疆圉分也時有職事守疆圉者居則食若毛役若力囂然以為分所宜有又從而敲撲魚肉之一遇有警即惴惴首䑕唯恐其將及已甚或射利邀功僨事殃民皆不暇顧念況望其服勤以死哉噫視公當何如春秋之法大夫卒於師則卒之公可以卒書矣若子孫世有疆圉職事之責將無念爾祖耶尚書文恭孫公應鰲傳郭子章孫應鰲字山甫清平衛人生之日適衛人饋六鯉因以名就塾受業日誦數千言正襟危坐務解大義年十九以儒士應試督學徐公樾一見大竒之許必魁多士放榜果中第一人嘉靖癸丑成進士選庶吉士改戸科給事中出補江西僉事流賊起公捍禦有方一道晏然時九江三百人誤坐賊黨公一言出之遷陜西提學副使公實意作人身先為範嘗與耿楚侗公書云世道理亂闗於人才人才成就係於師道人人能言之至師道之以稱職名於時者勤力較閲品評不爽已耳獵名詞華馳譽經學已耳某意不然嘗考諸荀子曰師術有四傳習不與焉尊嚴而憚可以為師耆艾而信可以為師誦説而不陵不犯可以為師知㣲而論可以為師此荀子大醇之言似矣而未盡也孔子曰溫故知新可以為師此則萬世師道之極則也溫故知新學者多以所聞所得為解某妄意為故者當如孟子言性則故之故新者當如大傳日新盛徳之新凡天下萬物之實體燦然具陳故也其真機昭然不息新也二者雖有顯㣲其總括於人心運行於人心生生之妙一也能溫則實體之總括不晦能知則真機之運行者不滯不晦不滯則天地萬物合為一體則仁仁則成已成物位育參贊皆其能事成已成物者師道也師職也故子思作中庸亦以溫故知新承聖人發育峻極之大道此孔氏家法也故某妄以孔子溫故知新之㫖為孔子示人萬世師道之極則者此也公在秦所取士悉一時名碩遷四川右參政土夷薛兆乾執參將賀麐以叛都御史谷公中虚問計公曰參將與天子孰輕昔英宗北狩于肅愍數語國威益振卒返英廟今者豈恤一參將耶谷從公議擒兆乾麐竟免於害隆慶改元陞僉都御史廵撫鄖陽以上方冲年蒞政伊始防杜宜蚤乃因境内災疏請勤學勵政親賢逺奸等十事上嘉納之太和提督巨璫為民蠧公劾其欺悖貪謬狀上為斥逐既而疏懇乞骸歸萬厯初詔復起撫鄖陽時詔書録建文死事諸臣至革除事人皆諱言之公推衍徳意上疏曰褒揚人之子必先其父則子之心安故褒揚人之臣必先其君則臣之心安建文諸臣委質致身志節甚偉陛下深為恤録真厚幸矣但建文君未沾曠絶之典恐諸臣有知且不能安受地下亟復位號量擬諡法事有繫空名而輿論悉歸人心愈固者此類是也孔子作春秋每年必書每時必書見天道王政上下維屬不可缺也建文君在位凡四年書以革除舉其事綴附洪武間名實紊淆軌跡惑貳何以補國家信史之缺疏奏留中舉朝目為昌言甲戍入為大理卿丁丑陞戸部右侍郎改禮部掌國子監祭酒事公在監雅意持風化作人才倣吕公柟遺意疏言舉人率多囬籍自便以入監卒業為恥不知當其在籍師儒之訓弗及憲臣之令弗加閭黨矜其資望有司遇之隆重身靡所檢而易蕩及入官材質已壊莫可如何矣宜徵天下舉人悉入監祖宗設太學非舉貢非勲胄恩廕不入祭酒司業為朝廷作人於内提學為朝廷作人於外必在内樹風教而後在外振紀綱今提學所擯斥者盡歸之太學倒置若此則太學毋乃為生員不才者之逋逃藪與甚且至愚不肖資貨一入咸厠其中太學之汚衊極矣疏上悉著為令丙子八月駕幸太學公舉周書無逸章進講上嘉納命坐賜茶葢曠典云尋以病予告築學孔精舍於西城之陽起刑部右侍郎尋陞南工部尚書卒賜祭𦵏萬厯壬寅賜諡文恭所著有易談四書近語教秦緒言雍諭學孔精舍彚稿續稿春秋節要律呂分解等集傳世蠙衣生曰予督學川中川中故有大儒祠祀周元公二程子張敬夫魏了翁諸公至明止配合州鄒吏目即司馬長卿揚子雲不得與焉葢慎之矣予至始祀公及趙大洲先生予師胡廬山先生趙内江人公與先師後先宦於蜀人嘖嘖無異議云予入黔式先生之墓問其嗣斬焉弗續為請諡於朝嗚乎伯道亡兒中郎有女從古如兹寜獨先生參政李公渭傳郭子章李渭字湜之思南府人公生有異質十五病肺屏居小樓溽暑散髮箕踞父中憲公富以毋不敬飭之即奉而書諸牖目在以資檢束苐覺妄念叢起中憲又以思無邪飭之又奉而書諸牖久之而妄念漸除恍惚似有得及下樓與朋友笑談樓上光景已失於是專求本心未與人接自問曰如何是本心既與人接又自問曰本心是何如嘉靖甲午舉於鄉蕭然布素計偕以一僕自隨讀孟子伊尹耕莘章則曰堯舜君民事業自一介不取始交際豈可不謹癸卯蔣公信視學貴州公謁之因陳樓上樓下光景蔣公曰樓上是假樓下與朋友談笑却真至一介不妄取蔣公曰此猶然樓上意思在硜硜然小人哉公媿甚以為學十四五年只成得一箇硜硜小人不覺面赤背汗淋淋也由華陽知縣和州知州擢髙州府同知至則謁湛甘泉先生於嵎峒中嘗宿亷州公署夢三蛇遶身亟揮杖蛇乃走詰朝合浦吏以美珠進化州呉川吏以兼金進公皆叱之笑曰三蛇夢破矣金珠非寳固吾人蛇蝎哉擢應天治中南戸部員外郎知韶州府先是韶有二源之役萑苻之警未殄公集諸寮諭之曰夫子告康予不欲二字千古弭盜張本倘多欲則身為谿壑竭民膏脂不足以填百姓安得不盜弭山中盜易弭心中盜難敢忘自責聞者悚息入覲過麻城從楚侗先生登天臺楚侗示八語近道之資載道之器求道之志見道之眼體道之基任道之力宏道之量達道之才八者闕一不可對曰渭與八者獨媿見道眼未醒耳鍥必為聖人四字印而布之海内嘗曰孔子無意孟子不學不慮程子不著纎毫人力皆是不安排知毋意脉路即日夜千思萬索亦是毋意知毋纎毫人力脉路即人一已百人十已千如此用力實無纎毫人力學是學此不學慮是慮此不慮知得不學不慮脉路任人只管學只管慮都是不學不慮擢滇左參政近溪羅公為屯田使公至與之合併精神學益進自言予昔日工夫亦有起滅被近溪大喝通身汗浹從出這身汗自是欲罷不能所著有先行諸集藏於家大儒治規行於世李節婦石氏傳胡松節婦石氏印江處士石某之女成化己丑年六月二十四日生𢎞治庚戌歸李宣姑歐陽氏性嚴重石事之每可其意好治麻枲蠶繭性樸質貞率衣著五六載不易幃閫中華靡相尚石獨以儉約處之無恥色𢎞治乙卯年宣卒遺孤二長綻四嵗次族嵗尚未週家素貧艱窘萬狀或勸其嫁泣曰遺孤奈何且死之日何面目見君子於地下乃紡績以撫二子嘉靖乙未臺使鯉湖王公按郡旌以禮幣是年七月十五日卒葬鯉魚浩宣墓之右歸宣時二十二嵗宣卒之年二十七嵗孀居凡四十年卒之日六十七嵗栢泉子曰余他日讀春秋常事不書是矣至於紀叔姬之卒與其𦵏則亦疑若常事然先師仲尼至備書其年月若日而弗遺彼一國之君與其夫人若當時之公卿大夫是何其名寵貴盛也乃冺然或不少見於䇿書心竊怪之既思春秋之世功利熾然人心大壊至於龍蛇戰野賣國弑君弁髦名器而秉節守義乃獨見於一去國無歸之婦人仲尼安得不賢之以為天下後世勸耶乃予居今之世得傳李節婦石氏慨然長歎為一泫然焉誠不以富亦祗以異葢古今之同情如此余愧非其人不能使節婦永有聞於後世如紀叔姬也雖然庸詎知世果無其人乎感事悼時廢書於邑梅節婦熊氏傳郭子章節婦熊氏郡人梅紀妻也年少艾歸於梅秉性端肅寡言笑姑呉氏治家嚴甚氏善事之以孝聞事夫謹鄰里殊賢之未幾紀物故氏年甫二十有三即杜門屏跡持志甚堅遺二子長名月次名雪氏日居紀木主旁訓月讀書􅂰撫雪䌟纑自給每督月咿唔至午夜方就榻若月課誦稍懈即引跪木主前號泣鞭撻之已復曲諭曰吾不即偕汝父同泉壤者冀撫若輩也他日成立所以報若父者方大耳即孤幃終身寜所難乎後月學遂大成登嘉靖丙戌進士仕至川南道雪以孝聞長孫惟和登己未進士仕至廣東道御史廵按山海二孫惟用亦獲明經科三孫惟台由壬午選貢任蜀納溪縣尹五孫惟詩登癸酉賢書授任中牟縣重孫豸中戊午亞元任北直𨽻完邑宰迄今子孫繁衍昌達為習安望族焉氏於嘉靖年間奉㫖旌表一時士大夫贊頌嘖嘖大學士徐階狀元楊慎總戎張傑俱有詩歌揚顯之氏享年九十三嵗凡守節七十年而卒牟節婦邵氏傳陸懋元太宜人姓邵氏郡生邵斐長女也年十五適同郡誥贈奉直大夫牟嘉禾生子四人長應夀次應秋次應眷次應律二十七而寡哀泣殆不欲生孝事舅姑且善教育諸孤子牟氏值中衰舅姑老而諸孤稚里中巨奸及族惡少咸冀其嫁洎舅姑繼卒而為不善者倩媒踵相接也氏善慰絶之故人雖拂怒之而不忍肆其毒久且愧云時氏甫三十餘郡梅節婦薛節婦謂之曰數仞之雪累尺之冰寒可知也母戲渉不終而難進退氏且泣且笑曰若然乎吾試為之決志苦守足不下堂階後二十餘年而長子夀仕粤叔子眷仕䖍就養䖍粤教二子以静治殷殷於移孝為忠體慈為惠之語凡二子之以能膺薦擢者多得之慈訓焉迨歸鄉母儀為郡婦則名動數百里婦女皆勉於賢以冀其歡而不賢者深藏急改惟凜凜於氏知之也鄉邑屢謀舉其行氏諭諸子止之曰舉以揚幽最宜公道今恐人以吾子貴而疑為私則無以勸窮鄉匹婦矣故延至崇禎十五年壬午氏春秋八十而公論不可止呈其事於有司撫按列疏上請有五十餘年有如一日誠可與山岳比操日月同明之語勅建坊旌表坊名貞節余分廵此土悉聞素行景仰已久特節婦持身嚴肅即至戚且不得識面命下之日余同郡守捧檄往賀乃幸一見焉雖白髪皤然而升降起拜纎毫不茍余亦竦然成禮而返且聞其謂所親曰守節原不幸事而舉揚尤非老身初意也然老身至今日亦可無愧於梅薛二母矣余既景其懿行復炙其嚴範爰為傳以教吾民並誌勸勉云國朝詹廣文傳田雯公名英字秀實貴陽人幼有宿慧書不再讀過目輙成誦負氣節敦行誼究心時務以古人自期為諸生時見器於廵方使者每召見必欵語移時聴其言歎非經生流年十七舉正統戊午鄉試三上春官不第署㑹川衛訓導時有麓川之役先是麓川宣慰思任叛黔國公沐晟都督方政討之不克廷議多謂麓川逺蠻不足較王振方用事欲示威蠻方力請大發兵討之兵部尚書王􅂹迎其意遂以􅂹督蔣貴軍起東南兵十五萬窮其巢而思任不可得焚寨而還􅂹封靖逺伯師還冦復熾􅂹再往征調如前思任仍不可得加嵗禄三百石十三年思任子機卜復據孟養為患復命􅂹督宫聚張軏田禮兵十三萬征之踰孟養至孟那貴州都指揮洛宣九溪衛指揮翟亨戰死二思竟失所在公乃疏言邉務十三事又言靖逺伯王􅂹都督宫聚等奉命征思機不體上心唯縱己欲行李一二百扛役夫五六百人夾帶彩幣等物宻散都司官以邀厚利又輙故違祖訓擅用閹割之刑以進御為名實留以用及至行師全無紀律大軍一十五萬俱從一日起程蹴踐傷殘畧不憫惜其運糧又不設法每軍運米六斗搬負艱辛以致有自縊死者又指䭾糧為名派馬一千餘匹不知此何設施又臨賊境金沙江邉攻圍不克被賊殺死都指揮等官却將漁戸解作生擒遂爾班師將地方分與木邦孟甸以敗為功昔唐南詔叛侍御史李宻將兵七萬擊之兵敗楊國忠更以㨗聞范祖禹引管子之言曰君門逺於萬里言壅蔽之害也乞正􅂹之罪先遣亷幹官沿途盤校各官行李以謝天人之怒以快士卒之心疏下上以專任􅂹等征𠞰苗㓂特原之詔公往參其軍公詣闕辭公卿争識其面有欲薦為臺諫者滿考遷河西教諭疏薦可撫蜀者侍郎張固上可之未幾掛冠歸其卒也編修羅公玘表其墓曰正統己巳之先變未釁也而四方亦既騷動矣乃䟽逺小臣奮不顧身言天下事而天子又能聴不但聴之而又用之當時大臣不但不沮之而又欲薦之是可謂不諱之朝而言猶不壅於上聞也故雖遭莫大之變而卒亦莫之能災者豈無自哉由羅公之言觀之亦可以想見其時矣其時二祖之家法未逺三楊之風規見存故大小臣工得以盡言無隠不以出位自嫌上亦不以出位嫌之雖其言未盡聼身未盡用而已受知於天子見禮於大臣亦可以無憾矣葢教職入臺省自𢎞治邵清始前此固未有此例宜其欲薦而不果也公所著有止菴集孫恩登成化己未進士官大理寺副長史鄭公安民傳劉謙吉鄭長史名安民字敬修少侍父辦三殿木至都少宰李旭山公誌器之以資貢判河東長蘆鹽運使陞四川提舉崇禎二年轉蜀府右長史王官例需次五年就官兼管龍安府同知駐青川所所軍三百無衣甲器械公捐造復募壯勇教習之條上守禦方畧七年秋流賊小紅郎等大合衆窺川公恐渡白水易為衝突乃親率所軍夜出朝入示之有備援兵至賊已宵遁疾追敗其衆總兵羅尚文疏功陞賞有差丁父憂服闋蜀王疏請仍留府中長史左移食正四品服俸十一年賊由川北犯省公守城西角樓無患十三年賊復入川北由兩資横抄仁夀等處直薄成都公守南門退賊十五年設川東川北廵撫辦冦川自兩被賊擾而元氣已耗矣公感王寵遇益隆每燕見輙進規諄切言必布徳施惠抑强宗循祖制尊欽差重臣和協有司以重屛翰王雖嘉與其言不能用啟三上唯唯而已十六年九月朔府官晏罷隨王入至宫門伏地號泣直陳時勢危廹補牘以進王亦感泣謝之十七年三月賊䧟帝京報聞王與直指者論勿協時張獻忠破荆襄駸駸入川東矣拔夔門攻重慶東撫陳公士竒死之公知蜀不可保遣僕間道歸黔判書尾曰此身將以許國勿為念八月賊自涪渝而上無有以一矢加遺撫鎮議守城公守月城樓賊不能下乃踏奏凱營至初九日黎明轟北角城崩數丈遂䧟公疾馳王所及府門宫閹皆狂走曰王赴水王赴水公入見狀於是伏橋上泣三叩頭躍起大呼曰今日肻令我王獨死此所乎躍入橋下抱王屍死北撫龍公文光亦赴錦水死直指劉公之勃同内江王至㳅被縛樹射死皆重臣且後死公一長史官王府死於王府炳如也公少時父怒召至門忽郤母曰兒何不速曰吾聞命顔色不怡姑緩受撻耳河東歸時庻母何氏忤太母意父怒逐之歸何有娠公切諫不從迎返别室生弟澤民何尋卒就公妻乳哺及長登崇禎庚午鄉薦以公父所置宅讓澤民自為别業凡田貨奴婢如之任提舉時署隣水大竹遂寜三縣有亷聲於遂獲交李如石先生每見忠義相勉嘆曰今知人品不是一日做得李如石先生名實癸未進士為長洲令有惠政呉下自甲申僑寓葑門野服與農夫往還來仕顯位者造廬求一見不得既没呉人俎豆其鄉淮隂子曰余出李少司農子静師門函丈時説鄭長史事授館李公如石先生初相見不異麻衣嗟乎此宰所以重澹臺滅明也余之郡曰爾小子為之傳潘思聰傳呉中蕃思聰貴陽人維岳子也維岳舉嘉靖丁酉鄉試歴任昆陽守以清白聞思聰援例起家司武定府獄雖在下位能以仁厚存心舉厥職時武民樂應舉為仇家所訟郡守捕治獄未竟忽中仇家蜚語守恚甚欲得應舉而甘心之夜召公宻語意在明旦即不欲生應舉矣公囬署仰天太息曰上帝好生人命至重殺人媚人之事吾不能為若以獲罪視去一官敝屣耳亟呼樂氏戚屬語之曰此事羅織已成非上控無由得白樂從之翌日入見守日夜來事得當未公曰不可守盛氣相加將遷怒於公公徐曰聞彼已遣人赴愬於臺使比來追攝無生應舉奈何守悚然乃寢其事及臺使按問應舉果直而應舉生然樂非有託於公公亦非希於樂也公在官隨事體認天理皆類是然終以位卑不得行其志慨然拂衣歸公既歸樂氏感公再生徳建庵肖公像以祀厥後公長子潤民以鄉試第一人成進士讀中秘書歴官中外在滇尤久分守安普兼攝學政備兵曲靖分廵金滄以至晉陟左轄仲子濟民萬厯庚子鄉試仕至漢州守公冡孫馴登己夘賢書為蒙自令次子驤以恩選令羅次遷崇慶州守食報於滇者已四世矣及公曽長孫徳徵亦舉鄉榜兼守武定庵與像猶存樂氏子孫世奉其祠徳徵仰奉先型傳為治譜武人愛之不啻諸葛瞻而樂氏之奉祀者留其家於武郡因得免於庚申之難論曰人事莫要於為善天道莫顯於報施是二者恒相因而可必不可必與焉其可必也如桴之應鼓其不可必也則分道而背馳天道難知自古慨之此善不善所以並行於天地而致疑於造物之有無也久矣然善可為而不善必不可為自人事之當然使為善而必責報於天則不報遂可不為善乎不為善將遂可為不善乎惟不必報而為善則其善為至善善之至者天究無不報人定所以能勝天也夫善之可為孰如救人東海于公治獄多隂徳自高駟馬之門晉國王公以百口保符彦卿竟啟三槐之堂古今傳為美談著為明效然吾謂二公雖無責報之心猶未免必報之意若思聰者以獄吏而抗郡守又教之控以生全之此何嘗望其報而天卒報之既昌其後復全其家始之終之皆於武定為之者無心而報之者如有意我是以知善可為而不善必不可為也守棺孝子傳呉中蕃孝子貴陽人不知姓名天啟壬戌安賊圍省城居民争入城以避孝子居郭外獨守其母棺不去賊至城下義之不加害後餓死於柩側論曰人生難忘者父母也父母之愛其子甚於自愛其身使其子而遇水火盜賊焉不惜以其身救之至於子則不必盡然非其忍於親也以其身為父母之所愛一旦捐而殉之是與於不孝也此曲體親心之説勝也若夫守棺之孝子其心則異是孝子曰吾親之棺在是即吾親在是今賊鋒已近吾親之魄得無恐乎吾舍之而去是舍吾親也吾不忍舍吾親則終守之柩存與存柩亡與亡如是而已安知其他乃賊義之而不害賊亦自有其親耳然何以不周之而聴其斃此其所以為賊也蔡順母終未塟里中火發逼順舍順抱棺哀哭火遂越燒他舍賊曽火之不若乎意孝子必有不義賊之食而弗食故賊亦聴其死而莫之救也彼入城以避者卒不免於餓死而孝子亦餓死其餓死則同而所以餓死者則大異矣使孝子而臣必能為負幼帝之陸秀夫使孝子而友必能為甘凍死之羊角哀矣吾不知孝子之姓名也但表其為守棺之孝子以為凡為子之勸胡朝棟傳呉中蕃朝棟衛千戸性戅見義勇為雖死弗避也明崇禎癸酉水西賊安位就撫遣其目把周世儒來議世儒逆賊安邦彦之謀主也先是王中丞之敗實世儒䧟之黔之人士惡其反覆隂險言於督府朱公爕元請誅之時督府意在於撫恐敗乃事不許於是舉國大譟蠭擁軍轅無上下禮竟取周世儒而臠食之廵方蘇琰閩人也嗾朱公具疏以變聞斬朝棟等四人以殉餘俱重杖朝棟臨刑引頸就刄毫無懼色後朱公殁於任將卒之際猶或見之乃鳴金遍白於黔城謂為蘇琰所誤云論曰壬戌浹嵗之圍世儒實為戎首黔之人士父兄被其困斃塋墓任其掘發仇在不共義不反兵況又䧟覆王師隻輪不返滔天之惡法所不容乃敢自來請撫其胸中目中豈復知有三尺哉若非朝棟等憤然一擊撫事終未可成即暫成不久亦敗何則我之虚實為彼所窺也光武遣冦恂擊髙峻峻遣軍師皇甫文出謁辭禮不屈恂怒將誅文諸將諫之恂不應斬之遣其副吿峻曰軍師無禮已戮之欲降急降不欲降固守峻惶懼即日開門降諸將問曰殺其使而降其城何也恂曰皇甫文峻之心腹其所取計者也今日辭意不屈必無降心全之則文得其計殺之則峻䘮其膽是以降耳由是觀之則謂朝棟等有功於督府可也胡為抗疏而誅之快賊子之心宜黔人有殺良媚賊之恨至死而不心服上請於帝卒為厲鬼以相報也鳴金之悔遲矣哉嗚呼緹騎捕而五人之墓以傳賊目擊而四人之身為戮明季之罰如是尚可謂之無寃濫乎朱太常死難傳黄秀明崇禎五年二月山東兵譁饑氓萬人應之復與登州叛兵合登城遂䧟勢甚張乗勝犯萊郡城中士民驚懼欲奔竄知府朱萬年平日有惠政得民心撫慰之憑城固守一切干櫓矢石火礟咸開庫以授而軍食未嘗乏絶日夜親歴行間凡被傷者涕出傳藥拊之與民死守故其城卒獲全廵撫聞之調蜀將彭某領兵二百為援皆歩卒不足禦突騎然彭有幹畧一日賊攻城東南而隂掘東北彭謂朱數窺我者其下皆地道也以石遍擊之洞洞有聲者三伏聴响漸近爰募民間釡火沸雜油脂伺之復貯石灰於上洞開揚灰眯其目隨沃熱油脂灌賊死穴中者數百地道反填矣賊舁紅衣礟碎敵樓之半城内人不為動且坎城西北隅瘞火藥為攻城計萬年與彭從内起甬道累木几床櫃填以土外張青布縵畫灰如磚形伏弩砲手其上未幾城隅崩賊蠭擁入箭砲並發死者無算賊詫為重城計無復施㑹城中食盡和麩糠以餌捍圉者既又竭至啖井泥自活人胥痿痺然賊以内禦尚堅城不能遽下又懼援兵速至首尾受敵詭詞乞降且曰得朱公要我即解甲衆皆知其詐而當事獨信為然命萬年往撫諭之萬年曰賊殘郡邑戕命吏自知罪在不赦必無降理往則㣲軀無足惜徒損國威耳然我不出如吾民何況我食禄為王臣豈敢愛死遂毅然請行果為賊所執萬年紿之曰汝徒執我奚益汝以驍騎隨我我呼守城者出從汝賊信之以騎兵擁至城下萬年大呼曰我被賊擒彼騎兵盡在此可急發砲碎之母以我為慮守城者猶不忍復頓足大呼賊怒將殺之遂裂眦大罵賊而死城上見其死乃發砲擊賊所擁騎兵死過半萊紳劉重慶為兵部侍郎請於廟堂調邉兵赴援賊聞之各鳥獸散東方遂平事聞贈太常寺少卿賜祭塟廕一子命有司建祠以祀建坊南城外大書東萊太守朱公萬年死難處萬年公諱也鶴南其字貴州黎平府人萬厯己夘科舉人明溆浦令王祚久傳夏力恕公姓王氏諱祚久字象徵貴州平越人今湖北大中丞王君士俊灼三之曽大父也明季由㧞貢士兩任縣令公恂恂淵黙以立誠為本濟物為用或以非分干則如泰山喬嶽不可動揺初知酆都縣慈祥愷悌蜀人徳之未幾移湖南之溆浦溆浦古五溪地最為僻陋公甫下車周覽四境慨然曰是豈不足以為政乎興行禮教百廢具舉暇則進諸生講論道理娓娓不倦溆人由此向學邑有坊廂四里三十六未踰年具知村落逺近户俗刁淳民以事至輙曰若自某所來耶某某今遷善改過否聞者竦然然噢咻之至既畏且愛趨令如流水南方不靖築城壘清盜源一言所及若臂指而呼吸之莫有違者懐宗時兵儲缺供有何將軍者領萬餘人駐溆境初頗斂戢久之糧乏將肆屠掠以行既有日矣公屢謁不得見吏民惴惴無人色公掀軍帳直入將軍且怒且詣曰吾籌盡無可量者汝能令吾軍為沙蟲猿鶴耶公涕泗交頥曰蕞爾凋敝邑實不忍朘其生某歴官有餘俸八百金布八百疋敢為將軍夀將軍曰若士卒何先是公巳與里民具牛羊豕酒米若干遂如數對將軍顔稍霽沉吟左右顧而銀布牛酒已錯陳帳外一軍皆喜明日整衆行邑人猶震懾悉走衙舍環伏至内外不能容將軍既獲裹糧又感公至誠凡境内所經以箭識其門令曰闌入者軍法從事於是竟不戮一人去邑中慶再生越數日父老來吿曰殺聲聞百里外矣旋解組歸以一輿從家人徒歩行溆民皆齎糧以獻却不受遂哭送掖輿至里門不絶既各祀公於家復祀於學宫公子七人孫二十一人長夢麟康熙補行辛酉舉人豐潤知縣夢旭夢堯皆官翰林其餘科第蟬聮不具載今中丞即夢麟長子也康熙辛丑與余同成進士共事詞苑二年餘守槧清寂而未嘗乏絶余偵其故乃知豐潤公有惠政豐潤人徳之時時濟其匱乏雍正九年由廣東布政司以御史中丞廵撫湖北溆人聞之咸感泣曰此我王公孫也昔我祖父實公生之宜其克昌厥後哉公嘗自言吾所行但期無愧方寸不欲世人知亦不令後人知故其他遺事多不傳余昔逰沅湘間沅湘人頗道何將軍事余得而序論之贊曰余讀宋史王祐勘天雄軍事歸手植三槐於庭謂後世必有為三公者今觀公之令溆浦也視符彦卿一家所全活孰多以公之誠心濟物惜僅被於一邑然御史中丞在粤而粤治來楚而楚治施於當世者正未有艾則食公之徳而竟公之志者其在斯人與其在斯人與豐潤令玉山王公傳呉襄公諱夢麟字玉山貴州平越人康熙壬戌舉於鄉補辛酉省試也甲申授豐潤邑宰丁亥以憂歸服闋遂絶意仕進族固大公又最長率敦睦為宗黨先嘯歌泉石杖屨所及輙竟日忘歸平時坐客纍纍顧不事家人生産雜鄉曲中未嘗以衣冠自異與人言罔渉宦途事人亦莫知其為官也如是者十餘年卒雍正元年余視學京畿豐固甸服地甲乙之餘諸生具以狀聞臚公事請祀於學余惟名宦者名多而實少出輿論十靡二三膏􅆝家欲藉為顯揚具又比附於善則歸親之義人亦樂成其美無或排而核之者則詰之曰公之子孫有不逺數千里而來襄厥事者乎僉曰無官斯土者有公之故人乎僉曰無余視其詞益壯義氣勃然為之斂容起敬民之不能忘也如是哉則又啞然曰此真名宦矣謹按狀公性耿介體貌端凝甫下車齋宿誓於神祠曰某膺天子命宰斯邑倘不潔己愛民稍存私家念骸骨不得歸故土自黔抵豐歴江亂河違者有如此水豐民聞之無不震悚既視事革除重耗雜派令民自輸胥吏無所容其奸鋤豪强懲積盜案無留牘門無私謁吏民愛之如慈父母嘗因捕蝗悉屏騎從遍歩郊野身先掩撲從者無不一當十須臾立盡其蝻子遺孽百計除之境不為災乙酉五月亢旱躬率士庻蓬跣行赤日中汗淋漓雜塵土村農揺首咋舌感繼以泣孤誠上逹甘雨立施嵗乃有秋至今凡雩禱父老咸相顧謂安得王公喫苦法耶在任三年嘗以口舌代斧鉞刋傳聖諭訓廸諄諄建義塾賑孤乏課士子尊髙年皆深切見諸行事聴斷亷明雖褫服者無怨言有奸黠子被杖將揑飛語越訴忽聳身奔入城隍廟沿途大呼神宥我神宥我我從王公斷不敢有他如中惡滅鼻自投無算市人相顧愕眙盖公下車之日誠心實政早已感格神明矣去官日三子一僕䇿蹇就道行李蕭然圖書琴鶴并且無之行至磁州檢槖中白鏹不滿四金計道逺無以供頓宿具適公長子自家鬻産來迎路旁觀者咸嘆息誦姓名去公之行詣大畧如此雍正九年秋粤藩王君士俊晉湖北中丞入覲余承乏閣門見班次間人人屬目既識面各道往事余因曰君黔南人黔南人宰豐潤者君知否君泫然曰先公也厥後日欵語乃知公大父溆浦公之徳源逺流長兼悉公家政葢豐民所未知者又聞中丞為詞臣日豐人每鳩費以代索長安米嗟乎北方土厚風淳戴徳不忘遂至此哉抑公之入人者深也中丞即前鬻産迎公者也余既叙次其事乃為之贊贊曰公在家若無官在官若無家其古素位之君子乎中丞之象賢而大之也宜哉三節婦傳錢邦芑敖氏孝亷敖應徵女也年十六適孝亷鄒先魯先魯艱於嗣任祁陽令復娶廣陵楊氏及同邑李氏為妾鄒以計典調任送家累歸里赴京補選舟次銅仁為苗所刦溺死敖氏與兩妾年皆少無子女聞訃之日即與兩妾長齋禮佛同志守節終年坐卧一室雖至親罕得見時滇黔迭經冦訌丁亥秋兵猝至剽掠敖氏聞之商兩妾誓必死即裂素帛三婦各懐其一亂兵知不易奪止掠財帛去竟無犯者然三婦益貧落僮僕逃亡畧盡則䌟纑自給傭鄰婦代薪汲戊子己丑間斗粟數千錢人相食三婦至食糠粃苦益甚而節操愈勵郡中人無敢以非禮語相及者後忽有平茶土官慕楊氏色以先魯曽逋彼債未償欲聘之楊氏號哭三晝夜勺水不入口事遂寢其後送媒者屢楊氏兩次自縊皆以救解有偽參軍以威脇至縲絏之楊氏飲藥死逾日復甦自是毁容自絶兼之敖嚴氣正性人不敢輕犯逺近髙其義遂無敢再覬覦者然楊氏日哀痛求死展轉毁瘠且病未幾遂卒敖氏李氏殯殮盡哀既塟復閉戸自守至乙未九月敖氏以病終李氏號哭過毁遂得疾卧床不起相繼而亡思唐人言之多泣下者錢邦芑曰苦節不常有乃一時得三人焉又萃於一門竒哉要之三婦處此有極難者無子一也苦貧二也遭亂離遇强暴三也嗟乎士窮乃見節義非百折以成之三婦節烈何由而著哉或曰敖生於禮義之家其貞操宜也楊氏卑㣲而志尤苦應别為傳夫二妾之烈非敖氏倡率不成述之以待後之尚論者王節婦劉氏傳陳龍巖節婦平越人姓劉年十八歸郡庠生王家柱執婦道勤織紝佐家柱讀業益進試輙前茅三入鎻闈不售齎志以没子三長祚久次祚凝次祚蕃女一皆幼而蕃尚在襁褓間劉氏年二十七晝夜哀號淚盡繼之以血勺水不入口者累日誓以死從舅姑慰之曰以身殉夫義也獨不念二三藐諸孤乎無父曰孤無母何恃必若所為是使我既䘮其子又勞於孫也何以慰若夫於地下劉乃引刀自斷其髮曰所不為王氏者有如此髮家固貧脱簪珥以供䘮塟䌟績以養舅姑遇有疾廢寢食侍湯藥搶地呼天請以身代以婦之孝舅姑用是忘其子之亡夀皆百嵗明崇禎初年有司以聞建坊旌表嗣是三子就外傅劉躬自課讀至夜分始罷㑹苗亂夜行刦及其家執女去劉直前奪歸苗素聞節婦名不敢加害未幾賊䧟平越蕃復被掠劉百計措金贖歸以是蕩析離居嵗無寜日猶力謀膏火俾三子咸得卒業次食廪餼久凝俱應明經選久令蜀楚所至有聲凝不禄有女甫半嵗其婦别醮劉育女孫以羮代乳得不死其女適郡庠生傅延年夫婦相繼死遺孤一嵗劉抱歸撫育成立傅氏一綫賴以不絶康熙癸夘蕃登賢書劉始色霽已而泣下曰汝父早夜攻苦兾一售弗得汝能成父志以慰未亡人但恨汝父不及見耳劉性素好施予鄰里貧不能存者無論親踈隨力以濟雖自衣敝食糲弗吝也年七十餘卒余初抵黔道經平越憇荒寺中有老人談及節婦事甚悉心識之嵗丙午蕃秉思州鐸與余交一日持節婦狀泣余前請為傳余披狀與前老人言不毫髮爽因思壼徳幽芳得其一節即可以傳如斷機剪髮和丸封鮓已事往往膾炙人口若王母者誠可傳矣或謂母婦道母儀均足奕世而兹獨以節婦名傳者何曰從母志也梅節婦李氏傳衛既齊余撫黔經理兵農學校之暇檄各郡邑舉忠孝節義有闗風化者分别奬勸安順守以郡志請載梅節婦李氏事既而其子建來泣求傳於余余稽其節概信而有徴也因傳之節婦姓李氏安順人性端莊嫻禮法既而適同郡己夘㧞貢梅運昌昌尹蜀江津迎李携幼子赴任值流冦冦蜀路梗不能達李至平越依舅氏繼聞夫死城守一慟幾絶時年纔二十五以建尚在襁褓為梅宗祧計乃忍死撫孤丁亥流冦竄黔李負孤偕一老婢晝伏夜行至貴陽城潰又至威清竹亭寨是時賊黨捜羅婦女遍及深林李截髪毁容懐利刃以防不測潛匿山中凡七十餘日卒能以智自全比亂定家為賊毁又比嵗不登李拮据十指間以資家食閨門之内嚴若冰霜雖蒼頭罕見其面有不諒其志者李撫建泣曰未亡人不及從夫地下以此藐孤欲延梅氏一脉耳有渝此志鬼神是殛於是愈勵貞操延師訓子凡所以保䕶而課督之者無不至建長補弟子員康熙十一年壬子李年五十三郡人士公上其事制撫凡三旌其門庚申年六十一卒壬戌補行辛酉科鄉試建登賢書贊曰先大夫視學黔中所㧞博士弟子多世徳寒畯建其一也今閲郡志傳其母之行遭亂播遷襁兒於背䟦渉萬山中晝伏避冦夜雜虎狼行抑且毁容挾刃時時與死宻邇卒能保其身與孤非苦節丹誠感鬼神而隂相之不至此也余觀古節婦之後無不昌熾建今登孝亷其顯揚正未有艾先大夫實為之發軔也余悲節婦而傳之且不禁其有餘悲矣節婦余氏傳張大受自古忠臣孝子竭力致身能使死者復生生者不愧至於婦人從一而終之死不渝柏舟之誓可謂難已下逮妾媵事其君子不幸早捐背㷀㷀自守一室同心之善三遷教子之賢男女有别母子有恩吾於朱生重智嘆息其家之正其母余氏之苦節有過於尋常者矣予承命選各學諸生入貢太學於貴定得重智既謁見則涕泣云重智父復昌任普安州學正以殁嫡母劉氏㷀居相依上和下敬庶母晏氏余氏嫡母生重仁重義晏氏生重禮余氏實生重智年甫二十而寡殁之年四十有九重智生而㷀獨痛母氏之劬勞恨此身無以報答每惟國家采風旌善之典詔書諮訪不遺荒陬僻壤編戸窮人先生奉勅為使臣有聞必吿且在史館久實司記述乞一言傳吾母予聞其言而悲之一女子為人妾早寡從其嫡守義生兒教之誦讀霜雪飢寒備歴萬狀小星之安於命乃能矢死靡他彼蒼若或鑒之相其子成人冀揚其徳於不朽朝旌列女余氏為尤抑天下家人之教盡如其家一門三婦無妬忌無侈􅁋風正而化行矣又按黔志重義事庶母撫季弟節使旌其孝友重智躬行篤實善承其兄余氏之慶無窮焉並書於右貴州通志卷三十八
