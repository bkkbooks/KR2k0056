body:
  text: 貴州通志卷四十三藝文文議教説明瘞旅文王守仁維正徳四年秋月三日有吏目云自京來者不知其姓名㩦一子一僕將之任過龍塲投宿土苗家予從籬落間望見之陰雨昏黒欲就問訊北來事不果明早遣人覘之已行矣薄午有人自蜈蚣坡來云一老人死坡下傍兩人哭之哀予曰此必吏目死矣傷哉薄暮復有人來云坡下死者二人傍一人坐哭詢其狀則其子又死矣明日復有人來云見坡下積尸三焉則其僕又死矣嗚呼傷哉念其暴骨無主將二童子持畚插往瘞之二童子有難色予曰嘻吾與爾猶彼也二童子閔然涕下請往就其傍山麓為三坎埋之又以隻鷄飯三盂嗟吁涕洟而告之曰嗚呼傷哉繄何人繄何人吾龍塲驛丞餘姚王守仁也吾與爾皆中土之産吾不知爾郡邑爾烏乎來為茲山之鬼乎古者重去其鄉遊宦不踰千里吾以竄逐而來此宜也爾亦何辜乎聞爾官吏目耳俸不能五斗爾率妻子躬耕可有也胡為乎以五斗而易爾七尺之軀又不足而益以爾子與僕乎嗚呼傷哉爾誠戀茲五斗而來則宜欣然就道胡為乎吾昨望見爾容蹙然葢不勝其憂者夫衝冒霧露攀援崖壁行萬峯之頂饑渇勞頓筋骨疲憊而又瘴癘侵其外憂鬱攻其内其能以無死乎吾固知爾之必死而不謂若是其速又不謂爾子爾僕亦遽然奄忽也皆爾自取謂之何哉吾念爾三骨之無依而來瘞爾乃使吾有無窮之愴也嗚呼傷哉縱不爾瘞幽崖之狐成羣陰壑之虺如車輪亦必能葬爾於腹不致久暴露爾爾既已無知然吾何能為心乎自吾去父母鄉國而來此三年矣歴瘴毒而茍能自全以吾未嘗一日之戚戚也今悲傷若此是吾為爾者重而自為者輕也吾不宜復為爾悲矣吾為爾歌爾聽之歌曰連峯際天兮鳥飛不通遊子懐鄉兮莫知西東莫知西東兮維天則同異域殊方兮環海之中達觀隨寓兮奚必予宫魂兮魄兮無悲以恫又歌以慰之曰與爾皆鄉土之離兮蠻之人言語不相知兮性命不可期吾茍死於茲兮率爾子僕來從予兮吾與爾遨以嬉兮驂紫彪而乘文螭兮登望故鄉而嘘唏兮吾茍獲生歸兮爾子爾僕尚爾隨兮道旁之塜累累兮多中土之流離兮相與呼嘯而徘徊兮餐風飲露無爾饑兮朝友麋鹿暮猿與栖兮爾安爾居兮無為厲於茲墟兮討播誓師文李化龍葢聞春秋之義人臣無將漢法所誅大逆不道逆賊楊應龍者本以夷種世厠漢官被我冠裳守彼爵土輒敢忘天朝豢養之恩恣鬼國兇殘之性初但殃及骨肉繼乃禍遍蒸黎嬰兒孕婦既被誅戮殺將屠城以為常事虐熖燔乎五司七姓􅁋毒漸於九溪三巴天地不容神人共憤皇上痛兆人之失所杜列辟之效尤遂伐暴以安民乃興師而問罪化龍等共以職守咸在戎行義當戡亂成平勢須分猷共濟葢必三省之内文武將吏以及四海之中漢土官兵堅除兇雪恥之圖奮戮力同心之誼庶幾共奬王室乃可必得罪人茲將鞠義旅以徂征敢用對明神而作誓且惟忠可以報主惟公可以服人惟至死不貳可以徇國家之急惟精白無欺可以樹掀掲之勲凡在行間請事斯語如其無貳乃心克勤王事神亦陰為庇相俾享成功若督撫鎮道副參遊守府縣衛所大小文武等官有懐奸飾詐罔上行私乾没軍貲枉殘民命妬人則以功為罪逃刑則以罪為功或假公事以報私仇或因小嫌而妨大事或以是為非以非為是任一已之見而失三軍之心或當進不進當援不援偷一時之生而戕萬民之命或懐忠不盡退有後言或臨事避難轉生枝節或賞罰功罪之不明或南北漢土之異視或持兩端而窺利或枉三尺以狥情或造疑似影響之説以傾人或挾機械變詐之術以利己有一於此斯即為負國負國之人其名為賊神明殛之死不旋踵逮及闔門永絶其嗣夫神聰明正直不偏而平一者也有人負國而不知聰明謂何有人負國而不誅正直謂何有人負國而不知誅之不偏與平之謂何夫神䕶國佑民以食其報者也神不明則士不奮士不奮則賊不滅賊不滅則民不安民不安則凶年疫癘於神亦有不利焉敢盡布之明神惟明神其圖利之祭張監軍文李化龍嗚呼鄙諺有之人死留名誠得死所雖死亦生惟公誕河山之粹氣毓燕趙之精英負竒每悲歌慷慨臨事輒憤惋不平當其守山海備蘭州葢嘗丸泥封闗稱北門之鎖鑰亦嘗鳴劍抵掌絶大漠以横行既逆酋之發難遂杖䇿而西征扣門數語肝胆立傾語時事撫心動色恨籲九閽之無路談叛逆嚼齦立髪願捐七尺以相從遂戎服而蹈重闗之險乃匹馬而監却月之營信明天日威肅雷霆望之者鶴唳風聲而避歸之者簞食壺漿以迎既抵賊壘獨主齊盟時投袂而作三軍之氣時揮戈而蹈九地之攻義形於色即衆怒羣猜其奚恤威加於敵遂灰飛電掃以功成葢聞初五之戰公獨揺旗助喊與賊相持者終日初六之入公則勺水不下卒至勞形而敝精葢功以此立病以此成者與嗟夫公之死非一端矣當機可乘而輒失盟屢叛而無功甘養虎而遺患誰築舍而反耕縮朒者為賊所愚至不以一矢相加遺庸懦者縱恣剽掠等三尺若一髪之輕即走卒為之氣塞何況受命而監國之兵又況乎三月之間山嵐水瘴之與居困苦饑渇之相仍公之死勞耶憤耶憂耶鬱耶不然胡為乎以飄飄凌雲之氣不數月而失藏山之壑咽隣笛之聲嗟乎公則死矣赤膽忠心之士竟與山原之道殣同命世之庸庸碌碌何限往往飽富貴而享功名顧亷頗相如其人死矣千載之下猶有生氣曹余李志奄奄如泉下人何足為生憶當五月望後義師漸老余且脂車秣馬欲馳入栁營而親取衡命者之首乃以家訃而不果於行獨洒泣而草檄誓一死以激羣情即大衆不無感動公獨拊膺頓足矢諸天日而遂以一日克萬仭之城然則公之死半為國半為我也余亦何心而不掩泣返袂涕汍瀾而淚縱横臨風一奠茹哀數語葢半以紀公殉國之績而半以洩吾不平之鳴嗚呼哀哉祭房張二將文李化龍嗚呼二將軍之死也經嵗於今矣人亦有言死有重於泰山有輕於鴻毛如二將軍之死輕耶重耶夫逆賊應龍淫怒以逞荼毒生靈原野厭人之肉川谷流人之血既有年於今矣人臣無將將則必誅封疆之臣滅此朝食豈俟問哉乃數年來未有顯言誅之者何也懦者以私婪者以賄茍就一時之利而不顧國家久逺之害晚近庸臣大抵然耳葢顯言誅之自房將軍始將軍提一旅捍孤城豈足以當播州之全師顧義氣所激直欲捽逆賊而平吞之恩重身輕威尊命賤所從來矣迨逆賊捲土而來相與從事於顔行將軍不阻不懾擁孤軍以抗强敵又得謀勇俱足如張將軍其人者左右其間一戰東溪再戰四埡奮臂一呼萬夫辟易斬將搴旗潰圍陷陣何其壯也終以力盡援絶鼔衰士散竟至以身殉城然其英風義烈猶足吐懦夫之氣激壯士之肝亦已竒矣且自二將軍死後賊負不可赦之罪人堅必誅賊之心九伐方張四征伊始此非賊能死二將軍乃二將軍能滅賊也假令守綦江者非有磊磊落落如二將軍必且與賊通必且為賊諱養其鱗甲長其羽翼突而鵲起席捲川巴李特王建前事不逺即不然殺人者可以不死無君者可以自全將使人懐問鼎之心户比齒馬之跡僭擬成風綱常掃地不及十年人其戎矣瓦解陸沉豈足為喻葢二將軍死非獨以存蜀是天下理亂得失之闗也即謂之重於泰山是耶非耶嗟乎人誰無死以法死以賄死以寒病不得汗五日死以飲酒御婦人死等死耳要以生無榮名死無令聞縱使百千萬刼只如未生甚且貽之臭耳則其死輕也二將軍死既聞天子嘉其義烈贈以極品賞以延世千秋廟貌比於睢陽嗟嗟可不謂重耶龍既入渝城誓師剿逆高二將軍義乃為文以祭之二將軍有靈當且率綦城之厲鬼以殺賊始信二將軍果能滅賊死乃益重也神其饗諸議處銅苗事宜謝東山貴州之患惟苗為劇然所以處之訖無定論者遥度而易言之過也夫自古馭夷之道有三懐柔謂之撫奉命興師謂之征審其順逆而創艾之謂之撲滅然自古用兵未有大得志於蠻夷者豈中國之力不足以勝之哉勢不便也故征未可易言也夫撫之於馭夷也猶日用飲食何可緩也顧巽輭者茍以慎重為名又不免於養冦而階亂是撫亦不可獨恃也所以代征而佐撫者有撲滅之法焉此可以便宜行之者也此法行則兵不必衆糧不必多而功倍於征懲者一二安者萬億而無傷於撫是則可為也而好事者或以為無功而不前畏難者或以為無傷而不問至於冦愈熾而禍愈大於是大舉之説復興嗚呼則胡不圖之早之為愈也建思州府議郭子章思州府治建於都坪正統乙巳陷嘉靖辛亥再陷何利於都坪已遷平溪依軍而守倚江而宅何不利於平溪而論府治者便都坪不便平溪復皆狃於小利未覩要害安於平常忽於變故幸今日賊去之為安而不虞異日賊來之為禍也平溪有尺籍有武弁有堅城有大江得一太守居中調度何賊之足虞或曰平溪屬楚思州屬黔臂指不相使也今則一家矣或曰民屬府軍屬衛思民在都坪也彼貴陽平越新創亦何民之有今則加以軍民矣或曰迎送有犇走之苦過客有供應之費不若都坪逸也彼貴陽鎮逺平越三郡又將何避焉而以小費妨大計非矣膚見如斯願與豪傑共商之乃敢以聞之朝國朝弭灾議田雯貴陽百戰之後廬室蕩冺民乃編竹覆茅以居勾連鱗次竈廪無異位故多火一不戒輒延焚數十百家不可撲滅至冬為甚當其將火也城南河水先鳴鳴三日必火其應也若符契戊辰冬十一月庚寅水大鳴牛吼鼔擊聲聞數十里詢之父老咸云火徴因致齋三日㩦薌酌以祀南明之水而告於祝融之神並禱於南將軍之廟然後設禦火之備而大為之防久之水不鳴火亦不應民賴以安因思春秋時宋衛陳鄭之火梓慎先言之裨竈請用瓘斚玉瓚禳火子産不與亦不復火夫火心星融風木也木火母鄭祝融之墟又火房也梓慎之占可謂信而有徴矣子産向不肯用禆竈之言而今乃以水鳴騐之豈有合乎且水以尅火水鳴宜無火何以反謂之火不亦誕妄之甚歟葢黔地水淺而溪石冬則必竭竭則水與石激而必鳴非以召火也然水竭則少雨而多風風起則火易作此物理之常而不可以喻民也則亦因其俗而劑之又非獨因其俗也周禮鼔人救日月則詔王鼔大僕救日月則贊王鼔春秋莊公二十五年夏六月朔日有食之則用幣於社伐鼔於朝所以云救也左傳於魯鄭之國言救火甚詳予之治黔也大率倣其意而行之曰禳魯之徙竈告廟鄭之大為社祈於四鄘卜筮走望不愛牲玉是也曰鈎梯水器以二十人為率分道用五百人違命者罰魯之言無備猶拾瀋不用命有常刑是也曰濡物魯之濟濡為幕鬱攸從之䝉茸公屋是也曰斷牆伐屋魯之去表之槁道還公宫鄭之司馬司冦列居火道行火所焮是也曰倉庫獄囚魯之府庫慎守官人肅給鄭之府人庫人各儆其事是也曰稽奸驅骫鄭之使司冦出新客縣士各保其徴是也曰賑恤營室鄭之書焚室而寛其徴與之材是也曰城池戎伍鄭之城下之人伍列登城授兵登陴是也予倣其意而行之不敢有所置而不講闕而多疎也然魯鄭之救火一耳而伍列登城授兵登陴之説則畧於魯而獨詳於鄭吾知之矣鄭小國也間於晉楚脱一旦乘會變作不有武備如鄭之疆宇士女何東里大夫之心良亦苦矣黔城孤處萬山苗蠻雜揉哀鴻初集奸宄伺窺今之因火用兵葢以僑之治鄭者治黔故曰倣其意而行之所以云救也祀典議衛既齊古者因事之祭小祝掌小祭祀將事候禳禱祠之祝號以祈福祥順豐年逆時雨寜風旱弭烖兵逺辠疾候之言候也候嘉慶也禳者卻凶咎也求福謂之禱報賽謂之祠皆有祝號祈福祥順豐年逆時雨三者皆候也寜風旱弭烖兵逺辠疾三者皆禳也今嵗秋冬之交宜寒而猶燠熱時令不正瘟疫流行省會兵民兩罹回禄十月朔日尚有奔雷懼政刑之失節有干天和水火疫癘之不時神滋恫民滋沴也事神治民地方有司之責矧為大吏表率茲土心惴惴何敢康寜為民請命禬禜之典皆宜脩舉其在小祝將事著有候禳禱祠之祝號曷弗法而行之考祭法相近於坎壇祭寒暑也相近一曰相迎也一曰即禳祈也寒暑不時則或禳之或祈之寒於坎暑於壇周禮以槱燎祭司中司命飌師雨師槱積也詩曰芃芃棫樸薪之槱之積柴實牲體焉燔燎而升烟所以報陽也今郡縣有風雲雷雨壇則寒暑風雨之祭可舉也周禮以貍沉祭山林川澤祭山林曰貍祭川澤曰沉以疈辜祭四方疈披牲胸謂磔禳也又命主祠祭禽於四方謂以所獲禽祀四方之神即司馬職所云羅弊獻禽也此皆方社之祭今郡縣有山川社稷壇皆可祭也又禮記蜡也者索也嵗十二月合聚萬物而索饗之也嵗十二月建亥之月周正也月令孟冬祀公社門閭臘先祖五祀養老勞農等事皆於蜡祭時合而舉之八蜡者一先嗇謂神農也二司嗇謂后稷也三農謂田畯也四郵表畷郵表郵舍所表田畔也畷井田間道也謂田畯所以督約百姓於井間之處也五貓虎迎貓為其食田鼠也迎虎謂其食田豕也六防謂昔為堤防使吾禦水患者也七水庸謂昔為畎澮溝洫使吾為旱備者也八昆蟲謂暑生寒死螟螽之屬曰土反其宅水歸其壑昆蟲毋作草木歸其澤古者年穀順成八蜡乃通故豐年豳頌為孟冬八蜡之詩今嵗秋頗收稔則蜡禮宜復也今擬於東門外風雲雷雨壇祭寒暑風雨之神詩歌信南山之二章曰上天同雲雨雪雰雰益之以霢霂既優既渥既霑既足生我百穀於西門外山川社稷壇祭方社八蜡之神詩歌甫田之二章曰以我齊明與我犧羊以社以方我田既臧農夫之慶琴瑟擊鼓以御田祖以祈甘雨以介我稷黍以穀我士女於火神廟祭詩歌大田之二章於城隍廟祭詩歌豐年載芟良耜之三章五王位次議鄂爾泰為以五王位次頒示各學事照得本部院前在江南據宜興縣學詳稱轉奉憲牌即將啟聖祠改造謹繹部文内開添設神牌按昭穆位次或係正位南向餘依世代東西分别或以五代並皆南向止照左右次序分别昭穆原未經示明相應詳請批示遵行本司看得奉上諭將肇聖王裕聖王詒聖王昌聖王啟聖王加封王爵改造聖祠添設神牌此誠千古未有之盛典萬世不朽之鴻猷也但昭穆位次若非依據經文詳請定式則即一省之内各府州縣互有異同非以尊崇聖教仰答帝心也今博採經傳準古酌今欲令各學規模歸於畫一未敢擅專謹依稿詳議呈列於左謹按典禮該學所稱肇聖王以下昭穆位次所謂正位南向餘依世代東西分别者非也所謂並皆南向照左右次序分别昭穆者亦非也嘗考諸經義周禮春官小宗伯辨廟祧之昭穆而昭穆之名始見於此禮記王制天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五而昭穆之位次未有聞焉祭統曰夫祭有昭穆昭穆者所以别父子逺近長幼親疎之序而無亂也此雖主生者之昭穆而言而亦可知昭穆之義大抵取於有别有序而無亂者也至於昭穆位次於經義皆無所據後世儒者議論紛紜鮮所適從古今禮制既殊其廟貌規模廣狹豐儉之度亦難以古制相繩惟博採朱子之論明乎禮意之所在以為之折衷可耳朱子嘗引孫毓以為外為都宫太祖在北二昭二穆以次而南考諸孫毓之説宗廟之制外為都宫内各有寢廟别有門垣太祖在北左昭右穆差次而南由此觀之則廟中之主昭穆各不相望而義取於有别今所謂並皆南向左右次序分别昭穆者是無别之甚者也故謂其說非也朱子之言曰太祖之廟始祖之君居之昭之北廟二世之君居之穆之北廟三世之君居之昭之南廟四世之君居之穆之南廟五世之君居之廟皆南向各有門堂寢室而牆字四周焉凡廟主在本堂之室中皆東向及其祫於太祖之室中則惟太祖東向自如而為最尊之位羣昭之入乎此者皆列於北牖下而南向羣穆之入乎此者皆列於南牖下而北向南向者取其向明故謂之昭北向者取其深逺故謂之穆葢羣廟之列則左為昭而右為穆祫祭之位則北為昭而南為穆五廟同為都宫則昭常在左穆常在右而外有以不失其序一世自為一廟則昭不見穆穆不見昭而内有以各全其尊由此觀之古者廟皆南向廟主皆東向羣廟之制雖左昭右穆皆以各全其尊惟祫祭始屈於太祖之尊而就南向北向之列則各全其尊者常也屈於所尊者暫也今所謂正位南向餘依世代東西分别者是使居正位者止一肇聖自此而下啟聖亦不得以自全其尊而常就旁列故其説亦非也朱子之言又曰後世公私之廟皆為同堂異室而以西為上者何也曰由漢明帝始也降及近世諸侯無國大夫無邑則雖同堂異室之制猶不能備南渡之後無復舊章雖朝廷之上禮官博士老師宿儒莫有知其原者是古制之不可復見朱子已言之矣然則如之何而可為之準古酌今依經傳義則莫若廟固南向主亦南向不可謂古是而今非也況弟子之於先師後人之於先聖既南向則主祭者以下皆得北面是南向之禮固一定而不可易者也而欲各立一廟以成尊勢有不能同居一室而無别禮又不可今惟就廟之中隨其地之廣狹分為五室所謂五室者非能準諸古制不過如今之所謂龕是也以肇聖仿始祖之禮居於正北裕聖居左詒聖居右稍次而南更約前尺許而肇聖之室視裕聖詒聖約深尺許裕聖詒聖視昌聖啟聖復約深尺許從外觀之則五室並齊從内觀之則位之淺深各殊系之尊卑自别則五聖之靈其亦可安矣乎要而言之則同在一廟即外為都宫之禮也肇聖居北即太祖居北之禮也四聖以次而南即二昭二穆以次而南之禮也左昭右穆即不失其序之禮也各為一室即各成其尊之禮也子游不云其庶幾亡於禮者之禮也其動也中予不敢自謂其說之果中亦庶幾亡於禮者之禮也夫若此者變而不失其為常也權而不害其為經也變而可常權而可經則於禮也其庻幾乎此議業經江寜撫都院行之七屬復經兩江督部院頒示兩江在案今本部院蒞任滇黔所有五王位次擬合頒行明示龍塲諸生教條王守仁諸生相從於此甚盛恐無能為助也以四事相規聊以答諸生之意一曰立志二曰勤學三曰改過四曰責善其慎聽毋忽志不立天下無可成之事雖百工技藝未有不本於志者今學者曠廢隳惰玩嵗愒時而百無所成皆由於志之未立耳故立志而聖則聖矣立志而賢則賢矣志不立如無舵之舟無銜之馬漂蕩奔逸終亦何所底乎昔人有言使為善而父母怒之兄弟怨之宗族鄉黨賤惡之如此而不為善可也為善則父母愛之兄弟悦之宗族鄉黨敬信之何苦而不為善為君子使為惡而父母愛之兄弟悦之宗族鄉黨敬信之如此而為惡可也為惡則父母怒之兄弟怨之宗族鄉黨賤惡之何苦而必為惡為小人諸生念此亦可以知所立志矣已立志為君子自當從事於學凡學之不勤必其志之尚未篤也從吾遊者不以聰慧警㨗為髙而以勤謹謙抑為上諸生試觀儕輩之中茍有虚而為盈無而為有諱已之不能忌人之有善自矜自是大言欺人者使其人資禀雖甚超邁儕輩之中有弗疾惡之者乎有弗鄙賤之者乎彼固將以欺人人果遂為所欺有弗竊笑之者乎茍有謙黙自持無能自處篤志力行勤學好問稱人之善而咎已之失從人之長而明已之短忠信樂易表裏一致者使其資稟雖甚魯鈍儕輩之中有弗稱慕之者乎彼固以無能自處而不求上人人果遂以彼為無能有弗敬尚之者乎諸生觀此亦可以知所從事於學矣夫過者自大賢所不免然不害其卒為大賢者為其能改也故不貴於無過而貴於能改過諸生自思平日亦有缺於亷恥忠信之行者乎亦有薄於孝友之道陷於狡詐刻薄之習者乎諸生殆不至於此不幸或有之皆其不知而誤蹈素無師友之講習規飭也諸生試内省萬一有近於是者固亦不可以不痛自悔咎然亦不當以此自歉遂餒於改過從善之心但能一旦脱然洗滌舊染雖昔冦盗今日不害為君子矣若曰吾昔已如此今雖改過而從善將人不信我且無贖於前過反懐羞澁疑沮而甘心於汙濁終焉則吾亦絶爾矣責善朋友之道然須忠告而善道之悉其忠愛致其婉曲使彼聞之而可從繹之而可改有所感而無所怒乃為善耳若先暴白其過惡痛毁極詆使無所容彼將發其愧恥憤恨之心雖欲降以相從而勢有所不能是激之而使為惡矣故凡訐人之短攻發人之陰私以沽直者皆不可以言責善雖然我以是而施於人不可也人以是而加諸我凡攻我之失者皆我師也安可以不樂受而心感之乎某於道未有所得其學鹵莽耳謬為諸生相從於此每終夜以思惡且未免況於過乎人謂事師無犯無隠而遂謂師無可諌非也諫師之道直不至於犯而婉不至於隠耳使吾而是也因得以名其是吾而非也因是以去其非葢斆學相長也諸生責善當自吾始國朝丁祭教鄂爾泰竊惟至聖先師萬世之師表也冠帶集圜橋天子有臨雍之典春秋届仲月上丁修釋菜之儀内則命夫胄子三公外則寄於有司羣牧典綦嚴也誰敢懈焉本部院前蒞南藩職司秉鬯恭逢丁祭親齋沐而宿黌宫先令儒官較簿書而正祭器乃知牲或已經宰殺既失告全致潔之心物豈盡屬肥鮮更乖博碩蕃滋之義且或常供不充夫額數任先後以那移珍品不給於豆籩致菹鹽之雙疊兼聞各學亦有同風罔知其竭精誠但解奉行故事甚或尊罍未備疇詳犧象之形琴瑟雖陳莫辯敔箎之狀觀者如牆如堵任彼咆哮祭者似醉似癡頽如聾瞽一尊纔薦滿庭之燎火無光三獻未終兩廡之燈輝已滅於是豋鉶與簠簋悉凴顛倒几筵鹿兔與榛菱似遇摩空鸇雀分甘奪膬半由承祭之家人拍地喧天遑問糾儀之齋長駿奔髦士霎時怒髪衝冠輿隸膳夫一片雄心染指凡此之類罪豈勝誅皆由約束不嚴亦以躬行未善不思主爵則身膺一命幸得窺聖人門牆分獻則職任半氊原以司泮宫俎豆平時未知化導已蒙尸位之譏臨事不克恪恭難免曠官之咎於是飭郡守州牧縣令等職兼以誡教授學正訓導諸員各矢乃心以襄大典預期三日牲牷皆供乎餼牽先事一朝品物盡陳於頖璧齋戒沐浴來觀習樂試歌舞於明倫堂前料量潔清退服寢衣斂精神於尊經閣畔庶幾必誠必信斯夙夜之惟寅無怠無愆知神人之感格是并申之條約用以頒諸學宫業經江南各學遵照奉行在案今本部院蒞任滇黔合行通飭為此仰各府州縣等官并教授學正訓導諸員務須恪遵奉行今將條約開列於左一既奉肇聖五王不惟簠簋豆籩照數増設即牲牷亦應各增其四有議共牲者其說不可從考之典禮惟配享有可以共牲者專主無共牲之禮書云文王騂牛一武王騂牛一其明徴也自三代至漢唐皆不聞共牲之説惟後漢有青帝赤帝共一犢白帝黒帝共一犢者議者非之唐開元時五品以上室異牲六品以下共牲豈有王爵而可共牲者乎其各照數増一為五可也一祭牲祭品皆有定額一豆一籩罔可缺遺況牲取親割以告䖍也取其毛血以告全也可既宰而入學門乎豕曰剛鬛注謂其豕肥則鬛剛羊曰柔毛註謂其羊肥則毛細而柔弱此博碩肥腯之所由稱也可以痩瘠不堪之豖羊而飲之灌之以充牲牷乎既宰且不可瘦瘠且不可況可缺其額數而肥吏胥之囊槖乎月令曰犧牲勿用牝又曰命宰祝循行犧牲視全具按芻豢瞻肥瘠察物色必比類量大小視長短皆中度五者備當上帝其饗註曰上帝且歆享之況羣神乎嗣後各官俱須先三日親至學視牲牷如法然後稽其數使人牧之以待先一夕親割雖奸其何所施乎一丁祭先數日集樂舞生演習精熟先一日與祭官親同往觀不得草率從事一丁祭先一夕凡與祭官齊集學宫齋宿不得有一員私宿本署一丁祭之日庭燎燈燭務須光明如晝以俟祭畢後已除神前燈燭外即官員不得各自張燈一丁祭之日櫺星門内不得容一閒雜人所有事宜止許學書幹辦及小心謹慎門斗二人或四人照管燈燭其官員僕從人等一概於門外伺候萬勿使僕從持燈夾墊相隨上殿及上兩廡之禮君師一體毋得自取罪戾以遺失禮之愆一丁祭之日既不許容一閒雜人自無有搶奪祭燭及祭品之事倘或仍有潛匿門内乘空搶奪者以盜賊論即時擒獲解報以憑盡法重究一學宫之地聖賢靈爽所依不惟丁祭宜修治肅清即平日尤宜掃灑潔凈近每見黌宫以内栽𤓰種菜學圃成澆灌之塲曝被晒衣諸生絶往來之路甚至丹楹刻桷徒供蝙蝠棲遲鳥革翬飛盡是鼪鼯巢穴蛛塵百斛廟貌埋埃垢之中鼺糞千箕腥穢聞宫牆之外皆已安之若素久且習為固然甚至先儒先賢兩廡之神牌倒置鄉賢名宦兩祠之神位傾頽非其子孫有誰咨問加之朽蠧若罔聞知凡爾學官所司何職即諸門斗多亦奚為嗣後教官不時巡察務令門斗分班輪值逐月掃除學宫之内不得容一毫塵埃庶亦無忝厥司之一端也共襄鉅典各慎毋忽積穀説田雯余於戊辰八月入黔視事值嵗豐穀賤凡一金可糴六斛於是謀共事黔省者相率出俸錢以易之得穀三千石有竒司會司書記之倉人廩人掌之葢將以防天時之不常而濟地利人和之不及也時有謂余之迂者余曰不然周禮大司徒荒政十二其言救荒最詳而遺人掌邦之委積以恤民之艱阨廩人掌九穀之數以治年之凶豐此積穀所自來也耿夀昌立常平倉朱子有社倉法制非不善而汲黯之矯制繼之復何人乎矧黔之無粟可發也富弼之青州勸民出粟益以官廩倣而行之又涉於多事矣矧黔之民稀而久貧也今惟以俸錢之所入為粟米之所出不動帑不勞民何不可者李悝有平糶法以洪周給之仁耿夀昌糴穀於近郡以省漕卒之費法固善而意亦良美矣至於白居易極言和糴之弊蘇轍連疏青苗之禍此又害民之甚者今惟以市價之盈虚消長隨商賈之貿易有無不假胥吏不驚市㕓又未見其不可也然而謂余之迂者抑嘗熟思審處夫黔否耶黔多石少田山髙箐密去城郭五里之外所隸皆􅔭獚犵狫椎髻鴂舌之徒而行旅之螘穴於闤闠間者朝而之蜀之楚焉夕而之滇之粤焉非有恒産之守也非有土著之樂也非有擔石之儲而聚族之謀也脱一旦雨暘愆耕作廢金死粟生道殣相望即為之求轉移於蜀楚滇粤之間是猶止渇而掘井以七年之病而求三年之艾也烏可得哉不寜惟是明天啟壬戌間安邦彦之亂賊圍浹嵗城中無米人相食殆盡此非其明鑒與方今邊陲綏靖苗蠻向化仰賴聖天子柔逺德意以共樂昇平自可弗慮乎冦盜然堯水湯旱則未敢預計其必無也夫積穀之舉殆亦因地制宜司封疆者黽勉其所有事焉耳然往往必摭古證今以伸其説而終不離於老生之常談余則誠迂矣鹽價說田雯河東昆吾波斯􅄢賔于闐骨咄莫不有鹽而黔獨無仰給於蜀微蜀則黔不知味矣蜀之鹽不一産要皆出於井順慶之井久堙塗之井有禁所轉致者惟戎州耳又不可以舟車通肩瘡蹄血而後至其來也不易則直不得不昻直昻而民之艱食者比比矣黔民洵苦矣哉三月之忘獨藜莧腸哉當其匱也代之以狗椒椒之性辛辛以代鹹祇誑夫舌耳非正味也即遇其饒亦止沾唇而量腹如水之交不在和羮也而安問其為紫為赤為耑為散與夫為苦為飴為形為巨桃也哉無他困於錐刀故也鹽之直取於穀穀日賤而鹽不肯平十鍾不能易一豆安得而不苦其乏夫鹽木枝可生陸地可生豈山國獨不生母亦牢盆之術未精管商之政未講耶不然即輸滇淮而足之奚不可然不必也緩闗市之征而覈居竒之蟊則幾矣雄黄說田雯産安籠之這興邇於粤採之法易於砂塊者為上末次之皎者為上黯次之巵榼仙佛皆可鑿塊不恒得則聚瑣屑而嫓之嫓之之用為茅膠茅膠者薯蕷之别種不可食者也其汁若髹漆可以合離而萃渙黄有雌有雄雄則皎雌則黯矣古人㸃讀之誤抹以雌黄人之譸張為幻者率類是故曰雌黄其口而春申君以之塗堂故曰黄堂蒲觴藥物取諸是辟惡而除毒也虺螫見之則骨靡黄之精為至寳其光可奪日佩之宜男賈是用售連城不足多也烏䝉馬説田雯馬之良者為冀北而渥洼之種則友龍大宛之來則汗血渥注大宛皆西域也水西烏䝉近於西故多良馬上者可數百金中亦半之其鬻於外者凡馬也而其上者蠻人愛之不肯鬻亦不頻騎惟作戛祀鬼也臨陣乃用之蠻死則以殉水西之馬狀甚美前視鷄鳴後瞷犬蹲膈濶膞厚腰平背圓秣之以苦荍焉啖之以薑鹽焉遇暑暍又飲之以虀漿焉體卑而力勁質小而德全登山踰嶺逐電歘雲鄙螳螂而笑蝘蜒也龍鬍鳬臆肉角蘭筋志倜儻而精權竒也有馬如此不可謂非良矣然而未若烏䝉之異也烏䝉之馬體貌不逮水西而神駿過之食篬筤之根飲甘泉之水首如碓蹄如盂齒皆黄區耳則桃記以平塗試之夷然弗屑反不善走而志在千里隠然有不受羈勒之意所以英雄之才不易測而君子之道貴養晦也為郵無正九方皋者葢亦難矣辨之則不以耳而以齒耳之桃記又如眉月然葢多贗以攫重購者孰謂烏蠻愚哉詰其故惟善於攻駒駒始生必寳嗇其母時饑渇而潔寢處曉夕與俱所以助其湩而使溢厚其子之氣而無閼也生三月差質之佳者而教之縶其母於層巖之巔餒之移晷駒故戀乳不可得倐縱之則旁皇躑躅奮迅騰踔而直上不知其為峻矣已乃縶母於千仭之下而上其駒母呼子應顧盼徘徊而不能自禁故弛之則狂犇衝逸而徑下亦不知其為險也如此者數四而未已焉則其膽練矣其才猛矣其氣肆矣其神全矣既成陶復絆其踵而曵之以齊其足所投無不如意而後馳驟之盤旋之螘封之上碞澗之間金鞭一下欲嘶不成則陟太行若培塿履羊腸若莊馗而軼倫超羣也嗚呼此烏䝉馬之所以良也天下事何一不由於學而況馬乎水銀説田雯竈有大小釡亦如之大者容砂二十升離而為十層次入之間以稃粃布陳汞灰於其上治以杓中凹闕凸覆以釡差殺之揉鹽泥而塗其脣築之乃煆之凡一晝夜汞成滴滴懸珠滉漾璀燦皆升於覆釡之腹小者以煎砂石相錯之巖子既實之掩以筠籠籠如篩塗以泥豆其孔以疏氣者四孔則周遭槽之穴其上覆以小甓亦鹽泥固之而後煆炷薌可成汞登於甓溢則注於孔之槽俟其性定挹而注諸豖脬裏而縳之乃可行逺如或傾之斂之以椒聚集如故啟釡甓者必含虀或臡汁乃可邇不則觸其氣而齒墮已成汞而升之復可為硃不忘其本物亦有然者矣又有自然之汞生砂中不待烹煉而成者尤不易得羽化之資糧也硃砂説田雯自馬蹄闗至用砂壩十里而近自用砂壩至洋水熱水五十里而遥皆砂厰也洋熱之砂為箭鏃為箇子用壩之砂為斧劈為鏡面此其凡也采砂者必驗其影見若匏壺者見若竹節者尾之掘地而下曰井平行而入曰墏直而高者曰天平墜而斜者曰牛吸水皆必支木冪版以為廂而後可障土畚鍤錘斵斧钁之用靡不備焚膏而入蛇行匍匐如追亡子控金頤而逐原鹿夜以為旦死生震壓之所不計也石則斧之過堅則煤之必達而後止有狻猊焉象王焉於菟長離焉大幸矣否則桮棬焉簍籔焉簪珥焉要亦聽之龎而重者為砂寳伏土中呴呴作伏雌聲聞者毋得驚驚則他走凡砂之走響如松風無巨無細咸以晶熒為上栁子所謂色如芙蓉是也方其負荷而出投之水淘之汰之揺以牀漂以箕既淨囊而漉之不即乾口以吹之其水或瀦之池或引之竿越崗踰嶺涓涓天上落也獲之多寡眂虖命地之啟閉眡虖時砂之楛良眡虖質不可強亦不可恒也銅仁萬山婺川板厰皆有之革器說田雯盤盂盅之屬凡數種矣壺為善挏酒乳茶注之提之等於滑稽䲭夷也若碁局則遜楸枰之逸響矣戎宜預箭皰馬韉囊之被之等於障泥玟㻁也若細合又増陸離之采色矣用水牛皮牝者首牡者亞焉濶者貴狹者賤焉者上皴者次焉以水浸之燔毛剚肉取其澤且平也以火烘之龜文縵理取其乾且厚也以木張之以齧定之以刀削之而後膏以楅髹焉膏之其功十也以沙覆之以土窨之以石礱之石出威清而後繪以文采焉繪之其色四也四色皆和漆成之首則黄葢色之正者故首也蘇長公與人論菊謂如叔向之取鬷蔑是也黄以石黄絳以灌口砂碧色合靛青石黄而一之羊肝色兼黄殊靛而三之鐻車鐵筆花鳥賦形斵輪承蜩之技也雕蟲鏤卉運斤成風崔青蚓邊鸞之手也又水西有乳漆器其制度畧同獨繪事各别不謂鬼方人有此竒巧耳先農説鄂爾泰耤田之禮宜祀先農夫先農何神也始於何時神位宜何如書壇設何所涓吉何日陳設何器祭享何品樂奏何章既躬親其事敢不先考正其說試為畧言之古聖王之制祭祀也法施於民則祀之是故厲山氏之有天下也其子曰農能植百穀周棄繼之故祀以為稷此祀稷之始也共工氏之霸九州也其子曰后土能平九州故祀以為社此祀社之始也而郊特牲稱天子大蜡八先嗇一神農也司嗇二后稷之官也農三古之田畯有功於民者也郵表畷四郵亭之舍標表田畝田畯居之以督耕者也貓虎五貓食田鼠虎食田豖皆有功於稼者也防六水庸也防隄也以蓄水亦以障水庸溝也以受水亦以洩水皆農事之備也昆蟲八螟蝗之屬害稼者也是故蜡之祭有八皆以為農而以先嗇為主葢以先農為八神之主此祀農之始也班固食貨志又從而申其說曰闢土殖穀曰農炎帝教民殖穀故號神農氏謂神其業也又厲山氏有子曰農能殖百穀後世因名耕甿曰農其言農之義甚著而先農之稱考之於經未有紀載惟劉向五經要義曰壇於田以祀先農如社衛宏漢議春始東耕於耤田引詩先農則神農也魏秦静議風伯雨師靈星先農社稷為國六神晉太始四年耕於東郊以太牢祀先農周隋及唐所稱先農皆祭神農於帝社配以后稷即貞觀初太宗親耕東郊仍耤田壇之名也垂拱中乃以耕田壇而為先農壇開元十九年祀神農之壇上以后稷配二十三年親祀神農於東郊配以勾芒遂躬耕盡隴止乾元二年詔去耒耕雕刻天子出通化門釋軷而入壇遂祭神農以后稷配冕而朱紱躬九推焉憲宗元和五年詔以來嵗正月耤田太常修撰韋公甫言耤田禮廢久矣有司無可考乃據禮經參考開元乾元故事為先農壇於耤田此先農壇之所由來也漢文帝紀二年春正月丁亥開耤田唐禮樂志春孟吉亥享先農此春月亥日祀先農之所由來也臣於是本之經佐之史核之國朝會典而為之參酌其制即如今之於神位也則書曰先農之神葢以神農后稷皆各有所專祀而於此則統而書之也然以頒示天下使農夫皆能曉其義則必實指其名而數之曰某某教農之君某某勸農之官也使農夫皆得津津口頰轉相稱誦愛慕嚮往而後其用力益勤則是先農之位宜主神農而配以后稷神農居中后稷居右皆南嚮田畯以下依八蜡之祀皆東西嚮比於兩廡之祀而位次正矣諸侯親耕於東郊則督撫以下之耤田皆宜在東郊先農壇在耤田之北壇門南嚮中為先農壇壇高而方四面有階祭日奉神位以祀壇之後為神庫如祭宗廟寢室之制以安神位壇之前旁為瘞池以瘞毛血神庫之左為神倉儲耤田之穀以供粢盛酒醴神庫之右為宰牲亭以供親割壇門外為觀耕臺下為耤田壇之旁别置齋室未祭而齋既祭而燕皆於其地而壇基立矣古之躬耕在孟春元辰後之躬耕在孟春吉亥宗乎古則宜用元辰法乎近則宜用吉亥而涓吉定矣其在祭器則三爵一尊酒盞三十登一鉶二簠二簋二籩十豆十筐一俎一毛血盤一爐一燭臺二香案一祝板一而祭器備矣其在祭品天子則用太牢督撫以下則用少牢餘無可減爵實以酒醴登實以太羮鉶實以和羮簠實以黍稷簋實以稻粱籩實以棗栗榛菱芡鹿脯白餅黒餅形鹽藁魚豆實以菁菹芹菹筍菹韭菹鹿醢兔醢魚醢醓醢脾析豚拍筐實以青色量帛俎實以羊一豕一而品物齊矣若夫樂奏七章則以丁祭樂舞為之舞佾如其數迎神奏永豐之章奠帛初獻奏時豐之章亞獻奏咸豐之章終獻奏大豐之章徹饌奏屢豐之章送神奏報豐之章望瘞奏慶豐之章七闋既終而樂奏成矣未祭之先自齋宿以至省牲省牷演禮演樂祭之日自迎神以至於初獻終獻送神望瘞悉如文廟之儀而大禮舉矣位次正而心不疑壇基立而地不遷涓吉定而時不忒祭品備而知其不可假易品物齊而知其不貴殊珍樂奏成而無有不和大禮舉而孰敢不敬而先農說於是乎畢耤田說鄂爾泰禮之有耤田也明仁也教孝也以天子之尊而必親耕則天下之為農者孰不勤於耕此天子之仁愛天下而使之務本也所以明仁也以天子之尊而必親耕以供粢盛則天下之為子者孰不勤於養此天子之孝先天下而使之養親也所以教孝也月令有之曰孟春之月天子乃以元日祈穀於上帝乃擇元辰天子親載耒耜措之於參保介之御間帥三公九卿諸侯大夫躬耕帝耤天子三推三公五推卿諸侯九推反執爵於太寢三公九卿諸侯大夫皆御命曰勞酒謹按元日上辛也元辰郊後吉日也日以干言辰以支言互文也則是耕耤之典當行於祈穀之後而同在孟春之月也考之周禮天官甸師掌帥其屬而耕耨王耤以時入以供粢盛此即天子之耤田而甸師掌之者也然耤田不獨天子有之諸侯亦然祭義曰天子為耤千畝冕而朱紘躬秉耒諸侯為耤百畝冕而青紘躬秉耒以事天地山川先古以為醴酪粢盛於是乎取之敬之至也是以千畝百畝之數此天子諸侯之視為等級而其躬耕以致敬則一也祭統曰天子親耕於南郊以供粢盛王后蠶於北郊以供純服諸侯耕於東郊亦以供粢盛夫人蠶於北郊以供冕服天子諸侯非莫耕也王后夫人非莫蠶也身致其誠信誠信之謂盡盡之謂敬敬盡然後可以事神明此祭之道也是故南郊東郊之殊此天子諸侯之視為分别而其親耕以致誠信則一也後世躬耕不行耤田漸廢周宣王不耤千畝虢文公曰不可夫民之大事在農上帝之粢盛於是乎出民之蕃庶於是乎生事之供給於是乎在和恊輯睦於是乎興財用繁殖於是乎始敦龎淳固於是乎成觀於此語而知耤田之義廣矣大矣漢文帝二年詔曰夫農天下之本也其開耤田朕親率耕以給宗廟粢盛夫文帝漢之賢君也此禮既舉後之明主亦猶能踵而行之然唯天子行之畿内天子而外無復有議及者幾比於繁纓大輅之不可請近代郡縣大者不惟比於古公侯之國而小者亦逺勝於子男之邦則耤田之禮皆所當行乃不惟郡縣不惟督撫即天子亦不能嵗舉此禮即使嵗舉此禮京畿而外公侯大夫鮮有能講明其義者今聖天子特舉躬耕以為天下先自督撫以及郡縣州衞所等官凡任守土之司通行耕耤之禮此誠千古未有之曠典也臣身為總制兩省封疆一身表率況滇黔在萬里之逺僻處蠻荒一旦躬逢盛舉不獨山農野叟實所未聞即縉紳士夫亦無從考覈臣不揣膚陋用表彰其義著為耤田先農二說宣示僚屬遍告農夫使知我聖天子本此仁孝之至推廣誠敬之思而其所以為臣民祈天永命以同享夫萬邦屢豐之慶者其用意誠深且逺可不共殫其仁孝誠敬之心以承聖眷而荅天休哉至於耕耤儀注已詳於會典位有尊卑禮無二致可彷其意而行之無所容其末議也臣謹稽首而為之説貴州通志卷四十三
