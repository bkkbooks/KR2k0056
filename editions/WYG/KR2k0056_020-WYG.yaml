body:
  text: 貴州通志卷二十秩官名宦分部貴陽府元張懷徳東安人大徳間為知州值土官宋隆濟及蛇節反攻貴州時承平久兵備廢弛衆心􅍅􅍅懷徳募義勇合官軍殊死戰衆寡不敵被執賊欲降之懷徳大罵不屈而死郡人表其戰地曰崇節宋阿重景陽之後為貴筑長官以叔宋隆濟結諸夷為亂棄家朝京師陳其事宜大徳中為順元同知宣慰使後加平章政事柱國順元侯克服叛逆威著南裔卒追封貴國公諡忠宣伊喇薩納䝉古人至大間為萬户乖西帶蠻阿滿等入寇遣薩納調思播土兵并力討捕聴其便宜行事已而宼平何成禄皇慶中為順元路儒學教授富文學飭容止訓迪誠懇郡中人才勃興又嘗遷建學舍而以故址剏書院馮士啟字夢弼許昌人為八番宣慰使令使裨贊帷幄多著艮謨後官至禮部尚書范滙至正間為順元宣慰司副使文學政事聞於當時郡中紀載多其手翰廖志賢至正間為宣慰司學教授啟迪多方遠邇嚮風一時稱其善教明宋欽阿重孫舊名蒙古岱元時以平寇保境功授昭勇將軍八番順元等處宣慰使都元帥加鎮國大將軍兼四川等處行中書省叅知政事洪武初同靄翠歸附賜名欽授懷逺將軍世襲宣慰使汪藻内江人幼稱竒童成化間豋進士為兵科給事中首劾王直王越開邊釁立西厰章上乃罷厰出藻為程番知府夷民畏服嘗拓郡城遷府治皆不煩民力定都勻兵變藻與有功焉何垕新城人正徳間知程番府弭盗安民人至今思之汪仲成績溪人嘉靖間知程番府剔姦釐弊絶苞苴修城池立保甲士民徳之龍翔霄字潛之武陵人嘉靖間知程番府以禮讓化俗歸泗城州流移之民正金石司擅殺之罪徳威茂著尤肯急人之難鎮逺守袁成龍道卒翔霄經紀其喪送選鄉思恩吏目髙守仁罷官貧甚至鬻幼女為道里費翔霄聞惻然贖以歸之其好義類此錢䇿浙江人進士萬厯間知程番府亷介明敏剖決如神事上無筐篚之儀惟幧頭便靣而已當事知其亷益重之因與時齟齬不得行其志投劾去起太常寺少卿朱茂時秀水人崇禎間知貴陽府剛明果决摘伏如神尤喜下士凡經奬㧞卒成令器楊以成字太和雲南路南人以選貢為貴陽府通判分署畢節衛論勞陞本府同知仍駐其地天啟二年水藺搆亂以成潛具蠟書告變滇撫𤼵兵來援賊圍衛城以成督滇兵與戰却之已而賊兵大集勢不敵以成知事不濟令吏懷印乗夜取徑路走貴州自以死守當賊鋒未幾城陷以成投繯不死賊殺其家口擁以成及其弟以榮入營以成乗隙又將賊中情形函竹附以榮復入滇告變行至散納溪為賊所獲事洩以成不屈遂遇害前後同死者共十五人事聞賜𦵏祭贈光祿卿廕一子錦衣世襲並勅建祠於其里春秋祭祀梁思泰籍貫未詳貴陽府同知天啟三年督餉征水西遇害事聞賜祭贈按察司僉事廕一子入監祀忠烈祠王尊賢閬中人性剛介博學能文嘉靖間貢至太學時上好方士人莫敢言尊賢撰聖學要義中和衍義上之及諌立東宫忤㫖下獄已而上閲其書竒之謂輔臣曰布衣敢言當世事忠臣也釋其獄授程畨推官有異政致仕歸一貧如洗郭鳳儀陜西人崇禎十五年任貴陽府推官分駐龍里謹嚴防禦觀農課士方正亷隅王守仁字伯安餘姚人𢎞治進士正徳元年戴銑等劾劉瑾被逮守仁時為武選司主事上疏争之瑾大怒杖闕下謫貴州龍塲驛丞至龍塲學益進葺何陋軒君子亭自為記諸生從之遊始知性命之學瑾誅後厯巡撫南贑擒宸濠封新建伯諡文成從祀廟庭李順洪武間前衛指揮有能名雅尚恬退常守安平調度有方後致政歸開軒延儒文詞煥𤼵優逰三十餘年夀八十卒余生前衛人少好文雅善騎射有勇畧累從征討自部卒至指揮洛忠貴州前衛指揮使𢎞治間征米魯之亂竭力捍禦安南諸城賴以保全朱暹前衛千户少尚儒雅正統間副使李睿以將才薦力避不就尚書王驥征思仁至金沙江暹以利渉之䇿進􅂹用其言深器之班師授武徳將軍署黄平所令肅政平兵民安堵胡朝棟貴州衛千戸性戅直見義勇為崇禎間以憤擊水西目把事被戮臨刑引頸就刅毫無懼色士民至今寃之邑人呉中蕃有𫝊載藝文志宋昻襲宣慰使好學工文守亷持儉苗有弄兵者昻必自咎於政不加誅責以故苗民輯和又多收經史以崇文教與其弟昱皆有詩名宋昱宣慰昻弟性頴敏好學能詩操行端飭著有聫芳文集王應昌嵊縣人舉人萬厯間知定畨州蒞任之初修黌宫設書院置䘏𨼆局養濟院恵政頗多陳新第長夀人崇禎十五年知定畨州禮士愛民士民戴之丁亥春孫可望寇定畨新第誓衆堅守並駐兵要害逆戰先後殺賊數百城破縊死於署内馴鹿堂同時戰歿百五十餘人知名者五十餘有王睿殉難紀尹璉五忠烈合𫝊載州志尹大任陸凉州人任定番學正同新第守城城䧟謂家人曰明倫堂西山也冠帶謝祖考徐步北拜縊死於明倫堂左柱時訓導徐鑣州吏目安紹祖廣順州吏目周齡六奉調守定畨城俱自縊死陶世顯威逺衛守備趨定番同守城統右師敗賊於土橋斬首百餘級生擒二十一人越四日又與勇士簡成書更畨迭戰殺百餘賊以賊衆師寡世顯血戰死成書歸守城以藥矢射中賊將艾能竒後藥𤼵死城破成書巷戰猶格殺數賊力盡死柏福兆臨清人舉人崇禎間知廣順州撫字有方建學宫設廩餼士民咸徳之黃嘉雋鄞縣人貢生崇禎三年知開州建城垣編里甲課士通商民甚徳之後土苖作亂䧟城罵賊觸堦死子近袞近扆殉焉吏目聶禁亦同死士民哭祭三日賈武龍里指揮練達有為兵政克舉井孚龍里衛鎮撫林寛之亂與呉得守城盡節事聞贈千戸以子襲職恤其家王信龍里衛指揮僉事隨鎮逺侯顧興祖勦平廣西栁州馬平縣賊陣亡郡人祠祀之呉得龍里千戸洪武三十年古州蠻林寛攻城燒四門得謂鎮撫井孚曰我等為國守境且父母在城不守既不忠又不孝也何用生為遂馳賊軍殺數十人中毒弩死事聞太祖曰忠孝人所難全呉得井孚臨難捐軀因忠顯孝烈丈夫也贈指揮令世襲仍恤其家黃光中江陵人舉人崇禎間知貴定縣平易近物捐俸修城不煩民力楊世桂籍貫未詳新添教授古貌古心有學有守却贄恤貧刻書造士多所成就王璧蔚州人新添衛鎮撫當開創之初修城垣設衛署建倉厰諸務畢舉史昻正統間新添指揮練達政治軍民悦服嚴勝新添指揮同知有才幹事闗民生勇於擔荷每巡營屯威令肅然陳忠新城人永樂間討交趾松潘功陞新添指揮同知素有謀畧善造鎗砲諸利器正統間苗賊攻城偕其子率衆堅守城賴以全栁國柱武進士新添指揮天啟間值安賊圍城國柱同推官李若楠率衆堅守城賴以全白尚文新添世襲千户天啟二年水西叛圍省城尚文率衆赴援遇賊於甕城橋力戰而死事聞加指揮同知立祠於橋祀之安順府晉㸑深興古郡人楚令尹子文之後受姓班氏西漢末食邑於㸑遂以為氏世為鎮蠻校尉晉武帝時深為興古郡太守永嘉中與將軍姚岳同破李雄咸和七年雄遣其弟夀及費黒攻朱提郡太守董炳寧州刺史尹奉檄建寧太守霍彪及深援之夀怒遂攻寧州破之奉彪炳皆降惟深與謝恕始終為晉九年分寧州置交州以深為交州刺史元趙將士普定總管府通判立學安邊政平訟理夷人畏服懷徳立碑祀之容苴大徳中授普定知府時蛇節宋隆濟等作亂苴率衆禦之與其妻適姑宣力戎行遂改府為路而以適姑為總管佩虎符益智普山夷長有謀畧善安輯官至懐逺大將軍曲靖宣慰使掌普安路總管府諸蠻服其威信樹徳政碑頌之金容刀沙漠人以將軍守普定明傅友徳克城容刀死之明蕭傑郡人洪武初為十二營長官子惠部落境内康乂阿窩郡人洪武初率衆歸附授土通判安輯人民一時稱能溫伯夀普定人洪武初以才幹授西堡副長官招撫夷民咸納欵誠孫森海陽人舉人天啟間知府時值安氏叛後修城建學分甲定賦一切制作皆其經畫亷介不阿為直指所誣事下督撫為之申辨乃得白詔復其官竟引歸劉肇萊陽人景泰中知安順州宅心恵愛治事端謹秩滿部民攀送盈道李騰芳知安順州愛人下士政治修舉夷民素鷔抗賦芳化之乃就約束一如編氓舊志不載籍貫職官中並遺其名又别無可考姑仍之後夏祈等倣此夏祈知安順州鯾介有守處事公平彭蠡洪武間安順州同知創制行政井井有條王斌普定衛指揮亷能公平蒞政三十餘年始終如一王銘普定指揮同知征麓川戰死賜祭進子泰官一級陳忠普定指揮驍勇過人從征麓川攻擊舊大硬寨戰歿賜祭陶英普定百户從征廣西麓川東苖草塘四十餘處累加指揮使成化間調征山都掌蠻出哨遇伏力戰死贈都指揮倪永夀桃源人舉人鎮寧州知州和易清簡教民力農巡行􅅵畆不憚勤勞黄琳鎮寕知州正已率人向化者衆蕭顯山海闗人成化間為給事中因言事忤㫖謫鎮寧州同知顯至任政尚寛平暇則與縉紳遊覽吟咏尋遷衢州府同知終副使趙貴洪武間鎮寧州佐因俗成政撫馭有方一切創建多貴之力李新茂州人安莊訓導講明理學以誨諸生捐俸賑貧自甘淡泊九年秩滿諸生留之遂附籍永寧蕭伯辰清江人洪武間任安荘衛經厯有經濟才累官兵部侍郎李斌鳯陽人安荘衛指揮僉事簡綀有方屏翰以立在任二十年上下宜之周節臨淮人安荘衛指揮僉事持重有為尤善騎射張融洪武初知永寧州創制之初殫心經晝卓有規模民皆悦服葉泰荆州人宣徳間知永寧州蒞政愷悌苗民咸化陳佐江西人宣徳間知永寧州沉静端謹長於撫字段絲錦嘉靖間知永寧州亷幹有為民咸信服吳敦本浮梁人隆慶間知永寧州心存愛民毎有善政楊東明平壩千户萬厯丁未仲賊刼掠沙作站東明挺身禦敵賊暗伏壕外東明乗勝擊之戰死於壕張琳四川人正統間任威清衞訓導誨廸有方士沐其教車輔平壩人新興站百户𢎞治十一年征米賊之亂輔率兵死拒後賊萬餘逼輔歸順輔手刃七賊被箭而死是日天晦提學毛科為之立𫝊羅鼎益陽人𢎞治間以貴州宣慰司訓導署威清學正捐俸修學勤於啟迪絃誦為之一振楊遵威清指揮永樂間創城池立堡戍有功於衛洪熙元年卒遣行人吕讓諭祭楊芳貴州衛人守備威清米魯之亂有保障功平越府宋宋勝郡人嘉定中授右武大夫沿邊溪洞經畧使元宋朝美勝曽孫父提巴蠻都總管朝美累官新添葛蠻安撫司明范鑛富順人進士撫黔有政聲解任後避亂於湄潭遂家焉劉冠南廬陵人舉人萬厯間知府修黃湄餘甕四州縣城興學字民為開創良守楊可陶嘉定州人舉人萬厯二十九年任府同知性嚴重果於任事時改設府州縣治修築城堞闢水城建署道橋勞勛最著陞知府萬尚烈南昌人舉人萬厯間知府遷建學宫教習士類人文蔚起馮國正江夏人舉人泰昌元年知府時安酋叛國正與守道朱芹戮力守城間出鋭兵擊賊圍乃觧以亷愛著聲陳紹英仁和人舉人崇禎間知府修城建學有愛民實政民間立祠祀之鄭廷英南川人以府同知署黃平州事值嵗大旱廷英步行泣禱雨立應聴㫁明决民呼為神君肖象以祀方明棟富順人舉人平越府同知天啟三年監軍進討水西遇害事聞贈按察僉僉事廕一子入監賜祭董邦昌昆明人舉人崇禎間任平越同知多善政值黒苗叛薄興隆城邦昌多方捍禦賴以保全後陞思恩知府王衍𢎞治間平越府訓導修學宫置祭器啟迪有方士論韙之王先洪武間平越衛指揮僉事智勇兼長苗蠻畏服奚國柱平越衛指揮撫士卒以亷恵稱建西門水城以便民汲退隠二十年貧無半厦僦屋以居李福定逺人洪武初為平越衛指揮同知相形勢創建土城以資捍禦今為府城李山洪武初從軍累著戰功為宜興衛指揮同知後以事降調平越衛僉事卒于官賜諭祭優恤其家奚得平越衛百户驍勇無敵正統十四年苖亂圍城得開門直入賊壘斬賊甚多賊觧圍走得率二子宣宏追殺力戰而死幼子尚在襁褓尚書王驥訪其家月給米䘏之曹進可江津人舉人萬厯中任黄平知州當建設初經理規制綱舉目張亷明慈恵不愧父母史應元順天人舉人萬厯二十四年知黄平州秉直不阿卒於官無以為殮民争􅉠之乃得歸櫬黃虞龍廣東人舉人崇禎末年知清平縣時值苗亂内撫字而外禦侮備極苦心後擢黄平州牧土賊藍二攻䧟州城死之胡其仁性純孝任黄平州指揮明崇禎壬午苗叛圍城幾䧟仁挺身奮力擊傷數人賊衆遂奔城獲保全士卒凋殘與同甘苦民間鬻男女者捐資代贖善政多端周興字隆岡滁州人洪武間興隆衛指揮時初設衛題請賜名上即其名字取名興隆規制俱擘畫盡善胡質洪武間興隆指揮修城築池屯田撫士頗多勞績蕭琳永樂間興隆指揮以亷推舉掌印亊重修衛城民不告勞權安正統間興隆指揮性儉政勤嚴而不苛狄儁成化間興隆指揮持己以亷馭聚以寛修學開田頗著勞績余洪烈興隆衛指揮萬厯辛酉城西狇狫苗叛洪烈率兵勦濫泥溝破塘寨中鎗而死周鑑正統間興隆千户有勇謀遇寇至出粟守城臨陣破賊武功表著王榮三本浙江上虞人膂力過人洪武初從潁川侯傅友徳克取普安曲靖攻大理屢建竒功至鶴慶與敵對壘奮勇陣亡世襲興隆衛百户張朝如皋人洪武初設黄平所朝自貴州衛千户改任黃平軍政修舉境内帖然袁尚紀江油人選貢萬厯間播平設餘慶縣以永寧知州攝縣事捐俸建學敦教化以正人心田立上中下三則丁隨田辦邑人感之韓任甫瀘州人舉人萬厯間知餘慶縣政平訟簡才長操潔留心學校毎暇輒召諸生講論多所𤼵明儲至謀靖州人萬厯間知湄潭縣天啟元年藺州奢寅叛土逆王倫從賊攻縣出戰屢敗城垂䧟遂自焚國朝杜廣諸暨縣人嵗貢生順治十五年知黄平州當開創初撫字荒殘拮据六載心存仁恕不事敲朴食惟脱粟衣皆布素毎有征徭集衆共議必悦從而後行藹如父子以勞瘁卒於官黄民為之罷市殮惟有布衣一襲醵金備棺以其餘作􅉠櫬乃得歸羅鳴序漢陽舉人任麻哈牧雍正十三年署州印值逆苗背叛烽烟告警鳴序身率士民捍禦城池至四月二十七日苗賊擁至鳴序知孤城難保預解所佩兩州印令家人潜賫赴省又將庫金千餘擇地􅄟之俄而城䧟鳴序投繯死幕客陳憲素有俠氣鳴序勸之去不忍獨生同時俱死事定鳴序贈叅議賜𦵏祭廕一子入監憲贈國子監學錄賜𦵏祭俱祀忠義祠都勻府晉五代尹懷昌郡人以雄傑為都勻長天福五年率其屬十二部附於楚明凌文獻遂安人𢎞治七年知府創學立署規制始備杜禮豐城人𢎞治中繼文獻為守興學平叛功在封疆趙延劍州人官生萬厯間知府亷仁最著李時茂乾州人天啟間知府重學校恤軍民值苗仲倡逆圍城與民固守多所斬獲後卒於官李廣居宜賓人都勻教授學問淵博勤於訓誨士多興起許衍吉水人成化間都勻衛訓導學行純茂克盡其職在任十五年致仕陳原定逺人都勻衛指揮偉丰儀饒材畧善謀能斷民夷率服正統末苗寇圍城原罄家財以饗士城賴以全李紹忠貴州前衛人萬厯丁未武進士襲千户官都清兵備中軍守備奉調征水西安邦彦力戰死之事聞贈二級襲陞二級後祀忠烈祠樊體坤都勻衛指揮僉事值安邦彥叛調征大方陣亡題叙曰負英雄之志探虎狼之穴從祀忠烈祠從龍安陸州人知麻哈州時民未知學龍聘名碩士訓之俗為之變民立祠祀之張應期號維屺鎮逺縣人明經清平衛教授天啟間甕壩諸苗叛應期佐副將胡從儀屢出奇計勦平之攝縣篆愛民課士政皆可紀居鄉方正樂易貧約自甘有君子之稱司鐸河南人清平指揮洪武二十四年開設衛治創置公署築建城壘卓有能聲石宣夀光人洪武二十五年調清平指揮捐地建學興賢育才讀書好禮亷公有威兵民咸服事嫡母賈生母韋以孝稱邵鑑清平衛指揮嘉靖初為迤西守備值芒部土官隴夀被殺隴勝詐稱夀養子求襲蜀撫王輒奏改流官已題覆旋報罷再設土官蠻猶弗靖鑑乃奏叙瀘大壩為烏芒密邇芒夷出没必往永寧乞添設參將一員挑選漢土官軍以資防禦事下本兵行川貴撫巡議覆報可永寜設叅將自鑑始時貴州初設科塲鑑為督理區畫盡善至今頼之何振清江衛千户才毅勇果正統間香爐山苗叛振親至其巢曉諭之孟杲清平人宋吉國公八世孫也任副千户忠義自負正統末以先鋒禦寇力戰死劉邦徴籍貫未詳萬厯丁未任荔波知縣荔介黔粤極邊内蠻外苗交訌為患凡之官者皆坐府城不身厯其城徵甫入境曰叱馭九折豈異人任乃視此為畏途也比至邑推誠撫諭諸蠻凡有徵𤼵悉皆聽命請於上官置縣治於喇軫村厯任數年羣蠻帖服百姓思之立祠以祀鎮逺府明顏澤江隂人永樂十一年初設鎮逺澤為知府勤政恤民政滿民請留復任宣徳元年澤遷建府治創署立學政績居多厯官福建叅政張英揚州人永樂間以御史出守鎮逺清介有守政事修舉宣徳七年卒於官劉善泰安州人舉人正統元年知府多恵政才學敏贍政教兼施公餘進諸生講論經史竟日不倦多所造就毛鳳嘉定州人進士授户部主事天順四年守鎮逺亷介不茍平易近人七年卒於官王敘臨汾人監生成化七年知府事神恤民俱有實政沈熊歸安人進士成化十五年知府孳孳為治嘗遷學宫議建府署未幾憂去徐䖍繼之一遵其規畫云徐䖍揭陽人進士成化十六年知府通逹政理遷學建府卓有成績李暠汝寧人監生成化二十年知府奉公持法以忠謹稱周瑛莆田人進士𢎞治初知府博學能文勤於政事請建城置堡碩畫鑿鑿厯官四川布政使戴仁大理人舉人𢎞治間知府舊有羡税前守多私之仁至盡裁革亦不暴於當道或勸之上聞仁曰張已形人非吾心也考最晉松茂兵備旋致政歸里不治第館賓於門設榻於屏自號無懷先生卒之日家無餘財郡守吴晟為之殯殮劉武臣宜賓人進士正徳二年知府潔己愛民為政不擾公事之暇親課諸生去後民為立祠祀之羅鳳上元人進士嘉靖三年知府有善政能詩鳳舊與周瑛善先後出守作懐周堂又建徳禮堂後守程㸅為之銘黃希英莆田人進士嘉靖間知府善詩文興行教化建紫陽書院於中和洞自為記遷長蘆運使未行卒廖梯莆田人進士嘉靖間知府清苦自持常掃梧葉代薪秩滿致仕程㸅建昌人舉人嘉靖二十六年知府視官如家視民如子才氣揮霍而詩文藻繢足潤色之凡山川崖洞無不經品題者城垣衙署次第修建續修志書尤詳核衛軍雷文七等欲鎮民幇貼夫價呈楚撫按㸅具移詳辨議乃得寝至今守為定制在任九年歸無餘貲居一樓兄子鬻其半作籬自障有詩曰風雨半間樓阮宗道大同人恩貢萬厯十九年知府勤政恤民設立哨卡民頼以安張守讓字懋功南海人舉人萬厯間知府時兵燹之後民苦供億驛馬之累十室九空讓甫下車首為調停百廢具舉捐俸糴榖贍士賑貧建石橋以利往來備火器以防苗變建坊勵俗飭儉維風善政不可悉舉秩滿擢本省思仁道徐璋重慶人鎮逺府同知永樂十五年建山川社稷郡厲等壇政有遺愛黃鑑新喻人正統間任鎮逺通判才識俱優以禮義率民風俗丕振周仕達鎮逺指揮天啟三年征水西陣亡贈都督僉事祀忠烈祠何瑄郡人先為鎮逺土知州後裁州改授土同知為人沈毅剛果有逺識熟於事機正統天順間麓川卭水諸苗相繼叛瑄領土兵協勦屢建竒功子矼硟孫馴天衢先後俱登賢書何騏土同知成化中克服銅鼓石羊等苗欽賞絹紗何魯土同知𢎞治初出方畧平諸苗楊貽業土通判居官勤慎嘗率兵應援㑹省勦堵汪苗皆有功以詩文樂志楊薰土通判居官以清慎著捐地以廣學宫輸材木以成府治其公爾忘私類如此楊載春土推官欽之子也篤志好學𢎞治戊午舉人襲推官屢征有功嘉靖四年加俸二級授正六品職事劉以仁臻洞司人安酋叛以守備督兵援省力戰死之陳應正字國啟雅州人舉人知鎮逺縣清操自勵觧組歸行李蕭然李珪昆明人監生天順間知施秉縣始遷縣治才識優長多所經理劉宇鈞州人進士成化三年以貴州巡按御史降施秉縣典史適虎為民患宇牒城隍明日兩虎相噬死患遂息後起吏部侍郎許國柱偏橋衛指揮天啟三年隨父攀龍征水西死於戰壘祀忠烈祠朱梓淮安人萬厯十九年任天柱所吏目條議建縣撫綏苗蠻二十五年陞知縣建學校擴城垣清田賦編里甲立社學安哨堡創市鎮百務具舉為設縣來賢令之冠李紹道清江人萬厯三十五年知天柱縣清静寧謐不事紛更凡前令所經畫悉遵守勿改民苗愛戴立祠縣旁尸祝之韓可興長葛人萬厯三十八年知天柱縣居官嚴厲不輕笑語苗人聞風畏服四境無虞去之日民立祠祀之王昌富順人副榜萬厯四十六年知天柱縣政事文章卓然可稱去之日士民肖像以祀趙海四川人天啟二年知天柱縣除陋規革公費正斗斛繩吏胥以循良稱陳朝疏烏撒人萬厯二十五年天柱教諭時初設縣學中虚無人請於朱令擇童子俊秀者二十九人給衣巾至學肄業又請撥靖州㑹同兩學諸生三十人附於學以為表率多方鼓舞邑中人文振興自朱陳二人始國朝卜世儼上元人康熙甲辰武進士任鎮逺衛守備甫半載吳三桂䧟貴州總督廿文焜至鎮逺遇害城䧟儼自經死康熙二十四年巡撫慕天顏請䘏贈都司僉書廕一子為衛千總思南府宋田佑恭思南人字子禮有膽識為番部長政和間被召入覲拜伏進退不類逺人帝嘉之建炎初劇賊王闢等破歸州將㧞瞿塘奉調破賊保安蜀境璽書加勞遷通侍大夫知思州軍事勲業最著子孫世其官龎孫恭為運使築思州婺川城因山控扼建寨堡以備要害明田仁智思南宣慰使太祖平陳友諒仁智遣其都事楊琛來納元所授宣慰誥太祖以其率先歸附俾仍為宣慰使以三品銀印給之並授琛為宣撫使陳禮泰和人進士永樂間知府時削宣慰田氏初設郡治編戸立學諸務具舉開疆著績何轍四川人景泰間知府興利除害頌聲洋溢王南長夀人成化間知府才智頴敏不撓於物恤孤教士重葺府署學校民不知擾金爵綿州人進士𢎞治間知府宅心仁恕祛積弊革横征立五年四空之法以編徭民懷其恵羅璞吉水人舉人𢎞治間知府重建府治興學校繕城垣至今人利賴之甯閲湯陰人舉人正徳間知府亷正剛直文武兼資時蜀㓂逼境民間􅂝拏負貲竄入崖穴閲亷知之慨然以死守自誓盡撤渡艇躬自巡警嚴禁逃匿率民兵以禦之深溝重壘賊騎不得闌入值鎮筸兵經過閲借其聲援建畫出竒遂破賊遷運使去民皆扳轅涕泣不能舎周舉郯城人進士嘉靖間知府宅心正直剖决如流獄無淹滯尤善作人毎召諸生講論經藝多所𤼵明遷雲南副使未任卒葛鴊萬全人舉人嘉靖間為給事中出守思南剛毅亷慎多積榖以備荒有疑獄禱於神立決遷本省副使李夢祥監利人進士嘉靖中以虞衡郎中出守思南鎮筸苗叛剽掠隣邑時郡無城垣祥至乃建議創築期月工完遂成保障楊煦進賢人舉人嘉靖間以南工部郎出守思南時鎮筸苗叛煦多方禦之郡賴以全雖兵戈中猶與諸生講學不輟後掛吏議去士論惜之宛嘉祥廬江人舉人嘉靖間知府繕城隍修學校建公署提調木務更定馬政調停里甲莫不井井治郡六年稱能吏李充善長治人舉人嘉靖間知府性朗才練清操可質鬼神修學葺城創養濟院禁私征清寃抑定馬牌嚴保甲杜請謁肅吏胥時盛夏不雨善禱輒應郊冇虎患善祝於神遂息以内艱歸士民卧轍以留田稔髙唐州人進士隆慶間知府心存愷悌剔弊除奸吏畏民懷立祠祀之帥機字惟審臨川人隆慶戊辰進士萬厯九年以南禮部郎知思南古道自持不諧於俗而亷幹有能邃學問善吟咏尤加意學校奬㧞士類多所成就陸從平華亭人隆慶戊辰進士萬厯十五年知府文學優贍吏事精敏約已化民修舉廢墜懲積猾鋤强梗新府治立條編貽利無窮士民徳之溫可貞廣東人舉人萬厯間任府同知亷潔有守政多平恕秉公持法人不敢干李悅莆田人成化間思南教授文學宏肆尤精於易以授諸生得其𫝊者咸有可觀趙富印江人思石營把總戊子張先璧叛將入印富守秀寶闗報城中令居民速徙曰吾以身代羣命矣於是守闗拒賊援兵不繼被執死之朱凌霄南海人舉人萬厯間知安化縣卓有循聲萬應奎南昌人舉人天啟間知安化縣值安賊圍㑹城監軍進討遇害事聞贈光禄寺少卿廕一子入監賜祭周文山東人𢎞治間知印江縣清介愛人有治劇才始建縣治制度恢宏不任威力吏民悦服莫與京廣西人舉人萬厯間知印江縣公恕慈愛修舉廢墜時稱循良張鎔合州人舉人萬厯間知印江縣清亷仁恕建學宫定規制卓有政聲邑人厯久猶頌之劉兆桂閬中人萬厯間知印江縣有文名撫民訓士曲盡勤懇史諫貴池人崇禎間知印江縣才敏政寛審編丁糧尤著公平熊价眉州人𢎞治間知􅄔川縣公亷果斷修縣治築城垣後以誣去輿論惜之王緯平彛人正徳間知􅄔川縣時土賊行刼逼近縣治士民空城遁緯獨持印坐堂誓與城同存亡衆復歸協力固守賊聞之亦引去欒恕山東人嘉靖間知􅄔川縣修建學校有功於郡劉敏之山東人嘉靖間知􅄔川縣建學造士築城衛民石阡府明李鑑貴溪人進士永樂十一年首任知府創制立法導民變俗九載秩滿遮留載道胡信廬陵人正統十二年知府政舉民和十三年蜀後洞黒苗叛攻破府城信罵賊不絶遇害楊榮青神人進士天順八年知府律已嚴而待民恕興廢舉墜美政甚多余志建寧人進士成化十五年知府政績昭著傳胡知府王烈女以崇節義作風鬼洞龍洞辨以祛民惑是時陰雨彌月作䨧霾文以訟之剛直之氣凜於冰霜祁順字致和東莞人進士為名儒陳獻章髙弟成化十九年知府才敏學優多所題咏纂郡志興學校為名太守丁㫤字徳輝䝉化人進士𢎞治間知府建府治儒學及公署倉驛咸新之嚴守衛賑貧乏逃亡復業卒於官有烈風星殞之異囊無餘貲衆􅉠之始得歸櫬著有公餘清咏任儀閬中人進士𢎞治十四年知府賦均訟理普安兵變有轉餉功施震平湖人進士正徳間知府寛洪簡重綏戢苗民褚松華亭人舉人嘉靖十五年知府省夫馬抑豪强課士濟貧以直道不容去部民如失怙恃朱黼安福人舉人嘉靖二十三年知府才幹敏給庭無留牘濟嚴以寛士民戴之蕭立業新喻人選貢嘉靖三十六年知府操守亷静採大木餘千金不私諸已以建公宇創城甃石薄歛蠲征稱亷能太守王管江寧人官生嘉靖四十二年知府寛洪簡易練達公平繼蕭守修城加堅固焉李兖餘姚人隆慶三年知府修葺城垣捍禦有賴均丈民田糧差除減宿弊一清修有郡志今多散失吳維京孝豐人進士萬厯間知府亷明有威振興士類物望甚隆鄭一信恵安人進士萬厯間知府為政持大體尤加意學校陸郯上海人官生萬厯間知府温厚和平愛民如子捐俸購古今書籍貯尊經閣以訓士厯久猶頌之康頮字宜清泰和人進士永樂間任推官多恵政鄭廷璋瓊山人舉人嘉靖三十四年推官持刑明允操守亷潔豪强屏迹李應期鄞縣人萬厯間推官獄無寃滯囹圄為之一空修學興文著有異政呉衡揭陽人永樂十三年府教授盡心課士兼富文學有建學記楊彬泰和人舉人正統五年府經厯勤於撫字惠愛及民尋以憂歸民請留之服闋再任九年周冕南昌人宣徳間府照磨文章政事聲聞一時凌秋鵬昆明人貢生萬厯間知龍泉縣時初設縣一切規制皆其創竪段宜標雲南人舉人萬厯間知龍泉縣甫下車請減浮賦民困立蘇移建縣治規畫有條李紹勲建昌人貢生萬厯間知龍泉縣始建學宫士風振起趙譔昆明人舉人崇禎間知龍泉縣政以肅成不避强禦吏憚民懷擢御史後闖逆䧟京城死難最烈思州府元黃原銘思州人才智過人民夷親附以薦任沿江安撫司明田仁厚元思州宣撫使至正二年明太祖時經畧荆襄仁厚遣其屬林憲張思温來獻鎮逺思州軍民二府并十縣三十四司命改宣撫使為宣慰司仍守其地子洪正於洪武五年從征羣蠻授中順大夫思州宣慰使子孫世襲八年復授亞中大夫劉貴思州人宣撫司同知明洪武初贊田氏稱臣入貢五年以忠順授宣慰司同知黨宗仁思州人洪武間以才幹任宣慰司僉事崔彥俊新建人進士永樂間知府時方草創撫綏流亡編定糧差政教維新在任一十八年纂修府志賀讓衡陽人舉人宣徳初以瀘州守遷思州知府撫馭有方民夷安堵致政歸臨行惟市瀝青數石為身後計餘無所攜今廟食思州王常馬湖人進士成化元年知府公平勤敏修葺廢墜重建城垣張介内江人進士成化間知府老成諳練修治郡學親為講究士習一新李概豐城人舉人正徳間知府行政寛大惟務綏懷時有枯榴復榮之異髙節上元人進士正徳九年知府勞來安輯以經術訓士征苗寇有功擢叅政張柱涪州人進士正徳間知府性剛直禁止􅁋邪作興士類重建學校士民感徳毛希源太倉人官生嘉靖間知府力行化導禁暴止邪民大輯睦嵗餘以疾乞歸士庶攀留歌思不已李允簡融縣人舉人嘉靖間知府時銅仁苗出寇倉卒不及備被執以行投崖而死事聞賜祭𦵏贈按察司副使廕一子符仕寧陵人舉人嘉靖間知府性剛果清介值殘破之後築城垣以衛民恃為保障蔡懋昭字允徳上海人舉人萬厯初知府時改遷府治城久玘人無固志昭經理修建撫輯安定去後郡人祠祀之李仕亨銅梁人舉人萬厯間知府置田贍士賑恤孤貧恵愛為多趙建劍州人萬厯間知府撫勦苗賊多著勤勞胡柟洵陽人舉人萬厯間知府修城造士勦苗有成績民建祠祀之二十餘所萬嗣達九江人舉人天啟間知府有恵政士民公舉崇祀檀凱永樂間通判洪熙元年秩當滿郡民詣闕請留宣宗間而嘆曰貴州至北京甚逺民䟦涉艱難求其復任必撫字有道者遂遣還任予正五品俸以優之唐賢蘭谿人永樂間推官持身整潔刑政修明王制字宗明雲南舉人萬厯初推官勤恤民隠督理均田人稱其平鄭泰平溪衛指揮使景泰時禦苗有功銅仁府明田載北平人永樂十一年設府首任府亊草昧之初結廬聽政招集遺氓次第開剏踰年官署學宫規制粗備外馴夷撩内撫瘡痍偹極苦心王恕長清人進士宣徳六年以編修出知銅仁府時軍興財匱恕請罷礦塲内使巡塲御史及同知等官後因礦盡課無所出復請罷金銀塲至今無採辦之苦張隆雲南臨安人監生天順間知府雅尚文教日集諸生於庭而訓迪之士始知學自奉甚約俸入所餘悉付外庫以代租税之不能輸者以勞卒於官貧無以殮陽顯嘉吉水人進士成化三年以工部員外郎擢知府狷介有執持扶奬善類不事搏擊時郡署燬於苗嘉捐俸營建一切公用不以累民周銓興化人舉人成化間知府亷潔寛恕尤加意士類課讀惟謹一時人才多所陶鑄以學宫卑隘勸民輸地拓而新之遂成壯觀堯卿安岳人進士成化間知府以恬静為政事上之禮甚簡嘗曰剝民以求媚吾不為也民有爭訟出數語直之立觧有刑措之風周汝瑞長寧人舉人𢎞治中知府興學撫叛民苗懷服徐紹先蘄水人進士正徳五年知府時鎮筸苗作亂先繕城堡備芻粟治器械募民間勇士數百人教以技擊苗聞而憚之不敢犯境李資坤昆陽人舉人嘉靖間知府有恵政興學造士始終不倦先是舊城狹民多居郭外恒慮苗患坤相城北曠土可城召民入直為業即以其直城之拓九百餘丈興大役而民不擾馳九垓仁夀人舉人𢎞治間推官讞鞫多所平反值洞苗倡亂不避險艱入其巢穴撫馭之卒寢其變嵗饑請賑不待報而𤼵或難之曰民旦夕急寧我無官不忍民無食也勞周相徳化人監生嘉靖十六年任推官先徳教而後刑罰夷民有弗率委曲開諭使知向化鮮罹文網者唐宗正靖州人舉人隆慶五年推官剛果明决摘𤼵如神嘗奉檄度田躬行阡陌中按畆定則不假手左右賦税稱平趙和字達道鶴慶人正統間任銅仁訓導以師道自勵丁内艱服闋改鐸建始上官奏留之許還復丁外艱去將改選又乞還如初監司皆稱曰先生後致仕歸諸生遮道泣送謝寧蒼谿人嘉靖二十七年銅仁訓導性惇朴寡言笑諸生有過温諭之不悛峻詞切責靡不愧悔課文考業俱有常程即寒暑不少輟一時得士彬彬焉裴坦鼒靈山人監生正徳九年銅仁經厯鯁直勤敏事事有條理䕶郡篆能攝吏胥裁里甲鑿泮池建號舍皆捐俸充之楊仕漢景東人舉人萬厯間知銅仁縣心存撫字卓有聲稱黃家林汝寧人選貢天啟間知銅仁縣愛民訓士誠心感人黎平府梁楊再思據誠州稱刺史然有功於民士人尸祝之宋追贈英恵侯宋向通扆真宗咸平元年通扆以芙蓉硃砂二器馬十匹水銀千兩入貢詔有司鑄印賜之大中祥符初詔加古州刺史明黃恭上海人舉人正統中以刑曹郎出守贑州尋調黎平崇尚實政惠治小民時苗亂逼近郡城恭招募丁壯預儲糧糗定計討賊遂平之招集流亡出俸賑饑九年滿去民咸思之楊緯大理人進士以户部郎出知黎平持身亷慎黌宫就圮緯更新之考祀典廣生儒郡中諸務釐然興舉任黎六載治績最著擢山東叅政袁盛棗陽人進士成化間知府政平訟息有刑措之風張綱滁州人進士𢎞治間以御史出知黎平時府署猥陋綱改拓之又市地以増學宫性耿介政期必行然以愛民為主去之日合郡如失怙恃張愷無錫人進士𢎞治間知府躬行化導政務拊循擢兩淮運使余桂綿州人正徳二年知府果毅有為多所興革未幾調守黄州祝夀厯城人進士正徳中由兩淮運同擢知黎平剛正沉毅禁令整齊編置里甲民皆稱便賢聲上聞遷雲南叅政孫繼魯字道夫雲南右衛人進士慷慨有大節嘉靖間守衛輝以忤權璫被逮民攀號載道緹騎捶之不肯去後事白調黎平守治郡三載體察民隠罷里甲省繁苛清白之名著於海内擢湖廣提學劉汝順清江人舉人嘉靖間知府居官簡静奉法循理苗人初不知學汝順請於學使㧞其秀者為弟子員以奬勸之五開衛軍糾衆跳梁自以為别屬不可治汝順密陳其不法狀盡按治之郡中乃平府稱軍民始此袁表晉江人進士以户部郎出守黎平修學訓士詰戎戢苗邊境乂安熊廷相豐城人舉人崇禎間知府值皮林寇變殫力供億秋毫無擾郡民頌徳不衰于元葉東阿人慎行孫崇禎間以刑部郎守黎平值明末武弁縱横葉駕馭有方無敢或肆劉行政華容人景泰初以明經任推官膽智過人正統末苗賊攻刼城堡政毅然提兵出親冒矢石深入巢穴諭以禍福賊不敢加害遂降四郊乃得晏然徐馨咸寧人舉人正徳間推官讞獄平允治績爛然遷臨清守胡宗政松滋人舉人景泰初由鴻臚序班為經厯機警有方畧時廣西苗人與西山洞猺相讐殺當事者屬吏撫之不聴宗政入洞中為折曲直猺苗並服事乃息趙禧字景福河陽人以鄉薦知永從縣冇亷惠聲尋以内艱歸遂不仕大定府漢濟濟火牂牁帥善撫其衆聞諸葛武侯南征積糧通道以迎師遂佐武侯平西南夷擒孟獲封羅甸國王已乃攻普里諸種拓其境土即安氏逺祖也唐阿佩開成元年為羅甸國主率土夷内屬㑹昌中襲爵為王普露昆明大鬼主羅甸國王天成二年慕化來歸率其九郡入貢宋普貴一名宇貴開寶中詔諭西南夷普貴遂納土歸順賜王爵元阿畫一名阿拂普賁之後至大元年授武畧將軍順元等處軍民宣撫使㤗定間賜名特穆爾明靄翠阿畫之後仕元為四川行中書省左丞兼順元等處宣慰使洪武四年與同知宋欽歸附以翠為貴州宣慰使統四十八部號最强趙顒烏撒指揮征麓川戰死賜祭管良相李應期俱烏撒衛指揮天啟壬戌年烏酋入寇圍城九月人民乏食城潰良相與應期閉門舉火合妻子共焚死題旌祠祀朱運泰蔣邦俊俱烏撒衛世襲指揮烏酋入寇城陷運泰與邦俊先自殺其妻女隨自刎死題旌祠祀湯明洪武十四年畢節衛指揮時初設衞治建城池開道路皆其經始功績甚偉李興洪武三十年畢節衛指揮與弟隆以磚石甃城畢節險要可據皆其力也唐諫畢節指揮才力過人兵政克舉以所居第建學征麓川戰歿事聞賜祭進子官一級蔡禮和州人永樂間貴州前衛指揮調烏撒衛宣布恩威申明禁令繕城修署時稱賢將薛紹宣貴州衛人萬厯二十九年守備迤西威懾烏蠻道無剽掠李朝陽黄平州人萬厯三十五年守備迤西威恵兼施蠻人悦服步上達四川人崇禎初守備克復烏撒重建城署大有能聲丁祥赤水指揮正徳間攝衛篆和平練達蒞事五十餘年老稚頌其徳李瑞赤水指揮正統間攝衛篆以亷著寛厚有儒將風張佐赤水指揮夷阻大道領兵開路戰亡土人祀之張奇韜張大壯俱赤水衛指揮使奢寅亂攻城韜督軍堅守城䧟戰亡附載明天啓三年從征水西死事籍里莫考叅遊都守三十五人舊志載三十六人内有王達見遵義府志今止列三十五人陳濟民劉應龍劉仲時楊鯨羅袍五人俱叅將征水西死事聞賜祭贈都督僉事襲陞三級李師沆張纓宗延齡聶應徳周國臣陳富楊通増王建中逰擊八人藍補袞劉廷舉馬武余報國都司四人王得勝田有龍周國用龍國正曹柱易登洲覃事君劉象麒羅承富曹思敬張俸張懷邦董兆麟陳我謀耿良將覃天印羅承寵黃中和守偹十八人以上逰擊都司守偹共三十員名征水西死事聞炤本職贈二級襲陞二級國朝楊馥陜西西寕人大定協副將整營伍練士卒恒如敵至雍正十年台拱苗變鎮臣臬司俱䧟圍中餉道不通檄馥徃援時賊聚甘翁嶺築壘扼險以扼我師馥奮勇率土兵二百揮戈先登殺賊甚衆中鎗傷脇血迸出猶負創𤼵一矢手刄二苗佯謂我偶被石傷耳汝等當急撃無失言訖而殞事定贈恤有加廕其子恒新為遊撃南籠府明陶文靖萬縣人宣徳間知普安州裁决庶務皆迎刄而解時稱能吏袁寧新化人宣徳間知普安州亷介有為時諸夷争地互相攻撃屢年不決寧力解之後以誣去普民惜之黃雄烏程人進士𢎞治間知普安州亷潔不茍毎巡行裹糧自給絲毫無取又明察善斷從前積弊一時盡除徐世用宿州人嘉靖間知普安州剛直不撓民資保障苗夷有不率者以徳懷之遂遵約束不敢􅂝貳王徽南錦衣衛人天順間為給事中以糾權璫牛玉罪中官惡之摘其語以激上逮下獄謫普安州判徽至任克修厥職不以遷謫為嫌𢎞治間起山西參議引年去張瀾任普安州判才優政善雅重儒紳去之日民咸思之王威六安侯志子洪武間承襲後降安南衛指揮調普安衛築城建署有總理才華昇普安衛指揮使在位三十餘年威徳普著軍民悦服尋陞雲南都司王銳普安指揮征山都掌蠻陣亡魏政普安百户征山都掌蠻陣亡栁之文普安衛人有勇畧官守備嘉靖二十七年銅苗弗靖撫按檄文領兵討賊賊卒至衆皆驚潰文仗劍曰彼獨非命何乃畏之敢有先逃者斬後賊大至手刃數賊無援兵竟亡於陣未㡬賊首龍許保就擒鞫之賊曰石老虎大將軍不要錢栁守備不怕死吾是以就擒耳撫按檄銅仁立祠以祀曾異撰四川舉人先為永寧州牧崇禎間移轄安南流寇圍城率民堅守城䧟死難杜純南充人安南衛教授學問淵博規模嚴整當道延之書院以教諸士著有三試集梁海洪武二十一年領軍開創安南衛遷建衛治城郭公署皆其籌畫勸督有方士卒不知其勞軍民賴之姚餘洪武間為安南衛鎮撫果毅有膂力時安南寇亂餘隨西平侯沐英進勦至盤江與賊遇奮勇撃之賊併力攻餘因遇害西平侯以聞命有司䘏其家遣官致祭宋鉞安南衛指揮永樂間從征交趾陣亡賜祭尋治本安南衛指揮崇禎間統兵征毛口六墜等寨陣亡不帖傑安南所副千户驍勇多謀常以計破賊及築安南所城於楊那山民資保障遵義府晉母雅巴郡臨江人時西南夷強悍不靖以雅為夜郎太守殊俗感而化之唐楊端太原人乾符初南詔䧟播州端應募復之諭以威徳縻以恩信夷人懷服五代以來世襲宣撫使宋開禧中贈太師宋楊璨唐贈太師端十三代孫嘉泰初襲播州安撫使開禧初蜀帥呉曦叛璨輸金錢戰馬以助國用卒贈左衛大將軍忠州防禦使追封威毅侯楊价璨子方生時將校冇夢神號蜀將軍者來价生貌如之長以邊功授閣門舍人卒贈英烈侯楊文璨孫寶祐間授承徳郎修學勤政累官播州安撫使卒贈光禄大夫樞宻使田景遷乾徳中為珍州刺史上言自給賜珍州郡名以來連遭大火乞改州名詔從之改為西髙州並鑄五溪都防禦使印以賜之鄭昌孫珍州人嘉祐閒元兵犯蜀擄掠州境昌孫集兵禦之事聞贈州總制楊邦憲玠子端平間蠻人掠境憲領兵拒之擒酋長累贈平章事江彦清徳祐初為珍州守元兵至瀘州守梅應春以城降彦清盡力守禦珍州破巷戰死元楊漢英邦憲子字熙載生五載而父卒母田氏擕至上京見世祖遂襲父職賜名賽音巴哈成宗大徳五年宋隆濟及蛇節等叛詔劉國傑等率兵偕漢英討之師出播境賊騎猝至漢英奮擊先進大兵繼之賊奔潰相繼納欵後賊衆復合戰於墨特川又大破之蛇節乞降斬之並擒斬隆濟西南夷悉平武宗至大四年播南廬崩蠻内侵詔漢英率兵討之卒於軍追贈播國公諡忠宣楊嘉正漢英子至正初授播州等處管軍萬户侍衛親軍都指揮使上䕶軍討平陽留總之叛進中書左丞李嗣宗至元末播州千户守禦勇敢善撫兵衆人咸徳之明楊鏗嘉正從子洪武四年納土以為宣慰使後屢隨大軍討平叛寇卒贈懷安將軍子昇襲職蒞政勤敏請開學校民知習詩書崇禮義邊境綏寧韓志聰播人洪武間征普定有功授長官世襲羅琛播人元末明玉珍僭號於蜀太祖創興琛閒道入金陵負版籍以獻朝廷嘉其功仍以琛為播州宣慰使同知孫敏政興國人舉人以同知協理善後事遷遵義知府絶苞苴禁饋獻嚴搆訟鋤豪猾拯疾苦恤災祲髙折枝固始人進士以重慶推官監紀討播身先行陣鼔勵士卒自播𤼵難以迄蕩平厥功最茂何恩遵義人祖大本掛大將軍印奉命征蠻終於播襲宣慰司總管萬厯庚子恩憤楊應龍肆虐棄職率七姓舊人宋世臣等赴闕上書請討應龍命川黔兩省㑹勘黔議勦川議撫應龍因以黄白千金行賄至綦江恩遮獲以充軍餉督帥李化龍以為中軍提調又命其弟慇為劉綎向導斬箐直入師逼海龍囤播平恩兄弟與有功焉王佐聖明末知遵義縣㑹土賊郭士琦等倡首鼓衆作亂奪卬不與罵賊死遵人立祠於城南祀之胡宗明湖廣人舉人崇禎丙子任遵義縣厯五載平情折獄禮士興學人稱循卓郭維屏雲南人萬厯中舉人以從軍平播有功任正安州牧時改土設流一切制度皆其所經始州人感徳畏威厯久不替鄭瑚真州長官司洪武初從征南將軍𫝊友徳破偽夏擒其將江中立冇功績入覲賜印綬何珩湖廣人萬厯時平播設縣以選貢知桐梓縣築城建治創立祠廟招集流亡民得安業萬建侯湖廣人萬厯中舉人知桐梓縣時設縣未久凡田賦差役供億經費及道路橋梁無不悉心規畫洪維幹江西人萬厯中舉人四十七年知桐梓縣天啓元年藺賊奢崇明亂䧟桐梓維幹坐堂上罵賊不屈賊索印曰印在喉下索銀曰銀在喉下顏色甚厲賊不敢辱閲三日詣虎峯崇徳廟作來桐記題詩於壁乃自縊僕從死者數人其詩末云恨乏張廵相拒力願成厲鬼殺崇明賊平聞於朝賜𦵏祭廕其子千户唐文煃廣西人崇禎間舉人知桐梓縣以轉移風俗為己任每月進諸生課文藝舉鄉飲勤讀法善政悉舉詹淑字士善麻城人萬厯間舉人平播後知綏陽縣建城設學撫字招徠編里甲定賦役葺衙署成志藁大綱畢舉邑人建祠祀之母揚祖天津人以選貢知綏陽清亷正直善政宜民去任後邑人建祠以祀袁仁懐縣人副總兵袁鍪弟也天啟二年奢寅叛與賊相拒於仁懷之竹瓦寨血戰三日夜兵敗被執罵賊而死事聞命於其戰地立忠勇祠祀之廕其子蕙為叅將仍世襲指揮後又命與陳王謨同祀府城忠臣廟陳王謨郡人官副將崇禎十年流寇䧟蜀謨督兵禦賊血戰死之請於朝祔祀忠臣廟官其弟王政為千户國朝劉祺綏陽人順治四年大兵抵遵祺率衆效順以叅將守遵義適湄龍殘寇猖獗祺以孤軍禦賊於菖蒲塘血戰死之貴州通志卷二十
