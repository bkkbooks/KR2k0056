body:
  text: 貴州通志卷三十七藝文狀頌贊箴銘書論解考唐為南承嗣請從軍狀栁宗元臣亡父至德之嵗死節睢陽陛下毎降鴻恩必加褒寵臣自七嵗即忝班榮垂五十年常居禄秩再守遐郡績用無成終貽官謗甘就嚴譴無以負荷先志報効殊私以慚以懼隕越無地伏見某月日勅以王承宗負恩干紀命將徂征雷霆所加殄滅在近臣竊不自揆思竭忠誠願預一卒之任答百生之幸庶得摧鋒觸刃摩壘搴旗冀獲盡於微誠儻不墜於遺烈明嘉瓜頌王訓明受天命奄有萬方貞元㑹合君明臣良維皇繼統景運彌昌至和恊通發為嘉祥南國之臺園有瓜瓞綿綿其蔓澤澤其葉和氣長養瑞氣凝結兩實並蒂六本同列含英吐芳藴秀流香金膚玉質雪水氷形圜而直色正而黄臺臣稽首獻於明堂曰此嘉瓜我朝之瑞肇自髙皇龍興草昧適當其時風雲慶㑹今我聖君德侔功配仁風化雨洽於邇遐天人交感得此休嘉再産斯瑞視昔有加實由天眷壽我國家至治之祥太平之效天子萬年永綏億兆小臣頌歌以繼舞蹈金芝頌有序曹文緯余誦黔記其凱播之秋中丞園東金芝生焉踰年苗平芝生如故感而曰有開必先植物得之故西域貢誠漢武致石榴於異國而靈根遐敷東吳衡命魏祖樹朱橘於雀園而華實不就以彼花卉微者耳植之尚有榮瘁矧乎其不世之瑞無根而荄者哉且其生惟七月古者以是月命將選士專征不義又其附麗惟李李者理也此言兵刑得其理則祥符協應其較著者也小子不敏目擊蕃祉敢稽首而獻頌曰乾始儲精景星慶雲坤維錯彩指佞莢蓂惟德馨香感於神明矧兹金芝惟國上珍商嶺徒慕謝階空陳含生禀和襲祉幾何自根自本並育並峩色暉玉李光映朱柯六英璀燦五色婆娑初疑維摩披衣向座吸日服氣噓霞成唾又訝美人含情對居紅吐夭桃素凝芙蕖我聞衡論實惟神草其氣馥郁其精瑩皎蕙蘭讓質蘅杜遜藻荃蓀俛首金光失寶間生不多邊徼益少在漢武皇産於齋房彼惟單植曷雙呈祥厯世孝宣誕生函殿孰如今日匝嵗争艶問生何自想移仙家金莖玉葉三秀竒葩問出何為以彰有德蕩播犁苗中丞大業元老壯猷欃槍斯滅共武南陲奏功北闕上帝汝臨草木可格白露為霜瑞芝於赫士庶傳誦縉紳銘碣慚予不文續貂揚烈國朝黔省慶雲嘉禾苖蠻歸順頌王士俊黔省禹貢荆梁之域離京道里七千六百有竒欽惟皇上至誠之心至聖之德中和純粹之氣上蟠下際之光如乾道流行何分遐邇如坤厚載物不隔山川至於蠢爾苗蠻妄思梗化固屬睿慮周詳廟算夙定者也臣士俊於雍正七年八月十七日奉署撫臣檄行知照恭悉黔省自七月初八日至閏七月十一日慶雲凡七見梅岑黒苖抗拒王師忽覩慶雲騰現輙合掌輸誠古州口月數寨亦接踵効順此皆鴻濛開闢以來其人未通聲教其土未入版圖良由皇上敬天而天瑞聿昭知人而人謀咸當所以銷甲兵之氣象為日月之光華太和致祥百榖豐稔化瘠為腴嘉禾徧産猗歟盛矣臣伏稽史記云卿雲見喜氣也古今注云黄帝擒蚩尤於涿鹿有五色雲氣金枝玉葉花葩之狀尚書大傳云周時有禾各莖而同生周公曰天下其和一乎已而越裳重九譯來朝然則騐之史冊慶雲嘉禾之瑞固帝王赫聲濯靈遐方讋服之象也臣以為黒苗種類雖性頑壤僻猶附黔楚内地兹上瑞叠形普天光照意必天戈所指掃清殊域來享來王為萬年寧謐之兆且堯舜之世苗民逆命舞干羽而有苗格故堯時嘉禾生舜時慶雲見今皇上至誠感神符於堯舜天於苗衆先示感應之機皇上即謙讓未遑而天心篤愛已合五帝三王盛德大業而為一人矣宣付史館照耀萬古豈不􅞅哉臣黔人也既恭慶受天之祜復私幸本籍人民享億萬載太平熙皥之樂故踴躍歡忭而肅為之頌曰皇天眷命景運昌聖人首出萃百祥三矞五慶在日旁同本異穗嘉禾穰黔之山兮煥其章黔之水兮爛其光黔之人兮樂且無央不煩一矢啓苗疆彼蒼垂象兮孰敢當膚功超軼古帝王四方來賀天威揚帝曰俞哉毋怠荒恭己南面垂衣裳文恬武熈播萬方日際月竁走鯷自天申之寶祚長小臣獻頌兮曰父母之邦明天馬贊宋濓西南夷自昔出良馬而産於羅鬼國者尤良或云羅鬼疑即古之鬼方其地有養龍坑在兩山中浤渟奫深開闔靈氣而蛟龍實藏其下當春日始和物情酣鬯土人立栁坑畔擇牝馬之貞者繫之已而雲霧晦㝠咫尺不能辨色類有物蜿蜒上與馬接葢龍云逮天色開霽視馬傍之沙有龍跡者則與龍遇謹其芻茭而節宣之暨産必獲龍駒焉粤若洪武四年六月壬寅夏國長明昇以全蜀降獻良馬凡十而其一色正白乃得之於坑者身長十有一尺首髙九尺尾之髙比首而殺其二尺有肉隱起項下約厚五分廣三寸餘貫膺絡腹至尾閭而止精彩明晃振鬛一鳴萬馬為之辟易韉勒不可近近輙作人立而吼上謂天既生此英物必有神以司之親撰祝策詔有司以牲牢祀於馬祖然後勅典牧副使臣髙敬囊沙四百觔壓之人跨囊上使其游行苑中久之性漸柔馴適八月癸酉上將行夕月禮於清凉山壇上於是乘之而出如躡雲而馳一塵弗驚皇情悅豫賜其名為飛越峯復命御用監直長臣馬晉臣繪其真形藏焉臣濓稽諸載籍漢之元鼎中有神馬出渥洼水中馬之生於水者尚矣養龍之說雖相傳於土人要當為不誣也肆惟皇上以大德而位大寶日之所出日之所沒無不梯山航海獻䞇奉琛邇者獨角之犀來自九真食火之鷄貢於三佛齊之境其他詭形譎狀藉藉紛紛且不一而足而況此水産之龍馬乎周書有云不寳異物則逺人格所寳惟賢則邇人安皇上宵衣旰食日懷保於小民巖穴之士蒐羅殆盡將圖治安如唐虞時其遐荒殊裔珍毓竒産未嘗有心求之所以榮光休氣洋溢中國仁聲義聞充洽八表而龍媒之異自致於天閑十二之中揆之於書前聖後聖葢同一軌轍也其視貳師之遣黷武窮兵以索諸大宛者果為何如哉臣濓以文字為職業際兹盛美不敢黙而無言謹述贊辭一首以貽諸後世贊曰天駟熒蛟龍升靈淵澄神馬生祥飈瑞靄晝杳㝠太一翕聚通精靈龍髯盈鳬臆輕竹披耳鏡懸睛花雪捲毛光照夜汗溝有血霞流頳振鬛鳴萬馬驚閃流電逐飛星九霄彷彿從龍行但聞瀟瀟風雨聲山川平八極寧真龍媒獻龍廷出入天門駕龍軿太霞五彩滿瑶京皇風清皇道貞皇威明茫茫堪輿内孰敢不來庭陋彼漢將軍空圍貳師城乃知天子在樹德不必連年徒用兵明太守箴劉之龍維明運昌萬里職方貴山富水咸入版章建邦置守肇於莊皇守稱牧伯古並諸侯秩二千石下邑綴旒朱旛熊軾五馬優游召父杜母漢為循吏渤海潁川蒸蒸平治五袴歌成兩岐麥瑞河北渡虎合浦還珠蒲鞭化洽竹馬信孚甘雨隨車卧轍載塗帝咨民艱實重師帥豈以遐荒德澤疏窒眼前赤子鄉鄰同室鳥言卉服上世淳風帶牛佩犢化導之功夙夜匪懈其政自通畏彼四知堅此素節一鶴相隨懸魚比潔酌泉而爽勿淄於湼東海嚴卿晉陽臧彪德讓君子鸞鳳其儔惟胞惟與疴癢噢咻三代斯民直道無斁何武去思冦恂願借一體惟懷誰其有隔我思古人視履不愆子況異等文翁育賢休聲浹兹吏治斡旋噫嘻小子麟符斯辱畫諾是資素餐惟跼爰疏鄙箴誦言司僕明德禮堂銘程㸅德無常師敬以持己禮有定體宜民而已賢哉印岡德禮名堂道之齊之嘉言孔彰吾奚以禮吾奚以德先聖後遵前修維則崇正堂銘劉丙維正伊始無極之真清濁既判正由以名惟氣之正人乃有形惟理之正與心俱生惟心之正在意惟誠惟學之正必理是明言以正發動以正行仕以正進功以正成事君而正君以安榮治民而正法無變更秉正而生固爾之亨使斃而正死亦爾輕卓哉孔孟正學以宏嗣是而正紹於周程張朱繼作皆以正名寥寥影響誰抗斯旌懿兹南楚千里專城崇正有院翼翼峥嶸祀彼先哲爰集俊英惟正是學若見牆羮夙夜匪懈以紹芳聲己正人正天下以平豈媒利禄徒弋簪纓我思崇正以求稱情建神武祠碑銘郭子章炎漢日落皇綱幾絶天生虎臣為萬人傑蒲坂降神桃園軟血龍從豫州鴈行諸葛辭曹歸劉燭旦植節美髯桓桓雄武揭揭批郄䧟堅雷轟電掣吳兒敓氣老瞞禠魄鼎足方峙天柱遽折魂逰窅皛靈自光烈靡地不祝靡人不德嗟嗟黔陽雜揉漢夷夜郎不䖍煽毒邊陲予小子章肅將天威王赫斯怒嘿䕶囏危假夢告猶馮乩賦詩斬闗拔砦翼我王師兎穴既掃邊庭乃犁東市然卓南粤獲嘉邊甿安堵將士偃旗功在社稷誰其醻之醻之維何祠剏神武金相玉質儼然射圃聖賢可親心目可睹精靈如在竊比尼父盤江湯湯貴山膴膴廟貌維崇永奠兹土綏厥戎蠻懾彼豺虎勒石千秋銘勲萬古聿昭神貺以篤國祜平播銘有序江盈科今上辛丑春不佞科以使事弭節黔中則聞黔父老談師滅播其功甚鉅其為德於黔甚厚以為中丞郭公與直指宗公再造我黔非尸祝貌祀無以稱黔人報塞之意而予楚人也乃其佩德有不下於黔之人者無以為報則譔黔師平播銘與黔父老共圖永永比於江漢歌棠峴山勒石可乎按播酋之始發難也禍中於黔凡數四初犯飛練次犯東坡又犯龍泉黔之將帥為魚肉者二十人健兒戰卒殱滅幾盡元元之血塗野草骨掩􅅾蒿者不下萬餘中丞郭公受推轂之遣自江以東星馳而西至則覈所部兵不滿五千帑金稱是乃焦勞愁思語宋公曰無米求炊巧婦不能將奈之何宗公曰為今之計但有上告天子請兵食救此一方民爾用是披肝瀝血連疏當宁葢情切於諸葛泣慘於包胥廟堂之上為之感動請兵予兵請餉予餉又不足而請益兵益餉又復與益兵餉既集公與宋公進在事諸大夫晝夜籌畫慎擇將領宿重兵省㑹其餘險要多寡分布根本既實分遣所部凡八萬人屬總戎李公統率以往援桴而誓曰毋怯毋躁毋中餌毋蹈伏毋殺降毋競功忠赤所激三軍用奮踴躍前驅一戰而抵旋水再戰而拔髙囤烏江受挫士氣彌勵及三戰四戰以至八戰連破險崖直抵賊庭楚蜀之師十道併入酋遂計窮雉經以死妻子為虜葢出師僅六閱月而楊氏八百年宗社蕩為丘墟二千里之地之民久染夷風者一旦裂為郡邑比中原版圖之域明天子藉以抒西顧之憂既已銘功鍾鼎紀績太常矣方其功之既成也人但知二公成功之鉅而不知二公成功之難但知二公之為功於黔者與楚蜀鼎而不知二公之成功於黔者其難於楚蜀不啻倍蓰但知二公之功黔民是賴而不知二公之餘功其覆庇楚蜀者無以異於覆庇黔中夫其知者不待言矣其所不知者何也葢自飛練之後黔中銳卒盡創於播無復敢鬬之志則振起之難又播之與國夙苦漢文網而與酋世媾則解散之難此其難難在黔若夫廟堂所責備者三方之師併力滅播而楚號大國蜀號沃野物力之饒足給軍興又武昌城都去播千里我得從容定策不虞不備黔則彈丸之地居恒仰給楚粤有如稱貸而貴筑去播不二百里酋朝遣一將越宿抵城下腹猶果然是剥床之災也夫黔與楚蜀所肩之任同所挾之具異安得不難公與宋公不以其難者自諉矢志發憤吐一腔之血以激三軍之師自大將至卒伍靡不感泣願效死命二公復相與議曰將士用命而又有為賊用命者與國是也於是曉以大義悟以赤衷使酋之與國不為酋用為我用不但形為我用實心為我用而後我之神氣日張賊之膽氣日奪區區彈丸貴筑不敢一矢相加葢黔乃能完而因以其自完者摧播無完播矣顧黔雖彈丸乎而於蜀為内援於楚為西蔽黔既完矣賊欲引兵而北則虞黔之搗其穴出而無與歸也而不敢北欲引兵而東則虞黔之尾其後往而不可繼也而不敢東賊不敢北乃有完蜀賊不敢東乃有完楚夫能完黔又能完蜀完楚兹其功豈獨黔人擅哉假令公與宋公無術以振積衰之士而令韓魏之交合我乃外樹敵國内殺兵勢且無完黔而賊且突而北突而東又安得有完蜀完楚如今日乎此何但黔父老鰓鰓然懼報塞之難是蜀與楚何人不當報塞又何人報塞萬一也者即科處楚西徼所為得安釡鬵與今日擁車騎中儼然漢官威儀非仗二公之功其能然哉則夫譔銘鐫石其安能已是役也中丞郭公直指宋公實尸之總率三軍實為元戎李公應祥而左監軍楊憲長寅秋右監軍張少叅存意藩司應左伯存卓郭大叅廷良王大叅邦俊梅少叅國樓張少叅文竒梁少叅銓臬司易憲長登瀛尤憲副錫類洪憲副登源路憲副雲龍陳憲副與相袁憲副應文外厯戎行内贊幃幄備殫心力都司王納忠張秉忠登陴率衆用固我圉賊不敢窺副總戎陳寅陳良玭叅戎朱鶴齡都司徐成躬率士卒衝冐矢石擒滅巨㓂貴陽郡守劉冠南守貳徐庭綬别駕夏先後在郡拊循疲民調攝元氣其他禆將以下不可勝紀要之羣材集大厦植夫惟公與宋公慎簡而器之併力濟事克襄大亂樹兹偉伐其詳具中丞叙功疏中科特志其大者因拜手稽首而為之銘銘曰播酋欺君亂天紀敢奮螳臂稱禍始綦江流血成海水貴陽三鎮被屠戮十家流離九家哭全黔危若几上肉郭公單騎來秉節日與直指共商決誓滅此虜甘飲血一腔忠義激三軍怒氣勃發勝風雲各務斷脰除妖氛烏江青蛇號天險百二重闗次第斬賊勢窮蹙如被魘闔門縱火雉經死纍纍就縳妻與子捷書飛報龍顔喜荒徼一旦歸職方介鱗盡化為衣裳乾坤重闢日重光麒麟合入功臣譜英雄鬚眉照今古伏波銅柱安足數吁嗟乎伏波銅柱安足數文筆洞紀功銘戴燝三山苖為思銅患者厯年多不可記矣萬厯甲寅冬因兩臺缺彼醜謂大兵難動益肆匪茹居民苦之觀察劉公觀光文武壯猷赫然為地方請命㑹守道黄公文炳行部至公識達天人望氣而知夷氛之不競也總戎鄧公鍾赤心報國思滅此朝食因相與商畧機宜秣馬厲刄鼓而殱之由冬而春徂夏獲醜獻馘功收全勝者二父老相傳以為百餘年來未有焉葢自吳受月之糾紅苖掠戎滿屯也而後有水銀山之役自龍朝貴等之攻凱文營也而後有黄栢山之役自賊之挾陳湯銘而負固桶寨也而後有牛角之役計兵則僅三千三百有竒計餉則不動藩帑絲毫乃能深入窟穴冐險芟薙使渠魁授首羣黨駢戮假息餘魂乞降恐後神人之夙憤快矣大漢之先聲恢矣宜築京觀以示來者適戴子校士兹土事竣登臨至文筆洞徘徊久之曰是可借洞中片石以為燕然之封豈可令孟堅􅞅視千載諸大夫國人皆曰可遂勒之銘曰望夷氛兮戎甲鳴命超距兮犁其庭發機妙兮陣雲驚士慷慨兮各先登除兇頑兮血灑坰凱歌奏兮振威靈不復反兮嗣南征思州知府李君墓碑銘歸有光嘉靖三十年貴州麻陽苖為亂先是思州知府李君有銅仁之役還郡五日苗龍許保吳黑等偽為哨兵突入城殺掠君巷戰不勝與其孫文炳皆被執留郡二日刦以歸寨苗每執郡縣長吏必求厚贖院司及守將亦幸朝廷不知也率許之以為常君謂天子命吏為賊刦質是孰為之開端者書告清平鎮將石邦憲亟進兵勿以我為忌邦憲不應君乘馬出盤山闗至稍寨崖髙水深遂自投下賊驚共拽之出氣息僅續棄之途而去思人舁還至清浪衞而卒麻陽之苗亂已數年自辰沅鎮筸銅仁石阡印江皆受其害君初至郡即被檄驅馳兵間已又城銅仁而郡故有闗隘守兵為攝郡者所侵削散去賊以是得驟至事聞詔贈貴州按察司副使廕一子命按察司僉事戴楩諭祭於家賜塟融縣之髙沙昌八嶺惟古之治馭蠻夷得刺史太守勇畧仁惠者可不煩兵而自戢今知府受一郡之寄而日使舍所事事軍吏之役及事敗未嘗不委以為守者之罪也清平去思僅一宿程而太守困於賊已數日且被殘苖六七百人耳守將若不聞知此何為者哉朝廷之恤死事者優矣其於兵吏有軼罰焉君諱允簡字可大其先青州諸城人元時有為融州路廵檢使者因家於今栁州之融縣髙祖子質封奉直大夫恊正庻尹夷陵州知州曽祖芳進士雲南布政使祖序進士吏科給事中考鏞鄉試第三人未仕蚤卒季父鐸教樂昌君少隨之任學成而歸弱冠中鄉試明年中㑹試乙榜授潼川學正未上丁内艱服除改夷陵攝荆門州為政清勤民德之陞知内江公亷自持士大夫乞請無所得大旱齋沐祈禱徒步暴赤日中令兒歌之曰旱既太甚治邑非人寧禍其身勿病其民三日霖雨大足嘗於通津治石梁御史題之曰壽溪壽溪者君所自號御史以此旌其能得民也大學士茶陵張文隱公知君名從銓部乞以為其州守内江民攀留之不得為涕泣立石君至茶陵均徭賦剔姦蠧豪民為之歛跡皇太后梓宫祔顯陵承檄給糧芻所過無乏有白金文綺之賜最上當遷張文隱公自往乞銓部云願得展一年俟黄籍成茶陵民受十年之賜矣其見重如此陞雲南同知攝守澂江君既更治民號為精練凡斷獄所上監司以為平弁豪有奪民田者勒令歸王不服再訴於朝下法司皆如君論滿去滇民泣留立石如内江時尋陞思州君既不得在郡亦以孤城多冦遣其孥歸融獨與孫文炳居在郡六月而遇害是嵗三月初六日也春秋五十孫文炳之被刦者後竟以重賄贖還之恭人吳氏子男一人祝女五人祝鄉試舉人今署新昌教諭融於中州為逺然龍城於今為仕宦之邦至李氏世有科第子孫蟬聨不絶而君又以死事顯雖中州世宦之家類此者僅僅有之祝有志行痛憤君之殁請銘於余余不可辭而為銘曰黔中之境連絡五谿麻陽猖狂馭不於機如水滔天失在漏巵兵吏墮武習為謾欺皎皎李侯亶明其志奮不顧死以絶刦質帝嘉精忠恩詔優至彼亦何人天子之吏以身為市生寧不愧彼亦何人邊圉所寄聞守之死曽不睨視自古為文匪以其詞在有所表乃永傳之融山荒絶我實銘此有石嶪嶪其詞則媺後千百年可配栁子明謝安宣慰書王守仁某得罪朝廷而來惟竄伏陰崖幽谷中以禦魍魎則其分所宜故雖夙聞使君髙誼經旬月不敢見若似簡抗者然省愆内訟痛自􅈓責不敢比數於冠裳則亦逐臣之禮也使君不以為過使廩人饋粟庖人饋肉圉人代薪水之勞自惟罪人何可以辱守土之大夫懼不敢當輙以禮辭使君復不以為罪昨者又重以金帛副以鞍馬禮益隆情益至某益用震悚是重使君之辱而甚逐臣之罪也愈不敢當矣使者堅不可郤求其說而不得無已其周之乎周之亦可受也敬受米二石柴炭鷄鵝悉受如來數其金帛鞍馬使君所以交於卿士大夫者施之逐臣殊駭觀聽敢固以辭伏惟使君處人以禮恕物以情不至再辱則可矣貽安貴榮書王守仁減驛事非罪人所敢與聞承使君厚愛因使者至偶問及之不謂其遂達諸左右也悚息悚息然已承見詢則又不可黙凡朝廷制度定自祖宗後世守之不敢以擅改改在朝廷且謂之變亂況諸侯乎縱朝廷不見罪有司者將執法䋲之使君必且無益縱遂幸免於一時或五六年或八九年雖逺至二三十年當事者猶得持典章而議其後若是則使君何利焉使君之先自漢唐以來幾千百年土地人民未之或改所以長久若此者以能世守天子禮法竭忠盡力不敢分寸有所踰越故天子亦不得踰禮法無故而加諸忠良之臣不然使君之土地人民富且盛矣朝廷悉取而郡縣之其誰以為不可夫驛可減也亦可増也驛可改也宣慰司亦可革也由此言之殆甚有害使君其未之思邪所云奏功陞職事意亦如此夫剗除冦盜以撫綏平良亦守土常職今縷舉以要賞則朝廷平日之恩寵禄位顧將何為使君為叅政已非設官之舊又干進不已是無底極也衆必不堪夫宣慰守土之官故得以世有土地人民若叅政則流官矣東西南北惟天子所使朝廷下方尺之檄委使君以一職或閩或蜀其敢弗行則方命之誅不旋踵而至棒檄從事千百年之土地人民非復使君有矣由此言之雖今日之叅政使君將恐辭去之不速又可求進乎凡此以利害言揆之於義反之於心使君必自有不安者夫拂心違義而行衆所不與鬼神所不嘉也承問及不敢不以正對幸亮察又與貴榮書王守仁阿賈阿禮等叛宋氏為地方患傳者謂使君使之雖或出妬婦之口然阿禮等自言使君嘗錫之以氊遺之以弓弩雖無其心不幸乃有其迹矣始三堂兩司得是說即欲聞之於朝既而謂使君平日忠實之故未必有是且信且疑姑令使君討賊茍遂出軍剿撲則傳聞皆妄何可以濫及忠良其或坐觀逗遛徐議可否亦未為晚故且隱忍其議所以待使君者厚乃文移三至使君始出衆論紛紛疑者將信喧騰之際適㑹左右來獻阿麻之首偏師解洪邊之圍徐徐又三月餘矣使君稱疾歸卧諸軍以次潛回其間分屯寨堡者不聞擒斬以宣國威惟増剽掠以重民怨衆情愈益不平而使君之民罔所知識方揚於人謂宋氏之難當使宋氏自平安氏何與而反為之役我安氏連地千里擁衆四十八萬深坑絶坉飛鳥不能越猿猱不能攀縱遂髙坐不為宋氏出一卒人亦莫如我何斯言已稍稍傳播不知三堂兩司已嘗聞知否使君誠久卧不出安氏之禍必自斯言始矣使君與宋氏同守土而使君為之長地方變亂皆守土者之罪使君能獨委之宋氏乎夫連地千里孰與中土之一大郡擁衆四十八萬孰與中土之一都司深坑絶坉安氏有之然如安氏者環四面而居有百數也今播州有楊愛凱里有楊保靖州有彭世麒等諸人斯言茍聞於朝朝廷下片紙於楊愛諸人使各自為戰共分安氏之所有葢朝令而夕無安氏矣深坑絶坉何所用其險使君可無寒心乎且安氏之職四十八支更迭而為今使君獨傳者三世而羣支莫敢争以朝廷之命也茍有可乘之釁孰不欲起而代之乎然則揚此言於外以速安氏之禍者殆漁人之計蕭牆之憂未可測也使君宜速出軍平定反側破衆讒之口息多端之議弭方興之變絶難測之禍補既往之愆邀將來之福某非為人作說客者使君幸熟思之為諸生請王陽明先生講學書席書近時董諸士者要不過屬題命意改課文鍜字句以迎主司之意裁新巧以快主司之目上以是取士下以是挾策師舍是無以為教弟子舍是無以為學居今之時欲變今之習誠難矣豈朝廷取士之初意乎然貴之士安於土俗誘以禄利尚不樂從教以舉業復不能治幸有治者日省月試又不能工而況有大於舉業者乎舍是以教貴誠亦難矣夫舉業者利禄之媒也世之皓首一經凡為禄利而已以書一人推之書少時治舉業要不過為禄利計也然昔者借是而有聞今者脫是而愈暗是誤天下之豪傑者舉業也然使天下士借是而知所向上者亦舉業也故韓子因文見道宋儒亦曰科舉非累人人自累科舉今之教者能本之聖賢之學以從事於舉業之學亦何相妨執事早以文學進於道理晚以道理發為文章倘無厭棄塵學因進講之間悟以性中之道義於舉業之内進以古人之德業是執事一舉而諸生兩有所益矣與中朝人士書萬鏜苗賊巢穴如蠟爾雷公等山硐接連湖貴四川周圍千數百里猩㹳所居人跡罕至其懸崖鳥道莫可攀躋狹路羊腸不容並足自竹箐叢生彌望無際幽崖曲澗在在皆然鱗次櫛比殆無空隙人非側肩僂背莫能入也賊從内視外則明每以伏弩得志我從外視内則暗雖有長技莫施其地利之難如此苖巢所居率皆險僻幽翳修崖茂林即晴日亦將午而後朗甫及未而已暝但遇稍陰即飛霧迷濛尋丈莫辨計其陰雨十常六七葢山嵐瘴濕氣候鬱蒸之所致也其天時之難如此先年土官守法易以駕馭苖夷椎魯易於牢籠自正德以來邊方多故土官征調皆僱倩此苗以為前鋒用能克敵稱强及至近年土官搆讐各厚餌此苗以助攻殺因而起釁生亂由是土人與苗互結姻親尋多牽制且其伎倆亦為賊所窺破無復畏憚況湖貴官軍皆不足用湖廣除永順保靖之外其餘土司可調之兵能出千數者無幾至於貴州舍酉陽平茶之兵愈少而難矣必欲别省調兵則又不諳地理成功難必而其沿途擾害尤不可言決難輕調其事勢之難如此苖賊常言不怕官府軍多只怕官府糧多葢以軍雖多而山箐深險力未易施糧若多而圍困久長勢將自斃然彼明知道路梗塞糧運甚難故為此言其狡苗叵測之難如此厯觀史牒所云大率皆然故昔人云自古用兵未有大得志於南夷者誠有以也前此兩省官司非不知地方之害非無滅賊之心然而莫肯以剿賊為己任者葢亦畏其難耳況逺得於傳聞者恒失其實旁觀於閒暇者每易其言不以為邀功生事則以為勞師費財人亦何苦冒地方之利害而招己身之艱危乎積習有年稔亂斯極其獨力任事之難如此獻廵撫陳克宅書田汝成凱口餘孽復肆猖狂竊料今日賊勢與昔殊科攻伐之策亦當異應往者一二梟獍負其窟穴草竊為姦者皆内儲糇􅖲外翼黨與包藏十有餘年廼敢陸梁以延嵗月今者諸賊以亡命之餘憂在溝壑冒萬死一生之計讙呼而起非有旁寨渠賊通謀結納擁羣醜以張應援也守彈丸之地跧伏其中無異甕缶襁升斗之糧躡尺五之道束腓而登無異哺鷇非素有紅粟朽貫積之倉庾廣畜犬豕肥牛以資擊剥也失此二者為必敗之形而欲攝枵腹張空弮睅目而前以應貔虎是曰刀鋸之魂不足慮也然竊聞之首禍一招而合者三四百人課其十日之糧亦不下三四十石費亦厚矣而踰旬不餒者無乃有間道捷徑偷輸潛輓以給其中者不然何所恃以為生也夫蠻陬夷落之地事異中原譬之禦冦於洞房委巷之中搏撃無所為力故征蠻之畧皆廣列伏便扼險面趣髙四塞以困之謂之得地若我遜其險而彼乘其高順逆强弱之勢已懸倍蓰是以諸賊雖微亦未可以蓐食屠剪也惟在據其要害斷其芻粟之塗重營宻柵勤其間覘嚴壁而居勿與角利使彼進無所逞退無所逸逺不過一月而羸疲之屍藳磔麾下矣若夫我軍既固彼勢益孤食竭道窮必至奔突則潰圍之戰不可不鏖也相持既久觀望無端我忽而衰彼窮而銳或晨昏惰卧刁斗失鳴則刦營之虞不可不備也防禦既周姦謀益窘必甘辭納欵以丐殘息目前雖可妥帖他日必復萌生則招撫之說不可從也膚見宵人狃於詭道欲出其不意以徼一獲彼既鑒於前車我復襲其故轍不惟徒費抑恐損威則偷囤之策不可不拒也兹數者雄畧必有成算而疏腐之識敢效區區者休戚同情不敢避越爼之嫌至於事平之後經畫猶煩夫凱口雖微亦牂牁之巨阨也崇山宻箐磴道迫脅兵不得横銛人不得並躅迺遣一二渺小之官提數百不練之卒星散其間豈能持久往者爐山之變亦甚縱横幸䝉前烈刋木鑿竇夷其險棘開屯設所經營數年始得寧謐則今日凱口之議似不當出爐山之下也土官王仲武始以綿弱失其疆埸頃蒙上官之力以保宗祧雖百口捐軀猶難報稱迺今哄然而稱逆者固其部落之遺也既不能宣布德化俾彼投戈又不能率其左右心腹之雄先鋒効力是為失職之臣與叛逆無異若復仍其名位錫之土田是右姦而奬亂也竊論此人當褫爵削籍移其族屬籍之氓伍開設縣治衛以軍屯若以勢有不行法姑稍假似當暴其罪過聲諸市闤重加懲罰庶威振恩覃恊人心而伸國法也國朝復貴州提督李本深書甘文焜披閱來書具見忠肝駿發義氣淋漓將竭蹶以從王作撑天柱石總統全黔精兵捍禦疆埸大敵此誠本部院之素志亦為封疆大臣之所以上報皇上而造福於蒼生之至計也緬維我國家定鼎西南荒服之區桂王獻俘於緬甸安坤授首於水西羅甸欃槍掃除皆静魁山渠賊反側自安文德崇躋於三王武功丕振於萬國河清海晏福禄永昌念兹滇黔重地撫綏實難鎮服匪易爰命貴軍門與本部院授以邊疆重任予以閫外兵權是雲貴之安危皆本部院與貴軍門之責更無所容其旁貸者也邇時平西王奉㫖准撤回京一月之間三次欽差大人往滇羽檄戒嚴虎狼蟠踞揺動人心披猖鼎沸貴州藩司潘臬司李糧驛道陳已經調赴普安州安南等處策應平西王回京搬運家口夫馬持籌儲糈省㑹空虚兵民惶惑撫都院曹數日來聞欽差大人星夜奔馳出滇不知所為塘報杳無揣兹事勢禍亂已熾本部院厲兵秣馬期與貴軍門聨鑣並轡剿滅妖氛幸惟恢𢎞大畧共披肝胆仰報皇上浩蕩洪恩提挈兩省兵民出離湯火嗚乎本忠孝真性建英雄事業正在今日矣本部院現馳檄威寧大定黔西平逺安籠各鎮總兵矢以同心同德共勤王事鍾鼓式靈犬羊隊㑹更不必俟冦涉盤江始商共著祖鞭也貴軍門如果志在匡君忠貫日月當與本部院手足相依攻同之車馬便為於爍之王師板蕩之功勲標作不朽之麟閣身名俱泰青史流芳即或冦孽猖獗孤臣受困本部院任兩省封疆惟有效張廵南霽雲以身殉國即屍無馬革裹還斷不稍存擕貳也貴軍門同守封疆休戚存亡與本部院相為一體為今日計願即日興師駐劄盤江上流以禦其變馳檄各鎮結唇齒以互為聲援本部院㑹同撫都院督率督撫兩標人馬堅城固守以待王師不然者惝恍無從二三其德謬瞻顧於家室思依附於前驅進恐成礙退亦多凶未免雉罹於羅狼䟦其尾一失脚時千古恨再囬頭是百年身遺馨遺臭千里毫釐貴軍門其熟思而審處之無遺後悔可也復雲貴總督髙其倬書元展成十月十一日大差至捧讀鈞劄謂逆苗裹糧嘯聚不過十日半月糧盡即散又云大營糧多則守糧乏則移下秉以就食云云某伏查台拱居九股之中而九股一帶村寨星羅碁布人烟輻輳倡亂之人近則數里逺亦不出數十里當兹秋成之後人俱家有餘糧更番出沒以相接濟則逆衆之糧葢未可以計日而盡也明矣急宜用兵開通下秉一路雲集台拱竒正互施摧堅搗銳不特逆勢易靡便於掃穴兼可以因糧於敵使竄匿者亦失其所恃也至於丹江之鷄講一帶八寨之擺調方勝一帶清江之鷄擺尾一帶地俱附近台拱苗亦各懷擕貳未雨綢繆之計已久達之左右矣昨查排畧挫衂縁趙鎮約㑹失期内外舛錯所致今我兵已㑹集二千餘名不為少矣内外定期夾攻而進諒不致再有阻隔若因大營糧匱遂圖移兵就食此斷斷不可者現今劄營之地已擅形勝壁壘新立土垣粗建既便於守亦易於攻忽爾播遷苖必盤踞是我先以地利予苗矣而後從而取之竊恐必勝之權仍不在我語云戰勇氣也氣盈則克猶可以守若營移而氣竭矣我竭彼盈勢將不免加以丹江清江等處之苖觀望已久今一旦示之以弱設或四面􅉕起不免全局震動收拾愈難且尺寸莫非王土此地既入版圖又安可以輕棄而況自七月至今除官將兵丁外工匠數百人夫役數千人一經動揺苗必知我糧盡四山莾伏望其旗靡前遮後掩中衝邀擊欲全師以出不亦難哉縱使部曲堅整弁士齊心而匠作夫役不能保其不驚惶竄匿逆苗乘其亂而肆其􅇯將有不可言者某之所以云斷斷不可者此也已將此意行之軍前文武矣為今之計宜輓糧以濟大營為急務雖備極艱難險阻亦必相機設法但得糧運一通我師分險扼要以商攻取之策庶幾有備無患惟兵非節制將乏謀畧是為可慮爾蠡測所及仰惟鈞鑒國朝濟火論田雯濟火者漢牂牁帥黒盧鹿水西安氏逺祖也深目長身魑面白齒以青布為囊籠髪其中若角狀習戰鬬尚信義善撫其衆諸蠻戴之聞諸葛武侯南征積糧通道以迎師遂佐武侯平西南夷擒孟獲封羅甸國王世長其土勒四十八部部之凡九扯更苴皆屬焉已乃攻普里諸種拓其境地賜鏤銀鳩杖嗣是而降唐㑹昌中阿佩率衆内附復襲王爵天成二年普露率其九郡入貢襲封如故宋開寶中普貴納土來庭仍賜王爵元至大元年授阿畫為武畧將軍泰定間賜名帖木兒不花至順元年加資善大夫雲南行省左丞後以軍功授昭勇大將軍佩三珠虎符順元等處宣慰使加龍虎大將軍羅甸侯卒贈濟國公明洪武四年以靄翠為貴州宣慰使統四十八部正徳間加安貴榮叅政後世襲宣慰司之職葢厯數百年而其祀未斬云論曰濟火一荒陲土帥耳當武侯渡瀘之日孰為之計大義明王章者而毅然以助順樹勲崛起一隅為蠻王長其亦賨叟青𦍑之儔乎不可謂不豪矣迨乎累世相承奄有爵土要皆以識機達變宣力効忠始終不失人臣禮故得以長奉西藩受恩罔替非徒以為甌脫而姑羈縻之也天啓壬戌之叛罪惡貫盈旋即挫衂崇明邦彦同時陣殱雖王三善之奮斬十萬秦衍祚侯良柱之夜㧞三寨張雲鵬之八路進兵許成名之三方深入而發縱指示出竒制勝葢有朱爕元之方畧在豈曰無人歟何以南人復反不為益部之官屬而畨將分茅大玷牂牁之鼻祖也語云順則昌逆則亡水西之子若孫其當知所鑒戒矣乎奢香論田雯奢香者靄翠妻也翠仕元為行中書左丞明洪武四年與同知宋欽歸附以翠為貴州宣慰使欽副之翠死奢香代立欽死妻劉氏亦代立劉氏多智術時馬煜以都督鎮守其地政尚威嚴欲盡滅諸羅代以流官乃以事裸撻奢香欲激怒諸羅為兵端諸羅果憤怒欲反劉氏聞止之為走愬京師上召問令入宫見髙皇后復令折簡召奢香至詢故上曰汝誠苦馬都督吾為汝除之然何以報我奢香叩頭曰願世世戢諸羅令不敢為亂上曰此汝常職何云報也奢香曰貴州東北有間道可通西川梗塞未治願刋山通道以給驛使往來上許之謂髙皇后曰吾知馬煜忠無他腸然何惜一人不以安一方也乃召煜數其罪斬之遣奢香等歸諸羅大感服為除赤水烏撒道立龍塲九驛達蜀今安氏即靄翠後也論曰烏羅之君長西土非一日矣一旦折而歸我豈其願哉終必為患夫人而知之即馬煜之忠明太祖亦諒之矣乃不乘此而翦滅之反自壞其長城僅令置驛以為報者計之非不審也葢以諸蠻之强梗由於山川之險阻財力之富饒則莫若置驛以通之且困之通之而險失矣困之而志馴矣然後為我所制而無難此勝算亦逺猷也故除馬煜以為生事者戒而又以安逺人之心也若奢劉則可謂竒女子矣一乘間而逺犇一聞召而即至先機之智應變之勇丈夫之所不能而謂遐方女子能之乎觀其置驛開道則又功過唐䝉矣然驛置而事由此定亦亂於此萌矣何言之壬戌之役乘奢藺之釁連霑烏之黨雖潢池弄兵悍性不馴亦由置驛之後當時之官斯土者誅求暴虐有以激之而成也安貴榮嘗請減驛矣王新建曽貽書以責之固伐謀之道然使當日稍寛恤之恩威並用亦何至鋌而走險若是哉此馬煜之所以誅也白雲山論田雯貴陽城南七十里建文遯跡之所上有羅永庵庵前有井名跪井汲者必跪乃可得水俗傳以為溪龍所獻以飲帝者又有流米洞帝居庵時洞中流米供帝及帝去則不復流又有大杉數株謂帝手植枝葉皆南向嘗題三詩於壁人傳誦之論曰吾於紅篋一記疑之者舊矣半月之言明祖早知其不終然則何不舉國以授燕王如唐文皇故事必待金川事起而後為行遯之謀俾其流離瑣尾少延旦夕乎既入滇以依西平何不乘仁宗既殂髙煦告變之時而說沐氏以伸大義乃自甘流落毎至以淚洗面豈說之而沐不肯從抑帝本無意於光復舊物耶既已決意東歸不從程濟之言何不直詣京師而又久憇此山耶且是時楊葉雖亡程濟尚在何至煩飲食於鱗蟲鬼神耶葢荒唐之甚者後帝詩為同寓僧竊去自稱建文詣岑瑛言狀瑛聞之藩司因繫僧並及帝飛章以聞詔械入京廷鞠之僧實楊應祥鈞州人應祥論死從行十二人戍邊帝有南歸之思乃白其實迎入西内稱老佛以壽終既云稱佛壽終則程濟之蓍得兌之歸妹又何以云大凶金火之相尅耶事之有無俱未可知矣李化龍王三善論田雯紀平播之功曰李化龍死水西之變曰王三善其人同其事合其心一而要之用兵各殊故成敗亦異也方化龍之督黔以平播也與黔楚撫臣同心併力一出於剿既受命則移鎮於重慶而黔撫郭子章駐貴陽楚撫支可大駐沅州相犄角也必俟延寧四鎮河南山東天津滇浙粤西征調之兵大集然後啓行最慎重也分兵八路川師四路總兵劉綎從綦江入以叅將麻鎮𨽻叅政張文耀監之總兵馬孔英從南川入以叅將周國柱宣撫冉御龍等𨽻僉事徐仲佳監之總兵吳廣從合江入以逰擊徐世威等𨽻叅議劉一相監之副將曹希彬受吳廣節制從永寧入以叅將吳文傑宣撫奢世續等𨽻叅議史旌賢監之而中軍率標下逰兵以應之黔師分三路總兵童元鎮統土知府瀧澄知州岑紹勲等由烏江叅將朱鶴齡受元鎮節制統宣慰安疆臣等由沙溪總兵李應祥統宣慰彭元瑞等由興隆叅議張存意按察司楊寅秋監之湖廣偏橋一路分兩翼總兵陳璘統宣慰彭養正等由白泥副總兵陳良玭受璘節制統宣撫單宜等由龍泉副使胡桂芳叅議魏養䝉監之以偏橋江外為四牌江内為七牌五司遺種及九股惡苗盤據故地而紀律嚴黨與散矣部署已定大㑹文武於重慶登壇誓師諸道並進以抵婁山闗為期諭之曰闗外且戰且招多不勝誅也闗内疾戰勿受降師不可久賊詐不可信也又以劉綎素有威名薦綎於朝委以專制人或疑其夙與應龍昵則延入卧内輸心腹且以危言激之引其父顯九絲功為比致令綎大慟願誓死報又以水西為應龍婚婭也恐陰佐賊則走檄以詰之以故瀧澄僇其修好之使安疆臣執賊二十餘人以明不背志氣既一非同築舍之謀駐兵既得其所治兵又有次第任用又得其人先翦其翼次伐其謀復伐其交是以海龍圍合應龍勢蹙投降之書立焚拜表之欺不售而倉皇自盡妻子并俘自出師至滅賊凡百十有四日而事平也若王三善則不然初則奉命撫黔聞變募兵率皆烏合之衆非久練也平越一戰而敗即慉縮而不前視重圍之困不啻秦人之於越必待舊撫李橒大聲疾呼而後勉强以應中情怯也乘西賊之敝一鼓而潰遂以賊為易與而欲解散赴調之兵驕必敗也率師輕進未幾而還再抵大方又欲反轡舉動擾也雖三路分兵而卒皆逺調帥俱不和主客不敵形勢弗習也其所任則恇儒之魯欽馬炯所信則詐降之陳其愚用非人也懸師虎穴弭節逾年中隔渭水之河聲援已絶儲糗六廣之岸轉餉多難失所據也督主撫而撫主剿心膂未齊前䟦胡而後疐尾進退維谷事權分也師老而財匱事拙而勢屈況為陳其愚所賣烏有不敗者哉嗟乎黔地山川險阻異常狼子野心不知漢大未有提十萬之師而不為餱糧計深全軍之入而不為孤注虞者兵法云圮地勿戰圍地勿攻又曰兵貴有謀以多算勝自宜先定其規模非可漫嘗於一擊也況水西之地十倍於播播猶八面圍而水西止以一面攻播無逺近之援水西則有烏藺之助化龍乃以全力制之而勿敢輕三善則以獨力任之而不為意何其謬哉然而身沒戎馬心同皎日視死如歸英烈猶存王中丞之忠固史冊書之黔人祀之厯千百世而不可冺者矣明牂柯江解鄭旻牂柯江跡始見唐蒙漢武因通道夜郎置郡近羅念菴作廣輿圖謂烏撒七星闗水即牂柯江源折流為盤江經泗城州稱右江達泗城㑹番禺入海圖解有齟齬處然大要卓然得之顧質之人鮮有能識者則以地荒淪於甌脫而人壅局於觀聽也故作牂柯江解峚山子曰余弭節葢度盤江云江廣僅百餘步自貴筑入滇路未有不濟盤江行者沿江上下絶擊汰之跡水勢批巖滵汨土人謂水漲時漂巨木撞舟峭壁箐嵐人跡罕入下流至打罕聨泗城界舟船始通焉比余厯普安斜出霑益境趨烏撒衛校士抵烏撒普德歸驛驛門對可渡河堧河之南霑益境也河之北烏撒境也驛抵衛城八十里詢之候吏云河水在西百里注壑而出從此而東盤江乃此水之注也越衛城北二百餘里有七星闗河詢之故老云七星闗水源出芒部界濱城海子通水西境㑹可渡水為盤江地苐山水峭險狨猱叢居以是人無因而至總前二說固未晰知牂柯江所在而牂柯江為盤江則無可疑者按遷史牂柯江者莊蹻兵滅夜郎㭬船處也髙戎本古夜郎國今自瀘戎入滇路未有不由七星可渡行者當唐䝉風諭南越也越人食䝉蜀蒟醬蒙用蹤跡之夜郎臨牂柯江南越以財物役屬之以彊漢巴蜀之饒固可賂誘夜郎為置吏浮師牂柯江出越之不意制越之竒也武帝由是拜䝉為中郎將從巴蜀筰闗入遂見夜郎侯多同聽䝉約束還報以為犍為郡發巴蜀卒治道自僰道指牂柯江是時通西南夷道戍轉相饟數嵗道不通西南夷又數反發兵興擊費耗於是罷西夷獨置南夷夜郎兩縣稍令犍為自保就至唐時因以播州之珍州為夜郎後人止知珍州之為夜郎不知古夜郎從髙戎直通甌駱地方數千里也蒙初至夜郎多同問䝉曰漢孰與我大以道不通故各自為一州主不知漢廣大今人泥區區之珍州為漢夜郎又窘步旁蹊谷疑指牂柯江其亦昧莊生秋水之見矣然當漢四道伐南越也使馳義侯因巴蜀罪人發夜郎兵下牂柯江咸㑹畨禺乃今盤江灘瀬獰惡虚無人行豈古今時異勢殊邪抑當治道時二嵗費剷夷之力師過不無罌筏盤剥之苦至打罕乃得沛乘舟檝故兵遲至而南越已平邪載考八校囬軍時即擊滅曽反殺漢使者且蘭遂平南夷置牂柯則自烏撒逶迤而南皆其地舊載雲南廣西府亦牂柯羈縻屬也泗城以北如都勻等處皆牂柯界内矣是時卭筰冉駹君長聞南夷得漢賜過厚皆求置吏比南夷乃使司馬相如往賓之於是闗隘斥南至牂柯為徼則越嶲等郡界接芒部也然則牂柯江之源委其亦昭然矣夫山川經絡化工神運余嘗用是而求之自岷山之陽至於衡山蛇蟺虬嵸從衡迤南五嶺皆嵂崒東蟠五嶺者漢入南越有五道行西北山峻矗然非無可梯正以夷荒非通道之所耳以此見牂柯膠戾之山巋然為神州之拱臂也荒徼山蹊以地圖察其扼要不過數寸其間相去數百千里生長其地者尚未能習其險易也唐䝉浮舟牂柯之策誠為鑿空初時臣民驚疑蠻夷煽動然勞師殫貨卒置郡如堵雖來喜功之譏自是華夷一統亦足徵武帝善任成功矣夫唐䝉通南夷之二郡犍為牂柯也相如通西夷之二郡越嶲益州也而沈黎武都等郡不與焉真雄風哉禹列九州梁南肇有益州昭神州又益一州也益州列郡屬矣昆明重建益州郡昭益州又益一郡也其視東晉不競委神州於劉石僑州名以削弱不亦大相逕庭歟嗚乎亦可以觀盛衰之世變也余於是重有感焉宋莊蹻考馬貴與按史記及漢書皆云楚威王使莊蹻畧巴黔以西至滇池欲歸㑹秦奪楚巴黔中郡因以其衆王滇後十餘嵗秦滅之又按楚自威王後懷王立三十年至頃襄王之二十二年秦昭襄王遣兵攻楚取巫黔中郡也後漢書則云頃襄王時莊豪王滇豪即蹻也若莊蹻自威王時將兵畧地屬秦䧟巫黔中郡道塞不還凡經五十二年豈得如此淹久或恐史記謬誤班生因習便書蔚宗所記近之又按莊蹻王滇後十五年頃襄王卒考烈王立二十五年幽王立十年王負芻立五年而楚滅十五年而秦亡七十年何故云蹻之王滇後十餘嵗而秦亡斯又未知詳也明莊蹻牂柯考郭子章據司馬遷稱莊蹻范蔚宗漢書云莊豪據馬端臨說頃襄為是威王為非莊豪為是莊蹻為非然馬氏又云豪即蹻也考范書與註無豪即蹻之說不知馬氏何據雲南通志又曰豪蹻裔也則又不知何據賈誼賦曰謂跖蹻亷兮李竒註曰跖秦之大盜蹻楚之大盜此以蹻為盜之始也考遷固蔚宗並無此說顔師古註云蹻音居畧反使蹻為盜何不一引証之又不知李竒何據夫跖栁下惠弟魯人甚明竒以為秦人其疎可知又惡知不以跖故連及蹻耶正德間雲南欲祠蹻以此故不果尚書王元美云楚有兩蹻一莊王大盜一莊王裔孫將軍平滇自王者此又不知何據然亦足以明王滇之蹻為非盜矣予謂遷固既訛頃襄為威王又惡知不訛豪為蹻故作滇黔志者當從范氏莊豪為正又牂柯二字史記作牂牁班范二史作牂柯異物志曰牂柯繫船杙也韻書曰杙柯郡名通作牂又作牂杙通作柯近有作㸲牱者直音曰㸲音作牛肉重千觔牱音哥郡名非之非矣當從兩漢書牂柯為正國朝牂柯江考田雯漢武置西南三郡一為牂柯牂柯者繫船杙也華陽國志稱楚頃襄王遣將莊蹻伐夜郎軍至且蘭椓船於岸步戰滅夜郎後人以且蘭有椓船牂柯處乃名其地為牂柯史記云牂牁江廣數里出番禺城下後世求其地而不得遂以為在定番城南源出䝉潭流入破蠶至泗城州通番禺入南海而郭青螺又引漢書郡有牂柯江通畨禺城下光武時牂柯大姓自牂柯江入貢之語以實之不知定番雖通粤西而畨禺則屬廣東其城南之水僅僅一綫時斷時續未聞有以舟楫行者何以云數里之廣而當時大姓又何以由此入貢亦未詳於志文之故耳按且蘭即今之遵義夜郎即今之桐梓則牂柯江即今之烏江自遵義湄甕至印江入思南城西之巴江水其地有牂柯城舊址漢牂柯守陳立據思卭召夜郎王將兵破之牂柯舊城既在思南則牂柯之江宜在思南而其椓船之處不在巴江亦必在印江葢印江與湄甕接壤而湄甕則且蘭舊地椓船於岸或即此也若定番則去且蘭數百里且隔烏江何處椓船而步戰而牂柯大姓又何以舍楚蜀大道紆廻兩粤然後入闗以致貢哉然則史記之言出溯其源也漢書之言通論其流也後之人既不詳於本文又不明於道里是以有此誤也紫池考田雯黔之稱紫池不知何始嘗閱潯州志有貴縣漢為廣鬱唐為貴州有水出於鬱江長而狹色如紫練其出不常分兩派一自縣門下流一自縣上流其下流名曰紫泉自在粤西與黔何與顧以貴之名相類而謬引以相加耶然潯志又云府城北江為黔江而南寧志亦云城西南有江左右流至西合為一入横州曰鬱江即夜郎遯水梧州志又云城南大江漢武使馳義侯發夜郎兵下牂柯江即此則鬱江也遯水也牂柯江也一而已矣紫泉雖出粤西而實源於鬱江謂黔為紫泉其亦可也毋亦志粤者因貴州與黔江之名而亦謬引黔事歟今黔獨稱牂柯間稱夜郎夜郎乃播屬桐梓縣播與貴陽僅隔烏江一綫而平播之後割其半以𨽻黔今之黄平湄甕餘慶是也其稱夜郎也又何不可哉總之黔近粤則稱紫池猶之近播稱夜郎地固犬牙錯也第不當名之曰紫池仍之以紫泉庶名實相稱而易曉爾黔中水道考晏斯盛自莊蹻畧地椓船且蘭而牂柯江始出然循江循沅前後漢書異指江沅番禺莊蹻唐蒙殊歸桑欽酈元西南未覈山溪分合畧而不詳予既著牂柯江論復據逰覽所經考證圖志記其水道存隅識焉黔處萬山中形勢紆廻分著微渺所為茹納羣流吞吐谿壑達江赴海緯衆水而經之者曰烏江曰盤江曰濛江曰銅仁江曰鎮陽江曰清江曰都江烏江即夜郎水出修文縣西北之陸廣河其上自威寧州之八仙海闕汛露州各溪澗流出過畢節縣西南七星山下為七星水有闗曰七星闗溯威寧道滇南者多濟此元馮福可詩曰㸃蒼何蒼蒼環以西洱河百年雨露恩詎敢煩天戈轅門振烏撒衣帶踰牂牁巨險久已平故闗尚陂陀云胡七星名亦復重不磨此以知其徼塞矣今有橋曰七星橋明嘉靖間道人黄一中建橋西南有黒章水注之或曰即墨特川元大德五年劉國傑破蛇節宋隆濟於墨特川倘此地耶又東流至大定府西南有落折河自府城西北二十里當兩山間破地吼出南流來注之又東過府治南東流右得以則河又東左得烏西河又東為六歸河又東右有􅉫朶河合武著墮極織金等河水自平逺州界黒跨牛塲汛東流來注之又東北有西溪河合楠木溪水東南流來注之又東至黔西州東南為鴨池河有渡曰鴨池渡兩岸如劈崇崖如雪黔西大定要津又東至修文縣西北是為陸廣河距修文五十里舊為水西驛道有渡曰陸廣渡明王文成公曉發詩有曰白鳥去邊廻驛路青崖缺處見人家謂斯處也有水自安平縣東南界東北流為落陽河又東北至清鎮縣城西為滴澄河又北與安順府東南之九溪河北界之三岔河谷龍河下流合而東北流來注之又有三潮水自修文縣北流來注之又東左合白花箐水又東左合沙溪水有渡曰黄沙渡又東有羅傅大河自永寧縣東南過遵義府西南流來注之又東過修文縣養龍司北是為烏江唐李學士白流夜郎有烏江留别宗十六璟詩所謂白帝曉猿斷黄牛過客遲遥瞻明月峽西去亦相思者葢其地云今有渡曰烏江渡闗曰烏江闗黔蜀要津又東得刀靶水又東得養馬水又東至開州東北遵義府綏陽縣西南有渡曰茶山渡有水自桐梓縣西南正安州西至石子坡南過遵義府西南入湘水右合綏陽縣北之源溪水朗水傘水厚水南流來注之又有三江水自湄潭縣北合窄溪渡上闗花水溪湄溪大洞溪馬渡溪角路溪大溪諸水從廢容山司至望浦合流北來注之又南有渡曰落汪渡右合渡口水又南有洗泥河水注之東南至巖門有南明河水來注之南明河出貴陽府廣順州東北阿沙壩龍潭合濟番河㑹一宿河尤愛溪上馬橋河四方河過中曹司至府城西南左受黔靈山諸泉水及擇溪貫城河水東過府城南右得富水又東南得龍洞河黄泥哨牛渡河諸水東由廂子口喇平司迤北至巴香合平伐三岔河八字河所滙貴定縣城西之甕城河再過平越府西界之清水河一曰皮隴江者東北經開州東南由天星橋八弔口棉花渡而東北㑹於巖門巖門在開州東甕安餘慶二縣西北有渡曰巖門渡為黔楚蜀通津波流湍激合沓淜湃固衆壑之闗竅亦一川之樞要矣又東至龍泉縣西南有渡曰葛閃渡又東南有甕水鬲坪水袁家渡水白厓河水滙為江界河合餘慶縣之白泥司水佛山河水北流來注之又東至桶口有水自餘慶縣東南界北流為滿溪合石阡府之龍底河凱科江洋溪深溪樂囘溪等水東北流注之又東為三江口思石平遵通津也江楚商旅由銅江陸行者多自此濟蜀賈鹽艘溯思南而上者亦多泊此其西有得勝闗又東北流有水自龍泉縣東南流來注之又東流過思南府城南是為德江有渡曰德江渡又東有白鷺洲浮沙清淺宕漾江心逰觀者泥焉又東得鸚鵡溪水其西有石門焉唐史載牂柯境内有石門山此其是耶又有思卭水從印江縣西北之朗溪流來注之又東過婺川縣東左有豐樂河得煎茶溪水登龍河水合洪渡河倒羊溪水東流注之又東過婺川縣東北界而達涪州為涪水通於蜀入於江唐史稱城樂縣西一百五十里有涪陵水方輿勝覽稱思州有巴江水者是也盤江廣輿圖以為牂柯江水水出滇南小金沙江至威寧府界東南流為可渡河有橋曰可渡橋山曰分水嶺威寧舊烏撒衛也明鄭旻曰予弭節西南抵烏撒普德歸驛驛門對可渡河堧詢水所從候吏稱水在西百里注壑而出流為盤江又曰越衛城北二百餘里有七星闗河源芒部界濱城海子通水西境㑹可渡為盤江苐山水峭險狨猱叢居以是人無因而至據今七星闗水為分水嶺所界東出烏江不注可渡又小金沙江一名北金沙江來自吐畨由雲南麗江府之塔城闗入中國經鶴慶姚安武定東川諸府至四川之叙州府與岷江合入於東海與盤江之從粤以入於南海者源流逈異則鄭氏後說與廣輿圖所載俱舛矣可渡河又東南流迤西至木東汛有花魚洞水西來注之又南至龍塲汛有水自曲靖府界流來注之又南至安南縣東北有落白河自曲靖府界東流來注之又東至永寧州西安南縣東是為盤江有橋曰盤江橋為入滇孔道兩山夾行水勢湍駛不利操舟亦難架石明叅政朱家民冶鐵為絙懸兩崖間覆以板東西各建樓堞行者賴之尋為賊毁國朝經畧洪承疇統大兵定滇濟此復完至今嵗用修繕不廢盤江又南至普安州東又南至九盤山迤東至花江汛南有白水河得永寧州北之闗嶺壩陵橋水南流至鎮寧州西而南合菜子河水至寧谷司又南合永豐州西北之打罕河南來注之又有拖長江自普安州沙泥崖東南流來注之又有卜者河軟橋河板橋河東南流注之又南籠府有都城河自安南縣界得江西坡水至高武汛西合馬畢河南流合魯溝河過普市合大坡哨水東過府南界而東流注之盤江水又南至永豐州西南而東南過泗城府入於粤逹於海濛江出定番州之濛潭俗亦稱牂柯江水水東南流有玉帶河從州北二里來注之又東有洗馬河從盧畨司東南流注之又東南有環帶江合金石司之廻龍江羅番司之羅番河流注之又東南有雙峽水自小龍司東南流折而西注之又東南流有繞翠江從卧龍司南流注之又東南有小溪水自洪番司南來注之又奔龍江自大龍司合大龍河東流注之又東南有底方河自方番司南合小番河雲溪水並注之又東南有冷水河從小程番司南合連江水東流注之又東南有腰帶河水自盧山司南合擺游河東流注之遂東過泗城州而歸於粤銅仁江又曰大江出酉陽司界過提溪司西有提溪出濫泥山引流東南注之又東至省溪司南有孛羅江自司北二里江頭山流來注之又東有江曰小江自烏羅司北梵净山發源有九十九溪最大者為甕濟洞梵净山又名曰鏡山羣巒聳峙中湧一峯周圍僅數丈突兀􅈝絶髙將千仭中如斧劃劃處隔五六尺許名金刀峽峽有飛橋左右各立梵宇傍有石曰說法臺陟者攀鐵絙上下如蹈空行寺在極頂風峭不可瓦冶以鐵逰從之客千里風烟一覽而盡山下各溪環繞合甕濟水南流為小江而入大江是為江口有渡曰雙江渡為黔楚蜀通津又東有木耳溪水自平難寨東南流注之又東至銅崖崖當江流壁立千仭在府治西南其巔有跨鰲亭明正德間叅議蔡潮建又東過府城南迤東城内有山曰東山突兀﨑峭俯瞰江流濤聲撼之響振林木絶壁間有雲彩江聲四大字書法古遒佚其名山巔舊有大觀樓尋廢復起雙峯閣於上順治十八年太守梁懋宸建又東過石笏山南又東有烏羅溪水自烏羅司東合羊溪水南流為也溪東南來注之又東至辰溪縣入沅水而達於楚江鎮陽江即㵲水古五溪之一源出偏橋右司太陽河又曰杉木江東南流至新施秉縣東北右合小江新施秉者舊偏橋衛也明張一鵠詩曰有水可乘筏其如難渡何不辭車馬憊還怯虎狼過楚水偏橋盡黔山平越多城陰最慘淡一路少田禾此已事矣今驛路平曠田疇衍沃不殊内地也城東有橋為黔楚孔道又東流至縣東南界有舊黄平州北門河與州治東冷水溪合而東流過新施秉縣南又東南合太陽河為大江而注於諸葛洞一名甕蓬洞洞五重皆飛崖絶壁髙濶數十丈有鷺鷥灘有芙蓉崖水行石科中盤渦傾仄激宕淺阻不通舟明萬厯間廵撫郭子章鑿之未就罷國朝順治十三年總督趙廷臣廵撫卞三元以黔饑乏餉令新鎮道徐𢎞業副將王可就開通而漕楚米萬石直溯黄平城下尋停運仍淤江水從中出東南流得白水又東得牙溪水其西有小由溪湧溪水注之又東過文德闗東南右合松溪水又東左得西峽山水又東至鎮逺府城西南是為鎮陽江滇黔宦逰江楚賈客舟多泊此彭始奮詩稱烟消山漸出江狹水難平共指武陵近乘流堪夜行者此固溪壑之實況矣又東左得石屏山水右得吉祥山水又東有橋曰祝聖橋江楚黔滇孔道又東得鐵溪水有浮石灘又東得宛溪水又東得秋溪水又東得松溪水舊為清浪水馬驛今為縣又東迤北有星石江水自思州府東北開天舖東南流來又有甕坑灣水自思州府西都平司南而東流過府城南又東與星石江合流為施灣而東流來注之又東至沅州而入沅水以達於長江清江古曰劍河又曰長河舊陷苗境舟楫不通雍正七年總督鄂公爾泰廵撫張公廣泗奉㫖清釐夷人歸誠題請開濬自都勻府至湖廣黔陽縣總一千二十餘里遄行無阻江有二源並發都勻府山澗中繞城西南過都勻副司界左倚楊安汛右袤琵琶木老牛角高基諸塘迤東至東嶽廟前又東過八寨協營前協有城雍正九年新建前面太平汛鷄賈螃蠏甲些代犁後負楊棑大肚小肚左迤烏哇楊烏巴告鉄陀者良右夾楊堯斗魁龍井寨硐延屬亦一聚矣自此而北左得舊豐寧司水迤東過麻哈州東南又東至清平縣界受平越府三江口水三江口者麻合江馬塲江羊塲江也麻哈江一曰兩岔江又曰筭水一發州西樂平溪一發州東香罏山東北流合勇勝溪凱還溪舟溪江山河北流至平越府東南馬塲江發府治西北從金橋東南流而注麻哈江羊塲江發府治東北二十里南流亦注於麻哈江是為三江口其左有橋曰葛鏡橋距府城五里為滇黔孔道三江口水東流過楊老驛南又東至清平縣南界而注於清水江江水東至黄平州西重安驛南有重安江合髙溪水自黄平州西而南流注之又東南過巖門司南又東過甕壩汛南凱里汛北而東過舊偏橋衛東南至於丹江營北有九股河發源九排大山自鷄港台拱東北流又有丹江河自凱里流來過楊條與九股河合為小江從西南流來注之小江兩岸容山司屬又東至下秉汛南稿貢汛北經交架董隴八稿八亮栁受而東至清江鎮北鎮城雍正九年新造鎮左為董兠南脚右為南埃階東後接公鵝堡汛前夾栁利栁羅董敖寨硐連屬實一江之控制矣清江自此又東至下革東有水自上旁洞􅔜捷交蔑烏順南琴西南來又有水自古州界之宰磨栁受下歹旦西南來又有水自白羅宰統南來㑹流為烏沙河東北流注之由此迤南包白堵伐迷發號䟎頼培兠栁戸俾刀培牛而東至栁濟汛南流沿排敖栁再䟎甲栁傍栁受排交南孟黄寨而東至天柱縣界之茅坪右合亮江小滴水東至沅埕塘塘崖絶壁有字摩挲可視明永樂十二年總兵梁福等進討諸苗還所記也又東南過沅口至黔陽縣南入沅水而達於楚江古州江亦曰都江舊陷苗境雍正七年總督鄂廵撫張奉命清釐夷人歸誠黔粤舟行無阻其土源有邦水河出都勻府東南合三道河流入獨山州至爛土汛右合馬塲水左合爛土司西南溪水東流為都江其汛左有城門坡右有水巖塘西有獨山司東有巴開打鋤等寨明𢎞治五年副都御史鄧廷瓚鎮逺侯顧溥討爛土蠻葢斯處也又東厯三脚􅋭小打孟南厯拉攬打畧栁叠三汛經來牛寨而至來牛營營臨江北岸自營而下有風栁溝小溪北來注之流沿楊翁楊邦牛羊塲隴寨平宇平􅂻賞耙俾背八匡而至髙舊營南其北有小溪注之營臨江北岸厯髙孖髙表而東過定旦汛汛在南岸沿寨比孟冬滚董妙有八圭革赧至俾開汛厯黨畧俾開滚左而至都江汛經寨沈孟潘蜡子而東至古州城西有溶江水自清江台拱界南瓦山流出行數十里經冷衣下合崩坡塘水經八架㑹於孖有過平昻稿科至古州城西北有車江水自清江髙亮山流出經官州朗洞寨蒿寨側又有水自黎平府屬之上洞流出經育洞巴王㑹於山州過於列樂鄉月寨口寨田寨麥寨頭藏帑寨合於溶江下至古州城繞州城東南與都江㑹州城舊為諸葛營枕山面水土田平衍饒澤黔中一沃壤也宋咸平元年古州刺史向通展入貢明洪武五年江陰侯吳良三十年楚王湘王都督楊文皆用兵於此雖稱平定亦屬羈縻今雍正七年總督鄂公廵撫張公宣暢朝廷德威悉歸誠樂附因以其地建城城北接黎平府界有八匡冲登風㘭利硐髙硐東暨寨麻左襟溶江右帶都江左為髙文髙武髙同髙寨八鐸俾隴佳兩佳化謝能黨剛九溪龍早雞底雞弄右為喇候烏恩擺因怎冷領講養赫歸奴滚縱蜡岑人烟綿絡阡陌綺連幾既庶矣自此而東南經獨石蜡亮流至八及寨南有水自苗古九得來注之沿傅洞亭洞平雜孖温上下蘇洞平江寨至下江營又有小溪曰孖女江自東郎官雄流出由孖温南來注之而東南經蜡鵝扒沙郎洞巨洞至丙妹汛北有洽裏及黎平屬之溶洞古州之八孖永從之平舍丙妹等寨郎洞下有小溪曰孖覽江自寨正寨平流出北行又八孖之上有曹平江自黎平府之曹滴司流出南行並流注之又東南過懷逺縣界過相思石碑二寨經車寨梅寨沈口南下而入於粤達於海總諸水經流七達長江者四歸粤海者三舊五新闢二貴州考靖道謨舊志大事記載宋宣和元年以田祐恭加貴州防禦使下註云貴州之名始此其說非也貴州之名見於唐本為南定州鬱林郡武德四年改為南尹州貞觀八年曰貴州天寶元年更郡名為懷澤領縣四鬱林懷澤潮水義山宋州郡俱因之領縣一鬱林元初州縣仍宋舊大德九年省縣入州明改州為縣屬廣西潯州府則唐宋時貴州當為今廣西潯州府之貴縣但元史貴州小註云貴州地接八番與播州相去二百餘里乃湖廣四川雲南喉衿之地大德六年雲南行省右丞劉深征八百媳婦至貴州科夫宋隆濟等糾合諸蠻為亂水東水西羅鬼諸蠻皆畔據此又似今之貴州然潯州在栁州慶逺南與黔省疆域隔絶考元史順元路安撫司所轄溪洞長官司有貴州等處此註應在其下或誤註於廣西肅政亷訪司所轄之貴州耳廣西之貴州名始於唐黔省之貴州名始於元俱不得云始自宋也又舊志思南府建置云大觀元年田祐恭内附始建思州考宋地理志䕫州路思州政和八年建然政和止有七年其明年為重和元年八字疑誤而政和後大觀十餘年則云大觀建者亦非矣舊志葢據思南府志中宋朝請郎于觀所作田祐恭墓志之說考宋史蠻夷𫝊自辰州達於長沙邵陽各溪洞有州曰奬曰錦曰懿曰晃田氏居之田氏處達漢瓊漢希漢能漢權保金皆受朝命錦今之銅仁奬今之鎮逺思州處其間則受朝命諸田必有一是其先世而墓志不之及且其文詞鄙俚不似宋代人手筆而祐恭為貴州防禦使之說尤為可疑考元史地理志思州安撫司所轄鎮逺府古州八萬洞思印江等處石阡等處銅仁大小江等處皆今黔省東境其西南則播州安撫司所轄黄平府珍州思寧烏江等處又西則新添安撫司今之貴定諸處又西為順元路之貴州等處貴州與思州相去甚逺不必遥借其名且順元路之貴州特溪洞之稱即使宋時已有之亦不足為防禦使之號今貴州省治元為順元路宣慰司明初始為貴州宣慰司元之宣慰掌軍民之務行省有政令則布於下郡縣有請則為達於省有邊陲軍旅之事則兼都元帥府品秩甚尊元以順元名宣慰不以貴州名宣慰亦以貴州不足當宣慰之號也明之宣慰其官甚輕不過為土官世襲之職洪武初授靄翠為貴州宣慰司省城實其分地後於其地設衛設都指揮使司設布政使司遂以名其衛與其司而貴州之名始著竊意祐恭墓誌必明代人所作田氏子孫假於宋氏以誇大其祖宗爾總之黔省開設纔數百年文獻缺徵得一殘編斷簡即為收之然纂輯志乘傳諸久逺當以厯朝正史為權衡然正史紀載寥寥他書有相發明者可存也相牴牾者可畧也故黔省貴州之名當自元時順元路之貴州等處始黔中考靖道謨黔中之名始於秦唐宋皆以為郡然其地今湖南四川皆有之不知何以獨屬貴州也秦分天下為三十六郡以所取楚巫黔中之地為黔中郡漢髙帝四年改為武陵郡是自秦以前今湖南之常辰寶靖諸府州皆黔中也自漢以後今貴州之思石銅黎諸府皆武陵也黔中之名貴州不得而專有也自髙帝改黔中郡後凡兩漢州縣無有以黔名者晉太康志武陵郡所領始有黚陽縣然其字從黚不從黔義同而形異宋齊皆因之黔安郡之名始見自隋志註云後周置黔州不帶郡葢自周以前志獨有郡而無州唐天寶中改黔安為黔中領縣六郡治彭水郡復秦之舊名地已不仍秦之舊地矣宋初因之止存彭水黔江二縣省洪杜洋水信寧都濡入於彭水是唐宋黔中郡乃今重慶府之彭水諸縣豈能及貴州哉惟唐設黔中採訪使凡在今貴州境内之思播珍費諸州皆𨽻焉以是稱貴州為黔中可也若即以唐宋之黔中為貴州不可也夜郎考靖道謨且蘭夜郎皆南夷名史記云西南夷君長以十數夜郎最大是且蘭非夜郎匹也楚莊豪循沅水至且蘭㭬船於岸而步戰遂滅夜郎以且蘭有㭬船處乃改其名為牂柯豪既留王滇夜郎且蘭仍自立為國漢武平南夷置牂柯郡領縣十七後漢領縣十六皆首叙且蘭而夜郎反為屬縣晉永嘉二年分牂柯立夜郎郡領夜郎四縣於是夜郎始列於郡劉宋蕭齊皆因之隋地理志有牂柯郡復有牂柯縣而夜郎之郡縣皆無梁陳周書俱不志地理遂不知廢自何時也唐以隋牂柯郡之牂柯縣置播州而縣有三夜郎之名武德四年析夷州之寧夷縣置夜郎貞觀元年州廢縣亦廢八年析巫州之龍標縣置夜郎十六年開山洞置珍州亦置夜郎縣長安四年以龍標所析之夜郎置舞州天寶元年更縣名為峩山龍標之夜郎當在今黎平鎮逺之間夷州之夜郎當在今石阡思南之間珍州之夜郎則今遵義之正安州桐梓縣矣巫州夷州之夜郎或廢或更名珍州之夜郎置之最後而自唐迄宋名未嘗改於是人止知播州之為夜郎而亦不復知夜郎之大矣漢書云唐䝉從巴蜀筰闗入遂見夜郎侯又云夜郎東接交趾自西徂東奚啻千里亦無怪當年夜郎之自大也貴州通志卷三十七
