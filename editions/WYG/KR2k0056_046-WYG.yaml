body:
  text: 貴州通志卷四十六藝文雜記凡不載出處者俱係舊志廣南有韋土司自言淮陰侯後當鍾室難作淮陰侯客某匿其三歳兒知蕭相素與侯善往見之微示侯無後意相國仰天嘆曰嗟呼寃哉淚􅁋􅁋下客見其誠以情告相國驚曰若能匿淮陰兒乎中國不可居矣急逃南粤趙佗作書遣客匿兒於佗曰此淮陰兒公善視之佗養以爲己子而封之海濱賜姓韋用韓之半也今之族世豪於海壖有酇侯所遺之書尉佗所錫之誥勒之鼎器今定番有韋番其先亦出於廣南晉天福間楚王馬殷遣其八帥率邕管柳州兵討兩江溪洞至此留軍戍之因各據其土號八番韋番其一也其人雖𨽻版圖輸租課然多陰賊剽悍獸食而鳥息未見有能豪者至問其受姓之自與酇侯所遺之書尉佗所錫之誥率皆不知而云無有則义何也唐黔府都督謝祜兇險忍毒則天朝徙曹王於黔中祜嚇云則天賜自盡祜親奉進止更無别勅王怖而縊死後祜於平閣上卧婢妾十餘人夜不覺刺客截首去後曹王破家簿録事得祜首漆之題謝祜字以爲穢器方知王子令刺客殺之王蜀有劉隱者善於篇章嘗説少年賫益部監軍使書案於黔巫之南謂之南州州多山險路細不通乗騎貴賤皆策杖而行其囊槖悉皆差夫背負夫役不到處便遣縣令主簿自荷而行將至南州州牧差人致書迓之至則一二人背籠而前將隱入籠内掉手而行凡登山入谷皆絶髙絶深者日至百皆用指爪攀緣寸寸而進在於籠中必與負荷者相背而坐此即彼中車馬也洎至近州州牧亦坐籠而迓於郊其郡在桑林之間茅屋數間而已牧守皆華人甚有心義翌日牧曰須畧謁諸大將乎遂差人引之衙院衙各相去十餘里亦在林木之下一茅齋大校三五人逢迎乃至於是烹一犢兒乃先取犢兒結腸中細糞置在盤筵以筯夾調在醯中方餐犢肉彼人謂細糞爲聖虀若無此一味者即不成局筵矣諸味將半然後下麻蟲裹蒸裹蒸乃取麻蕨蔓上蟲如今之刺猱者是也以荷葉裹而蒸之隱勉強餐之明日所遺甚多黄祜修道於黔南無人之境每二三十年一出成都賣藥言人災禍無不神驗蜀王建迎入宫盡禮事之問其服食皆秘而不言曰吾非神仙亦非服餌之士但虛心養氣仁其行勘其過而已問其齒則曰吾只記夜郎侯王蜀之日蠶叢氏都郫之年時被請出爾後烏兎交馳花開木落竟不記其甲子矣忽一日南望嘉州曰犍爲之地何其炎炎請遣人赴之如其言使至嘉州市肆已爲瓦礫矣後堅辭歸山建泣留不住問其後事皆不言之既去於所居壁間見題處曰莫教牽動青猪足動即炎炎不可撲鷙獸不欲兩頭黄黄即其年天下哭智者不能詳之至乙亥年起師東取秦鳯諸州報㨗之際宫内延火珍寶帑藏並爲煨燼矣乃知太歳乙亥是爲青猪爲焚爇之期也後三年歳在戊寅土而建殂方知寅爲鷙獸干與納音俱是土土黄色是以言鷙獸兩頭黄此言不差毫髪元和中荆客崔商上峽之黔秋水既落舟行甚遲江濱有溪洞林木勝絶商因杖策徐步窮幽深入不三四里忽有人居石橋竹扉板屋茅舍沿流屈曲景象殊迥商因前詣有尼衆十許延客姿貌言笑固非山壑之徒即升其居見庭内舍上多曝果及窺其室堆積皆滿須臾則自外齊負衆果累累而至商謂其深山窮谷非能居焉疑爲妖異忽遽而返衆尼援引流連詞甚懇商既登舟乃訪於舟子皆曰此猿猱耳前後遇者非一賴悟速返不爾幾爲所殘商即聚僮僕挾兵杖亟徃尋捕則無踪跡矣僞蜀度支員外郎何昭翰嘗從事於黔南暇日因閒歩野徑於水際見釣者謂翰曰子何判官乎曰然曰我則野人張渉也余比與子知交久矣子今忘我也翰懵然不醒因藉草坐謂翰曰子有數任官終於青城縣令我則往青城山也待君官滿與君同歸山中今不及到君公署也遂辭而去翰深志之後厯累官及出爲青城縣令有憂色釣者亦嘗往來甚重之一旦大軍到城刦賊四起釣者與翰相擕入山何之骨肉盡在城内賊衆入縣言殺縣令臠而食之賊首之子自號小將軍其日尋覔不見細視縣宰之首即小將軍之首也賊於是自相殘害莫知縣令所之後有人入山見何與張同行何因寄語妻子曰吾本不死却歸舊山爾等善爲生計無相追憶也自此人不復見莫知所之費州蠻人舉族姓費氏境多虎暴俗皆樓居以避之開元中狄光嗣爲刺史其孫博望生於官舍博望乳母壻費忠勁勇能射嘗自州負米還家山路見阻不覺日暮前程尚有三十餘里忠懼不免以持刃刈薪數束敲石取火焚之自守須臾聞虎之聲震動林藪忠以頭巾冒米袋腰帶束之立於火光之下挺身上大樹頃之四虎同至望見米袋大虎前攫既知非人相顧默然次虎引二子去大虎獨留火所忽爾脱皮是一老人枕手而寐忠素勁㨗心頗輕之乃徐下樹扼其喉以刀擬頸老人乞命忠縛其手而詰問之云是北村費老被罰爲虎天曹有日厯令食人今夜合食費忠故候其人適來正值米袋意甚鬱怏留此須其復來耳不意爲君所執如不信可於我腰間看日厯當知之忠看厯畢問何以救我答曰若有同姓名人亦可相代異時事覺我當爲受罰不過十日饑餓耳忠云今有南村費忠可代我不老人許之忠先持皮上樹杪然後下解老人老人曰君苐牢縛其身附樹我若入皮則不相識脱聞吼落地必當被食事理則然非負約也忠與訣上樹擲皮還之老人得皮從後脚入復形之後大吼數十聲乃去忠得還家數日南村費忠果鋤地遇噉費州今思南府元馮士啟者許昌人仕黔爲順元府經厯嘗奉遣抵驛站日已暮站吏告曰今夕馬􅑕上岸麻色須蹔停以避之詰其故閉目揺手不敢言馮怒趣馬行數十里至溪畔忽見一物如屋烏剌赤下馬伏泣若訴狀再詰之仍閉目揺手不答馮於是下馬祝之曰某竊禄來此茍天命合盡爾其啖之否則容我行祝畢即轉入溪中腥風毒霧尚觸人口鼻乃各上馬比曙抵前站吏驚曰是何麻色膽乃若是馮問此何物始敢言曰螞蟥精也馮後官禮部尚書烏刺赤站之牧馬者明嘉靖十四年去思南府治三百里地名廟頭有鐘一口原自思南飛來内鐵外銅口上如齒擊之其聲各别四川酉陽司遣人盜之移至五里暫歇鐘遂生於石上舉之不動後仍還故處出思南府志明天啟中水西安邦彦叛廵按傅宗龍兼理軍事駐節平壩城時賊勢猖獗率衆數萬渡江官軍僅萬餘難以對壘忽見東北角有赤面長鬚大將在前賊衆遂潰官軍乗勢破賊先一日有居民入祠見關聖帝像起立驚駭而出呼士民入觀之見神汗流滿鬚鬢自辰至午門前所塑泥馬亦然頃刻則㨗音至矣官民咸謂神助見安平縣志崇禎十二年平壩衛永福寺門首金剛忽然動揺如人推挽之狀先是寺僧云韋陀每擎拳下立佛前居人不信夜往窺伺二鼓時鐘磬大振見一大將軍挺立佛前移時不見不數日金剛復動觀者如堵自辰至未方止見安平縣記思南李同野墓係明萬厯二十二年塟河東萬勝山麓納楚黄安耿定力墓誌銘於壙有祠在隔江國朝康熙二年七月十三夜誌銘忽自墓中飛至祠前其奉祀孫晨起見之聞於知府葉藩推官常時泰知縣雷起龍同詣墓所環視墓封如故無隙衆皆駭異今誌銘尚在祠中出思南郡志康熙庚午丹徒蔣寅爲布政使居黔署一日其家人具食忽案上器皿皆飛起懸於空際以好語祝之則滿室生香以惡語詈之則穢氣觸鼻甚至移易諸僕婦之釵梳衣物甲置於乙夫之房乙置於甲夫之榻種種變幻久而不息命巫治之巫反爲之顛仆誦經修醮迄不能避蔣知之瞷焉則空中有聲如嬰兒嘲謔嘻笑不止而終不見其形竟莫知其何怪也南方有獠婦生子便起其夫卧床褥飲食皆如乳婦稍不衛䕶其孕婦疾皆生焉其妻亦無所苦炊㸑樵蘇自若又云越俗其妻或誕子經三日便澡身於溪河返具糜以餉壻壻則擁衾抱雛坐於寢榻稱爲産翁其顛倒有如此習安三坌河以下地勢劃然而開萬仞壁立一水駛流昔人所詠谷黯天如線崖高月不明也山絶嶺往往掘地得拳石如卵去三坌三十餘里有可處砦河崖較他處倍髙亦倍險險絶處有石花四月望後始發初發之日若塗朱石上斑斑然三五㸃爲叢七八㸃十數㸃爲叢經二三日漸長併數㸃爲一片大如輪小如掌鮮明爛漫城頭之霞壁上之幟未足擬也再二三日漸黄漸淡倐忽而歸烏有矣其花方圓大小無定形前後髙低無定位殊不類草木之華苐每歳必一發每發必以夏厯厯不爽土人恒以其生之髙低色之濃淡旱澇豐歉如持左劵亦異矣黔有斷腸草叢生根如商陸葉類蓼而大莖有節當心抽花蘂數十作穗花淡紅色久漸赤子離離似桑甚署園中沿㘭依砌百叢也初見輒愛之以爲紅鬒内艷頳牙外標華橙之映翠幕丹璚之厠碧瑶當不過是未識爲何花有僰兒自尋甸至呼其名始知之毒能斷腸可駴也遂逺辟不復迫視辛未夏雨過忽來小鳥止於穗間羅之緑衣烏觜似倒挂么鳯軒輊才五銖極可玩籠之三日僰兒曰此斷腸鳥也嗜啄斷腸花子採而飼之可久活試之果然嗚呼異矣按本草經一名鈎吻一名埜葛一名胡蔓草一名黄藤今證之皆非也滇人謂之火把花亦因花紅而性大熱故名陶𢎞景云鈎吻言鈎人喉吻入腸爛腸是矣然所謂葉紫花黄初生似黄精隱居斯語爲茅山黄精反復致辨無使學長生者誤服它物已耳非篤論也若博物志所云鈎吻蔓生葉似鳬葵則大謬矣嵇含南方草木狀云埜葛蔓生葉如羅勒一名胡蔓草段成式酉陽雜爼云胡蔓草生邕州之間花扁如巵色黄白其葉黑一葉入口百竅潰血人無復生也後人之注本草者習其説而不察遂謂鈎吻胡蔓埜葛一物也而異其名如毛詩中螽斯莎鷄蟋蟀之類俗謂之斷腸草復從而傅㑹之謂五六月間花似櫸柳生嶺南者花黄生滇南者花紅夫鈎吻言其毒也曰蔓曰葛曰藤誤指此草爲蔓生之物更失其真况此草之春花夏實又與櫸柳迥殊乎無亦草之毒者不一種猶夫人之無良者不一族爲𢎞景諸君子所不及詳不屑道歟惜乎爾雅未載郭璞鄭樵未註旁引曲喻不見於三百篇故陸機陸佃羅願輩亦未疏其義也杜甫之咏除䕭草疾惡如讐嗟呼有世道之責者􅉨􅉨遇此毒草不知鋤而去之而乃按劍於芝蘭之當户可乎哉蘆笙釋名曰笙生也象物貫地而生以匏爲之其中空以受簧是爲匏笙女媧氏之笙也記曰絃匏笙簧黄帝命伶倫截嶰谷之竹雌雄十二以象鳳凰之鳴形似鳳翼故又曰鵝笙爾雅曰大笙謂之巢小笙謂之和又云笙之大者曰竽則又可稱竽笙矣鹿鳴之什曰吹笙鼓簧笙必有簧猶喉之有舌也語云調鳳管炙鵝笙簧必炙而後鳴物必暖而後生也古之善吹笙者王子晉緱山之事杳矣不意得之蠻荒每歳孟春苖之男女相率跳月男吹笙於前以爲導女振鈴以應之連袂把臂宛轉盤旋各有行列其笙截竹爲管者六通其節而櫛比之長者四尺以次而殺短至三尺參差若羽竅其短者孔六以達於長以指捫之若撚笛然而又截竹徑尺衡綰於六管之銜而吹之一呼一吸聲若鴐鵝之嘹漢每至看場既圓歡情欲洽則遲其聲以媚之長管之上冒以匏短管之中置以簧簧用嚮銅爲之恒用火炙亦古制也前人詩云管清羅袖拂響合朱脣吹人情應節轉逸態逐聲移苖俗固不嫻音律而其應節之轉逐聲之移則又善於形容也黔之諸苗皆用弩而其矢必傅藥治藥者爲補籠之狆家謂之補籠藥雜毒物碎而煎之以爲膏鷄犬婦人及白衣生人皆不得見凡七日比成以藥名齁者㸃之塗諸矢插之歩义中懸於火側時時温養之使勿敗然後可以傷人中者與㧞矢者皆立斃又有苗能醫之用利刀自頂踵寸寸割之使血出用口吮之血盡則以他藥傅之始可生齁藥産粤西類勾金皮不得齁則毒不驗鬻齁者多粤西猾盜須禁除之段成式酉陽雜爼云南蠻有毒藥槊其刃狀如朽鐵中人無血而死亦謂之鐸刃此或其類歟清平凱里香爐山之陽有穴焉深可二三丈再深則倍之於是躧其墏勘其牖捶其塹而後影見焉或仰以升或俯以縋傴僂焉手與膝並也籧篨焉足與凥張也又虞土之崩也木度搘之火之迷也松肪照之而後鉛獲焉其質鉛其狀石也於是舂之淘之炙之鎔之凡蠱毒之中人浸磨取其汁而飲之功與蘘荷葉等山南五溪黔中皆有毒蛇烏面反鼻蟠於草中其牙倒勾去人數歩直來疾如激箭螫人立死中手即斷手中足即斷足不然則全身腫爛百無一活謂蝮蛇也有黄喉蛇好在舍上無毒不害人唯善食毒蛇食飽垂頭直下滴沫噴起變爲沙虱中人爲疾額上有大王字衆蛇之長常食蝮蛇含毒者蚊蚋之屬江嶺間有之黔界尤甚爲其噆者慎勿以手搔之但布鹽於上以物封裹半日間毒則解矣若以手搔癢不可止皮穿肉穴其毒彌甚湘衡北間有之其毒稍可峽江至蜀有蟆子色黒亦能咬人毒亦不甚視其生處即麩鹽樹葉背上春間生之葉卷成窠大如􅊝李名爲五倍子治一切瘡毒收者曬而殺之即不化去不然者必竅穴而出飛爲蟆子矣南界有微塵色白甚小視之不見能晝夜害人雖帳深密亦不可斷以麤茶燒之烟如焚香狀即可斷之又於席鋪油帔隔之稍可滅脆蛇長尺許圍如錢嘴尖而尾禿背黒腹白暗鱗㸃㸃可翫也生黔地伏草澤間出入徃來恒有度捕之者置竹筒於其徑則不知而入其中急持之方可完稍緩則自碎故名脆暴之使乾已風去癘視其身之上中下以治人之頂腹脛足罔不驗按搜神記蛇千年則斷復續淮南子云蛇自斷其身而自相續隋煬帝遣人求此蛇數四而至洛下所得之者長可五尺而色黄黒其頭錦文全似金色不能毒人解食肉若欲令自斷其身者則先觸之令怒使不任其憤毒則自斷爲三四其斷之處如刀截焉見其皮骨文理亦有血焉然久怒定則三四斷稍稍自相就而連續體復如故亦似不相斷隋著作郎鄧隆云此靈蛇一類自斷不必千歳也昔鐵索橋爲㓂毁時值年冬伐竹夾船以濟師至春夏竹節間盡長枝葉覆水面若土殖者久之不敗雖云水氣使然然已不根矣枝葉何由茁哉黔人言往歳多旱林竹頻生花結米若粳糯色微紅而味甘民間多採摘以爲食久之則竹枯遂不復生凡竹花則必旱葢旱徴也黎平城有神魚井異物潛焉雖大旱泓水而盈井與何文烈公宅相近公生而井遂涸及公殁而井水復溢人以公爲神魚所化論者謂宋信國公亦係湖蛟廬陵人至今能言之兩公行事若合符節宜其相同若是也黔人云乙未年貴陽某帥簷柱忽生芝色正黄大於拳經月不彫縱人觀之當時以爲瑞未幾兵敗又某鎮將駐安順㕔事中柱亦産金芝時滴漿汁取而飲之比於甘露謂可以延年不三載而亡物固有其先見者以上見黔書黔無驢有好事者船載以入至則無可用放之山下虎見之龎然大物也以爲神蔽林間窺之稍出近之憖憖然莫相知他日驢一鳴虎大駭逺遁以爲且噬已也甚恐然往來視之覺無異能者益習其聲又近出前後終不敢搏稍近益狎蕩倚衝冒驢不勝怒蹄之虎因喜計之曰技只此耳因跳踉大噉斷其喉盡其肉乃去噫形之龎也類有德聲之宏也類有能向不出其技虎雖猛疑畏卒不敢取今若是焉悲夫銅仁城南兩江交合江中一巖峙立下有洲隱水中歳逢鄉試洲出水面郡邑諸生定有獲售者厯驗不爽見銅仁志貴州通志卷四十六
