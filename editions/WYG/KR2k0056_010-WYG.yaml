  text: 貴州通志卷十營建壇廟貴陽府社稷壇在府城西一里風雲雷雨山川壇在府城東一里布國朝雍正九年巡撫張廣泗政司常安増建乾隆三年總督張廣泗布政司馮光裕増修廟壇規制宏整先農壇在府城東東山下建國朝雍正五年奉㫖有廟宇厲壇在府城外西北隅以上各壇所屬州縣俱如制文廟在府城北門外崇聖祠在文廟後名宦祠在文廟㦸門左鄉賢祠在㦸門右賢良祠在府城南門外雍正十年奉㫖建忠義孝弟祠在貴筑縣學宫左雍正元年奉㫖建節孝祠在㫖城南門外雍正元年奉制建各府同以上州縣如城隍廟在府城内西北隅各州縣俱有福黔潤澤龍王廟在府城内北隅龍井旁雍正五年奉㫖建旗纛廟在府城北門外演武塲内火神廟在府新城西明崇禎十四年總督李若星建真武廟在府城北門月城上明萬厯九年建府國朝順治十八年總督趙廷臣重修各州縣俱有東嶽廟在府城内東北文昌閣在府城東門月城上明萬厯時建撫國朝康熙八年總督卞三元甘文焜巡佟鳯彩重建三十一年巡撫衛既齊布政司董安國按察司丹達禮㕘政陸祚蕃知府時騰蛟重修又一在貴定縣城内靈官閣一在府治西一在新城内三義廟在府城西南隅奉蜀漢先主闗帝張桓侯關帝祠在府城中大興寺内各州縣俱有武侯祠在府城外東南隅明萬厯時建祀諸葛武侯明末兵燹祠燬後遷於涵碧潭東北國朝康熙二十八年巡撫田雯増修像傍侍以濟火建亭於後名曰又一草廬常課士其中雍正七年復建於城南舊址額曰丞相祠堂三官廟在府新城内羅國朝康熙四年巡撫繪錦建川主廟在府新城内祀灌口二郎神明崇禎間蜀人建藥王廟在府城内西南隅為國朝康熙六年都司張光煥建舊尊經閣地址旌陽祠在府城内一國朝康熙十九年建祀真人許遜在修文縣白巖之下忠烈廟在府城中大街俗名黒神廟祀唐南霽雲明正統間按察使王憲建題請賜額一在修文縣北門外里許一在舊息烽所城内夏國公祠在府治南明永樂間建祀夏國公顧成後燬陽明祠在撫署東明萬厯間建祀新建伯王守仁國朝康熙十二年巡撫曹申吉重建二十三年巡撫楊雍建重修二十八年巡撫田雯建後覺堂堂前合一亭左𫝊習軒課所錄士於中三十一年巡撫衛既齊復増修兩廊集諸生肄業雍正十一年巡撫元展成鼎新之比舊更宏敞忠勳祠在府城東明萬厯三十年建祀監軍僉事楊寅秋及討播陣亡諸將士巡撫郭子章有記四先生祠在府城北明萬厯間建祀新建伯王守仁巡撫郭子章江東之巡按應朝卿後燬即其地建忠烈祠今併於東嶽廟忠烈祠舊在今東嶽廟垣内明崇禎二年建祀巡撫王三善以從征殉難副使岳具仰總兵魯欽鄉官湯師炎田景猷李紹忠并大小文武官一百餘人從祀明季賊燬甘公祠在府城南闗外五里甘國朝康熙十二年呉逆之變雲貴總督文焜殉難㓜子甘國臣筆帖式何善雅圖俱與焉建祠祀之王公祠在府城南門外軍國朝康熙十九年建祀殉難定海將四川提督王之鼎田公祠在府城内祀朝巡撫田雯國康太保祠在貴定縣城北祀宋康保裔甞為髙陽闗都部署死於軍為神顯靈禱雨恒應明巡撫郭子章建張鶴鳴重修有記郭公祠在貴定縣城内建祀明巡撫郭子章王鎮府祠在貴定縣城内倉左祀明指揮使王璽以修城功云張李二公祠在貴定縣城北祀明總兵張彦芳推官李若楠俱有殲苗捍禦功安順府社稷壇在府城東北風雲雷雨山川壇在府城東門外先農壇在府城東門外雍正五年奉國朝㫖建厲壇在府城北門外以上各州縣如制文廟在府城内崇聖祠在文廟後名宦祠在㦸門左鄉賢祠在㦸門右忠義孝弟祠節孝祠俱在府城内府學宫旁以上各州縣如制萬夀宫在西門大街原係李將軍書院年久傾圮堂宇尚存乾隆二年提督王無黨署知府牛天申知府杜理並五營員弁捐修規模壯麗城隍廟在府城内各州縣如制龍王廟在府城内學宫左闗帝廟在府城内各州縣俱有南嶽廟在永寜州慕役司境内闗將軍廟在永寜州闗嶺祀漢將軍闗索東嶽廟在清鎮縣城東文昌閣在清鎮縣西門外朱公祠在清鎮縣鎮西衛城南祀明布政使朱家民平越府社稷壇在府城南門外一里風雲雷雨山川壇在府城北門外一里先農壇在府城東門外雍正五年奉國朝㫖建厲壇在府城東門外以上各州縣如制文廟在府城内西南崇聖祠在文廟後名宦祠鄉賢祠忠義孝弟祠節孝祠俱在府城内以上各州縣原設如制其黄平餘慶雍正十三年燬於苗現在興修城隍廟在府城西州縣俱有東嶽廟在府城外東北盤古廟在府城南十五里祀盤古氏紫嶶祠在府城内東南即土主廟神姓張明萬厯時封紫薇大帝文昌閣在府城内洪武初建一在黄平州學宫内闗聖廟在府城内一在南闗各州縣俱有三郎祠在府城東十里按三郎竹王之子唐䝉開牂牁斬竹王土人思之求為立祠帝許之並封三子為侯及死配食父廟遂相沿祀之二郎廟在府城内祀灌口二郎神胡公祠在府城内西北明總兵胡從儀威讋諸苗郡民建祠祀之陳太守祠在府城内西北祀明太守陳紹英英修城建學有愛民實政民建祠祀之黒神廟在舊黄平州西門外祀唐南霽雲義烈祠在黄平州東坡站明巡撫郭子章建祀播叛時殉難諸人並置有祀田白馬廟在餘慶縣草坪祀漢伏波將軍馬援都勻府社稷壇在府城西門外風雲雷雨山川壇在府城東門外先農壇在府城東門外雍正五年奉國朝㫖建厲壇在府城西門外以上各州縣如制文廟在府城内崇聖祠在文廟後名宦祠鄉賢祠忠義孝弟祠節孝祠俱在府城内以上各州縣原設如制其清平縣雍正十三年燬於苗現在興修城隍廟在府城内東北隅州縣俱有東嶽廟在府城外一在獨山州城南文昌閣在府城内