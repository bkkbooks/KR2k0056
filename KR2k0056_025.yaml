body:
  text: 貴州通志卷二十五武備苖疆師旅始末雍正十三年二月賊苖包利紅銀等聚衆為亂犯古州王嶺汛城總兵韓勳遣遊擊唐開中向之榮禦之斬首十餘級賊遁官兵追至樂鄉韓勳飛咨總督巡撫提督遂以賊狀奏聞三月賊苖謀攻清江協城署副將曽長治攝清江通判事都勻府知府宋厚告急提督哈元生檄發官兵以遵義協副將宋朝相統領赴援朝相未至賊苖又聚衆數千圍攻台拱之番招汛總兵卜萬年遣遊擊邱中瑞張國秀擊退之賊遂聚集雞擺尾梗塞清江台拱大路萬年令遊擊姚宅中邱中瑞各帶所部兵由雞擺尾進援清江兵至交汪弗能前營於蓮花􅋭越一日朝相統兵至賊斷去路亦登蓮花􅋭與宅中等軍合賊乃乘勢圍􅋭元生萬年持令趣赴清江不應四月初九日賊苖燒劫鎮逺府屬卭水司二十餘寨人民被殺廬舍灰燼府城舊無城郭勢甚危迫貴東道黃世文鎮逺縣知縣蔡時豫練集鄉勇多方捍禦請救兵未至賊苖已犯近城之老虎頭卜萬年遣守備常富領兵三百禦之賊乃走圍勝秉攻之三日縣丞陽造極千總牛亮告急萬年遣守備陳文華往援初十日賊苖圍清江並北岸之柳羅營副將曽長治等發兵分禦之二十日柳羅乏糧長治令守備王承良齎糧至黃茅嶺與賊力戰柳羅營出兵夾擊賊退糧始達營二十一日賊苖陷凱里清平縣典史邵焕麟死之駐防把總曹萬國舉家遇害僅以身免居民千餘家盡遭屠戮時卜萬年聞凱里之變飛檄促宋朝相等撤回朝相乃乘夜撤兵千總郭占乾及兵丁數人被殺並失軍裝二十三日賊苗陷重安江驛燒劫沿江居民越三日陷黃平州知州羅嗚序死之先是賊未至時城內僅兵三十人適平伐營外委把總黃進忠帶兵五十人赴偏橋過州鳴序留與本城千總金升共守賊大至鳴序知不可為擇地瘞庫銀若干令家人齎印間道赴省繳藩庫與幕友陳憲同時縊死進忠亦戰殁金升手創妻子潰圍而走居民未避去者俱被害二十八日賊苗燒劫岩門新司倉糧次日燒劫舊司駐防把總梁璧戰死岩門司土官何其仁重安司土官張純全朗城司土吏目馮秉文等相擕赴水死其仁純全俱舉家遇害自苖變以來本省官兵徵調殆盡逆氛四起奔救不遑驛路阻塞省城戒嚴提督哈元生乃親出督師僅率兵三百餘人次於楊老總督尹繼善急發滇兵檄廣羅協副將周儀奇兵營參將哈尚德提標遊擊張接天等星馳赴援並飛咨楚粵四川發兵協剿閏四月朔四日賊苖攻黃平舊州城吏目陳彌祐遁去把總楊心鳯李榮拒敵被傷守備陳國斌領兵走上塘避之城遂陷初七日賊苖陷清平縣城駐防把總陳兆先卷戰被傷知縣邱中㫜外委把總張秉義俱逃時大定協副將紀龍駐城外帶兵入城逐賊苖始退城燬十八日賊苗陷餘慶縣城先是知縣朱若琦告急哈元生遣把總王兆元房育昆帶兵百人應之賊至居民奔避江外若琦兆元等不能堵禦遂同難民馳赴江外避之二十一日賊苗誘陷台拱之排咱汛殺提標守備高謀本汛官兵五百名得脫者止九十餘人二十四日賊苖犯八寨協城官兵併力禦之是時廣西左江鎮總兵王無黨率兵至古州聞八寨有警遂領兵進援賊始退五月朔有二日餘慶縣生員毛鄴首倡鄉勇數百人與石阡府經厯鄭嘉忠鄉約石中印等約把總王兆元房育昆克復餘慶縣城初三日賊苖誘陷小丹江汛千總劉文魁及兵丁二百人並其家屬盡被屠戮賊苖屢犯施秉縣城知縣蔡謹激勵士民親率鄉勇晝夜防禦卜萬年發兵來援圍始解居民避入山谷者為賊四出搜殺備極慘毒是時新疆逆苖多掠得重資回巢穴雖得城棄弗守內地附逆之苖聞滇兵至俱蟻聚重安江以塞要衝哈元生乃檄紀龍哈尚德等開通大路於是紀龍敗賊於大風洞遣守備陳思儀救獲難民四百餘口哈尚德屢敗賊於打鐵關乾塘月河等處黃平新舊兩城以次克復又與周儀紀龍等合兵攻重安江賊苗敗潰遂復重安驛時世宗憲皇帝命哈元生為揚威將軍元生聞命遂自楊老移駐清平遣紀龍周儀㑹兵於二十六日收復凱里二十七日逆苖陷青溪縣訓導談德溥遇害先是鎮逺青溪水陸梗塞貴東道黃世文告急於楚省湖南巡撫鍾保提督董芳遣提標遊擊韋國英洞庭協副將魏國泰撫標參將謝瓏等領兵先後至黔界分駐鎮逺大路一帶總督邁柱又委襄陽鎮總兵焦應林率兵二千來援哈元生檄止之令駐沅州不得進而賊勢蔓延漸逼青溪於是思州府知府甘士琇知縣鍾兆熊飛請鎮筸鎮沅州協各發兵一百名來縣防守是日賊大至楚省千總張通外委把總楊文富棄城走兆熊乃率同教諭劉景旦典史蔣鴻把總戴世爵古正文并兵民人等齊上城內北山拒守德溥衰老獨遇害賊犯北山兆熊等以死拒之兵民皆奮木石俱下賊乃退六月八寨協副將馮茂剿牙門九門等處苗懼乞降茂詐許之初四日假稱起營𣲖令運送軍裝至卡烏河殺六百餘人又誘縛苖頭三十五人解赴元生軍營斬訖以故諸苖怨忿叛志愈堅不可招撫矣元生自抵清平令參將哈尚德同遊擊崔傑由重安江剿沿江賊寨令黔西協副將康世顯同遊擊張接天由凱里剿江外賊寨有螃蟹寨者形勢最險固尚德㑹世顯夾剿之獲賊首老缺老典並逆屬數百餘口是月兩粵官兵先後至古州者八千人分調四千餘衆各處赴援韓勳與高州鎮總兵談行義廣東督標副將王濤共商行義駐古州彈壓勳與濤率兵進剿二十八日勳濤等駐營嶺賈搗燬高婆高表色同九董等寨七月世宗憲皇帝命湖廣提督董芳為揚威副將軍協剿逆苖命刑部尚書張照總理兵馬錢糧賑恤事務以都察院左副都御史德希壽副之行次沅州駐劄賊苖自陷排咱後即圍稿貢汛駐防守備李夢梅告急卜萬年遣遊擊張國秀尹承宗擊之承宗率兵將抵汛半里許賊苖突出把總王德成及兵丁陳亡十餘人萬年又親往至化夷臺失利而還遂飛咨告急元生遣康世顯進援本月初七日行至夭桃箐逆苖阻路官兵接戰外委桑之元及兵丁陳亡者十餘人世顯乃乘夜取徑繞稿貢後山而出十二日復與賊力戰威寧都司張文秀雲南守備林士昌把總蘇奎千總李天秩等俱戰死官兵傷亡者數十餘人至二十日世顯督兵復戰賊乃敗餉道始通是月古州總兵韓勳等移營高表令參將王鼐遊擊楊剛唐開中侯宏道等剿色同等寨獲賊女將儡央儡你參將王璋等剿高婆等寨獲賊首強銀汪尚八月總理張照德希壽副將軍董芳移駐鎮逺十二日董芳自鎮逺進至八弓維時參將哈尚德遊擊張接天董國棟姚宅中等敗賊於施秉始復新城斬首六十餘級獲男婦三十餘口貴州副將柳定國廣東副將馬成林湖廣副將李椅等破賊於清江柳羅圍解清江自三月被困無一人一騎之助者已逾半載哈元生飭定國等進剿於是由梁上至柳羅奪賊關者五破賊城者一摧賊營寨者六斬馘六十有七曽長治見援兵至發兵夾擊賊乃退散清江始通隨又乘霧擊柳受寨斬首三十餘級哈元生令其乘勝進攻台革時董芳檄調成林椅赴八弓不得前初總兵王無黨率兵進剿八寨將軍哈元生以八寨勢緩鎮逺勢急調駐勝秉及副將軍入黔凡楚粵官兵俱𨽻麾下遂調無黨移駐八弓令率同副將魏國泰參將鄭元文遊擊楊通仁韋國英等剿寨頭岑松等處克之韓勳令參將王鼐遊擊楊剛唐開中侯宏道等剿八昧烏公等寨獲賊首混唐女將包假斬馘三十餘級獲賊屬百數十人九月元生令四川副將壽長雲南參將哈尚德開通丹江先是四月內賊苖屢犯丹江參將馬世祿通判許錫昌告急以路阻不能達五月哈元生始遣副將周儀紀龍往援行抵開懷遇賊外委謝廷瓚陳亡六月朔四日周儀紀龍抵雞講糧運阻絶二十二日千總曹在朝賫糧赴丹江遇賊陳亡二十八日儀等與賊戰於平寨河邉守備武英千總孫榮把總向碩賓湯紹緒周連功加呂先賢陳英外委朱一鳯土目王廷紀俱戰死兵丁傷亡者二百餘人哈元生聞警調遊擊王先守備高宗瑾張鵬翥駐黃土􅋭都司陳思儀駐平寨又調副將馮茂周儀遊擊向之榮王欽協剿七月雲南遊擊胡大勇帶兵抵清平元生即令赴援十八日官兵啓行賊乘風雨驟至阻截糧運把總蔣忠外委馬國奇及官兵陳亡四十餘人次日涉河賊衆突出官兵力戰千總王之賢張麗天張忠萬金把總劉得玉王諭盧開元外委李士相陳德宏土辨沙盡渼等俱陳亡官兵死傷百二十餘人糧運始抵雞講二十六日丹江遣兵接糧又為賊阻殺把總李雲蒼及官兵三十餘人至八月丹江乏食益困兵丁多餓斃者世祿錫昌間道告急適總督尹繼善調川兵二千到黔哈元生即令副將壽長率其兵與哈尚德星援十九日破老鴨寨連擊賊營遂入丹江城糧運始通二十四日高州鎮總兵談行義剿滚縱克之是月將軍哈元生移駐凱里副將軍董芳移駐六甫十月朔副將壽長參將哈尚德遊擊馬踰隆辛永禕等與賊戰於烏耶關連破四城又破烏溜等寨斬首七十餘級獲男婦五十餘口十六日副將軍董芳遣總兵王無黨副將李椅參將鄭元文謝瓏遊擊楊通仁王自明余忠曽唯等剿六甫燬其寨斬馘百六十三級絞枉柳傍者磨等寨乞降獲賊首火利總兵韓勳令參將王鼐遊擊楊剛唐開中侯宏道等破賊於寨林寨翁斬馘七十餘級總兵談行義遣遊擊王璋王臣張守鳯等剿擺列及火燒仰黨喬扣等寨獲賊首老溢等八寨山苖犯八寨城又圍攻得祿汛同知魯朝聘遊擊陳綸告警元生調回遊擊李子昌都司魏子鳯守備余先魁等分剿之是月上命湖廣總督張廣泗總理兵馬錢糧賑恤事務撤張照回京旋命廣泗為經略揚威將軍以下俱受節制德希夀亦撤回十一月經略張廣泗抵鎮逺以賊首聚集九股清江之間必三路進攻乃可以潰其腹心散其黨羽於是分兵三路遣四川督標副將壽長貴州定廣協副將曽長治雲南奇兵營參將哈尚德等剿上九股等寨廣西左江鎮總兵王無黨貴州黔西協副將康世顯等剿下九股等寨令署台拱鎮總兵紀龍為䇿應以清江地廣賊衆廣泗率副將軍董芳親駐其城遣湖北襄陽鎮總兵焦應林廣東惠州協副將馬成林湖廣九溪協副將李椅貴州清江協副將柳定國等率兵進剿面授諸將方略尅期並發十二月經略張廣泗所遣官兵三路皆捷月朔壽長曽長治哈尚德等率兵抵開懷賊苖築城砌卡約數十處防拒甚嚴乃分兵進擊尚德率遊擊趙之祿姚宅中等破高寨壽長率遊擊馬踰隆辛永禕等破囊蒿寨長治率遊擊李正國都司米世泰等破長坡寨惟掛丁空稗最為險固為賊首枉汪等巢穴左右盤踞大小二十餘寨諸將先剪其旁十許寨至初四日始並力擊之賊以死拒守備周鳯祥率兵由後山呼噪而進賊始驚潰餘黨皆降十八日獲賊首曽柳二十日馬踰隆等克囊高交高鉛厰洞下等寨二十三四等日擒賊首枉汪枉保計斬首四百餘級生擒苗男婦大小百八十餘口獲大炮鳥鎗及兵械牲畜等項無黨紀龍世顯等前月率兵擊台雄寨廣西遊擊曽唯及千總熊祿把總史能方楊萬玉蔣可正曹廷棟等俱陳亡本月初四日無黨又分兵進剿有功加李林王奇兵目陳應富陸洪禮等皆敢死士也先登入其土城守備董正坤揮兵擁上奪賊二營守備郭乾奪賊一營遊擊張接天奪賊二營遊擊羅玉秀奪賊一營賊敗初十日復發兵奮擊無黨紀龍世顯親臨督戰奪賊十三營賊乃奔潰盡破其寨計斬首十有三級獲鎗械穀米等項馬成林柳定國等率兵剿雞擺尾賊苖築城於三關口成林偵其城中僅百餘人潛兵襲之連奪六城賊遁少頃賊數千奔至成林與都司王之臣分左右擊之焦應林遣參將溫朝宰率兵先至柳定國率兵繼至㑹兵奮擊賊敗入箐應林等密議以欲搗雞擺尾巨惡必先除雞右一帶賊黨以孤其勢十一日乃督兵至歹濃山燬其營壘二十餘所破雞右上中下數寨十三日復分左右翼進擊雞擺尾賊不能支棄寨而逃定國復取烏溜李椅取雞呼黨賊俱潰敗入箐前後斬首百八十餘級生擒男婦百七十餘口獲鎗械牲畜等項是月副將軍董芳被逮赴京乾隆元年正月經略張廣泗自清江巡視雞擺尾台雄空稗一帶軍情令總兵焦應林駐雞擺尾副將壽長駐空稗遊擊尹承宗駐台雄彈壓遂移節駐凱里調度諸將遣副將馬成林李椅柳定國等為一路以都勻府知府宋厚為監紀總兵王無黨副將康世顯為一路以鎮逺府知府劉為監紀兩路聲援㑹剿高坡一帶苗寨遣副將曽長治剿大丹江之烏堯防里等寨為左路守備吳仕佐等剿小丹江之烏叠留神等寨為右路參將哈尚德馬世祿等剿大丹江之桃繞雞勇等寨為中路三路並進㑹剿丹江又飛檄遊擊李子昌王先等直攻山苗巢穴使其彼此不及救應時續調之川兵二千名川北鎮總兵王廷詔統領前來廣泗即令其星赴丹江㑹合尚德兵協剿二月諸路官兵皆捷哈尚德率守備談盛元等進攻桃繞克其上中下三寨並雞勇皆騷等寨馬世祿與遊擊姚宅中等進攻囊蕩黃毛克之並剿洗交霜等寨吳仕佐進攻蜂螳寨克之並焚剿東仰枯桶等寨守備戴虎進攻烏稍烏叠等寨曽長治攻克烏堯防里等寨進與尚德兵合有馬家雞勇二􅋭對峙河壖尚德選精壯八十人乘夜赴馬家􅋭賊築城於隘非可力取乃放火箭燒死三百餘人乘勢遂破雞勇􅋭王廷詔率兵前進分遣參將李文秀克抱得寨遊擊孔文彬克烏溜寨亦與尚德兵合廣泗飭廷詔率兵駐丹江尚德赴高坡㑹清江台拱兩路官兵於是尚德與馬世祿等又進搗䟎革排老等十餘寨餘賊逃竄山箐旋剿蓮花撈烏撈密等寨克之又攻䟎坳支舟等寨諸苖皆乞降王無黨康世顯劉等克交上寨斬獲甚多馬成林李椅柳定國宋厚等剿烏羅反牌二寨圍擊之賊棄寨奔烏羅關楚粵兵分路夾攻賊奔入深溝遊擊余忠守備周岐山等伏兵齊起殺賊溝水為赤無黨世顯等進攻交工寨馬成林等合兵㑹剿共克其四寨並克汪江篩過䟎甲南豆等寨無黨等遂進剿南工其寨分踞大河兩岸山形壁立地險苖稠乃與李椅等定議率兵攀援而上奮力夾攻之遂克其寨次日又攻歹賴一鼓而克無黨世顯成林定國等克烏西烏熙二寨遂進攻交包奪賊三城並其一營賊乃竄入雞花官兵直抵雞花後山劄營搗燬昻焉昻速昻倩等寨共斬馘百數十級生擒男婦數十口八寨遊擊李子昌前曽剿擺調方勝等寨擒賊首阿扛父子經略張廣泗飭令㑹遊擊王先兵營於擺調復檄令副將曽長治攻克丹江之後即進與子昌王先兵合以都勻府知府孫紹武為監紀並飭上江協副將王耀祖率兵來㑹同剿山苖於是王耀祖與守備姜諧五等克加支寨與長治兵㑹攻喬港兩跨䟎披擺保羊烏等寨並克之談行義克擺弔烏㜑二寨韓勳克扣里洞里羊弔等寨俱有斬獲三月經略張廣泗調兵㑹剿牛皮箐箐在新疆之中綿亘數百里不一其名丹江雞講在其北古州上江在其南八寨九門在其西南清江台拱在其東北地極深險逆苖恃為淵藪賊首多竄匿其中是時清江台拱兩路官兵已至雞花交包駐劄朗洞滚縱二路官兵已至羊色洞里駐劄總兵王廷詔已進烏堯在舊駐劄參將哈尚德已橫過大箐直抵番祥駐劄副將曽長治已抵加照副將王耀祖已移營柳排駐劄星羅碁布八面圍攻廣泗又飭總兵焦應林副將壽長等於箐外堵禦以防竄逸四月牛皮大箐平獲賊首包利枉利等並其家屬凡妄稱名號者悉就擒獲總兵王廷詔𣲖遣參將李文秀馬世祿等㑹副將曽長治分左右二路剿交蠟喬落等箐其皆􅋭一寨為賊居停且糶米資賊長治文秀合兵剿之康世顯柳定國等搜剿交别排蠟等箐進㑹哈尚德兵剿交那寨又圍交烏交歪二寨克之回至雞花軍營共斬馘三十餘級獲男婦二百餘口副將周儀遊擊孔文彬等搜烏堯箐至烏東與哈尚德㑹共斬馘九十四級擒男婦四百七十餘口總兵韓勳遣參將王鼐遊擊唐開中楊剛等搜羊色等箐斬馘百六十餘級生擒百八十餘口又剿旁洞等寨斬馘九十餘級生擒男婦百餘口總兵談行義遣遊擊王璋等搜洞里箐斬馘三十五級獲男婦三十餘名五月牛皮箐搜剿已竣經略張廣泗移駐清江指揮諸軍是時揚威將軍哈元生被逮赴京上以左江鎮總兵王無黨署貴州提督廣泗令無黨駐營岩門督理凱里黃平施秉台拱一帶軍務以新升貴西道劉協同辦理飭雲南永北鎮總兵劉永貴督理清江下河南北兩岸軍務以新升貴東道宋厚協同辦理其各鎮協營俱飭令分路剿捕又檄都勻府知府孫紹武黎平府知府滕文炯清江通判蔡時豫永寧州知州王遂清平縣知縣劉樵施秉縣知縣蔡謹普定縣知縣陽造極等隨軍協辦凡有擒獲合同研訊殱魁宥脅期在區别頑良無枉無縱六月丹江平總兵王廷詔遣遊擊楊澤厚馮志達都司張懷元等於初八日率兵發自高坡營於䟎黎囊蕩適中之地沿箐窮搜斬賊四級擒苖婦二口惟桃繞烏叠等寨為丹江渠凶餘黨猶未盡殄廷詔乃遣參將馬世祿遊擊楊澤厚等率兵擊之斬馘二百餘級俘男婦三百一十餘口七月古州平總兵韓勳遣遊擊唐開中楊剛侯宏道等克月姑元賽八輸盤噶高定翁腳唐流九衣等寨又克寨牙寨户棉花新寨高苖等寨共斬馘八百二十餘級擒男婦子女六百九十餘口黎平營遊擊趙國儀克培耶斬牙南孟培牛等寨共斬馘六百六十餘級擒男婦四百六十餘口總兵談行義遣遊擊張守鳯等克擺列寨又親督遊擊王臣等剿火燒仰黨喬扣等三寨共斬馘百六十餘級擒婦女六十餘口八月台拱施秉凱里黃平八寨等處悉平提督王無黨遣參將張接天等剿革東都司馬國祚等剿苗江守備郭乾剿方家寨祁文魁剿吳家寨令副將康世顯督兵搗洗斬馘七十餘級擒男婦三十餘口副將姜煓曽參將陳有功等剿五岔克之斬首百九十餘級擒男婦七十餘口世顯令都司馬國祚等剿捕稿武箐斬馘八十級俘男婦八十餘口進攻岑邦又斬馘二十餘級遊擊尹承宗剿凱里之台盤打革弄賽䟎舍世柳等寨斬馘百餘級擒男婦五百六十餘口世顯剿黃平之革夷等寨擒男婦六十餘口進剿望虎稿貢等寨斬馘二十餘級生擒三十餘口無黨檄遊擊董國棟等剿白壩龍塘二寨斬馘四十餘級擒男婦百七十餘口又檄副將姜煓曽等剿八梗舊舟二寨斬馘二百六十餘級擒男婦二百餘口又進剿陽調井干等寨斬馘亦百餘級副將曽長治剿番仰番扛番甕羊堯擺卓烏號令山箐兵威所到勢如破竹旋師八寨又剿牙門楊牌楊烏等寨共斬馘三百五十餘級擒男婦子女共三百九十餘口九月清江下河南北兩岸苗寨悉平副將馬成林哈尚德柳定國等剿九甫寨與賊鏖戰自辰至未賊乃大敗遂沿江分剿成林率都司王之臣等擊繞號寨賊不敢敵乘船欲逃官兵擊沉二船賊盡溺死定國與參將謝瓏擊培鵝䟎賴二寨克之尚德率兵臨反受其寨踞懸岩之上背繞大河賊據險對敵尚德以鎗炮誘賊於前與之相持隂使三百人渡河緣崖繞攻其後賊首尾受敵遂破之總兵劉永貴駐兵梁上遣遊擊趙國儀剿培鳩寨國儀設伏要隘率重兵直壓賊巢悉駢戮之柳旁汪刀之苖多有匿箐者永貴又遣參將謝瓏遊擊趙國儀楊通仁趙璧等分路搜剿瓏國儀率兵入箐頗多斬殺通仁入箐有男婦數百人俯伏乞命官兵往殺數人苗惟哀懇不去通仁不忍加戮苖乃下岩就縛趙璧入箐亦有男婦號呼乞命璧亦不加誅令自縛赴營永貴與貴東道宋厚訊令供出凶頑斬之其餘五百口悉准安插副將哈尚德遊擊趙國儀等攻克柳受培鳩二寨參將謝瓏遊擊趙璧等攻克九寨柳寨柳定國馬成林等攻克黨領寨遊擊趙國儀楊通仁等攻克高邱寨副將李椅與遊擊余忠等攻克九丟歹旦二寨馬成林與都司王之臣等攻克柳拉寨俱大有斬獲副將姜煓曽參將溫朝宰等合兵擊抱金絞狂二寨官兵圍抱金其男婦號泣乞命煓曽令自擒首凶來獻諸苗乃縛出七十人並獻其家屬百二十口次日擊絞狂亦自獻首凶十餘人又克台革柳羅二寨斬馘二百餘級擒男婦三百九十餘口十月經略張廣泗乃由清江巡視諸軍遍歷古州上江八寨丹江等處旋節凱里新疆內地軍務全竣六省官兵以次凱旋捷聞上命廣泗總督貴州兼攝巡撫事務世襲三等輕車都尉廣泗以下叙功賜階有差姑盧始末乾隆三年三月頑苖阿沙等作亂總督張廣泗剿平之阿沙者定番州姑盧寨苖也其父老排恃其寨大族豪素行不法鄰寨屢受其害莫敢與爭乾隆二年二月老排牽揑細故率阿沙等往谷栗寨索詐漢民路經大樹寨見向登雲牧牛在野殺其人而奪之州牧貟懷英驗報弋獲老排收禁並捕其凶黨伊子阿沙阿王侄阿些阿務等遂聚族拒捕久之知罪在不赦乃糾衆數百餘人於三年二月十九日赴雞場虜去漢民張具清陳士林楊君相三人為質以索伊父二十四日又燒甲浪店房虜去客民官勝萬殺傷謝安陳倫等劫貨而歸聲言老排不出即犯城汛三月初二日果犯羡場塘虜去州民曽發元箭傷兵丁榮起臣並客民數人總督張廣泗提督王無黨檄令地方文武曉諭弗聽因決議剿之飭委署大定協副將馬似龍率漢土官兵千二百人由方番司進定廣協副將哈尚德率兵九百人由明通關進提標遊擊董國棟率兵六百人駐堵召公鵝二處堵禦遙為聲援又令都勻協遊擊陳綸率兵七百餘人由牙舟進官兵既集阿沙等聚於山頭與軍營對駐似龍尚德擊退之乘夜又犯陳綸營綸伏兵以俟賊遇伏驚潰綸出揮兵追之飛矢傷其胸二十五日定廣協外委吳洪業白納司土官周釗方番司土官方銑等用計誘擒阿沙其黨遂懈次日官兵搗燬老排所居下新寨阿沙所居石頭寨並附近之冗心花寨江西寨石板寨以次焚燬救被虜之漢民張具清陳士林曽發元官勝萬等而出逆苖逃竄入箐四月初八日官兵抵箐搜捕餘黨擒三十一人次日至公鵝大箐又擒男婦大小三十二人並獲弓箭盔甲牛馬等物衆苖悔懼叩首咸願獻凶贖罪於是各寨苗頭李老么等縛老排諸子姪阿王阿猛阿惹阿虛等來獻阿密等又擒大石板寨逆苗阿噶阿擦阿喳阿們阿固阿左阿先等男婦十六人來獻十六日大定協千總劉平漢定廣協千總黃亮等擒大石板寨首逆阿粟阿故並逆苖阿蒙等下羊腸寨首逆阿著阿唐阿們等共十人十九日又搜獲小石板寨逆苖老立猛並婦女七人二十二日安順營守備解大壯搜獲逆苖阿們等並男婦三十餘人俱送按察司訊擬正法計出師旬餘日事竣凱旋先是總督張廣泗籌畫通省營制原題請於高寨地方駐兵彈壓事未及行忽有是役乃距姑盧十五里改築城於大塘撥本協官兵四百名並請設州判一員分駐其地以資治理焉貴州通志卷二十五
