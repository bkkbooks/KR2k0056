body:
  text: 貴州通志卷十一食貨志序户口蠲恤田賦積貯課程物産經費貴州物産鮮少生計瘠薄民間無終歲蓄故通十三府計之户口才二十萬土地磽確惟正之供不敵中土一大縣雖山産鉛汞商𣙜課稅以少佐軍國然視江淮關津之征雲南銅鹽之利僅矣而官吏師生軍伍郵傳諸經費且至百萬仰給他省國家奚利焉顧山川風氣有時而開淮海惟揚州在禹貢厥田下下厥賦下上而自唐宋以後財賦遂甲天下豈非人聚則土闢土闢則物豐財賄資用自饒給歟我朝浩蕩之恩令天下孳生户口永不加賦貴州軍伍屯田許民間占為永業不取其值大澤深仁煦育蒸濡民蕃物阜豐亨豫大之道在是矣述食貨志食貨户口宋以前無考元至元十六年七月西南八番羅氏等國來附洞寨凡千六百二十有六户凡十萬一千一百六十有八二十六年六月西南夷中下爛土等處洞長忽帶等以洞三百寨百一十來歸得户三千餘閏十月西南生番心等八族計千六百二十户內附二十九年正月八番都元帥劉德祿言新附蠻洞因籍户懷疑竄匿詔招集之詔曰爰自前宋歸附五十餘年閲實户數乃有司當知之事諸郡皆然非獨爾播自今以往咸奠厥居流移失所者招諭復業有司常加存恤毋致煩擾重困吾民二月烏魯斯招附桑州生苗羅甸國古州等洞酋長三十一所部民十二萬九千三百二十六户詣闕貢獻三十一年減八番所設官二百一十六員八番稱新附九十萬户設官四百二十四員及遣官核實止十六萬九千餘户故減之三十八年十二月八番洞官吳金叔等以所部二百五十寨民二萬有竒內附詣闕貢方物泰定元年八番生蠻韋光正等及黃楊五種人以其户二萬七千來附請歲輸布二千五百匹置長官司以撫之順帝至元四年五月詔湖廣行省元領新化洞古州潭溪龍里洪州諸洞三百餘處洞民六萬餘户分隸靖州明𢎞治十五年貴州布政司户四萬三千三百六十七口二十五萬八千六百九十三萬厯六年貴州布政司户四萬三千四百五口二十九萬九百七十二國朝貴州布政司原額户口一十七萬五千三百三十五户雍正五年新收四川割歸遵義一府五州縣户口三萬八百八十四户又收湖南廣西割歸天柱荔波二縣更名永豐州開泰錦屏玉屏青溪等縣原無户口雍正五年割永寧縣隸四川除户口二千二百四十二户八年割威寧州屬可渡橋西地隸雲南除户口八百六十六户雍正十年又收四川敘永廳赤水河南地方隸畢節縣户口五十八户又割畢節縣屬赤水河北地方隸四川無原額户口又各府新增户口六萬九千五百十八户實在户口二十七萬二千六百八十七户原額人丁一十五萬八千二百九十丁內除九萬六千六百九十八丁原不編差並隨田帶泒亦不徵差外實額編差人丁六萬一千五百九十二丁內除節年清編抵補外尚逃亡人丁四萬二千八百六十三丁七分一釐一毫六絲又康熙三十一年至三十五年編增額外人丁並提督舉報官莊人丁一千二百六十四丁康熙三十五年編審實在徵差人丁一萬九千九百九十二丁二分八釐八毫四絲是年纂修通志照編審實數原額丁差及隨田帶泒丁銀二萬二千八百五十四兩八錢七分七釐三毫七絲一忽六微四塵八纖六渺內除逃亡無徵銀一萬五千四百五十一兩四錢一分二釐一毫九忽六微一塵四纖四渺康熙三十五年編審實在有徵丁差銀七千六百五十六兩五錢八分一釐九毫四絲七微八渺又三十五年至五十年增徵差人丁一千三百九十六丁康熙五十年編審實額徵差人丁二萬一千三百八十八丁二分八釐八毫四絲實額徵丁差銀八千一百七十四兩四錢八分二釐四毫九絲三忽五微四塵四渺外銅仁府屬遇閏加增銀五兩六錢六分五釐五毫六絲五忽六微五塵四纖八渺無閏之年不加是年欽奉恩詔以後編審滋生人丁永不加賦雍正五年割永寧一縣隸四川除原額人丁二千三百一十五丁內實在徵差人丁二百五十五丁又除威寧州撥歸雲南人丁一百七十四丁又施秉縣撥歸湖南一十五丁共除徵差人丁四百四十四丁除徵丁差銀六十五兩六錢雍正五年新收湖南割歸天柱縣更名開泰錦屏玉屏青溪等縣人丁五千八百六十二丁三分四毫四絲六忽三微五塵九渺內除豁免并隨糧帶泒及減除人丁一千四百四十九丁丁銀二兩外實徵差人丁四千四百一十三丁三分四毫四絲六忽三微五塵九渺實徵丁銀二百一十八兩三錢七分八釐四毫六絲二忽二微七塵二纖七渺七漠六茫六沙二漂又新收四川割歸遵義一府五州縣原額隨田起徵人丁一萬二千一百八十二丁七斗六升二合七勺一抄八撮四圭七粒七粟三末內除新墾尚未起徵田人丁三丁六斗七升五勺四圭實徵差人丁一萬二千一百七十九丁九升二合三勺九抄八撮七粒七粟三末實徵丁差銀五千三百一十一兩八錢五分一毫九絲一忽二微七塵七纎六渺雍正九年編審實額徵差人丁二萬五千三百五十七丁五分九釐二毫八絲六忽三微五塵九渺又隨田起徵人丁一萬二千一百七十九丁九升二合三勺九抄八撮七粒三粟三末實額徵差並隨田帶泒銀一萬三千六百三十九兩一錢一分一釐一毫四絲七忽九塵七渺七漠六茫六沙二漂內於雍正十年改徵米石銀一千一百六十八兩二錢六分四釐九毫一絲九忽四微六塵二纖改徵米一千四百八十八石三斗二升一合一勺一抄四撮八圭三粒九粟外實徵銀一萬二千四百七十兩八錢四分六釐二毫二絲七忽六微二塵八纖七渺七漠六茫六沙二漂又於雍正十年割畢節縣屬赤水河北地方隸四川原額人丁一千九百七十五丁原額丁差銀一百九十七兩五錢內有逃亡人丁一千九百十二丁實除現徵丁差人丁六十三