body:
  text: 貴州通志卷二十一秩官土司漢公孫述時牂牁大姓龍傳尹董氏與郡功曹謝暹保境為漢乃遣使從番禺江奉貢光武嘉之並加褒賞永初元年九真徼外夜郎蠻夷舉土內屬開境千八百四十里以上俱見後漢書唐昆明東九百里即牂牁國也兵數出侵地數千里元和八年上表請盡歸牂牁故地開成元年鬼主阿珮內屬會昌中封其别帥為羅甸王世襲爵其後又封别帥為滇王牂牁蠻首領姓謝氏至龍羽有兵三萬武德三年遣使者朝以其地為牂州拜龍羽刺史封夜郎郡公其北百五十里有别部曰兗州蠻勝兵二萬亦來朝貢以其地為兗州貞觀三年有南謝蠻首領謝疆來朝以其地為莊州授疆刺史開元中牂牁酋長元齊死孫嘉藝襲官封其後乃以趙氏為酋長二十五年趙君道來朝其裔有趙國珍天寶中戰有功閣羅鳯叛宰相楊國忠兼劍南節度使以國珍有方略授黔中都督屢敗南詔護五溪十餘年天下方亂其部獨寧終工部尚書建中三年大酋長檢校蠻州長史資陽郡公宋鼎與諸謝朝賀德宗以其國小不許訴於黔中觀察使王礎以州接牂牁願隨牂牁朝賀礎奏牂蠻二州尸繁力強為鄰蕃所憚請許三年一朝詔從之貞元中官其酋長趙主俗亦以褒朝貢不絶至十八年五遣使朝元和二年詔黔南觀察使常以本道將為押領牂牁昆明等使自是數遣使或朝正月迄開成不絶故事戎夷朝貢將至都中官驛勞於郊既及館恩禮尤渥以上俱見唐書宋溪洞諸蠻皆古槃瓠種唐虞為要服周世其衆彌盛宣王命方叔伐之楚莊既霸遂服於楚秦昭王使白起伐楚略取蠻夷置黔中郡漢改為武陵後漢建武中大為寇鈔遣伏波將軍馬援等至臨淮擊破之渠帥飢困乞降厯晉宋齊梁陳或叛或服隋置辰州唐置錦州溪州巫州敘州皆其地也唐季之亂蠻酋分據其地自置為刺史晉天福中馬希範承襲父業據有湖南時蠻徭保聚依山阻江殆十餘萬至周行逢時數出寇邊逼辰永二州殺掠民畜無寧歲太祖既下荆湖思得通蠻情習險扼勇智可任者以鎮撫之有辰州徭人秦再雄者長七尺武健多謀在行逢時屢以戰鬬立功蠻黨伏之太祖召至闕下察其可用擢辰州刺史官其子為殿直賜豫甚厚仍使自辟吏屬豫一州租賦再雄感恩誓死報效至州日訓練土兵得三千人皆能披甲渡水厯山飛塹捷如猿猱又選親校二十人分使諸蠻以傳朝廷懷來之意莫不從風而靡各得降表以聞太祖大嘉復召至闕面加奬激改辰州團練使又以其門客王允成為辰州推官再雄盡瘁邉圉五州連袤數千里不增一兵不費帑庾終太祖世邉境無患開寶九年奬州刺史田處逹以丹砂來貢太平興國三年夷州蠻任朗政等來貢淳化三年錦州刺史田保全遣使來貢五年奬敘錦費等州皆來貢咸平元年古州刺史向通展以芙蓉硃砂二器馬十匹水銀千兩來獻詔有司鑄印以賜通展二年高州刺史田彥伊子承寶等百二十二人來朝賜巾服器幣以承寶為山河使九溪十洞撫諭都監景德元年高州五姓義軍指揮使田文鄯來貢三年高州新附蠻酋八十九人來貢天禧四年古州向光晉遣使鼎州營僧齋以祝聖壽二年知古州向光晉自言嘗創佛寺請名報國歲度僧一人許之唐末王建據西川牂牁諸蠻由是不通中國後唐天成二年牂牁清州刺史宋朝化等一百五十人來朝其後孟知祥據西川復不通朝貢乾德三年平孟昶五年知西南夷南寧州蕃落使龍彥瑫等遂來貢詔授彥瑫歸德將軍南寧州刺史蕃落使又以順化王武才為懷化將軍武才弟若啓為歸德司階開寶二年武才等一百四十人又來貢以武才為歸德將軍又乞賜武才鈿函手詔以舊制所無不許四年其國人詣涪州言南寧州蕃落使龍彥瑫卒歸德將軍武才及八刺史狀以彥瑫子漢瑭為嗣詔授漢瑭南寧州刺史兼蕃落使八年三十九部順化王子若發等三百七十七人來貢馬百六十匹丹砂千兩太平興國五年夷王龍瓊琚遣其子羅若從并諸州蠻七百四十四人以方物名馬來貢六年保州刺史董竒死以其子詔重繼之雍熙二年八月奉化王子以慈等三百五十人以方物來貢夷王龍漢璿自稱權南寧州事兼蕃落使遣牂牁諸州酋長趙文橋率種族百餘人來獻方物名馬并上蜀孟氏所給符印授漢璿歸德將軍南寧州刺史以文橋等並為懷化司戈端拱二年漢璿又貽書五溪都統向通漢約以入貢淳化元年漢璿遣其弟漢興來朝三年夷王龍漢興及都統龍漢􅚜刺史龍光顯龍光盈及順化王雨滯等各貢馬硃砂咸平元年龍漢􅚜遣使龍光晪又率牂牁諸蠻千餘人來貢授光晪等百三十人官三年都部署張文黔來貢五年漢􅚜又遣牙校率部蠻千六百人馬四百六十匹並藥物布帛等來貢賜冠帶於崇德殿厚賚遣還六年知全州錢絳請招誘溪洞名豪上以生事寢其奏不報景德元年詔西南牂牁諸國進奉使親至朝廷者令廣南西路發兵援之勿抑其意先是龍光進等來朝上矜其道遠人馬多斃因詔宜州自今可就賜恩物至是懇請詣闕從之大中祥符八年夔州路上言南寧州夷族張聲進遣進奉為蕃落使龍漢􅚜邀奪讐劫不已乞降勑書安撫天聖四年龍光凝康定元年龍光琇景祐三年龍光辨慶厯五年龍以特皇祐二年龍光徹等繼以方物來貢獻與以特俱至者七百十九人是年以安遠將軍知蕃落使龍光辨為寧遠軍大將軍龍光凝龍異豈並為安遠大將軍龍異魯為武寧大將軍至和中龍以烈龍異靜首領張漢升王子羅以崇等皆入貢命其首領而下九十三人為大將軍至郎將嘉祐中以烈復至宋初以來有龍蕃方蕃張蕃石蕃羅蕃者號五姓蕃皆常奉職貢受爵命治平四年十二月知靜蠻軍蕃落使守天聖大王龍異閣等入見詔以異閣為武寧將軍其屬二百四十一人各授將軍及郎將熙寧元年有方異三年有張漢興各以方物來獻授異靜蠻軍漢興捍蠻軍並節度使六年龍蕃羅蕃方蕃石蕃八百九十人入覲貢丹砂氊馬賜袍帶錢帛有差其後比歲繼來龍蕃衆至四百人往返萬里神宗憫其勤詔五姓五歲聽一貢人有定數無輒增加及别立首領以息公私之擾命宋敏求編次諸國貢奉録客省四方館撰儀皆著為式元豐五年張蕃乞添貢奉人至三百詔故事以七十人為額不許七年西南程蕃乞貢方物願依五姓蕃例注籍從之元祐二年西南石蕃石以定等齎表自稱西平州武勝軍禮部言元豐著令以五年一貢為限今年限未及詔特令入貢五年八年紹聖四年龍蕃皆貢方物龍氏於諸姓為最大其貢奉尤頻數使者但衣布袍至假伶人之衣入見蓋實貧陋所冀者恩賞而已故事蠻夷入貢雖交趾于闐之屬皆御前殿見之獨此諸蕃見於後殿蓋卑之也元符二年又有牟韋蕃入貢詔以進奉人韋公憂公市公利等為郎將諸蕃部族數十獨五姓最著程氏韋氏皆比附五姓故號西南七蕃云渝州蠻者古板楯七姓蠻唐南平獠也其地西南接烏蠻昆明哥蠻大小播州部族數十居之治平中熟夷李光吉梁秀等三族據其地各有衆數千家間以威勢脅誘漢戶有不從者屠之沒入土田往往投充客戶謂之納身稅賦皆里胥代償藏匿亡命數以其徒偽為生獠劫邉民官軍追捕輒遁去習以為常密賂黠民覘守令動靜稍築城堡繕器甲遠近患之熙寧三年轉運使孫固判官張詵使兵馬使馮儀辨簡杜安行圖之以禍福開諭因進兵復賔化寨平蕩三族以其地賦民凡得租三萬五千石絲綿一萬六千兩以賔化寨為隆化縣隸涪州建榮懿扶歡兩寨其外銅佛壩者隸渝州南川縣地皆膏腴自光吉等平他部族據有之朝廷因補其土人王才進充巡檢委之控扼才進死部族無所統數出盜邉朝廷命熊本討平之建為南平軍以渝州南川涪州隆化隸焉元豐四年有楊光震者助官軍破乞弟殺其黨阿訛大觀二年木攀首領趙泰播州夷族楊光榮各以地內屬詔建溱播二州後廢瀘州西南徼外古羌夷之地漢以來王侯國以百數獨夜郎滇邛都嶲昆明徙莋都冉龐白馬氐為最大夜郎在漢屬牂牁郡今涪州之西溱播珍等州封域是也滇在漢為益州郡今姚州善闡之地是也卭都嶲州會同川與吐蕃接今卭部州蠻所居也嶲今嶲州昆明在黔瀘徼外今西南蕃所居也徙今雅州嚴道地莋都在黎州南今兩林及野川蠻所居地是也冉龐今茂州蠻汶山夷地是也白馬氐在漢為武都郡今階州汶州蓋羌類也此皆巴蜀西南徼外蠻夷也自黔恭以西至涪瀘嘉敘自階又折而東南至威茂黎雅被邉十餘郡綿亘數千里剛夷惡獠殆千萬計自治平之末迄於靖康大抵皆通戶市奉職貢雖時有剽掠如鼠竊狗盜不能為深患參考古今辨其封域以見琛贐之自至梯航之所及者爾若夫邉荆楚交廣則係之溪洞云以上俱見宋史元世祖至元十四年三月庚戌田楊二家豕鵝夷民各遣使納欵十六年九月戊午招諭西南諸蠻部族酋長能率所部歸附者官不失職民不失業二十四年十二月金築寨主掃閭等以所部百二十五寨內附二十六年六月甲戌西南夷中下爛土等處洞長忽帶等以洞三百寨百一十來歸得戶一千餘閏十月丙戌西南生番心等八族計千一百六十戶內附二十七年二月戊寅播州安撫楊漢英進雨氊千三月庚申置金築府大隘四十二寨蠻夷長官九月戊申金築府知府掃閭貢馬及雨氊且言金築府雖內附蠻民多未服近與趙堅招降竹古弄古魯花等三十餘寨乞立縣設長官把總參用土人從之二十八年八月己卯詔諭思州提省溪洞官楊都要招安叛蠻悔過來歸者與免本罪中書省臣言洞蠻歲進馬五十匹雨氊五十被刀五十握丹砂雌雄黃等物率二歲一上詔從其所為十一月己卯新添葛蠻宋安撫率洞官阿汾青貴來貢方物十二月丙戌八番洞官吳金叔等以所部二百五十寨民二萬有竒內附詣闕貢方物二十九年正月乙巳從葛蠻軍民安撫使宋子賢請招諭未附平伐大甕眼紫江皮陵潭溪九堡等處諸洞苖蠻二月甲子朔金築酋長掃閭貢馬氊各二十有七從其請減所部貢馬詔招諭之賜新附黑蠻衣襖遣回命進所産硃砂雄黃之精善者無則止庚午烏魯斯招附桑州生苖羅甸國古州等洞酋長三十一所部民十二萬九千三百二十六戶詣闕貢獻庚戌賜蘇克斡魯賽音布哈蠻夷之長五十六人金紋綾絹七十九匹及弓矢鞍轡九月丁卯新附茆十圍安化等洞蠻凡八萬設管民司以其土人蒙意蒙世莫仲文為長官以吕天祐塔布岱為逹嚕噶齊八番烏魯斯招附光蘭州洞蠻置定遠府以圖罕高守文黃世曾揚濟克為逹嚕噶齊知府同知判官十一月丙戌提省溪錦州銅人等洞酋長楊朝秀等六人入見進方物三十年三月丁未以新附洞蠻吳勳為潭溪等處軍民官佩虎符四月己亥省八番重設州縣官約尼烏魯斯請以八番見戶合思播之民兼管徙宣慰司治辰沅靖州常賦外歲輸鈔三千錠不允金築府馬麟等一十六人大龍番秃盧忽等五十四人各授蠻夷官賜以諭書遣歸壬戌定雲洞蠻酋來附成宗貞元二年十二月賜羅斛來朝人衣大德元年五月戊辰給葛蠻安撫司驛劵一庚寅平伐酋長內附乞隸亦奚不薛從之六月戊戌平伐九寨來降立長官司九月壬戌八番順元等處初𨽻湖廣後改𨽻雲南雲南戍兵不至其屯駐舊軍逃亡者衆乃命湖廣行省遣軍代之十一月丁丑增烏蒙烏撒等處宣慰司楊漢英請以己力討平伐等未附蠻三年正月癸未羅斛以方物來貢武宗至大三年九月己卯平伐蠻酋不老丁遣其姪與甥十人來降升平伐等處蠻夷軍民安撫司同知陳思誠為安撫使佩金虎符四年五月戊子羅鬼蠻來獻方物仁宗延祐五年五月辛酉朔順元等處軍民宣撫使阿畫以洞蠻