廷遣使祭之的貢馬謝恩的死子卜葩襲葩死子中襲中老姪聚襲聚死姪隴富襲時正統七年也隴富自陳祖父以來纍朝皆賜金帶臣蒙恩受賜乞如例從之是時宋誠之子斌年老以子昻代昻死然代十四年賜敕隴富母子嘉其調兵保境之功隴富頗驕天順三年東苖之亂富不時出兵聞朝廷有意督之乃進馬謝罪賜敕警之富死姪觀襲觀老子貴榮襲巡撫陳儀以西堡獅子孔之平由致仕宣慰觀與子貴榮統步衆二萬攻白石崖四旬而克家自餽餉口不言功宜旌擢特給觀正三品昭勇將軍誥先是貴州兩宣慰安氏世居水西管苖民四十八族宋氏世居貴州城側管水東貴築等十長官司皆設治所於城內銜列左右而安氏掌印非有公事不得擅還水西至是總兵官為之請許其以時巡厯所部趣辦貢賦聽暫還水西以印授宣慰宋然代理然安氏驕蹇不受節制即聽調從征非邀重賞不赴且渺視官軍嘗睥睨省城曰是直用水西氊衫疉塞耳正德中榮以從征香爐山有功加貴州布政司參政猶怏怏乃奏乞減龍場諸驛以賞其功事下兵部議時兵部主事王守仁以建言謫龍場驛丞榮敬禮之守仁乃貽書責榮止其事書載藝文志既而貴榮老請以子萬鍾襲命賜貴榮父子錦紵表裏先是宋然貪淫所管陳湖等十二馬頭苖民皆為科害致激變而貴榮欲并然地復誘之作亂於是阿朵等聚衆二萬餘署立名號攻陷寨堡襲據然所居大羊場然僅以身免貴榮遽以狀上冀令已撫按之會阿朵黨泄其情軍進討貴榮懼乃自率所部為助及賊平貴榮已死坐追奪然坐斬然遂奏世受爵土負國厚恩然變起於榮而身陷重辟乞分釋因從末減依土俗納粟贖罪都御史遂請以貴築平伐七長官司地設立府縣皆以流官撫理巡撫覆奏以蠻民不願巳之然宋氏亦遂衰子孫守世官衣租食稅聽征調而巳時安萬鍾既襲驕縱不法甚於榮漢民張紞土目烏挂等導之惡每遊獵酒酣輒射人為戲嘗撻夷民角藥抹鬼阿內抹蔥四人怨之一日集督府督府未出候於外有賊創萬鍾頭去索賊不得既而稍稍知為角藥四人四人遁時萬鍾無子其三弟萬鎰宜襲鎰以賊未獲故辭謝間紞與烏挂遽保其疏族普者冒萬鎰弟曰萬鈞告襲指揮胡永逺朱蕃祖勳前後承勘受其賄匿情報鎮巡等官謂普者襲是但普者幼請暫委鍾妻奢播攝宣慰使待普者年長而後承襲於是萬鎰悔辭謝使人説烏挂不聽大恨之乃借所親雲南女土官奢爵兵並己兵共數千人襲烏挂烏挂覺之亦募兵數千相讐殺而角藥抹鬼阿內三人適在境為亂兵所斃惟抹蔥逃烏挂誣鎰殺兄鎰亦誣兄為挂所殺疏十餘上下鎮巡勘驗巡按胡瓊上狀言萬鎰宜襲但與烏挂互相誣訐宜各治罪令輸贖紞坐逺戍蕃勳永逺奢爵俱逮問梟角藥等首捕抹蔥而罰布政司趙文奎等之納賂者鎰乃承襲收嫂奢播為妻仍雄諸蠻未幾鎰死子阿寫幼命以萬銓襲萬銓有助平阿向功嘉靖七年提督尚書伍文定為之請萬銓亦自陳其功乞加參政銜賜蠎衣帝命賜以應得之服後阿寫長改名仁仁死子國亨幼夷民仍請銓視事俟亨長承襲至嘉靖四十一年亨承襲銓又去位於是有安智讐殺之事當萬銓之去位也有二子曰智曰信智出居織金阿魏而信留事亨亨淫虐嘗昵吳瓊吳珂而通其妻若姊絶愛幸令百姓謁瓊珂皆跪起叩頭如謁亨信諫之惡信甚既以他事罰信馬信買珂馬進亨知為珂馬也復給珂信大怒嘗醉把劍呼卜麻必覺語曰吾欲殺吳珂如何卜麻唯唯會夷目阿戶聞之以告亨亨殺信信兄智馳告其姊夫永寧土吏奢效忠同稱兵討亨會亨與母祿氏擊烏蒙土府福榮榮本祿氏姪會與弟烏慮有隙祿氏呼烏慮來妻以所部女實佐使慮借烏撒兵同擊榮而慮以出兵時淫所部路珠妻女為路珠所殺亨並留慮妻實佐使訟榮殺慮正會勘問而萬銓妻疏窮與土同知安國孝以殺信告且發其殺四洞人及烏慮事上遣給事與鎮巡官雜治之未行亨巳與兄智及奢效忠戰於朵泥橋大閧互相殺奪亨奪智及效忠所部阿租罵雍沙那者底者墮者頗褒遮班鳩阿宗而智及效忠亦奪亨所部勒普革普豆得劄果底威索務驢白而水西谷里威清奢香陸廣金雞諸驛皆阻廢不通都御史阮文中御史鄭國仕等初議調諸路兵大勦亨亨自知不法頗愳既而議夷俗讐殺稱兵苐就吏議曲直不宜煩我兵革遣宣慰宋一清約法令究殺信罪且獻諸主謀者亨大感立獻阿弟吳瓊吳彤務卒惡卒吳珂何高等而後乃對簿伏殺信狀當死於是以三萬五千金自贖而以六千金贖務卒等事定亨與智俱去職令亨子安民行宣慰事智子國貞行夷目事亡何亨所部阿撒沙拱阿朋阿豆復以私憾殺智卒四人傷一十六人智復報仍具獄萬厯改元都御史蔡文都司高金宸麻哈守親詣木空河讞不決其明年秋都御史羅瑶下同知高任重司理常正和雜讞復不決當是時智所主謀者吳鶴駕亨所主則吳阿軻與阿箇也亨昵阿軻與阿箇甚於瓊與珂而阿軻與阿箇之妻若女其為亨所有與瓊珂等於是按察司林烻章直索阿軻阿箇與鶴駕同治罪且盡逐漢人之藏夷者而後使亨智對簿亨乃大愳請輸的都朵你及毛家可瓦大南王莊張三壩豆紅巖左王右王陂花蔡官梨兒鮓隴二十四寨與智和解終智世而後還亨其一切所訟俱置不問僅罰亨入穀千石智三百石贖罪軻箇以下皆輕重輸贖有差亨乃益感矢報效以湔前耻時賣羔堡阿占界首阿崖阿散皆強賊阻山為寇亨悉擒捕膠致凡威清平壩之間道無伏莾又水西酋長者普犯十二營虜土婦隴氏亨逮以獻兵備使佘一龍為之奏聞值水西有阿列之酋谷里有阿古之酋白歸之酋白縱之酋阿扯之酋威清有阿捕之酋奢香有沙遮之酋阿曰之酋陸廣有阿列之酋阿虐之酋普也妻之酋金雞有阿遂之酋其久充諸驛驛騎馬匹皆前後散去亨急為舉廢驛騎盡復乃悉令夷酋辟地墾草勸農桑察贍貧者流夷自占而還者至一千三百一十八人於是四十八部酋長十二宗親一百二十麻葉永則阿體等匍匐告都御史王緝請復亨冠帶許之十三年播州宣慰楊應龍以獻大木得賜飛魚服加恩亨亦以大木進乞還給服色誥封如播州例既而木竟不至乃諉罪於木商帝怒命奪所賚亨乃請補貢以明不欺帝乃如所請於是亨子疆臣襲時萬厯二十六年也播州楊應龍已反疆臣亦以戕殺安定事為有司所案科臣有言其逆節漸萌者詔不問許殺賊圖功疆臣奏稱播警方殷臣心未白帝復優詔報之巡撫郭子章許疆臣以應龍平後還播所侵水西烏江地六百里以酬功於是疆臣兵從沙溪入有蜚語水西佐賊者總督李化龍檄詰疆臣遂執賊二十餘人以示不背率所部奪落蒙關至大水田楚桃溪莊應龍伏誅先是應龍祖以內難走水西客死宣慰萬銓挾奏索水煙天旺地聽還葬其地遂為水西所據及播州平總督分其地為遵義平越二府分𨽻蜀黔以渭河中心為界而命疆臣歸播侵地代化龍者為王象乾主畫地而子章以為侵地始於萬銓而非疆臣安氏迫取於楊相喪亂之時非擅取於應龍蕩平之日且已許其裂土今反奪其故地臣無面目以謝疆臣願乞臣去象乾疏言疆臣征播殱應龍子惟棟不實首功可知至佯敗棄陳送藥往來欺君助虐迹已昭然令還侵地不咎既往已屬國家寬大若因其挾而豫之彼不為恩我且示弱疆臣既無功不與之地正所以成撫臣之信宜留撫罷臣以為重臣無能與蕞爾苖噂沓者之戒於是清疆之議纍年不決兵部責令兩地巡按勘報而南北言官交章詆象乾貪功起釁科臣吕邦耀復劾子章納賄縱姦子章求去益力象乾遂執疆臣所遣入京行賄之人與金以聞於朝然議者多右疆臣尚書蕭大亨遂主巡按李時華疏謂征播之役水西不惟假道且又助兵矧失之土司得之土司播固輸糧水亦納賦不宜以土地之故傷字小之仁地宜歸疆臣於是疆臣增官進秩其母得賜祭水西尾大之患亦於是不可制矣三十六年疆臣死弟堯臣襲四十一年烏撒土舍謀逐安效良堯臣以追印為名領兵數萬長驅入滇直薄霑益州所過焚掠備極慘毒朝廷方以越境擅兵欲加堯臣罪而堯臣死遺子位幼命其妻奢社輝攝事輝永寧宣撫奢崇明女弟崇明子寅獷悍與輝爭地仇恨相持而安邦彥者位之叔父也素懷異志與崇明合及是因崇明反調兵水西邦彥遂挾位叛以應之位幼弱不能制邦彥遂招故宣慰土舍宋萬化為助率兵陷龍里圍貴陽自稱羅甸王時天啓元年二月也至崇禎二年邦彥始伏誅事詳師旅考總督朱燮元騰檄安位許其來歸位惶恐不敢出燮元督諸將屯聚要害四面迭攻凡百日得首萬級生口數萬每獲鄉導輒發窖粟就食賊飢甚遂降乃與約四事一貶爵一削水外六目之地一獻傷王巡撫者首一開畢節等驛路位俯首聽命而前助逆故宣慰宋萬化之子嗣殷至是亦剿滅乃以宋氏洪邉十二馬頭地置開州以安氏水外六目之地置敷勇鎮西二衛修文等八所皆建城設官焉十年安位死無子土目化沙阿烏密等爭襲各以其地來獻朝議欲乘其敝郡縣之乃命朱燮元築大方水西比喇三城谷堡歸化二堡以副將方國安鎮守之未幾化沙阿烏密復叛圍大方國安誘斬化沙潰圍出城堡盡陷乃以安氏族人安承宗襲宣慰使承宗死子安坤襲國朝順治十五年經略洪承疇率師平滇黔二月至沅州時偽將軍艾能竒劉文秀等據守中路師不得進承疇乃遣使招坤許以如阿畫靄翠故事坤大喜隨遣漢把曽經熊彥聖二人繳印投誠二人即引大兵由西路小徑而進勢如破竹四月入貴陽十月進師取雲南滇黔抵定敘坤功準其世襲兼賜袍帽靴服彩幣二十匹十七年叛賊吕𢎞竄匿水西隴革自稱興國公謀取貴陽坤密報擒之坤後與皮熊合謀藏匿亡命勾連黨羽造軍器演士卒蠢蠢思動而土目察革喇慕魁周室把總高揆復朋和之蹤迹頗露巡道劉芳聲總鎮劉之復乃令朱世爵往水西偵之得實以報總督楊茂勳曰水西地方沃野千里地廣兵強在滇為咽喉於蜀為户牖若黔則腹心之蠱毒也失今不討譬之養癰為害必大乃合疏請勦康熙三年正月坤遂與鹽倉土知府安重聖同反命吳三桂督雲貴各鎮兵分東西兩路致討九月擒坤於大方之杓箐十月擒皮熊於烏撒熊不食死坤與重聖皆伏誅事詳師旅考以其地設四府水西為黔西府比喇為平逺府大方為大定府烏撒為威寧府安氏自濟火據水西之地厯千四百餘年至坤而亡十二月坤親黨郎岱土司隴安藩水西頭目隴勝及安重聖之妻隴氏復反遣兵討平之其地於是始定播州楊氏本末播州秦為夜郎且蘭地漢屬牂牁唐貞觀中改播州乾符初南詔陷播太原楊端應募復其城為播所懷服厯五代子孫世有其地宋大觀中楊文貴納土置遵義軍元世祖授楊邦憲宣慰司賜其子漢英名賽因不花封播國公明洪武四年平蜀遣使諭之五年正月播州宣慰使楊鏗同知羅琛總管阿嬰蠻夷總管鄭瑚等相率來歸朝貢方物納元所授金牌銀印銅章詔敕賜鏗衣幣仍置播州宣慰使司領安撫司二曰草塘曰黃平長官司六曰真州曰播州曰餘慶曰白泥曰容山曰重安鏗琛皆仍舊職改總管為長官司以嬰等為長官司長官七年中書省奏播州土地既入版圖當收其貢賦自洪武四年始歲納糧二千五百石為軍儲帝以其率先來歸田稅隨所入不必以額徴之九月鏗來朝十二月播州江渡蠻黃安作亂貴州衛指揮張岱討平之八年五月鏗遣其弟錡來朝賜衣幣自是每三歲入貢不絶十四年命使齎敕符諭鏗比聞爾聽浮言生疑二今大軍南征多用戰騎宜率兵二萬馬三千為先鋒庶表爾誠十五年城播州沙溪以官兵一千人土兵二千人戍之改播州宣慰司𨽻貴州十七年鏗子震以疾卒於京命有司歸其柩二十年十月徵鏗入朝貢馬十匹帝諭以守土保身之道賜鈔五百錠二十一年播州宣慰使司並所屬宣撫司官各遣其子來朝請入太學帝為敕國子監官善訓導之永樂四年免播州荒田租以張佛保為重安江長官以佛保常招輯重安蠻民向化故也七年宣慰司楊升招諭草塘黃平及重安所轄當科葛雍等十二寨蠻人來歸宣德三年升賀萬壽節後期行在禮部議豫半賞帝以道逺勿奪其賜七年草塘所屬穀撒等四十一寨蠻長官常徒等作亂聚衆二千餘人將攻牛場乾溪等堡事聞敕總兵陳懷剿之未幾懷招之復業正統十四年宣慰使楊綱老疾以其子輝代景泰三年輝奏湖廣所轄臻剖五坌等苖賊紏合草塘江渡諸苖黃龍韋保等殺掠人民屢撫復叛乞調剿以靖民患帝命總督王來總兵梁瑶等會同四川巡撫剿之七年調輝兵征銅鼓五開叛苖賜敕諭頒賞成化十年以播州賊齎果等屢歲為患敕責川貴鎮巡官時輝將入貢巡撫以播地連諸蠻輝等守土難逺離帝留輝十一月命輝子愛襲父職舊制土官襲職必三司先按實奏請而後許正統末苖蠻聚衆寇邉輝父綱不任職特命輝越制就襲至是土同知羅宏奏輝有疾乞以愛代帝命愛襲職仍敕愛即率兵從總兵官剿賊先是輝奏所屬夭壩干地五十三寨及重安所轄灣溪等寨屢被苖蠻占據乞令湖廣會兵征之命如輝言部議以愛年幼請仍起輝暫理軍事又以輝難獨任宜敕都御史張瓚親至播州督理厲輝等振揚威武以備征調其機宜悉聽裁處十二年瓚督諸軍及輝攻賊敗灣溪夭壩干諸苖凡破山寨十六斬首四百九十六級撫男婦九千八百餘口事下兵部以苖來撫者多宜量為處分瓚議設安寧宣撫司並懷逺宣化二長官司建靖南龍場二堡命輝董其役輝調軍民五千餘衆立治所委所屬黃平土司等分甓城垣將竣輝以聞因謂各寨苖蠻自區畫以來頗知畏懼但工竣後大軍還難保無虞播州向設操守土兵一千五百餘人今撥守懷逺靖南夭漂龍場各二百人宣化百人安寧八百人其家屬宜徙之同居為固守計其功之未畢者宜命臣子愛董之而聽臣致仕如故詔從之時灣溪既立安寧宣撫爛土諸蠻惡其逼遂引齎果等攻陷夭漂靖南城堡圍安寧愛新襲力弗能支求援於川貴二鎮於是兵部奏起輝再統兵剿之又敕川貴兵為助十五年貴州巡撫陳儼奏苖賊齎果轉橫乞調川廣等官軍五萬五千尅期會貴州聽儼節制兵部言賊作於四川而貴州守臣自欲節制諸軍恐有邀功之人主之且興師五萬以半年計須軍儲十三萬五千石山路險峻輸運之夫須二十七萬衆况天將暑瘴癘可虞帝然其奏二十二年刑部侍郎何喬新以愛為其兄宣撫所訐奉命往勘因奏楊氏據播已五百餘年蠻民服從久矣奢僣淫暴之罪無代無之厯朝皆寬以文法治以不治今友愛兄弟相訐命臣等勘問果係情重當於本州監候則獄卒皆其部下難於防守使移於重慶則道途遙逺蠻衆驚疑恐生他變宜撫提二人面對虛實聽候上裁免其監禁為便從之二十三年喬新奏輝在日溺其庶子友欲令承襲長官張淵阿順之安撫宋韜謂楊氏家法立嗣以嫡愛宜立輝不得已以職授愛又欲割地以授友謀於淵因以夭壩干乃本州懷逺故地為生苖所據請兵取之容山長官韓瑄以土民安輯日久不宜征淵與輝計執瑄杖殺之前巡撫張瓚受輝賂以其地設安寧宣撫司冒以友任宣撫輝立劵以所有金玉服用莊田召諸子均分之輝殁淵乃與友潛謀刺愛淵弟深亦與謀不果友遂奏愛居處器用僭擬朝廷又通唐府密書往來私習兵法天文謀不軌事皆誣帝命斬淵深以愛信讒薄兄友因公擅殺且謀嫡盜官錢皆有罪愛贖復任友遷保寧羈管仍敕喬新從宜處治𢎞治元年增設重安守禦千户所命播州歲調土兵一千助戍守七年以平苖功愛與有勞難加秩賜敕勞之十四年調播州兵五千征貴州賊婦米魯等正德二年升播州宣慰使楊斌為四川按察使仍理宣慰事舊制土官有功賜衣帶或旌賞部衆無列銜方面者斌狡橫不受兩司節制諷安撫羅忠等上其平普安等戰功重賂劉瑾得之踰年巡按余緇奏斌不宜受詔裁之仍原職初友既編置保寧愛益恣厚斂以賄中貴征取友向所居凱離地者獨苛同知楊才居安寧乘之朘剝尤甚諸苖忿怨凱離民為友奏復官弗得乃潛入保寧以友還紏衆作亂攻播州焚愛居第及公私廨宇略盡遂殺才多所殘戮愛屢奏於朝帝乃命鎮巡官調兵征之會友死而川兵方調征盜遂緩師至是鎮巡官言友搆亂罪大然其身已死其子洪尚幼今洪稍長能悔過自新且善撫馭蠻衆願聽其約束其前為友所焚殺者俱已隨土俗折償且還所侵奪於官乞授洪冠帶名為冠帶土舍協同播州經厯司撫輯諸蠻其家衆置保寧者仍歸之𨽻播州管轄并諭斌與洪協和不得再造釁端報可未幾播州安撫宋淮奏貴州凱口爛土苖婚於凱離草塘諸寨隂相搆結誘山苖為亂乞賜斌敕令每年巡視邉境會湖廣鎮巡官撫處部議土官向無領敕出巡者諭斌宜撫綏土衆輯睦親族以副朝廷優待之意因加授愛為昭毅將軍給誥命賜麒麟衣一襲時愛之子斌又為其父請進階及服色禮科駁之以服色等威所係不可假兵部以愛舊有剿賊功皆許之既而斌復為其子相請入學并得賜冠帶十二年播州安撫羅忠宋淮等奏以宣慰楊斌有父喪欲援文臣例守制但邉防為重乞仍令掌印理事初凱里土舍楊洪與重安土舍馬綸等有怨洪卒綸等誘苖蠻攻之更相仇殺侵軼貴州境巡撫鄒文盛言狀且請移文四川會官撫處踰歲不報文盛乃遣參議蔡潮入播州督致仕楊斌撫平之因言宜復安寧宣撫俾洪子弟襲之斌未衰宜仍起任事以制諸蠻寨潮有撫蠻勞宜量擢兵部議安寧已革不可復斌子既代亦不可起土官應襲與否屬四川非潮所得專盛所請難行而功不可誣十六年賜斌蠎衣玉帶嘉靖元年賜播州宣慰司儒學四書集注一部從宣慰相奏也洪既死其弟張求襲父職不得時盜邉劫白泥司印信復與相搆兵守臣乞改凱里屬貴州以張為土知州解釋之兵部議張習父兄之惡幸免於辜而敢肆然執印信以要挾當命川貴守臣按其前後爭産殺人諸罪置於理若張悔過輸情還所獲印尚可量授一官聽調殺賊以自效倘或怙終必誅以為玩法戒既遂許張襲宣撫而改安寧為凱里𨽻貴州初楊相之祖父皆以嫡庶相爭梯禍數世至是相復寵庶子煦嫡子烈母張悍甚與烈盜兵逐相相走客死水西烈求父尸宣慰安萬銓因要挾水煙天旺故地而後豫尸烈陽許之及相喪還烈靳地不豫遂與水西搆難並殺其長官王黻時嘉靖之二十三年也烈既代襲遂與黻黨李保治兵相攻垂十年總督馮嶽總兵石邦憲討平之真州苖盧阿項者亦久稱亂邦憲以兵七千擊敗之有言賊求援於播者邦憲曰吾方調水西兵聲楊烈助逆罪烈暇救人乎已擒阿項父子斬獲四百餘人初嘉靖初議分凱里屬貴州既又以播地多在貴州境並改屬思石兵備及真州盜平地方安靖播人以為非便川貴守臣異議不決命總督會勘總督奏仍以播歸𨽻四川而貴州思石兵備仍舊兼制播酋平邑諸土司事報可隆慶五年烈死子應龍請襲命姑豫職萬厯元年給播州新襲宣慰使楊應龍敕書八年賜故宣慰楊烈祭葬從其子應龍請也十四年應龍獻大木材美賜飛魚服又復引其祖賜蠎例部議以斌有軍功且出特恩未可為比帝命以都指揮使銜授應龍十八年貴州巡按葉夢熊疏論應龍凶惡諸事巡按陳效厯數應龍二十四大罪時方防禦松潘調宣慰土兵協守四川巡按李化龍疏請暫免勘問俾應龍戴罪圖功由是川貴撫按疏辨在蜀者謂應龍無可勘之罪在黔者謂蜀有私昵應龍之心於是給事中張希臯等以事屬重大兩省利害豈漠不相關者乞從公會勘無執成心十九年貴州夢熊主議播州所轄五司改土為流悉屬重慶與化龍意復相左化龍遂引嫌求斥蓋應龍本雄猜阻兵嗜殺所轄五司七姓悉叛離嬖妾田氏屠妻張氏並及其母於是妻叔張時照與所部何恩宋世臣等上變告應龍反夢熊請發兵剿之而蜀中士大夫率謂蜀三面鄰播屬夷以什百數皆其彈壓且兵驍勇數征調有功剪除未為長䇿以故蜀撫按並主撫朝議命勘應龍願赴蜀不赴黔二十年應龍詣重慶對簿繫論法當斬請以二萬金贖御史張鶴鳴方駁問會倭人入朝鮮徴天下兵應龍因奏辨且願將五千兵征倭自贖詔釋之兵已啓行尋報罷巡撫王繼光至嚴提勘結應龍遂抗不出張時照等復詣奏闕下繼光用兵之議遂決二十一年繼光與總兵劉承嗣兵敗於婁山關會繼光論罷時四川新撫談希忠與貴州鎮撫再議剿御史薛繼茂主撫應龍上書自白遣其黨擕金入京行間執原奏何恩詣綦江縣二十二年以兵部侍郎邢玠總督川貴二十三年玠至蜀察永寧酉陽皆應龍姻媾而黃平白泥久為仇讐宜剪其枝黨乃檄應龍謂當待以不死會水西宣慰安疆臣請父國亨恤典兵部尚書石星手札示疆臣趣應龍就吏得貰疆臣亦奉扎至播招應龍當是時七姓惟恐龍出得除罪而四方亡命竄匿其間又幸應龍反因以為利驛傳文移輒從中阻四月玠檄重慶知府王士琦詣綦江趣應龍安穩聽勘應龍使弟兆龍至安穩治郵舍儲􅖲叩頭郊迎致餼牽如禮言應龍縛渠魁待罪松坎所不敢至安穩者恐墮安穩仇民不測之禍也幸請至松坎受事士琦曰松坎亦曩奏勘地也即單騎往應龍果面縛道旁泣請死罪請治公館執罪人及罰金獻廷中得自比安國亨國亨者曩亦被訐懼罪不出界故應龍引之士琦為請於玠許之應龍乃縛獻黃元阿羔阿苖等十二人按驗抵應龍斬以其族得論贖輸四萬金助採木仍革職以子朝棟代受職次子可棟羈府追贖黃元等斬重慶市總督以聞時倭氛未靖本兵欲緩應龍事東方朝廷亦以應龍向有積勞可其奏於松坎設同知治焉而以士琦為川東兵備副使彈治之應龍獲寬益怙終不悛尋可棟死於重慶益痛恨促喪歸不得復檄完贖大言曰吾子活銀即至矣擁兵驅千餘僧招魂去分遣土目置關據險厚撫諸苖名其健者為硬手州人稍殷者沒入其資以養苖苖人遂願為出死力遂連年殘餘慶草塘二司及江津南川合江襲破偏橋敗都司楊國柱於飛練􅋭至二十八年總督李化龍巡撫郭子章始合八路兵討平之應龍自焚死事詳師旅考播州自唐入楊氏傳二十九世八百餘年至應龍而亡三十一年播州餘逆吳洪盧文秀等叛總兵李應祥等討平之於是分播地為二屬蜀者曰遵義府屬黔者為平越府本朝雍正五年復以遵義屬黔貴州通志卷二十一
