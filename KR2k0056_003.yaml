body:
  text: 貴州通志卷三地理建置貴州布政使司貴州在唐虞時為夏書禹貢梁州之南裔荆州之西鄙殷因於夏無所損益周武王克殷以巴濮楚鄧為南土屬巴濮之地成王合梁於雍又為雍州之南裔春秋時楚莊既霸遂服於楚為巫黔中地楚威王遣將莊蹻從沅水伐夜郎滅之遂至滇池後漢書作楚頃襄王遣將莊豪按楚威王於周顯王三十年立至四十年薨在位十年後厯顯王八年慎靚王五年至赧王三十五年秦取楚巫黔中地相距四十八年如遣莊蹻為威王時事則莊蹻在滇五十餘年何以淹久不歸再考楚頃襄王立於赧王十六年距秦取地十九年其間莊蹻奉使至滇欲歸楚道不通其說近是至史記作莊蹻前漢書仍之後漢書乃作莊豪查通鑑莊豹注莊姓宋戴武莊之族有出於楚者莊蹻是也亦作蹻在後漢書改訂史漢似必冇據但太史公去周秦未逺其所記威王及莊蹻亦不應冇誤今從史記作威王莊蹻附載頃襄王莊豪備考秦昭王二十七年為周赧王之三十五年取楚巫黔中地置黔中郡蹻欲歸楚道不通遂留王滇而夜郎仍自立為侯國旁邑且蘭之屬君長以十數獨夜郎最大西距卭莋東接交趾漢髙帝四年改黔中郡為武陵郡建元六年遣唐䝉通夜郎元鼎六年平且蘭遂平南夷置牂柯郡後置益州以牂柯屬焉牂柯各地理志字形不同前漢作牂牱後漢作牂牁隋作牂柯史記西南夷𫝊及晉宋志俱作牂柯從其多者始元二年分天下為十三部武陵屬荆州部牂柯屬益州部後漢州郡因之建安十三年魏武盡得荆州之地及敗於赤壁吳興蜀漢分荆州江夏諸郡屬吳武陵諸郡屬蜀漢先主殁後復屬吳為荆州十五郡之一而牂柯屬蜀漢之益州晉平吳荆州郡縣屢有分析而武陵郡常屬荆州泰始七年分益州置寧州統郡八牂柯屬焉州後廢大安二年復置永嘉二年分牂柯立平夷夜郎二郡咸康四年置安州分牂柯夜郎屬焉八年仍罷安州以所屬郡並入寧州然自太安後李氏據蜀益州郡縣悉為所陷江左仍遙置之永和三年桓溫平蜀始為晉有咸安後再沒於苻氏太元八年復為晉有劉宋時武陵領於郢州刺史牂柯平夷夜郎仍屬寧州平夷後避桓溫父彛之諱改為平蠻蕭齊時州所領郡俱仍之梁承聖元年益州入於西魏平蠻諸郡多沒於㸑蠻三年荆州入於西魏自後州郡沿革多無可考隋開皇初置牂柯郡廢武陵為朗州大業初復置唐武德二年以巴蜀徼外蠻夷地置義州三年以牂柯首領謝龍羽地置牂州四年置黔州及戎州都督府以故興古郡置西平州以隋巴東郡之務川扶陽置務州以思州之寧夷縣置夷州五年改義州曰智州貞觀元年廢夷州三年以南謝蠻首領謝疆地置南夀州四年更名莊州復以黔州之都上縣開南夷置夷州今石阡府又開南蠻置費州今思南府改務州為思州八年以辰州之龍標縣置巫州更西平州為盤州今南籠府九年以隋牂柯郡之牂柯縣置播州今遵義府十一年罷黔州都督府置莊州都督改智州為牢州十二年開夷獠置古州十六年廢牢州開山洞置溱州今桐梓縣又置珍州今正安州垂拱二年以辰州麻陽縣地及開山洞置錦州今銅仁府天授二年更巫州曰沅州長安四年以沅州之夜郎渭溪置舞州景龍四年廢莊州都督府置播州都督先天元年廢播州都督府復置於黔州開元十三年更舞州為鶴州復以沅州為巫州二十年改鶴州為業州二十一年分天下為十五道設黔中道置黔中採訪使治黔州大厯五年改巫州曰叙州今黎平府改業州曰奬州今鎮逺府元和二年廢珍州入溱州思夷費播溱錦叙奬八州皆隸黔中採訪使古州隸嶺南採訪使盤牂則羈縻州也隸戎州及黔州都督府咸通十一年南詔陷播州乾寧三年黔南觀察使王肇以其地降於王建牂柯諸州不通中國蠻酋分據其地自置為刺史五代後唐同光三年蜀王衍降得黔渝等六十四州天成二年牂柯清州刺史宋化朝等一百五十人來朝及孟知祥據西川復不通朝貢五代晉天福五年都雲酋長尹懷昌率其昆明等十二部牂柯張萬濬率其夷播等七州皆附於馬希範宋乾德元年平湖南三年平蜀諸溪洞蠻酋相繼歸附七月珍州刺史田景遷內附開寶元年改珍州為髙州九年奬州刺史田處達來貢太平興國三年夷州蠻任朗政等來貢八年錦叙諸蠻相率詣辰州言願比內郡輸租稅詔不許錦州刺史田漢希願與懿州今沅州刺史田漢瓊兩易其地詔許之又以知叙州舒德芬為刺史咸平二年古州刺史向通展來貢詔有司鑄印以賜通展皆羈縻州也崇寧以後始務開拓疆土置州郡比於內地四年三月王江古州蠻納土置懷逺軍尋改為平州又尋廢平州於中古州置格州五年改為從州大觀二年播州楊文貴獻地置播州樂源郡及遵義軍大駱解上下族帥獻地置珍州夷州酋獻地置承州又置溱州政和元年廢從州七年番部田祐恭內附置思州宣和三年廢承州改播州為播川縣隸南平軍改遵義軍為遵義寨隸珍州四年廢思州紹興元年復置端平三年復以白綿堡為播州咸淳末以珍州屬焉皆隸四川䕫州路錦叙諸州則隸於荆湖北路之安撫使而唐時之牂盤諸州在宋則為羅甸于矢普里諸部及南詔之東鄙元憲宗時平雲南招降于矢部置普安路普里部歸附置普定路尋改為府至元十三年烏撒部來附置烏撒路十四年思州田景賢播州楊邦憲來附俱授安撫司十五年羅氏鬼國主阿榨西南番韋昌盛內附詔榨及昌盛各為其地安撫使十六年招降西南諸番各授以安撫使十七年改羅氏鬼國為順元路置宣慰司二十年討平九溪十八洞定其地之可以設官者大處為州小處為縣並立總管府聽順元路宣慰司節制置貴州等處長官司領於順元安撫司此貴州之名所自始也二十一年改烏撒為軍民宣撫司改思播二州𨽻順元路二十四年升烏撒宣撫司為烏撒烏䝉宣慰司二十六年以八番羅甸𨽻四川省尋改𨽻湖廣省改金竹寨為金竹府改播州為播南路二十八年改八番羅甸𨽻四川省尋復𨽻湖廣立黃平府改播州安撫司為宣撫司直𨽻四川行省立蠻葛軍民安撫司招古州等洞酋長詣闕貢獻招附光蘭州洞蠻置定逺府二十九年正月以普定路𨽻雲南省二月以思播等州𨽻湖廣省以羅甸𨽻雲南省大德七年改普定府為路至治二年置八番軍民安撫司改長官司二十有八為州縣其置鎮逺府都雲軍民府年分無考至正二十五年明太祖平漢略地湖南思南田仁智歸附授思南宣慰司未幾思州田仁厚來獻地授思州宣慰司洪武四年順元宣慰司靄翠歸附改授貴州宣撫司置貴州衛五年播州宣慰司楊鏗歸附仍授宣慰使司六年升貴州宣撫司為宣慰使司九年置永寧衛改黃平府重安長官司及都雲金竹二府俱為安撫司改八番諸安撫司為長官司廢定逺府降鎮逺府為州十四年改普定路為普定府置普定衛改烏撒宣慰司為烏撒府置平越衛十五年置烏撒衛設貴州都指揮使司十六年改普安路為普安軍民府改都雲府為都勻安撫司置畢節衛十八年廢普定府二十二年置赤水興隆安莊三衛改普安府為衛二十三年改蠻葛安撫司為新添衛都勻安撫司為都勻衛兼置龍里清平威清平壩安南五衛及安籠諸所二十六年置貴州前衛唯思南思州二宣慰司隸湖廣普安衛隸雲南餘俱隸四川布政使司永樂元年置普安安撫司十一年廢思南思州兩宣慰司設兩府又設鎮逺及銅仁石阡黎平烏羅新化六府設貴州等處承宣布政使司於貴州宣慰司治所領之改所隸四川雲南諸府州及宣慰宣撫安撫諸司俱隸焉十三年改普安安撫司為州十八年設貴州等處提刑按察使司省烏羅入銅仁府省新化入黎平府正統三年省鎮逺州入府成化十年設程番府於程番長官司𢎞治六年即都勻衛城增置都勻府隆慶二年改程番府為貴陽府移治布政司治所萬厯十九年改貴筑長官司為新貴縣附郭二十年升安順州為安順軍民府二十八年滅播以播地設平越及遵義二府而以遵義隸四川改湖廣平溪清狼偏橋鎮逺四衛隸貴州而以黎平府隸湖廣三十一年復以四衛隸湖廣黎平仍隸貴州崇禎三年以水西地設開州及敷勇鎮西二衛計府十衛二十州九縣十四國朝因之順治十八年平馬乃設普安縣𨽻安順府康熙三年平水西烏撒設平逺大定黔西威寧四府十一年改龍里平越清平都勻普定五衛為縣省安莊衛入鎮寧州二十二年割湖廣鎮逺偏橋二衛𨽻貴州省鎮逺衛入鎮逺縣二十三年改黔西平逺為州二十六年改貴州貴前二衛為貴筑縣改敷勇衛為修文縣省新添衛入貴定縣俱𨽻貴陽府改威清鎮西二衛為清鎮縣改平壩衛為安平縣改安南衛為安南縣省普安衛入普安州改安籠所為南籠㕔俱𨽻安順府省烏撒衛入威寧府改大定府為州改永寧畢節二衛為縣省赤水衛入畢節縣俱𨽻威寧府省興隆衛入黃平州𨽻平越府省偏橋衛入施秉縣𨽻鎮逺府裁各府軍民字三十四年省新貴入貴筑縣雍正三年改湖廣五開銅鼓二衛𨽻黎平府四年平長寨仲苗移貴陽同知分駐其地仍𨽻貴陽府五年改南籠㕔為府分普安州普安縣安南縣並新設永豐州𨽻焉改銅鼓衛為錦屏縣五開衛為開泰縣俱領於黎平府又割湖廣之平溪衛為玉屏縣清浪衛為清溪縣俱領於思州府天柱縣領於黎平府割四川遵義府並所轄遵義正安綏陽桐梓仁懷五州縣𨽻貴州改永寧縣𨽻四川八年復以大定州為府改威寧府為州同黔西平逺畢節三州縣𨽻府是年新開闢苗疆設同知三駐八寨者𨽻都勻府駐清江者𨽻鎮逺府駐古州者𨽻黎平府通判三駐都江丹江者俱𨽻都勻府駐歸化者𨽻安順府九年討平松桃紅苖移正大營同知駐其地𨽻銅仁府設同知於郎岱𨽻安順府十年割廣西之荔波縣𨽻都勻府十一年改天柱縣𨽻鎮逺府移大定府通判分駐水城仍𨽻大定府移清水江同知駐台拱設通判駐清水江俱𨽻鎮逺府其領府十三州十四縣三十四分防同知六通判五貴陽府禹貢梁州南境荒服之地漢以前為西南夷元鼎六年平南夷置牂柯郡唐為牂柯國武德三年首領謝龍羽遣使來朝以其地為牂州四年更為柯州後復名牂州為下州開元中降為羈縻州五代時楚王馬殷遣八姓帥率雍管栁州兵討兩江溪洞至此留軍戍之遂各分據其地號八番宋乾德五年知南寧州蕃落使龍彥瑫等來貢詔授彥瑫州刺史仍為羈縻州纍世入貢開寶間置大萬谷樂總管府元至元十六年設順元路宣慰司𨽻潭州行省遣兩淮招討司經厯劉繼昌招降西南諸番俱授安撫司曰大龍番曰小龍番曰卧龍番曰洪番曰程番曰石番曰盧番曰韋番謂之八番二十六年改金竹寨為金竹府置乖西軍民府貴陽等處長官司俱聽宣慰司節制明洪武四年夷長密定等舉土內附置金竹長官司五年順元宣慰司靄翠與同知宋蒙古歹歸附置貴州宣慰司及宣慰同知又置貴州衛設都指揮使司八番諸蠻長內附俱授為長官司十四年密定首獻馬五百匹特升為安撫司宣慰司領長官司二十三安撫司領長官司四俱𨽻四川布政使司二十六年置貴州前衛龍里衛新添衛俱𨽻都指揮使司永樂十一年改宣慰諸司𨽻貴州布政司成化十年設程番府於程番長官司以宣慰司所領之八番及小程番方番羅番上馬橋與安撫司所領之木瓜麻嚮大華盧山四司俱屬焉隆慶二年移程番府治於布政司治城改名貴陽府其宣慰司所領惟貴筑龍里水東中曹白納底寨乖西養龍虎墜青山劄佐十一司而已萬厯十四年設定番州於舊程番府仍領原府屬之十六司十九年以貴筑長官司置新貴縣附郭二十