  text: 貴州通志卷五地理山川貴陽府貴筑縣附郭翠屏山在布政司署後東山在城東一里翠巘崔嵬琳宫縹緲溪山闤闠一覽可盡郡人楊大賔讀書其上題君山讀書處五字於石壁巔左有振衣亭銅鼓山在城東二里棲霞山在城東五里山腹有洞曰霞山仙洞明王守仁郭子章俱有詩石門山在城東六十里兩山對峙如門唐帽山在城東南一里以形似名土人常避兵於此文筆山在城南一里孤峯如筆卓立雲表斗巖山在城南里許俗名倒巖山髙連山在城南二里諸山髙而連絡有天馬貴人諸峯唐史謂䍧柯境内有髙連石門二山即此飛鳳山在城南五里形如飛鳳卧牛山在城南二十五里山南有長豐堰溉田甚廣簸箕山在城南五十里山下有羊虎二場四方軍民貿易於此板橋山在城南六十里髙與雲齊登之數百里内外皆見晴日常生雲氣上有石椑傳曽有仙人對奕風洞山在城南百里白納司之西山腹有洞每風貫其中有聲如雷金猫捕䑕山在城西南五里山以形名宛如貍奴蹲踞溪邊昻首傲睨旁有羣石隱伏如䑕五虎山在城西二里山形類虎者五諺傳五虎三獅一鳳凰云獅子山有三俱在城西二里明潁川侯傅友徳嘗駐兵於此坎馬山在城西二里俗名坎馬冲天玉冠山在城西百餘里巍然聳拔如羽士星冠黔靈山在城西北三里衆山環抱石徑險仄一綫盤旋而上建有祠宇為往來遊觀之所木閣箐山在城西北四十里延袤百里横亘修文境内林木蓊蔚中有道可通黔西山上有一潭深不可測白巖山在城北二里兎場大道經其下貴山在城北五里一名貴人峯郡之得名以此金鰲山在城北五里羣山如奔濤疊浪中湧一峯宛如鰲首躍波而起驪珠山在城北五里許鴉關山與驪珠山接雲錦山在城北二十里舊為宣慰宋氏别業舒屏列嶂俯瞰平田煙雲繚繞下有流觴曲水諸勝石人山在城北三十里山頂巨石林立逺望如人相寶山在城東北一里俗名照壁山排雲列嶂儼若翠屏與東山對峙上有梵宇頗稱名勝崆巃山在城東北五里山腹谾豅可通人行石洞山在城東北八里山有石洞可以容衆梯嶺在城南三里石級如梯中曹司路經其上髙坡在城南五十里岡巒繚繞如帶如圍石巖摩霄烟嵐夾澗暑月猶寒地産茶郡人嘗避兵其上青巖在城南五十里巖下有河通定番州三僊洞在城東四十里地名翁若堡中有泉石之勝朝陽洞在城南六里軒豁爽塏可供遊賞雲巖洞在城西北三里舊名唐山洞甚幽邃白龍洞在城西北十五里巖石玲瓏備極靈異入數十丈漸幽暗非秉燭不得前中有潭水駕竹而度石筍數莖扣之鏗然若鐘聲魯納洞在城西北百餘里三洞竝列可容千人土人於此避兵瀉玉洞在城北四十里有山綿亘而下峯圍水拱中有石阜雄峙豁開一洞中石有如人立者獸蹲者笋茁者花綻者石牀丹竈等扣之有聲戞然石竅清泉外噴幾於匡廬瀑布水落洞在城北百里為衆水所歸松風古刹即之泠然船石在城東二里牛渡河邊長數丈宛然孤舟野泊石譜在城南百里白納司平地突起羣石欹整横斜千態萬狀下有清泉隆冬不涸竹樹陰森遊之忘暑犀牛石在城西一里昻首田中如犀牛狀三水江在城北三十里府西境之水派流而下至此合流為一又東入於清水河貫城河自崆巃山發源貫入城中流㑹南明河明大學士席書有記巡撫楊鶴題曰玉帶國朝總督甘文焜巡撫佟鳳彩因居民屢火濬之以禦火災康熙四十八年水溢淹城中居民巡撫陳詵復加開鑿南明河在城南門外源出廣順州界東北流經郡城至下流為牛渡河至巴香北流合烏江通思南府入蜀涪州界合岷江龍洞河在城南十里下流入於南明河四方河在城西南五里源出廣順州滙於南明河濟番河在城西南三十里俗名花犵狫河八番路所經明成化初宣慰使宋昻疊石為橋其下流合南明河清水河在城東北百二十里與貴定縣分界即南明河之下流水甚清冽兩岸峯巖壁立﨑嶇難行乖西巴香諸部苗狫倚此為險明景泰三年南和伯方英將兵渡此平兩岸為坦途苗獠奪氣又東北入於烏江擇溪在城北源出髑髏山流合貫城河墨特川在城西北元大徳五年宋隆濟蛇節作亂攻貴州元將劉國傑討之大破隆濟等於此富水在城南源出八里屯流入南明河涵碧潭在城南門外武侯祠下南明河之所滙碧流瑩澈巖木薈蔚舊多題咏鰲頭磯在城南門外南明河中明萬厯十五年巡撫江東之巡按應朝卿架石築堤建甲秀樓於上以培風脉芳杜洲在南明河中甲秀樓下廣可百步春來芳草晴沙足供遊咏漁磯灣在南明河左岸漁人鼔枻往來有瀟湘之致靈泉在城内大興寺泉極澄澈舊傳月出没時雖偏在東西泉中皆見影温泉在城東九十里地名楊郎壩初出地熱甚可熟生物稍逺方可浴聖泉在城西八里黔靈山後一名百盈一名漏勺自山麓湧出晝夜百盈百竭應刻漏之數似有槖籥莫測其端明鎮逺侯顧成甃石為池覆以亭池中立一石以驗消長亭今廢九十九泉在城西二十里地名髙寨泉出山頂凡九十九穴珠泉在城西三十里泉分六七道而出纍纍如貫珠神應泉在城北一百二十里地名巴香出於兩石之間水不恒注汲者至擊石數聲則涓涓流出隨器而滿足則復止玉池在城内東南隅豐濟倉前明巡撫趙釴題曰玉池勝地池北有堂曰鳳嬉池中有亭曰浮光皆有記本朝巡撫羅繪錦命工疏治植蓮其中夢草池在按察司署中一泓清淺經冬不涸舊為邑人吳子騏别墅岸植芙蓉榆柳蕭踈掩映中植蓮甚茂龍井在城内龍王廟前水出石隙味甚清冽安賊圍城井忽涸有人探入見一穴深窅莫可窮極金井在城内小十字街心井已填塞榦石尚存俗呼金井玉欄普惠井在城北門外一名四方井海螺井在城南百里白納司地形如螺甲每日三潮若吞吐然定番州