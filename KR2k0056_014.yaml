body:
  text: 貴州通志卷十四食貨課程貴州布政使司原額官莊賑恤田地一萬八千三百畝七分二釐六毫八絲四忽四微二塵六纎八渺荒蕪田五千三百二十四畝四分六毫六絲二微九塵四纎一渺實在成熟田一萬二千九百七十六畝三分二釐二絲四忽一微四塵二纎七渺原額本色賑租倉斗穀一萬四百三十二石六斗八升二合一勺八抄四撮四圭二粟田荒無徵穀三千八百三石三斗一升三合四抄五撮四圭九粒九粟實在有徵本色穀六千六百二十九石三斗六升九合一勺三抄八撮九圭三粟原額本色賑租倉斗米二百八十一石三斗四合三勺一抄五撮七圭一粒一粟田荒無徵米四十石七斗八升二抄九撮九圭九粒八粟實在有徵本色米二百四十石五斗二升四合二勺八抄五撮七圭一粒三粟原額全荒本色賑租倉斗豆六石七斗一升四合二勺八抄五撮七圭一粒四粟原額全熟折色賑租倉斗米一十石四斗二升八合五勺七抄一撮四圭二粒八粟額該折租銀一十三兩五錢原額遞馬餘租塘租魚課銀三十四兩八錢三分荒蕪無徵塘租銀六錢實在有徵遞馬餘租魚課銀三十四兩二錢三分又卭水司開墾過割苗糧久荒無徵折糧銀四十八兩七錢一分六釐五毫又丈出謬沖花苗所遺田畝認納租穀七十五石四斗八升四合六勺四抄二撮原額學田地六千六百三十六畝四分一釐七毫九絲四忽七微三塵三纎五渺荒蕪田地二千二百四十八畝六分六毫四絲四忽五微五塵三纎四渺實在成熟田四千三百八十七畝八分一釐一毫五絲一微八塵一渺原額學塘二口全荒原額本色學租倉斗穀八百二十二石八斗八升九勺二抄八撮四圭五粒田荒無徵穀四百六十四石五斗五升二勺二抄四撮二圭四粒五粟實在有徵本色穀三百五十八石三斗三升七勺四撮二圭五粟原額本色學租倉斗米四百七十七石九斗二升六合七勺四抄二撮七圭五粒田荒無徵米一百七十四石八斗九升九合六勺九抄四撮五圭三粒二粟實在有徵本色米三百三石二升七合四抄八撮二圭一粒八粟原額折色學租倉斗米穀四百五石八斗三升四合六勺內除天柱縣完納正賦穀二石外實額米穀四百三石八斗三升四合六勺額該折色銀一百四十一兩六錢二分四毫六絲四忽原額學祭塘租銀一百二十兩五錢三分一絲六忽六微七塵五纎田荒無徵折色米穀二十七石三斗八合無徵租折銀六兩五錢八分二釐八毫八絲無徵學祭塘租銀九兩二錢四分七釐三毫二絲一微七纎五渺實在有徵折色米穀三百七十六石五斗二升六合六勺有徵租折銀一百三十五兩三分七釐五毫八絲四忽有徵學祭租銀一百一十一兩二錢八分二釐六毫九絲六忽五微六塵七纎五渺貴陽府原額官莊賑恤田三千一百四畝六分九釐二毫六絲四忽二微八塵四纎二渺荒蕪田七百三十二畝九分五釐七毫八絲四忽二微二塵一渺實在成熟田二千三百七十一畝七分三釐四毫八絲六塵四纎一渺原額本色倉斗租穀二千九十六石四升八合二抄八撮六圭三粒七粟田荒無徵穀五百七十七石五斗九升九合一勺五抄八撮七粒三粟實在有徵穀一千五百一十八石四斗四升八合八勺七抄五圭六粒四粟原額本色賑租倉斗米二百三十五石二斗三升五合七勺一抄四撮二圭八粒四粟田荒無徵米一十六石八斗四升二合八勺五抄七撮一圭四粒二粟實在有徵米二百一十八石三斗九升二合八勺五抄七撮一圭四粒二粟原額全熟官莊折色倉斗米一十石四斗二升八合五勺七抄一撮四圭二粒八粟實折徵銀一十三兩五錢原額學田一千六百六十八畝七分四毫四絲荒蕪田四百四十五畝八分四釐二毫四絲三忽四微六塵三纎四渺實在成熟田一千二百二十二畝八分六釐一毫九絲六忽五微三塵六纎六渺原額本色學租倉斗米二百一十二石四斗一升七合九勺四抄二撮七圭五粒田荒無徵米七十五石八斗二合四勺二抄八撮五圭三粒二粟實在有徵米一百三十六石六斗一升五合五勺一抄四撮二圭一粒八粟原額學租倉斗穀一百五十一石七斗二升一合四勺二抄八撮五圭五粒田荒無徵穀六十七石一斗八升五合七勺一抄四撮二圭七粒五粟實在有徵穀八十四石五斗三升五合七勺一抄四撮二圭七粒五粟原額全徵折色學租米三十七石七斗七升九合二勺該折色銀一十三兩六錢五毫二絲原額學祭銀一百九兩二錢三分一絲六忽六微七塵五纎田荒無徵銀一兩九錢四分七釐三毫二絲一微七纎五渺實在有徵銀一百七兩二錢八分二釐六毫九絲六忽五微六塵七纎五渺貴陽府親轄原額官莊賑恤田三百四十二畝七分一釐四毫二絲八忽五微七塵一纎四渺荒蕪田二十七畝九分實在成熟田三百一十四畝八分一釐四毫二絲八忽五微七塵一纎四渺原額本色倉斗租穀三百四石九斗二升八合五勺七撮一圭五粒一粟田荒無徵穀二十七石九斗實在有徵穀二百七十七石二升八合五勺七抄一撮五圭一粒原額學田三百二十六畝三分九釐荒蕪田二十四畝二分一毫實在成熟田三百二畝一分八釐九毫原額本色學租倉斗米二十一石三斗田荒無徵米四石七斗一合實在有徵米一十六石五斗九升九合原額租祭銀三十七兩六錢四分一絲六忽六微七塵五纎田荒無徵銀一兩二錢五分七釐三毫二絲一微七纎五渺實在有徵銀三十六兩三錢八分二釐六毫九絲六忽五微六塵七纎五渺定番州原額官莊賑田一百七十六畝四分五釐一毫四絲二忽八微五塵六纎九渺荒蕪田五十畝八分五釐一毫四絲二忽八微五塵七纎一渺實在成熟田一百二十五畝五分九釐九毫九絲九忽九微九塵九纎八渺原額本色倉