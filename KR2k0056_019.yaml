body:
  text: 貴州通志卷十九秩官名宦縂部周莊蹻史記作蹻後漢書作豪仍從史記椘荘王苖裔椘威王使将兵従沅水伐夜郎至且蘭㭬􅊑於岸而歩戰既滅夜郎定滇池欲歸報㑹秦奪椘巴黔中道不通留王滇漢唐蒙畨陽令建元中大行王恢擊東越使䝉風曉南越南越食蒙蒟醤問所從來曰道西北牂牁牂牁江出番禺城下䝉歸問蜀賈人賈人曰獨蜀出蒟醤多持竊出市夜郎夜郎臨牂牁江江廣百餘歩足以行􅊑䝉乃上書曰南越王黄屋左纛地東西萬餘里名為外臣實一州主也今以長沙豫章往水道多絶難行竊聞夜郎所有精兵可得十餘萬浮􅊑牂牁江出其不意此制越一奇也誠以漢之彊巴蜀之饒通夜郎道為置吏易甚上許之拜中郎将将千人食重萬餘人從巴蜀筰闗入遂見夜郎侯多同蒙厚賜喻以威徳約為置吏使其子為令夜郎旁小邑皆貪漢繒帛以為漢道險終不能有乃聼䝉約還報以為犍為郡𤼵巴蜀卒治道自僰道指牂牁江通西南夷數嵗道不通上罷西夷獨置南夷夜郎兩縣一都尉夜郎通中國自䝉始吳霸元鼎間為牂牁太守請立夜郎後天子乃封其三子為侯諸夷懼服陳立字少遷臨邛人故金城司馬成帝河平中夜郎王興與鉤町王禹漏卧侯俞更舉兵相攻牂牁太守請𤼵兵誅之卒廼遣大中大夫蜀郡張匡持節解之興等不從杜欽因説大将軍王鳳謂宜乗時遣官誅之鳳乃薦陳立為牂牁太守立前為連然長不韋令蠻夷畏之及至牂牁諭告夜郎王興興不従命立請誅之未報廼従吏數十人出行縣至興國宜同亭召興興将數千人往至亭従邑君數十人入見立立數責因斷其頭邑君曰将軍誅亡状為民除害願出曉士衆以興頭示之皆釋兵降鉤町王禹漏卧侯俞震恐入粟千斛及牛羊勞吏士立還歸郡興妻父翁指與興子邪務收餘兵迫脅旁二十二邑反立奏募諸夷與都尉長史分将攻翁指等翁指據險為壘立使竒兵絶其饟道縦反閒以誘其衆都尉萬年曰兵久不決費不可供引兵獨進敗走趨立營立怒叱戲下令格之都尉復還戰立引兵救之時天大旱立攻絶其水道蠻夷共斬翁指持首出降立已平定西夷徴詣京師張亮則字元修南鄭人牂牁太守威著南土永昌越嶲夷謀欲反畏亮則臨郡乃止謝暹牂牁郡功曺光武時公孫述據蜀暹乃與郡大姓龍𫝊尹董氏保境為漢遣使従畨禺江奉貢光武嘉之並加褒賞號為義郎劉寵字世信綿竹人牂牁太守初乗一馬之官布衣疏食以儉化民居郡九年仍乗一馬而還吏民為之立銘景毅靈帝熹平五年西南夷叛以毅為太守討平之多恵政為夷人所懐諸葛亮字孔眀南陽人佐昭烈拜丞相後主即位封武鄉侯先是益州郡有大姓雍闓反建興元年夏牂牁太守朱褒據郡反應雍闓三年亮征南中時牂牁帥濟濟火者聞亮至通道積糧以迎亮命為先鋒蠻帥孟獲擁衆拒命亮七擒七縦猶遣獲獲止不去曰公天威也南人不復反矣遂入滇池益州牂牁諸郡皆平李恢字徳昻建寧俞元人章武元年拜交州刺史隨丞相亮南征軍於昆明為蠻㓂所圍恢詭辭以待之㓂圍稍懈恢出奇奮擊大破之追奔逐北南至盤江東接牂牁與亮聲勢相連平定南土恢功居多封漢興亭侯馬忠字徳信閬中人拜牂牁太守自朱褒亂後忠撫理甚有威恵及劉胄反以忠代張翼為庲降都督遂斬胄平南夷加奮威将軍封彭鄉亭侯忠有度量忿怒不形於色恩威並立夷人畏愛及卒流涕盡哀立廟祀之張嶷字伯岐南充人従馬忠討劉胄戰每冠軍遂平南夷牂牁興古獠種復反忠令嶷討之嶷招降二千餘人悉𫝊詣漢中遷越嶲太守盪㓂将軍賜爵闗内侯鄧芝字伯苖新野人漢司徒禹之後延熙十一年涪陵蠻殺都尉反芝以車騎将軍假節率軍征討即梟其渠帥百姓安堵晉李毅天水人廣漢主簿太康中罷寜州入益州以毅為校尉持節統兵鎮南中監五十八部太安二年復置寜州以毅領刺史明達剛斷蠻民信服王遜魏興人以廣漢太守代李毅為南夷校尉寜州刺史時荒亂後官民虚竭綱紀弛廢遜披荒糾厲收聚離散征伐諸夷俘馘千人計獲馬及牛羊數萬餘於是莫不震服威行南土累加散騎常侍安南将軍賜爵褒中縣公毛孟寜州治中恵帝末西南夷叛㑹刺史李毅卒孟詣京師求救不見省孟固請曰君亡親䘮幽閉窮城萬里訴哀不垂愍救既慚包胥無哭秦之感又愧梁妻乏崩城之驗存不若亡乞賜臣死朝廷憐之乃以王遜為刺史董霸永嘉中以平樂太守破牂牁平夷等地毛椘巴郡枳人牂牁太守為夷人所懐畏唐南承嗣范陽人南霽雲子為婺川别駕賜緋魚袋厯施涪二州一云為清江郡太守多善政時廵夜郎牂牁溥沛恩恵後自請從軍討王承宗栁宗元代為狀髙崇文元和元年西川節度使領兵討平劉闢因定諸夷置藺州段文昌字墨卿荆州人文宗時為四川節度使政尚寛静聞以威斷不常任也羣蠻震服長慶二年黔中蠻叛觀察使崔元畧以聞文昌使人開曉蠻引還遷兵部尚書冉安昌招慰使昌以婺川當牂牁要路請置郡以撫之其後思夷等州土地之闢夷民之附自斯舉始宋劉光義太祖乾徳間平蜀光義以威徳著請置永寜路以控羿羅諸夷邉鄙以寜光義爵里無考姑従舊志宋景陽真定人開寳八年廣右諸夷作亂詔景陽率師征之悉定廣右復進兵都雲等處西南以平詔建縂管於大萬谷樂等處授景陽寜逺軍節度使都縂管以鎮之景陽撫綏勞來甚得逺人心而栁州慶逺民多歸附其蘇趙周髙蘭蔡南容七姓舉族附焉卒贈太尉諡忠成子孫世爵其土為宣慰宋氏李允則字垂範濟州團練使謙溥子也太平興國七年擢閤門使髙溪蠻田彦伊入㓂遣詣辰州與轉運使張素荆南劉昌言議允則以蠻徼不足加兵悉招輯之元阿爾哈雅輝和爾人至元二年僉河南行省事十五年降八畨羅甸蠻以其縂管文光兒入見置宣慰司並八畨羅甸等十二安撫司以鎮之舊志載譚澄有平羅羅斯功乃四川建昌衛地與黔無與宜刪又趙世延之平烏蒙倣此劉繼昌至元時為兩淮招討司經厯行省阿爾哈雅遣招諭西南諸蠻繼昌深入險阻大播徳威八畨兩江溪洞皆降附焉伊蘇徳勒納琳子智勇類其父至元十一年授西川䝉古軍馬六翼新附軍招討使遷四川西道宣慰司加都元帥羅斯鬼國亦奚不薛叛詔以四川兵㑹雲南江南兵討之至㑹靈闗亦奚不薛遣先鋒阿麻阿豆等將數萬衆迎敵伊蘇徳勒馳入其軍挟阿麻阿豆出斬之亦奚不薛懼率所部五萬餘户降以功拜西川等處行中書省左丞烏嚕斯至元十六年置八番羅甸宣慰司首以烏嚕斯為宣慰使時諸蠻叛服不常烏嚕斯討平之乃立安撫司以守焉李徳輝字仲實通州潞縣人至元十七年西南蠻羅斯鬼國復叛詔雲南湖廣四川合兵三萬討之兵且壓境徳輝以左丞被命至播乃止三道兵勿進遣張季思諭鬼國趣降其長阿察熟徳輝名曰是活合州李公邪其言可信即自至播州泣且告曰吾属百萬人㣲公來死且不降今得所歸蔑有二矣徳輝上聞乃改鬼國為順元路以其長為宣撫使其後有譖徳輝受蠻馬千者帝曰是人朕所素知雖一羊不妄受寜有是邪不聼徳輝受降還至黄平夜星霣如斗嘆曰他日嘗夢主烏江今播水名烏江適遇是星霣吾死徵也吾嘗羨馬伏波老當益壮竒曺武惠為将不殺今所活者多馬革裹尸歸何憾病七日卒贈中書右丞諡忠宣張禧東安州人至元十七年従右丞劉深征八百媳婦國師次順元與叛蠻宋隆濟力戰而歿贈左丞追封郡公諡武宣碩格䝉古人世祖至元十九年亦奚不薛叛置順元等路軍民宣慰司以碩格為宣慰使經理諸蠻二十四年遷河東等路萬户府播州宣撫賽音布哈等赴闕請留之降八畨金竹百餘砦得户三萬四千以其地為郡縣置順元路金竹府以統之李呼喇濟隴西人至元二十一年以四川南道宣慰使與恭政竒爾濟蘇僉省巴拜左丞汪惟政分兵進取五溪洞蠻時思播以南蠻獠叛服不常往往刼掠邉民詔並討之一軍出黔中一軍出思播一軍出澧州呼喇濟一軍出䕫門㑹合伐山通道破其險隘敗其前鋒諸蠻長乃降蒙古岱契丹人父保通世祖時賜金符襲父職為隨路新軍縂管従行省伊蘇德勒征蜀及思播有功陞萬戸従攻羅必甸破之二十九年入覲成宗即位授烏撒宣慰使遷大理金齒都元帥六年討平烏撒羅羅斯賜鈔銀鞍轡弓矢後遷雲南行省中書左丞宣慰使都元帥卒贈平章政事封濮國公諡威愍劉國傑女直人更姓劉貎魁梧善騎射初為湖廣行省平章政事大徳五年宋隆濟及蛇節反烏䝉烏撒東川芒部諸蠻従之䧟貴州詔國傑将各路兵討之賊鋭甚官軍失利傑乃命軍士人持一盾著釘其上俟陣合即棄盾佯走賊果逐之馬遇盾皆仆國傑鼓譟趣之賊大潰斬蛇節隆濟遯去李京字景山河閒人大徳五年由樞密宣慰烏蠻尋陞烏撒等道宣慰副使佩虎符兼管萬戸時烏䝉䓁地隸雲南行省京方下車㑹群蠻不靖按行調𤼵饋給鎮撫周履滇境後悉其見聞為誌略四卷以進翰林學士虞集元明善序之曺伯啟字士開碭山人延祐元年拜刑部侍郎八畨帥擅殺啟邉釁朝廷用師伐之命伯啟往詰其事次沅州道梗遣令使楊鵬單騎往諭新帥偹得其情上奏坐前帥擅殺罪邉民以安塔海䝉古人進士為嘉定路同知天厯中順元永寜蠻梗化驛𫝊阻絶蜀省檄塔海往諭之深入重險曉以禍福諸蠻遂幡然争奉期約不兩月驛騎雲集𫝊舍一新尋陞羅羅斯宣慰司同知克楚䝉古人至順初為八畨順元宣慰使有恵政勇畧過人嘗奉命将兵討雲南厥功懋著諾海䝉古人至順間為雲南行省都事殫忠勤嫻辭令敻出等倫烏䝉土官祿余叛諾海奉詔往諭祿余拒不受俄而賊大至諾海因與力戰比暮烏撒兵入順元境左丞特穆爾巴哈禦賊諾海復就陣宣詔招之遇害諤勒哲至明間任八畨順元宣慰使都元帥奉宣徳意懐柔逺人境内康义明總督王驥束鹿人永樂丙戌進士正統六年以兵部尚書提督軍務征麓川思仁封靖逺伯十三年復征麓川還㑹貴州苖叛擒其長蟲富檻送京師卒諡忠毅侯璡澤州人宣徳丁未進士正統初以郎中恭尚書王驥軍務功成晉兵部侍郎鎮撫雲南景泰初貴州苖叛攻圍普定平越諸衛勢甚猖獗詔命督軍進討璡至普定力戰賊大敗遯去平越諸圍俱觧功進尚書又進克平荘堡長官司時暑雨方甚疫癘大作璡病䔍猶戒諸将整兵進勦毋貽生民患無一語及私舁歸普定卒王來慈谿人景泰元年辰沅靖及平越諸苖叛苖長韋同烈據清平香爐山為梗大肆刼掠命來以都御史縂督軍務及保定伯梁瑶帥師討之所至賊皆迎降遂進攻香爐山擒韋同烈等送京師餘黨悉平民為立平蠻恩信碑應舊志有程信平都掌蠻屬四川非貴州地刪王軾字用敬公安人天順甲申進士𢎞治四年以僉都御史廵撫貴州入為大理寺卿十一年普定蠻婦米魯叛官軍往征營為賊劫殺布政使閭鉦執太監楊友死者甚衆十六年軾以户部尚書督兵討平之加太子太保卒諡㐮簡張岳恵安人嘉靖二十六年縂督湖貴初鎮筸銅仁苗魁龍許保吳黒苖作亂縂督萬鏜討之首惡未獲遽班師至是復叛陷思州知府李允簡死之岳檄調縂兵沈希儀恭将石邦憲督兵時邦憲被論當觧任岳疏留之後屢破㓂先獲許保母女妻妾後復擒保衆議班師岳謂吳黒苗竄匿必為後患復跡斬之事聞留岳鎮撫數年卒諡㐮恵馮岳慈谿人嘉靖三十三年以兵部左侍郎兼僉都御史縂督湖貴時苖賊盧阿項煽亂檄縂兵石邦憲擊平之事聞進右都御史兼侍郎李化龍直𨽻長垣人進士經緯䧺才久厯邉鎮縂督川湖貴州主征播事其馭将機權馭酋方略出人意表雖羽檄交馳而尺牘文告皆珠璣錯落開誠布公得人死力賜劍未嘗輕用賊平功遷尚書少保播人祠祀之王象乾字霽宇山東新城人嘉靖時㕘議重光孫隆慶辛未進士萬厯辛丑以縂督代李化龍經理善後事繕城郭立學校撫流離置牧守簡将儲糧則壤㝎賦皆盡心為之播餘孽吳洪聚沙溪結連水西為亂設計討平之銅仁苖賊吴老喬平越賊阿浪等作亂遮滇黔道未半載悉平進右都御史父之垣官户部左侍郎卒連章告歸瀕行疏水西安氏必叛天啟中果有安邦彦奢崇明之變後進少師兵部尚書卒贈太師蔡復一字元履同安人臨事果決下筆淵妙有文武才天啟中撫治鄖陽尋拜少司馬總督五省兵討水西一切兵食戰守早作夜思心計手畫功未就以勞瘁卒於官張鶴鳴字鳳臯潁州人沉毅有膽識萬厯四十六年廵撫貴州尋兼縂督諸苖煽亂道路為梗鶴鳴率兵勦之親履行閒指授方畧所至悉平蠻獠憚服朱燮元字恒嶽山隂人崇禎閒縂督蒞任後即有桃紅壩之㨗渠魁安邦彦等擒斬畧盡居黔七載務在懐柔逺人創設各衛所城汎布置有方畧晉少師卒於官以上縂督廵撫王恂字用誠公安人宣徳庚戍進士正統時廵撫貴州賑窮掩骼民夷懐畏景泰初遷祭酒著有誠齋集蔣琳錢唐人恩廕景泰四年以副都御史廵撫貴州亷幹果毅剔蠧鋤强平清水江苖亂遷建布政司署為治卓有條理白圭字宗玉南宫人正統壬戌進士凝重簡默喜怒不形天順初以副都御史廵撫湖廣兼理貴州屢建征討績凡在行閒不令家人子弟得冒功賞人以此多之厯官兵部尚書贈少傅諡恭敏李浩字徳廣安陸人天順時為左布政適苗叛拜副都御史撫治四川大壩夷亂統雲貴兵征勦所向克㨗陳宜字公宜太和人正統壬戌進士成化初由雲南左布政遷副都御史廵撫貴州清浄簡易推心置腹平都長蠻賜金幣已有訴功紀不實者意宜必狥庇宜乃具疏自劾且請究治事雖報罷輿論多其持正遷兵部右侍郎秦敬涿州人成化六年由浙江左布政陞副都御史廵撫貴州治責大指不苛細小民戀之如慈母及代去黔民擕老扶幼送之百里涕泣不忍舍宋欽字敬之陕西乾州人成化十三年以僉都御史廵撫貴州光明正大洞見表裏苖夷感化相戒毋犯邉溷我公清寜之化陞南大理卿陳儼字時荘廬陵人景泰甲戌進士成化十四年廵撫貴州興利剔弊惟恐不及西堡寨苖弗馴躬往諭之歸化者半有終弗率者請於上躬擐甲胄擣其巢號令嚴明信賞必罰於是憑崖伏洞者望風請降或持牛酒詣軍門羅拜㨗聞賜勅褒嘉仲子㫤従軍有功抑弗報将佐請遣之奏㨗亦不聼官至南刑部侍郎何喬新字廷秀廣昌人進士厯官刑部侍郎成化閒播州宣慰楊輝寵庶子友欲奪嫡子愛乃立友為凱里安寜宣撫司誣愛以交通唐王朝廷遣官即訊友賄諸權貴皆為㳺説喬新至盡條上其罪状白愛無反謀而革友宣撫職播事遂定孔鏞字昭文山東人至聖裔天順甲戌進士成化時廵撫貴州有清平縣苖阿溪者桀鷔多智有飬子曰阿剌膂力絶倫兩人相資横行夷落嵗賂上官以肆其毒鏞至亷得其状用指揮王通計擒而磔之一境以寜鄧廷瓚字宗器巴陵人景泰五年進士成化十年初設程畨府舉瓚異等出守時方草昧瓚以清浄治之蠻民悉奉約束城郭廨舍以次興作居程畨九年四境晏如遷山東恭政𢎞治二年貴州黒苖叛勅廷瓚為廵撫提督軍務號令嚴明将校用命擒械首惡平之䟽請更張為保境安民之計設都勻府獨山州麻哈州清平縣官至左都諡襄敏張㢘字孟介歸安人𢎞治間按察使陞布政使尋陞廵撫在事日久民俗蠻情靡不諳曉凡所興革撫討悉中機宜錢鉞字大用杭州人成化二十三年為貴州按察使注意學校奨率人材製樂器以供祀典增學舍以偹肄習立社學以訓蒙童𢎞治十二年由太僕寺卿遷副都御史廵撫貴州清操善政一如㢘使時劉洪字希範鍾祥人成化戊戌進士厯官雲南浙江廣東俱有聲𢎞治十五年以僉都御史廵撫貴州值米魯叛剪其遺孽城其險要餘氛以靖上賜勅褒奨謂劉大夏曰劉洪㑹幹事盖以大夏所薦也後遷任川廣有平賊功次子渠亦廵撫貴州有父風洪鍾字宣之錢塘人進士𢎞治十八年以順天廵撫副都御史調貴州時值用兵後地方疲􅉵鍾惟以休養安和為務尋奉命縂制四川厯官刑部尚書左都御史沈林字才羙長洲人成化辛丑進士正徳七年以右僉都御史廵撫貴州時宣慰宋然激乖西苖叛林䟽請将貴筑平伐等七土司並洪邉十二馬頭地方金竹安撫二司縂設為府洪邉貴筑各設縣並以流官撫理㑹遷去後撫陳天祥覆奏意見不同未即准行迨八十年後改設林言一如左劵陳天祥字元吉吳江人正徳八年以提調天津左僉都御史調貴州廵撫值金石司土官石承寵糾卧龍賊王阿倫泗城州賊王彪等僭號為亂天祥與御史鄺約擒勦之召還協理院事鄒文盛字時鳴公安人𢎞治癸丑進士正徳十一年廵撫貴州時清平衛苖阿傍等據香爐山以叛焚劫興隆偏橋等處道為阻梗上命文盛合湖廣兵勦之破其寨俘阿傍等遂進勦黒苖擒其魁阿兹㨗聞降璽書奨諭歴官户部尚書卒諡荘簡曺祥字應麟歙縣人正徳間廵撫先是鎮筸銅仁等處苖亂祥至即諭以利􅊣令觧散其不従者悉擒斬之普安蠻阿則及凱口苖阿向等糾黨煽亂祥集兵殄滅賜璽書慰勞及金幣有差徐問字用中武進人𢎞治壬戍進士嘉靖間廵撫貴州為政以善俗化民為務都勻土賊䝉越倡亂民疲轉輸問多方調停刻期勦捕越乃就擒著有讀書剳記遺於黔官厯南户部尚書諡荘裕劉士元字伯儒彭縣人嘉靖十年以副都御史廵撫貴州先是正州鄭駱二土官漁獵剝民有周天星王大魚等煽動作亂勦平之又流賊徐雲山等亂亦平之復䟽免安撫司朝覲進馬地方咸受其福劉渠字清甫廵撫劉洪次子正徳辛巳進士嘉靖二十三年以右副都御史廵撫貴州以烏撤道里綿逺苖賊强悍議建哨堡撥兵防禦請增設守偹於迤東以兼制之詔従其議地方頼以寜靖王學益字虞卿安福人嘉靖己丑進士二十四年廵撫貴州以弭盗之法莫切於保甲作保甲諭其詞簡切詳明二十五年題增觧額厯官工部尚書任轍字子眀安陸人嘉靖丙戌進士始為大理寺卿心存撫字尋以憂去民念之二十六年廵撫貴州計縛叛苖吴龍等邉陲以寜三十年以病乞休劉大直華陽人乙未進士嘉靖間廵撫貴州光眀俊偉具文武才立保甲法以止盗延工師以教織清屯田練士卒省驛逓恵政甚多甫六月卒民罷市哭之髙翀字允升安陸籍新淦人嘉靖丙戌進士三十五年由貴州布政陞廵撫㑹麻哈州土同知宋珠煽賊王三等作亂翀調縂兵石邦憲集兵平之又都勻苖頭阿章等不納糧馬殺掠民人翀檄兵偹項廷吉調土兵勦平之邦憲善用兵廷吉有執持翀能專用之稱知人吴維嶽字峻伯孝豐人嘉靖四十二年廵撫貴州時苗賊既平言官謂撤沅州縂督歸其柄於貴州廵撫㫖下所司議便於是更賜璽書頒旗牌湖北川東大小諸司悉聼節制廵撫貴州提督軍務自維嶽始鮑道明字行之歙縣人戊戌進士嘉靖間廵撫時容山土司韓甸糾集諸洞以叛勢甚熾明徵土兵遣将授以方畧擒斬多功購縳甸等遷南廷尉趙錦字元朴餘姚人嘉靖甲辰進士由南御史廵按貴州因變陳言劾嚴嵩廷杖為民隆慶改元廵撫貴州䟽請改程番為貴陽府貴筑平伐二司并為新貴縣厯官左都御史杜拯字道濟豐城人嘉靖戊戌進士隆慶元年以右副都御史廵撫貴州㑹同御史王時舉䟽請将湖廣沅靖二州及六衛四川三土司併黔條奏其便有十皆碩畫也當時泥不果行尋自陳乞罷銓部楊博議留畧曰杜拯持一㢘而始終不變經三黜而耿介無雙阮文中字用和南昌人嘉靖癸丑進士隆慶四年由太僕少卿陞右僉都御史廵撫貴州時土官安國亨安智因事訐殺前撫将坐以叛逆未決前撫去文中代之閣臣髙拱授以方畧文中至黔訪得其實復請於拱卒決其事免軍興之擾時又有巨㓂者念擁兵僭號垂三十年有司不能制因不以聞文中復請計於拱𤼵兵勦之擒斬者念一境遂寜後移湖廣廵撫許子良字宜夫仁和人隆慶二年進士萬厯間廵撫貴州㑹雲南姚闋作亂子良日夜調度斬級數百事得平尋改鎮鄖陽未赴卒嚴清雲南後衛人嘉靖甲辰進士萬厯三年廵撫貴州清介自持不少貶䟽請守廵分駐地方卒為定制尤加意庠序增設廪餼多恵政厯官吏部尚書卒謚恭肅江東之字長信歙縣人萬厯丁丑進士為御史正色立朝摘𤼵内璫馮保姦状侃侃有聲二十四年廵撫貴州捐貲於各府州縣衛平價市買偹賑田右文田澤幽田恤𨼆局恵藥局田逓馬榖田欽恤軍田以賑助貧士資給軍民又於南明河中築鰲磯建甲秀樓以培風氣黔人稱賢撫者必以東之為首云郭子章字相奎號青螺泰和人隆慶辛未進士萬厯二十七年廵撫貴州厯十年習知民𨼆凡所設施永垂利澤尤善奨㧞士類經其品題率成名宿著黔記六十卷經濟卓然先是播州酋楊應龍作亂王師屢征不克天子拊髀廷臣交薦子章匹馬入黔增兵餉扼要害立賞格士氣百倍興師纔百餘日擒應龍誅之播州平始經理播州為平越等郡縣未㡬復有皮林之役功與播等黔人戴恩建生祠七所更有建懐徳祠以子章與諸葛武侯闗大帝鼎足者三十五年陳情終飬䟽九上始得請晋兵部尚書胡桂芳字瑞芝金谿人進士寛和凝重喜怒不形萬厯間繼郭子章撫黔時軍興之後一以休養生聚為事民用乂安李橒鄞縣人廵撫貴州天啟元年予告候代次年二月水西叛圍省城橒分布紳士兵民協力固守一切糗糧火藥器械皆取辦於橒時城中兵止三千倉糧萬餘石計可支一年四月縂兵張彦芳率兵一萬八千入城坐糜倉粟橒散八千於外既而糧垂竭每兵日食自一升減五合以至一合迨十一月顆粒俱盡乃集諸将士㰱馬血以訂盟無二心者又踰月而圍始解晉兵部左侍郎回籍王三善字彭伯永城人天啟二年以太常卿擢貴州廵撫甫拜命就道而黔已被圍三善號召逺近兵來援六月次甕城河為賊所挫退保平越至十二月復整旅前進賊敗遁圍解詔晉兵部侍郎悉以討賊事付之三年冬率馬烱等三大帥兵四萬自遵義入屢戰克㨗直抵大方賊旁匿箐洞相持久糧運不繼士有饑色乃旋師賊従間道邀其歸路至内荘兵潰遇害事聞贈兵部尚書立忠烈祠以祀之以上廵撫廵按吳訥字敏徳常熟人永樂末舉貢生宣徳三年廵按貴州綜覈精明百度振飭尤加意士類著小學直解訓之比還藩臬以百金佐装訥不能却及去後寄還封識如故其㢘而不激類此厯官右副都御史卒諡文恪黄鎬字叔髙闌縣人正統乙丑進士授御史按黔值苖亂鎬行部至平越被圍賊攻甚急嬰城固守凡九閲月士卒掘草根煮皮甲以食鎬多方鼓勵身同甘苦援兵至鎬督兵夾擊賊乃遁按貴三年條上黔事五十三䟽言言中窽上嘉納之厯官户部尚書卒贈太子少保諡襄敏郭本字道充融縣人景泰二年進士七年以御史廵按貴州風清弊絶後以權璫肆惡本䟽劾之謫雲南永平典史久乃量移自慨不得一抒才力辭疾歸宋有文資縣人景泰甲戌進士天順間廵按激濁揚清𤼵奸摘伏不事鉤距翕然稱神明厯官右副都御史廵撫甘肅楊純隣水人成化中進士十七年廵按貴州斷決如流任滿百姓乞留一年朝廷許之民謡曰隣水楊但願年年廵貴陽貪汚畏法軍民安康陞陕西副使去之日民苖遮道攀留鄧庠字宗周宜章人成化壬戌進士拜御史㑹貴州苗弗靖撫臣請加兵命庠往勘上言宜従撫諭允之厯官户部尚書王鑑之㑹稽人成化丙戌進士十九年廵按貴州亷潔率下蠻夷信服時都勻仲蠻叛鑑之單騎深入諭以朝廷徳意蠻感泣投戈降獲免軍興之擾包裕字好問臨桂人成化戊戌進士𢎞治元年廵按貴州寛洪仁恕耻以鷹擊鷙攫為能凡事務通民情不怒而威尤加恵煢獨悉收之養濟院無失所者黄玹字敬潤蒲圻人成化乙未進士由髙安知縣陞御史𢎞治四年貴州都匀苗亂勅玹往紀功改土歸流改衛為府厥功居多陞大理寺丞王一言字行之内江人進士𢎞治七年廵按端凝嚴重吏不敢犯民不忍欺論者謂如雨露霜雪寛嚴各以其時十二年陞雲南兵偹尤多善政厯任僉都御史馬炳然字思進内江人成化辛丑進士由嘉魚知縣擢御史𢎞治間廵按貴州才名懋著厯陞至縂督為流賊劉六所執刃挾作書退軍不従遇害妻女俱赴水死事聞贈右都御史諡毅愍弟自然由進士為貴州右叅政剛毅不撓有炳然風丁養浩仁和人𢎞治九年廵按貴州擊强禦通下情興學育才以教化為先所至多吟咏黄珂字鳴玉遂寜人𢎞治間以御史按貴州卓然持大體不以搏擊為能比用師討蠻亂命珂紀功殲渠散脅凡殺良充級者悉斬以狥恩威並著卒以成功張淳合肥人𢎞治間廵按性嚴峻吏不敢犯監軍平普安米魯之亂厥功甚偉徐文華嘉定州人正徳間廵按甫入境㑹有乖西阿賈阿禮之變相度機宜宻授偏裨以竒䇿討平之周文光字實夫金華人正徳十年廵按時都勻苖宼充斥文光䟽糾指揮潘繼武等退怯並劾㕘政胡濂逗留之罪後賊平陞俸一級時四川廵撫馬昊勦僰蠻四散犇突合芒部烏撒等夷㓂黔黔兵𤼵而川兵不至文光疏劾昊玩㓂趣其同力滅賊黔人倚以為重周廷用字子賢華容人正徳辛未進士廵按貴州值香爐山苖叛與廵撫鄒文盛同心恊力平之其才氣倜儻豪岸言事不避權要後為監司不肯逄迎阿諛以正直稱胡瓊延平人正徳十三年廵按威望丰采凛不可犯先是黔俗黷鬼巫覡以禍福惑人瓊首厲禁之毁淫祠不在祀典者數百所一時民俗丕變劾縂兵昌佐之貪婪抑中官王誨之豪横尤凜凜可稱劉廷簠字器重安福人嘉靖二年廵按清苦自茹按部屛除騶従匹馬雙旌徧厯荒徼𤼵姦摘伏凛若神明郭洪化字子弼安福人嘉靖二年進士授御史十年按貴州以諫採大木削籍為民卒後贈光祿寺少卿王杏奉化人嘉靖十三年廵按峻節凛然摘伏如神大猾歛手貴州鄉試原附雲南道里艱阻杏奏請開科於本省従之趙大佑浙江太平人進士嘉靖二十年廵按果敢峭直執法不回臨大事決大疑片言而止土酋有隂懐不軌者讋佑威名遂寝其謀厯官兵部尚書薛繼茂字隆華保山人御史倜儻有風裁屢著讜言萬厯中按黔懲貪剔蠧吏治為之一清興學校廣觧額黔士至今頌之應朝卿臨海人萬厯己丑進士官御史端亮敢言風采素著萬厯中廵按黔中殫力興除與中丞江東之共置右文偹賑恤軍恵藥諸田士民利頼楊鶴字修齡武陵人進士萬厯間御史立朝議論侃侃時臺省交搆鶴上持平一䟽痛切時弊羣心厭服廵按貴州以激揚自任暇則進諸生質疑問難夜分始罷諸生索書者滿前鶴欣然一一揮灑宛若師弟士以此悦其教尋擢太常少卿厯官縂督三邉都御史史永安字盤石武定州人以庻常授御史天啟元年出按黔次年水西叛将圍貴陽咸諷永安當以廵行去不聼賊圍既合慷慨登陴與士民固守閲十月援兵不至城中食盡乃召諸将士誓死為作飲血歌以見志或有泣下者永安正色曰吾軰為朝廷守封疆經年城即破得死所矣正當談笑而道何泣為時援兵怯賊徘徊平新間永安復作四詩以蠟書逹平越中有刺新撫逗遛語新撫見之親率諸軍即日進發一鼓破賊圍解晉太常少卿厯官兵部侍郎傅宗龍昆明人萬厯庚戍進士天啟間廵按時值王三善敗於内荘人心惶懼宗龍調兵籌餉井井有條誅陳其愚之奸人心快服後厯官兵部尚書陜西縂督討李自成兵敗死之諡忠壮馮晉卿合江人天啟壬戌進士崇禎十一年廵按振揚風紀無或枉橈豪猾斂跡尤以愛育人才為念躬自課試第其等差而奨勸之多所成就蠲贖鍰修入川大道垂數百里行者便之肖象以祀著有天符笈草行世朱奉字連水成都人崇禎辛未進士崇禎十五年廵按丰采峻整激濁揚清顰笑無茍杜絶苞苴辨疑獄數十案一時號為神明復命歸里為流賊張獻忠所害以上廵按布政使蔣廷瓚滑縣人洪武中舉才行有大度永樂初以行人討平思南叛苖七年遷工部右侍郎後貴州設布政司上難其人以廷瓚素有威望於黔復為左布政使與民休息黔人頌之卒於官陳廸字允道宣城人洪武中厯官雲南左布政使時普定曲靖烏撒烏蒙等苖亂廸率兵擊破之獻俘於朝賜金幣官至禮部尚書建文中與齊黄同死難易節萬載人永樂中進士宣徳間為貴州左布政使寛洪有度撫字心勞一時治行翕然稱長者民不忍欺焉蕭寛吉水人永樂甲申進士累遷貴州左布政使寛洪有量端簡不譁未嘗疾言遽色而處大事裕如也范理字道濟天台人宣徳庚戌進士厯官貴州左布政使或謂之曰公陟方岳南陽相公力也盍往謝理曰相公以我不事奔競故用我我往謝是辱相公知也楊聞之愈推重及楊歿理走數千里哭奠曰吾無以報相公惟此一掬涙耳厯官南工部侍郎蕭儼内江人進士景泰間為左布政使多恵政奏請頒樂器增解額允之後致仕卒彭韶字鳳儀莆田人天順丁丑進士成化中任廣東布政薦陳獻章十四年因劾採𣙜諸璫忤上意調貴州甫下車首問民疾苦状一切利弊即與興除民有訟即反覆勸諭如家人父子累官刑部尚書諡恵安王詔趙州人天順甲申進士成化時為貴州左布政使度量汪洪政尚愷悌羣吏化之民用寜謐劉元仁壽人天順進士授主事𢎞治四年遷左布政使亷静寡欲以節儉為群僚先每飲惟清菜一味人號曰清菜劉張撫寳雞人𢎞治間布政使剛介明敏而清苦尤著貪墨者瞿然化之閭鉦涇州人𢎞治十一年為右布政使米魯之亂督餉遇害事平贈官廕一子入監朱芹富順人以右叅政分守平越天啟間安酋叛圍平越芹歃血誓衆募兵堅守城乃得全陞布政使朱家民字覺民曲靖人天啟三年任貴陽守時黔圍初解閭里蕭條家民極力撫循漸有起色尋擢安普監軍副使冒鋒鏑闢榛莾以通滇道創建連雲等十一城扼要守險使賊不敢窺又盤江湍悍舊以舟渡多漂溺家民欲建橋艱於架石乃倣瀾滄江制冶鐵為絙凡三十有六紐於鐡柱而繫之兩㟁布板楯其上凌空飛渡往來遂成坦途夾岸遍布樓閣灑翠流丹煇煌掩映在黔十餘年勞勩最多遷至左布政使歸著有端俗約言以上布政使按察使成務興國州人洪武丙子鄉舉永樂初為御史亷介有聲十一年設貴州按察使務為首任秉憲得大體為黔臬賢能之冠杜銘金堂人正統乙丑進士成化初按察貴州持心仁恕多所平反疑獄一訊即決亡蔓引者厯官刑部尚書徐珪安岳人成化二十年按察使寛嚴調濟讞獄周詳必反覆無可出處而後入之民自以不寃尋陞左布政使朱守孚字仲孚桂陽人成化己丑進士為刑部郎錄囚雲貴多所平反陳金字汝礪應城人𢎞治九年按察貴州平易果決尋遷雲南布政父老請留舄以識遺愛金以所揮扇畀之衆寳蔵焉時有遺扇清風之咏倡和成帙厯官都御史吳伯通廣安人𢎞治十一年按察使不屑屑於細務而大體詳明暇則進諸生講明經義纚纚忘倦劉丙字文煥安福人成化辛未進士正徳四年遷貴州按察使亷明詳慎以洗寃澤物為已任決大獄每𫝊古義讀其牘者莫不縮頸吐舌駭為神明厯官南工部右侍郎諡恭襄姚鏌字英之慈谿人𢎞治進士正徳九年按察使作興士類頒矩矱定繩尺講業課士無有倦時韓士英南充人進士嘉靖間芒部亂英以副使兵偹畢節築月城鑿池引城外水便汲又建周泥站城衛民旋擢本省按察使楊最字殿之射洪人嘉靖十五年按察使剛果敢為㢘明執法人莫敢干以私厯官太僕寺卿時有㫖諭輔臣欲命東宫攝國一二年最䟽諫云聖諭及此不過信方士為調攝計黄白之術金丹之藥皆可以斵䘮元氣惟不邇聲色保復元陽仙夀不求自至䟽入大怒逮訊死獄中隆慶元年贈右副都御史諡忠節廕一子胡堯時字子中泰和人進士嘉靖中為貴州按察使嘗師事王守仁謂職任刑名宜先教化以躬行為人士倡修陽明書院凡守仁著作在貴陽者􅊖刋行之陳堯字敬甫南通州人嘉靖乙未進士三十五年為貴州按察使治崇大體恤民𨼆㑹採木命下堯持議不宜罷荒服有㫖徵丹砂若干觔臺使者檄徵之堯持不下時有先輸者臺使詫堯曰夜郎丹砂赤如血佳哉堯曰此百姓血也安得不赤一座愕然所徵砂竟寢不報厯官刑部侍郎馮成能慈谿人嘉靖乙未進士隆慶三年為貴州按察使至則與郡人馬廷錫等講學建陽明書院而為之記覩萬士和義倉慨然慕之於是以粟易金益以己俸置田每秋成積貯貸還一如萬之舊而田遂為永利程大賓字汝見歙縣人萬厯元年按察使講明理學尤多實踐言笑不苟僚屬憚之楊寅秋字義叔泰和人宰相士竒元孫由進士厯遷按察使萬厯中討播之役寅秋監黔蜀兵與中丞郭子章計用安氏以剪其羽翼乃檄安疆臣率所部兵従沙溪入戰扵大水田敗之四方兵始合破其巢賊平論功寅秋為最以勞卒於官子章為請䘏立忠勲祠以祀之蕭象烈字無競廬陵人進士崇禎間官貴州按察使清介自持平易近物凡所讞鞫務在原情必婉轉開釋而後已自奉甚約布衣蔬食有寒士所不能堪者推天下清官第一㑹黔人憤擊水西目把事連起大獄象烈力為平反忤直指意被劾落職去張燿陜西人舉人崇禎末任按察流賊孫可望陷省城燿同㕘議曾益至定畨與知州陳新第約土司募士卒為恢復計未幾賊陷州城燿猶操刀巷戰至日晡力盡被執賊将艾能竒謂之曰公我梓里也幸降我燿叱曰汝為賊我為朝臣安論梓里罵不屈遂遇害以上按察使叅政戴金字純夫漢陽人正徳甲戌進士嘉靖七年廵按四川十七年為貴州左叅政金按蜀時值芒部之亂沙保等聚兵劫掠金奏調官軍擒沙保復立隴勝為土官又䟽稱芒部與烏撒烏䝉水西等處因事讐殺乗機劫掠乃其常事而畢節實諸夷出没之所為川貴藩籬必武偹修而後可以消外患請令威清兵偹駐安莊仍於貴州添設僉事一員分廵畢節烏䝉烏撒鎮雄東川赤水永寜四府四衛一司更畨操練以偹諸夷貴州畢節設道自金始洪邦光同安人隆慶戊辰進士萬厯十一年以副使兵偹都勻樂平司叛苖樂禮生挾土官宋廷瓚夙仇糾衆反流毒甚惨邦光及知府梁柟集兵勦之與指揮婁聯璧楊威定計擒禮生誅之賊平陞左參政張悌河南人進士倜儻有才慷慨自許夙以邉才著名以四川叅政分守東川時討楊應龍值縂督李化龍丁外艱兵心稍懈獨冒暑單騎走監諸營激勵将士竟以平賊遷大同廵撫卒尹伸字子求宜賔人天啟中舉邉才以㕘政監軍従撫軍王三善進討水西料敵制勝具有成筭内荘之役不用伸計以至敗伸䕶殘卒歸招集訓練危疆再安厯官河南左方伯明末獻賊破叙州伸家居被執不屈遂遇害繆國維字西垣吴縣人進士天啟初任右㕘政分守新鎮道值安氏叛圍貴陽國維駐新添聚兵固守扼其東下力持半壁諸郡頼以無虞厥功甚偉朱之臣字無易成都人進士崇禎初年以右㕘政任貴寜道凡軍民利弊殫力興釐厯官户部侍郎文章政事為時所推重李中行山東人進士崇禎間以副使終飬起貴州提學未至擢平安道㕘政耿介不阿因黔人憤擊水西目把事廵按蘓琰受安賊賄誣以謀反殺胡朝棟等四人杖斃者八人中行憤極䟽糾琰為民訟寃語侵黔督朱燮元有㫖命黔督滇按勘其事奏覆奪其官黔民至今言及猶涙下郭時亮富順人舉人崇禎間為安平道㕘政恬澹寡欲一介不苟蒞任三載一以清浄為治士民安之㑹郎岱生夷蠢動時亮親往開誠撫諭遂寝其謀以上㕘政叅議楊㢘字念清泰州人洪武中用明經舉為御史宣徳初擢貴州右㕘議在黔六年清操一節賜璽書褒之及卒無資歸里遂卜𦵏城東三坡林因家焉尤安禮字文度長洲人建文三年舉人宣徳間由車駕郎遷貴州左㕘議潔己愛民以疾乞歸槖中僅餘俸八金歸即杜門以機杼謀生人罕知者有郡守秩滿入京適吏部與安禮同年詢其起居不能荅既還蘓遍訪之得安禮於委巷中方自絡絲芒鞋敝袴意泊如也聞郡侯至避去不肯見孫循舉於鄉曾孫越舉進士六世孫錫類舉進士復為貴州右叅政吴禋零陵人成化間叅議居官十年狷介亷明始終如一歸里之日惟圖書數箧而已吴環漳浦人𢎞治間叅議明作有為積弊蠲除殆盡蔡潮字巨源臨海人正徳十一年叅議時苖賊據香爐山叛出没抄掠聲言奪清平城潮計此衛不保全省之勢衡決矣遂留鎮撫告吏民曰去與守等死耳守猶百全一吏民感悟願效死乃修堞柵繕器械儲芻糧頃之賊突至圍城三匝潮堅壁力拒瞯賊少惰出兵擾之急則入保士死傷者親厯其門弔其孤嫠以故士益奮賊不得利引去已去復来如是者二年而城卒不陷又踰年鄒文盛督兵進勦潮領左右二壘斬䤋之功居多清平人尸祝焉潮在貴凡八九年以䜛不預政者居半所至進諸生講明經史嘯咏自得厯官河南右布政子雲程亦官貴州右叅政晉刑部尚書楊儀射洪人進士嘉靖六年叅議時芒部苗普奴沙保等攻圍畢節城都指揮李宗祐射斃數賊賊聚薪焚東門儀與宗祐及僉事龔亨計将城門作隙製佛郎機擊賊連斃多人賊乃引退城得全劉望之字商霖内江人進士以叅議分守銅仁性嚴毅嘗謂擇地而官臨難而畏非丈夫也一切行事惟従民便㑹鎮筸銅仁苖亂縂督張岳征之望之有轉餉功厯官大理寺卿王重光山東新城人進士嘉靖間貴州左叅議㑹赤水蠻叛光親諭降部議超擢以採木留光出入山箐冒瘴癘卒事聞賜祭贈太僕少卿孫象乾萬厯間以兵部左侍郎縂督川湖貴州金從洋華亭人隆慶辛未進士萬厯十一年以叅議分鎮銅仁時苗亂營壘未周卒伍未練従洋至按地形規要害以松桃為川苗之吭扼而守之自寅至辰版築如堵賊不敢窺以百卒屯焉時鎮官恣睢市井騷動白撫臣斥之民若更生在官二年志潔行㢘外和中毅諸将吏感且畏之擢滇臬民遮道送有卧轍者詹貞吉巴縣人隆慶戊辰進士萬厯二十年以右叅議分守新鎮道值播逆楊應龍将叛人情洶洶貞吉特擕家至平越以鎮人心衆方有固志貞吉居官澹泊簡易與民休息是時初設府凡經制籌畫殫厥心力蒞黔十餘年臨行宦槖蕭然惟圖書數箧張文燿沅陵人精神鋒穎以右叅議督餉轉輸不匱播賊平縂理丈量田賦凡公私之額盈縮之制皆其更定善後之功居多張棟直𨽻人以叅議監軍入播洞曉兵機激發将士破􅋭之日督戰陣前終日不食以勞瘁病凱旋出播而卒向日升湖廣人進士天啟間以右叅政兵偹道駐石阡之龍泉造士撫民輯兵禦苗多有恵政民立祠祀之周鴻圖字子固即墨人安邦彦叛以貴陽同知監紀軍事積軍功至平逺知府六年監叅将胡従儀及都司張雲鵬軍分道捜山所向摧破擢叅議分守清鎮道是時鴻圖駐平越轄下六衛僉事段伯炘駐安荘轄上六衛千餘里間奸宄屛息兩人力也曾益鄱陽人貢生精書法好讀古名将𫝊崇禎末任叅議賊陷省城與張燿走保定畨賊攻定畨益出戰斬首過當及城陷自題絶命詞末句云孤城魂莫散好去傍煤山投筆自經死以上叅議副使李睿濟寜人監生宣徳八年任貴州僉事正統二年遷副使先是諸郡衛强半無學睿䟽請遍建諸學教乃大行鄧珏字廷璧江夏人進士天順間為貴州副使三十年㢘介自持致政歸家足不履公署湯全字完之華亭人成化壬辰進士𢎞治二年副使渾厚精明寛於民而嚴於吏十八年陞湖廣廵撫吳倬字克大淳安人進士成化十九年僉事旋擢副使倜儻有為外嚴内寬置學田以贍士增站軍糧又為市田站軍思其徳建祠祀之名曰表賢隂子淑字宗孟内江人成化壬辰進士𢎞治十年遷貴州副使兵偹都清嫺武畧善謀多智人不可測黄土坡苗向阿讐叛談笑間擒而磔之諸部凜凛遷浙江按察使席書字文同遂寜人𢎞治庚戌進士正徳四年以副使提學貴州性嗜静養學問根本周程課士先徳行後文藝時王守仁謫龍塲驛丞書乃敦請入文明書院公餘則就見論學或至夜分諸生環而觀聼者以數百自是貴人士始知有心性之學書後以議大禮稱㫖加武英殿大學士贈太傅諡文襄張庠蓬溪人正徳進士嘉靖十年以副使兵偹都清饒智畧信賞必罰岩埋苗亂庠徵兵破之十一年豐寜土蠻楊桓叛庠復大破之去官之日士民卧轍攀留馮裕臨朐人進士嘉靖中出守石阡時播凱交惡裕討平之繼督芒部餉轉輸神速盤江之役懋著竒伐久之遷副使罷歸蕭然蓬户衣食不充處之裕如林茂竹莆田人正徳丁丑進士嘉靖十二年兵偹副使芒部叛後曲計彌防民得安堵人思之不衰王積字子崇太倉人正徳辛巳進士嘉靖十九年副使剛毅果敢法在必行庭無逋事亦無漏奸豪民猾吏與羣盗扞網者按治不少貸以故良善獲安後厯官南兵部右侍郎蔣信字卿實號道林武陵人嘉靖壬辰進士三十年以副使督學貴州訓生儒以黙坐澄心體認天理一時士俗翕然丕變雖喜怒不形第規規自度而潛移黙化有出於勸督之外者所奨㧞盡名士貴陽馬廷錫従之㳺粹然有成貴州有萬山中多虎患信為文驅之患稍息人比之昌黎驅鱷魚云被御史某誣劾削籍歸徐樾字子直貴溪人進士嘉靖二十三年以副使督學貴州講明心學陶鎔士類不屑屑於課程嘗取苖民子弟衣冠之訓誨諄切假以色笑盖信此理無古今無中外苟有以興起之無不可化而入也樾少師王守仁謂聖人為必可為厯官雲南布政㑹滇夷那鑑叛樾奮力勦之遂殞於難詔贈光祿少卿萬士和字思節宜興人進士嘉靖間提學副使禔躬方正師道尊嚴念黔士多貧乃出鍰金貿粟稍傚朱晦翁社倉遺意使貧士春貸秋還而為之記程嗣功歙縣人進士隆慶三年副使惇大亷明務飬和平之福在任無赫赫名去後人思之不已吳國倫字明卿興國州人進士隆慶六年提學副使以詩名世與王李諸人號七才子課士以禮讓為先風氣丕變凌琯歙縣人萬厯五年提學副使嚴氣正性世罕其倫凡教士即以文行忠信四字為言學者奉為山斗每晨起必冠服禮先聖像乃出視事寒燠不輟厯官陕西按察使沈思充桐鄉人進士萬厯間任提學副使雅意作人留心文獻召紳士之有學識者㑹纂貴州通志手自裁定犁然可觀沈子來字汝修歸安人萬厯庚辰進士三十八年以副使兵偹都清鯁直㢘介不附權貴甫下車值苖亂惕之以威撫之以徳不數月平定議叙民苖敬畏以勞瘁卒於官盧龍雲廣東南海人進士萬厯三十八年以副使分守新鎮具經濟才平定苗亂民頼以安張汝霖字雨若山隂人宫諭元抃子文章品行為時所推萬厯末年以副使提督學政範士以嚴諸生無敢越繩尺者考較鍳别精當所㧞皆知名士岳具仰延安人舉大官副使征水西従王三善死祀忠烈祠鄭朝棟澧州人由四川馬湖府陞畢節兵偹道副使天啟間水西安邦彦之亂老弱死少壮逃亡城池寺觀官舍民房盡皆焚毁棟多方綏靖崇禎初請𤼵帑金一萬三千兩修築城垣招集流離民懐其徳立祠祀之洪聲逺湖廣黄岡人舉人崇禎間分守新鎮道副使接物寬和民皆愛戴陳士竒字平人鎮海衛人天啟乙丑進士崇禎間為貴州副使提督學政博學强記下筆萬言立就性孤嚴徑行一意士每進見必論文終日援據古今闡㣲抉秘畧無倦容脱粟之飯即與諸生共之又善談兵思以戡除自見未幾以憂歸起補四川提學超遷廵撫值獻賊㓂蜀竒已得代至渝城聞賊警遂與瑞王入守城破被執憤罵不屈賊臠之時天正霽忽有震電之異以上副使僉事范循南充人永樂初進士正統間擢貴州僉事性鯁介凛凛持三尺從事不少貸部署肅然㒺敢骩法何俊字廷彦郴州人成化十七年督雲貴學政随俗導化濟之以嚴凡所陶鑄俱中器使陸健字文順鄞縣人𢎞治進士正徳間任貴州僉事西苖亂募㸃者作行脚僧人寨募緣暗帶苗境所無草實撒岐路為記又令軍中每人取拳石附膝間及春草種生時令去膝間石視草生處直抵苖窟又置板屋插兩廂為庇以避礌礟苗驚為神駭擾因殲其魁苗境悉平遷福建副使卒嚢無餘貲鄉人姚鏌治棺斂歸其䘮施昱雲南人丙戌進士嘉靖二十年以僉事任兵偹公明果斷遇事立決凡利民之事無不興舉田汝成錢塘人進士嘉靖時僉事廵撫陳克宅復征凱口囤賊阿向汝成獻書克宅陳説賊勢深中窽要灑灑數百言大㫖以據其要害斷其糧餉重營密柵勤其間覘勿以角利為言又請褫革容奸之土司王仲武以仲國法克宅閲書不省卒致敗龍遂字良卿永新人嘉靖乙未進士為給事中忤嚴嵩謫三十年稍遷貴州僉事飭兵思南思南人聞其名皆畏之遂至任以徳化民生致苗首吳黑於理事聞賜金帛後以誣歸黄鏌鎮海衛人嘉靖丙辰進士萬厯中以僉事駐畢節築石隄三百丈以障河泛又捐置學田士民頌之胡宥字子仁休寜人進士萬厯九年由御史以僉事兵偹畢節蒞官清慎改學刋書修城練兵均賦賑乏恵澤無窮病卒於官有僕文訓文學者文訓曾刲股雜粥進宥文學憫其主孤魂萬里欲従死自剄其喉咽創不合者僅指許而竟不死時稱二義僕云胡琳字璞完㑹稽人萬厯三十一年為督學僉事才品卓犖精於藻鑑毫髪不爽初試黔東諸郡還撫軍郭子章問曰此行已得元否曰銅仁饒生楷者可元也已而省試畢入見復曰元當屬貴陽潘生潤民矣比撒棘潘果元而饒亦登上第其以首名得售者十八人餘皆前列無遺錄者官至太常少卿劉錫鉉長洲人天啟初以僉事督學黔中校士甫竣尋值圍城之變錫鉉攝監軍事督諸生日夜廵守偹極勞瘁至於調劑兵食相度機宜深謀逺畧非他人所及危城得全錫鉉功居多圍觧晉秩副使因與直指齟齬遂被劾歸段伯炘雲南晉寜人由鄉舉為鎮寜知州力拒安邦彦擢僉事分廵鎮寜邦彦㓂普定偕叅将胡従儀擊破之由此擢恭議事詳周鴻圖𫝊李若楠廣西人以推官駐鎮新添天啟間安賊亂守禦有方賊不敢近陞畢節僉事以勞卒於官詹時雨字敬五鄱陽人甲戌進士由蘓松叅政左遷貴州督學道僉事以忤權貴故也在任執法不阿雖當道無敢干者所錄士皆真才先後售去遷河南叅政道阻不能前黔撫䟽留之遷貴州按察使以上僉事傅友徳字惟學宿州人洪武初封潁川侯充征南大将軍率師趨貴州攻普定擒安鎖築城通道屯兵聚糧恩威並著烏䝉烏撒東川諸蠻相率降附邉地悉平進封潁國公吳良定逺人洪武五年古州八萬諸洞苗亂良以江隂侯充縂兵官佩征南副将軍印率師討之次零溪進攻銅鼓五開潭溪克之既而擣龍里通洪州開太平所向皆㨗獨清洞巖山苗據險久不下良以計襲破之殱其衆古州八萬皆降收撫洞苗二百餘所籍其民以其地𨽻思州宣慰司卒贈江國公諡襄烈顧成字景昭湘潭人後家江都容貎魁梧勇壮有膽畧洪武九年従傅友徳平蜀破貴州蠻克普定授普定衛都指揮同知已而征雲南有功進征南将軍鎮貴州建文初班師四年以左都督封鎮逺侯又出鎮貴州申嚴號令威恵並行搗臺羅寨斬叛酋普亮群蠻震懾卒年八十五贈夏國公諡武毅民立祠祀之吳復字伯啟合肥人封安陸侯従潁川侯征雲南克普定巳西堡阿得寨蠻反復令顧成率兵討平之後轉餉盤江卒追封黔國公仇成含山人洪武十二年以安慶侯充征南副将軍征羙容諸洞復従征雲南克普定普安皆有功沐英定逺人洪武初累功封西平侯十四年充征南将軍副傅友徳討梁王及貴州東川諸蠻悉平卒贈黔寜王諡昭清費聚濠人洪武十四年従傅友徳征雲南克普定明年置貴州都司聚署司事雲南平封平凉侯逆舊志有藍玉係臣宜刪梅思祖夏邑人洪武三年封汝南侯十五年署貴州都指揮使宣布徳威民蠻安之湯和鳳陽人洪武十八年銅鼔蠻吴奤兒倡亂上命楚王討之以和充縂兵官佩征南将軍印江夏侯周徳興都督同知湯禮充副将軍偕往師號二十萬擣其巢穴執吴奤兒及其子送京師葉昇合肥人洪武十二年封靖寧侯二十年冬命昇與普定侯陳桓統兵征東川普定等處蠻㓂明年昇兵至普定克陸肇白照水冒等洞七月進勦東川烏路等寨平之陳桓濠人洪武初同胡海郭英率兵征雲南桓由永寜趨烏撒克七星關而進滇平功封普定侯二十一年奉詔通畢節道桓刋除榛莽分布屯田為久逺計畢節遂為重鎮俞通淵巢人父廷玉兄通海淵以父兄故充叅侍舍人功陞都督洪武二十四年古州蠻反命淵統諸軍討之克銀頼諸洞俘斬無筭封越嶲侯馬􅎡洪武初為貴州都指揮使政令明肅人莫敢犯創建城垣躬自督率堅厚凝固至今屹然肇造之功􅎡為第一後坐事死時論惜之陸秉鳳陽人洪武中以寜國衛指揮留守安荘衛武畧政事冠絶一時墾闢屯田九萬餘畆遷貴州都指揮尋調入京卒鄭彦文山西蔚州人仕元為萬户入蜀因家焉明兵平蜀率土官首先歸附授貴州宣慰招集民夷卓有善政従征雲南陞工部右侍郎張翼臨淮人洪武時以都督僉事従征雲南克普定曲靖取鶴慶封鶴慶侯舊志載曺震有開永灘功今不屬黔應剛程暹洪武初自滄州衛指揮遷貴州都指揮使時邉偹草創暹殫力經營功績最著楊文含山人洪武時左都督三十年古州蠻林小斯以妖術倡亂命楚王楨帥師湘王柏副之以文充縂兵官佩征蠻前将軍印簡徒三十萬由沅州伐山開路二百餘里直抵洪州泊里永従諸洞寨分道夾攻大破之擒馘二萬餘人韓觀成子也古州蠻林小斯倡亂命觀以副縂兵副楊文討之勦平臻部六洞螃蟹天柱天堂大小坪諸㓂何福鳳陽人洪武二十二年以縂兵官平都勻蠻俘斬萬計三十年討平畢節水西諸蠻邉境大定後封寜逺侯南黨郡人永樂初為征蠻縂兵領兵征苗至十萬谿力戰死尸猶立不仆王􅦌苗見而神之載尸歸𦵏為立廟蕭授未詳其籍貫永樂二十一年治古荅異部落叛以右都督充縂兵官帥師平之宣徳二年平都勻苗賊傳榜六年治古荅異復叛再奉命征討馘其長吴阿遮龍荅那等以其地附平頭司𨽻銅仁府邉境以寜常智興隆衛人宣徳間官都指揮桓毅勇果修學宫繕城壘厥績最著洛宣貴州衛人官都指揮洪武十六年従沐英往滇後征麓川身先士卒力戰死事聞賜祭加其子官二級王輅前衛人官都指揮従征麓川陣亡事聞賜祭顧勇成子饒智勇任都指揮僉事守普定兵民畏服尋従征麓川戰死孫禮新添人正統間都指揮勤於政理創建學校吳亮滁州人正統元年以都督同知充副縂兵官鎮貴州號令嚴明士卒用命㓂盗屏跡張祥四川行都司指揮僉事正統己巳貴州苗叛祥率所部來救至赤水大㨗駐兵守之㑹霖雨賊來攻勢甚盛祥曰事急矣吾屬當為國死至清水舖力戰死衛人立祠祀之墓在赤水郭英籍貫未詳正統間以叅将鎮平越威恵兼行蠻皆懐畏軍務旁午不廢詩書時稱為儒将方瑛全椒人威逺伯政子正統七年従侯璡征貴州進右都督移駐貴陽景泰元年以征香爐山功封南和伯權繼武興隆衛指揮厯官都指揮正統間螃蟹苖叛繼武進征香爐山戰死李震南陽人正統中征香爐山有功進都督僉事天順四年絞洞苖叛攻龍里城詔湖廣廵撫王儉及震為縂兵官討之震乃分兵攻絞洞諸寨追獲其魁李天保餘黨􅊖平張任貴州衛指揮驍勇多材畧嘗持鎗刺虎衆號莽張正統六年陞貴州都司景泰三年征香爐山又撫西等一百七十三寨陞叅将天順元年陞都督僉事充平蠻将軍卒賜祭遣進士鍾震造墳劉翀威清衛百户勇畧超羣正統間従征麓川奮不顧身親冒矢石出入敵陣斬獲渠魁累官指揮僉事張貴威清指揮有膽畧征討多勲庸正統間苖㓂圍城貴與指揮賈鏞分率精鋭出其不意敗之賊遂潰去陞都指揮金桂廬州人正統間任平壩衛指揮正大剛果軍政修明功陞都指揮僉事毛勝京師人景泰間充副縂兵率兵征香爐山苗韋同烈功封南寜伯卒贈侯諡忠壮梁瑶汝陽人保定伯銘子景泰間充平蠻将軍征香爐山苖有功進封侯舊志作石瑶訛陳友全椒人景泰間征香爐山功遷右都督平蠻将軍鎮守湖廣天順元年捕五開銅鼓苖賊召還封武平伯進封侯何瑛河南人景泰間任平壩衛指揮亷慎公勤凡城池𪠘宇祠廟道路修治一新遷都指揮僉事李貴順天人智勇超羣景泰間以副縂兵鎮守值苗叛多方撫勦乃戢建譙樓置壺漏葺祠宇多所創建王通新添人官都督鎮守清浪都勻闢土地置郡縣武功茂著引年勇退士論高之彭倫永定衛指揮成化中充叅将鎮守清浪凡三十年屢平芽坪絞洞古州卬水諸賊而天柱白崖塘之功尤竒遷都督僉事移鎮貴陽致仕張晟威清指揮讀書尚氣節長於詩以征南功遷都指揮僉事出守都匀推僉閫政陸卿安荘衛人雲南都指揮正子明敏好學功遷貴州都指揮僉事卓有政聲繼守臨安遷都指揮同知王聚清平衛千户剛方果毅遷都指揮蒞事十有五年衆務畢舉屠昇都匀衛指揮使讀書有武畧成化間陞都指揮僉事子璽嗣有詩名王謙赤水衛指揮成化間諸苖蠭起衛卒赴調城中空虚人心惶惑思竄謙諭衆堅守賊不敢逼卒保無虞後水西及祿肇争地讐殺謙入夷壘理觧之因為分疆乃各散去㑹西苗普苗叛命将勦之謙督水西夷兵往襲其巢功遷都指揮使丁實都匀衛指揮使遷都指揮同知成化間征仲賊死於敵事聞以孫暉為都指揮僉事史韜新添衛指揮征陳䝉爛土有功𢎞治間遷都指揮調征普安盤江沒於陣郭貴普安衛指揮同知機敏有能守偹普定功遷都督充叅将鎮守貴州迤西桴鼓不驚卒於鎮施瓚通州人正徳初以世伯縂兵貴州軍政修舉苗蠻畏服雅好文學命工繪七十二侯圖王守仁為之序黄鏞都勻人正徳間官都指揮號令嚴明何卿成都人正徳十四年芒部苗叛攻永寜衛嘉靖元年卿以叅将鎮其地四年討平之陞四川副縂兵六年芒部復叛仍命卿來征八年平卿在鎮禮賢事老澤及枯骨民為立碑太史楊慎作雪闗謡曰雪山闗寒風起十二月斷行旅霧為箐冰為臺馬毛縮鳥聲哀将軍不冄來西路何時開盖述途人之思卿也厯官都督王璽龍里指揮嘉靖間官都指揮忠直剛勇賢聲丕著楊仁字天爵貴州衛指揮嘉靖元年為清浪叅将屢立戰功厯擒劇賊已請告廵撫劉士元廵按郭洪化交薦起之陞縂兵都督恭将攻凱口賊走之㨗聞陞一級賞銀幣仁雖出行伍精文墨所著有瓊山詩稿一卷沈希儀字良佐臨淮人嘉靖中為貴州縂兵平鎮銅諸苗石邦憲字希尹清平衛人資貎英異兒時苗廹城憲於階下立壘持鏢作禦敵状曰以我當賊不足多也識者壮之比長襲衛指揮守偹都清㑹思石苖叛據江村囤邦憲設竒破之又磨于崖苖叛據險為亂憲率兵徑至崖下圍之乃招集三軍樹旗百歩外曰我射中旗竿賊當平一𤼵果中軍中踴躍乗風舉火斬闗而登擒斬無筭擢恭将二十九年銅仁劇賊龍許保等據麓龍山攻銅仁思州陷石阡全省震恐上命縂督張岳開府沅州勦賊憲入見曰興師十萬日費千金不若用賊攻賊以一日費撫其順者為心腹以一日費賞其順者以誅叛不一年而賊可平也賊逼銅之南岸憲率兵往援諸苖驚曰石老虎來也賊遂遁憲追至龍塘大破之斬馘無餘賊勢日蹙於是捐厚貲招吴來格等散其黨許保就擒劇賊盡滅邦憲力也遷都督府僉事鎮貴州進右都督榮祿大夫屢蒙欽賞廕二子隆慶二年卒賜祭𦵏胡璋貴州衛人嘉靖時守偹普定苗㓂亂璋防禦有方士民不擾官都指揮二十餘年仁愛忠勇軍士畏懐官至滇西恭将邱潤新添人都指揮僉事剛直㢘明文武兼贍修學除盗卓有聲稱何自然新添人官都指揮僉事長於詩有儒将風功遷揚州恭将所至亦多異政安大朝衛千户性沉毅膂力過人有開疆績官至都督同知梁東旭安南人以諸生襲祖職為衛指揮厯官副縂兵敦詩説禮雅有儒将風撫士卒以恩人樂為用故能成戰功郭成叙瀘衛人萬厯間縂兵於銅仁遇苖出劫宻遣人入其穴斬馘出賊猶不覺皆以為神移營要害絶苗往來每挺身出入林箐中即部隊亦莫知其踪跡苗一日三四驚曰郭公來矣相戒莫敢犯時城中兵少僅家丁百餘人成厚餉之遂能轉弱為强劉綎南昌人播酋倡亂綎以都督率兵進攻時楊應龍忌綎威名欲挫其鋒悉簡精鋭付子朝棟以與綎戰綎大破之賊為奪氣後破數闗遂抵囤下征播之役綎功為最吴廣廣東人平播之役以都督率兵進征綎攻其前廣破其後兩人同心協刀賊平綎功為最廣次之馬孔英宣府塞外降丁也積功至縂兵官征播之役孔英所将邉卒及諸土兵皆獷猂破桑木九杵黒水諸闗獨先八道至海龍囤下諸将以囤後易攻争走其後孔英獨壁其前錄功進都督同知世廕千户陳璘字朝爵廣東翁源人以湖廣縂兵官討楊應龍従偏橋入盡滅江外四牌江内七牌之賊破青蛇險囤克大小三渡闗抵海龍囤下後又勦平水硍山及東路苗以平播功加左都督世廕指揮使卒後又以平苖功贈太子太保冄廕百户李應祥湖廣九谿衛人代童元鎮為貴州縂兵官討楊應龍由興隆入破黄灘闗直抵海龍囤與諸道兵共滅播明年改鎮四川播遺賊吴洪盧文秀等惡有司法嚴而遵義知縣蕭鳴世失衆心洪等遂稱應龍有子聚衆為亂應祥偕副使傅光宅捕之盡獲尋卒以平播功贈左都督世襲千户胡従儀字漢長山西人天啟三年以偏将鎮下衛信賞必罰用兵如神先是萬厯末仲賊嘯聚劫掠官道自鎮逺以上商旅不行屢勦之不得其要領安賊亂後益猖獗従儀蒞鎮㣲服假貿易遍厯諸夷落得其山川險易出沒途徑及諸獠馴桀之状乃畫地分汛以守之設髙峯立斥堠三里一樓柝聲相聞日夜不絶每有竊𤼵𫝊礟為號諸路兵立集追擊賊無得逸者従儀日往來廵警居無定署出無定向時而肩輿導従時而單騎獨往時而徒歩潛行人莫知其所在以故諸汛防卒無敢少懈七八年間道不拾遺洊陞都督僉事朝廷聞其名召還比以久瘴鄉疾劇卒於京邸行人為立真将軍碑以志之去後餘威猶在又逾年賊始稍稍出劫漸不能制道梗如初馬炯蔚州人官縂兵天啟三年征水西従廵撫王三善戰死祀忠烈祠秦民屛石柱土司官副縂兵従廵撫王三善討安邦彦戰最力三年正月従縂兵張彦方渡鴨池河搗邦彦巢破賊五大寨四年正月内荘之敗戰死黄如龍鎮逺縣人萬厯間平播州靖黎九股勻哈甕壩諸苗累功叅将天啟二年従征水西内荘戰歿事聞贈都督僉事祀忠烈祠張彦方籍貫未詳天啟初縂兵有勇畧輯軍殱苖民間不擾立祠祀之魯欽長清人天啟二年貴州縂兵張彦方在圍中縂理杜文煥稱疾欽以保定縂兵代文煥縂川貴湖廣漢土軍刻期觧圍未至圍已觧欽馳赴貴陽率諸将擒勦土酋何中尉宋萬化又敗安邦彦於汪家冲觧普定之圍六年三月邦彦大舉入㓂欽禦之河上連戰數日夜半賊直逼欽壘将士逃竄欽遂自刎欽勇敢善戰為東南諸将之冠後贈少保左都督世廕指揮僉事賜祭𦵏建祠曰旌忠王達遵義人貢生授浙江湖州府判值安奢二酋叛達請従事戎行改官貴州都司恢復遵義進勦水西同黔撫王三善殉難大方事聞賜䘏附祀忠烈廟劉岳貴州衛人武進士以恭將鎮新添衛威服羣蠻侯梁柱郡人天啟四年以邉功授恭将後平奢安亂陞縂兵崇禎間奉詔勤王至萬里箐遇賊死之廕子錦衣指揮許成名字賔實貴陽人以弟子員襲指揮使勦毛口六墜賊平之擢安南逰擊䟽通滇黔大道陞赤畢縂兵官平桃紅壩大㨗斬安邦彦莫徳獻俘京師尋改鎮全楚勦㓂有戰功予告歸年七十三卒龔應龍綏陽縣人崇禎時叅将謀勇邁衆黒苗叛圍興隆應龍督兵觧圍有全城功人尸祝之劉鎮藩烏撒人以諸生累官縂鎮獻賊入川戰敗投江死國朝羅託宗室鑲藍旗都統順治十五年以寜南靖㓂大将軍督師取黔甫至境賊望風遁四月入貴陽軍令嚴肅秋毫無擾七月賊遣兵襲黔一夕奄至城下令士卒開門以待賊引去又分兵㓂青岩敗走之自是膽落不敢復窺黔既而王師進滇遂定西南趙廷臣字君鄰鐡嶺人順治十五年夏四月車王師定黔秋九月廷臣奉命廵撫下日延見父老博採旁咨盡得民疾苦状凡所條禁措置􅊖洞幽隠定賦額請蠲賑興學校禁貪横嚴騷擾種種實政殘黎獲甦晋雲貴縂督屢平叛亂功在邉陲康熙元年調浙閩縂督去之日士民擁道攀號者萬人又逾年以勞卒於官訃至無不泣下者洪承疇字亨九漢軍原籍福建南安人前明萬厯丙辰進士順治十六年滇黔未定以大學士為七省經畧夏四月至貴陽時賊甫遁民居灰燼倉無粒粟承疇多方招徠捐金散給以修㕓舍勸令預輸以給兵食禁士卒不得出城野無牧馬民免騷擾平滇後還朝卒贈少師諡文毅蔡毓榮漢軍正白旗人湖廣縂督康熙十九年授綏逺将軍同諸軍恢復雲貴賊平後改授雲貴縂督時逆氛初靖流離載途毓榮招撫散亡給牛種勤耕作創定規制條列利病安反側籌兵食諸大政見之施行滇黔頼之甘文焜遼東人康熙八年任雲貴縂督寛嚴得宜吏畏民懐時吴三桂在滇嵗糜軍餉數百萬役重民困焜悉與蠲免奏增驛遞夫價以給嵗運㑹内艱請假𦵏親還京召對靣陳三桂不軌状十二年五月回任十二月三桂反提督李本深以安順應焜知省城不可守殺其妾擕子國臣馳赴鎮逺思招集楚兵阨險隘使賊不得北出時副将姜義先已従賊各營響應文焜知事不可為赴吉祥寺先縊其子北靣冄拜痛哭自刎筆帖式何善雅圖皆死之事聞贈兵部尚書諡忠果范承勲字蘓公漢軍正黄旗人康熙二十五年任雲貴縂督時當吴逆定後未久滇黔規模草創承勲輯盗安民整飭營伍建學校置經籍在任六載利頼實多田雯字綸霞號山薑徳州人康熙甲辰進士二十七年廵撫貴州茹蘖飲氷端躬率屬以去弊樹利為己任在任四年勵官方嚴武偹撫戢苖蠻威恵並行捐俸積榖偹荒尤加意學校愛民飬士惟恐不及時人比之郭子章遷刑部侍郎官民思之不置著有黔書行世衛紹芳字猶箴號復菴猗氏人順治丙戌進士康熙元年督貴州學政手自校文旁無假借崇雅黜浮以薛瑄王守仁語錄訓士闡明理學教子弟必以小學為先士之貧者捐俸賑之舉行鄉飲教民飬老風化為之一振去之日士子感徳追送二百餘里乃返王之鼎字公定遼東人康熙十九年以定海将軍充四川提督恢復全蜀時􅊇賊吴世璠猶踞貴陽復犯永寜六月提兵往援賊以九偽将軍之衆圍之數匝三閲月糧盡援絶猶閒率兵挑戰士氣益勵至九月九日賊以火藥轟城城陥被執㧞刀自刎未殊舁至貴陽賊黨夏國相等百方勸脅罵詈不屈遂於九月二十九日延頸就戮於北門之川主廟前同時被害部下縂兵何成徳等十二員是日黄塵蔽天大風㧞木事專聞賜諡忠毅贈少保䘏廕有加郡中士民籲建祠於南闗之御書馬棚街芳匾額以旌之忠節埀同時殉節十二人何成徳陜西人随征縂兵王永世榆林人随征縂兵劉奎陕西人隨征縂兵傅汝友籍貫末詳隨征縂兵楊三虎福建人永寜協副将傅富山西人隨征縂兵劉應科西華人四川督標左營逰擊陳田大名人四川督標右營逰擊陳先鳳正紅旗人陕西提標左營逰擊地藏保滿洲人陕西提標右營逰擊潘濟世旗下人廕生陳應科山東人隨征立功蘓大有襄陽人性忠勇膽畧過人雍正五年以定廣協副将征討八寨丹江清江古州等處每身先士卒以忠義鼓衆所至奏功清江之役攻黄茅嶺苗伏莽中刺傷左腿血透衣屨猶揮刃殺賊左右驚問謂苖血濺吾衣耳又大勝回營方觧衣示衆曰項實負創言之恐亂軍心大丈夫為朝廷出力死且不撓此何恤焉軍士聞之愈激苗人畏其威名目為蘓大刀每臨陣見其旗幟輙奔潰㫖祀以功遷古州鎮縂兵卒於官奉賢良祠貴州通志卷十九
