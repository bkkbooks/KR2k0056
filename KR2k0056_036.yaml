body:
  text: 貴州通志卷三十六藝文疏國朝議覆苗疆善後事宜疏張廣泗為遵㫖議奏事竊苗疆善後事宜經臣酌議三條具奏今於乾隆元年十二月十五日准兵部遞到大學士鄂爾泰張廷玉等寄字到臣臣查廷議内開一安設鎮營所添兵丁止一千三百餘名為數少覺不敷應令再行妥議等因臣查朗洞一處係苗疆適中扼隘之區最關𦂳要臣前請另立一營設兵一千名内除分駐寨蒿栁拉二汛外實存兵七百名微覺單弱應於朗洞再添兵二百名又都匀府屬之荔波縣向𨽻廣西管轄縣治僻處山隅未建城郭雍正十年始改屬貴州其間地廣苗悍甚於新疆前議安兵六百名亦微覺不足應再添兵二百名台拱鎮標原額兵三千名今改鎮為營議留兵一千二百名就目前形勢已敷分佈但係新改營制裁兵過半且所管髙坡一帶地勢深險應再添兵二百名丹江額兵一千六百名前議止留兵一千名但其地貼近牛皮大箐亦應添兵二百名又古州都江清江台拱八寨丹江各處於雍正七年設有同知通判等員倣照湖南乾鳯二㕔之例在於同駐之官兵内各撥給把總一員兵一百名為其親標今查此項弁兵皆就各該處營兵内撥給一兵兩轄文武往往因此争執互生嫌隙且既撥歸文員則於本營差操不能分身應役甚屬無益請將各該同知通判之親標弁兵悉撥還本營該丞倅等各添設千把一員另募兵丁一百名又現奉諭旨於古州添設巡道一員有控制漢夷之責應請加兵備銜添設標兵三百名再設守備千把各一員管轄即將該丞倅等各募新兵統歸道標専轄一轉移間則所添之兵合之原添之數共三千名兵力愈加充足可以鞏固無虞矣又廷議内開一設立郡縣雖於新疆之體統似屬可觀但欽奉諭旨嗣後苗人争訟之事俱照苗例完結錢糧永行免徴若改立郡縣添設守令不特無事可辦徒為糜費錢糧應無庸議等因臣查新疆較之内地政務甚簡既有同知通判等官分地而治又添設古州巡道一員則上下相維足資料理實可不必改設郡縣惟是該丞倅等所駐劄地方均係巖疆重地兼有監倉之責除古州台拱二處向各設有佐雜其清江八寨丹江都江等處僅各有同知通判一員或遇因公出境陞遷事故一切公事竟致無員辦理再朗洞地方去古州一百八十餘里現議設立汛營今既不設縣斷不可無文員在彼恊辦應請將原駐古州之開泰縣縣丞改駐朗洞仍隸古州同知統轄至清江下河之栁霽地方為水路要區去清江城一百餘里前議於清江恊撥遊擊一員帶兵駐劄應請添設天柱縣縣丞一員分駐其處仍𨽻清江通判統轄再古州一帶兵糧悉資粤米協濟收貯接運不便無專員管理應於古州添設倉大使一員再将黎平府照磨一員改駐古州以供道㕔臂指之用此外於清江添設鎮逺府知事一員八寨設都匀府知事一員丹江設清平縣主簿一員都江設都匀縣主簿一員俾各㕔員資其佐理至荔波縣地界週迴千餘里止有知縣一員典史一員實不敷辦理現議遷移縣治建造城垣應再設縣丞一員分駐舊縣地方如此則治理有人而要地不致缺員矣又廷議内開一逆苗絶産安插漢民領種臣等查新疆苗衆震懾軍威就撫方始若遂招集民人分種管業未免復起驚疑轉於新疆無益臣等酌議不若暫給駐守之兵丁並兵丁之子弟就近耕種既可便於稽察亦可少佐兵糧等因臣查新疆地方所遺絶産臣前陳請安插漢民實屬淺陋之見但大學士等抄寄欽奉上諭與其招集漢民不若添設屯軍俾無事則盡力南畝有警即可就近抵禦則苗疆駐劄之兵數較多而兵氣自奮且省添兵之費欽此仰見睿慮周詳指示盡善臣正在籌議舉行今奉到廷議祗令暫給兵丁並兵丁之子弟耕種查新疆安設營汛原以建威消萌守禦彈壓各該汛兵俱有營伍地方之責巡防操演之煩非若口外征兵駐守無事可派令屯田以資軍實也况苗疆田土盡屬水田亦非若塞外陸地易為耕種營汛兵丁行伍差操是其所長農畝之事多有未諳至其子弟中雖有能耕種者但為數無多不敷分佈再四思維惟有凜遵聖諭安設屯軍洵為至當不易永逺寧謐之良規也臣與司道等官悉心計議此項屯軍除先儘兵丁子弟内之能耕種者招令承領外但兵丁子弟無多查前經督臣尹繼善因逆苗蠢動飭令通省招募新兵共五千餘名訓練已及一年技勇嫻熟今軍務告竣現在酌減歸農應即在此新兵内招其能種田畝並情愿前赴苗疆承領者給與耕種如仍田多兵少即就近招募年力精壯可充兵丁之人令其領種但屯軍與漢民不同漢民三時力作之外别無餘事屯軍於農隙之時當令操演訓練遇事調遣行走自應籌畫充裕庶無缺乏之虞查苗人所種水田上田每畝可出稻穀五石中田可出四石下田可出三石合計屯軍每户給與上田六畝或中田八畝或下田十畝其所收米穀可敷一年之口食且苗人止知耕種水田所有山土悉皆抛棄今所設屯軍除不許侵佔苗界外其餘附田山土儘其墾種雜糧則衣食益為饒裕再屯軍初設棲身無所耕種無資又不能裹帶餘糧以待收穫應每户給修蓋房屋銀三兩牛具籽種銀五兩再議給口糧秋冬應募者接濟至夏收而止春夏應募者接濟至秋收而止每大口日給米八合三勺小口半之計口授食俾得盡力南畝以待收成更宜選擇扼要處所建築堡墻或用石砌或用土築官給工價口糧即令該屯軍等自行修築庶幾彼此聲勢聯絡出入田疇得收守望相助之益既有屯堡可守器械亦所必需應将現在苗人所繳噐械揀擇完好銛利者按户散給以資操演捍衛再人數衆多不便聽其散漫無所管束查直省凡有屯軍之處皆有衛守備或衛千總管轄而統𨽻於府道等官又查前明建設衛所有指揮鎮撫並千百户等官名色今雖不必沿襲其舊似應變通其意每十户如營兵之什長設一小旗每五十户如營兵之管隊設一總旗每百户如營兵之百總設一百户責令管束稽查與營兵無異查新疆現有同知通判等官政務甚簡此項屯軍似不必另設衛守備應於古州添設衛千總二員台拱清江八寨丹江各添設衛千總一員專司一切屯種訓練事宜將各該處同知通判加以清軍銜令其兼轄而總𨽻於古州巡道統屬每於農隙之時該管丞倅等董率操演該管廵道仍不時稽核㸃驗務俾技藝純熟以期有勇知方遇有征調按冊而稽一呼可集較之遠調土兵其利奚啻什倍再苗疆既立屯軍則應禁絶擾累以寓撫䘏苗人之意其就撫餘苗固不宜令與屯軍錯雜而居亦宜酌給田土資生臣現飭承辦苗疆道府等官分往各處相度情形將田土間雜處所逐一區畫整齊凡巳剿之寨投撫餘苗酌其人口多寡撥給田土歸倂安插量加賞䘏務令屯軍與苗人田土山塲界限井然以杜将來攙混侵佔之弊則一勞永逸不致復滋後釁矣苗疆告竣撤兵疏張廣泗為天威逺播永奠苗疆告竣撤兵事竊查黔省古州一帶苗蠻向居化外迴環三千餘里盤踞數十萬衆性情獷悍兵械繁多居偪漢民界聯郡縣時出擾掠為地方隠憂臣前於貴州巡撫任内承辦清理開通安設鎮營扼其要隘欲以化導拊循漸底馴順不意臣識見卑庸才力短淺既已冒昧從事又復經理疎漏雖規模粗定而一切善後章程全未妥善迨臣奉命前赴西路軍營繼事諸臣既形勢之未諳又撫馭之無術遂致逆苗大肆跳梁不可救遏查逆苗起事始於古州之八妹髙表並接界丹江台拱之交鳥交歪等寨揑造妖言傳散木刻到處播揚非止悍惡兇徒翕然聽信即婦人女子亦羣起若狂於雍正十三年二月二十六日糾合萬衆襲攻王嶺營汛經古州鎮臣韓勲預派官兵奮力急擊挫彼兇鋒賊始奔潰乃逆苗等自王嶺戰敗復聚集於台拱清江之間往來號召謀逆益急是時風聲傳播人心惶惑屢據官屬禀報情形而撫提諸臣猶以為苗寨謡言不足深信祗令古州清江各撥弁兵數百人遊巡㑹哨便可了事迨後勾結既廣附和愈衆於三月二十一日圍攻番招營汛始皇遽發兵倉卒赴敵將内地駐防兵丁盡行撥赴新疆派委一庸劣無能之副將宋朝相統領而前不意進至番招不能聲援䇿應反致被困山頭逆苗稔知内地無兵即乘間四出侵犯熟苗同時附和攻陷凱里次及清平黄平餘慶等州縣又攻燬清溪縣治燒刼鎮遠思州二府屬之附近村寨人民驚竄驛路阻塞台拱清江等鎮恊營僅能閉城自保而排咱小丹江二汛因缺糧為奸苗所愚買路夜遁致被屠害因之愈肆猖獗豕突狼奔卒難收拾以致上厪世宗憲皇帝宸衷南顧殷憂遣發滇蜀楚粤六省大兵㑹師進剿特授貴州提督哈元生為揚威將軍専司征討又以地方遼濶哈元生一人調度難周命湖廣提督董芳為副將軍從下游分領夾擊又欽差刑部尚書張照左副都御史徳希夀總理撫定苗疆兵馬錢糧賑恤事宜廟算精詳至周至備將帥諸臣倘能凛遵訓旨恊力同心蕞爾小醜不足平也乃撫提二臣已意見不合迨聞凱里已失勢甚危殆提臣哈元生始馳至楊老駐劄所帶兵役僅二百餘人逆苗聞提督親來以為必有重兵不敢輕犯而平越都匀以上方藉以保守雲貴督臣尹繼善前據屬員禀報已派遣廣羅恊副將周儀竒兵營參將哈尚徳等星夜赴援而本省黔西大定威寧官兵亦陸續調集哈元生始派遣大定恊副將紀龍雲南廣羅恊副将周儀竒兵營叅将哈尚徳等將凱里清平黄平餘慶等州縣以次恢復開通大路逆苗見内地官兵衆多復囘巢穴糾合醜類圍攻新疆營汛阻截運道於是台拱清江丹江八寨等處同時告急先是兩廣督臣鄂彌達聞知黔苗肆逆即派遣督標中軍副将王濤並咨移廣西撫臣金鉷提臣霍昇派令左江鎮臣王無黨統領廣西官兵以桂林知府楊廷璋監紀糧餉先至古州嗣復令髙雷廉羅鎮臣譚行義統領廣東官兵以廣南韶連道馮元方監紀糧餉晝夜泝流而上陞任湖廣督臣大學士臣邁柱湖南撫臣鍾保原任提臣董芳先派令九谿恊副将李椅陞任洞庭恊副将魏國泰湖南撫標㕘将謝瓏等帶領湖南官兵星赴鎮逺恊應繼復令襄陽鎮臣焦應林統領湖北官兵前來聽候調遣四川督臣黄廷桂撫臣楊馝亦預備漢土官兵以備咨調各省大兵先後來黔兵力充裕哈元生遂派遣黔西恊副將康世顯由革夷小江一帶援應稿貢汛以通台拱又派廣東惠州恊副將馬成林湖南九谿恊副将李椅原任清江恊副將栁定國等由八弓梁上一帶援應栁羅汛以通清江又移咨廣西左江鎮臣王無黨帶領粤西官兵救援八寨維時古州鎮臣韓勲亦率同廣東督標副將王濤帶領黔粤官兵將起事之烏弓八妺髙表色同等逆寨嚴加攻剿即進兵朗洞扼險駐劄惟丹江久被圍困先經哈元生派遣雲南廣羅恊副将周儀大定恊副將紀龍帶兵援應甫將鷄講開通逆苗復於平寨黄土􅋭烏騷坡等處據險截糧都匀恊副将馮茂䕶糧前往被逆苗阻擊遺失炮位傷損甚多丹江兵卒枵腹受困幾不能保哈元生復飛調四川署副將壽長雲南竒兵營叅將哈尚徳帶領滇蜀官兵救援至九月十九日潰圍破敵丹江方獲無恙是時五省大兵雲集㑹剿雖新疆大路俱已開通而首惡逆寨全然負固哈元生將遣到各省官兵由青溪以西上至楊老並由大路斜通各新疆營汛沿途密佈連營數百餘里是以兵愈多而愈不敷用且逆苗始猶畏懾暫行歛避迨屯駐日久情見勢絀復於清平黄平施秉一帶大路之旁時出燒刦九十月内尚在紛紛報警官兵奔救不暇顧此失彼幾有無可如何之勢副將軍董芳分統官兵駐劄八弓一隅之地攻剿六甫寨頭等十餘頑寨其餘無分首從概行招撫以圖將就了事且與哈元生各持意見互有異同所以時經數月之久而軍務茫無端緒也然皆由臣從前承辦苗疆原未經理妥竣以致黔省百姓罹兹顛沛各省官兵受此勞苦臣與諸臣厥罪維均臣自西路軍營奉命進口途次驚聞惶悚慚憤恨不奮飛滅此朝食廼䝉皇上天恩暫寛臣從前之嚴譴特命臣總理苗疆軍務嗣又以事權不一特授臣經畧重任自將軍以下悉聽節制繼復命臣兼管貴州巡撫印務從此文武事權統歸畫一委任殊恩至專至重更荷聖主指示周詳敢不敬謹恪遵竭蹷辦理臣自雍正十三年十月十三日行抵黔省之鎮逺府地方駐劄先將賑恤事宜酌定條欵次第舉行並准雲貴總督臣尹繼善咨商再調四川官兵三千名以資恊剿臣當即一面奏聞一面咨調外臣查蠢爾愚苗原無終日之計其所以嘯聚成羣力能久抗官軍者以有奸苗數輩恃其寨大人悍號召勾結生熟苗夷羣相附和如上下九股清江髙坡丹江山苗等處凡兇頑首逆自古州敗退咸聚集於此一帶地方官兵進攻一處各處為之恊助聲援則彼衆我寡每致挫折一番兩番賊勢愈張兵氣日怯至於熟苗之附和為匪者雖罪實難逭而究非首惡驅之愈急則悉竄入新疆為之出力拒守非所以渙散賊勢之方也若不簡㧞精銳直搗新疆殲其首惡則黨羽終難解散因籌畫時勢之緩急審度地形之險易酌定分兵三路同時進攻逆苗各保巢穴彼此不及救援則我力專而彼力分以整擊散一舉可定蓋賊無常形兵無定法安内以攘外逺交而近攻原可互相為用是當暫撫熟苗責以擒獻兇首繳納噐械阻截生苗不許放入内地然後大兵齊赴新疆將倡亂首兇並寨大人衆素稱頑抗者悉行剿除其餘附和苗寨亦責令獻兇繳械阻截熟苗不許收入新疆必使生熟苗蠻判然為二生苗已定再行佈置熟苗則釡中之魚無所逃命然後分别良頑逐寨清理方可以收一勞永逸之效臣一面具摺恭請聖訓一面親赴凱里與原任揚威將軍哈元生面囑機宜派令四川署副將壽長貴州定廣協副將曾長治雲南竒兵營叅將哈尚徳等帶領官兵四千餘員名由凱里之空稗一路前進又𣲖令左江鎮臣王無黨黔西恊副將康世顯帶領官兵三千餘員名由台拱之台雄一路前進又以清水江苗寨繁多南連古州東達黎平地勢遼濶臣率同原任副將軍董芳帶領襄陽鎮臣焦應林暨九谿恊副将李椅惠州恊副將馬成林原任清江恊副将栁定國等官兵四千餘員名由清江之鷄擺尾前進三路官兵尅期並舉逆苗雖分衆迎敵而各不相顧官兵奮勇急攻自十二月初一日起至十四日止旬餘之内已將上九股之掛丁朗利空稗大小營等處二十餘寨下九股之台雄打革等寨清水江之鷄擺尾鷄呼黨鷄右烏溜等寨凡係首惡險巢苗人所恃以抗拒官軍號召羣苗者悉皆攻燬無遺附逆餘黨始知畏懼兵威紛紛投撫乞降臣思逆苗此番逞惡逈異尋常若非逐層深入痛加剿除不足以彰國威而昭法紀臣因自清江起程即由各鎮將攻剿之鷄擺尾台雄空稗一帶沿途查勘形勢於乾隆元年正月初三日至凱里駐劄居中調度隨令襄陽鎮臣焦應林留駐鷄擺尾四川署副將夀長留駐空稗台拱鎮標遊擊尹成宗留駐台雄各搜捕未盡餘孽以資彈壓派令副將曾長治參将哈尚徳等由空稗鷄講分路進攻丹江各逆寨左江鎮臣王無黨黔西恊副将康世顯並新任貴西道劉等由台雄交上一路惠州恊副将馬成林九谿恊副将李椅清江恊副将栁定國並貴東道宋厚等由烏羅反牌一路會兵進攻髙坡各逆寨同時又令古州鎮臣韓勲由朗洞一帶前進羊色髙雷亷羅鎮臣譚行義由滚縱一帶前進擺弔皆新疆深險之處復令副将曾長治攻克丹江之後即繞至八寨會同都匀府知府孫紹武進剿山苗並飭令上江恊副將王耀祖帶領弁兵由上江前進山苗聲援夾剿是時臣續調之川兵適至臣即令統領之川北鎮總兵王廷詔帶領所部官兵捜剿烏溜報徳囊猛囊堯一帶進駐丹江各路大兵奮勇前進逆苗始猶悉力抗拒繼則聞風奔潰摧枯拉朽所向披靡自正月初旬起至三月底止凡新疆内之為百悍惡大寨如丹江之防里烏堯桃繞排提馬家􅋭鷄勇􅋭烏叠昻牌等七十餘寨髙坡之烏羅反牌交上交工南工交篾交包交烏交歪鷄花等四十餘寨古州之羊色扣里羊弔洞里髙枯八倒旁洞官舟等二十餘寨又滚縱之烏㜑擺列擺弔斗扣等寨以及山苗内之擺調方勝加照加支加撓加雄等三十餘寨無不燬其巢穴燔其積聚誅戮其兇頑俘獲其子女著惡首兇陸續就縳附從逆黨剿除殆盡所餘遺孽悉竄入牛皮箐中藏匿臣令各路鎮將尾後窮追逐漸𦂳逼俱屯駐箐口以坐困之查牛皮大箐綿長數百餘里横亘於新疆之中峭壁懸崖髙出雲表深林密樹霧雨不開泥濘没膝虺蛇交行不但從來兵威所未臨即人跡亦所罕到詢之本地苗蠻亦止能知其附近大概不能悉其幽䆳深逺也臣因詳揣地勢因路徑之通塞為聯絡之聲援飭令八路官兵四面攢逼以次進攻凡屬至幽極險無不深入窮捜於是倡謀首逆妄稱苗王之包利往利哄銀三元阿茍阿蠟老能老恨强銀堯撒汪隴帶麻阿杠包往由甘講翁苗瞎子等或被生擒或被斬獻其餘附逆兇徒俘獲者以萬餘計臣又恐逆苗逸出箐外復飭令總兵焦應林署副将壽長内外設防分佈嚴密復傳諭衆苗罪輕之犯得擒罪重之犯自贖由是苗類互相擒拿彼此舉發雖比隣族黨父子兄弟之間不敢容隠䕶庇一人是以凡經肆逆兇苗自揣必被擒獲四無去路有彼此交縳赴營乞降者有自知罪惡情急自盡者其廹於飢餒餓斃山林惶遽奔竄投崖身故者不可勝計自四月初旬起至五月中旬止牛皮大箐之内曁四旁巖穴林木之中往返嚴捜委無藏匿新疆一帶軍務已竣隨飭令囘兵内地辦理清江下河兩岸苗寨並台拱所屬之大小兩江以及凱里清平黄平施秉一帶餘孽查新疆之苗甫歸王化猶可云野性未馴内轄熟苗受國家豢養深恩百有餘年乃敢附和逞兇無所不至乘此兵威大震之時若盡力掃除可使不留遺種但其間良頑不一善惡判然必當詳慎區分以期無枉無縱其有寨小丁弱並未附逆逞兇比聞大兵臨境即能逺赴行營泥首歸誠隨師効力者從前已經招撫此時不宜擾累其或雖經附逆未敢顯拒官兵投誠日久應役恭順者務令將該寨所有兇苗逐名擒獻鎗械全數收繳方准量行安插至於首先從逆樂於附和或妄稱官職或代傳木刻或圍攻城汛或殘害兵民或阻截糧運或乗機搶刼有一於此必應剿除固不得以現在畏懾之情形即可稍為寛假臣將内地各苗寨詳加考核分為首惡次惡脅從三等指示各鎮將弁仍專委署貴州提督左江鎮臣王無黨雲南永北鎮臣劉永貴貴東道宋厚貴西道劉督率辦理嗣據陸續呈報清江南岸之九甫繞號䟎賴歹受南孟培鳩栁旁栁受往刀栁寨等二十餘寨清江北岸之抱金絞狂平夏髙坵台革者磨栁羅等十餘寨附近台拱之苗江稿武革東稿貢等十餘寨又大小兩江之八梗舊舟望虎總塲等十餘寨附近施秉黃平之龍塲白壩革夷山秉附近清平之翁丙等各逆寨皆首先附逆罪大惡極斷難寛恕俱已掃穴犁庭斬馘殆盡復據駐劄凱里之廣羅恊副将周儀駐劄黄平崖門之台拱鎮標遊擊丘中瑞駐劄施秉新城之貴州提標遊擊董國棟駐劄勝秉之黃州恊副将姜煓曾等先後呈報所有内地未盡餘孽或據投撫苗人自行擒獻或據被害士民指名控告俱已逐細查拿審實正法並無一名漏網又古州鎮臣韓勲囘兵朗洞沿途將月姑元賽八輸盤噶髙定翁脚唐流九衣斬牙髙猫岜王等二十餘寨或因其餘孽未清或以其獻兇遲玩俱經剿燬又據髙雷亷羅鎮臣譚行義囘兵滾縱將滾縱之火燒仰黨喬扣三寨因其庇兇不獻復行嚴加剿洗又據都匀協副將曾長治都匀府知府孫紹武等囘兵八寨將番仰番摃番瓮羊堯擺卓牙門楊牌楊烏等十餘寨嚴加剿懲又據署四川川北鎮臣王廷詔署副将夀長以桃繞烏叠為丹江第一惡寨雖兇苗已多擒斬尙有兇首枉洞蕭撒二名未獲去歲殘燬小丹江營汛罪難輕恕復將該逆寨痛加剿洗又據署副将夀長台拱鎮標遊擊尹成宗報稱排咱落翁鳯黨台盤打革弄賽䟎舍世栁等逆寨去歲傷害排咱汛官兵罪大惡極復將各該寨嚴行剿燬又據髙雷亷羅鎮臣譚行義上江恊副將王耀祖古州同知毛振翧都江通判鄧瀾等以上下兩江苗寨上年雖未附逆但各寨鎗械甚多所當趂此兵威勒令繳獻旋據各苗寨呈繳過鎗刀噐械等項共數萬餘件又據九谿恊副將李椅惠州恊副将馬成林清江通判蔡時豫以九丢歹旦栁拉等寨去歳首先附逆應嚴加剿燬查自六月中旬起至九月止所有新疆内地從前未淨餘孽捜除罄盡其現存者皆逐名查訊委無正兇順逆分明威信昭著各路鎮將文武先後禀報軍務全竣情形到臣臣先由凱里移駐清江遂自清江前赴古州經由上江八寨丹江一路仍回凱里沿途查詢各路軍情悉皆妥竣臣查新疆内地附逆悖叛者共一千二百二十四寨悉經剿燬痛加殲除其餘三百八十八寨多係寨小丁弱致被迫脅姑免燬其巢穴仍令將該寨所有附逆兇徒全數拿獻方准贖罪統計臨陣斬馘者共一萬七千六百七十餘名臨陣生擒並順苗擒獻贖罪者共二萬五千二百二十餘名口内審係妄稱名號或偽署官職首惡要犯應解省質審結案者共四百餘名口審係拒敵官兵燒刼村寨法無可貸即在軍營梟示者共一萬一千一百二十餘名所獲逆苗家口審有稍可矜疑者即行釋放安插外其逆犯家屬例應充賞為奴者共一萬三千六百餘名口其臨陣鎗砲中斃未及割取首級圍寨焚燒投崖自盡以及餓斃山林者實不下數萬收獲砲位鳥鎗共四萬六千五百餘門長矛刀弩盔甲等項共一十四萬八千餘件得獲米榖牛馬牲畜無算是役也仰賴聖主恩威逺播諸將士戮力同心兼以楚粤滇蜀各隣省封疆大吏等公忠體國疆域不分籌餉備兵有呼必應士馬飽騰兵力充裕是以指麾如意所向無前該逆苗等經此大創始極畏懼知山箐之深險不足恃兇悍之伎倆無所施國法不可再干天威不敢再犯臣查逆苗等性雖反復人實愚頑所以屢肆跳梁皆由於不知法紀若不開其愚蒙明白曉諭縱使極逞兵威多行誅戮亦屬無益臣自上年抵黔以來仰體皇上如天好生仁威宥物之至意每次遣將發兵總期昭佈恩威聲罪致討不許誘擒襲取妄誅老弱善惡既分良頑攸判是以倡謀黨惡雖擒斬已有數萬而區分甄别實未敢妄殺一人逆苗等亦曉然於兇惡為匪者乃自取誅夷良懦守分者必不致波累臣自清江前赴古州沿途查勘已撫苗民見其泥首道左俯伏環迎咸有畏懼悔艾之誠決無反側不安之意兇逆殄除軍務全竣所有各省官兵自應撤令凱旋查黔省山髙風冷暑雨不時各省來黔官兵率多不服水土其有染患病疾者先已陸續撤囘今軍務雖經告竣辦理一切善後事宜尚須留兵彈壓臣酌留楚粤官兵三千名貼防外其餘並令照依各省程途逺近先後按撥全行撤囘查各省官兵逺來恊剿克著勤勞屢次欽奉諭旨令臣詳記檔案俟事定議叙分賞今軍務已竣例應將在事奮勇官兵等次並陣亡帶傷弁兵等詳造確冊送部核議至臣以至庸極陋之人由知府微員荷蒙世宗憲皇帝髙厚殊恩㧞至貴州巡撫苗疆重務臣既冒昧從事而一切經久章程全未籌畫妥備彼時規模粗定仰䝉世宗憲皇帝天恩念臣奔走微勞勅部議叙賞以騎都尉世職迺臣甫離黔疆雍正十年台拱遂有圍困官兵之事迨至十三年又復大肆猖獗擾害内地世宗憲皇帝懷保萬方本欲奠安黎庶而臣經理踈謬反致重困黔民貽累隣省捫心自問罪實臣始上年即欲具情陳請縁正在辦理軍務未敢仰凟天聽今軍務已竣竊謂賞功罰罪聖朝之法紀攸關伏懇皇上天恩革去臣騎都尉世職並將臣交部嚴加議處以為人臣承辦地方要務冒昧踈忽者之戒伏乞睿覽施行條陳驛困並禁派擾疏張廣泗為驛站之積困宜紓閭閻之派擾宜禁事竊惟驛站之設所以通皇華速郵遞關係綦重臣查黔省上接滇南下通三楚﨑嶇險峻跬歩皆山共額設二十四驛除貴筑縣一驛係省會首邑額設馬五十匹馬夫二十五名其餘二十三站每驛額設馬四十五匹馬夫二十三名又各驛内除楊老重安楊松毛口四腰站不設站夫外其餘每驛各設長夫一百名以備應付此黔省驛站夫馬之定額也每馬一匹日額給草銀八釐料穀四倉升每馬夫一名日給工食銀一分六釐口糧米八合每站夫一名日給工食銀一分二釐口糧米八合此黔省驛站夫馬工料之定額也又查每驛每季例准倒馬七匹向例每匹價銀二十九兩五錢零嗣於雍正三年經前署撫臣石禮哈將馬價照雲南廣西例裁減至二十二兩以省浮費但黔省暑雨不時馬匹易生疾病每季倒斃實不止七匹之數從前地方無事之時馬匹價值稍賤尚可藉報銷倒斃之贏餘即為買補額外多倒之馬匹迨後既以節省裁減又值頻年軍興馬價昻貴所領價值僅敷買補倒斃之馬其餘多倒馬匹並無例項開銷彼時署撫臣石禮哈止知将黔省馬價比照雲南廣西一例報銷不知廣西有水路可通順流迅速地方官可以通融應付滇省驛站額設馬六十餘匹餘站俱有五十匹馬數既多又止供本省差務則輪流應付倒斃自少黔省處處皆山道路險峻首驛僅設馬五十匹其餘僅四十五匹馬數既少且供兩省差務之煩而馬價照依滇粤之例一體核減除去准銷額馬七匹之外再有多倒馬匹地方官不得不自行買補此驛馬在官之累也至站夫一項每站額設夫一百名黔省村堡畸零非繁庶可比一遇大差到站若待臨時僱募勢必悞公前於敬陳管見等事案内經臣酌議額設站夫俱應長養在站但每夫一名日給工價銀一分二釐口糧米八合僅敷本人一日之口食實無餘錢養贍家口是以民間應募者寥寥雖嚴飭該地方官竭力勸募承充而今日到站明日濳逃所有長支銀米無從著追仍需臨時僱募民夫添助黔省地處荒僻平時僱覔已屬艱難或遇祁寒暑雨歳暮農忙每夫一名僱價自一錢五六分起至二三錢不等積百名站夫一日之銀米不敷十餘名一日之夫價差務源源不絶賠累實無底止此站夫在官之累也地方有驛各官因額設錢糧不敷支應凡遇差使經臨除在額馬額夫之内者俱該驛官自為應付一遇大差卒至如恊濟餉鞘數萬兩到站動需馬數百匹或夫數百名地方官無力僱募遂𣲖之里民名為堡夫堡馬查定例内開載欽差大臣及學差試差督撫入境需用夫役該州縣遵照兵部勘合給發其督撫入境不由兵部給發勘合者所需夫役准其臨時酌用無許過六十名至知府下縣盤查及他員奉督撫差委盤查者不無案卷等項量給夫三十名等因遵行在案無如日久弊生往往於勘合之外濫用至一二倍三四倍不等甚至本省大員亦多任意濫用差使既繁地方官不免派累於民而差役鄉保人等遂得以從中滋弊視村寨之大小分認馬頭馬脚馬尾名色合一馬之僱價出銀八九錢至一二兩不等其僱價之所以昻貴者蓋黔民貧瘠養馬甚少有馬之家居竒招價鄉民無處僱覔不得不受其勒索且一鄉之内承總者名曰鄉頭聞有應差之信即入城伺候此時鄉民不能即斂現銀鄉頭不能代為墊發勢不得不向富家掲借以七八扣之本銀勒五六分之重利迨至大差過後鄉頭始將僱募馬價並揭借本銀一併合算即於認充村寨均攤認償維彼小民又不得不告貸償還既受僱馬之攤賠又受揭借之重累呼訴無門實堪憫惻至於堡夫之累黔省烟户稀少附近城市夫役無多不得不派之四鄉有離城七八十里或一二百里之外皆需來城應募雖官為給價亦止能照依扛抬一日之程途給發一日之工價其餘往回守候則皆廢時失事不獲價值之日也應一日之站夫即須數日之賠累四鄉里民若不按照田畝公攤幇貼必致無人承應是以每夫一名除官給價外糧户等私自幇貼每至二三錢之多在小民之失時廢業既已疲敝堪憐而糧户之攤派幇貼又復苦累無已是堡夫之累民為害更甚查黔省額徴正賦每州縣内多者不過數千兩少者僅數百兩而民間夫馬攤派每致倍於正供以貧瘠之黔民當無窮之苦累其何以堪臣與司道等再三酌議若不嚴定處分斷難永絶弊端請嗣後過往差使凡有勘合者悉照勘合應付至本省大員入境不由兵部給發勘合者亦遵照部定額數應付倘敢多索一夫一馬者許該地方官立時揭報督撫以憑嚴叅若本省大員任意需索許該地方官直掲部科核實治罪其不據實申報狥情濫應私行派累地方者一經發覺計其所派夫馬之數以枉法贓從重治罪庶官員知所儆畏而民間之擾累可除矣惟是既已禁其私派凡有往來差務俱係在官承值則所有夫馬草料工價等項務令足資應付方可永絶弊端查滇南省㑹首驛額設馬六十匹其餘各驛額設馬五十匹滇省道路尚屬平坦其所設驛馬祗供本省之用而馬數較多黔省山程最為險峻兼供滇黔兩省之差而馬數較少除馬價已經前署撫臣奏請照滇例報銷未便再為議増所有各驛馬匹應比照滇省馬數増添貴筑首驛原額馬五十匹應増十匹其餘各驛原設馬四十五匹應各增五匹共増添馬一百二十一匹馬數既増則馬夫亦應添募貴筑首驛原額馬夫二十五名應再添募五名其餘各驛原額夫二十三名應各添募二名共添夫五十一名滇省每馬一匹日額支草料銀七分二釐黔省每馬日給草銀八釐料穀四倉升值價銀二分合算每馬日僅支銀二分八釐較之滇省少支銀四分四釐實屬不敷且飼馬以穀不如以豆之堅實有力今請酌増每馬日支豆草銀五分料穀停其支領滇省每馬夫一名日支工食銀五分四釐黔省每夫日給銀一分六釐口糧米八合合算僅日支銀二分四釐亦屬不敷今請酌增日支銀四分糧米亦停其支領如此則馬數既多可以輪流更替飼喂充足飽騰可期不致有多斃賠累之虞矣至黔省站夫每名日給工食銀一分二釐口糧米八合合算日支銀二分滇省每站夫一名亦僅日支一分八釐較黔省尚少銀二釐但滇省額設工食之外尚有官田租穀名為冷飯摃索草鞋等項田畝為公幇之費黔省除日給工食銀二分之外並無絲毫幇貼且站夫之苦甚於馬夫若工價過少實無人應僱今請將口糧米亦停其支給於原給銀一分二釐之外酌増銀二分八釐共日支銀四分則地方有驛各官易於僱募承應不致復有里民幇貼之累矣抑臣更有請者凡驛站通衢民間之擾累既除尚有偏僻郡縣未設驛站處所每年學臣經臨考試或上司差委盤查或本處地方官因公他出所需夫馬亦多係派累里民承應至於苗疆等處非止文員派累並武員弁目不論事之公私輒藉軍裝名色派夫扛抬更有兵役通事人等偶奉差遣雖一囊一篋之微亦必役令苗民背負隨行所到之寨需索酒食稍不遂意即加以凌辱作踐以致苗民不堪擾累肆逆逞兇多由於此尤應嚴加禁絶臣請嗣後凡本處地方文武官弁奉上司差委盤查者經過驛站地方有例定額夫應付其無驛站之處於本省公項銀内酌給盤費令其自行僱備違者即照例嚴叅仍計其所派價值以枉法贓治罪至兵役等奉有差遣如在隣近處所固不應累及苗民即或路程稍逺往返需時該本管官量行捐給盤費令其平價僱覔有敢私役苗民强索酒食者應照定例開載改土歸流地方如該管官員有差遣兵役騷擾逼勒科派等弊較内地之例加倍治罪例處分至學臣考試經過驛站地方有例定夫馬應付其無驛站處所應令該地方官照額定夫馬之數平價僱覔應付據實開報准於本省公項銀内給領總不許絲毫科派民間再此外尚有發遣人犯並解審罪囚除年力精壯及罪輕者聽其散行外其重犯鎻牢固雖有差役管押恐致脫逃不便令其行走更有新經受刑並實在老弱不能徒歩遠行者皆需撥夫抬送向係沿途開店之家承應名曰街夫既有街夫名色凡遇罪犯到店不止索夫抬送且强索酒飯店民因係在官人犯不敢與較而不法解差等即隨同沿途滋事更為擾累臣請嗣後凡係發遣暨已成招解審人犯令地方官查明程途逺近近者按日算給口糧逺者折銀發給令其自行買食所給銀米統於囚糧項下准銷再查明果係重犯或新經受刑暨實老弱者有驛站處於額設站夫内應付無驛站處許其僱夫抬送所需價值亦准於本省公用銀内給發庶街夫承應之弊亦可永除而黔省官民均沐皇仁於無極矣請免折色兵糧疏張廣泗為請免徴支折色兵糧以除兵民兩累亊竊照黔省各標鎮協營兵丁每年應需月糧例於各屬額徴秋糧及改徴米内撥給供支但各州縣有糧多之處駐防兵數較少又有糧少之處駐防兵數較多其不足之米勢不得不於餘米州縣酌撥支給而黔省山路﨑嶇兵丁不能逺領民苗亦苦輓運故歴年來俱遵照康熙四十三年題定事例每年於秋收之時行令應撥應領之營汛州縣各將時值米價查報由司道將兩地所報時值從公酌核將報多者量為稍減報少者量為酌増裒多益寡折中定價造冊詳題行令州縣照數徴解支給官兵自行買食再各鎮恊營兵丁應領米折銀兩每年秋成定價具題之後州縣始行徴收以致秋冬應領米折每有延至次年春夏始能領囘相去收成之時甚逺價值漸昻所領之銀不敷糴買於康熙五十六年内復經前䕶撫臣白潢題請預於藩庫借支銀兩俟各營赴省請領春餉時順便關領飭令各州縣將折徴米價徴解還項此歴年遵行之舊例也今查折衷定價兩地時值既有多寡之分則酌數徴給自有増減之别在折徴州縣之百姓按所増之價完銀自必浮於應完之米數而兵丁按所減之價領買自不能敷應領之實米於兵民實屬兩累臣與司道公商定議查黔省各標鎮恊營兵丁自乾隆三年九月起每年應需月糧除撫標提標貴陽安順永安安南普安遵義平伐新添平越黄平天柱平逺黔西畢赤等標恊營兵丁月糧應照往例仍於各本地額徴秋糧改徴米内就近酌撥實米供支又荔波營兵丁年需月糧業於遵旨議奏亊案内議詳題請按年動支庫銀發交荔波縣照依時價採買以備供支俱無庸議外惟安籠威寧鎮逺古州大定定廣都匀銅仁清江丹江上江古州道標歸化水城長壩長寨獨山凱里黎平思南石阡仁懷朗洞等鎮恊營兵丁每年應需月糧除於各本地應徴秋糧及改徴米内就近撥支本色並撥支楚粤二省運供本色米石外通計無閏之年不足米一萬九千二百七十餘石有閏之年不足米二萬七千二百六十餘石此不足米石似應照依從前舊例仍於上游之開州貴筑清鎮安平鎮寧安南平遠黔西正安遵義桐梓綏陽等州縣徴支餘存米内按照兩地所報時值折中定價惟是米少地方價必昻貴餘米處所價毎低平向年各屬之價不甚懸殊兵民雖覺未便尚不致有重累今各屬米價每石自八九錢至一兩四五錢二兩不等此貴彼賤大相懸絶若仍照從前定價徵支自必民有倍徴之苦兵有不敷買食之虞查雍正十三年及乾隆元年各屬應徵錢糧欽奉恩旨蠲免至乾隆二年又將各屬餘存米石徴收實米貯倉其各鎮恊營不足兵糧俱經按年動支庫銀照依各該處時價折給兵丁自行買食在案請自乾隆三年九月起以後每年不足兵糧俱照上年之例按年動支司庫銀兩照依時價折給各兵自行買食其折給米價每年於九月秋收之後行令各該地方官㑹同營員公同查報司道核實分晰造具銀米細數清冊詳請核題仍於各該年奏銷案内分晰入冊報銷至開州等州縣俱有動支軍需及加貯穀折等項米石均宜亟為買補應令該州縣將前項應採買補貯之米即將每年應徴折色米石徴收實米貯倉准作買補之數俟倉儲充盈之後或令照依時價徴銀解庫或令仍徴實米貯倉之處再為定議如此變通實於兵民兩有裨益而倉儲亦得漸次充實矣貴州通志卷三十六
