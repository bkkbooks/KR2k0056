body:
  text: 貴州通志卷三十九藝文序明貴州通志舊序楊慎貴州為邦在古為荒服入聖代始建官立學驅鱗介而衣裳之伐芿亂而郡縣之剗砦落而衛守之百七十年來駸駸乎濟美華風而嘉靖中又特開科増額人士争自磨礪以篤祐文化翼贊皇猷與為多焉舊有方志殊為簡畧癸丑議増修督學謝公東山實主簡書筆削博引經史旁採子集又參訪故老咨詢儒生浹洽而㒺遺精鍊而無粃屬慎為序走也衰謭何能為役暇日嘗觀常璩華陽國志自先漢初至晉四百嵗士民可書者四百人亦可謂多矣上泝漢初至三代千餘年史所紀無幾人忠魂義魄與塵埃草莽同没於邱原豈不重可惜哉諸公今日之盛舉繼絶表㣲用夏翊華復三代禮樂之權輿也余嘗嘅今之議論以邉徼為逖逺不之重而官其土者亦自厭薄之嗚呼邉可輕乎哉衣之裔曰邉器之羨曰邉而器破必自羨始衣破必自裔始邉徼之説何以異此邉可輕乎哉此又諸公職思其居靖共爾位以副九重之顧諟以啟百代之瞻仰斯志也寓禹貢之衍義職方之流别矣修七星橋序楊慎且蘭古壤貴筑今藩割川雲之剽分躔參井之餘度粤占西路實貫南中闗號七星孔明禡牙之地衛名畢節闗索授鉞之區雖卉服之雜居乃朝宗之首路狂溪狠谷山狀馬鞍者彌千危磴懸巖城比虎牢而倍蓰兩嶔夾岸而有水千尋過渉以無舟夏潦秋霖鼓洪濤於樹杪浮丘沉陸阻行旅於荒途叱石誰感乎黿鼉成梁空瞻於烏鵲但知行惻未見當仁道士黄一中厥徒周陽泰雲陽戾止喟然嘆云髙下必因於丘澤潮汐恒倣乎日月此雙巖有天生之石岸兼千章饒地産之名材人心若堅神力可兾矢磨杵成鍼之志徼折梅寄樠之靈薙獮刋林鳩僝鏤岊淬兹寸願礪彼羣徒髙義動萬商之淵泉勝縁集三省之刀布出蘙薈而壯結搆剗䫜逕以施輿杠雁齒旁階濺沫飛流不染魚鱗上瓦闌風伏雨無虞在天半空去地千尺星梁斗柱搘雲漢以横陳雪浪銀濤拖玉虹而曲抱騎無輸載民不褰裳陽侯驚波易為方軌馮夷侵宅履作康莊相彼橋中潬於黄河手握南征之節較昔梁孫原於黒水身乗博望之槎豈有一介羽流握其十指綿力裨君子之平政遵王道之景行歘奠夷庚㒺煩令甲歡歌美諺近傳羅鬼之口碑隠行貽名逺契􅃮園之心印將永兹元元之績可佩言郁郁之文爰鍥貞珉匪溢華衮薄言觀者勿替引之思南府志序田秋志也者識也郡之史也以稱物采域質所稽也以撰風謡淳碞所識也以永監觀文獻所屬也我古有邦莫之克廢也思何闕焉黔荒之遺習也惟是網羅之責秋自叨第以來竊有志矣而未之逮也乃嘉靖甲午郡博鍾子玉節亦有作矣而事未竟明年冬洪公承藩以南樞佐出守我邦憲古振文用繼其役𢎞敷之暇爰以鍾子稿屬予釐正凡再閲月績用吿成公乃枉軒葢過西麓之草堂而揖予曰是役也有思以來一舉者也嘉成猷逺子可無言乎哉西麓子曰嘻方册之布永矣予何言也雖然亦竊聞之矣天下平則文物盛統勢一則圖志明斯典也世運闗焉者也且有經邦之道焉昔先王之御世也立典式而觀民因風宜而設教是故陳詩納價以察趨也五土有辨以致化也書用識之以永風也九丘之典邈矣職方之典孔子述焉大都為民治設也此意而湮即記載之功盛矣眩於觀詳於末文也奚用哉是録固無良亦㒺或弗鑒於兹也昔李吉甫作元和郡國志謂執此可以善治兹録也予固無言竊有望焉博覽贍聞之士其尚予正也黎平府舊志序袁表黎平為郡百六十年所矣郡黔而衛楚掌故無述焉先是要服也非所為文獻不足者耶既予深考之則留廣文讓有地里考張守愷有志夷雜咏馮司理天秩有黎平五開記然地里考獨載正統以前馮司理書草野其事不雅馴志夷韻語為風刺皆缺有間矣若乃幅􅊷有考也井里有名也歴官有表也表竊有取焉於是始作黎乗乗紀載之書也義先比事詞之工鄙弗計焉舜格有苗殷克鬼方往古之跡希濶窅茫爰及唐宋拓宇開疆熙朝混一隸於職方作輿地志第一凡五篇爰城邊圉乃作廨宇樹屏命官稍視中土作建置志第二既寘之守復授之師師帥牧之文儒誨之喁喁酋長覉之縻之招攜懐逺循吏有之作官師志第三裔徼遐荒非兵不彊寘戍列屯簡旅彭彭作兵戎志第四厥賦上下視荆匪絀取之覉縻伍什而一作徵輸志以明惠第五惟兹鬼方其俗淫祀祛厥弗經協於國紀作秩祀志以昭典第六洵美士行亦有女徳信芳寓賢謬悠往蹟作文獻志以彰軌第七蠻夷蠢矣武衛匪革銷鋒鑄鐻代有石畫作邉圉志以闡伐第八述厥故事附以論著凡九卷三十有三篇爰命府史受而藏之以備覽觀以俟作者丁酉志序江東之黔志自中丞劉公侍御宿公増修迄今四十餘年而未有執簡從事者亦已疏矣予方有慨於其中欲胥謀於直指應公而㑹鄉先生給諫陳君以請即令有司擁篲先驅開集雅之館復延疇昔所稱一二執簡也讐校也而日趣駕焉事竣姑為不腆之辭以志嵗月今天下大一統以示無外即鬼方靡莫故地已進而中國之與列省比肩承宣徳化聖天子特於黔加額開科所謂以冠裳易鱗介以俎豆飭戰陣意在斯乎則凡天文辨析於分野地理究極於輿圖士習民風兼採於夷夏田賦兵車與時盈縮固維新之一機也考黔故志自諸葛武侯以至王文成公上下千有餘年其間英聲駿劭播溢三危概可覩矣嘉隆以來代不乏人或鐵石之衷耀竒於禦侮或瑶華之藻展采於天庭亦有却金茹淡繼美闗西之清宿徳碩儒講明洙泗之學是皆質之於前而有光俟之於後而可法昭昭在人聞見方真非乗嵗時之近録而紀之將事與時湮人隨世往典型寥邈若存若亡藉令豪傑猶興尚友之謂何今兹髙世名賢操觚登壇又得督學沈君相與印正而潤色之凡例有綱有條爰分爰合各有攸當文不傷質麗而得體黔之衣冠禮樂彰而傳矣思南舊志序田汝成思南故宣慰司治永樂中罷司置府與内郡比百有餘年漸被文教蔚然移風而西麓田子以間出之才追琢至行領袖後生於是縉紳之士彬彬焉冠於全省矣府故無志田子喟然述作郡守洪君請而梓之既成而予以行部至府閲田子所為志知其有毣毣憂國之思焉非直以物色山川備圖籍也夫思南宇内之僻郡也山谷阨陿狫犵跧伏在昔開疆覉縻而治故其法未備境多縵土沃而善樹四方流冗亡賴匿命皆於此焉逋藪慮不為土著而胥宇者故其民易動東邇酉陽西連真播二三酋長無嚴黜陟豪舉自恣窫窳其民反目而籲天者鵲噪蠭起軼我疆埸池魚之禍比比罹之皆異省轄屬也故督課之法難行夫以法令未備之域雜以易動之民逼於豪舉自恣之比隣而郡守縣令不能制軍興鋤擊卒有草竊變安所圖昔之為思南者固亦難矣田子時建議於朝請設按察佐使一員治兵兹土兼制諸司警備不測國論韙之竟如所請乃今法制寖周而奸宄稍戢是則田子有功於父母之邦也志之作宜首表焉他所稱述固末義爾夫先王治天下慮外而勤内故政嘗均其用人也敬邇而恤逺故士有勸乃今仕者戀中朝内郡鄙邉方一閲除書即神氣沮䘮黙黙就列一切自利兾旦夕脱去為幸何暇及民夫使仕者懐沮䘮之心甚非所以攘綏四表紓主上旁矚之憂也故曰擇民而使者非良吏也擇官而宦者非忠臣也茍以自靖為心何論逺近且思南雖逺念其民獨非先王之苗裔乎出繒粟供徭役以奉其上也甚敬困於盜賊之擾不相保聚其望治於上也甚勤然則思南之民固無負於郡縣長吏也而為郡縣長吏者獨忍以邉方鄙棄斯民乎此則田子之㣲意所寓而未發於詞者予故論序首編俾後之覧者有政治之資焉若曰將以披圖籍考山川之觀而已則信為斯志之末義矣賀中丞沙城阮公撫定水西序孫應鰲大中丞沙城阮公拊循貴州之明年處置水西土酋安氏讋服西南底寜疏於朝部書公勞奏上天子喜降溫綸褒與特賜兼金純幣甚厚報既至藩臬諸大夫暨都䕶諸將軍咸欲揚休紀績交語清平人孫子應鰲俾載言以賀藩大夫曰安氏世禄羅施至國亨殘害安信與智搆怨誠有罪往嵗我軍軼迹之失國亨因陳兵衛守罪彌著自公臨涖是邦察知幾㣲才決游刃之餘識出漏般之表剖判禍福聴許澡雪約法既布咸遵要束方今聖神天覆悉主悉臣四夷欵塞父子請貢粤酋納土祖孫並戮何有兹醜公獨惻念無辜者衆溥好生之懿慎玉石之慘容與談笑措一方赤子枕席之上㒺騖近名㒺競勇功公實有焉昔畢公尹東郊道兼保釐召穆平淮夷命首旬宣繼自今吾儕肅將執事羣黎和安可以言保宄慝不作可以言釐政施環匝可以言旬治理昌正可以言宣皆公力也臬大夫曰髙皇帝創三尺法懸衡天下畫一來世孰敢逆節國亨有罪不在繼嗣公褫其爵仍俾其子原安智復讐之釁矜其情優其後劃其疆界俾有寜宇執其釀患之姦黨渠魁誅殺脇從流徙剪其羽翼剔其心腹國亨拜將稱王圍城鴆祖事無憑依無簡覈者不文致案問仍重其罰鍰輸諸官空其畜貨杜絶兩家隙孽設其戍糾其邪萌公剸堅制變銖分靡爽遵朝廷紀綱如在天上若從中植表而外四維之綜緯絓結不牽且揺古所稱文武為憲公其以之都䕶諸將軍曰公初至經畧戎務考山川發間諜探要領峙芻粟遴士馬亟罷僨事之舊將請更易東南名將劉君總提軍旅蒐羅部曲材官各得獻名設䇿風稜抗乎雷霆義問昭乎日星國亨聞之大懼因稽顙轅門攄暴衷愫免於殄滅夫持君之命違而征之展武之經服而舍之某等候事指使不暇給何能禆成算萬一於是鰲再拜復於諸大僚曰由藩大夫言見公篤於用恩由臬大夫言見公精於用法由諸將軍言見公嫻於用武鰲受一㕓為公氓不能覩其大惟生長斯土習聞已往任寀錯事之得失參考鄉鄰修治齊政之宜否竊窺一二之細貴陽棊布星列莫匪夷酋茍干冒國典不式王命叛侮毁常利在威克乃争强奪職骨肉私憤自相傾伐苐因時輯柔不足煩國家力利在徳綏徳先威為不競徳行於威之中善用威者也則鄧襄敏昔攻都匀鄒莊簡昔破爐山是已威先徳為不仁威行於徳之中善用徳者也則公今撫水西是已鄧鄒所處皆弱夷兼值時勢之易公今處時勢之難名與鄧鄒齊勤勞實且過之抑威克者事顯易知徳綏者功深無迹故公之功視鄧鄒猶廣厚不可量數後事之師若我三公皆可有辭永世服美無斁矣諸大僚聞斯言將無曰由治屬士民言見公明於相時審於因地哉然卒不能有出於諸大僚所交語也丁酉志序鄒元標元標荷殳黔筑俟罪六􅑤癸未春奉詔賜環用特恩備官掖垣諸抱疆埸憂者過問黔筑事曰諸土司故世受國恩何多梗化者予曰天威照臨誰不欲守世業傳之雲仍間有不靖游民鼓掌弄之非其心也計最雄長者土輿錢榖甲兵人民不及中州一下縣且其所仗肘腋人各有心欲自相貴又四面受敵亡足計也但地磽而瘠物産既絀有田者賦税時加轉瞬輙罷州邑長及諸小吏宦情蕭索諸小吏最苦士與民上與下交病也又尺籍消耗屯田荒蕪所稱站軍者􅉵於迎送軍衛益病以雄藩較之猶巨室諸子各享富饒一子獨食貧且貧者與富者賔客祭祀燕享之需相埓捉襟露肘苦可知已聞先正建議以湖北川東盡入版輿楚蜀不見小在黔筑式擴而大此其議非不偉而犬牙相制之説錮不得施難言矣聞者唯唯予同年中丞念所江公奉命鎮撫是邦舊游吿公受事斧斷斤削洞若游刃予聞之喜巳又聞公捐俸創救荒田若干又敦請予門人給諫陳君見羲鄉縉紳憲副許君吉菴大葺通志夫此兩者朱紫陽氏所至奉為令甲公毅然行於貴貴之人何幸有公也未幾公遣使以書委予序予得而披之為圖十有二附目十有八曰星野曰沿革曰形勝曰民政曰軍政曰學政曰城郭曰公署曰秩官曰名宦曰經畧曰藝文豐約同異必詳必確草創潤色裁正銓次咸得其人卓乎貴之憲章矣中丞公心葢曰百金之夫辛勤立門户必有家乗以遺後人予奈何視官不如家故竭蹷為貴筑世世計讀兹者感甲兵强弱則思振熟土苗馴梗則思馭㑹錢榖多寡則思裕稽盜賊出没則思靖察士習民風淳漓則思正此治貴大較也公惓惓是志之心也雖然醫書載隂陽虚實之宜在人悟不耳執一方御衆病病之數多方不勝病醫必敗予飲食兹土者久之上常與下有齟齬不越兩端鄙夷者茍簡塞責喜事者輕舉飈發貴事益不可支有能熟俗所宜衡物之情文武迭用徳威惟時如名醫針灸參耆旋投而立有效者然亦代不數人載在名宦可覩矣我朝列聖立極一統有誌即周禮大司徒掌史之意各省有志即小史所掌之意然其政興廢舉墜在人存亡不盡藉方册也往予恤站軍末議陳情於上得䝉俞㫖大司馬下貴當事以力詘辭故不得其人即君父之命竟至沉閣矧兹載籍竟公之志奠四境若覆盂者其在得人哉其在得人哉予敢以後先膚見熟數篇端俾同志君子有所覧鏡焉龍山志序鄒元標余為童子時有傳鶴樓先生集至文江者從旁窺之至龍山道院記恍逰員嶠方壺恨不旦暮往足未問曲折心津津在平州六洞中矣丁丑嵗予以罪譴是邦長老憶往時事持盃酒勞予曰此非小子昔時所欣羡而不得往其地者乎往則遺蹟固在也龍山萬叠將奉子湯沐矣所奪子者隘所與子者廣子其自寛荷殳至是創甚卧床褥者期年己夘秋始獲偕瀘州守呉明祥父及諸生周孟醇呉汝見等登眺其地逺盼交廣瀟湘近挹香爐金鳳諸名勝恨記中未盡其狀乃與諸人暢懐各論心數日始歸嗣是一觴一詠非龍不共予恐流風零落乃并先今題咏集為龍山誌因系之言曰情之好樂各因其人子厚在永州所稱鈷鉧潭愚丘謂其峭直奥深子厚為人大都類此龍山壁立萬仞如名卿碩輔垂紳正笏觀者凜然先生忠信孝友光明朗愷兹山見賞於先生固宜小子乏稜稜之節㒺卜税駕寜不見辱於兹山者幾希雖然山勢巍然不可犯由體静定而有常小子不墮初志夫巍然而静定者在我也語云髙山仰止景行行止雖不能至心竊嚮往矣貴州乙夘鄉試録後序鍾惺京朝官出典試事其地之逺近事之繁簡額之廣狹頗以官為差雖不可謂制而不可謂非例也猶之邉地有司以官所出之格為差雖不可謂制而不可謂非例也近主者憂邉事日非請稍變其格事且報聞黔邉地也屬有警宜從其例而臣以為三日試事帖括從容未若官黔地者千里蕭然兵民騷繹有彈壓綜理之任黔文事又簡雖寡昧如臣宜皆可往且官秩次當處諸臣後臣惺是以副工部主事臣明欽往典乙夘黔試也牘成臣明欽首為言矣臣惺復何言哉臣惟國家取士士舉於鄉者始得名為孝亷孝亷之名昉於漢漢取士之科有茂才異等有明經有孝亷三者不知所重何居顧茂才者則武帝詔中所稱跅弛不覉非常之人也而今若抑之以稱士之為諸生者其於明經則以稱諸生之廩於庠而嵗貢諸宗伯者彼茂才明經亦安然自處於孝亷之下而不争需次而不敢踰乃知國家所以鼓舞顛倒之用甚妙而意甚㣲者全在於用漢取士之法髙下其名稱而本末輕重較然矣士之得稱斯名者奈何不返而思其義也記曰資於事父以事君孟子曰不失其身而能事其親事親之道曰孝而失身之罪莫大於不亷士非孝安能忠非亷安能孝上不為士計而使士自為計士亦安能盡亷士自今以往一官寸禄上皆使得致於親上未得士一官寸禄之報而所施於士者方未已興孝訓亷凡所以全士體而養其氣者一一先其未發求之於無言代為之計而預為之所有甚於士之自為全自為養者而士反不自全不自養孝欲以事君而孝或衰於得君之專禄用以訓亷而亷或變於聚禄之厚則士負取士者取士者負國家也夫六經庸言孝與亷庸徳士有跅弛不覉非常之才而能守其經術以庸始終之斯豪傑而聖賢者得一人焉足以事君况今上嘉與廣勵不忘逺方新額至三十七人而臣等適逢其盛乎然得士而必求豪傑聖賢其人者又取必於三日之文其視有司之彈壓綜理於兵民間而必欲得其要領者難易又當何如諸士其懋勉之無使臣失言而可矣城書序郭子章守城事宜武經總要有城守章紀效新書有守哨篇呂中丞有城守尹朔野有堡約籌海圖編亦載城守一卷其説詳矣顧事太煩𤨏器亦重複介胄之士多不解其説予入閩得福州何太守所刻守城事宜總括武經新書而稍箋其詞令人易曉守城之善物也己亥入黔中疆埸日駭城垣為急乃増吕尹二書數條間抒一得付之剞劂凡守城將帥人給一册命之曰城書熟讀而詳味之庶幾黔之金湯乎故曰敵無脆有備者勝國無小善守者全曰備曰守無出此書召伯營謝蒍敖城沂竊為諸將望焉平溪衛志序失名平之先古雄溪也事文類聚山堂考索諸集載沅州路自秦昭王伐楚取楚蠻夷地置黔中郡隋為峽州唐為法州巫州溆州宋始改沅州而五溪隸焉雄五溪之一也漢史記武陵蠻叛伏波佩征蠻將軍印越二酉渡五溪而雄始見圖籍今城北遺跡有存者土人稱馬王而不名夫其山峒峻絶林木蓊鬰初為蠻王服習無疑乃騷經屈平浮湘而南遵溆浦導沅㵲歌澧蘭沅芷而平溪實在沅之平便近都迨伏波慨毒淫於山川太白寄愁心於明月杜甫惜雲山之共李臯標石柱之銘雖蠻夷王長之時而忠臣達士才人墨客已有經歴其地咏歌其事者矣歴宋至元皆未有據惟衛治西南多曠地居民耕種間得丘墓有碑勒夫人者有衣冠類貴倨者豈其時亦文武將吏置守其間如父老所傳者故附盧陽縣歟然而銘籍無鐫則文獻不足可知也盧陽即古麻陽一統志平溪在麻陽境内明興洪武二十二年調諸萬户於五方附五所千百戸於郭内銓流職以參軍政籍六郡良家子五千六百有竒以實防守據辰沅之上㳺當滇黔之孔道面山背水創百雉雄圖刀耕火種仍夜郎故習以銅鎮為北蔽頗無厝薪之憂連清鎮為西隣實借輔車之力㵲溪東注食貨日蕃夷種南蟠獠幾半屯田繡錯於思銅沅麻之鄉軍餉仰給於辰瀘溆黔之賦風俗愿朴未雕人情華實相濟世皇中興平始有學兩嵗貢一士雖僻在遐陬而鎻鑰之寄禮樂之修較若雄矣黔記序陳尚象昔孔子欲居九夷魯論嘗紀其問答之語矣迨其後有明正徳中王陽明先生謫官龍塲有何陋軒記今翰墨淋漓壁間似有神物䕶持者嗟吾夫子所云九夷豈必即羅施之區文成之記毋亦為鄙夷我黔者廣歟大中丞郭公撫黔之癸夘嵗出所著黔記示予益可念也嘗觀名山大川載有圖經宇内昭曠之士恨不旦暮遇乃遐陬僻壤豈無一丘一壑為造化所特鍾者即輶軒過之不肻經覧人情貴耳賤目貴近賤逺大抵然也夫黔雖僻壤自我明建藩以來二百餘年二祖之所創造累朝之所覆育皇上之所觀文成化民鼓舞於恬熙士涵泳於詩書亦既彬彬質有其文苐逰譚之士往往以其意輕之士大夫聞除目一下輒厭薄不欲往此寜獨以邉徼故抑或以文獻尠少興起為難故雖千載下猶未離於或人之見耳乃今有中丞公黔記其文與獻可考鏡也余黔人何敢侈譚黔事試即記中所載理學文章忠孝節義種種具備何其盛也至於名公巨卿之經畧遷客碩儒之講明勛華増天地之光道徳作譽髦之式抑又何偉也由斯以譚則今日之黔孰與曩昔比乎今夫天地之元氣愈漸漬則愈精華國家之政治愈薫蒸則愈彪炳惟是精華彪炳者得發抒於葢代之手其人重則其地與之俱重黔葢兼而有之貴山富水與龍山龍塲行且有聞於天下後世世有昭曠之士亦必於黔乎神往矣在昔賦三都兩京者一出而貴洛陽之紙膾士林之口然或感時諷諫或折𠂻羣言且皆成於十年視公投戈染翰刻燭賦詩備一代之典章垂千秋之信史其遲速輕重固天淵矣記成當與黔並永不特海内幡然改觀固知何陋之言與陽明名軒之意俱得公而益信象不揣固陋附言末簡載其言以存汙樽土缶之一端云黔記序丘禾實今天下開府置官屬之地十有三而黔最後黔非特後也籍黔之人不足以當中土一大郡又漢夷錯居而夷倍蓰焉以此宇内往往少黔其官於黔者或不欲至至則意旦夕代去固無恠其然乃士生其間或亦謬自陋通籍後往往籍其先世故里視黔若將凂焉余居常毎嘆之謂黔不足治乎是越不章甫而蜀不雅化也謂黔不足興乎是陳良不産於楚而由余不生於戎也有是哉苐地之重人也以山川而人之重地也以文獻黔自國朝始為冠帶之國文獻闕焉地奈何得重余間考鄉先輩非無崛起於時者旋就湮没載籍故府牒及列郡乗俱散漫磨滅不可讀有無乗者是無以表章聴其湮没皆黔士大夫之過也余不佞嘗讀郡志而有感焉自以學闇典墳捜羅未廣懼為山川羞乃今有郭中丞青螺公黔記中丞讀書盡天下其記黔也直取兵於武庫不勞更鑄苐中丞自平播以來拮据戎馬兵食間宜無餘力而㳺翰所染輙至充棟余曽未聞杜元凱平呉裴中立平淮有所論著也且中丞望重中書久矣獨不意旦夕代去耶余觀大事記黔之故實釐然指掌雖黔人不諗也至讀賢宦傳見鄉先輩一二典型爛然如昨而身或不知又如宣慰傳中所載昂兄弟詩蔚然風雅想其人土流有此何論華族而黔記未成時輙併湮没由此以譚未嘗表章之不可謂無獻則未嘗修之固不可謂無文也中丞所為詩文在在殺青而其肆筆為史則黔獨著中丞豈亦有意為黔文耶書成紙貴海内士與寓目焉由此必有樂至其地以紹中丞之業者若黔士既發醯雞之覆將得寳於家而不暇外索此非黔記誰啟之也記今自重天下不藉余為元晏苐余樂桑梓文獻有歸且見君子之有益於人國如此因紀其實而序之若文之工不工自是黔驢之技所不計也送少司馬蔡公撫黔序譚元春同安蔡敬夫先生言行如古人較然不自欺其忠孝接物之志天下信之春事公久獨以為能懼今世所不足者懼也公何懼之有春事公久見公於學問之本末浩浩淵淵筆之所往孔上而周下贄俯而亮仰不遺力以達於深賾無邉際而曰吾苦不能思嗜書不暇讀於學問無所窺嗟乎春毎見有志者為之效其一二處㣲肖即志揚氣得公何懼若此吾是以見其懼也當萬歴乙夘丙辰間公在辰陽辰與黔兵食相及有欲用民力於苗者公執不可因自解歸去而臯臯訿訿者亦適自起滅數年來海内多事天下思公甚公亦念天下由晉岳起鄖中丞民以久安會黔夷不靖舊開府深入未還天子乃以公為少司馬往撫之春聞而度其故非用其才也用其氣也用其氣用其懼也方公强項不肻輕用民力時其氣已入人肝脾矣氣藏於不可見動於不可禦古之君子懼以養氣氣以養智而今之所為氣有臯臯訿訿而務以茍勝於人而已矣使臯臯訿訿而可以茍勝於人焉已洩矣已盡矣豈能復有氣乎氣之所為不可使復洩也誠以蘊之懼以守之其誠彌積其懼彌深懼日以深而氣日以達一旦不得已而用於世也則非我欲其然也氣自然也氣猶泉也泉之初萌如蚊蠕之㣲動視之不得何況於聴稍流為池為澗形見聲増至於水石交鳴喧豗不聞人語浣濯者往焉灌溉者往焉而泉則猶守其初萌之性曷往觀乎蚊蠕之㣲動矣公讀書深用人細見事透以鬼神自則而以豪聖望人初下黔命春適見於鄖中公虚心省躬遍問人所以往黔者人莫能應公自咎曰教人而不教於人學問之大詬也氣浮與滿示挹與肻綮失與何莫應也春聞之躍然吾所見公懼者益信矣懼者君子所以盡天而好謀者君子所以盡人天人自足於胸中而國運人心坦然黙聴於忠孝接物之内故成也成之為言天與人俱不必問之詞也大誥曰允蠢鰥寡哀哉予造天役遺大投艱於朕身不卬自恤君猶如此況代君者乎有鰥寡之哀以通人有天役之造以通天未有暇自恤者不懼生於自恤自恤生於暇心於是乎紛然問天問人而苦無以通之泉竭自中氣不足也春素以是聞於公敢述以為送尊其所聞竊自附於髙明云爾國朝鄉飲禮儀序衛既齊余以辛未十一月至黔視事閲一月而改嵗則周禮鄉大夫受法司徒飲酒尚徳時也黔中脫兵燹未久此典闕而有待乃集僚屬按國家律令稽諸儀禮禮記酌為儀節令師儒講習於陽明書院至再至三始多格格既而嫻熟有儀遂俾新貴令行之賔僎介衆賔各執事擇人惟謹及是日嚴嚴翼翼黔人士以為創觀夫古今異宜言禮家又人人殊然而羣言淆亂折諸聖凡孔子之所明言者則皆萬世所宜行者也其節目之大者有五一曰祭祭脯醢也祭肺也祭酒也所謂報本返始以致敬也一曰爼賔僎之爼肩也主人之爼臂也介之爼胳也所謂貴骨賤骨以致辨也一曰拜拜至也拜洗也拜送也拜受也拜既也禮畢而拜送也所謂自卑以相尊讓也一曰於席末嚌肺也啐酒也告㫖也皆不當席所謂為行禮不專為飲食也一曰獻酬主人獻賔也賔酢主人也主人又自飲而酬賔也主人酬介介酬衆賔衆賔又自相酬以及於沃洗者也所謂逮賤也以儀禮之節證諸記所載孔子觀於鄉之言嗚呼至矣哉不可易矣行禮之始例應讀律禮畢例應謝恩余酌於讀律時兼讀孔子之言葢欲尊王章明聖道俾斯民知尊讓潔敬先禮後財以尚化成俗而已矣其間升降興坐簡於儀禮者十之二三僭竊之罪知無所辭庶幾人之易從而毋以繁苦視也昔者季氏逮暗而祭日不足繼之以燭有司之强力者亦跛倚而倦及子路與質明而始行事晏朝而罷而孔子以為知禮誰謂禮必委曲繁重不近人情者哉既行於省將頒其儀節於各郡縣也爰論其梗概而為之序貴州通志序曹申吉今上御極之十年予奉簡命來撫黔陽間以暇日閲明撫臣郭青螺先生所輯黔記慨然識前代治亂之由歎撫馴之不易獨明季載籍詢諸遺老而其事亦少缺矣伏念我國家底定西陲載踰星紀其豐功偉烈深仁厚澤不可以不書方欲撰述成編用垂典册既而上允部議令天下纂修圖志則益思所以塞宸渙示來兹爰率黔有司與夫碩士之有文者相與掇墜補殘抑浮削冗既戒既備遂拜手稽首而卒業焉葢聞盛世不勤逺畧虞廷干戈僅稱來格禹貢荒服亦止羈縻即以秦皇漢武雄才大畧之主其時五尺通道封守未設唐䝉司馬相如兩至夜郎甫修賔貢而西夷二郡旋置旋罷豈治網踈濶抑亦卉裳椎􅡫夙稱難治故不暇以為也風會日開幅􅊷漸廣歴唐宋迄元始易土而流明置專藩裒為郡邑猶寖尋至於中葉而典制始備葢柔逺維艱振古如斯昭代聿興天付所覆百蠻君長咸奉約束亦既聲靈震於殊俗風教訖於流沙而水西負固上干天討隴氏亦弗戢於郎岱最後擺㵼扯處烏餘孽猶勤師旅雖漸次削平版章載闢未可云傳檄而定矣此又近事可覩記者也夫創之也難則治之也不易予嘗佐秩宗貳冡宰奉事殿中得仰見天子嘉與維新中外一視軫黔民之困以阡陌責令長俾勸於農桑念邉土貧瘠而特罷鼓鑄知荒落之區罔習法度不可以中原之律治也而寛其禁令所以懐柔逺人更張區畫者備至予抵黔既久日進殘黎而風曉聖世與民休養之意童叟交歡式歌且舞有事闗邉計亦次第指陳上不以其言為愚輙得報可庶幾蠶叢鳥道之鄉登於衽席矣顧僻處西南遥瞻國門如在天上而疆宇四錯倚滇扼楚負蜀襟粤以致伏莽深山嵗煩牒問則長慮却顧所藉於繼起者有待即今日之指掌而稽繪圖入吿誠亦司封土者之責也惟是野史遺聞久罹兵燹不無訛闕詎敢傳疑故雜記多列􅉨事而法制尤詳於今取其足以備鑒觀可信於逺者誠使宵旰之餘一展卷而遐方萬里洞若觀火則治理闗焉法戒具焉豈以要荒之紀載而可忽乎因書所見以為序黔書序徐嘉炎嘗考讀古今輿圖疆理之書所載山川之隆窪財賦之豐嗇與夫士馬甲兵人材風俗之備詳誠有資於治術矣而文采則不足及觀歴代詞人才子賦名都言井里擷蟲魚草木之華多宫闕城郭之盛極其偉麗矣至於攬景物之蕭條感變聲之衰颯亦復凄涼悲慨嚼徵含商然以語於治之得失民之休戚則概未之及也葢著述之不能相兼如此今讀中丞䝉齋先生黔書則不然先生之書葢專為治黔者法也黔地居五溪之外於四海之内為荒服其稱藩翰者未三百年其地尺寸皆山欲求所謂平原曠土者積數十里而不得袤丈其人自軍屯衛所官戸戍卒來自他方者雖曰黔人而皆能道其故鄉無不自稱為寓客其真黔産者則皆苗獞犵狫之種刦掠仇殺獷悍難馴易於負固其土田物産較他方瘠薄者尚不能及十之二夫以黔之地之人之不可以倚守也如彼其土田物産之無可利賴也如此夫國家何事於黔哉然聞先生之言曰無黔則粤蜀之臂可挹而滇楚之吭可扼國家數十年來亦知荒落之壤無可供天府之藏猶且日仰濟於他省嵗糜金錢而不惜者敉寜之道固如是也然則黔治則有與之俱治者黔亂則有與之俱亂者先生以英偉之才深沉之識身處其地知之審慮之周矣故其為書於所以致治而防亂者三致意焉道里之險易必詳之所以謹偵伺嚴來往也山谷之紆曲者徑遂者必分别誌之所以慎封守飭固圉也夫治蠻徼者審其地利察其人情始焉必無以啟之而繼焉必有以制之慎稽其出入之門戸熟悉其黨與之離合防其阨塞絶其勾連禁其剽掠審其器械材力之長短利鈍而善禦之所謂有以制之者也使之相安於其習俗相樂於其燕閒羣苗無驚於擾索土司勿困於誅求所謂無以啟之者也故先生之書既重於嚴兵守土而尤重於羇縻撫綏每於前人定亂服叛之舉其不事張皇不煩兵革者必津津書之以為前事之不忘後事之師此先生所以治黔即可永為治黔之法者也雖然先生之為是書又不獨以經濟自負也葢其英偉之才深沉之識具雄竒而擅奥博者又實為詞人學士之宗凡黔之草木山川人材土物皆幸有先生以發其菁英而抒其藻麗是故椎􅡫刻木皆可入王會之圖也踏月吹笙皆可作名都之賦也飛雲白水之瀑可以嫓美於台廬也濟火闗索之名可以核實於紀載也牡丹之花並於洛陽渥洼之産雄於冀北以及丹砂卉革水銀雄黄之屬皆豔稱而悉數之使人視黔以為名邦以為樂土慕而安之美而賦之葢不欲使天末一隅為曹鄶之無譏於季札且將如呉蜀之見賦於左思先生之於黔不亦思深而意長乎後之讀是書者既賴以治黔而又資其餘材以考據史傳乞靈詞賦則是書也豈獨與爾雅方言與夫稽含之狀酈元之注同日而語哉至於龍塲之祠記尊昔先民而不以異同相詆訾則尤崇奬激厲之盛心矣嘉炎來黔受其書而讀之不禁快然曰是書也經濟文章任人之擕取而各得所謂仁者見之謂之仁智者見之謂之智者也葢著述之兼美者莫踰於此因樂為之序以附不朽云思南府志序劉謙吉思南舊有志也萬厯乙未後百有餘年蔚惟我朝又五十年鮮有簪筆文獻莫徵君子憂之憂之維何曰荒已闕已殘已墜已軼已紛已考之璇璣曰軫翼曰參井曰雙女曰申參於彼乎於此乎庸無荒問之章亥賔也而化卬也而印務也而婺羇縻也庸州也城樂也叙州也洪杜也寜夷也勿之據矣庸毋闕城其築乎竪則憑焉兵其防乎豕則突焉江不能帆塹不能輸田不能溝畝不能糞商不能贏工不能業入不能計出不能末流不能収移不能復庸毋殘牂柯有守番部有長非游宦也永樂十二年而府𢎞治八年而縣非諸路也丞無常設牒無專判簿無校獄無司倉無使非全制也夷醜於名沿陵於酉朗割於洞非完司也庸毋墜伏波之祠委諸莽矣河東之石隣於怪矣西麓之奏議西臺之疏草付諸燼矣水西之殉桃紅之役皆無特書也南人語南寨人語寨功賞者秦贅也攘臂者楚鴂也抱貿者巴僰也流移者豫章也蠅蠅銖銖利之所盡則鳥獸散庸毋軼且紛今詔下郡諸侯亦屢矣奈何以荒且闕殘且墜軼且紛者應也荒則正之闕則釐之殘則整之墜則舉之軼則補之紛則畫之正斯無忒釐斯無失整斯無敝舉斯無廢補斯無滲畫斯無偏君子所以憂也為綱十為目五十二非惟是思南也思南志成則言思南也考古者可以繩今察往者可以鏡來知已然者可以坊未然志者繩也鏡也坊也問刀耕火種昔何以繡而今何以窳問任土作貢昔何以供而今何以縮問土著胥宇昔何以戢而今何以睢問城闕子衿昔何以譽而今何以佻問計偕宦遊昔何以盛而今何以衰而不寜惟是忠孝大節躬代乗鑾者彼何人也今何以不侍御若也銅鈴齊鳴孤軍深入者彼何人也今何以不留坡若也必為聖人倡學西南者彼何人也今何以不大參若也開科目之初者給諫也覆婺學之議者中丞也請印江之學者柱史也先輩名賢紛然傑出今何以逺不逮也有功徳於民者尸而祝焉慶厯以前踵相接也今何以寥寥也抑有司曠於後而良二千石不再見歟凡此者皆予與鄉士大夫二三君子憂之深而莫能釋也恐無以彰盛世之休也尤有望於後之來者共明此志也貴州通志序閻興邦志之原起於爾雅司馬遷曰書班固曰志後世相沿而不易江文通有言作史之難無出於志予以為志難矣而為黔志尤難諸省自秦漢以來分疆畫址久隸職方黔則設自明初割楚粤川滇之剰地則星野難齊也諸省名山大川各有紀載黔則牂柯九隆而外山不列於益記水不注於桑經其他樂史寰宇希先方域卷帙浩繁於黔獨畧則典籍難稽也諸省建官置牧歴年已久黔雖通於莊蹻鑿於唐䝉而由隋迄宋半屬羇縻官無循卓士號天荒元明以後畧載數人則政治難詳也西南諸省亦雜蠻獞然皆十之二三耳惟黔十一府皆苗多民少椎髻侏􅍣半不通語言文字則風俗難同也十一郡之中為衛所三十一為長官司八十二為土舍丞同廵檢三十近雖改縣設流非一而舊册已湮新圖未訂則戸版難查也積此五難遂成三惑夜郎與遵義同疆興古與曲靖錯壤為梁為益分軫分參則惑於地且蘭遥隔於番禺紫池沿譌於貴縣舞無音淆兖充字異則惑於書晉置寜州何以刺史不涖黔土唐増採訪何以牂夷别屬劍南則惑於官黔志豈易為哉聖朝聲教四訖薄海以外皆入版圖矧黔在十五國之中雖去京師八千里其地則天子之地其民則天子之民其政則天子月吉之所頒其治則天子嵗終之所考庠序有光則取士増於舊額逋逃授首則苗頑格於舞干凡此皆可播之筦絃列之雅頌以傳世而行逺者也予撫黔以來五載於兹念田野之未盡闢憂在民生念異類之未盡馴憂在境土或未雨而綢繆或先時而補救負一方之重寄今幸天子之文徳武功風翔雲合而黔之黎庶皆已集林而改音扶杖而觀化使不分載之於成書薈而存之將古所謂土地之圖人民之教以佐王擾邦國者又何以稱焉黔志創始於明嘉靖督學謝公後修於中丞劉公暨江公今已失傳惟青螺郭公黔記僅有存者然其所載每詳於近代而畧於逺古故黔事尚有缺軼我皇上御極之十一年爰命儒臣纂修一統志至次年而貴州通志亦次編集奈書甫成即遭叛逆遂爾散失是志也前撫猗氏衛公之所修者也始於三十一年之正月而告成於是年之十月其用志固勤而為期則促予閲之非獨三十二年以後事當補入即此三十六卷山川其有定也而遺者十之三古蹟其共傳也而逸者十之五職官不詳其嵗月選舉僅記其姓名耳目之近尚多放失予意欲重修而每歎文獻之無徵又慮鳩工之不易因取各條畧加論定可増者増之不能増姑仍其舊非敢謂有功於前人亦使後之觀者以備參考云爾若夫作志之難古今同慨彼班氏之著述尚以詳於浮言畧於事實取譏於夾漈矧予也三長莫具七畧㒺窺乃欲於時日之近網羅千載之文捜採遐荒之事其為難也十百於前人然不辭其難者葢以揚天子之盛治垂之億萬斯年也重修貴州通志序董安國粤稽禹貢一書成於九州既定之後以紀夫山川土田物産貢賦之不同而又鑄為九鼎以象物使民知神姦不逢不若周禮邦國之志掌於小史四方之志掌於外史此紀載志乗之所由來也余幼讀龍門之書漢武元鼎六年置牂柯犍為越嶲夜郎四郡以為益州宋元而來始置貴州即梁益荆楚之分也余初筮仕得楚之靖州在黔東歴官司蜀臬在黔西北皆與之隣遂稍悉其風土大抵山叢蠻雜地确民貧加以冦亂相尋凋攰尤甚辛未秋忝備黔藩由夜郎渡牂柯江見夫萬山㦸列百里烟微厥土黒墳田皆下下途間所值率皆鳥言卉服鵠面鳩形之倫視事後披覽版籍賦不過銀七萬兩米九萬八千九百餘石口一萬六千六百八十有竒其幅􅊷風土可謂荒且陋矣恭逢我皇上深仁厚澤三十餘年武功耆定之餘休養生息鳩澤中而安集之浸浸乎戸口増流離復儼然滇楚間一都㑹邇年來文教誕敷黔人士濯磨砥礪炳然可觀間有潛修績學隠岩穴甘貧約以束躬敦行下及苗蠻婦女亦知節烈卓卓可稱道於是嘆人之不為地限採風者不可以其荒陋而忽也適大中丞衛公來撫是邦虚中折節相與講求治道孜孜不少倦念通志一書修於康熙十二年未及通行遭變叛盡燬署中僅遺抄本又多殘缺舛訛不足以資考據垂永久也乃命余開局延儒分類授簡以大參陸公董其事又自為裁訂惟詳惟覈自春徂冬八閲月而報成余受而讀之舉方輿象緯賦役兵防名宦先後之政績鄉賢流寓之文章與夫死事之忠勤孤婺矛牙之貞操莫不釐然大備方修輯之初殘編斷簡茫無可依據余竊憂之踰月購得郭青螺黔記若干卷魚魯豕亥始有所折𠂻續購通省郡志邑志其舊有志者十才二三咸取而釐輯之其舊未有志者亦争自蒐輯手録成帙以佐見聞所未逮因得補十二年後之事為全書並前志所遺漏者亦加詳焉非敢謂修明之功可軼前人而竭上下之心力集逺近之耳目務使荒陋之域文獻可徵以對揚聖天子休明之治而已矣雖然網羅舊聞以傳信者外史小史之遺意也率作興事而不託諸空言者岳牧守令之責也今黔地多石而維草其宅土多瘠而舟楫不通苗多獷而反側不常何道而使汙萊盡闢商賈熙穰桴鼓不鳴狉榛成俗當亦偹官兹土者所宜加意而綢繆也余敢不勉乎哉故於是書之成序其畧於簡端紀事明撫夷紀事髙拱隆慶庚午貴州土官安國亨安智各起兵讐殺撫臣以叛聞請討之已撫臣去太僕少卿阮文中代之阮來謁事予語之曰吾聞安國亨本為羣奸撥置宣淫播虐遂讐殺安信以致信母疏窮兄安智懐恨報復相讐殺無已其交惡互訐皆讐口誣辭不足憑乃安智不能勝國亨撫臺欲為智伸意固善然郤為智所欺而擁兵居省又為智所紿而謀動干戈則多事矣國亨不服拘提見撫臺右智疑畏不敢出而撫臺遂奏以叛逆然乎哉夫叛逆者謂敢犯朝廷背法為亂者也今夷族自相殘殺未犯朝廷縱拘提不出亦只違抝違抝何以為叛逆乎乃遂輕兵掩殺彼夷民安肻束手就戮故各有殘傷然亦未聞國亨有領兵拒戰之迹固可訪而知也而今必以叛逆論之亦甚矣君行矣宜亷其實而虚心平氣處之若果如愚所聞則當去其叛逆之名究其讐殺與違抝之罪彼當必出身聼理一出身聼理便非叛逆只以其本罪罪之當無不服方為國法之正天地之公也阮至貴訪得其實果如予言乃書報予並陳處置之畧然狃於浮議不敢突變前説語多依違予乃復書曰天下事有必當明正其罪者有罪未必真人臣當自為處分不可於君父前過言之者若中原之民敢行稱亂如此則所當上吿天子發兵征討滅此而後朝食者也若夷民異類順逆殊途雖有釁隙本非叛逆之實則人臣當自為處分不可過言於君父之前何者君父天下之主威在必伸有叛逆便當撲滅可但已乎而乃事非其真釘入其罪則將如何處也安氏之亂本是安國亨安智夷族自相讐殺此乃彼家事非有犯於我者何以謂之叛逆而前撫臣乃遽以叛逆奏君父在上既聞叛逆之説則法所必行豈容輕貸而安國亨本無叛逆之實乃禍在不測但圖茍全地方官更復不原其情遂至激而成變乃又即以為叛逆之證可恨也今國亨上本訴寃乞哀懇切叛逆者若是邪而地方官仍復不為處分仍以叛逆論之遂使朝廷欲開釋而無由國亨欲投順而無路亦已過矣且安智國亨之讐也非我族類而乃居於省中謂何安智在省則讒言日甚而國亨之疑畏日深國亨之疑畏日深則智之禍愈不可解是挑之使鬬而増吾多事也故愚謂安國亨之罪固非輕而叛逆則不然安智當别有安插而省居則不可惟在處置之得宜耳以朝廷之力即族滅安氏何難顧事非其實而徒勤兵於逺非所以馭夷狄而安中國也願執事熟思之也時彼中號令未明安國亨疑畏益甚拘提益不出聲言恐軍門以勘問誘我出殺我又恐安智兵來掩殺乃日擁兵自衛於是阮乃上疏請兵糧為征剿計而書來計事予讀之曰嘻阮子誤矣安國亨所為不出者疑畏深也今明㫖既下事在必行是真以叛逆處之矣處以叛逆彼將叛逆自為也將不逼而使真乎且彼夷酋耳而勞師費財即族滅之何為況未必然乎未必然則惡可已其説長矣是不惟致彼以假為真而我亦終當以假為真也時在閣思之環牀而走同官者曰公何環牀走予曰思貴州事耳欲從之則非計欲無從則失威曰然則當何如予曰今撫臣䟽請兵糧征勦安國亨亦有奏辭辨誣乞哀甚懇固各有説也吾意欲並行之而差一風力給事中往勘若無叛逆實則只治其本罪果有叛逆實即發兵屠戮未晚彼安國亨聞勘官且至必以為吾身在勘軍門當不敢殺我我出聴理乃可以自明彼若出聴理則不叛逆自見而乃治其本罪當亦甘心亂或可戢也胥曰善予召職方郎中至授之意遂題覆得請而以吏科給事中賈三近往勘予復面授方畧乃國亨聞朝廷勘其事科官且來果喜曰吾生矣夫吾豈叛逆者哉所以不出聴理者恐軍門誘我出殺我也今既有㫖勘則吾係聴勘人軍門必不敢殺我吾乃可出聴理明吾非叛逆也葢逢人即告之語達京師先是阮開以五事一責令國亨獻出撥置人犯一照夷俗令賠償安信等人命一令分地安插疏窮母子一削奪宣慰職銜與男權替一從重罰以懲其惡令該道官曉諭而國亨母子狐疑擁兵不出如故至是乃始將漢夷犯人王實呉瓊阿弟等獻出而母子自出聴審供稱其餘人犯俱死逃及奏事未囬非有隠庇又稱願認於六犯名下賠償罰銀六千兩又稱敵殺官兵是時國亨在藺州與奢效忠講理不知安總兵統兵殺死夷目以朶楊生阿烏等此伊父兄弟男子姪率衆衝敗官兵奔過浮橋渰死願罰銀三萬五千兩又稱願將内列安插於阿傀織金二處疏窮安插於卧這内列著令退閒將安國貞頂替頭目以後再不敢搆兵讐殺又稱願革管事令男安民權理公務於是國亨即輸銀四萬一千兩送官聴處乃疏窮安智猶堅執不從聲言必欲殺安國亨子母將地方改土設流乃已阮乃處其用事撥置之人智始伏遂差衛官三員押發智與夷目漢聰等五百餘名並軍器輜重俱背負出城赴卧這織金等處安插葢科官未至而事已定矣乃科官至中途而還於是阮乃上其事曰安國亨一介小醜叨承世官奸雄類於豺狼詭譎同於狐鼠横行暴虐不守王章大肆兇殘戕害骨肉縱兵鄰境積多不赦之辜召禍門庭皆是自作之孽寵嬖倖而私通婦女信羣小而載弄干戈安智避難潛逃尤極窮追之慘官兵廹巢討罪至多拒敵之傷迹其背違多端誠於法紀難貸該臣欽承明㫖參以部咨行之多官酌乎輿論反覆兩人顛末事果出於有因毒祖屬諸曖昧殺叔起於讒疑拜將封官既無事證可指斬闗掠地又無形迹可稽拒敵損兵供自畏死激成而首惡已獻納銀罰治皆照夷俗價贖而羣犯就擒繼恩國貞釋自拘囚而無恙知未怙終安智疏窮插之原囤而有歸可因解忿即今遵此五章尚可寛其一死乃若安智野悍無知昏庸特甚初懐雪弟之寃而播弄官兵繼奉安插之後而屠掠夷目迹亦彰於肆惡罪不下於國亨但念其流離蕩析之中不失為骨肉報憤之志今奉委官解散彼亦息忿囬巢情既可原罪當薄罰若王喬呉瓊阿弟王實呉彩呉鶴駕劉禮等或投夷扇亂或拒敵朋姦自其撥置之禍一死不足盡其辜揆其情犯之殊首從亦宜别其等今議照造謀首禍者據法加以上刑結夷生事者引例分其贖遣要皆反覆憲章推用情理於刑期無刑之中寓治以不治之意無非體聖世不怒不殺之武而曲全之以並生並育之仁也且釋一門之隙可以免數省兵糧調度之勞宥一人之死因以免衆姓玉石俱焚之烈不惟鴛鷔怙勢者為之逡廵而旁觀倖利者悉以歛戢生靈寜謐邉圉奠安是皆仰仗皇上帝徳誕敷天威逺播執政面授方畧本兵區畫機宜邇者復荷聖明俯從部議特差吏科給事中賈三近銜命㑹剿先聲所至逆賊破膽是以畏威懐徳向化輸忱不煩兵革自爾帖服者也伏乞勅下該部再加查議上請將阿弟行廵按御史處決梟示王喬呉瓊固監㑹審詳決王世臣等編發烟瘴地面充軍安國亨禄氏應卒務卒白孺等姑置不死著令國亨退閒待立有竒功另處其糧馬公務責成伊男安民同禄氏代管仍安官二員一住大方一住卧這以遏二家隙端事寜之日撤囬自今處分安插之後如或國亨故再懐隙殘害安智及或安智挾讐拽兵報復俱聴臣等遵照明㫖行㑹總兵官動調四省大兵夾剿改土設流以為鴛鷔蠻長之戒乃按臣亦奏同阮指又稱安智既與國亨相忤難以屬管准與母疏窮囬原管地方安插令伊子安國貞管催一應錢糧公務云云詔下兵部議議上得㫖安國亨兇惡干紀本當動兵𠞰戮既投見伏罪遵奉約束并禄氏等都且饒他一死安國亨著革了任閒住令伊子安民代管宣慰事安智也著伊子安國貞代充頭目如再違法搆亂定行處治不饒其餘依擬欽此兵部又奏叙功曰廵撫都御史阮文中開五事以責成致二兇之讋服多方指授雖出諸黄閣之臣百爾經營實竭其赤心之義并其餘官舎人等通宜分别賞賚得㫖重賞文中餘各賞有差乃後月餘安智疏窮奏又至復辨前事乞改土設流浮言且藉藉起予計貴州至京逺甚今前㫖下纔月餘安能便得往還此必安智用事之人潛住京師隨便為謀者非必來自智也遂令通政使拘投本之人執送法司究問果有智用事二人係罷閒官乗有罪亡命投智者特令久住京師謀事今本實代為者智尚未知也乃問發充軍去浮言遂息先是巨寇者念據險擁衆萬餘人僭號稱王設官拜將宫室服用擬諸乗輿時發兵搶掠安順一帶地方民夷患苦垂三十餘年有司匿不以聞阮欲發其事剿除之書來計事予復之曰此賊稱亂既久朝廷弗得知君乃欲發其事而剿除之可謂忠矣調度既周方畧既定便當舉事吾其佐君成之阮遂發兵征勦至是擒者念斬之平其餘黨掃其巢穴土地悉歸州衛版圖深山窮谷無復逋逃淵藪而夷獠旁觀亦皆震慴阮奏上其事以為聖武布昭天威逺播宻勿樞垣指授所至兵部覆上詔陞賚阮及各有功官有差而阮則啟叙先後事歸功於予乃復之書曰安氏之亂既已底定可免百萬生靈之命而今復建竒勲勦除數十年僭王之叛逆蕩平鬼窟廓靖妖氛俾王化宣流萬里之外㒺弗恩洽實社稷之功也固當勒銘銅柱追跡伏波以示後世顧不偉歟僕言有偶中葢所謂心誠求之不中不逺者顧何力之有焉自是境土謐寜生民安業兵無征伐之苦官免奔命之勞上下恬熙與中華埒矣予乃為紀其事國朝殉難紀事王睿順治元年我世祖章皇帝定鼎燕京時滇蜀黔粤未隸版圗丙戌王師西下流賊張獻忠死於蜀其黨偽平東將軍孫可望率醜類破永寜䧟遵義丁亥正月竄入黔省官軍如鳥獸散賊焚刦原野道路絶人烟定番州牧陳新第蜀之長夀人能禮士素得民心民戴之若父母聞變集紳士土官州民於公堂商堵禦䇿貢生饒謨有智畧合紳士條陳事宜新第大悦㑹按察使張燿參議曽益都司陳瑞徵知定番弓弩手强甚抵州結束土司募兵為恢復省城計而省城之避㓂於州者近萬家於是備器械儲糧糗濬城隍架鹿角警烽火選精鋭飛檄韋番為守城小程小龍為左翼方番洪番為右翼金石羅番盧番為應援又築壘以扼敵以威逺守偹陶世顯為右師軍土橋大龍土官龍在田佐之勇士簡成書為左師軍洞口卧龍土舍龍起潛龍飛佐之張陳諸公坐中軍調盧山木瓜等四司由椒山出水車抵青巖繞賊後以斷糧道木官通州等四里由平伐趨上馬張旌幟以為疑兵布置精詳衆志成城矣正月十八日土官龍在田敗賊於小山斬首四十九級二十二日土舍龍起潛敗賊於長田斬首二十九級二月初五日陶世顯敗賊於土橋斬首百餘級生擒二十一人可望憤甚令偽定北將軍艾能竒師號五萬初九日攻洞口成書與世顯率鋭卒更番迭戰斬賊百餘人無何二路失期敵衆我寡右師潰陶世顯龍在田龍起潛龍飛等血戰死成書孤軍難支而賊已分兩路直趨東北闗矣旋圍城賊逼城下城上萬弩俱發賊傷數百人賊少却空西門以誘我我軍弗動戒備甚嚴越翌日賊以礟攻城雉堞毁則易以板板壊則易以木賊無計以銅牌書硃字諭降新第毁其牌而擲之能竒怒躬親視城成書以藥矢射之中左臂鏖戰歴三晝夜矢乏則繼以石石乏則繼以糞無少懈賊欲退俄而賊軍師李自旺者號老神仙手執白雄雞披髮仗劒以石灰畫地繞城而詛十二日已刻城内火忽起人争滅火賊乗勢登城東隅而城陷矣州牧陳新第肅冠帶北向拜曰臣力竭矣縊於署内之馴鹿堂參議曽益題絶命詞縊於道署學正尹大任縊於明倫堂訓導徐鑣吏目安紹祖廣順奉調吏目周齡六按察使司獄陳玉環俱自經鄉官顧人龍妻李氏對縊中堂子諸生大元抱父母屍哭不去賊並殺之尹思民賦詩壁間投筆引繩死黎維垣城上督戰死胡允中冠帶坐庭中賊至允中叱之賊刃死皆州紳也時賊轟滿巷饒謨大呼曰我輩宜死戰於是諸生王道中顧從龍黄文芳李一龍夏朝卿李二龍毛一練尹湯傅尹湯卿熊化楊東明唐璉賈翰張新建王仰王基昌土官程民悦韋帝臣土舍韋之福勇士簡成書把總許華宇等奮勇力戰至學􅄵成書猶格殺數賊同時百五十餘人俱戰殁舉人毛琛投井死原任教授艾養中諸生周卜年尹湯賔熊鍾隨鄉約杜凡六赴火死諸生謝賜璠黎應陽江山秀潘達黎應辰投泮池死張承祖妻呉氏大哭曰我等義不受辱遂相率而赴蓮花池者數十人焉張燿陳瑞徵與賊巷戰西隅日晡被執能竒曰公吾梓里也幸降我燿曰汝為賊吾為朝臣何梓里之有瑞徵亦大罵之同遇害武舉䝉九錫亦在執中能竒曰汝何不早降九錫曰汝何不降我能竒手射殺之是日也刀聲如礟響血甚流杵城中數百人上自官司下逮婦女竟無一生者而賊之為我殺也亦損其二日暝天忽雨㸃紅於血賊懼十三夜即旋省至桐木嶺能竒藥發死於道豈天厭其惡而假手於成書耶滿城瓦礫白骨丘聚四鄉不入城者凡三月卧龍菩提寺僧汪姓者有善行傭人拾遺骸聚東闗火而瘞之俗呼為萬人墳康熙四十五年郡人士請祠祀不果行刺史王公旌其墓曰忠烈貴州通志卷三十九
