body:
  text: 恭進貴州通志表題為纂修貴州通志告成恭呈御覽事臣等誠惶誠恐稽首頓首上言伏以堯天廣運弗遺膏澤於要荒舜日重華普被照臨於邊徼統車書而隆制作萬國同揆采志乗以備裁成八紘在握風聲所樹無非康濟之仁典冊攸存不外化成之義竊惟宅中馭大聿陳王㑹之圖視逺惟明用辨職方之掌人文克顯政教斯通粤考黔中昔居化外星分參井虚垂列宿之光地接荆梁難畫方輿之界七旬格於大禹苗地未詳三年克於髙宗鬼方終棄自莊蹻將兵而道通沅水唐䝉奉使而郡置犍為旋封夜郎之王復設牂牁之守馬忠為郡始於丞相之渡瀘東謝來朝盛於貞觀之開洞八校尉之擊九部落之歸僅可羈縻紅狫之名紫薑苗之種率多翻覆二路十二部至宋而有貴州之稱八畨十八衛至明而有專藩之設顧經營粗立雖經始於前朝而氣象維新實備隆於昭代椎髻卉衣之屬咸效國風烏羅銀甸之鄉盡開王路朱旗畵㦸啟都府於鰲磯龍洞之間雲宇山楹觀蔀屋於天馬貴人之上然而山不列於益記水不注於桑經閒吟太白之詩空懷遷客細讀孟堅之論未悉土風白水留題不涉封圻之要典碧雲紀勝徒饒月露之叢談若非修葺羣言曷以宣揚聖教乃因甫輯而遽值祲氛或已增修而尚叅疑似厯年既乆考證尤難編帙殊繁捜羅不易欽惟世宗憲皇帝道光四表徳潤羣生仁義兼施萬物熙而六幽盡闢恩威並濟三才正而九土咸開精神旁達乎邊隅無微不照雨露均濡於雜俗有惠皆行黔州之被澤尤深蠻峒之流風非昔綸音特沛通志全修伏遇我皇上建極承乾膺符出震文謨武烈悉推時憲之聰明玉振金聲並著大成之條理通神機於淵黙視萬里如在目前制權變於張弛運天下不殊掌上移風易俗既取效於頑苗克靖之餘履信踐忠復加勉於險地悉平之後城郭修而清時有備倉廪實而歉嵗無虞逋負頻蠲戰士勵捐軀之志租庸屢免耕農興鼓腹之歌申法令而戒嚴刑人懷三尺飭亷隅而加厚祿官凛四知蘂榜添花既廣秋闈之額黌宫煥彩復頒内府之書膠庠盡植楩楠文風丕振溪洞皆栽棫樸陋習潛消山土争開已食餘糧之利桑田試種佇生挾纊之春凡兹聖主之鴻圖盡屬熙朝之典則臣等欽承載筆實愧無文損故益新祗恐修辭之不立發凡起例惟期義類之相從事必證諸古今務闕疑而存信言有關乎治忽寧就簡而刪繁規模溯因創之源流制度考廢興之顛末雖管窺蠡測未足形聖治之光華而潄潤含芳竊欲效輿人之採訪伏願文摛周鼎道契羲繩聖聖同符執一中以立極人人遵路合四海而從風藉記誌以廣薫陶奚啻三苗丕叙盡經綸而宏化育永看萬彚咸亨臣等無任瞻天仰聖激切屏營之至謹奉表隨進以聞貴州通志凡例一貴州舊志為綱三十二以類附見者十二如關梁附見於山川郵傳附見於城池義類殊未妥協今列天文地理等八綱用統衆目以類相從似覺有條不紊一舊志輿圖之說止載全省總圖各府俱缺今黔省幅􅊷割楚蜀粤西府州縣衛以附益之漸為恢擴因推廣舊志之意每圖各係以說一建置舊志載在大事考所序太畧粤稽上古黔雖不通中國自唐宋以來所置覊縻州縣頗有沿革可考今悉據歴代地理志補入一疆域舊志止有東西南北四至而無四隅考建置郡邑犬牙相入者甚多詳列四隅所以正經界也今悉為補入一山川舊志方向先後無一定次第今倣一統志體例先城内次城外先東次東南次南次西南次西次西北次北次東北俱先近而後逺其山水之名亦分先後以類相從凡山先山次峯嶺岡坡次巖崖石壁次墱坪阪原次囤箐谷洞逕其名不經見者俱次於後若一山中又有坡嶺巖洞者即連而及之不另為類凡水先江次河海次川湖灘溪次澗潭水泉次洲渚峽洪次灣泊池塘次堰陂壩閘渠溝井其名不經見者倣山例一古蹟如廢城古戍之類必須注明在城何方去城逺近庶有蹟可考今從各府州縣志冊及明一統志續文獻通考諸書叅考互訂得其方向者十之五六備列於前其無可考者彚載於末以俟博識者一苗蠻種類雖夥其形狀服食究亦相去不遠舊志每種各繪一圖似轉覺支離不如刪去葢其性情風俗備於紀載不必按圖而考索也一風俗原與教化移易黔自元以前本屬苗徼自明以後始漸被文明然前此椎結侏􅍣之俗固不可没也因考漢唐宋以來西南夷南詔各傳中有屬在黔地者書之於前庶有原委一學校舊志附載樂儀夫黔之有志以志黔事也若聖朝禮樂乃天下所同固可不載其各府州縣義學俱註明建於何地以補舊志之畧一田賦舊額新墾歴年各異今照乾隆四年徴收賦役開載其省府總數及州縣細數一一詳書至苗疆屯田類附於後以備查考一黔省財賦無多經費嘗仰給外省查舊志惟兵餉一項載在兵防驛站工食載在郵傳然官役俸工師生餼廪鞭春祭祀之屬既皆著於令甲不宜缺而不書今設經費一門以免遺漏一周禮地官之屬遺人掌邦之委積以待施惠即今常平倉之遺法我國家令天下直省府州縣皆設立義倉以備荒歉誠重積貯以厚民生之至意今黔省各府州縣皆有積貯而舊志獨不載殊為缺然特為補入一物産舊志於貴陽首府列通産於前專産於後而間見雜出未免眉目不清今以通産盡列於前方列專産於後其通産專産次序首榖次蔬次貨次果次藥次草次花木次羽毛鱗介各府俱照此彚編以免參差一職官舊志文自知縣以上武自副將以上方錄今因之一名宦與鄉賢俱祀於學宫載在祀典近奉特㫖慎重查核去留皆有冊籍今將前朝中已載舊志者照舊載入其舊志所遺而郭青螺黔記及各省通志所載鄉賢而宦於黔與名宦而黔籍者悉為補入至於國朝名宦惟以冊為據冊所不收及冊所汰去者雖載舊志亦不敢收入一黔省自明世設立衞所多以土人為流官如指揮千户之類其有政績者或入名宦或入鄉賢湏有一定之例舊志未加分晰如同一千戸也貴筑朱暹陳銑則入人物龍里井孚則入名宦同一威清指揮也張貴張晟則入人物楊遵則入名宦不特此也一毛勝也既入名宦又入人物張信亦然一井孚呉徳也既入名宦又入忠烈錯雜重複如此類者難以悉數竊意名宦當以官為主人物當以地為主以土人為土官如宣慰宣撫長官司土同知通判之類有功於其土者則列之人物以土人為流官有功於其土及隣郡縣者則列之名宦其已見者即不復重書似為清晰一黔省自明世始設流官故載在名宦者惟明最多舊志雖以年代為次然文武錯列崇卑無序今倣職官例文武分編以官職憲綱為序其中仍各照年代編次一黔省未立郡縣以前皆土司也既設郡縣後屢勤征討者亦土司也舊志止載現在承襲者一人未免太畧今照承襲之冊詳書其世系即已革除者亦取其始末書之以備查考而水西安氏播州楊氏其為害尤鉅詳其本末附於後一大事考一門諸志所無昉於郭青螺黔記其中所載即兵防田賦職官中諸事若詳載則嫌於重複簡截又苦於漏遺今將所載事蹟分入各門中惟土司苖蠻為黔患之最鉅自殷宗伐鬼方三年乃克嗣後尋於干戈以行征討無代無之今設師旅考一門附於武備志之内其中或剪除於未萌或招徠懐服不煩撻伐者悉記之葢上兵伐謀與不戰而屈人之兵皆師旅中善之善者也一舊志無鄉賢名目葢即以人物為鄉賢也不知孝義勇烈隐逸之士孰非人物乎即外來流寓方外仙釋之屬皆人物之選也今立人物為綱以統鄉賢孝義諸目一舊志設勇烈一門凡流官及土人死事者俱載其内禮曰聖人之制祭祀也以死勤事則祀之能死其官即不愧名宦之目不必别以烈名且烈者必勇而忠實烈之本也今易勇烈曰忠烈凡土人之有爵位而能死事者悉載焉其士庶人之致命遂志者則列之孝義國於天地必有與立忠臣義士所以為天地扶植綱常者故居宦蹟文學之前一冊中汰去之鄉賢亦有歴官頗著聲稱因無功徳於鄉里而去之者然宦轍所至政績可紀馳聲藝苑掞藻天庭雖無徳於鄉未始不足增鄉邑之色若竟擯置不録是反不如小道之方技異端之仙釋得以有傳也今設宦蹟文學二門為人物之目庶於國典鄉評兩不相悖一列女凡舊志所載者仍之新收者以題旌年分先後為次其未經題旌而年分合例苦節可風據府州縣志冊及申詳藩司廵撫衙門現在陸續具題者悉為編載庶潛徳幽光不致終於冺没一流寓須其人名重當時事蹟可傳於後者方為收録庶㡬地以人傳舊志中有止載某人以某官謫來並不書其事蹟者黔雖僻遠亦奚藉此無足重輕之遷客以溷紀載乎今遍加查考有事蹟可傳者書之其無可傳者削去其謫官而能舉其官之職者收入名宦若王守仁之倡明理學雖係謫官仍載流寓葢其功業固不闗龍塲驛丞也貴州通志修輯官員總裁臣鄂爾泰臣尹繼善臣元展成臣張允隨臣張廣泗監修提督貴州全省學政陞江蘇布政使司布政使臣晏斯盛提督貴州全省學政雲南道監察御史臣鄒一桂督修貴州等處承宣布政使司布政使今陞總漕臣常安貴州等處承宣布政使司布政使陞湖南廵撫臣馮光裕署貴州等處承宣布政使司布政使臣陳惪榮貴州等處提刑按察使司按察使今陞廣西廵撫臣方顯署貴州等處提刑按察使司按察使臣宋厚督理貴州清軍糧驛傳道事務按察司副使臣錢元昌分廵貴西道按察使司副使臣介鍚周分廵貴東道按察使司副使臣王玠署分廵兵備道按察使司副使臣徐永祐采輯貴陽府知府臣甘士琇思州府知府臣史歩髙思南府知府臣孔傳堂鎮遠府知府臣趙之壇石阡府知府臣杜理銅仁府知府臣姚謙黎平府知府臣孫紹武安順府知府臣崔傑南籠府知府臣楊滙都匀府知府臣曾朝聘平越府知府臣孟周衍大定府知府臣牛天申遵義府知府臣陳玉纂修翰林院庶吉士原署姚州知州臣靖道謨原任仁懐縣知縣臣杜詮分修原任遵義縣知縣臣梁學新原任錦屏縣知縣臣廖貞畢節縣知縣臣謝國史施秉縣知縣臣董良材原任甕安縣知縣臣張荃原署水城通判臣王澐原任畢節縣知縣臣葛荃原任餘慶縣知縣臣蘇大忠原任錦屏縣知縣臣吕賡雅原任龍泉縣知縣臣樊仲琇原任南寧縣知縣臣王橒歲貢生候選訓導臣李專監刻貴筑縣知縣臣彭居仁校對㧞貢生候選教諭臣姜文澤欽定四庫全書史部十一貴州通志目録地理類三都會郡縣之屬天文卷一星野氣候祥異地理卷二輿圖卷三建置卷四疆域形勝卷五山川卷六闗梁郵傳卷七風俗苗蠻古蹟邱墓營建卷八城池公署卷九學校貢院書院義學卷十壇廟寺觀食貨卷十一戸口卷十二田賦卷十三田賦卷十四課程卷十五經費蠲恤積貯物産秩官卷十六官制卷十七職官卷十八職官卷十九名宦總部卷二十名宦分部卷二十一土司武備卷二十二兵制卷二十三師旅考卷二十四師旅考卷二十五苗疆師旅始末人物卷二十六選舉卷二十七選舉卷二十八鄉賢卷二十九忠烈孝義卷三十宦蹟文學隐逸卷三十一列女卷三十二流寓仙釋方技藝文卷三十三勅詔諭卷三十四奏䟽卷三十五奏䟽卷三十六奏䟽卷三十七狀頌贊箴銘書論解考辯卷三十八傳卷三十九序紀事卷四十記卷四十一碑記卷四十二碑記卷四十三文議教説卷四十四賦詩卷四十五詩卷四十六雜記臣等謹案貴州通志四十六卷國朝大學士鄂爾泰等撰葢其為雲貴總督時奉詔所輯與雲南通志同時纂次司其事者姚州知州靖道謨繼之者則仁懷知縣杜恮也其視各省志成書為最後至乾隆六年刋刻始竣總督管巡撫事張廣泗等奉表上之貴州僻在西南苗蠻雜處明代始建都指揮司後改布政司分立郡縣與各行省並稱而自唐宋以前不過羈縻弗絶尚未能盡闢狉獉故從來紀載視他省最為荒略明趙瓚創修貴州新志葢亦以昔所未有故以新志為名其後若謝東山郭子章及本朝衛既齊等遞事増修終以文獻難徵不免缺漏惟田雯之黔書筆力頗稱奇偉而意在修飾文采於事實亦未臚具此書綜諸家著述彚成一編在黔省輿圖差稱詳備矣乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
