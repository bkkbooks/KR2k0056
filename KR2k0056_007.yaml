body:
  text: 貴州通志卷七地理風俗黔開自明世前此皆溪洞苗蠻也故今各府風俗止就明以來志乘中語書之其漢唐宋諸史書中西南夷南詔南蠻諸傳所載則編於苗蠻之首貴陽府俗尚朴實敦禮教讓士秀而文民知務本謝東山志崇儒術重氣節處者恥為汙下之事仕者多著廉潔之稱沈思充志風土近剛習尚從儉性情每多質直器用絶少竒淫民務稼穡而鮮貿遷士敦詩書而多彬雅安順府種類雜糅習尚異宜舊志茹毛飲血日久漸更務學力田頗循漢禮續志其俗勤儉尚儒重信舊志刻木示信猶存古風務本興行漸洗蠻陋土俗尚存桴鼓流寓漸有華風一統志詩書禮樂不減中華科舉題名記文教日興人才漸盛民樂輸將不喜健訟平越府俗尚威武漸知禮義一統志附郭舊人遷自中州多讀書尚禮男女有别土夷異俗舊志力於稼穡民少爭訟人士秀雅無囂陵之習全蜀土夷考人知畏法俗近馴良有秉禮守義之風尚氣節亷隅之行都勻府人重亷恥勇於戰鬬一統志苖獠錯處種類不同俗尚亦異聲教所被士知讀書民皆興行土瘠民貧嵗時伏臘賓客燕享不事華靡郡治雖偏饒有古風舊志男無遊手婦勤女工民風謹厚守分安貧鎮逺府習尚質野服用儉約一統志風氣漸開人文丕振遊宦者安之舊志思播流裔地狹民貧耕讀織紡多從朴素本志水陸衝衢商賈輻輳民多負販經營無浮夸遊惰之習思南府漢夷雜居言語各異寰宇記漸被華風圖經漢民尚朴元志務本力穡郡志屏異教行四禮黜浮崇實士慕正學駸駸文獻之風舊志士子多兼力農婦女恆羞踰閫急於輸將貧不為盜惟尚巫信鬼陋習未除石阡府淳龎朴茂不離古習服食婚喪悉效華風郡志土著夷民其俗各異涵濡日久可擬中州新志士無佻達之風農盡胼胝之力地非四達鮮有貿遷思州府民性剛悍祭鬼弭災一統志夷風丕變絃誦洋溢按察使盧秩記俗近淳龎人知畏法無大姦頑士類彬彬有文埒於內地巡按毛在記俗不喜爭健訟者少民勤而儉頗有餘積銅仁府居辰常上遊舟楫往來商賈所集頗有楚風舊志力本右文士多向學僉事隂子淑記苖獠種類不一習俗各殊聲教漸敷為之丕變舊志民性淳和俗尚儉約黎平府五方雜處人性朴茂尚義重信不樂紛囂舊志此邦之人有三不惡時和年豐惟以禮樂詩書為事魏華父記地稱沃壤民習勤儉士敦絃誦俗少囂陵大定府習俗鄙陋性格野朴不事商賈惟務農業聲教漸訖向慕儒雅人多勤儉文風武略漸有可觀舊志地寒民貧多資牧養為業俗尚淳龎冠婚喪祭漸能循禮惟漢少夷多信巫尚鬼之風甚於他郡地多土目錯居夷性好爭喜鬬近知畏法亦漸革心南籠府士安絃誦農樂耰鋤地闢民聚化行俗移郡分安順習尚略同新轄永豐夷俗漸革其民任真率性畏法易使德教所被風氣日開遵義府敦龎淳固悉慕華風圖經男女多朴質人士悅詩書以射獵伐山為業信巫鬼好詛盟宋遵義軍圖經婚姻以氈矢為聘粧燕樂以歌舞為佳會會聚皆重盛服出入喜佩劒刀華陽國志勤耕鑿重蠶桑士質而文民朴易治冠婚喪祭不尚奢華人知向學深山窮谷猶聞絃誦聲雖夜郎舊地當與中土同稱苖蠻昔髙辛氏有犬戎之寇帝患其侵暴而征伐不克乃訪募天下有能得犬戎之將吳將軍之頭者購黃金千鎰邑萬家又妻以少女時帝有畜狗其毛五采名曰槃瓠下令之後槃瓠遂銜人頭造闕下群臣怪而診之乃吳將軍首也帝大喜而計槃瓠不可妻之以女又無封爵之道議欲有報而未知所宜女聞之以為帝皇下令不可違信因請行帝不得已乃以女配槃瓠槃瓠得女負而走入南山止石室中所處險絶人迹不至於是女解去衣裳為僕豎之結著獨立之衣帝悲思之遣使尋求輒遇風雨震晦使者不得進經三年生子一十二人六男六女槃瓠死後因自相夫妻織績木皮染以草實好五色衣服製裁皆有尾形其母後歸以狀白帝於是使迎致諸子衣裳斑斕語言侏􅍣好入山壑不樂平曠帝順其意賜以名山廣澤其後滋蔓號曰蠻夷外癡內黠安土重舊以先父有功母帝之女田作賈販無關梁符傳租稅之賦有邑君長皆賜印綬冠用獺皮名渠帥曰精夫相呼為姎徒今長沙武陵蠻是也夜郎者初有女子浣於遁水有三節大竹流入足間聞其中有號聲剖竹視之得一男兒歸而養之及長有才武自立為夜郎侯以竹為姓武帝元鼎六年平南夷為牂牱郡夜郎侯迎降天子賜其王印綬後遂殺之夷獠咸以竹王非血氣所生甚重之求為立後牂牱太守吳霸以聞天子乃封其三子為侯死配食其父今夜郎縣有竹王三郎神是也初楚頃襄王時遣將莊豪從沅水伐夜郎軍至且蘭椓船於岸而步戰既滅夜郎因留王滇池以且蘭有椓船牂牱處乃改其名為牂牱牂牱地多雨潦俗好巫鬼禁忌寡畜生又無蠶桑故其郡最貧句町縣有桄桹木可以為麵百姓資之以上見後漢書烏蠻與南詔世婚姻其種分七部落一曰阿芉路居曲州靖州故地二曰阿猛三曰夔山四曰暴蠻五曰盧鹿蠻二部落分保竹子嶺六曰磨彌斂七日勿鄧土多牛馬無布帛男子髽髻女人被髮皆衣牛羊皮俗尚巫鬼無拜跪之節其語四譯乃與中國通大部落有大鬼主百家則小鬼主牂牱蠻東距辰州二千四百里其南千五百里即交州也無城郭土熱多霖雨再熟無徭役戰乃屯聚刻木為契盜者倍三而償殺人者出牛馬三十俗與東謝同西㸑之南有東謝蠻居黔州西三百里南距守宫獠西連夷子地方千里宜五穀為畬田嵗一易之衆處山巢居汲流以飲無賦稅刻木為契見貴人執鞭而拜賞有功者以牛馬銅鼓犯小罪則杖大事殺之盜物者倍償婚姻以牛酒為聘女歸夫家夫慙澀避之旬日乃出會聚擊銅鼓吹角俗椎髻韜以絳垂於後坐必蹲踞常帶刀劍男子服衫襖大口袴以帶斜繚右肩以螺殼虎豹猿狖犬羊皮為飾有謝氏世為酋長部落尊畏之其族不育女自以姓髙不可以嫁人貞觀三年其酋元深入朝冠烏熊皮若注旄以金銀絡額被毛皮韋行縢著履中書侍郎顔師古因是上言昔周武王時逺國入朝太史次為王會篇今蠻夷入朝如元深冠服不同可寫為王會圖詔可帝以地為應州即拜元深刺史𨽻黔中都督府又有南謝首領謝疆亦來朝以其地為莊州授疆刺史建中三年大酋長檢校蠻州長史資陽郡公宋鼎與諸謝朝賀德宗以其國小不許訴於黔中觀察使王礎以州接牂牱願隨牂牱朝賀礎奏牂蠻二州戶繁力強為鄰蕃所憚請許三年一朝詔從之南平獠東距智州南屬渝州西接南州北涪州戶四千餘多瘴癘山有毒草沙虱蝮蛇人樓居梯而上名為干欄婦人橫布二幅穿中貫其首號曰通裙美髮髻垂於後竹筒三寸斜穿其耳貴者飾以珠璫俗女多男少婦人任役婚法女先以貨求男貧者無以嫁則賣為婢男子左袵露髮徒跣其王姓朱氏號劍荔王貞觀三年遣使內欵其地𨽻渝州自夜郎滇池以西皆莊蹻之裔有稻麥粟豆絲麻薤蒜桃李以十二月為嵗首布幅廣七寸正月蠶生二月熟男子氊革為帔女衣絁布裙衫髻盤如髽飯用竹筲摶而噉之烏杯貯羮如雞彛徒跣有舟無車死則坎地殯舍左屋之三年乃葬以蠡蚌封棺父母喪斬衰布衣不噪者四五年近者二三年為人所殺者子以麻括髮墨面衣不緝居喪婚嫁不廢亦弗避同姓壻不親迎富室娶妻納金銀牛羊酒女所齎亦如之有罪者樹一長木擊鼓集衆其下強盜殺之富者貰死燒屋奪其田盜者倍九而償贓姦淫則強族輸金銀請和而棄其妻處女嫠婦不坐凡相殺必報力不能則其部助攻之祭祀殺牛馬親聨畢會助以牛酒多至數百人以上見唐書西南諸夷漢牂牱郡地武帝元鼎六年定西南夷置牂牱郡唐置費珍莊琰播郎牂牱牂夷等州其地北距兗州百五十里東距辰州二千四百里南距交州一千五百里西距昆明九百里無城郭散居村落土熱多霖雨稻粟皆再熟無徭役將戰征乃屯聚刻木為契其法劫盜者償其主三倍殺人者出牛馬三十頭與其家以贖死疾病無醫藥但擊銅鼓銅沙鑼以祀神風俗與東謝蠻同至道元年南寧州刺史龍漢􅚜遣其使龍光進率西南牂牱諸蠻來貢方物太宗詔見其使詢以地理風俗譯對曰地去宜州陸行四十五日土宜五穀多種秧稻以木弩射麞麂食每三二百戶為一州州有長殺人者不償死出家財以贖國王居有城郭無壁壘官府惟短垣光進之説與前書所記小異故并敘之上因令作本國歌舞一人吹瓢笙如蚊蚋聲良久數十輩連袂宛轉而舞以足頓地為節詢其曲則名曰水曲其使數十輩從者千餘人皆蓬髮面目黧黑狀如猿猱使者衣虎皮氈裘以虎尾插首為飾黔州涪州徼外有西南夷部漢牂牱郡唐南寧州牂牱昆明東謝南謝西趙兗州諸蠻也其地東北直黔涪西北接嘉敘東連荆楚南出宜桂俗椎髻左袵或編髮隨畜牧遷徙亡常喜險阻善戰鬭部族共一姓雖各有君長而風俗略同以上見宋史黔省自明始置郡縣元以前皆為蠻夷今之土司即昔之酋長今之蠻苖即昔之夷民則漢唐宋諸史中所載蠻夷之在黔地者自宜列之於前以原所自始今採西南夷南詔西南溪洞蠻諸傳中所載風俗則冠之苗蠻諸酋長之朝貢授官則冠之土司其討逆伐叛之事則紀諸師旅考庶以類相從云狆家五代時楚王馬殷自雍管遷來其種有三一曰補籠一曰卡尤一曰青狆貴陽平越都勻安順南籠各屬皆有之有黃羅班莫栁文龍等姓好樓居衣尚青以帕束首婦人多纎好以青布蒙髻長裙細褶多至二十餘幅拖腰以綵布一幅若綬仍以青布襲之性勤於織以十二月為嵗首斂牛馬雞犬骨以米糝和之作䤃至酸臭為佳稱富積者則曰貯䤃桶幾世矣婚姻皆以茍合始每嵗孟春跳月用綵布編為小毬謂之花毬視所歡者擲之奔而不禁聘用牛隻以姿色定聘資多至牛三五十頭喪則屠牛召戚友以大甕貯酒執牛角灌飲醉或至於相殺主人不食肉止啖魚蝦葬用棺以傘蓋墓上期年而火之祭用枯魚嵗時擊銅鼓為歡土人或掘地得鼓即以為諸葛所遺富者不吝值爭購每畜蠱毒夜飛而飲於河有金光一道謂之金蠶蠱每以殺人否則反噬其主故雖至戚亦必毒之以泄蠱怒又斂毒藥以染箭鏃中人血濡縷立死出入必負強弩帶利創睚眥之仇必報以椎埋伐塜綁掠無辜人口謂之捉白放黑以為嫁禍之媒或聚聚劫掠或禦人於塗明時纍費征勦兵至則散兵去復聚然貴安等處夥居勢熾性多剽悍其散處各屬者頗馴良近皆寧戢悍俗還淳多有讀書識字者按凡苖皆不知正朔無文字刻木為信魋結侏􅍣誅茅搆宇架木為巢寢處與牲畜俱夜無卧具寒則挖地作爐爇柴炙火食惟麥稗野蔬亦有糯稻至婚姻間用媒妁然必抱子乃歸近經禁誡漸循禮法惟病不服藥尚鬼信巫積習難返諸苖大都如此宋家在貴陽本中國之裔春秋時宋為楚子所蠶食俘其民而放之南徼遂流為夷即宋宣慰之祖也頗通漢語文字男子帽而長襟婦人笄而短襟將嫁男家遣人往迎女家則率親戚箠楚之謂之奪親旦則進盥於姑男女則燂湯以沐三日而罷喪葬飯疏飲水二十一日封而識之若馬鬛男女勤耕織知禮畏法近多讀書入泮者蔡家即蔡人亦為楚子所俘在貴築修文清平清鎮威寧大定府平逺州皆有男子製氊為衣婦人以氊為髻飾以青布若牛角狀髙尺許用長簮綰之短衣長裙翁媳不通言居喪三月不食米肉惟飲稗粥猶存古禮殺牛宰牲聚親屬吹笙跳舞名曰做戛夫死將婦殉葬婦家搶去乃免龍家其種有四一曰狗耳在廣順州康佐司依深林榛莽之間其近溪者入水捕魚猾若蟂獺男子束髮而不冠婦人辮髮螺結上指若狗耳狀衣斑衣以五色藥珠為飾貧則以薏苡代之春時立木於野謂之鬼竿男女旋躍而擇配既奔則女氏之黨以牛馬贖之方通媒妁死以杵擊臼和歌哭舁之幽岩祕而無識在大定者人死三年取其尸刷之凡三次在平逺者殮則焚而瘞之以七月七日祭其先塋一曰馬鐙龍家在寧谷西堡頂營之間多張劉趙三姓夜尚白喪則易之以青婦人緇布作冠若馬鐙然一曰大頭龍家男子以牛馬􅐢尾雜髮而盤之若蓋以尖笠覆之一曰曾竹龍家風俗約略相似花苖在貴陽大定遵義所屬皆無姓氏衣用敗布緝條以織衣無襟竅而納諸首男以青布裹頭婦人斂馬􅐢尾雜髮為髲大如斗籠以木梳裳服先用蠟繪花於布而後染之既染去蠟則花見飾袖以錦故曰花苖每嵗孟春合男女於野謂之跳月擇平壤地為月場鮮衣艷粧男吹蘆笙女振響鈴旋躍歌舞謔浪終日暮挈所私而歸比曉乃散聘資視女之妍媸為盈縮遇喪則屠牛召戚逺近各携酒肉以賻環哭盡哀葬不用棺斂手足而瘞之卜地以雞子擲之不破者為吉病不服藥惟禱於鬼宰牲磔雞往往破家終不悔悟以六月為嵗首其性戅而畏法其俗陋而力勤惟在鎮逺黎平有張陸姚李朱潘楊吳等姓不務本業結連白苖醜類成羣以殺掠為生自勦撫後始皆歸化白苖在貴定龍里黔西州亦有之衣尚白短僅及膝男子科頭赤足婦人盤髻長簮跳月之習與花苖同祀祖擇大牯牛頭角端正者飼及茁壯即通各寨有牛者合鬬於野勝即為吉鬬後卜日斫牛以祀主祭者服白衣青套細褶寬腰裙祭後合親族髙歌暢飲其性戅而厲轉徙不恆為人雇役墾田往往負租逃去青苖修文縣鎮寧州黔西州皆有之衣尚青婦人以青布一幅著之首男子頂竹笠躡草履出入必佩刀性強悍好鬬頗同於猓玀然猶知畏法不敢為盜其在平逺州者又名箐苖居依山箐遷徙無常不善治田惟種荍麥稗粱衣麻衣皆其自織男子未婚者剪腦後髮娶乃留之紅苗在銅仁府者多有吳龍石麻白五姓衣服悉用斑絲女紅以此為務牲畜不宰皆掊殺以火去毛微煮帶血而食之人死仍用棺將所遺衣服裝像擊鼓歌舞名曰調鼓每嵗五月寅日夫婦各宿不敢言不出户以避鬼恐致虎傷同類鬬殺以婦人勸方解凡出劫富者出牛酒以集衆有獲同分遇殺死則出銀以償被掠者必索金贖自勦撫後皆馴服矣黑苗在都勻之八寨丹江鎮逺之清江黎平之古州其山居者曰山苖曰髙坡苗近河者曰洞苗中有土司者為熟苖無管者為生苖衣服皆尚黑故曰黑苖婦人綰長簮耳垂大環銀項圈衣短以色錦緣袖男女皆跣足陟岡巒屣荆榛捷如猿猱勤耕樵女子更勞日則出作夜則紡績食惟糯稻舂甚白炊熟必成團冷食佐食惟野蔬無匙箸皆以手掬艱於鹽用蕨灰浸水所得死犢羔豚雞犬鴟鴉等類連毛臟置之甕中層層按納俟其螂蛆臭腐始告缸成名曰䤃菜珍為異味寒無重衣夜無卧具貧富皆然至婚姻喪祭各有不同八寨結婚亦有媒妁遇節跳月笙歌又鄰寨共建空房名曰馬郎房未婚嫁者遇晚聚歌情稔即以牛隻行聘歸三日即回母家或半年而一返女家父母向壻家索頭錢不與或另嫁有壻女皆死猶向女之子索者名鬼頭錢人死亦有哭泣椎牛敲銅鼓名曰閙尸葬以無底棺納土置尸於內以臘月辰日為過年每十三年畜牡牛祭天地祖先名曰喫牯臟丹江俗與八寨同但無馬郎房清江婚嫁姑之女定為舅媳倘舅無子必重獻於舅謂之外甥錢否則終身不得嫁或召少年往來謂之阿妹居喪與八寨同葬則子女守墳一月死者生前所私男女各插竹於墳前繫以色線以十月為嵗首古州男女亦皆以茍合始但寨分大小下户不敢通上户洞崽不敢通爺頭偶犯則女家必罄奪其産甚或置之死地人死殮後停於寨傍或至二十年合寨共擇一期百數十棺同葬每寨公建祖祠名曰鬼堂刻男像祼體不令女人入見遇病延鬼師於堂持咒以上皆背禮違法之陋俗至其性剛而戅生苖尤為最悍輕生嗜殺睚眥之仇雖久必報或椎埋伐塜或捉白放黑焚虜劫掠無所忌憚自經勦撫編甲認賦至雍正十三年永行豁免苖謂上户曰爺頭下戶曰洞崽九股苖在興隆衛凱里司與偏橋之黑苗同類武侯南征戮之殆盡僅存九人遂為九股散處蔓延地廣而族夥其衣服飲食婚姻喪祭概與八寨丹江等同而性尤剽悍頭頂鐵盔後無遮肩前有護面兩塊即鑄於盔極重身披鐵鎧上如背搭止及乳下用鐵錬周身形如圈籠綴於上坐則縮而立則伸約重三十斤下以鐵片纒腿健者結束尚能左執木牌右持標桿口銜利創捷走如飛大鎗約重十餘斤鉛子重八九錢不等發至百步外著人立糜洞又有牛尾鎗幾與內地子母炮埒強弓名曰偏架長六七尺三人共張矢無不貫前明播州之亂為楊應龍羽翼雖調兵十數萬誅滅楊應龍而九股未勦伏莽劫掠時出為害由地曠而險猝難制伏雍正十年鈎連蠢動合楚粵黔三省兵勦撫兼施搜繳兵甲建城安汛焉東苖在貴築龍里清平有族無姓衣尚淺藍色短不及膝以花巾束髮婦人衣花衣無袖惟兩幅遮前覆後著細摺短裙跳月與花苖同以中秋祭先祖及親族逺近之亡故者擇牡牛以毛旋頭角正者為佳時其水草以飼至禾熟牛肥釀酒斫牛召集親屬劇飲歌唱延鬼師於頭人之家以木板置酒饌循序而呼鬼之名竟晝夜乃已春獵於山獲禽亦必以祭畏見官長事有不平但聽鄉老決之急公服役比於良民惟在平逺髙堡等寨者多剽悍近皆守法西苖在平越及清平所屬有謝馬何羅盧雷等姓衣尚青男以青布纒頭白布裹腿婦人挽髮盤頭籠以木梳娶婦分床異寢必私通孕育後乃同室嵗十月收穫後名曰祭白號以牡牛置於平壤每寨或三五隻不等延善歌祝者各著大氊衣腰摺如圍穿皮靴頂大氊帽導於前童男女百數十輩青衣彩帶相隨於後吹笙舞蹈厯三晝夜乃殺牛以賽豐年除夕各